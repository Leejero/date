aped bias potential of the following form:\nwhere the sum runs over all ([math]\\displaystyle{ M_4 }[/math]) coordinates the potential acts upon, which are defined in theICONST-file by setting thestatusto 4.\nThe parameters[math]\\displaystyle{ D_{\\mu} }[/math]are dimensionless.\nThe number of items defined viaFBIAS_Dmust equal to[math]\\displayst", "wiki_url": "https://www.vasp.at/wiki/index.php/FBIAS_D", "description_cn": "FBIAS_D是一个实数数组。", "default_value": "无", "details_cn": "设置偏置势的斜率。FBIAS_D定义参数D_μ，它控制费米阶梯状偏置势中心部分的斜率，形式如下：其中求和遍历所有（M_4）坐标，这些坐标在ICONST文件中通过设置状态为4来定义。参数D_μ是无量纲的。通过FBIAS定义的项目数量。", "recommended": "无固定值，需根据模拟系统调整。通常从较小值（如0.1-1.0）开始测试，以避免过度扰动势能面。使用场景：在增强采样方法中，如元动力学或伞形采样，用于控制偏置势的斜率，促进对特定坐标的采样。", "tips": "1. 确保D_μ值合理，过大会导致数值不稳定或采样偏差。2. 必须与ICONST文件配合使用，正确设置状态为4的坐标。3. 参数D_μ是无量纲的，但需根据物理意义调整。"}, "FBIAS_R0": {"name": "FBIAS_R0", "description": "FBIAS_R0= [real (array)]", "default": "", "details": "Description: Defines the half-step position for the bias potential.\nFBIAS_R0defines the half-step position ([math]\\displaystyle{ \\xi_{0\\mu} }[/math]) for the Fermi-like step-shaped bias potential of the following form:\nwhere the sum runs over all ([math]\\displaystyle{ M_4 }[/math]) coordinates the potential acts upon, which are defined in theICONSTfile by setting thestatusto 4.\nThe units of[math]\\displaystyle{ \\xi_{0\\mu} }[/math]correspond to units of the coordinate the potential acts upon (e.g.,[math]\\displaystyl", "wiki_url": "https://www.vasp.at/wiki/index.php/FBIAS_R0", "description_cn": "定义偏置势的半步位置。", "default_value": "", "details_cn": "定义偏置势的半步位置。FBIAS_R0 定义了费米阶梯状偏置势的半步位置（ξ_{0μ}），其形式如下：其中求和遍历所有（M_4）坐标，偏置势作用于这些坐标，这些坐标在 ICONST 文件中通过设置状态为 4 来定义。ξ_{0μ} 的单位对应于偏置势作用坐标的单位（例如）。", "recommended": "根据模拟系统和反应坐标具体设置，例如在增强采样方法（如 metadynamics 或 umbrella sampling）中，半步位置应设置在反应路径的关键点（如过渡态或中间态）。使用场景：用于控制费米阶梯状偏置势的形状，以优化采样效率。", "tips": "确保 FBIAS_R0 的单位与 ICONST 文件中定义的坐标单位一致；设置不当可能导致模拟不稳定或采样偏差，建议参考具体文献或测试模拟调整。"}, "FERDO": {"name": "FERDO", "description": "Description:FERDOsets the occupancies of the states in the down-spin channel forISMEAR=-2 andISPIN=2.", "default": "", "details": "Description:FERDOsets the occupancies of the states in the down-spin channel forISMEAR=-2 andISPIN=2.\nTo set the occupancies, specify\nThe occupancies must be specified for all bands and k points. The band-index runs fastest. The occupancies must be between 0 and 1.FERDOhas the same format asFERWE, please consider the notes on that page when settingFERDO.", "wiki_url": "https://www.vasp.at/wiki/index.php/FERDO", "description_cn": "FERDO 设置下自旋通道的状态占据数，用于 ISMEAR=-2 和 ISPIN=2。", "default_value": "无默认值", "details_cn": "FERDO 设置下自旋通道的状态占据数，用于 ISMEAR=-2 和 ISPIN=2。要设置占据数，需指定必须为所有能带和 k 点指定占据数。能带索引变化最快。占据数必须在 0 和 1 之间。FERDO 的格式与 FERWE 相同，设置 FERDO 时请参考该页面的说明。", "recommended": "无固定推荐值，需根据具体系统设置。使用场景：在自旋极化计算中，当 ISMEAR=-2 时，用于手动设置下自旋通道的占据数，适用于需要精确控制电子占据的情况，如磁性材料计算。", "tips": "必须为所有能带和 k 点指定占据数；占据数必须在 0 和 1 之间；FERDO 的格式与 FERWE 相同，设置时请参考 FERWE 的相关说明。"}, "FERWE": {"name": "FERWE", "description": "Description:FERWEsets the occupancies of the states forISMEAR=-2.", "default": "", "details": "Description:FERWEsets the occupancies of the states forISMEAR=-2.\nTo set the occupancies, specify\nThe occupancies must be specified for all bands and k points. \nThe band index runs fastest. \nThe occupancies must be between 0 and 1.\nIn the case of spin-polarized calculations (ISPIN= 2),FERWEsets the occupancies of the states in the up-spin channel. \nSpecify the occupancies of the states in the do", "wiki_url": "https://www.vasp.at/wiki/index.php/FERWE", "description_cn": "FERWE 为 ISMEAR=-2 时设置电子态的占据数。", "default_value": "无", "details_cn": "FERWE 为 ISMEAR=-2 时设置电子态的占据数。要设置占据数，请指定。必须为所有能带和k点指定占据数。能带索引变化最快。占据数必须在0和1之间。在自旋极化计算（ISPIN=2）中，FERWE设置自旋向上通道的占据数。指定自旋向下通道的占据数。", "recommended": "无固定推荐值，取决于具体计算系统。对于绝缘体或半导体，占据数可设为0或1；对于金属，可能需要平滑的占据数分布（如费米-狄拉克分布）。使用场景：当ISMEAR=-2（四面体方法）时，需要手动控制电子态占据数，例如在精确计算电子结构、非平衡态模拟或特定测试中。", "tips": "1. 必须为所有能带和k点指定占据数，否则计算会失败。2. 占据数必须在0到1之间，超出范围可能导致错误。3. 在自旋极化计算（ISPIN=2）中，FERWE仅设置自旋向上通道的占据数，自旋向下通道需使用FERWD参数。4. 能带索引变化最快，输入占据数列表时，应先遍历能带索引，然后k点，以确保顺序正确。"}, "FINDIFF": {"name": "FINDIFF", "description": "FINDIFF= [integer]Default:FINDIFF= 1", "default": "FINDIFF= [integer]Default:FINDIFF= 1", "details": "Description: Defines whether a forward (FINDIFF=1) or a central (FINDIFF=2) difference formula for the numerical differentiation to compute the curvature along the dimer direction is used in theimproved dimer method.\nImproved dimer method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/FINDIFF", "description_cn": "FINDIFF参数用于改进的二聚体方法中，定义数值微分时使用的差分公式类型。", "default_value": "1", "details_cn": "定义在改进的二聚体方法中，用于计算沿二聚体方向曲率的数值微分是使用前向差分公式（FINDIFF=1）还是中心差分公式（FINDIFF=2）。改进的二聚体方法 使用此标签的示例", "recommended": "默认使用FINDIFF=1，适用于大多数计算场景，平衡精度和效率；若需要更高精度，可使用FINDIFF=2，但会增加计算成本。使用场景：在改进的二聚体方法中，当对曲率计算精度要求较高时，例如在寻找过渡态或优化反应路径时，选择FINDIFF=2。", "tips": "更改此参数可能影响计算精度和效率，建议在测试后根据具体计算需求进行调整；中心差分（FINDIFF=2）通常更精确，但计算量更大，需权衡使用。"}, "FMP_ACTIVE": {"name": "FMP_ACTIVE", "description": "FMP_ACTIVE= logical (aray)", "default": "Default:FMP_ACTIVE", "details": "Description: Select which atom types in thePOSCAR-file participate in swapping within theMüller-Plathe method.\nFMP_ACTIVEspecifies whether or not (.TRUE. or .FALSE., respectively) an atomic type allowed for swapping within theMüller-Plathe method. One item for each of the atomic types defined inPOSCARmust be supplied.\nMüller-Plathe method,FMP_DIRECTION,FMP_SNUMBER,FMP_SWAPNUM,FMP_PERIOD", "wiki_url": "https://www.vasp.at/wiki/index.php/FMP_ACTIVE", "description_cn": "FMP_ACTIVE 是一个逻辑数组。", "default_value": "FMP_ACTIVE", "details_cn": "选择POSCAR文件中哪些原子类型参与Müller-Plathe方法中的交换。FMP_ACTIVE指定一个原子类型是否被允许在Müller-Plathe方法中交换（分别为.TRUE.或.FALSE.）。必须为POSCAR中定义的每个原子类型提供一个项。相关参数：Müller-Plathe方法，FMP_DIRECTION，FMP_SNUMBER，FMP_SWAPNUM，FMP_PERIOD", "recommended": "根据模拟需求设置。例如，在Müller-Plathe方法中，如果只想交换特定原子类型（如氧原子），设置该类型为.TRUE.，其他为.FALSE.。使用场景：非平衡分子动力学模拟计算热导率时，用于控制参与交换的原子类型。", "tips": "必须为POSCAR中定义的每个原子类型提供一个逻辑值（.TRUE.或.FALSE.）。确保与Müller-Plathe方法的其他参数（如FMP_DIRECTION）协调使用，以避免模拟错误或不准确结果。"}, "FMP_DIRECTION": {"name": "FMP_DIRECTION", "description": "FMP_DIRECTION= 1 | 2 | 3Default:FMP_DIRECTION=  3", "default": "FMP_DIRECTION= 1 | 2 | 3Default:FMP_DIRECTION=  3", "details": "Description: Index of the lattice vector[math]\\displaystyle{ \\mathbf{a}_i }[/math]along which the temperature gradient is created in the (Müller-Plathe method).\nFMP_DIRECTIONdefines the index of the lattice vector[math]\\displaystyle{ \\mathbf{a}_i }[/math]along which the gradient[math]\\displaystyle{ \\partial T/\\partial \\mathbf{a}_i  }[/math]is created during the reverse nonequilibrium molecular-dynamics run using theMüller-Plathe method.\nMüller-Plathe method,FMP_ACTIVE,FMP_SNUMBER,FMP_SWAPNUM,FMP_PERIOD", "wiki_url": "https://www.vasp.at/wiki/index.php/FMP_DIRECTION", "description_cn": "FMP_DIRECTION 参数用于指定在Müller-Plathe方法中创建温度梯度的晶格向量索引，可取值为1、2或3，默认值为3。", "default_value": "3", "details_cn": "FMP_DIRECTION 定义了在使用Müller-Plathe方法进行反向非平衡分子动力学运行时，沿哪个晶格向量 a_i 创建温度梯度 ∂T/∂a_i。它指定了晶格向量的索引，用于控制温度梯度的方向。", "recommended": "推荐值取决于模拟体系的晶格方向。默认值3通常对应于z方向。如果需要计算特定方向（如x或y方向）的热导率，应相应设置为1或2。使用场景是进行热导率计算时，通过Müller-Plathe方法施加温度梯度。", "tips": "1. 确保FMP_ACTIVE设置为True以启用Müller-Plathe方法。2. 其他相关参数如FMP_SNUMBER和FMP_SWAPNUM也需要正确配置。3. 晶格向量索引应与POSCAR文件中定义的晶格向量顺序一致。4. 该参数仅在反向非平衡分子动力学模拟中使用。"}, "FMP_PERIOD": {"name": "FMP_PERIOD", "description": "FMP_PERIOD= integerDefault:FMP_PERIOD=  10", "default": "FMP_PERIOD= integerDefault:FMP_PERIOD=  10", "details": "Description: Number of time steps between two swapping events in theMüller-Plathe method.\nThis tag defines how many MD steps are done between two consecutive velocity-swapping events. The period is counted in MD steps and not in simulation time.\nMüller-Plathe method,FMP_ACTIVE,FMP_DIRECTION,FMP_SNUMBER,FMP_SWAPNUM", "wiki_url": "https://www.vasp.at/wiki/index.php/FMP_PERIOD", "description_cn": "FMP_PERIOD是一个整数参数，默认值为10。", "default_value": "10", "details_cn": "在Müller-Plathe方法中，两次交换事件之间的时间步数。此标签定义了在连续速度交换事件之间进行的MD步数。周期以MD步数计算，而不是模拟时间。Müller-Plathe方法，FMP_ACTIVE，FMP_DIRECTION，FMP_SNUMBER，FMP_SWAPNUM。", "recommended": "根据模拟系统大小和时间步长调整，通常建议在10到100之间。使用场景：用于Müller-Plathe方法的非平衡分子动力学模拟，以计算热导率。", "tips": "确保FMP_PERIOD与分子动力学步长兼容；周期以MD步数计算，而非模拟时间；需与其他Müller-Plathe参数（如FMP_ACTIVE）一起使用；值过小可能导致模拟不稳定，值过大可能降低计算效率。"}, "FMP_SNUMBER": {"name": "FMP_SNUMBER", "description": "FMP_SNUMBER= integerDefault:FMP_SNUMBER=  10", "default": "FMP_SNUMBER= integerDefault:FMP_SNUMBER=  10", "details": "Description: Number of slabs perpendicular to the temperature gradient in theMüller-Plathe method.\nFMP_SNUMBERdefines the number of slabs perpendicular to the lattice vector[math]\\displaystyle{ \\mathbf{a}_i }[/math]along which the gradient[math]\\displaystyle{ \\partial T/\\partial \\mathbf{a}_i  }[/math]is created during the reverse nonequilibrium molecular dynamics run using theMüller-Plathe method\nMüller-Plathe method,FMP_ACTIVE,FMP_DIRECTION,FMP_SWAPNUM,FMP_PERIOD", "wiki_url": "https://www.vasp.at/wiki/index.php/FMP_SNUMBER", "description_cn": "在Müller-Plathe方法中，垂直于温度梯度的平板数量。", "default_value": "10", "details_cn": "详细说明：FMP_SNUMBER参数指定在Müller-Plathe方法中，垂直于温度梯度的平板数量。具体来说，它定义了在反向非平衡分子动力学运行中，使用Müller-Plathe方法时，垂直于晶格向量[math]\\displaystyle{ \\mathbf{a}_i }[/math]的平板数量，沿着该向量创建梯度[math]\\displaystyle{ \\partial T/\\partial \\mathbf{a}_i }[/math]。相关参数包括：Müller-Plathe方法、FMP_ACTIVE、FMP_DIRECTION、FMP_SWAPNUM和FMP_PERIOD。", "recommended": "默认值10可作为初始设置，但应根据模拟系统的尺寸和精度需求进行优化。例如，对于较大系统或需要更高精度的计算，可适当增加平板数量。使用场景：在反向非平衡分子动力学（RNEMD）模拟中，使用Müller-Plathe方法计算材料热导率时设置此参数。", "tips": "平板数量需足够以准确捕捉温度梯度，但过多会增加计算成本。建议进行收敛性测试以确定最佳值。确保与其他FMP参数（如FMP_ACTIVE、FMP_DIRECTION）正确配合，并参考系统尺寸调整。"}, "FMP_SWAPNUM": {"name": "FMP_SWAPNUM", "description": "FMP_SWAPNUM= integerDefault:FMP_SWAPNUM=  1", "default": "FMP_SWAPNUM= integerDefault:FMP_SWAPNUM=  1", "details": "Description: Number of pairs that are exchanged in a single swapping event in theMüller-Plathe method.\nFMP_SWAPNUMdefines the number of pairs of particles exchanged in a single swapping event of the reverse nonequilibrium molecular dynamics run using theMüller-Plathe method. Only the particles of the same type are selected.\nMüller-Plathe method,FMP_DIRECTION,FMP_ACTIVE,FMP_SNUMBER,FMP_PERIOD", "wiki_url": "https://www.vasp.at/wiki/index.php/FMP_SWAPNUM", "description_cn": "FMP_SWAPNUM 是一个整数参数，用于指定在Müller-Plathe方法中单个交换事件中交换的粒子对数量，默认值为1。", "default_value": "1", "details_cn": "在Müller-Plathe方法中，单个交换事件中交换的粒子对的数量。FMP_SWAPNUM定义了在使用Müller-Plathe方法的反向非平衡分子动力学运行中，单个交换事件中交换的粒子对的数量。只选择相同类型的粒子。相关参数：Müller-Plathe方法，FMP_DIRECTION，FMP_ACTIVE，FMP_SNUMBER，FMP_PERIOD。", "recommended": "默认值为1，适用于大多数模拟情况。在模拟较大体系或需要更高精度时，可适当增加交换对数量以提高统计效率。使用场景：在VASP中进行反向非平衡分子动力学模拟，使用Müller-Plathe方法计算热导率或其他输运性质时设置。", "tips": "确保只交换相同类型的粒子；需与FMP_DIRECTION、FMP_ACTIVE、FMP_SNUMBER、FMP_PERIOD等参数协调使用；根据模拟体系大小和精度需求调整交换对数量，避免过度交换导致计算不稳定。"}, "FOCKCORR": {"name": "FOCKCORR", "description": "Description: The tagFOCKCORRdetermines how the Coulomb convergence corrections are applied.", "default": "Default:FOCKCORR", "details": "Description: The tagFOCKCORRdetermines how the Coulomb convergence corrections are applied.\nThe Coulomb potential in reciprocal space\ndiverges for small G vectors.\nTo alleviate this issue and improve the convergence of the exact exchange integral with respect to supercell size (or k-point mesh density) different methods have been proposed: the auxiliary function methods[1], probe-charge Ewald[2](HFALPHA), and Coulomb truncation me", "wiki_url": "https://www.vasp.at/wiki/index.php/FOCKCORR", "description_cn": "FOCKCORR参数决定如何应用库仑收敛校正。", "default_value": "0", "details_cn": "FOCKCORR参数决定如何应用库仑收敛校正。在倒易空间中，库仑势对于小G矢量发散。为了缓解这个问题并提高精确交换积分相对于超胞大小（或k点网格密度）的收敛性，提出了不同的方法：辅助函数方法[1]、探针电荷Ewald[2]（HFALPHA）和库仑截断方法。", "recommended": "根据计算体系选择。对于小体系或测试，可使用默认值0（无校正）；对于精确交换计算，推荐使用1（辅助函数方法）或2（探针电荷Ewald方法）以提高收敛性。使用场景：Hartree-Fock或杂化泛函计算中，当超胞大小或k点网格密度影响收敛时。", "tips": "FOCKCORR参数通常与HFALPHA参数结合使用，特别是当选择探针电荷Ewald方法（FOCKCORR=2）时。不同校正方法可能对计算精度和效率有不同影响，建议进行收敛测试。此外，确保INCAR中其他参数如PREC和ENCUT设置合理。"}, "GAMMA_VDW": {"name": "GAMMA_VDW", "description": "Description: Specify[math]\\displaystyle{ \\gamma }[/math]in vdW-DF3-opt1/vdW-DF3-opt2.", "default": "Default:GAMMA_VDW", "details": "Description: Specify[math]\\displaystyle{ \\gamma }[/math]in vdW-DF3-opt1/vdW-DF3-opt2.\nTheGAMMA_VDWtag allows to specify the value of the parameter[math]\\displaystyle{ \\gamma }[/math]in the kernel of the vdW-DF3-opt1/vdW-DF3-opt2 nonlocal van der Waals functionals.[1]\nALPHA_VDW,PARAM1,PARAM2,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/GAMMA_VDW", "description_cn": "指定vdW-DF3-opt1/vdW-DF3-opt2中的γ参数。", "default_value": "未指定（使用泛函默认值）", "details_cn": "GAMMA_VDW标签允许指定vdW-DF3-opt1/vdW-DF3-opt2非局域范德华泛函核中的参数γ的值。[1] ALPHA_VDW,PARAM1,PARAM2,非局域vdW-DF泛函", "recommended": "推荐使用默认值，除非有特定计算需求。例如，在需要精细调整色散相互作用时，可以参考相关文献设置γ值。", "tips": "GAMMA_VDW参数仅在使用vdW-DF3-opt1或vdW-DF3-opt2泛函时有效。设置时需与ALPHA_VDW等参数协调，避免冲突。"}, "GGA": {"name": "GGA", "description": "GGA= [string]Default:GGA= The functional specified byLEXCHin thePOTCARifMETAGGAandXCare also not specified.", "default": "GGA= [string]Default:GGA= The functional specified byLEXCHin thePOTCARifMETAGGAandXCare also not specified.", "details": "Description: Selects a LDA or GGAexchange-correlation functional.\nThis table lists the LDA and GGA functionals available in VASP. The names of functionals which end with \"_X\" and \"_C\" correspond to exchange-only and correlation functionals, respectively.\n(1)The Slater LDA exchange includes relativistic effects.[28]", "wiki_url": "https://www.vasp.at/wiki/index.php/GGA", "description_cn": "GGA参数用于选择LDA或GGA交换关联泛函。", "default_value": "如果未指定METAGGA和XC，则使用POTCAR文件中LEXCH指定的泛函。", "details_cn": "选择LDA或GGA交换关联泛函。此表列出了VASP中可用的LDA和GGA泛函。以\"_X\"和\"_C\"结尾的泛函名称分别对应仅交换泛函和仅关联泛函。(1) Slater LDA交换包含相对论效应。[28]", "recommended": "GGA=PE（PBE泛函），适用于大多数固体和表面计算。对于强关联体系，可考虑使用METAGGA或其他泛函。", "tips": "GGA参数与METAGGA和XC参数互斥；确保POTCAR文件与所选泛函兼容；对于特定泛函，可能需要调整其他参数如ENCUT或PREC。"}, "GGA_COMPAT": {"name": "GGA_COMPAT", "description": "GGA_COMPAT= .TRUE. | .FALSE.Default:GGA_COMPAT= .TRUE.", "default": "GGA_COMPAT= .TRUE. | .FALSE.Default:GGA_COMPAT= .TRUE.", "details": "Description: If set toGGA_COMPAT= .FALSE., this tag restores the full lattice symmetry for gradient-corrected functionals.\nGGAandMETAGGAfunctionals might break the symmetry of\nthe Bravais lattice slightly for cells that are not primitive cubic cells.\nThe origin of this problem is subtle and relates to the fact that the gradient field breaks the lattice symmetry for noncubic lattices. This can be fixed by setting\nto apply a spherical cutoff to the gradient field. In other words, the gradient field, as well as the charge density are set to zero for all reciprocal lattice vectors[math]\\displaystyle{ \\mathbf{G} }[/math]that exceed a certain cutoff length[math]\\displaystyle{ \\mathbf{G}_{cut} }[/math]before calcu", "wiki_url": "https://www.vasp.at/wiki/index.php/GGA_COMPAT", "description_cn": "GGA_COMPAT 参数用于控制梯度校正泛函的对称性恢复。默认值为 .TRUE.。", "default_value": ".TRUE.", "details_cn": "如果设置 GGA_COMPAT 为 .FALSE.，此标签恢复梯度校正泛函的完整晶格对称性。GGA 和 METAGGA 泛函可能会轻微破坏非原始立方晶胞的 Bravais 格子对称性。这个问题的根源很微妙，与梯度场破坏非立方晶格的对称性有关。可以通过设置 GGA_COMPAT 为 .FALSE. 来应用球形截断到梯度场，从而修复此问题。换句话说，梯度场...", "recommended": "通常使用默认值 .TRUE.，但在需要保持晶格对称性的计算中（如声子计算或对称性敏感的性质），建议设置为 .FALSE.。", "tips": "设置 GGA_COMPAT 为 .FALSE. 可能会略微增加计算成本，但能确保对称性。仅在非立方晶格且对称性重要时使用。"}, "HFALPHA": {"name": "HFALPHA", "description": "Description:HFALPHAsets the decay constant used in the method of Massida, Posternak, and Baldereschi, which is activated byHFRCUT=0.", "default": "Default:HFALPHA", "details": "Description:HFALPHAsets the decay constant used in the method of Massida, Posternak, and Baldereschi, which is activated byHFRCUT=0.\nHFALPHAsets the decay constant in the error-function-like charge distribution for the method of Massida, Posternak, and Baldereschi[1]. The error-function-like charge distribution is used to calculate the difference between the isolated probe charge and the periodically repeated probe charge in a ho\nAEXX,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC,LHFCALC,HFRCUT,LTHOMAS,List of hybrid functionals,Hybrid functionals: formalism,Coulomb singularity", "wiki_url": "https://www.vasp.at/wiki/index.php/HFALPHA", "description_cn": "HFALPHA 设置了在 Massida、Posternak 和 Baldereschi 方法中使用的衰减常数，该方法通过 HFRCUT=0 激活。", "default_value": "0.2", "details_cn": "HFALPHA 设置了在 Massida、Posternak 和 Baldereschi 方法中使用的衰减常数，该方法通过 HFRCUT=0 激活。HFALPHA 设置了在 Massida、Posternak 和 Baldereschi 方法中误差函数样电荷分布的衰减常数[1]。误差函数样电荷分布用于计算孤立探针电荷和周期性重复探针电荷之间的差异。", "recommended": "推荐值为0.2（默认值），适用于大多数杂化泛函计算。使用场景：当设置HFRCUT=0以激活Massida等人的方法时，用于精确处理交换作用，特别是在需要长程交换校正的体系中。", "tips": "HFALPHA仅在HFRCUT=0时有效。设置不当可能导致计算不准确或收敛问题。建议根据具体体系和计算需求进行测试和优化，并参考VASP文档或相关文献。"}, "HFLMAX": {"name": "HFLMAX", "description": "HFLMAX= [integer]Default:HFLMAX= 4", "default": "HFLMAX= [integer]Default:HFLMAX= 4", "details": "Description: To be compatible w.r.t. old releases, VASP also reads the flagHFLMAXto the same effect asLMAXFOCK.\nLMAXFOCK,LMAXFOCKAE\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/HFLMAX", "description_cn": "HFLMAX= [整数] 默认值：HFLMAX= 4", "default_value": "4", "details_cn": "为了与旧版本兼容，VASP也读取标志HFLMAX，其效果与LMAXFOCK相同。LMAXFOCK, LMAXFOCKAE 使用此标签的示例。", "recommended": "默认值为4，适用于大多数体系。对于重元素或高精度计算，可适当增加。使用场景：在Hartree-Fock或杂化泛函计算中，控制交换积分的最大角动量量子数。", "tips": "HFLMAX是旧版本参数，建议使用LMAXFOCK代替以保持一致性。确保HFLMAX与LMAXFOCK设置相同，以避免冲突。根据计算需求和资源调整值。"}, "HFRCUT": {"name": "HFRCUT", "description": "HFRCUT= [real]Default:HFRCUT= 0", "default": "HFRCUT= [real]Default:HFRCUT= 0", "details": "Description:HFRCUTspecifies how theCoulomb kernel is approximated at G=0when the Fock energy and the exchange potential are evaluated.\nIn systems with periodic boundary conditions, the Coulomb energy and the Coulomb potential are usually evaluated under the assumption of a compensating background by introducing a compensation charge density. This is well-justified for the Hartree energy, where the compensation charge density stems \nIn the limit of many k-points, both methods (HFRCUT=-1 andHFRCUT=0) should yield identical results. In our experience, theHFRCUT=-1 converges more rapidly for systems with a gap, as well as molecules and atoms, whereasHFRCUT=0 converges faster for metallic systems. It is expedient to first converge ", "wiki_url": "https://www.vasp.at/wiki/index.php/HFRCUT", "description_cn": "HFRCUT= [实数] 默认值：HFRCUT= 0", "default_value": "0", "details_cn": "HFRCUT指定在评估Fock能量和交换势时，如何近似G=0处的库仑核。在具有周期性边界条件的系统中，库仑能量和库仑势通常通过引入补偿电荷密度，在补偿背景的假设下进行评估。这对于Hartree能量是合理的，其中补偿电荷密度源于... 在k点数量很多的极限下，两种方法（HFRCUT=-1和HFRCUT...", "recommended": "HFRCUT=0（默认值），适用于大多数杂化泛函计算，确保计算精度和准确性。HFRCUT=-1可用于大体系或需要减少计算成本的情况，但可能引入近似误差，建议在测试后使用。", "tips": "HFRCUT参数主要影响长程库仑相互作用的处理，特别是在杂化泛函计算中。使用时需根据体系特性（如周期性、k点采样）调整，以避免计算发散或精度损失。对于金属或小带隙系统，可能需要谨慎选择。"}, "HFSCREEN": {"name": "HFSCREEN", "description": "HFSCREEN= [real]Default:HFSCREEN= 0 (none)", "default": "HFSCREEN= [real]Default:HFSCREEN= 0 (none)", "details": "Description:HFSCREEN(in Å-1) specifies the range-separation parameter inrange-separated hybrid functionals.\nIfLHFCALC=.TRUE. andGGA=PE (PBE functional), attributing a value toHFSCREENwill switch from the PBE0 functional to, e.g., the closely relatedHSE03(HFSCREEN=0.3) orHSE06(HFSCREEN=0.2) functionals. It also needs to be set for dielectric-dependent hybrid functionals (DDH) and doubly screened hybrid (DS\nLMODELHF,AEXX,ALDAX,ALDAC,AGGAX,AGGAC,LTHOMAS,LRHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/HFSCREEN", "description_cn": "HFSCREEN是一个实数参数，默认值为0（无）。", "default_value": "0", "details_cn": "HFSCREEN（单位：Å⁻¹）指定了范围分离杂化泛函中的范围分离参数。如果LHFCALC=.TRUE.且GGA=PE（PBE泛函），为HFSCREEN赋值将从PBE0泛函切换到，例如，密切相关的HSE03（HFSCREEN=0.3）或HSE06（HFSCREEN=0.2）泛函。它也需要为介电依赖杂化泛函（DDH）和双重屏蔽杂化（DS）设置。", "recommended": "对于HSE06泛函，使用HFSCREEN=0.2；对于HSE03泛函，使用HFSCREEN=0.3。使用场景：当需要高精度计算带隙、电子结构或表面性质时，使用杂化泛函如HSE系列，以提高计算准确性。", "tips": "确保在INCAR中设置LHFCALC=.TRUE.和GGA=PE以激活杂化泛函。HFSCREEN的值会影响计算精度和计算成本，需根据体系特性和计算需求选择合适的值；默认值为0时可能对应PBE0泛函，但建议根据文献或测试确定最佳参数。"}, "HILLS_BIN": {"name": "HILLS_BIN", "description": "HILLS_BIN= [Integer]Default:HILLS_BIN=NSW", "default": "HILLS_BIN= [Integer]Default:HILLS_BIN=NSW", "details": "Description:HILLS_BINsets the number of steps after which the bias potential is updated in a metadynamics run (in case VASP was compiled with-Dtbdyn).\nInmetadynamics(MDALGO=11 | 21), the bias potential is given as\nThre parameters (HILLS_H,HILLS_W, andHILLS_BIN) must be provided by the user.", "wiki_url": "https://www.vasp.at/wiki/index.php/HILLS_BIN", "description_cn": "HILLS_BIN参数设置在元动力学运行中更新偏置势的步数。", "default_value": "NSW", "details_cn": "HILLS_BIN设置在元动力学运行中更新偏置势的步数（如果VASP编译时使用了-Dtbdyn选项）。在元动力学模拟（MDALGO=11或21）中，偏置势由三个参数（HILLS_H、HILLS_W和HILLS_BIN）给出，用户必须提供这些参数。", "recommended": "通常设置为总离子步数（NSW）的一部分，例如NSW/10到NSW/5，具体取决于模拟体系和采样需求。使用场景：用于元动力学模拟（MDALGO=11或21）中控制偏置势更新的频率，以增强相空间采样。", "tips": "1. 确保VASP编译时启用了-Dtbdyn选项，否则元动力学功能不可用。2. HILLS_BIN必须为正整数，且应小于或等于总离子步数（NSW）。3. 需与HILLS_H（偏置势高度）和HILLS_W（偏置势宽度）参数协调设置，以优化模拟效果。4. 默认值NSW意味着偏置势每NSW步更新一次，可能更新频率较低，建议根据模拟时间尺度和体系动力学调整。"}, "HILLS_H": {"name": "HILLS_H", "description": "HILLS_H= [Real]Default:HILLS_H=[math]\\displaystyle{ 10^{-3} }[/math]", "default": "HILLS_H= [Real]Default:HILLS_H=[math]\\displaystyle{ 10^{-3} }[/math]", "details": "Description:HILLS_Hspecifies the height of the Gaussian hill (in eV) used in metadynamics (in case VASP was compiled with-Dtbdyn).\nInmetadynamics(MDALGO=11 | 21), the bias potential is given as\nThre parameters (HILLS_H,HILLS_W, andHILLS_BIN) must be provided by the user.", "wiki_url": "https://www.vasp.at/wiki/index.php/HILLS_H", "description_cn": "HILLS_H 是一个实数参数，用于指定元动力学中高斯山的高度。", "default_value": "10^{-3}", "details_cn": "HILLS_H 指定了在元动力学中使用的高斯山的高度（单位为 eV），前提是 VASP 编译时启用了 -Dtbdyn 选项。在元动力学（MDALGO=11 或 21）中，偏置势的构建需要三个参数（HILLS_H、HILLS_W 和 HILLS_BIN），这些参数必须由用户提供。", "recommended": "从默认值 10^{-3} eV 开始，根据模拟收敛性调整。使用场景：当进行元动力学模拟（MDALGO=11 或 21）时，用于控制偏置势的强度，以加速采样。", "tips": "1. 确保 VASP 编译时启用了 -Dtbdyn 选项；2. 必须同时设置 HILLS_H、HILLS_W 和 HILLS_BIN；3. 参数值应根据具体体系和模拟目标进行优化，避免过快或过慢填充。"}, "HILLS_W": {"name": "HILLS_W", "description": "HILLS_W= [Real]Default:HILLS_W=[math]\\displaystyle{ 10^{-3} }[/math]", "default": "HILLS_W= [Real]Default:HILLS_W=[math]\\displaystyle{ 10^{-3} }[/math]", "details": "Description:HILLS_Wspecifies the width of the Gaussian hill (in units of the corresponding collective variable) used in metadynamics (in case VASP was compiled with-Dtbdyn).\nInmetadynamics(MDALGO=11 | 21), the bias potential is given as\nThre parameters (HILLS_H,HILLS_W, andHILLS_BIN) must be provided by the user.", "wiki_url": "https://www.vasp.at/wiki/index.php/HILLS_W", "description_cn": "HILLS_W指定高斯山的宽度（以相应集体变量的单位），用于元动力学。", "default_value": "默认值为10^{-3}（即0.001）", "details_cn": "HILLS_W指定用于元动力学的高斯山的宽度（以相应集体变量的单位），前提是VASP编译时启用了-Dtbdyn选项。在元动力学（MDALGO=11或21）中，偏置势由高斯函数叠加给出。三个参数（HILLS_H、HILLS_W和HILLS_BIN）必须由用户提供。", "recommended": "默认值10^{-3}通常作为起点，但需根据集体变量的范围调整；对于较宽的集体变量，可适当增大HILLS_W以增强采样效率。使用场景：在元动力学模拟中，当需要增强采样时，特别是设置MDALGO=11或21时。", "tips": "确保VASP编译时启用了-Dtbdyn选项，否则HILLS_W参数无效。同时，HILLS_W应与HILLS_H和HILLS_BIN参数一起设置，以正确配置元动力学；建议根据模拟体系调整这些参数以避免采样不足或过度。"}, "HITOLER": {"name": "HITOLER", "description": "HITOLER= [real]Default:HITOLER=[math]\\displaystyle{ 5\\times10^{-5} }[/math]", "default": "HITOLER= [real]Default:HITOLER=[math]\\displaystyle{ 5\\times10^{-5} }[/math]", "details": "Description:HITOLERspecifies the convergence parameter for the iterative Hirschfeld partitioning in the Tkatchenko-Scheffler method.\nIVDW,DFT-D2,DFT-D3,Tkatchenko-Scheffler method,Tkatchenko-Scheffler method with iterative Hirshfeld partitioning,Many-body dispersion energy,dDsC dispersion correction\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/HITOLER", "description_cn": "HITOLER是一个实数参数，默认值为5×10^{-5}。", "default_value": "5×10^{-5}", "details_cn": "HITOLER指定了Tkatchenko-Scheffler方法中迭代Hirshfeld分区的收敛参数。", "recommended": "默认值5×10^{-5}通常适用于大多数情况。对于高精度计算，可以减小到1×10^{-5}或更小。使用场景：当使用Tkatchenko-Scheffler方法进行色散校正时，特别是涉及迭代Hirshfeld分区的情况，如IVDW、DFT-D2、DFT-D3、多体色散能量或dDsC色散校正。", "tips": "调整HITOLER可能影响计算精度和收敛速度。过小的值会增加计算时间，过大的值可能导致不收敛。建议根据具体体系和精度要求进行测试。"}, "IALGO": {"name": "IALGO", "description": "IALGO= -1 | 2-4 | 5-8 | 15-18 | 28 | 38 | 44-48 | 53-58", "default": "Default:IALGO", "details": "Description:IALGOselects the algorithm to optimize the orbitals.\nThe band-by-band conjugate gradient algorithms are no longer maintained or supported.\nThe damped MD algorithm can be combined withLDIAG=.FALSE. to conserve the initial orbital order (when orbitals are read from theWAVECARfile).", "wiki_url": "https://www.vasp.at/wiki/index.php/IALGO", "description_cn": "IALGO 可取值为 -1、2-4、5-8、15-18、28、38、44-48、53-58。", "default_value": "IALGO", "details_cn": "IALGO 选择优化轨道的算法。逐带共轭梯度算法不再维护或支持。阻尼分子动力学算法可以与 LDIAG=.FALSE. 结合使用，以保持初始轨道顺序（当从 WAVECAR 文件读取轨道时）。", "recommended": "对于标准DFT计算，推荐使用IALGO=48；对于杂化泛函计算，推荐使用IALGO=53或58。使用场景：IALGO=48适用于大多数常规计算；IALGO=53-58适用于杂化泛函或需要保持轨道顺序的情况，可结合LDIAG=.FALSE.使用。", "tips": "逐带共轭梯度算法已不再维护或支持，请避免使用。当使用阻尼分子动力学算法（如IALGO=53-58）时，可设置LDIAG=.FALSE.以保持从WAVECAR文件读取的初始轨道顺序。选择IALGO值时需根据计算类型调整。"}, "IALL_IN_ONE": {"name": "IALL_IN_ONE", "description": "Description:IALL_IN_ONE>0 enables the all-in-one mode formany-body perturbation theorycalculations,\ni.e.,ALGO=ACFDT[R],[EV]GW0[R],GWR.", "default": "Default:IALL_IN_ONE", "details": "In the all-in-one mode, VASP automatically performs the necessary DFT steps prior to the many-body perturbation theory (MBPT) calculation, i.e. a DFT calculation withNBANDS, followed by an exact diagonalization of the Kohn-Sham Hamiltonian withNBANDSEXACTbands. \nNote,NBANDSEXACTis set by default to \nThe all-in-one mode is automatically enabled forALGO=[EV]GW[0]R, RPA[R],ACFDT[R] ifNBANDSis not set.\nALGO,NBANDSNBANDSEXACTNBANDS_WAVELALL_IN_ONE", "wiki_url": "https://www.vasp.at/wiki/index.php/IALL_IN_ONE", "description_cn": "IALL_IN_ONE>0 启用多体微扰理论计算的一体化模式，即 ALGO=ACFDT[R],[EV]GW0[R],GWR。", "default_value": "0", "details_cn": "在一体化模式下，VASP 自动执行多体微扰理论（MBPT）计算之前的必要 DFT 步骤，即使用 NBANDS 进行 DFT 计算，然后使用 NBANDSEXACT 个能带对 Kohn-Sham 哈密顿量进行精确对角化。注意，NBANDSEXACT 默认设置为 [缺失]。如果未设置 NBANDS，一体化模式会自动为 ALGO=[EV]GW[0]R, RPA[R], ACFDT[R] 启用。ALGO, NBANDS, NBANDSEXACT, NBANDS_WAVE, IALL_IN_ONE", "recommended": "对于多体微扰理论计算（如GW、RPA），设置IALL_IN_ONE=1以启用一体化模式，简化计算流程。", "tips": "1. 使用一体化模式时，NBANDSEXACT的默认值可能影响计算精度，建议根据需求调整。2. 如果未设置NBANDS参数，一体化模式会自动启用。3. 确保ALGO参数设置为兼容的值，如ACFDT[R]、[EV]GW0[R]、GWR等。"}, "IBAND": {"name": "IBAND", "description": "IBAND= [integer array]Default:IBAND= not set", "default": "IBAND= [integer array]Default:IBAND= not set", "details": "Description:IBANDsets a list of bands that contribute to calculating thepartial charge density.\nIBANDselects a subset of bands for which the partial charge density is calculated whenLPARD= .TRUE..\nPartial charge densities are written to thePARCHGfile, or one of its variants, depending on the setting ofLSEPBandLSEPK.\nE.g. ifIBAND = 20 21 22 23 45the charge density will be calculated for the four bands 20 to 23 and band 45, andNBMODwill be set to 5.", "wiki_url": "https://www.vasp.at/wiki/index.php/IBAND", "description_cn": "IBAND= [整数数组] 默认值：IBAND= 未设置", "default_value": "未设置", "details_cn": "IBAND 设置了参与计算部分电荷密度的能带列表。当 LPARD= .TRUE. 时，IBAND 选择一部分能带来计算部分电荷密度。部分电荷密度被写入 PARCHG 文件或其变体，具体取决于 LSEPBandLSEPK 的设置。例如，如果 IBAND = 20 21 22 23 45，电荷密度将计算能带 20 到 23 和能带 45，NBMOD 将被设置为 5。", "recommended": "无固定推荐值，需根据计算目的设置。使用场景：在研究表面吸附、缺陷态或特定电子态时，设置 IBAND 以计算部分电荷密度，例如分析费米能级附近的能带或特定化学键的电子分布。", "tips": "IBAND 仅在 LPARD= .TRUE. 时生效；确保能带索引在有效范围内（如不超过总能带数）；部分电荷密度文件可能占用较大存储空间，注意磁盘管理；设置 IBAND 会自动调整 NBMOD 参数，需检查相关设置。"}, "IBRION": {"name": "IBRION", "description": "IBRION= -1 | 0 | 1 | 2 | 3 | 5 | 6 | 7 | 8 | 11 | 12 | 40 | 44", "default": "Default:IBRION", "details": "Description: determines how the crystal structure changes during the calculation:\nInmolecular-dynamics (MD) simulationsthe positions of the ions are updated using a classical equation of motion for the ions. There are several algorithms for thetime propagation in MDcontrolled by selectingMDALGOand the choice of thethermostats. The MD run performsNSWtimesteps of lengthPOTIM.\nFrequently, performing anab-initio calculationsin every step of an MD simulation is too expensive so thatmachine-learned force fieldsare needed.", "wiki_url": "https://www.vasp.at/wiki/index.php/IBRION", "description_cn": "IBRION参数用于控制离子弛豫和分子动力学计算，可选值包括-1、0、1、2、3、5、6、7、8、11、12、40、44。", "default_value": "IBRION", "details_cn": "决定计算过程中晶体结构如何变化。在分子动力学（MD）模拟中，离子的位置通过经典运动方程更新。有多种算法用于MD中的时间传播，通过选择MDALGO和热浴来控制。MD运行执行NSW个时间步长，每个步长为POTIM。通常，在MD模拟的每一步都执行从头算计算过于昂贵，因此机器学习的力场...", "recommended": "对于离子弛豫，推荐IBRION=2（共轭梯度法），适用于结构优化，稳定高效；对于分子动力学，推荐IBRION=0，并配合MDALGO设置，用于模拟离子运动。其他值如IBRION=1（准牛顿法）用于快速弛豫，IBRION=5用于频率计算，IBRION=3用于阻尼分子动力学。", "tips": "选择IBRION时需根据计算类型（如弛豫或MD）调整；对于MD模拟，必须设置NSW和POTIM参数；对于弛豫，建议设置EDIFFG以控制力收敛；不同值可能影响计算收敛性和成本，例如IBRION=2通常更稳定，而IBRION=0在MD中需注意时间步长设置。"}, "IBSE": {"name": "IBSE", "description": "IBSE= 0 | 1 | 2 | 3Default:IBSE= 2", "default": "IBSE= 0 | 1 | 2 | 3Default:IBSE= 2", "details": "Description:IBSEcan be used to select the algorithm for solving the Bethe-Salpeter or Casida equation.\nThe following options are available to solve the Bethe-Salpeter or Casida equation:\nIBSE= 2andIBSE= 0yield exactly the same results but the old driver (IBSE= 0) is typically much slower and will be deprecated in the future.", "wiki_url": "https://www.vasp.at/wiki/index.php/IBSE", "description_cn": "IBSE参数用于选择求解Bethe-Salpeter或Casida方程的算法，可取值为0、1、2、3。", "default_value": "2", "details_cn": "IBSE可用于选择求解Bethe-Salpeter或Casida方程的算法。以下选项可用于求解Bethe-Salpeter或Casida方程：IBSE= 2和IBSE= 0产生完全相同的结果，但旧驱动程序（IBSE= 0）通常较慢，并将在未来被弃用。", "recommended": "推荐使用IBSE= 2，因为它与IBSE= 0产生相同结果但计算速度更快，且IBSE= 0将被弃用；适用于大多数Bethe-Salpeter或Casida方程计算场景。", "tips": "IBSE= 0较慢且未来将被弃用，建议避免使用；其他取值（如1、3）可能对应不同算法，但文档未详细说明，使用时请参考最新VASP手册。"}, "ICHARG": {"name": "ICHARG", "description": "ICHARG= 0 | 1 | 2 | 4 | 5", "default": "Default:ICHARG", "details": "Description:ICHARGdetermines how VASP constructs theinitialcharge density.\nThe initial charge density is of importance in the following cases:\nCHGCAR,ISTART,LCHARG,LMAXMIX,NELMDL,INIWAV,GAMMA,vaspgamma.h5", "wiki_url": "https://www.vasp.at/wiki/index.php/ICHARG", "description_cn": "ICHARG参数可以取值为0、1、2、4或5。", "default_value": "ICHARG", "details_cn": "ICHARG决定VASP如何构建初始电荷密度。初始电荷密度在以下情况下很重要：CHGCAR、ISTART、LCHARG、LMAXMIX、NELMDL、INIWAV、GAMMA、vaspgamma.h5", "recommended": "对于新计算，建议使用ICHARG=2（从原子电荷密度叠加开始，避免依赖先前文件）；对于继续计算，使用ICHARG=1（从CHGCAR读取电荷密度）。使用场景：ICHARG=0或1适用于有先前计算文件（如WAVECAR或CHGCAR）的情况；ICHARG=2适用于初始计算或没有先前文件时；ICHARG=4或5用于需要重置波函数但保留电荷密度的特定情况。", "tips": "使用ICHARG=0或1时，确保相关文件（WAVECAR或CHGCAR）存在，否则可能导致错误。对于新计算，优先选择ICHARG=2以避免文件依赖问题。ICHARG的选择会影响计算的收敛性和结果，需根据计算类型和文件状态谨慎选择。"}, "ICHIBARE": {"name": "ICHIBARE", "description": "ICHIBARE=  1 | 2 | 3Default:ICHIBARE=  1", "default": "ICHIBARE=  1 | 2 | 3Default:ICHIBARE=  1", "details": "Description: determines the order of the finite difference stencil used to calculate the magnetic susceptibility.\nICHIBAREspecifies the order of the finite difference stencil used to calculate the magnetic susceptibility (second order derivative in Eq. 47 of Yateset al.[1]).ICHIBAREmay be set to 1, 2, or 3. Often the default (ICHIBARE=1) is sufficient. A higherICHIBAREresults in a substantial increase of the co\nLCHIMAG,DQ,LNMR_SYM_RED,NLSPLINE", "wiki_url": "https://www.vasp.at/wiki/index.php/ICHIBARE", "description_cn": "确定用于计算磁化率的有限差分模板的阶数。", "default_value": "1", "details_cn": "确定用于计算磁化率的有限差分模板的阶数。ICHIBARE 指定了用于计算磁化率的有限差分模板的阶数（Yates 等人[1]中的方程47的二阶导数）。ICHIBARE 可以设置为1、2或3。通常默认值（ICHIBARE=1）就足够了。更高的 ICHIBARE 会导致计算时间的显著增加。", "recommended": "推荐使用默认值1，适用于大多数磁化率计算。对于需要更高精度的计算，可以设置为2或3，但会显著增加计算时间。", "tips": "注意，提高ICHIBARE值会大幅增加计算时间，需根据计算资源权衡。确保与LCHIMAG等相关参数正确设置。"}, "ICORELEVEL": {"name": "ICORELEVEL", "description": "ICORELEVEL= 0 | 1 | 2Default:ICORELEVEL= 0", "default": "ICORELEVEL= 0 | 1 | 2Default:ICORELEVEL= 0", "details": "Description:ICORELEVELcontrols whether the core energies are explicitly calculated or not and how they are calculated.\nThe binding energy of core electrons[math]\\displaystyle{ E_{CL} }[/math]is given as\nHere,[math]\\displaystyle{ E(n_{c}) }[/math]is the energy from a standard density-functional calculation in which the number of core electrons corresponds to the unexcited ground state.[math]\\displaystyle{ E(n_{c}-1) }[/math]is the energy of a calculation where one electron is removed from the core o", "wiki_url": "https://www.vasp.at/wiki/index.php/ICORELEVEL", "description_cn": "ICORELEVEL控制是否显式计算核心能量以及如何计算。", "default_value": "0", "details_cn": "ICORELEVEL控制是否显式计算核心能量以及如何计算。核心电子的结合能[math]\\displaystyle{ E_{CL} }[/math]由以下给出：这里，[math]\\displaystyle{ E(n_{c}) }[/math]是标准密度泛函计算的能量，其中核心电子数对应于未激发的基态。[math]\\displaystyle{ E(n_{c}-1) }[/math]是计算中从核心移除一个电子的能量。", "recommended": "0（默认），用于常规计算；1或2用于需要计算核心能级的场景，如X射线光电子能谱（XPS）模拟。", "tips": "设置ICORELEVEL=1或2会增加计算成本，并可能需要调整其他参数以确保收敛。建议在需要时使用，并参考VASP官方文档获取更多细节。"}, "IDIPOL": {"name": "IDIPOL", "description": "IDIPOL= 1 | 2 | 3 | 4", "default": "", "details": "Description:IDIPOLswitches on monopole/dipole and quadrupole corrections to the total energy in a specific direction (1-3) or all directions (4)\nThe dipole moment will be calculated only parallel to the direction of the first, second or third lattice vector, respectively. The corrections for the total energy are calculated as the energy difference between a monopole/dipole and quadrupole in the current supercell and the same dipole placed in\nForIDIPOL=4 the full dipole moment in all directions will be calculated, and the corrections to the total energy are calculated as the energy difference between a monopole/dipole/quadrupole in the current supercell and the same monopole/dipole/quadrupole placed in a vacuum.", "wiki_url": "https://www.vasp.at/wiki/index.php/IDIPOL", "description_cn": "IDIPOL参数，用于控制总能量的单极/偶极和四极校正，可选值为1、2、3或4。", "default_value": "0", "details_cn": "IDIPOL开启总能量的单极、偶极和四极校正，针对特定方向（1-3）或所有方向（4）。当IDIPOL=1、2或3时，偶极矩仅沿第一、第二或第三晶格矢量的方向计算；当IDIPOL=4时，在所有方向计算完整的偶极矩。总能量的校正通过计算当前超胞中单极/偶极和四极与参考系统（如无限分离的偶极）的能量差来实现，以校正周期性边界条件下的误差。默认值为0，表示不进行校正。", "recommended": "对于表面计算、slab模型或有显著偶极矩的体系，使用IDIPOL=4进行全方向校正；对于特定方向的slab模型（如表面法线沿z轴），可选择IDIPOL=3。默认值0适用于无偶极或体相材料。使用场景包括表面能、吸附能或电荷分布计算。", "tips": "使用IDIPOL时，建议同时设置LDIPOL=.TRUE.以计算偶极矩。确保超胞在非周期性方向有足够真空层（通常大于10 Å），以避免镜像偶极的干扰。对于金属体系或对称性高的体系，偶极校正可能不必要或需谨慎使用。"}, "IEPSILON": {"name": "IEPSILON", "description": "IEPSILON= 1 | 2 | 3 | 4", "default": "", "details": "Description:IEPSILONdetermines along which Cartesian direction the E field is applied.\nBSE calculations\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/IEPSILON", "description_cn": "IEPSILON 决定电场沿哪个笛卡尔方向施加。", "default_value": "未指定", "details_cn": "IEPSILON 决定电场沿哪个笛卡尔方向施加。用于BSE计算。使用此标签的示例。", "recommended": "根据计算需求选择1、2、3或4，分别对应x、y、z方向或其他。使用场景：在BSE计算中施加特定方向的电场时使用。", "tips": "确保在BSE计算中正确设置电场方向；避免与其它电场参数冲突；参考VASP文档获取更多示例。"}, "IFC_ASR": {"name": "IFC_ASR", "description": "IFC_ASR= [integer]Default:IFC_ASR= 1", "default": "IFC_ASR= [integer]Default:IFC_ASR= 1", "details": "Description: If positive, enforces the acoustic sum rule on the interatomic force constants during an electron-phonon calculation.\nThe matrix of interatomic force constants (IFC) should obey the so-called acoustic sum rule (ASR).\nHowever, due to numerical inaccuracies, it is possible that the ASR is slightly broken in practice.\nIn such cases, the phonons obtained from theFourier interpolation of the IFC matrixcan become imagina\nBy settingIFC_ASR> 0, the ASR is explicitly enforced on the IFC matrix via an iterative scheme.\nThe number of iterations is also given byIFC_ASR.", "wiki_url": "https://www.vasp.at/wiki/index.php/IFC_ASR", "description_cn": "IFC_ASR是一个整数参数，默认值为1。", "default_value": "1", "details_cn": "如果为正数，则在电子-声子计算期间对原子间力常数施加声学求和规则。原子间力常数（IFC）矩阵应遵守所谓的声学求和规则（ASR）。然而，由于数值不精确，ASR在实践中可能被轻微破坏。在这种情况下，从IFC矩阵的傅里叶插值得到的声子可能变成虚数。通过设置IFC_ASR>0，ASR被明确施加在IFC矩阵上。", "recommended": "推荐使用默认值1，适用于电子-声子计算中需要确保声学求和规则的情况。当计算中出现声子虚频问题时，可以尝试设置IFC_ASR>0来强制施加ASR。", "tips": "强制施加ASR可能会增加计算时间。在某些系统中，如果ASR已经自然满足，可以设置IFC_ASR=0以节省计算资源。"}, "IFC_LR": {"name": "IFC_LR", "description": "IFC_LR= [integer]Default:IFC_LR= 1", "default": "IFC_LR= [integer]Default:IFC_LR= 1", "details": "Description: Controls the treatment of the long-range part of the interatomic force constants during electron-phonon calculations.\nThis tag controls the treatment of thelong-range electrostatic contributions to the interatomic force constants (IFC)arising in polar dielectric materials.IFC_LR= 1has the same effect asLPHON_POLAR= Truebut is used in the context of electron-phonon interactions.", "wiki_url": "https://www.vasp.at/wiki/index.php/IFC_LR", "description_cn": "控制电子-声子计算中原子间力常数的长程部分的处理。", "default_value": "1", "details_cn": "控制电子-声子计算中原子间力常数的长程部分的处理。此标签控制在极性介电材料中产生的原子间力常数（IFC）的长程静电贡献的处理。IFC_LR= 1 与 LPHON_POLAR= True 具有相同效果，但用于电子-声子相互作用的上下文中。", "recommended": "推荐值为1，适用于极性介电材料的电子-声子计算，以准确处理长程静电贡献，提高计算精度。", "tips": "IFC_LR=1与LPHON_POLAR=True效果相同，但专门用于电子-声子相互作用计算，而非一般声子计算。确保在相关计算中正确设置，避免与其他参数冲突。"}, "IGPAR": {"name": "IGPAR", "description": "Description: This tag specifies the socalled parallel or[math]\\displaystyle{ \\mathbf{G}_{\\parallel} }[/math]direction in the integration over the reciprocal space unit cell needed forLCALCPOL.", "default": "", "details": "Description: This tag specifies the socalled parallel or[math]\\displaystyle{ \\mathbf{G}_{\\parallel} }[/math]direction in the integration over the reciprocal space unit cell needed forLCALCPOL.\nLCALCPOL,LCALCEPS,EFIELD_PEAD,LPEAD,IPEAD,LBERRY,NPPSTR,DIPOL,Berry phases and finite electric fields\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/IGPAR", "description_cn": "这个标签指定了在用于LCALCPOL的倒易空间单位晶胞积分中所谓的平行方向或G∥方向。", "default_value": "", "details_cn": "这个标签指定了在用于LCALCPOL的倒易空间单位晶胞积分中所谓的平行方向或G∥方向。", "recommended": "根据计算方向设置，通常为1、2或3，对应于晶格矢量的方向。使用场景：当使用LCALCPOL=.TRUE.进行电子极化计算时，例如计算材料的自发极化或压电系数。", "tips": "确保IGPAR值与晶格矢量对应（如IGPAR=1对应第一个晶格矢量方向）；在计算前验证晶格方向；避免与LCALCPOL、LCALCEPS等标签冲突；该参数通常用于Berry相计算，需配合其他相关标签使用。"}, "IMAGES": {"name": "IMAGES", "description": "IMAGES= [integer]Default:IMAGES= 0", "default": "IMAGES= [integer]Default:IMAGES= 0", "details": "Description: Defines the number of VASP calculations in separate directories, (e.g., 01, 02, 03, etc.) fornudged elastic bandcalculations,parallel tempering, andthermodynamic integration.\nIMAGESsets the number of independent VASP calculations in separate directories. The primaryINCARfile should be located in the root directory.\nOther files such asKPOINTS,POTCAR, andPOSCARcan be placed in subdirectories, e.g., 01, 02, 03, etc., or in the root directory. Files in subdirectories take pr\nSeeuse casesdescribed below.", "wiki_url": "https://www.vasp.at/wiki/index.php/IMAGES", "description_cn": "IMAGES= [整数] 默认值：IMAGES= 0", "default_value": "0", "details_cn": "定义在独立目录中进行的VASP计算的数量（例如，01、02、03等），用于微动弹性带计算、并行回火和热力学积分。IMAGES设置在独立目录中进行的独立VASP计算的数量。主INCAR文件应位于根目录中。其他文件如KPOINTS、POTCAR和POSCAR可以放在子目录中，例如01、02、03等，或放在根目录中。子目录中的文件优先。", "recommended": "对于微动弹性带（NEB）计算，通常设置IMAGES为路径上的图像数量，例如5-10个，具体取决于反应路径的复杂性；对于并行回火和热力学积分，根据计算需求设置。使用场景：主要用于NEB计算、并行回火模拟和热力学积分方法，以研究反应路径、相变或自由能变化。", "tips": "1. 确保目录结构正确，子目录应命名为01、02、03等数字序列，以对应IMAGES设置的数量。2. 主INCAR文件必须位于根目录，子目录可包含特定输入文件（如KPOINTS、POTCAR、POSCAR）以覆盖根目录设置。3. 使用IMAGES时，每个子目录应独立配置输入文件，以避免计算冲突。4. 默认值为0表示不启用多图像计算，适用于常规单点计算或优化。"}, "IMAGE_N": {"name": "IMAGE_N", "description": "Description: TheIMAGE_Nallows defining theINCARsettings for calculations usingimages.", "default": "", "details": "Description: TheIMAGE_Nallows defining theINCARsettings for calculations usingimages.\nIMAGE_Ncan define theINCARsettings used for a calculation in an image calculation, e.g.,01,02fornudged elastic bandcalculations,parallel tempering, andthermodynamic integration.\nIMAGES,NCORE_IN_IMAGE1,SCALEE,IMAGES,VCAIMAGES", "wiki_url": "https://www.vasp.at/wiki/index.php/IMAGE_N", "description_cn": "IMAGE_N 允许为使用图像的计算定义 INCAR 设置。", "default_value": "未指定", "details_cn": "IMAGE_N 允许为使用图像的计算定义 INCAR 设置。IMAGE_N 可以定义在图像计算中使用的 INCAR 设置，例如，在 nudged elastic band 计算、parallel tempering 和 thermodynamic integration 中，使用 01、02 等。相关参数包括 IMAGES、NCORE_IN_IMAGE1、SCALEE、IMAGES、VCAIMAGES。", "recommended": "根据具体计算需求设置，如在 nudged elastic band (NEB) 计算中，通常为每个图像指定编号（如 01、02）。使用场景：适用于需要多个图像的计算，如 NEB、parallel tempering 和 thermodynamic integration。", "tips": "确保 IMAGE_N 的设置与 IMAGES 参数一致；在并行计算中，合理配置 NCORE_IN_IMAGE1 以优化性能；避免与其他 INCAR 设置冲突。"}, "IMIX": {"name": "IMIX", "description": "Description:IMIXspecifies the type ofdensity mixing.", "default": "IMIX= 0 | 1 | 2 | 4Default:IMIX= 4", "details": "IMIX= 0 | 1 | 2 | 4Default:IMIX= 4\nINIMIX,MAXMIX,AMIX,BMIX,AMIX_MAG,BMIX_MAG,AMIN,MIXPRE,WC", "wiki_url": "https://www.vasp.at/wiki/index.php/IMIX", "description_cn": "IMIX参数指定密度混合的类型。", "default_value": "IMIX = 4", "details_cn": "IMIX参数指定密度混合的类型。可选值为0、1、2、4。默认值为4。相关参数包括：INIMIX, MAXMIX, AMIX, BMIX, AMIX_MAG, BMIX_MAG, AMIN, MIXPRE, WC。", "recommended": "推荐值：4（Broyden混合）。这是VASP中最常用且通常最有效的混合方法，适用于大多数体系，特别是金属体系。对于绝缘体或半导体，有时IMIX=1（Kerker混合）配合调整AMIX和BMIX也可能有效。若计算难以收敛，可尝试IMIX=2（共轭梯度混合）。", "tips": "1. IMIX=4（Broyden混合）是默认且推荐的首选，通常收敛最快。\n2. 调整IMIX时，通常需要同步优化其关联参数（如AMIX, BMIX, AMIX_MAG, BMIX_MAG等），以达到最佳收敛效果。\n3. 对于磁性体系，务必注意AMIX_MAG和BMIX_MAG参数的设置，它们控制磁矩的混合。\n4. 如果计算不收敛，不要仅依赖修改IMIX，应首先检查初始磁矩、ENCUT、K点网格等基础设置是否合理。"}, "INCREM": {"name": "INCREM", "description": "INCREM= [real array]Default:INCREM= 0", "default": "INCREM= [real array]Default:INCREM= 0", "details": "Description:INCREMcontrols the transformation velocity in the slow-growth approach (in case VASP was compiled with-Dtbdyn).\nInslow-growth simulations(MDALGO=1 | 2), the value of each controlled geometric parameter withSTATUS=0is increased byINCREMin every simulation step.\nIt must be supplied for each controlled geometric parameter for whichSTATUS=0was specified in theICONST-file.", "wiki_url": "https://www.vasp.at/wiki/index.php/INCREM", "description_cn": "INCREM= [实数数组] 默认值：INCREM= 0", "default_value": "0", "details_cn": "INCREM 控制慢生长方法中的变换速度（如果 VASP 是用 -Dtbdyn 编译的）。在慢生长模拟（MDALGO=1 或 2）中，每个 STATUS=0 的受控几何参数的值在每个模拟步骤中增加 INCREM。必须为 ICONST 文件中指定 STATUS=0 的每个受控几何参数提供此值。", "recommended": "根据具体模拟需求设置，通常为一个小的正数，例如对于键长参数可设为 0.01 Å，对于角度参数可设为 0.1 度，以确保参数缓慢变化。使用场景：在慢生长模拟中，用于逐步改变几何参数，如研究相变、反应路径或约束优化过程。", "tips": "1. 确保 VASP 是用 -Dtbdyn 编译选项编译的，否则 INCREM 参数可能无效。2. 必须为 ICONST 文件中每个 STATUS=0 的受控几何参数单独指定 INCREM 值。3. 设置合理的 INCREM 值，避免变化过快导致模拟不稳定或收敛困难；建议通过测试小值来优化。"}, "INIMIX": {"name": "INIMIX", "description": "INIMIX= 0 | 1 | 2Default:INIMIX= 1", "default": "INIMIX= 0 | 1 | 2Default:INIMIX= 1", "details": "Description: Determines the functional form of the initial mixing matrix in the Broyden scheme (IMIX=4).\nThe initial mixing matrix might influence the convergence speed for complex situations (especially surfaces and magnetic systems), neverthelessINIMIXmust not be changed from the default setting: anything which can be done withINIMIXcan also be done withAMIXandBMIX, and changingAMIXandBMIXis definite\nPossible choices for INIMIX are:", "wiki_url": "https://www.vasp.at/wiki/index.php/INIMIX", "description_cn": "INIMIX参数用于确定Broyden方案中初始混合矩阵的函数形式，默认值为1。", "default_value": "1", "details_cn": "确定Broyden方案（IMIX=4）中初始混合矩阵的函数形式。初始混合矩阵可能影响复杂情况（尤其是表面和磁性系统）的收敛速度，但INIMIX不应从默认设置更改：任何可以通过INIMIX完成的事情也可以通过AMIX和BMIX完成，并且更改AMIX和BMIX是明确的。INIMIX的可能选择是：", "recommended": "推荐值为1（默认值）。使用场景：对于大多数第一性原理计算，使用默认值1即可；在复杂系统如表面或磁性系统中，如果遇到收敛问题，建议通过调整AMIX和BMIX参数来优化，而不是直接更改INIMIX。", "tips": "不要更改INIMIX的默认设置，因为任何可以通过INIMIX实现的功能都可以通过AMIX和BMIX参数更明确地控制。更改AMIX和BMIX是推荐的做法，以避免潜在的不稳定性。"}, "INIWAV": {"name": "INIWAV", "description": "Description: Specifies how to set up the initial orbitals in caseISTART= 0.", "default": "Default:INIWAV", "details": "Description: Specifies how to set up the initial orbitals in caseISTART= 0.\nISTARTRANDOM_GENERATOR", "wiki_url": "https://www.vasp.at/wiki/index.php/INIWAV", "description_cn": "指定当ISTART=0时如何设置初始轨道。", "default_value": "1", "details_cn": "INIWAV参数用于指定当ISTART=0时如何设置初始轨道。选项包括：0表示从原子电荷密度开始，1表示随机生成初始轨道。默认值为1。", "recommended": "推荐值为1，适用于大多数从头开始的计算，因为它提供随机初始波函数，有助于避免局部极小值并促进收敛。", "tips": "确保在ISTART=0时正确设置INIWAV。如果使用INIWAV=0，可能需要更多电子步迭代来收敛。对于复杂体系，随机生成可能更有效。"}, "INMRPRINT": {"name": "INMRPRINT", "description": "INMRPRINT= -1 | 0 | 1Default:INMRPRINT= 0", "default": "INMRPRINT= -1 | 0 | 1Default:INMRPRINT= 0", "details": "Description: Determines the verbosity of theNMRoutput.\nThe NMR output is written to theOUTCAR. SettingINMRPRINT0 is the default, while 1 prints more, and -1 prints less.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/INMRPRINT", "description_cn": "决定NMR输出的详细程度。", "default_value": "0", "details_cn": "决定NMR输出的详细程度。NMR输出写入OUTCAR文件。设置INMRPRINT=0是默认值，而1打印更多信息，-1打印更少信息。", "recommended": "默认0，适用于大多数NMR计算场景；设置为1可获取更详细的输出，适用于调试或需要深入分析NMR数据时；设置为-1可减少输出，适用于资源有限或只需基本结果的情况。", "tips": "NMR输出存储在OUTCAR文件中，确保该文件可读写；更改此参数可能增加输出文件大小，特别是设置为1时，需注意磁盘空间；在并行计算中，输出可能分散，建议检查文件完整性。"}, "INTERACTIVE": {"name": "INTERACTIVE", "description": "INTERACTIVE= [logical]Default:INTERACTIVE= .FALSE.", "default": "INTERACTIVE= [logical]Default:INTERACTIVE= .FALSE.", "details": "Description: Select the use of interactive mode.\nINTERACTIVE= .TRUE.enables the interactive mode. The interactive mode is executed by inputting a series of ionic positions (in direct coordinates) into the VASP executable, i.e.:\nThe input structure (e.g.,POSCAR.interactive, or any other name) is as follows:", "wiki_url": "https://www.vasp.at/wiki/index.php/INTERACTIVE", "description_cn": "选择使用交互模式。", "default_value": ".FALSE.", "details_cn": "选择使用交互模式。INTERACTIVE= .TRUE. 启用交互模式。交互模式通过向 VASP 可执行文件输入一系列离子位置（以直接坐标形式）来执行，即：输入结构（例如，POSCAR.interactive 或任何其他名称）如下：", "recommended": "默认为 .FALSE.。使用场景：当需要实时输入离子位置时，如交互式分子动力学模拟或教学演示。", "tips": "启用交互模式时，需确保输入文件格式正确；可能增加计算开销；建议在熟悉 VASP 交互模式后使用。"}, "IPEAD": {"name": "IPEAD", "description": "IPEAD= 1 | 2 | 3 | 4Default:IPEAD= 4", "default": "IPEAD= 1 | 2 | 3 | 4Default:IPEAD= 4", "details": "Description:IPEADspecifies the order of the finite difference stencil used to compute the derivative of the cell-periodic part of the orbitals w.r.t.k, |∇kunk⟩ (LPEAD=.TRUE.), and the derivative of the polarization w.r.t. the orbitals, δP/δ⟨ψnk| for (LCALCEPS=.TRUE., orEFIELD_PEAD≠0).\nA central finite differences formula or orderIPEADis used to compute the first-order derivative of the cell-periodic part of the orbitals w.r.t.k.\nThe coefficients for the different orders can be foundhere.\nLPEAD,LCALCEPS,EFIELD_PEAD,Berry phases and finite electric fields", "wiki_url": "https://www.vasp.at/wiki/index.php/IPEAD", "description_cn": "IPEAD指定用于计算轨道相对于k的导数的有限差分模板的阶数。", "default_value": "4", "details_cn": "IPEAD指定用于计算轨道相对于k的导数（即|∇kunk⟩，当LPEAD=.TRUE.时）以及极化相对于轨道的导数（即δP/δ⟨ψnk|，当LCALCEPS=.TRUE.或EFIELD_PEAD≠0时）的有限差分模板的阶数。使用阶数为IPEAD的中心有限差分公式来计算轨道相对于k的一阶导数。不同阶数的系数可以在这里找到。", "recommended": "默认值4适用于大多数计算场景，如光学性质或电场响应模拟。对于高精度需求，可考虑使用更高阶数（如5或6），但需权衡计算成本和内存使用。", "tips": "IPEAD仅在LPEAD=.TRUE.或LCALCEPS=.TRUE.或EFIELD_PEAD≠0时生效。较高阶数可能增加计算时间和数值不稳定性，建议根据具体计算需求和资源限制选择。"}, "IRC_DELTA0": {"name": "IRC_DELTA0", "description": "IRC_DELTA0= realDefault:IRC_DELTA0=  0.0015", "default": "IRC_DELTA0= realDefault:IRC_DELTA0=  0.0015", "details": "Description: Defines the tolerance factor[math]\\displaystyle{ \\Delta_0 }[/math]in  Å used in theIRC calculations.\nThe smaller the value ofIRC_DELTA0, the closer the computed IRC trajectory follows the true IRC pathway. However, a small tolerance factor[math]\\displaystyle{ \\Delta_0 }[/math]necessitates more time steps and, thus, computational effort.\nIRC calculations,IRC_DIRECTION,IRC_STOP,IRC_MINSTEP,IRC_MAXSTEP,IRC_VNORM0", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_DELTA0", "description_cn": "定义在IRC计算中使用的容差因子Δ₀，单位为Å。", "default_value": "0.0015", "details_cn": "定义在IRC计算中使用的容差因子Δ₀，单位为Å。IRC_DELTA0的值越小，计算的IRC轨迹越接近真实的IRC路径。然而，较小的容差因子Δ₀需要更多的时间步长，从而增加计算量。相关参数：IRC计算、IRC_DIRECTION、IRC_STOP、IRC_MINSTEP、IRC_MAXSTEP、IRC_VNORM0。", "recommended": "默认值0.0015适用于大多数IRC计算，平衡精度和计算成本。对于高精度需求（如精细反应路径分析），可减小至0.001或更小；对于初步探索或资源有限场景，可增大至0.002或更大以减少计算时间。使用场景：在化学反应路径研究中，根据路径复杂性和计算资源灵活调整。", "tips": "IRC_DELTA0值越小精度越高，但计算时间显著增加，需权衡资源；确保与其他IRC参数（如IRC_DIRECTION）协调设置；单位是Å，注意与其他参数单位一致。"}, "IRC_DIRECTION": {"name": "IRC_DIRECTION", "description": "IRC_DIRECTION= -1 | 1Default:IRC_DIRECTION=  1", "default": "IRC_DIRECTION= -1 | 1Default:IRC_DIRECTION=  1", "details": "Description: Defines the direction of the initial displacement of the initial transition-state structure inIRC calculations.\nDefines the direction of the initial displacement of the initial transition-state structure along the unstable direction (corresponding to Hesse matrix eigenmode with negative force constant) used inIRC calculations. Only the values 1 and -1 are allowed, corresponding to the parallel and the antipar\nIRC calculations,IRC_STOP,IRC_DELTA0,IRC_MINSTEP,IRC_MAXSTEP,IRC_VNORM0", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_DIRECTION", "description_cn": "定义IRC计算中初始过渡态结构的初始位移方向。", "default_value": "1", "details_cn": "定义在IRC计算中使用的初始过渡态结构沿不稳定方向（对应于Hesse矩阵具有负力常数的特征模式）的初始位移方向。只允许值1和-1，分别对应平行和反平行。", "recommended": "推荐值取决于反应路径的探索方向。通常，1表示正向位移，-1表示反向位移。在IRC计算中，根据过渡态的性质选择方向，以探索反应物或产物路径。使用场景：当需要计算反应路径时，设置IRC_DIRECTION为1或-1来指定初始位移方向。", "tips": "确保只使用1或-1；理解Hesse矩阵的负特征值对应不稳定方向；在IRC计算前，先进行频率计算以确认过渡态；相关参数包括IRC_STOP、IRC_DELTA0、IRC_MINSTEP、IRC_MAXSTEP、IRC_VNORM0，需配合使用以控制计算过程。"}, "IRC_MAXSTEP": {"name": "IRC_MAXSTEP", "description": "IRC_MAXSTEP= realDefault:IRC_MAXSTEP=  3.000", "default": "IRC_MAXSTEP= realDefault:IRC_MAXSTEP=  3.000", "details": "Description: Upper limit for the step size (in fs).\nThe damped-velocity-Verlet algorithm for theIRC calculationsuses an adaptively varying size of the time step. It depends on the estimated accuracy of the previous step.IRC_MAXSTEPdefines the upper limit for the step size in fs.\nIRC calculations,IRC_DIRECTION,IRC_STOP,IRC_DELTA0,IRC_MINSTEP,IRC_VNORM0", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_MAXSTEP", "description_cn": "IRC_MAXSTEP参数定义了IRC计算中步长的上限。", "default_value": "3.000 fs", "details_cn": "步长的上限（单位：飞秒）。IRC计算中使用的阻尼速度Verlet算法采用自适应变化的时间步长大小。这取决于前一步的估计精度。IRC_MAXSTEP定义了步长的上限，单位为飞秒。相关参数包括IRC计算、IRC_DIRECTION、IRC_STOP、IRC_DELTA0、IRC_MINSTEP、IRC_VNORM0。", "recommended": "默认值为3.000 fs。推荐在IRC计算中根据体系复杂性和精度要求调整：对于高精度计算（如反应路径精细搜索），建议使用1.0-2.0 fs；对于快速初步扫描或简单体系，可使用默认值或稍大值如4.0 fs，以平衡精度和效率。", "tips": "步长过大可能导致计算不稳定或精度下降，尤其对于快速变化的反应路径；步长过小会增加计算时间和资源消耗。建议结合IRC_MINSTEP参数设置合理范围，并监控计算收敛性，确保步长自适应调整有效。"}, "IRC_MINSTEP": {"name": "IRC_MINSTEP", "description": "IRC_MINSTEP= realDefault:IRC_MINSTEP=  0.0250", "default": "IRC_MINSTEP= realDefault:IRC_MINSTEP=  0.0250", "details": "Description: Lower limit for the step size (in fs).\nThe damped-velocity-Verlet algorithm for theIRC calculationsuses an adaptively varying size of the time step. It depends on the estimated accuracy of the previous step.IRC_MINSTEPdefines the lower limit for the step size in fs.\nIRC calculations,IRC_DIRECTION,IRC_STOP,IRC_DELTA0,IRC_MAXSTEP,IRC_VNORM0", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_MINSTEP", "description_cn": "步长的下限（以飞秒为单位）。", "default_value": "0.0250", "details_cn": "步长的下限（以飞秒为单位）。IRC计算中使用的阻尼速度-Verlet算法采用自适应变化的时间步长大小。它取决于前一步的估计精度。IRC_MINSTEP定义了步长的下限（以飞秒为单位）。相关参数：IRC计算、IRC_DIRECTION、IRC_STOP、IRC_DELTA0、IRC_MAXSTEP、IRC_VNORM0", "recommended": "推荐使用默认值0.025 fs。在IRC（内禀反应坐标）计算中，此参数用于控制步长下限，适用于反应路径优化。如果系统振动剧烈或需要更高精度，可适当减小此值；如果计算资源有限或步长变化平缓，可适当增大，但需确保不超过IRC_MAXSTEP。", "tips": "IRC_MINSTEP应小于IRC_MAXSTEP。步长过小会增加计算时间，过大可能降低路径优化的精度。建议根据具体体系和计算需求进行调整，并参考相关参数如IRC_DELTA0和IRC_MAXSTEP以确保一致性。"}, "IRC_STOP": {"name": "IRC_STOP", "description": "IRC_STOP= integerDefault:IRC_STOP=  20", "default": "IRC_STOP= integerDefault:IRC_STOP=  20", "details": "Description: Sets the number of steps in which the energy must monotonously increase before anIRC calculationterminates.\nAlong the IRC pathway, from a higher energy state, i.e., the transition state or the excited state, towards a lower energy state, i.e., reactants or products, the energy generally decreases. In some cases, the IRC pathway may encounter regions with relatively constant energy (plateaus) or fluctuatio\nIRC_STOPsets the number of time steps with increasing energy, after which the damped-velocity-Verlet algorithm in anIRC calculationterminates. In order to avoid a premature termination, especially close to transition states,IRC_STOPshould always be greater than 1.", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_STOP", "description_cn": "IRC计算终止前能量单调增加的步数", "default_value": "20", "details_cn": "设置在IRC计算终止前，能量必须单调增加的步数。沿着IRC路径，从较高能量状态（如过渡态或激发态）向较低能量状态（如反应物或产物）移动，能量通常下降。在某些情况下，IRC路径可能遇到能量相对恒定的区域（平台）或波动。IRC_STOP设置能量增加的步数，之后计算终止。", "recommended": "推荐值为20，适用于大多数IRC计算场景。如果体系存在能量平台或波动，可适当增加此值（如30-50）以避免提前终止。使用场景：在进行内禀反应坐标（IRC）计算时，用于控制计算终止条件，确保路径探索完整。", "tips": "IRC_STOP的值应根据具体体系调整。设置过小可能导致计算在能量波动时提前终止；设置过大则可能增加不必要的计算时间。建议先使用默认值进行测试，再根据IRC路径的能量变化优化此参数。"}, "IRC_VNORM0": {"name": "IRC_VNORM0", "description": "IRC_VNORM0= realDefault:IRC_VNORM0=  0.002", "default": "IRC_VNORM0= realDefault:IRC_VNORM0=  0.002", "details": "Description: The constant velocity vector (in Å/fs) in anIRC calculation.\nIn the damped-velocity-Verlet algorithm forIRC calculations, the damping is realized via rescaling the velocity vector to a constant value (in Å/fs) defined via the parameterIRC_VNORM0.\nIRC calculations,IRC_DIRECTION,IRC_STOP,IRC_DELTA0,IRC_MINSTEP,IRC_MAXSTEP", "wiki_url": "https://www.vasp.at/wiki/index.php/IRC_VNORM0", "description_cn": "IRC_VNORM0 是一个实数参数，用于在IRC计算中定义恒定速度向量（单位：Å/fs）。", "default_value": "0.002", "details_cn": "在IRC计算中，恒定速度向量（单位：Å/fs）。在用于IRC计算的阻尼速度-Verlet算法中，阻尼是通过将速度向量重新缩放到一个恒定值（单位：Å/fs）来实现的，该值由参数IRC_VNORM0定义。相关参数：IRC计算、IRC_DIRECTION、IRC_STOP、IRC_DELTA0、IRC_MINSTEP、IRC_MAXSTEP。", "recommended": "默认值0.002适用于大多数IRC计算场景。对于复杂反应路径或大型系统，可适当增大此值以提高稳定性；对于高精度要求，可减小此值。使用时应结合IRC_DIRECTION和IRC_STOP等参数进行优化。", "tips": "确保IRC_VNORM0与其他IRC参数协调使用，避免值过大导致计算不稳定或过小导致收敛缓慢。建议在正式计算前进行测试以确定最佳值。"}, "ISEARCH": {"name": "ISEARCH", "description": "ISEARCH= 0 | 1Default:ISEARCH= 0", "default": "ISEARCH= 0 | 1Default:ISEARCH= 0", "details": "Description: Controls the line-search algorithm used during the direct minimization of the electronic structure (ALGO= All).\nThe line search determines the optimal step size along the conjugate gradient search direction.ISEARCH= 0performs incremental steps along the search direction. It may lead to inconsistencies in total energy evaluations and slower convergence.ISEARCH= 1introduces a more robust and consistent method f\nThe improved algorithm introduces several technical enhancements over the legacy implementation to ensure more robust convergence:", "wiki_url": "https://www.vasp.at/wiki/index.php/ISEARCH", "description_cn": "ISEARCH参数，可选值为0或1，默认值为0。", "default_value": "0", "details_cn": "控制电子结构直接最小化中使用的线搜索算法（当ALGO=All时）。线搜索确定沿共轭梯度搜索方向的最优步长。ISEARCH=0沿搜索方向执行增量步长。这可能导致总能量评估不一致和较慢收敛。ISEARCH=1引入更稳健和一致的方法。改进的算法引入了多项技术增强。", "recommended": "1。使用场景：当使用ALGO=All进行电子结构直接最小化时，推荐使用ISEARCH=1以提高收敛性和结果一致性。", "tips": "ISEARCH=0可能导致总能量评估不一致和收敛较慢，因此在需要高精度的计算中应避免使用。建议根据具体体系进行测试以确定最佳设置。"}, "ISIF": {"name": "ISIF", "description": "ISIF= 0 | 1 | 2 | 3 | 4 | 5 | 6 | 7 | 8", "default": "Default:ISIF", "details": "Description: Determines if the stress tensor is calculated and which ionic degrees of freedom are varied.\nForISIF[math]\\displaystyle{ \\ge }[/math]2, the stress tensor is calculated. It is defined as the negative of the derivative of the energy[math]\\displaystyle{   E  }[/math]with respect to the strain tensor[math]\\displaystyle{ \\eta_{ji} }[/math]:\nThis might be different from other first principles codes.\nA positive in the diagonals means that the system is under compressive strain and wants to expand. A negative value implies that the system is under tensile strain and wants to reduce its volume. The stress tensor is symmetric[math]\\displays", "wiki_url": "https://www.vasp.at/wiki/index.php/ISIF", "description_cn": "ISIF参数用于决定是否计算应力张量以及在弛豫过程中允许变化的离子自由度。", "default_value": "2", "details_cn": "决定是否计算应力张量以及哪些离子自由度被改变。对于ISIF >= 2，计算应力张量。它定义为能量E对应变张量η_ji的负导数。这可能与其他第一性原理代码不同。对角线上的正值表示系统处于压缩应变状态，并倾向于膨胀。", "recommended": "ISIF=2用于标准离子弛豫和体积优化；ISIF=3用于全优化离子位置和晶胞形状；ISIF=4用于固定体积的晶胞形状优化。根据计算需求选择，例如结构优化时常用ISIF=2或3。", "tips": "ISIF=3可能需要更多计算资源；确保与IBRION等参数正确配合；对于金属系统，通常使用ISIF=2或3；ISIF=0仅计算应力张量，不改变自由度。"}, "ISMEAR": {"name": "ISMEAR", "description": "ISMEAR= -15 | -14 | -5 | -4 | -3 | -2 | -1 | 0 | [integer]>0Default:ISMEAR= 1", "default": "ISMEAR= -15 | -14 | -5 | -4 | -3 | -2 | -1 | 0 | [integer]>0Default:ISMEAR= 1", "details": "Description:ISMEARdetermines how the partial occupanciesfnkare set for each orbital.SIGMAdetermines the width of the smearing in eV.\nPlease consider how-to guide to choose the optimalsmearing technique.\nSIGMA,EFERMI,FERWE,FERDO,SMEARINGS,Smearing technique,K-point integration", "wiki_url": "https://www.vasp.at/wiki/index.php/ISMEAR", "description_cn": "ISMEAR参数用于设置电子轨道的部分占据数，取值可以是-15、-14、-5、-4、-3、-2、-1、0或正整数，默认值为1。", "default_value": "1", "details_cn": "ISMEAR决定了每个轨道的部分占据数fnk如何设置。SIGMA决定了展宽的宽度，单位为eV。请参考如何选择最优展宽技术的指南。相关参数：SIGMA、EFERMI、FERWE、FERDO、SMEARINGS、展宽技术、K点积分。", "recommended": "对于金属系统，推荐使用ISMEAR=-5（Fermi-Dirac展宽）或ISMEAR=0（高斯展宽），并设置适当的SIGMA值（如0.05-0.2 eV）。对于绝缘体或半导体，推荐使用ISMEAR=-15（四面体方法）。默认值ISMEAR=1（Methfessel-Paxton展宽，阶数1）适用于一般金属或合金计算，但需根据系统收敛性调整。", "tips": "确保SIGMA值与ISMEAR匹配；对于小SIGMA（如<0.1 eV），需要更密集的k点网格以避免数值问题；避免在绝缘体中使用正展宽值（如ISMEAR>0），可能导致错误占据和能量误差；对于高精度计算，建议测试不同ISMEAR值以验证收敛性。"}, "ISPIN": {"name": "ISPIN", "description": "ISPIN= 1 | 2Default:ISPIN= 1", "default": "ISPIN= 1 | 2Default:ISPIN= 1", "details": "Description:ISPINspecifies spin polarization.\nBy combiningISPINwithMAGMOMcollinear magnetism can be studied.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/ISPIN", "description_cn": "ISPIN指定自旋极化。", "default_value": "1", "details_cn": "ISPIN指定自旋极化。通过结合ISPIN和MAGMOM，可以研究共线磁性。使用此标签的示例。", "recommended": "ISPIN=1用于非磁性系统（默认值），ISPIN=2用于磁性系统。使用场景：当研究材料的磁性性质时，设置ISPIN=2并配合MAGMOM参数指定初始磁矩。", "tips": "使用ISPIN=2时，必须设置MAGMOM参数以定义初始磁矩，否则计算可能不收敛或结果不准确；对于非磁性系统，保持ISPIN=1以节省计算资源。"}, "ISTART": {"name": "ISTART", "description": "Description:ISTARTdetermines whether or not to read theWAVECARfile.", "default": "Default:ISTART", "details": "", "wiki_url": "https://www.vasp.at/wiki/index.php/ISTART", "description_cn": "ISTART参数决定是否读取WAVECAR文件。", "default_value": "0", "details_cn": "该参数控制VASP计算的起始方式。当设置为0时，VASP将从头开始计算，不读取任何已有的波函数文件（WAVECAR）。当设置为1时，VASP会尝试读取WAVECAR文件中的波函数信息，用于继续计算或作为初始猜测。当设置为2时，与1类似，但会从WAVECAR中读取完整的电荷密度和波函数，适用于能带结构计算等需要精确继承前一步结果的场景。", "recommended": "推荐值：0（新计算），1（续算或优化），2（能带计算）。使用场景：首次计算或结构优化时使用0；在已完成的计算基础上继续优化、频率计算或分子动力学时使用1；进行能带结构、态密度等需要精确继承前一步电荷密度的计算时使用2。", "tips": "注意事项：1. 使用ISTART=1或2时，必须确保WAVECAR文件存在且与当前计算体系（原子种类、数量、晶格）完全匹配，否则会报错。2. 从WAVECAR读取波函数可以显著加快收敛速度，但前提是前一步计算已收敛。3. 对于内存消耗大的体系，读取WAVECAR可能需要较大内存。4. 若WAVECAR文件损坏或不匹配，建议将ISTART设为0重新计算。"}, "ISYM": {"name": "ISYM", "description": "ISYM= -1 | 0 | 1 | 2 | 3", "default": "Default:ISYM", "details": "Description:ISYMdetermines the way VASP treats symmetry.\nISYM=1 | 2 | 3, switches on the use of symmetry.\nForISYM=-1 | 0, the use of symmetry is switched off.\nForISYM=2 a more efficient, memory conserving symmetrization of the charge density is used (than forISYM=1). This reduces memory requirements in particular for the parallel version.", "wiki_url": "https://www.vasp.at/wiki/index.php/ISYM", "description_cn": "ISYM决定VASP处理对称性的方式。", "default_value": "ISYM", "details_cn": "ISYM决定VASP处理对称性的方式。ISYM=1 | 2 | 3，开启对称性的使用。对于ISYM=-1 | 0，对称性的使用被关闭。对于ISYM=2，使用比ISYM=1更高效、节省内存的电荷密度对称化方法。这减少了内存需求，特别是在并行版本中。", "recommended": "推荐使用ISYM=2进行常规计算，因为它优化了内存使用和效率，尤其适用于并行环境。如果系统缺乏对称性或需要精确控制，使用ISYM=0或-1。", "tips": "启用对称性（ISYM=1,2,3）要求系统具有正确的对称性，否则可能导致错误。关闭对称性（ISYM=0,-1）会增加计算时间，但适用于非对称系统或测试目的。"}, "IVDW": {"name": "IVDW", "description": "Description:IVDWspecifies a vdW dispersion term of the atom-pairwise or many-body type.", "default": "Default:IVDW", "details": "Description:IVDWspecifies a vdW dispersion term of the atom-pairwise or many-body type.\nWith all methods listed below, a dispersion correction is added to the total energy, but also to the atomic forces and stress tensor, such that lattice relaxations, molecular dynamics, and vibrational analysis (via finite differences) can be performed. Note, however, that these correction schemes ar\nDFT-D2,DFT-D3,simple-DFT-D3,DFT-D4,Tkatchenko-Scheffler method,Self-consistent screening in Tkatchenko-Scheffler method,Tkatchenko-Scheffler method with iterative Hirshfeld partitioning,Many-body dispersion energy,Many-body dispersion energy with fractionally ionic model for polarizability,DFT-ulg,d", "wiki_url": "https://www.vasp.at/wiki/index.php/IVDW", "description_cn": "IVDW 指定一个原子对或多体类型的范德华色散项。", "default_value": "0", "details_cn": "IVDW 指定一个原子对或多体类型的范德华色散项。使用下面列出的所有方法，色散修正会添加到总能量中，同时也添加到原子力和应力张量中，因此可以进行晶格弛豫、分子动力学和振动分析（通过有限差分）。然而，请注意，这些修正方案包括 DFT-D2、DFT-D3、simple-DFT-D3、DFT-D4、Tkatchenko-Scheffler 方法、Tkatchenko-Scheffler 中的自洽屏蔽。", "recommended": "对于大多数系统，建议使用 IVDW=11（DFT-D3）或 IVDW=12（DFT-D3 with BJ damping）。使用场景：当计算涉及范德华相互作用时，如有机分子、层状材料、表面吸附、生物分子等。", "tips": "1. 默认值0表示不使用范德华修正，但对于弱相互作用系统，应启用修正。2. 修正会影响总能量、原子力和应力张量，因此适用于晶格弛豫、分子动力学和振动分析。3. 选择合适的修正方法取决于系统类型和精度要求。"}, "IVDW_NL": {"name": "IVDW_NL", "description": "Description:IVDW_NLallows to select the kernel of the nonlocal van der Waals part of a functional (available as of VASP.6.4.0).", "default": "Default:IVDW_NL", "details": "Description:IVDW_NLallows to select the kernel of the nonlocal van der Waals part of a functional (available as of VASP.6.4.0).\nIVDW_NL=1 corresponds to the kernel of Dionet al.[1]andIVDW_NL=2 to the kernel rVV10[2]. Note that the kernel of Dionet al.contains one adjustable parameter (ZAB_VDW), while the rVV10 kernel contains two such parameters (BPARAMandCPARAM).\nGGA,METAGGA,LUSE_VDW,ZAB_VDW,BPARAM,CPARAM,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/IVDW_NL", "description_cn": "IVDW_NL 允许选择泛函的非局部范德华部分的内核。", "default_value": "IVDW_NL", "details_cn": "IVDW_NL=1 对应于 Dion 等人 [1] 的内核，IVDW_NL=2 对应于 rVV10 内核 [2]。注意，Dion 等人的内核包含一个可调参数（ZAB_VDW），而 rVV10 内核包含两个这样的参数（BPARAM 和 CPARAM）。", "recommended": "对于一般计算，使用 IVDW_NL=1（Dion et al. 内核），这是标准选择；对于需要更高精度的计算，如复杂体系或弱相互作用主导的系统，使用 IVDW_NL=2（rVV10 内核）。使用场景：当使用非局部范德华泛函（如 vdW-DF）进行计算时设置此参数。", "tips": "1. 设置 IVDW_NL 前需启用 LUSE_VDW=.TRUE. 以激活范德华校正。2. 根据选择的内核，可能需要调整相关参数：对于 IVDW_NL=1，设置 ZAB_VDW；对于 IVDW_NL=2，设置 BPARAM 和 CPARAM。3. 此参数仅在 VASP.6.4.0 及以上版本可用。"}, "IWAVPR": {"name": "IWAVPR", "description": "IWAVPR= 0 | 1 | 2 | 3 | 10 | 11 | 12 | 13", "default": "Default:IWAVPR", "details": "Description:IWAVPRdetermines how orbitals and/or charge densities\nare extrapolated from one ionic configuration to the next configuration.\nForIWAVPR<10, the fileTMPCARis used to store old orbitals that\nare required for the prediction. This setting is depreciated, and not supported by the MPI version. \nThe recommended settings areIWAVPR>10. In this case, the prediction is\nperformed without an external fileTMPCAR(i.e. all required arrays\nThe following options are available forIWAVPR:", "wiki_url": "https://www.vasp.at/wiki/index.php/IWAVPR", "description_cn": "IWAVPR决定如何从一种离子构型外推轨道和/或电荷密度到下一个构型。", "default_value": "0", "details_cn": "IWAVPR决定如何从一种离子构型外推轨道和/或电荷密度到下一个构型。对于IWAVPR<10，使用文件TMPCAR来存储预测所需的旧轨道。此设置已弃用，并且不被MPI版本支持。推荐设置是IWAVPR>10。在这种情况下，预测在没有外部文件TMPCAR的情况下执行（即所有所需数组都存储在内存中）。", "recommended": "推荐使用IWAVPR>10的值，如11或12。适用于离子弛豫和分子动力学模拟，以提高外推准确性和计算效率，尤其是在MPI并行计算中。", "tips": "避免使用IWAVPR<10，因为该设置已弃用且不被MPI版本支持。使用IWAVPR>10时，确保有足够的内存，因为所有所需数组都存储在内存中。"}, "I_CONSTRAINED_M": {"name": "I_CONSTRAINED_M", "description": "I_CONSTRAINED_M= 1 | 2 | 4Default:I_CONSTRAINED_M= none", "default": "I_CONSTRAINED_M= 1 | 2 | 4Default:I_CONSTRAINED_M= none", "details": "Description:I_CONSTRAINED_Mswitches on the constrained local moments approach.\nVASP offers the possibility to add a penalty contribution to the total energy expression (and consequently a penalty functional to the Hamiltonian) that drives the local magnetic moment (integral of the magnetization in a site centered sphere of radiusRWIGS) into a direction given by theM_CONSTR-tag", "wiki_url": "https://www.vasp.at/wiki/index.php/I_CONSTRAINED_M", "description_cn": "I_CONSTRAINED_M 可以取值为 1、2 或 4。", "default_value": "未设置", "details_cn": "I_CONSTRAINED_M 启用约束局域磁矩方法。VASP 提供了在总能量表达式中添加惩罚贡献的可能性（从而在哈密顿量中添加惩罚泛函），该惩罚驱动局域磁矩（在以半径 RWIGS 为中心的球体内的磁化积分）进入由 M_CONSTR 标签指定的方向。", "recommended": "推荐值为1，用于启用约束局域磁矩计算。使用场景包括研究磁性材料的磁结构、磁各向异性等，例如在自旋极化计算中固定磁矩方向以模拟实验条件。", "tips": "使用I_CONSTRAINED_M时，必须同时设置M_CONSTR标签以指定约束方向，并正确设置RWIGS标签以定义积分球半径。约束计算可能增加计算成本，需根据研究需求谨慎使用；建议先进行非约束计算以验证参数设置。"}, "KBLOCK": {"name": "KBLOCK", "description": "KBLOCK= [integer]Default:KBLOCK=NSW", "default": "KBLOCK= [integer]Default:KBLOCK=NSW", "details": "Description: AfterKBLOCK*NBLOCKionic steps the averaged pair-correlation function and DOS are written to the filesPCDATandDOSCAR. More details can be found on the page describing the tagNBLOCK.\nNBLOCK,PCDAT,DOSCAR\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/KBLOCK", "description_cn": "KBLOCK= [整数] 默认值：KBLOCK=NSW", "default_value": "NSW", "details_cn": "在KBLOCK*NBLOCK个离子步之后，平均的对关联函数和态密度被写入文件PCDAT和DOSCAR。更多细节可以在描述标签NBLOCK的页面上找到。", "recommended": "通常使用默认值NSW，即KBLOCK等于NSW的值。如果需要更频繁地输出数据，可以设置较小的KBLOCK值，例如1或2，但需注意计算开销。使用场景：在分子动力学模拟或离子弛豫过程中，当需要定期监控对关联函数和态密度时。", "tips": "KBLOCK的值应与NBLOCK配合使用，因为输出间隔为KBLOCK*NBLOCK个离子步。确保NBLOCK已正确设置。过小的KBLOCK值可能导致输出文件过大，增加I/O负担，影响计算效率。"}, "KERNEL_TRUNCATION/FACTOR": {"name": "KERNEL_TRUNCATION/FACTOR", "description": "KERNEL_TRUNCATION/FACTOR=  real", "default": "Default:KERNEL_TRUNCATION/FACTOR", "details": "Description:Determines the spatial extent of the truncated Coulomb interaction relative to the computational cell dimension along the truncation direction.\nKERNEL_TRUNCATION/FACTORdefines the cutoff distance of the Coulomb-kernel-truncation boundary. It is expressed as a fraction of the simulation-cell length along the truncated axis (e.g., the surface normal for 2D systemsISURFACE).\nKERNEL_TRUNCATION/LTRUNCATE,KERNEL_TRUNCATION/IDIMENSIONALITY,KERNEL_TRUNCATION/LCOARSEN,KERNEL_TRUNCATION/IPAD,KERNEL_TRUNCATION/ISURFACE", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/FACTOR", "description_cn": "KERNEL_TRUNCATION/FACTOR 参数，类型为实数。", "default_value": "无固定默认值，需用户指定。", "details_cn": "确定截断库仑相互作用相对于沿截断方向的计算单元尺寸的空间范围。KERNEL_TRUNCATION/FACTOR 定义了库仑核截断边界的截止距离。它表示为沿截断轴的模拟单元长度的分数（例如，对于二维系统ISURFACE的表面法线）。相关参数：KERNEL_TRUNCATION/LTRUNCATE, KERNEL_TRUNCATION/IDIMENSIONALITY, KERNEL_TRUNCATION/LCOARSEN, KERNEL_TRUNCATION/IPAD, K", "recommended": "通常设置为0.5，但需根据具体系统调整。使用场景：适用于表面、二维材料等低维系统计算，以避免周期性伪影。", "tips": "需与KERNEL_TRUNCATION/LTRUNCATE等参数配合使用。截断距离应合理设置，过小可能导致计算不准确，过大可能增加计算成本。"}, "KERNEL_TRUNCATION/IDIMENSIONALITY": {"name": "KERNEL_TRUNCATION/IDIMENSIONALITY", "description": "KERNEL_TRUNCATION/IDIMENSIONALITY=  0 | 2 | 3Default:KERNEL_TRUNCATION/IDIMENSIONALITY=  3", "default": "KERNEL_TRUNCATION/IDIMENSIONALITY=  0 | 2 | 3Default:KERNEL_TRUNCATION/IDIMENSIONALITY=  3", "details": "Description: Specifies the boundary condition used to compute the hartree and ionic potential.\nIfKERNEL_TRUNCATION/LTRUNCATE= T,KERNEL_TRUNCATION/IDIMENSIONALITYdetermines the boundary condition that is used to compute the local potential.\nSettingKERNEL_TRUNCATION/IDIMENSIONALITYto either 0 or 2 uses the 0D and 2D truncated kernel respectively.[1][2][3]These kernels create 0D (i.e. no periodi\nConsider using the option when computing energies and forces of atoms and molecules.\nRecommendedINCARtags to be used with option are", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/IDIMENSIONALITY", "description_cn": "指定用于计算哈特里势和离子势的边界条件。", "default_value": "3", "details_cn": "指定用于计算哈特里势和离子势的边界条件。如果KERNEL_TRUNCATION/LTRUNCATE= T，那么KERNEL_TRUNCATION/IDIMENSIONALITY决定用于计算局部势的边界条件。将KERNEL_TRUNCATION/IDIMENSIONALITY设置为0或2分别使用0D和2D截断核。[1][2][3]这些核创建0D（即无周期性）边界条件。在计算原子和分子的能量和力时，考虑使用此选项。推荐INCAR标签。", "recommended": "0或2用于计算孤立原子或分子；默认值3用于周期性系统。", "tips": "需要配合KERNEL_TRUNCATION/LTRUNCATE= T使用；参考文献[1][2][3]。"}, "KERNEL_TRUNCATION/IPAD": {"name": "KERNEL_TRUNCATION/IPAD", "description": "KERNEL_TRUNCATION/IPAD=  integer", "default": "Default:KERNEL_TRUNCATION/IPAD", "details": "Description:KERNEL_TRUNCATION/IPADcontrols the padding strategy used for the Coulomb kernel truncation in reciprocal space. Padding defines how much additional empty space is introduced around the charge density before applying truncation.[1]This affects both the accuracy of the truncated Coulomb po\nSettingKERNEL_TRUNCATION/IPADallows fine control over how much zero-padding is applied along each reciprocal-space direction. Padding ensures that the truncated Coulomb kernel does not artificially interact with its periodic replicas in non-periodic directions.\nTypically, increasingKERNEL_TRUNCATION/IPADimproves accuracy at the expense of computational cost.", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/IPAD", "description_cn": "核截断/填充", "default_value": "KERNEL_TRUNCATION/IPAD", "details_cn": "KERNEL_TRUNCATION/IPAD 控制倒空间中库仑核截断所使用的填充策略。填充定义了在应用截断前，在电荷密度周围引入多少额外的空白空间。[1] 这会影响截断库仑势的精度以及计算效率。设置 KERNEL_TRUNCATION/IPAD 可以精细控制沿每个倒空间方向应用的零填充量。填充确保截断的库仑核不会人为地影响计算结果。", "recommended": "1. **默认值**：通常保持默认值即可，适用于大多数常规计算。\n2. **表面或低维体系计算**：对于表面、纳米线或二维材料等低维体系，可能需要增加填充量（例如设置为 2 或 3）以避免周期性镜像间的虚假相互作用。\n3. **高精度计算**：当需要极高精度的静电势时（如缺陷形成能计算），可以尝试不同的填充值并进行收敛性测试。\n4. **计算效率**：较大的填充值会增加计算内存和时间，需权衡精度与效率。", "tips": "1. 该参数主要影响倒空间库仑截断的精度，对实空间截断方法（如使用 LREAL=.TRUE.）影响较小。\n2. 修改此参数后，建议进行小规模测试以验证对目标物理量（如总能、能带结构）的影响。\n3. 对于金属体系或强关联体系，通常不需要大幅调整此参数。\n4. 若计算中出现非物理的静电势振荡，可尝试适当增大填充值。"}, "KERNEL_TRUNCATION/ISURFACE": {"name": "KERNEL_TRUNCATION/ISURFACE", "description": "KERNEL_TRUNCATION/ISURFACE=  1 | 2 | 3", "default": "", "details": "Description: Specifies the non-periodic dimension when performing calculations with the Coulomb-kernel-truncation method for2D materials.\nWhen performing Coulomb-kernel truncation (KERNEL_TRUNCATION/LTRUNCATE= T) withKERNEL_TRUNCATION/IDIMENSIONALITY= 2,KERNEL_TRUNCATION/ISURFACEspecifies which direction is non-periodic.\nIf the surface normal points in the direction of the x-axis setKERNEL_TRUNCATION/ISURFACE= 1, if it is along the y-\nKERNEL_TRUNCATION/LTRUNCATE,KERNEL_TRUNCATION/LCOARSEN,KERNEL_TRUNCATION/IDIMENSIONALITY,KERNEL_TRUNCATION/IPAD,KERNEL_TRUNCATION/FACTOR", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/ISURFACE", "description_cn": "指定在使用库仑核截断方法进行二维材料计算时的非周期性维度。", "default_value": "无默认值，需用户指定", "details_cn": "指定在使用库仑核截断方法进行二维材料计算时的非周期性维度。当执行库仑核截断（KERNEL_TRUNCATION/LTRUNCATE= T）且KERNEL_TRUNCATION/IDIMENSIONALITY= 2时，KERNEL_TRUNCATION/ISURFACE指定哪个方向是非周期性的。如果表面法线指向x轴方向，设置KERNEL_TRUNCATION/ISURFACE= 1；如果指向y轴方向，设置KERNEL_TRUNCATION/ISURFACE= 2；如果指向z轴方向，设置KERNEL_TRUNCATION/ISURFACE= 3。", "recommended": "推荐值取决于材料的表面法线方向。例如，对于在xy平面内的二维材料，表面法线沿z轴，推荐设置ISURFACE=3。使用场景：在计算二维材料的电子结构、光学性质等时，使用库仑核截断来模拟非周期性边界条件，以避免周期性边界条件对结果的影响。", "tips": "必须正确设置非周期性方向，以确保计算结果的准确性。此参数需与KERNEL_TRUNCATION/LTRUNCATE= T和KERNEL_TRUNCATION/IDIMENSIONALITY= 2一起使用；否则设置无效。"}, "KERNEL_TRUNCATION/LCOARSEN": {"name": "KERNEL_TRUNCATION/LCOARSEN", "description": "KERNEL_TRUNCATION/LCOARSEN=  .True. | .False.Default:KERNEL_TRUNCATION/LCOARSEN= .False.", "default": "KERNEL_TRUNCATION/LCOARSEN=  .True. | .False.Default:KERNEL_TRUNCATION/LCOARSEN= .False.", "details": "Description: Coarsen the charge density before padding to speed up the computation of the local potential in the Coulomb-kernel-truncation method.\nThe Coulomb-kernel-truncation method (KERNEL_TRUNCATION/LTRUNCATE) modifies the electrostatic potential to remove spurious interactions between periodic images in systems with reduced dimensionality (e.g. molecules or surfaces).KERNEL_TRUNCATION/LCOARSEN= Tavoids significantly increasingFFT-grid siz\nThis procedure exploits the fact thatlong-range electrostaticsdepends only on low-frequency components of the charge density, allowing the expensive padded FFTs to be performed on a much smaller grid with minimal loss of accuracy.", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/LCOARSEN", "description_cn": "在填充前粗化电荷密度，以加速库仑核截断方法中局部势的计算。", "default_value": "False", "details_cn": "在填充前粗化电荷密度，以加速库仑核截断方法中局部势的计算。库仑核截断方法（KERNEL_TRUNCATION/LTRUNCATE）修改静电势，以移除低维系统（如分子或表面）中周期性镜像之间的虚假相互作用。设置KERNEL_TRUNCATION/LCOARSEN= T 可以避免显著增加FFT网格大小。此过程利用了长程电...", "recommended": "True 或 False，取决于计算需求。使用场景：当使用KERNEL_TRUNCATION/LTRUNCATE方法处理低维系统（如分子或表面）时，如果希望加速计算并减少FFT网格大小，可设置为True；否则，默认False以保持精度。", "tips": "设置为True可能会略微降低计算精度，但能显著提高计算速度。确保在使用此参数时，KERNEL_TRUNCATION/LTRUNCATE已启用。对于高精度计算，建议使用默认值False。"}, "KERNEL_TRUNCATION/LTRUNCATE": {"name": "KERNEL_TRUNCATION/LTRUNCATE", "description": "KERNEL_TRUNCATION/LTRUNCATE=  .True. | .False.Default:KERNEL_TRUNCATION/LTRUNCATE= .False.", "default": "KERNEL_TRUNCATION/LTRUNCATE=  .True. | .False.Default:KERNEL_TRUNCATION/LTRUNCATE= .False.", "details": "Description: Truncates the Coulomb kernel to removeelectrostatic interactionsalong non-periodic dimensions.\nSettingKERNEL_TRUNCATION/LTRUNCATE= T  switches on the Coulomb-kernel-truncation method[1][2][3]. It effectively removes interactions with periodic replicas in non-periodic directions. In other words, the interactions are removed along the surface normal for2D materials, and along all directions for\nIn the simplest implementation of the Coulomb-kernel-truncation method (KERNEL_TRUNCATION/LCOARSEN= F), the computational cell provided in thePOSCARfile is internally padded by an additional vacuum (seeKERNEL_TRUNCATION/IPAD). This implies increasing theFFT-grid sizesby a certain factor and thus lea", "wiki_url": "https://www.vasp.at/wiki/index.php/KERNEL_TRUNCATION/LTRUNCATE", "description_cn": "截断库仑核以移除非周期性维度上的静电相互作用。", "default_value": "False", "details_cn": "截断库仑核以移除非周期性维度上的静电相互作用。设置KERNEL_TRUNCATION/LTRUNCATE= T 会启用库仑核截断方法[1][2][3]。它有效地移除非周期性方向上与周期性副本的相互作用。换句话说，对于2D材料，相互作用沿表面法线方向移除；而对于0D材料，相互作用沿所有方向移除。", "recommended": "推荐在计算2D材料（如表面或薄膜）或0D材料（如团簇）时设置为True，以避免周期性边界条件引入的虚假相互作用。默认值为False，适用于3D周期性体系。", "tips": "使用此参数时，可能需要配合设置LDIPOL和DIPOL参数以正确处理静电势；确保在非周期性方向上有足够的真空层以避免镜像相互作用；计算成本可能增加，建议测试收敛性。"}, "KGAMMA": {"name": "KGAMMA", "description": "KGAMMA= [logical]Default:KGAMMA= .TRUE.", "default": "KGAMMA= [logical]Default:KGAMMA= .TRUE.", "details": "Description: Whether the automatically generatedk-point mesh is centered at the[math]\\displaystyle{ \\Gamma }[/math]point.\nIfKGAMMA= .TRUE.(default), thek-point mesh is centered at the[math]\\displaystyle{ \\Gamma }[/math]point, i.e., it always includes the[math]\\displaystyle{ \\Gamma }[/math]point. IfKGAMMA= .FALSE., the mesh is shifted away from the[math]\\displaystyle{ \\Gamma }[/math]point as in a Monkhorst-Pack grid. Th\nKSPACING,KSPACING_OPT", "wiki_url": "https://www.vasp.at/wiki/index.php/KGAMMA", "description_cn": "KGAMMA= [逻辑值] 默认值：KGAMMA= .TRUE.", "default_value": ".TRUE.", "details_cn": "自动生成的k点网格是否以Γ点为中心。如果KGAMMA= .TRUE.（默认），则k点网格以Γ点为中心，即总是包含Γ点。如果KGAMMA= .FALSE.，则网格从Γ点偏移，类似于Monkhorst-Pack网格。", "recommended": "根据计算需求选择。对于需要精确计算Γ点性质的场景（如声子计算、光学性质或对称性敏感计算），推荐使用.TRUE.；对于常规计算（如能带结构、态密度或几何优化），推荐使用.FALSE.以提高计算效率，因为Monkhorst-Pack网格通常更均匀且节省资源。", "tips": "KGAMMA参数与KSPACING和KSPACING_OPT参数相关，设置时需协调k点网格密度。使用.FALSE.时，确保网格足够密以避免精度损失；对于金属体系或窄带隙材料，建议测试不同设置以平衡精度和效率。"}, "KPAR": {"name": "KPAR", "description": "KPAR= [integer]Default:KPAR= 1", "default": "KPAR= [integer]Default:KPAR= 1", "details": "Description:KPARdetermines the number ofk-points that are to be treated in parallel (available as of VASP.5.3.2). Also,KPARis used as parallelization tag forLaplace transformed MP2 calculations.\nVASP currently offers parallelization and data distribution over bands and/or over plane wave coefficients (seeNCOREandNPAR), and as of VASP.5.3.2, parallelization overk-points.\nTo obtain high efficiency on massively parallel systems or modern multi-core machines, it is strongly recommended to use a\nThe set ofk-points is distributed overKPARgroups of compute cores, in a round-robin fashion.\nThis means that a group ofN=(# of cores/KPAR) compute cores together work on an individualk-point (chooseKPARsuch that it is an integer divisor of the total number of cores).\nWithin this group ofNcores that ", "wiki_url": "https://www.vasp.at/wiki/index.php/KPAR", "description_cn": "KPAR参数用于控制并行处理的k点数量。", "default_value": "1", "details_cn": "KPAR确定要并行处理的k点数量（自VASP.5.3.2版本起可用）。此外，KPAR还用作拉普拉斯变换MP2计算的并行化标签。VASP目前提供基于能带和/或平面波系数的并行化和数据分布（参见NCORE和NPAR），并且自VASP.5.3.2版本起，支持基于k点的并行化。为了在大规模并行系统或现代多核机器上获得高效率，强烈建议使用一个合适的KPAR值。", "recommended": "KPAR应设置为k点总数的因子，例如，如果k点总数为N，KPAR可以设置为N的因子如1、2、4等，以最大化并行效率。使用场景：当计算涉及多个k点时，设置KPAR>1可以显著加速计算，特别是在多核或集群系统上。", "tips": "确保KPAR整除k点总数，以避免负载不平衡。KPAR与NCORE和NPAR等其他并行参数需协调设置，以优化整体性能。"}, "KPOINTS_OPT_MODE": {"name": "KPOINTS_OPT_MODE", "description": "KPOINTS_OPT_MODE= 0 | 1 | 2Default:KPOINTS_OPT_MODE= 1", "default": "KPOINTS_OPT_MODE= 0 | 1 | 2Default:KPOINTS_OPT_MODE= 1", "details": "Description: Selects which diagonalization algorithm to use for the optional k-points driver\nSometimes, the electronic Kohn-Sham orbitals are required on an alternative k-point mesh, for example viaKPOINTS_OPTorKPOINTS_ELPH.\nIn this case, the tagKPOINTS_OPT_MODEselects which diagonalization algorithm should be used to obtain these eigenvalues.", "wiki_url": "https://www.vasp.at/wiki/index.php/KPOINTS_OPT_MODE", "description_cn": "选择用于可选k点驱动的对角化算法。", "default_value": "1", "details_cn": "选择用于可选k点驱动的对角化算法。有时，电子Kohn-Sham轨道需要在替代k点网格上计算，例如通过KPOINTS_OPT或KPOINTS_ELPH。在这种情况下，标签KPOINTS_OPT_MODE选择应使用哪种对角化算法来获得这些本征值。", "recommended": "1（默认值）。使用场景：对于大多数第一性原理计算，如常规电子结构计算，使用默认值1即可平衡精度和效率。如果需要更高精度（如声子计算或电子-声子耦合），可以尝试值2；对于简单测试或资源受限情况，值0可能适用。建议根据具体计算目标进行测试。", "tips": "1. 此参数仅在使用KPOINTS_OPT或KPOINTS_ELPH文件时生效，否则无效。2. 不同值（0、1、2）可能对应不同对角化算法，影响计算时间和精度，需根据体系大小和需求权衡。3. 确保相关k点文件正确设置，以避免计算错误。"}, "KPOINTS_OPT_NKBATCH": {"name": "KPOINTS_OPT_NKBATCH", "description": "KPOINTS_OPT_NKBATCH= [integer]", "default": "Default:KPOINTS_OPT_NKBATCH= Number of k-points in the irreducible Brillouin zone of the self-consistent calculation.", "details": "Default:KPOINTS_OPT_NKBATCH= Number of k-points in the irreducible Brillouin zone of the self-consistent calculation.\nDescription:KPOINTS_OPT_NKBATCHdetermines the size of the batch of k-points for the KPOINTS_OPT driver.\nWhen theKPOINTS_OPTis present an additional non-self-consistent calculation is performed after self-consistency is reached.\nThis one-shot calculation is done in batches of N k-points to reduce memory usage.\nIncreasing the size of the batch leads to faster calculation times but higher memory usage in", "wiki_url": "https://www.vasp.at/wiki/index.php/KPOINTS_OPT_NKBATCH", "description_cn": "KPOINTS_OPT_NKBATCH= [整数]", "default_value": "自洽计算中不可约布里渊区的k点数量。", "details_cn": "默认值：KPOINTS_OPT_NKBATCH= 自洽计算中不可约布里渊区的k点数量。描述：KPOINTS_OPT_NKBATCH 决定了 KPOINTS_OPT 驱动器的k点批次大小。当 KPOINTS_OPT 存在时，在达到自洽后会执行额外的非自洽计算。这个一次性计算以N个k点的批次进行，以减少内存使用。增加批次大小会导致更快的计算时间，但会增加内存使用。", "recommended": "通常使用默认值，即自洽计算中不可约布里渊区的k点数量。使用场景：当使用KPOINTS_OPT进行后处理计算（如能带结构或态密度计算）时，此参数控制批次大小。对于大型系统或内存受限情况，可减小批次大小以节省内存；对于小型系统或追求计算速度，可适当增大批次大小，但需确保内存充足。", "tips": "1. 确保在INCAR中已设置KPOINTS_OPT参数，否则此参数无效。2. 批次大小需根据系统k点数量和可用内存平衡调整：过小可能增加计算时间，过大可能导致内存溢出。3. 建议在测试后根据实际计算资源优化此值。"}, "KPOINT_BSE": {"name": "KPOINT_BSE", "description": "KPOINT_BSE= [integer] (optionally [integer],[integer],[integer])", "default": "", "details": "Description:KPOINT_BSEspecifies the k-point index at which VASP calculates the dielectric matrix.\nIn the simplest form, one can specify\nSelect the desired k point from the list of k points in theOUTCARfile. Additionally, a shift by an arbitrary reciprocal lattice vector can be supplied by specifying three additional integer numbers:", "wiki_url": "https://www.vasp.at/wiki/index.php/KPOINT_BSE", "description_cn": "KPOINT_BSE= [整数]（可选地 [整数],[整数],[整数]）", "d
