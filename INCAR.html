, {"name": "自旋轨道耦合", "desc": "包含自旋轨道耦合的非共线磁性计算", "params": {"LSORBIT": ".TRUE.", "ISPIN": "2", "LNONCOLLINEAR": ".TRUE.", "SAXIS": "0 0 1", "ENCUT": "500", "PREC": "Accurate", "EDIFF": "1E-6", "ISMEAR": "-5", "LORBIT": "11"}}, {"name": "Bader 电荷分析", "desc": "输出全电子电荷密度用于 Bader 分析", "params": {"IBRION": "-1", "NSW": "0", "EDIFF": "1E-6", "ENCUT": "520", "PREC": "Accurate", "ISMEAR": "-5", "LAECHG": ".TRUE.", "LCHARG": ".TRUE.", "LWAVE": ".FALSE.", "NGXF": "280", "NGYF": "280", "NGZF": "280"}}, {"name": "偶极修正 (slab)", "desc": "不对称 slab 模型的偶极矩修正", "params": {"IBRION": "2", "ISIF": "2", "NSW": "100", "EDIFF": "1E-6", "EDIFFG": "-0.01", "ENCUT": "520", "PREC": "Accurate", "LDIPOL": ".TRUE.", "IDIPOL": "3", "DIPOL": "0.5 0.5 0.5", "ISMEAR": "0", "SIGMA": "0.05"}}, {"name": "光学性质计算", "desc": "计算频率依赖的介电函数", "params": {"IBRION": "-1", "NSW": "0", "EDIFF": "1E-6", "ENCUT": "520", "PREC": "Accurate", "ISMEAR": "0", "SIGMA": "0.05", "LOPTICS": ".TRUE.", "NBANDS": "200", "CShift": "0.1"}}, {"name": "Wannier90 接口", "desc": "Wannier 函数计算的准备步骤", "params": {"IBRION": "-1", "NSW": "0", "EDIFF": "1E-6", "ENCUT": "520", "PREC": "Accurate", "ISMEAR": "0", "SIGMA": "0.05", "LWANNIER90": ".TRUE.", "LWRITE_UNK": ".TRUE.", "LCHARG": ".FALSE."}}, {"name": "SCAN 泛函计算", "desc": "使用 SCAN meta-GGA 泛函", "params": {"METAGGA": "SCAN", "IBRION": "2", "ISIF": "3", "NSW": "100", "EDIFF": "1E-6", "EDIFFG": "-0.01", "ENCUT": "520", "PREC": "Accurate", "ISMEAR": "-5", "LMIXTAU": ".TRUE.", "LASPH": ".TRUE.", "MAXMIX": "80"}}, {"name": "Gamma 点优化", "desc": "仅使用 Gamma k 点的大体系计算", "params": {"IBRION": "2", "ISIF": "3", "NSW": "100", "EDIFF": "1E-4", "EDIFFG": "-0.02", "ENCUT": "400", "PREC": "Normal", "ISMEAR": "0", "SIGMA": "0.05", "LREAL": "Auto", "KGAMMA": ".TRUE.", "KSPACING": "0.5"}}];

let activeCategory = 'home';
let currentIncar = '';

// ---- Sidebar ----
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = `<div class="nav-item active" data-cat="all">
    <span class="icon">📋</span><span>全部参数</span>
    <span class="count">${Object.keys(PARAMS).length}</span>
  </div>`;
  for (const [name, cat] of Object.entries(CATEGORIES)) {
    html += `<div class="nav-item" data-cat="${name}">
      <span class="icon">${cat.icon}</span><span>${name}</span>
      <span class="count">${cat.params.length}</span>
    </div>`;
  }
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      nav.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      activeCategory = el.dataset.cat;
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('searchInput').value = '';
      renderContent();
    });
  });
}

// ---- Templates ----
function renderTemplates() {
  const grid = document.getElementById('tplGrid');
  grid.innerHTML = TEMPLATES.map((t, i) => `
    <div class="tpl-card" onclick="showTemplate(${i})">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <span class="tag">${Object.keys(t.params).length} 个参数</span>
    </div>
  `).join('');
}

function showTemplate(i) {
  const t = TEMPLATES[i];
  document.getElementById('modalTitle').textContent = t.name;
  document.getElementById('modalDesc').textContent = t.desc;
  let code = '# ' + t.name + '\n# ' + t.desc + '\n\n';
  for (const [k, v] of Object.entries(t.params)) {
    code += ` ${k} = ${v}\n`;
  }
  document.getElementById('modalCode').textContent = code;
  currentIncar = code;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function copyIncar() {
  navigator.clipboard.writeText(currentIncar).then(() => {
    const btn = document.querySelector('.btn-primary');
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制 INCAR', 1500);
  });
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ---- Param Cards ----
function renderContent() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const container = document.getElementById('paramContent');
  const disclaimer = document.getElementById('disclaimer');
  const tplSection = document.getElementById('tplSection');
  const backBtn = document.getElementById('backHome');
  let html = '';
  let totalCount = 0;

  // Home mode: only show disclaimer + templates
  if (activeCategory === 'home' && !query) {
    disclaimer.style.display = '';
    tplSection.style.display = '';
    container.innerHTML = '';
    backBtn.classList.remove('show');
    return;
  }

  // Not on home: hide disclaimer/templates, show back button
  disclaimer.style.display = 'none';
  tplSection.style.display = 'none';
  backBtn.classList.add('show');

  const cats = activeCategory === 'all' ? Object.entries(CATEGORIES) :
    Object.entries(CATEGORIES).filter(([k]) => k === activeCategory);

  for (const [catName, catInfo] of cats) {
    const filtered = catInfo.params.filter(p => {
      const data = PARAMS[p];
      if (!data) return false;
      if (!query) return true;
      // 匹配参数名或中文描述（不区分大小写）
      return p.toLowerCase().includes(query) ||
        (data.description_cn||'').toLowerCase().includes(query);
    });

    if (filtered.length === 0) continue;
    totalCount += filtered.length;

    html += `<h3 class="section-title">
      <span style="color:${catInfo.color}">${catInfo.icon}</span> ${catName}
      <span style="font-size:.75rem;color:var(--text-muted);font-weight:400">(${filtered.length})</span>
    </h3>
    <p class="section-desc">${catInfo.desc}</p>
    <div class="param-grid">`;

    for (const p of filtered) {
      const d = PARAMS[p] || {};
      html += `<div class="param-card" onclick="this.classList.toggle('open')">
        <div class="param-head">
          <span class="param-name">${p}</span>
          <span class="param-brief">${d.description_cn || d.description || ''}</span>
          ${d.wiki_url ? `<a class="wiki-tag" href="${d.wiki_url}" target="_blank" onclick="event.stopPropagation()" title="VASP Wiki">Wiki</a>` : ''}
          <span class="param-default">${d.default_value || d.default || '?'}</span>
          <span class="param-arrow">▶</span>
        </div>
        <div class="param-body"><div class="param-detail">
          <div class="detail-row"><span class="detail-label">描述</span><span class="detail-value">${d.description_cn || d.description || '暂无'}</span></div>
          <div class="detail-row"><span class="detail-label">默认值</span><span class="detail-value"><code>${d.default_value || d.default || '请查阅 Wiki'}</code></span></div>
          ${d.details_cn ? `<div class="detail-row"><span class="detail-label">详细说明</span><span class="detail-value">${d.details_cn}</span></div>` : ''}
          <div class="detail-row"><span class="detail-label">推荐</span><span class="detail-value">${d.recommended || '请参考 VASP Wiki'}</span></div>
          <div class="detail-row"><span class="detail-label">注意事项</span><span class="detail-value">${d.tips || '建议做收敛性测试'}</span></div>
          ${d.wiki_url ? `<a class="wiki-link" href="${d.wiki_url}" target="_blank" onclick="event.stopPropagation()">📖 查看 VASP Wiki 原文</a>` : ''}
        </div></div>
      </div>`;
    }
    html += '</div>';
  }

  if (!html) {
    html = '<p style="text-align:center;color:var(--text-muted);padding:60px 0">未找到匹配的参数</p>';
  }

  container.innerHTML = html;
  document.getElementById('resultCount').textContent = query ? `找到 ${totalCount} 个参数` : '';
}

// ---- Search ----
document.getElementById('searchInput').addEventListener('input', () => {
  if (activeCategory !== 'all') {
    activeCategory = 'all';
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.cat === 'all');
    });
  }
  const q = document.getElementById('searchInput').value.trim();
  document.getElementById('tplSection').style.display = q ? 'none' : '';
  document.getElementById('disclaimer').style.display = q ? 'none' : '';
  renderContent();
});

// ---- Back to Home ----
function goHome() {
  activeCategory = 'home';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.remove('active');
  });
  renderContent();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ---- Init ----
renderSidebar();
renderTemplates();
renderContent();
</script>
</body>
</html>
