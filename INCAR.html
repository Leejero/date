al]Default:ML_MOPOT_RM= 1.0", "default": "ML_MOPOT_RM= [real]Default:ML_MOPOT_RM= 1.0", "details": "Description: Specifies the equilibrium bond distance of the Morse potentials used as auxiliary potentials in thermodynamic integration (VCAIMAGES).\nThis parameter sets the equilibrium bond distance[math]\\displaystyle{ r_{e} }[/math]of the following Morse potential\n[math]\\displaystyle{ \nV(r) = D_e (1-e^{-\\beta(r-r_{e})})^2 - 1.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MOPOT_RM", "description_cn": "ML_MOPOT_RM= [实数] 默认值：ML_MOPOT_RM= 1.0", "default_value": "1.0", "details_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的Morse势的平衡键距离。此参数设置以下Morse势的平衡键距离 r_e：V(r) = D_e (1-e^{-\beta(r-r_e)})^2 - 1。", "recommended": "根据实际分子的键长设置，例如对于氢分子，键长约0.74 Å。使用场景：在进行热力学积分计算时，如VCAIMAGES方法，用于设置辅助Morse势的平衡键距离。", "tips": "确保参数单位与VASP中的距离单位一致（通常为Å）。此参数仅在使用VCAIMAGES时相关，设置不当可能影响计算精度。"}, "ML_MRB1": {"name": "ML_MRB1", "description": "ML_MRB1= [integer]Default:ML_MRB1= 12", "default": "ML_MRB1= [integer]Default:ML_MRB1= 12", "details": "Description: This tag sets the number[math]\\displaystyle{ N_\\text{R}^0 }[/math]of radial basis functions used to expand the radial descriptor[math]\\displaystyle{ \\rho^{(2)}_i(r) }[/math]within the machine learning force field method.\nThe radial descriptor is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(2)}\\left(r\\right) = \\frac{1}{4\\pi} \\int \\rho_{i}\\left(r\\hat{\\mathbf{r}}\\right) d\\hat{\\mathbf{r}}, \\quad \\text{where} \\quad\n\\rho_{i}\\left(\\mathbf{r}\\right) = \\sum\\limits_{j=1}^{N_{\\mathrm{a}}} f_{\\mathrm{cut}}\\left(r_{ij}\\right) g\\left(\\mathbf{r}-\\mathbf{r}_{ij}\\right", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MRB1", "description_cn": "ML_MRB1 参数用于设置机器学习力场方法中，用于展开径向描述符 ρ_i^(2)(r) 的径向基函数数量 N_R^0。", "default_value": "12", "details_cn": "详细说明：此标签设置机器学习力场方法中，用于展开径向描述符 ρ_i^(2)(r) 的径向基函数数量 N_R^0。径向描述符由以下公式构建：\nρ_i^(2)(r) = (1/(4π)) ∫ ρ_i(r r̂) d r̂，其中 ρ_i(r) = Σ_{j=1}^{N_a} ...", "recommended": "默认值12通常适用于大多数体系。对于需要更高精度描述局域环境（如复杂合金、表面吸附或缺陷体系）的计算，可适当增加此值（例如16-24）。对于简单体系或初步测试，可尝试减小（如8）以节省计算资源。建议通过收敛性测试确定最佳值。", "tips": "1. 增大此值会显著增加机器学习力场的训练和预测计算量。2. 需与ML_MRB2（角度基函数数量）配合调整以平衡精度与效率。3. 该参数仅在使用机器学习力场（ML_LMLFF=.TRUE.）时生效。"}, "ML_MRB2": {"name": "ML_MRB2", "description": "ML_MRB2= [integer]Default:ML_MRB2= 8", "default": "ML_MRB2= [integer]Default:ML_MRB2= 8", "details": "Description: This tag sets the number[math]\\displaystyle{ N_\\text{R}^l }[/math](for all[math]\\displaystyle{ l }[/math]) of radial basis functions used to expand the angular descriptor within the machine learning force field method.\nThe angular descriptor is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(3)}\\left(r,s,\\theta\\right) = \\iint d\\hat{\\mathbf{r}} d\\hat{\\mathbf{s}}  \\delta\\left(\\hat{\\mathbf{r}}\\cdot\\hat{\\mathbf{s}} - \\mathrm{cos}\\theta\\right) \\sum\\limits_{j=1}^{N_{a}} \\sum\\limits_{k \\ne j}^{N_{a}} \\rho_{ik} \\left(r\\hat{\\mathbf{r}}\\right) \\rho_{ij} \\left(s\\ha", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MRB2", "description_cn": "ML_MRB2是一个整数参数，默认值为8。", "default_value": "8", "details_cn": "此标签设置用于在机器学习力场方法中展开角度描述符的径向基函数的数量 N_R^l（对于所有 l）。角度描述符由以下公式构建：ρ_i^{(3)}(r,s,θ) = ∬ d\\hat{r} d\\hat{s} δ(\\hat{r}·\\hat{s} - cosθ) ∑_{j=1}^{N_a} ∑_{k ...", "recommended": "默认值为8适用于大多数标准计算，平衡精度和效率。对于高精度需求（如复杂材料或精细力场训练），可增加至10-12；对于快速测试或小体系，可降至6以节省计算资源。", "tips": "此参数仅在使用机器学习力场（MLFF）时生效。增加数值会提升描述符精度但显著增加内存和计算时间，建议根据体系大小和计算资源进行测试优化。"}, "ML_NATOM_COUPLED": {"name": "ML_NATOM_COUPLED", "description": "ML_NATOM_COUPLED= [integer]Default:ML_NATOM_COUPLED= 0", "default": "ML_NATOM_COUPLED= [integer]Default:ML_NATOM_COUPLED= 0", "details": "Description: This tag specifies the number of atoms for which a coupling parameter is introduced to calculate the chemical potential within the machine learning force field method.\nFor thermodynamic integration calculations please have a look at the tagML_LCOUPLE.\nML_LMLFF,ML_LCOUPLE,ML_ICOUPLE,ML_RCOUPLE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_NATOM_COUPLED", "description_cn": "ML_NATOM_COUPLED 参数指定在机器学习力场方法中为计算化学势引入耦合参数的原子数量。", "default_value": "0", "details_cn": "此标签指定在机器学习力场方法中，为计算化学势而引入耦合参数的原子数量。对于热力学积分计算，请查看标签 ML_LCOUPLE。相关标签：ML_LMLFF, ML_LCOUPLE, ML_ICOUPLE, ML_RCOUPLE", "recommended": "默认值为0，表示不引入耦合参数。在需要计算化学势的热力学积分中，根据系统大小和计算目标设置为需要耦合的原子数量。例如，对于小分子系统，可设置为1或2；对于大系统，需基于具体化学势计算需求调整。使用场景包括机器学习力场下的热力学积分或自由能计算。", "tips": "使用此参数前，确保已启用机器学习力场（设置ML_LMLFF=.TRUE.）。对于热力学积分，需结合ML_LCOUPLE参数使用，以定义耦合强度。参数设置应基于对系统化学势计算的理解，不当设置可能导致计算错误或效率降低。建议参考VASP官方文档或相关教程进行验证。"}, "ML_NCSHMEM": {"name": "ML_NCSHMEM", "description": "ML_NCSHMEM= [integer]", "default": "Default:ML_NCSHMEM", "details": "Description: Specifies the number of MPI ranks that share a single shared memory segment.\nDefault: The default is chosen such that the number of available ranks per computational node are divided by 2 (maximum up to three times) until the value is lower than or equal to 24 or the value cannot be subdivided further since it becomes an odd number. E.g. 128 becomes 16, 48 becomes 24, 80 bec\nThe total number of memory segments created equals the number of cores per node divided byML_NCSHMEM. All memory segments have identical sizes, so a larger number of segments results in higher total memory consumption.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_NCSHMEM", "description_cn": "指定共享单个共享内存段的MPI ranks数量。", "default_value": "默认值根据节点可用ranks数动态计算（例如，128变为16，48变为24）", "details_cn": "指定共享单个共享内存段的MPI ranks数量。默认值：默认值的选择方式是将每个计算节点的可用ranks数除以2（最多三次），直到该值小于或等于24，或由于成为奇数而无法进一步细分。例如，128变为16，48变为24，80变为...（文本截断）。创建的内存段总数等于每个节点的核心数除以ML_NCSHMEM。所有内存段...", "recommended": "根据计算节点的核心数和内存需求设置，通常设置为节点核心数的因子（如16、24等），以优化共享内存使用。使用场景：在VASP机器学习力场计算中，用于控制MPI ranks的共享内存分组，提高计算效率和内存利用率。", "tips": "确保ML_NCSHMEM为正整数，且与节点配置兼容；设置过小可能导致内存不足，设置过大可能浪费资源。建议在测试后根据实际计算任务调整。"}, "ML_NHYP": {"name": "ML_NHYP", "description": "ML_NHYP= [integer]Default:ML_NHYP= 4", "default": "ML_NHYP= [integer]Default:ML_NHYP= 4", "details": "Description: This tag specifies the polynomial power[math]\\displaystyle{  \\zeta }[/math]of the kernel within the machine learning force field method (seethis section).\nThe value ofML_NHYPmust be an integer number[math]\\displaystyle{ \\ge }[/math]1.\nML_RCUT1,ML_SION1,ML_RCUT2,ML_SION2", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_NHYP", "description_cn": "ML_NHYP参数指定机器学习力场方法中核函数的多项式幂ζ。", "default_value": "4", "details_cn": "这个标签指定了机器学习力场方法中核函数的多项式幂ζ（参见相关部分）。ML_NHYP的值必须是整数且≥1。相关参数包括ML_RCUT1, ML_SION1, ML_RCUT2, ML_SION2。", "recommended": "默认值4适用于大多数情况。对于简单体系，可以尝试较低值如2或3以加快计算；对于复杂或高精度需求，可增加至5或更高，但需注意计算成本。使用场景：在机器学习力场训练中，调整此参数以平衡精度和效率。", "tips": "确保ML_NHYP为整数且≥1。与其他机器学习参数如ML_RCUT和ML_SION配合使用，以优化力场性能。"}, "ML_NMDINT": {"name": "ML_NMDINT", "description": "Description: Tag to control the minimum interval to get training samples in the machine learning force field method.", "default": "Default:ML_NMDINT", "details": "Description: Tag to control the minimum interval to get training samples in the machine learning force field method.\nThe usage of this tag in combination with the learning algorithms is described here:here\nThis tag defines a lower threshold for taking new configurations from the MD, so that as long as the upper threshold for the Bayesian error (e.g.ML_CDOUBtimesML_CTIFOR) is not exceeded,  at leastML_NMDINTMD steps are preformed using the MLFF (i.e. no first principles calculation is performed). This ", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_NMDINT", "description_cn": "控制机器学习力场方法中获取训练样本的最小间隔的标签。", "default_value": "ML_NMDINT", "details_cn": "控制机器学习力场方法中获取训练样本的最小间隔的标签。此标签与学习算法结合使用的说明见此处：此处。此标签定义了从分子动力学（MD）中获取新配置的下限阈值，因此只要贝叶斯误差的上限（例如ML_CDOUB乘以ML_CTIFOR）未超过，就至少执行ML_NMDINT个MD步骤使用机器学习力场（MLFF），即不进行第一性原理计算。", "recommended": "通常设置为10到20，具体取决于系统大小和所需精度。使用场景：在机器学习力场训练中，用于控制MD模拟中何时插入第一性原理计算以更新训练数据，适用于需要平衡计算效率和精度的模拟，例如大体系或长时间动力学模拟。", "tips": "与ML_CDOUB和ML_CTIFOR参数协调设置，以确保贝叶斯误差阈值合理；值过小会导致频繁的第一性原理计算，增加计算成本；值过大会降低力场精度，可能影响模拟可靠性；建议根据具体体系和计算资源进行测试调整。"}, "ML_NRANK_SPARSDES": {"name": "ML_NRANK_SPARSDES", "description": "ML_NRANK_SPARSDES= [integer]Default:ML_NRANK_SPARSDES= 5", "default": "ML_NRANK_SPARSDES= [integer]Default:ML_NRANK_SPARSDES= 5", "details": "Description: This tag sets the number of highest eigenvalues to which the correlation is measured within the angular descriptor sparsification (within the machine learning force field method).\nThis tag usually does not need to be changed by the user!\nFor details on the theory of angular descriptor sparsification seehere.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_NRANK_SPARSDES", "description_cn": "ML_NRANK_SPARSDES 参数用于设置机器学习力场方法中角描述符稀疏化时相关性测量的最高特征值数量。", "default_value": "5", "details_cn": "此标签设置在角描述符稀疏化（在机器学习力场方法中）中相关性测量的最高特征值数量。此标签通常不需要用户更改！有关角描述符稀疏化理论的详细信息，请参见此处。", "recommended": "推荐使用默认值5，适用于大多数机器学习力场计算场景。除非有特殊需求，否则不建议更改。", "tips": "此参数通常无需修改，更改可能影响计算精度或效率。建议在理解角描述符稀疏化理论后再进行调整。"}, "ML_OUTBLOCK": {"name": "ML_OUTBLOCK", "description": "ML_OUTBLOCK= [integer]", "default": "Default:ML_OUTBLOCK", "details": "Description: Output distance in number of steps for molecular-dynamics simulations with machine-learned force fields in prediction-only mode (ML_MODE= run).\nBy default VASP writes all results at every molecular-dynamics step (ML_OUTBLOCK= 1). However, this may become inefficient when running long trajectories in production runs with a machine-learned force field in prediction-only mode (ML_MODE= run). This is particularly true if the force field support\nIn order to further increase the efficiency, calculation and output of pair-correlation functions can be completely switched off by settingML_OUTPUT_MODE= 0.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_OUTBLOCK", "description_cn": "ML_OUTBLOCK= [整数]", "default_value": "1", "details_cn": "在预测模式（ML_MODE= run）下，使用机器学习力场进行分子动力学模拟时，输出结果的步数间隔。默认情况下，VASP在每个分子动力学步骤都写入所有结果（ML_OUTBLOCK= 1）。然而，在预测模式下运行长轨迹的生产运行时，这可能效率低下，特别是如果力场支持某些功能。为了进一步提高效率...", "recommended": "推荐在预测模式下运行长轨迹时，将ML_OUTBLOCK设置为大于1的整数（如10、100等），以减少输出频率，提高计算效率。具体值应根据模拟的步长、输出需求和计算资源调整。", "tips": "1. 确保ML_MODE设置为run以启用预测模式。2. 增加ML_OUTBLOCK会减少输出数据量，但可能影响后续分析的精度。3. 在生产运行中，建议根据实际需求测试不同值以优化效率。"}, "ML_OUTPUT_MODE": {"name": "ML_OUTPUT_MODE", "description": "Description: This tag allows to disable certain file output which helps to increase performance in molecular-dynamics simulations with machine-learned force fields in prediction-only mode (ML_MODE= run).", "default": "Default:ML_OUTPUT_MODE", "details": "This tag is useful in combination withML_OUTBLOCKto further reduce per-time-step calculations and file output. The following options exist for this tag:\nML_LMLFF,ML_MODE,ML_LFAST,ML_IERR,ML_OUTBLOCK", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_OUTPUT_MODE", "description_cn": "此标签允许禁用某些文件输出，这有助于在仅预测模式（ML_MODE= run）下使用机器学习力场进行分子动力学模拟时提高性能。", "default_value": "ML_OUTPUT_MODE", "details_cn": "此标签与ML_OUTBLOCK结合使用，可进一步减少每个时间步的计算和文件输出。此标签的选项包括：ML_LMLFF, ML_MODE, ML_LFAST, ML_IERR, ML_OUTBLOCK", "recommended": "推荐在仅预测模式（ML_MODE= run）下使用，设置ML_OUTPUT_MODE以禁用不必要的文件输出，提高模拟性能。具体值可根据需要选择，例如设置为0以禁用所有非必要输出，或参考选项列表进行精细控制。", "tips": "确保ML_MODE设置为run，否则此参数可能无效；建议与ML_OUTBLOCK参数结合使用以最大化性能提升；修改输出设置可能影响后续数据分析，请根据实际需求调整。"}, "ML_RCOUPLE": {"name": "ML_RCOUPLE", "description": "Description: This tag specifies the value of the coupling parameter for the calculation of the chemical potential within the machine learning force field method.", "default": "Default:ML_RCOUPLE", "details": "Description: This tag specifies the value of the coupling parameter for the calculation of the chemical potential within the machine learning force field method.\nFor thermodynamic integration calculations please have a look at the tagML_LCOUPLE.\nML_LMLFF,ML_LCOUPLE,ML_NATOM_COUPLED,ML_ICOUPLE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_RCOUPLE", "description_cn": "此标签指定在机器学习力场方法中计算化学势的耦合参数值。", "default_value": "ML_RCOUPLE", "details_cn": "此标签指定在机器学习力场方法中计算化学势的耦合参数值。对于热力学积分计算，请查看标签 ML_LCOUPLE。相关标签：ML_LMLFF, ML_LCOUPLE, ML_NATOM_COUPLED, ML_ICOUPLE", "recommended": "通常根据具体计算系统调整，建议参考VASP官方文档或相关文献设置；使用场景：在机器学习力场模拟中需要计算化学势时，特别是与热力学积分方法结合使用。", "tips": "对于热力学积分计算，请优先使用ML_LCOUPLE标签；确保ML_RCOUPLE与其他机器学习力场参数（如ML_LMLFF）协调一致，以避免计算错误。"}, "ML_RCUT1": {"name": "ML_RCUT1", "description": "Description: Sets the cutoff radius[math]\\displaystyle{ R_\\text{cut} }[/math]for the radial descriptor[math]\\displaystyle{ \\rho^{(2)}_i(r) }[/math]in[math]\\displaystyle{ \\AA }[/math].", "default": "ML_RCUT1= [real]Default:ML_RCUT1= 8.0", "details": "ML_RCUT1= [real]Default:ML_RCUT1= 8.0\nThe radial descriptor for machine-learned force fields is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(2)}\\left(r\\right) = \\frac{1}{4\\pi} \\int \\rho_{i}\\left(r\\hat{\\mathbf{r}}\\right) d\\hat{\\mathbf{r}}, \\quad \\text{where} \\quad\n\\rho_{i}\\left(\\mathbf{r}\\right) = \\sum\\limits_{j=1}^{N_{\\mathrm{a}}} f_{\\mathrm{cut}}\\left(r_{ij}\\right) g\\left(\\mathbf{r}-\\mathbf{r}_{ij}\\right)\n }[/math]\nand[math]\\displaystyle{ g\\left(\\mathbf{r}\\right) }[/math]is an approximation of the delta function. A basis set expansion of[math]\\displaystyle{ \\rho^{(2)}_i(r) }[/math]yields the expansion coefficients[math]\\displaystyle{ c_{n00}^{i} }[/math], which are used in practice to describe the atomic environment; refer to thetheory of machine-learned force fieldsfor details. The tagML_RCUT1sets the cutoff radius[math]\\displaystyle{ R_\\text{cut} }[/math]at which the cutoff function[math]\\displaystyle{ f\nThe unit of the cut-off radius is[math]\\displaystyle{ \\AA }[/math].\nML_LMLFF,ML_RCUT2,ML_W1,ML_SION1,ML_SION2,ML_MRB1,ML_MRB2", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_RCUT1", "description_cn": "设置径向描述符 ρ_i^(2)(r) 的截断半径 R_cut，单位为埃（Å）。", "default_value": "8.0 Å", "recommended": "推荐值取决于具体体系和所需精度。对于大多数体系，默认值 8.0 Å 是一个合理的起点。对于金属或半导体等具有较长相互作用范围的体系，可能需要增大此值（如 10-12 Å）以捕获足够的环境信息。对于表面或界面体系，也需要根据层间距适当调整。对于分子或团簇等小体系，可以适当减小（如 6-7 Å）以提高计算效率。建议通过收敛性测试确定最佳值：逐步增大 ML_RCUT1，观察能量或力的预测精度变化，直至结果稳定。", "tips": "1. 增大 ML_RCUT1 会显著增加计算成本（与截断体积成正比），但可能提高描述符的完备性和力场精度。\n2. 该参数应与 ML_RCUT2（角度描述符截断半径）协调设置，通常 ML_RCUT1 ≥ ML_RCUT2。\n3. 确保所选截断半径大于体系中所有相关原子对的平衡键长，以包含足够的化学环境信息。\n4. 在训练机器学习力场时，训练集和测试集应使用相同的 ML_RCUT1 值。\n5. 对于周期性体系，截断半径应小于晶胞最小边长的一半，以避免自相互作用。", "details_cn": "机器学习力场的径向描述符由以下公式构建：\nρ_i^(2)(r) = (1/4π) ∫ ρ_i(r r̂) d r̂，其中\nρ_i(r) = Σ_{j=1}^{N_a} f_cut(r_ij) g(r - r_ij)\n其中 g(r) 是一个近似函数。ML_RCUT1 参数定义了径向描述符计算中使用的截断半径 R_cut。该半径决定了在构建原子 i 的局部环境描述时，考虑其周围邻居原子 j 的最大距离。超过此距离的原子将不被纳入径向描述符的计算。"}, "ML_RCUT2": {"name": "ML_RCUT2", "description": "ML_RCUT2= [real]Default:ML_RCUT2= 5.0", "default": "ML_RCUT2= [real]Default:ML_RCUT2= 5.0", "details": "Description: This flag sets the cutoff radius[math]\\displaystyle{ R_\\text{cut} }[/math]for the angular descriptor[math]\\displaystyle{ \\rho^{(3)}_i(r) }[/math]in the machine learning force field method. The unit of the cut-off radius is[math]\\displaystyle{ \\AA }[/math].\nThe angular descriptor is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(3)}\\left(r,s,\\theta\\right) = \\iint d\\hat{\\mathbf{r}} d\\hat{\\mathbf{s}}  \\delta\\left(\\hat{\\mathbf{r}}\\cdot\\hat{\\mathbf{s}} - \\mathrm{cos}\\theta\\right) \\sum\\limits_{j=1}^{N_{a}} \\sum\\limits_{k \\ne j}^{N_{a}} \\rho_{ik} \\left(r\\hat{\\mathbf{r}}\\right) \\rho_{ij} \\left(s\\ha", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_RCUT2", "description_cn": "ML_RCUT2 是一个实数参数，默认值为 5.0。", "default_value": "5.0", "details_cn": "此标志设置机器学习力场方法中角度描述符 [math]\\displaystyle{ \\rho^{(3)}_i(r) }[/math] 的截断半径 [math]\\displaystyle{ R_\\text{cut} }[/math]。截断半径的单位是 [math]\\displaystyle{ \\AA }[/math]。\n角度描述符由以下公式构造：\n[math]\\displaystyle{ \n\\rho_{i}^{(3)}\\left(r,s,\\theta\\right) = \\iint d\\hat{\\mathbf{r}} d\\hat{\\mathbf{s}}  \\delta\\left(\\hat{\\mathbf{r}}\\cdot\\hat{\\mathbf{s}} - \\mathrm{cos}\\theta\\right) \\sum", "recommended": "默认值 5.0 Å 通常适用于大多数系统。对于具有长程相互作用的系统（如金属或离子体系），可以考虑增大至 6.0-8.0 Å 以提高精度；对于计算效率优先的情况（如大体系或快速筛选），可以减小至 4.0 Å，但需注意可能损失精度。使用场景：在机器学习力场训练、分子动力学模拟或结构优化中，用于控制角度描述符的截断范围，影响力场的准确性和计算成本。", "tips": "确保截断半径与系统中原子间距和相互作用范围相匹配。过小的值可能忽略重要角度相互作用，导致力场不准确；过大的值会增加计算内存和时间。单位是埃（Å），需与其他参数（如 ML_RCUT1）保持一致。建议在设置前进行收敛测试，以平衡精度和效率。"}, "ML_RDES_SPARSDES": {"name": "ML_RDES_SPARSDES", "description": "ML_RDES_SPARSDES= [real]Default:ML_RDES_SPARSDES= 0.5", "default": "ML_RDES_SPARSDES= [real]Default:ML_RDES_SPARSDES= 0.5", "details": "Description: Sets the ratio of descriptors kept during angular-descriptor sparsification.\nDuringangular-descriptor sparsification(ML_LSPARSDES=T), insignificant angular descriptors are removed based on a leverage scoring. The percentage of angular descriptors that are kept is determined by the value ofML_RDES_SPARSDES, which must be chosen between[math]\\displaystyle{ 0 < r \\leq 1 }[/math\nML_LMLFF,ML_LSPARSDES,ML_NRANK_SPARSDES,ML_DESC_TYPE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_RDES_SPARSDES", "description_cn": "设置在角度描述符稀疏化过程中保留的描述符比例。", "default_value": "0.5", "details_cn": "设置在角度描述符稀疏化过程中保留的描述符比例。在角度描述符稀疏化（ML_LSPARSDES=T）期间，基于杠杆评分移除不重要的角度描述符。保留的角度描述符的百分比由ML_RDES_SPARSDES的值决定，该值必须在0 < r ≤ 1之间选择。", "recommended": "默认值0.5适用于大多数情况，平衡精度和计算效率。如果需要更高精度，可设置为接近1的值（如0.8-1.0）；如果需要减少计算成本，可设置为较低值（如0.2-0.5），但必须大于0。使用场景：当启用角度描述符稀疏化（ML_LSPARSDES=T）时，用于优化机器学习力场（MLFF）的计算效率，特别是在处理大体系或长时间模拟时。", "tips": "1. 确保ML_LSPARSDES设置为T以激活稀疏化功能。2. 值必须严格大于0且小于等于1，否则可能导致计算错误。3. 与相关参数如ML_LMLFF（启用机器学习力场）、ML_NRANK_SPARSDES（稀疏化秩）、ML_DESC_TYPE（描述符类型）配合使用，以确保配置一致。4. 在实际应用中，建议通过测试不同值来优化精度和性能。"}, "ML_SCLC_CTIFOR": {"name": "ML_SCLC_CTIFOR", "description": "ML_SCLC_CTIFOR= [real]Default:ML_SCLC_CTIFOR= 0.6", "default": "ML_SCLC_CTIFOR= [real]Default:ML_SCLC_CTIFOR= 0.6", "details": "Description: Sets fraction by which the error threshold for the maximum forces is lowered in the selection of local reference calculations.\nML_CTIFORdetermines whether a first-principles calculation is performed when training an MLFF. \nWhenever a first-principles calculation is performed, additional functions are added to the sparse representation of the kernel (local-reference configurations).ML_SCLC_CTIFORdetermines how many local-ref\nThe default value of 0.6 is often a reasonably good compromise. If the value is decreased, obviously more functions are used for the sparse representation of the kernel. This always improves the initial learning efficiency but might slow the force-field calculations. \nSoML_SCLC_CTIFORcompromises eit", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SCLC_CTIFOR", "description_cn": "设置在选择局部参考计算时，最大力误差阈值降低的比例。", "default_value": "0.6", "details_cn": "设置在选择局部参考计算时，最大力误差阈值降低的比例。ML_CTIFOR决定在训练机器学习力场（MLFF）时是否执行第一性原理计算。每当执行第一性原理计算时，会向核的稀疏表示（局部参考配置）添加额外函数。ML_SCLC_CTIFOR决定有多少局部参考配置被使用。默认值0.6通常是一个合理的折中选择。", "recommended": "默认值0.6适用于大多数情况，平衡了计算精度和效率。使用场景：在训练机器学习力场时，用于控制第一性原理计算的频率和精度。如果需要更高精度（如复杂体系或力场验证），可降低至0.4-0.5；如果计算资源有限或训练初期，可提高至0.7-0.8以加速训练。", "tips": "该参数与ML_CTIFOR密切相关，需确保两者设置协调，避免冲突。调整时需考虑体系大小、计算成本和训练目标：过低值会增加第一性原理计算次数，提高精度但增加计算量；过高值可能降低力场精度。建议在训练前进行小规模测试以优化参数。"}, "ML_SIGV0": {"name": "ML_SIGV0", "description": "ML_SIGV0= [real]Default:ML_SIGV0= 1.0", "default": "ML_SIGV0= [real]Default:ML_SIGV0= 1.0", "details": "Description: This flag sets the noise parameter[math]\\displaystyle{ s_{\\mathrm{v}} }[/math](seeherefor definition) for the fitting in the machine learning force field method.\nIf the regularization needs to be controlled manually, like e.g. in the fitting via singular value decomposition (ML_MODE=REFITorML_IALGO_LINREG=4), the best is to keep this parameter constant at 1 and control the regularization via the precision parameter[math]\\displaystyle{ s_{\\mathrm{w}} }[/math]\nFor the theory of this regularization parameter seethis section.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SIGV0", "description_cn": "ML_SIGV0参数用于设置机器学习力场方法中拟合的噪声参数。", "default_value": "1.0", "details_cn": "此标志设置机器学习力场方法中拟合的噪声参数[math] s_{v} [/math]（定义见此处）。如果需要手动控制正则化，例如通过奇异值分解进行拟合（ML_MODE=REFIT或ML_IALGO_LINREG=4），最好将此参数保持为常数1，并通过精度参数[math] s_{w} [/math]来控制正则化。关于此参数的理论...", "recommended": "推荐值为1.0。使用场景：当使用ML_MODE=REFIT或ML_IALGO_LINREG=4进行手动正则化控制时，建议保持ML_SIGV0=1.0，并通过精度参数s_w调整正则化强度。", "tips": "在自动拟合模式下，此参数可能由程序自动设置；手动调整时需谨慎，以免影响拟合精度；建议参考VASP官方文档了解详细理论和参数协调使用。"}, "ML_SIGW0": {"name": "ML_SIGW0", "description": "ML_SIGW0= [real]Default: none", "default": "ML_SIGW0= [real]Default: none", "details": "Description: This flag sets the precision parameter[math]\\displaystyle{ s_{\\mathrm{w}} }[/math](seeherefor definition) for the fitting in the machine learning force field method.\nThe default value forML_MODE=REFITworks reliably in most calculations, however, sometimes it is necessary to increase the regularization parameter to avoid instabilities during finite temperature molecular dynamics simulations.\nSuppose the regularization needs to be controlled manually, like e.g. in the fitting via singular value decomposition (ML_MODE=REFITorML_IALGO_LINREG=4). The best is to control the regularization via this parameter and keep the noise parameter[math]\\displaystyle{ s_{\\mathrm{v}} }[/math](seeML_SIGV0)", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SIGW0", "description_cn": "ML_SIGW0= [实数] 默认值：无", "default_value": "无", "details_cn": "此标志设置机器学习力场方法中拟合的精度参数 s_w（定义见此处）。对于ML_MODE=REFIT，默认值在大多数计算中可靠工作，但有时需要增加正则化参数以避免有限温度分子动力学模拟中的不稳定性。假设正则化需要手动控制，例如在通过单拟合时。", "recommended": "默认值（无），但在有限温度分子动力学模拟中出现不稳定性时，建议增加此参数的值（例如设置为正实数）。使用场景：用于优化机器学习力场的拟合精度，特别是在动态模拟中需要提高稳定性时。", "tips": "默认值通常足够，但需根据具体计算调整；手动设置时，参考参数定义以避免错误；在分子动力学模拟中监控稳定性，必要时逐步增加参数值。"}, "ML_SION1": {"name": "ML_SION1", "description": "ML_SION1= [real]Default:ML_SION1= 0.5", "default": "ML_SION1= [real]Default:ML_SION1= 0.5", "details": "Description: This tag specifies the width[math]\\displaystyle{ \\sigma_\\text{atom} }[/math]of the Gaussian functions used for broadening the atomic distributions of the radial descriptor[math]\\displaystyle{ \\rho^{(2)}_i(r) }[/math]within the machine learning force field method.\nThe radial descriptor is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(2)}\\left(r\\right) = \\frac{1}{4\\pi} \\int \\rho_{i}\\left(r\\hat{\\mathbf{r}}\\right) d\\hat{\\mathbf{r}}, \\quad \\text{where} \\quad\n\\rho_{i}\\left(\\mathbf{r}\\right) = \\sum\\limits_{j=1}^{N_{\\mathrm{a}}} f_{\\mathrm{cut}}\\left(r_{ij}\\right) g\\left(\\mathbf{r}-\\mathbf{r}_{ij}\\right", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SION1", "description_cn": "ML_SION1 参数指定用于机器学习力场方法中径向描述符原子分布展宽的高斯函数宽度。", "default_value": "0.5", "details_cn": "此标签指定在机器学习力场方法中，用于展宽径向描述符 \\rho^{(2)}_i(r) 的原子分布的高斯函数宽度 \\sigma_{\\text{atom}}。径向描述符由以下公式构建：\\rho_{i}^{(2)}(r) = \\frac{1}{4\\pi} \\int \\rho_{i}(r\\hat{\\mathbf{r}}) d\\hat{\\mathbf{r}}，其中 \\rho_{i}(\\mathbf{r}) 是原子 i 的电荷密度分布。", "recommended": "默认值 0.5 通常适用于大多数体系，但建议根据具体计算需求进行优化。使用场景：在 VASP 机器学习力场计算中，用于控制径向描述符的平滑度，影响模型精度和稳定性。", "tips": "ML_SION1 值过小可能导致过拟合，过大可能导致欠拟合；建议在训练数据集上进行参数扫描以找到最佳值，并结合其他 ML 参数（如 ML_SION2）进行协同调整。"}, "ML_SION2": {"name": "ML_SION2", "description": "ML_SION2= [real]Default:ML_SION2=ML_SION1", "default": "ML_SION2= [real]Default:ML_SION2=ML_SION1", "details": "Description: This tag specifies the width[math]\\displaystyle{ \\sigma_\\text{atom} }[/math]of the Gaussian functions used for broadening the atomic distributions of the angular descriptor[math]\\displaystyle{ \\rho^{(3)}_i(r) }[/math]within the machine learning force field method.\nThe angular descriptor is constructed from\n[math]\\displaystyle{ \n\\rho_{i}^{(3)}\\left(r,s,\\theta\\right) = \\iint d\\hat{\\mathbf{r}} d\\hat{\\mathbf{s}}  \\delta\\left(\\hat{\\mathbf{r}}\\cdot\\hat{\\mathbf{s}} - \\mathrm{cos}\\theta\\right) \\sum\\limits_{j=1}^{N_{a}} \\sum\\limits_{k \\ne j}^{N_{a}} \\rho_{ik} \\left(r\\hat{\\mathbf{r}}\\right) \\rho_{ij} \\left(s\\ha", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SION2", "description_cn": "ML_SION2= [实数] 默认值：ML_SION2=ML_SION1", "default_value": "[实数] 默认值：ML_SION2=ML_SION1", "details_cn": "此标签指定了在机器学习力场方法中用于展宽角描述符[math]\\displaystyle{ \\rho^{(3)}_i(r) }[/math]的原子分布的高斯函数的宽度[math]\\displaystyle{ \\sigma_\\text{atom} }[/math]。角描述符由以下公式构建：[math]\\displaystyle{ \\rho_{i}^{(3)}\\left(r,s,\\theta\\right) = \\iint d\\hat{\\mathbf{r}} d\\hat{\\mathbf{s}}  \\delta\\left(\\hat{\\mathbf{r}}\\cdot\\hat{\\mathbf{s}} - \\mathrm{cos}\\theta\\rig", "recommended": "通常保持默认值ML_SION1，除非在机器学习力场计算中需要调整角描述符的展宽宽度以优化精度。使用场景：适用于VASP机器学习力场（ML_FF）计算，当需要控制原子分布的平滑性时，可微调此参数。", "tips": "ML_SION2应与ML_SION1协调设置，避免值过小导致描述符不平滑或过大导致计算效率降低；建议在测试计算中逐步调整，并参考VASP官方文档或相关文献。"}, "ML_SRPOT_B0": {"name": "ML_SRPOT_B0", "description": "ML_SRPOT_B0= [real]Default:ML_SRPOT_B0= 1.0", "default": "ML_SRPOT_B0= [real]Default:ML_SRPOT_B0= 1.0", "details": "Description: Specifies the height of a soft repulsive exponential potential used as an auxiliary potential in thermodynamic integration (VCAIMAGES).\nThis parameters sets the height[math]\\displaystyle{ b }[/math]of the following repulsive exponential potential\n[math]\\displaystyle{  \nV(r) = b e^{-(r/\\sigma)^n}. \n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SRPOT_B0", "description_cn": "ML_SRPOT_B0指定软排斥指数势的高度，用作热力学积分（VCAIMAGES）中的辅助势。", "default_value": "1.0", "details_cn": "指定软排斥指数势的高度，该势用作热力学积分（VCAIMAGES）中的辅助势。此参数设置以下排斥指数势的高度b：V(r) = b e^{-(r/\\sigma)^n}。", "recommended": "推荐值为默认值1.0，适用于大多数热力学积分计算。具体值可能需要根据系统调整，以优化势能面。使用场景包括VASP中的机器学习力场和VCAIMAGES方法。", "tips": "参数值应合理设置，避免过大导致计算不稳定或过小影响辅助势效果。建议与ML_SRPOT_SIGMA和ML_SRPOT_N参数配合使用，并参考VASP文档进行调试。"}, "ML_SRPOT_N0": {"name": "ML_SRPOT_N0", "description": "ML_SRPOT_N0= [integer]Default:ML_SRPOT_N0= 10", "default": "ML_SRPOT_N0= [integer]Default:ML_SRPOT_N0= 10", "details": "Description: Specifies the exponent of a soft repulsive exponential potential used as an auxiliary potential in thermodynamic integration (VCAIMAGES).\nThis parameters sets the exponent[math]\\displaystyle{ n }[/math]of the following repulsive exponential potential\n[math]\\displaystyle{  \nV(r) = b e^{-(r/\\sigma)^n}. \n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SRPOT_N0", "description_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的软排斥指数势的指数。", "default_value": "10", "details_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的软排斥指数势的指数。此参数设置以下排斥指数势的指数[math]\\displaystyle{ n }[/math]：[math]\\displaystyle{ V(r) = b e^{-(r/\\sigma)^n}. }[/math]", "recommended": "默认值10适用于大多数热力学积分计算。使用场景：在VCAIMAGES方法中，用于控制辅助排斥势的形状，以优化路径积分收敛。建议根据具体体系测试调整，以平衡计算精度和效率。", "tips": "此参数仅在使用VCAIMAGES方法时相关。指数n影响势的衰减速度，过大可能导致数值不稳定，过小可能减弱排斥效果，建议进行收敛性测试。"}, "ML_SRPOT_S0": {"name": "ML_SRPOT_S0", "description": "ML_SRPOT_S0= [real]Default:ML_SRPOT_S0= 2.0", "default": "ML_SRPOT_S0= [real]Default:ML_SRPOT_S0= 2.0", "details": "Description: Specifies the broadening of a soft repulsive exponential potential used as an auxiliary potential in thermodynamic integration (VCAIMAGES).\nThis parameters sets the broadening[math]\\displaystyle{ \\sigma }[/math]of the following repulsive exponential potential\n[math]\\displaystyle{  \nV(r) = b e^{-(r/\\sigma)^n}. \n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_SRPOT_S0", "description_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的软排斥指数势的展宽。", "default_value": "2.0", "details_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的软排斥指数势的展宽。此参数设置以下排斥指数势的展宽σ：V(r) = b e^{-(r/σ)^n}。", "recommended": "默认值为2.0，通常适用于大多数标准计算。使用场景：在热力学积分中，当使用VCAIMAGES方法进行自由能计算时，此参数用于控制辅助势的展宽，以优化势能面。建议根据具体系统（如原子类型、键长）进行测试调整，例如通过收敛性测试选择合适σ值。", "tips": "1. 参数值必须为正实数，避免设置为零或负值。2. 需与参数ML_SRPOT_N（控制指数n）配合使用，以定义完整的排斥势形状。3. 展宽σ应与系统中原子间典型距离尺度匹配，过大可能导致势过于平缓，过小可能引起数值不稳定。4. 在热力学积分中，辅助势的展宽影响自由能计算的精度和收敛性，建议在模拟前进行小规模测试。"}, "ML_TYPE": {"name": "ML_TYPE", "description": "ML_TYPE= kernel | vasp | graceDefault:ML_TYPE=  kernel", "default": "ML_TYPE= kernel | vasp | graceDefault:ML_TYPE=  kernel", "details": "Description: String-based tag selecting type of machine-learned force field to use.\nGiven that machine-learned force fields are enabled (ML_LMLFF= .TRUE.) this tag selects which type of force field is used.\nUse VASP's nativemachine-learned force fieldswith theoretical background describedhere. The stringskernelandvaspare synonymous in this context.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_TYPE", "description_cn": "ML_TYPE 参数用于选择机器学习力场的类型，可选值为 kernel、vasp 或 grace，默认值为 kernel。", "default_value": "kernel", "details_cn": "基于字符串的标签，用于选择要使用的机器学习力场类型。当机器学习力场启用时（ML_LMLFF= .TRUE.），此标签选择使用哪种力场。使用 VASP 的原生机器学习力场，其理论背景在此描述。字符串 'kernel' 和 'vasp' 在此上下文中是同义的。", "recommended": "推荐使用默认值 kernel，因为它与 vasp 同义且是 VASP 的原生实现，适用于大多数机器学习力场计算场景。使用场景：在进行第一性原理计算并需要机器学习力场时，设置 ML_LMLFF= .TRUE. 并选择 ML_TYPE= kernel 或 vasp 以启用力场。", "tips": "1. 确保 ML_LMLFF 设置为 .TRUE. 以启用机器学习力场，否则 ML_TYPE 无效。2. kernel 和 vasp 选项是同义的，可以互换使用，无需担心差异。3. 如果使用 grace 选项，请参考 VASP 官方文档以了解其具体功能和适用场景，因为详细信息中未详细说明。"}, "ML_W1": {"name": "ML_W1", "description": "ML_W1= [real]Default:ML_W1= 0.1", "default": "ML_W1= [real]Default:ML_W1= 0.1", "details": "Description: This tag defines the weight[math]\\displaystyle{ \\beta }[/math]for the radial (and angular) descriptor within the machine learning force field method (seethis section).\nThe weight for the angular descriptor[math]\\displaystyle{ W_{2} }[/math]is internally computed from the weight of the radial descriptor[math]\\displaystyle{ W_{1} }[/math]as:\n[math]\\displaystyle{ W_{2}=1.0-W_{1}. }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_W1", "description_cn": "ML_W1 参数，类型为实数，默认值为 0.1。", "default_value": "0.1", "details_cn": "此标签定义了机器学习力场方法中径向（和角度）描述符的权重 β（参见此节）。角度描述符的权重 W2 是从径向描述符的权重 W1 内部计算得出的：W2 = 1.0 - W1。", "recommended": "默认值 0.1 适用于大多数情况。使用场景：在机器学习力场计算中，用于调整径向和角度描述符的权重。如果系统对角度变化敏感，可适当增加 W1 值以增强径向描述；反之，减少 W1 值以侧重角度描述。建议从默认值开始，根据计算精度和系统特性微调。", "tips": "W1 和 W2 的和必须为 1.0，因此调整 W1 时 W2 会自动变化。确保在机器学习力场方法中正确设置此参数，并参考 VASP 官方文档以获取更多细节和示例。"}, "ML_WTIFOR": {"name": "ML_WTIFOR", "description": "Description: This tag sets the weight for the scaling of the forces in the training data within the machine learning force field method.", "default": "Default:ML_WTIFOR", "details": "Description: This tag sets the weight for the scaling of the forces in the training data within the machine learning force field method.\nML_IWEIGHT,ML_WTOTEN,ML_WTIFOR,ML_WTSIFform a group of tags which set the normalization and weighting of ab initio training data, i.e.  energies, forces and stresses of the training structures. The main control tag isML_IWEIGHT, please also have a look at its detailed description. IfML_IWEIGHT=1 the\nML_LMLFF,ML_IWEIGHT,ML_WTOTEN,ML_WTSIF,ML_IALGO_LINREG", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_WTIFOR", "description_cn": "ML_WTIFOR 设置机器学习力场方法中训练数据力的缩放权重。", "default_value": "ML_WTIFOR", "details_cn": "此标签设置机器学习力场方法中训练数据力的缩放权重。ML_IWEIGHT、ML_WTOTEN、ML_WTIFOR、ML_WTSIF 形成一组标签，用于设置从头算训练数据的归一化和权重，即训练结构的能量、力和应力。主控制标签是 ML_IWEIGHT，请也查看其详细描述。如果 ML_IWEIGHT=1，则 ML_LMLFF、ML_IWEIGHT、ML_WTOTEN、ML_WTSIF、ML_IALGO_LINREG", "recommended": "推荐值为 1.0（默认值）。使用场景：当需要调整力的权重以优化机器学习力场训练时，例如，如果力的计算误差较大，可以增加权重；如果力的噪声较大，可以减少权重。", "tips": "ML_WTIFOR 与 ML_IWEIGHT、ML_WTOTEN、ML_WTSIF 等参数一起使用，形成权重设置组。主控制标签是 ML_IWEIGHT，当 ML_IWEIGHT=1 时，可能使用默认权重。建议根据训练数据的质量和计算需求调整此参数。"}, "ML_WTOTEN": {"name": "ML_WTOTEN", "description": "Description: Sets a scaling of the fitted potential energy.", "default": "Default:ML_WTOTEN", "details": "Description: Sets a scaling of the fitted potential energy.\nForML_IWEIGHT=2 and 3 (default), the potential energy in the training data set is multiplied byML_WTOTEN(unitless). We recommend increasingML_WTOTENif you plan to apply the force field in a simulation where the accuracy of the total energy is most important. This puts a focus on the energy error and\nForML_IWEIGHT=1,ML_WTOTENhas the unit of eV/atom, and the potential energy in the training data set is divided by it.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_WTOTEN", "description_cn": "设置拟合势能的缩放比例。", "default_value": "ML_WTOTEN", "details_cn": "设置拟合势能的缩放比例。对于 ML_IWEIGHT=2 和 3（默认），训练数据集中的势能乘以 ML_WTOTEN（无量纲）。如果您计划在模拟中应用力场，且总能量的准确性最为重要，我们建议增加 ML_WTOTEN。这将重点放在能量误差上。对于 ML_IWEIGHT=1，ML_WTOTEN 的单位是 eV/原子，训练数据集中的势能除以它。", "recommended": "推荐在需要高总能量精度的模拟中增加 ML_WTOTEN；对于 ML_IWEIGHT=1，单位为 eV/原子，需相应调整。具体值需根据体系测试确定。", "tips": "ML_WTOTEN 的作用取决于 ML_IWEIGHT 的设置。对于 ML_IWEIGHT=2 和 3，ML_WTOTEN 无量纲；对于 ML_IWEIGHT=1，单位为 eV/原子。调整时需考虑能量误差的权重。"}, "ML_WTSIF": {"name": "ML_WTSIF", "description": "Description: This tag sets the weight for the scaling of the stress in the training data within the machine learning force field method.", "default": "Default:ML_WTSIF", "details": "Description: This tag sets the weight for the scaling of the stress in the training data within the machine learning force field method.\nML_IWEIGHT,ML_WTOTEN,ML_WTIFOR,ML_WTSIFform a group of tags which set the normalization and weighting of ab initio training data, i.e.  energies, forces and stresses of the training structures. The main control tag isML_IWEIGHT, please also have a look at its detailed description. IfML_IWEIGHT=1 the\nML_LMLFF,ML_IWEIGHT,ML_WTIFOR,ML_WTOTEN,ML_IALGO_LINREG", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_WTSIF", "description_cn": "此标签设置机器学习力场方法中训练数据应力缩放的权重。", "default_value": "ML_WTSIF", "details_cn": "此标签设置机器学习力场方法中训练数据应力缩放的权重。ML_IWEIGHT、ML_WTOTEN、ML_WTIFOR、ML_WTSIF 形成一组标签，用于设置从头算训练数据的归一化和权重，即训练结构的能量、力和应力。主控制标签是 ML_IWEIGHT，请同时查看其详细描述。如果 ML_IWEIGHT=1，则 ML_LMLFF、ML_IWEIGHT、ML_WTIFOR、ML_WTOTEN、ML_IALGO_LINREG", "recommended": "推荐值为1.0，适用于需要平衡应力数据在机器学习力场训练中的权重时，例如当应力对系统稳定性或材料性质预测至关重要时。", "tips": "确保与ML_IWEIGHT、ML_WTOTEN、ML_WTIFOR等参数协调设置，以避免训练数据权重失衡。默认值可能因VASP版本或具体设置而异，建议参考官方文档或进行测试调整。"}, "M_CONSTR": {"name": "M_CONSTR", "description": "M_CONSTR= [real array]Default:M_CONSTR= 3*NIONS*0.0", "default": "M_CONSTR= [real array]Default:M_CONSTR= 3*NIONS*0.0", "details": "Description:M_CONSTRspecifies the desired local magnetic moment (size and/or direction) for the constrained local moments approach.\nTheM_CONSTRtag sets the desired size and/or direction of the integrated local magnetic moments in cartesian coordinates.\nFor each ion 3 coordinates must be specified, i.e., for a system ofNions", "wiki_url": "https://www.vasp.at/wiki/index.php/M_CONSTR", "description_cn": "M_CONSTR指定约束局部磁矩方法中期望的局部磁矩（大小和/或方向）。", "default_value": "默认值为所有离子的三个笛卡尔坐标分量均为0.0，即M_CONSTR = 3*NIONS*0.0。", "details_cn": "M_CONSTR指定约束局部磁矩方法中期望的局部磁矩（大小和/或方向）。M_CONSTR标签设置积分局部磁矩在笛卡尔坐标系中的期望大小和/或方向。对于每个离子，必须指定3个坐标，即对于N个离子的系统。", "recommended": "根据具体系统设置，例如在铁磁或反铁磁材料中设置期望的磁矩方向和大小。使用场景：用于约束局部磁矩，以控制磁性计算中的磁矩方向和大小，适用于需要固定磁矩的模拟。", "tips": "确保M_CONSTR数组的顺序与POSCAR中离子的顺序一致；过度约束可能导致计算不收敛或结果不准确；建议先进行无约束计算以了解系统磁性，再谨慎设置约束值。"}, "NATURALO": {"name": "NATURALO", "description": "NATURALO= [integer]Default:NATURALO= 0; for low scaling GW type calculations the default is 4", "default": "NATURALO= [integer]Default:NATURALO= 0; for low scaling GW type calculations the default is 4", "details": "Description: calculate RPA natural orbitals.\nThis flag should be used in combination withALGO= G0W0R orALGO= scGW0R.  The VASP code diagonalizes the RPA density\nmatrix and writes the final natural orbitals to theWAVECARfile.\nThe one-electron occupancies on theWAVECARfile can also be updated to the eigenvalues of the RPA density matrix. ForALGO\n[math]\\displaystyle{ \nG = G_0 + G_0 \\Sigma G_0\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/NATURALO", "description_cn": "计算RPA自然轨道。", "default_value": "默认值为0；对于低标度GW类型计算，默认值为4。", "details_cn": "计算RPA自然轨道。此标志应与ALGO= G0W0R或ALGO= scGW0R结合使用。VASP代码对角化RPA密度矩阵，并将最终自然轨道写入WAVECAR文件。WAVECAR文件上的一电子占据数也可以更新为RPA密度矩阵的特征值。对于ALGO [数学公式：G = G_0 + G_0 Σ G_0]", "recommended": "对于标准GW计算，使用默认值0；对于低标度GW计算，使用默认值4。使用场景：在GW近似计算中，当需要计算RPA自然轨道时使用，例如在精确电子结构分析或后续相关计算中。", "tips": "1. 必须与ALGO= G0W0R或ALGO= scGW0R结合使用，否则设置无效；2. 设置NATURALO会影响计算精度和资源消耗，建议根据计算需求调整；3. 在低标度计算中，默认值4可能优化性能，但需测试以确保准确性。"}, "NBANDS": {"name": "NBANDS", "description": "[math]\\displaystyle{ N_{\\mathrm{elect}} }[/math]isNELECTand[math]\\displaystyle{ N_{\\mathrm{ions}} }[/math]is the number of ions (NIONSinOUTCAR).", "default": "Default:NBANDS", "details": "[math]\\displaystyle{ N_{\\mathrm{elect}} }[/math]isNELECTand[math]\\displaystyle{ N_{\\mathrm{ions}} }[/math]is the number of ions (NIONSinOUTCAR).\nDescription:NBANDSspecifies the total number of KS or QP orbitals in the calculation.\nThe right choice ofNBANDSstrongly depends on the type of the performed calculation and the system. As a minimum, VASP requires all occupied states + one empty band, otherwise, a warning is given.", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDS", "description_cn": "NBANDS 指定计算中 Kohn-Sham (KS) 或准粒子 (QP) 轨道的总数。", "default_value": "由 VASP 自动计算（基于 NELECT 和 NIONS）", "details_cn": "NBANDS 指定计算中 Kohn-Sham (KS) 或准粒子 (QP) 轨道的总数。NBANDS 的正确选择强烈依赖于所执行计算的类型和系统。作为最低要求，VASP 需要所有占据态加上一个空带，否则会给出警告。", "recommended": "对于绝缘体，建议设置 NBANDS = NELECT/2 + 10；对于金属，建议设置 NBANDS = NELECT/2 + NIONS 或更多。使用场景：能带结构计算、态密度计算等需要额外空带的情况。", "tips": "确保 NBANDS 至少为占据态数量（NELECT/2）加一，以避免警告。NBANDS 过大会增加计算时间和内存消耗，应根据系统大小和计算类型合理设置。"}, "NBANDSEXACT": {"name": "NBANDSEXACT", "description": "NBANDSEXACT= [integer]", "default": "Default:NBANDSEXACT", "details": "Description:NBANDSEXACTspecifies the number of bands used in the all-in-one mode ofmany-body perturbation theorycalculations.\nIn the all-in-one mode, VASP automatically performs the necessary DFT steps prior to the many-body perturbation theory (MBPT) calculation, i.e. a DFT calculation withNBANDS, followed by an exact diagonalization of the Kohn-Sham Hamiltonian withNBANDSEXACTbands. \nNote,NBANDSEXACTis set by default to \nThe all-in-one mode is automatically enabled forALGO=[EV]GW[0]R, RPA[R],ACFDT[R] ifNBANDSis not set.", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDSEXACT", "description_cn": "NBANDSEXACT是一个整数参数，用于指定能带数。", "default_value": "默认值未明确指定，通常与NBANDS参数相关或基于计算设置。", "details_cn": "NBANDSEXACT指定在多体微扰理论计算的全合一模式中使用的能带数。在全合一模式中，VASP自动执行多体微扰理论（MBPT）计算之前的必要DFT步骤，即使用NBANDS进行DFT计算，然后使用NBANDSEXACT个能带对Kohn-Sham哈密顿量进行精确对角化。注意，NBANDSEXACT默认设置为（信息不完整）。全合一模式自动启用对于ALGO=[EV]GW[0]R、RPA[R]等设置。", "recommended": "根据计算体系和收敛性测试确定。对于GW或RPA计算，通常设置NBANDSEXACT为NBANDS的1.5到2倍，以确保能带覆盖足够。使用场景：当使用ALGO=GW0、GW、RPA等多体微扰理论方法时，启用全合一模式。", "tips": "确保NBANDSEXACT不超过VASP计算中总能带数；在全合一模式下，VASP会自动处理DFT步骤，但用户需正确设置NBANDS和NBANDSEXACT以避免错误；默认值可能依赖于其他参数，建议查阅VASP官方文档或通过收敛测试优化设置。"}, "NBANDSGW": {"name": "NBANDSGW", "description": "NBANDSGW= [integer]Default:NBANDSGW=  twice the number of occupied states", "default": "NBANDSGW= [integer]Default:NBANDSGW=  twice the number of occupied states", "details": "Description: The flag determines how many QP energies are calculated and updated in GW type calculations.\nThis value usually needs to be increased somewhat for partially or fully self-consistent calculations. Very accurate results\nare only obtained whenNBANDSGWapproachesNBANDS, although this  dramatically increases the computational requirements.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDSGW", "description_cn": "NBANDSGW是一个整数参数，默认值为占据态数量的两倍。", "default_value": "占据态数量的两倍", "details_cn": "该标志决定了在GW类型计算中计算和更新的准粒子（QP）能量数量。对于部分或完全自洽计算，通常需要稍微增加这个值。只有当NBANDSGW接近NBANDS时才能获得非常准确的结果，尽管这会显著增加计算需求。使用此标签的示例。", "recommended": "对于标准GW计算，使用默认值（占据态数量的两倍）即可。对于自洽GW计算，建议增加NBANDSGW，例如设置为NBANDS的50%至100%，以提高准确性。使用场景：GW计算，特别是需要高精度准粒子能量的自洽计算。", "tips": "增加NBANDSGW会显著增加计算资源和时间。对于大型体系，需权衡精度与计算成本。确保NBANDSGW不超过NBANDS，否则可能无效或导致错误。"}, "NBANDSO": {"name": "NBANDSO", "description": "Description:NBANDSOdetermines how many occupied orbitals are included in the Casida/BSE calculationsor time propagation (ALGO=TIMEEV.", "default": "Default:NBANDSO", "details": "Description:NBANDSOdetermines how many occupied orbitals are included in the Casida/BSE calculationsor time propagation (ALGO=TIMEEV.\nFor the time-propagation algorithm increasingNBANDSOonly modestly increases the compute time.\nFor BSE and Casida-type calculations, the compute time  grows with the third power of the number of included occupied and unoccupied bands\n[math]\\displaystyle{  (N_{\\mathrm{occ}} N_{\\mathrm{virtual}} N_{\\mathrm{k}})^{3}  }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDSO", "description_cn": "NBANDSO 决定了在 Casida/BSE 计算或时间传播（ALGO=TIMEEV）中包含多少个占据轨道。", "default_value": "NBANDSO", "details_cn": "NBANDSO 决定了在 Casida/BSE 计算或时间传播（ALGO=TIMEEV）中包含多少个占据轨道。对于时间传播算法，增加 NBANDSO 仅会适度增加计算时间。对于 BSE 和 Casida 类型的计算，计算时间随着包含的占据和非占据能带数量的三次方增长，即 (N_occ * N_virtual * N_k)^3。", "recommended": "推荐值取决于计算类型：对于时间传播（ALGO=TIMEEV），可以适当增加 NBANDSO 以提高精度，因为计算时间增加不显著；对于 BSE 和 Casida 计算，建议谨慎设置，通常设置为略高于占据能带数，以平衡精度和计算成本。具体值需根据系统大小和计算目标调整。", "tips": "对于 BSE 和 Casida 计算，计算时间随能带数三次方增长，因此避免设置过大的 NBANDSO 以防止计算成本过高。对于时间传播，影响较小，但增加 NBANDSO 可能提高结果精度。"}, "NBANDSV": {"name": "NBANDSV", "description": "Description:NBANDSVdetermines how many unoccupied orbitals are included in the Casida/BSE calculationsortimepropagation.", "default": "", "details": "Description:NBANDSVdetermines how many unoccupied orbitals are included in the Casida/BSE calculationsortimepropagation.\nFor the time-propagation algorithm increasingNBANDSVonly modestly increases the compute time.\nFor BSE and Casida type calculations, the compute time  grows with the third power of the number of included occupied and unoccupied bands\n[math]\\displaystyle{  (N_{\\mathrm{occ}} N_{\\mathrm{virtual}} N_{\\mathrm{k}})^{3}  }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDSV", "description_cn": "NBANDSV 决定了在 Casida/BSE 计算或时间传播中包含多少未占据轨道。", "default_value": "未指定", "details_cn": "NBANDSV 决定了在 Casida/BSE 计算或时间传播中包含多少未占据轨道。对于时间传播算法，增加 NBANDSV 只会适度增加计算时间。对于 BSE 和 Casida 类型的计算，计算时间随包含的占据和未占据能带数量的三次方增长，公式为：(N_occ * N_virtual * N_k)^3。", "recommended": "根据计算类型和系统大小设置。对于时间传播算法，可适当增加以提高精度，计算时间影响较小；对于 BSE 和 Casida 计算，建议从较小值（如默认或略高于占据能带数）开始测试，逐步增加以平衡精度和计算成本。使用场景：主要用于光学性质计算（如吸收光谱）或激发态计算。", "tips": "对于 BSE 和 Casida 计算，计算时间随 NBANDSV 增加而显著增长（三次方关系），需谨慎选择以避免资源浪费；确保 NBANDSV 不超过系统总能带数；在时间传播中，增加 NBANDSV 对计算时间影响较小，可优先考虑精度需求。"}, "NBANDS_WAVE": {"name": "NBANDS_WAVE", "description": "NBANDS_WAVE= [integer]", "default": "Default:NBANDS_WAVE", "details": "Description:NBANDS_WAVEspecifies the number of bands written toWAVECARin the all-in-one mode ofmany-body perturbation theorycalculations,\ni.e.,ALGO=ACFDT[R],[EV]GW0[R],GWR.\nIn the all-in-one mode, VASP automatically performs the necessary DFT steps prior to the many-body perturbation theory (MBPT) calculation, i.e. a DFT calculation withNBANDS, followed by an exact diagonalization of the Kohn-Sham Hamiltonian withNBANDSEXACTbands. \nNote,NBANDSEXACTis set by default to \nThe all-in-one mode is automatically enabled forALGO=[EV]GW[0]R, RPA[R],ACFDT[R] ifNBANDSis not set.", "wiki_url": "https://www.vasp.at/wiki/index.php/NBANDS_WAVE", "description_cn": "NBANDS_WAVE= [整数]", "default_value": "NBANDS_WAVE", "details_cn": "NBANDS_WAVE 指定在多体微扰理论计算的一体化模式中写入 WAVECAR 的能带数，即 ALGO=ACFDT[R],[EV]GW0[R],GWR。在一体化模式中，VASP 自动执行多体微扰理论 (MBPT) 计算之前的必要 DFT 步骤，即使用 NBANDS 进行 DFT 计算，然后使用 NBANDSEXACT 个能带对 Kohn-Sham 哈密顿量进行精确对角化。注意，NBANDSEXACT 默认设置为", "recommended": "通常设置为与NBANDS相同或略高，具体值需通过收敛测试确定，以确保足够的能带覆盖计算所需的能量范围。使用场景：在VASP中进行GW或ACFDT等多体微扰理论计算时，使用一体化模式（如ALGO=ACFDT、GW0、GWR），需要设置此参数来控制WAVECAR文件中存储的能带数。", "tips": "确保NBANDS_WAVE不超过实际计算的能带数，以避免内存浪费；在一体化模式中，VASP会自动处理DFT步骤，但用户需正确设置NBANDS和NBANDSEXACT参数；NBANDSEXACT的默认值可能影响计算效率和精度，建议根据体系大小和计算目标进行调整。"}, "NBLK": {"name": "NBLK", "description": "Description:NBLKdetermines the blocking factor in many BLAS level 3 routines.", "default": "Default:NBLK", "details": "Description:NBLKdetermines the blocking factor in many BLAS level 3 routines.\nIn some cases, VASP has to perform a unitary transformation of the current orbitals. This is done using a work array CBLOCK and the following FORTRAN code:\nZGEMM is the matrix[math]\\displaystyle{ \\times }[/math]matrix  multiplication command of the BLAS package. The task performed by this call is indicated by the comment line written above the ZGEMM call. GenerallyNBLK=16 or 32 is large enough for super-scalar machines. A large value might be necessary", "wiki_url": "https://www.vasp.at/wiki/index.php/NBLK", "description_cn": "NBLK 决定了许多 BLAS level 3 例程中的阻塞因子。", "default_value": "NBLK", "details_cn": "在某些情况下，VASP 需要对当前轨道进行幺正变换。这是使用工作数组 CBLOCK 和以下 FORTRAN 代码完成的：ZGEMM 是 BLAS 包中的矩阵乘法命令。此调用执行的任务由 ZGEMM 调用上方的注释行指示。通常，NBLK=16 或 32 对于超标量机器来说足够大。", "recommended": "16 或 32。使用场景：在超标量机器上，用于优化 BLAS level 3 例程的性能，特别是在矩阵乘法操作中，以提高计算效率。", "tips": "NBLK 的值应根据具体硬件配置和计算任务规模调整。设置过小可能导致性能下降，设置过大可能增加内存使用。建议在典型计算中使用推荐值，并通过测试确定最佳设置。"}, "NBLOCK": {"name": "NBLOCK", "description": "NBLOCK= [integer]Default:NBLOCK= 1", "default": "NBLOCK= [integer]Default:NBLOCK= 1", "details": "Description: AfterNBLOCKionic steps the pair-correlation function and the DOS are calculated\nand the ionic configuration is written to theXDATCAR-file.\nIt is recommended to leaveNBLOCKto 1, since the computational overhead to determine the DOS and pair correlation function is minimal. Only for  molecular dynamics simulations with many 1000 steps or when using machine-learned force fields, it might be expedient to increaseNBLOCKto say 10 or even 100\nPCDAT,DOSCAR,XDATCAR,KBLOCK,ML_OUTBLOCK", "wiki_url": "https://www.vasp.at/wiki/index.php/NBLOCK", "description_cn": "NBLOCK= [整数] 默认值：NBLOCK= 1", "default_value": "1", "details_cn": "在NBLOCK个离子步之后，计算对关联函数和态密度（DOS），并将离子构型写入XDATCAR文件。建议将NBLOCK保持为1，因为计算DOS和对关联函数的开销很小。仅对于具有数千步的分子动力学模拟或使用机器学习力场时，增加NBLOCK到10甚至100可能是合适的。", "recommended": "推荐值为1，适用于大多数计算场景，如离子弛豫或短时分子动力学模拟。对于大规模分子动力学模拟（步数超过1000步）或使用机器学习力场时，可以增加到10或100以减少输出频率和计算开销。", "tips": "增加NBLOCK会减少输出数据的频率，从而节省磁盘空间和计算时间，但会降低对关联函数和态密度的采样分辨率。在需要高精度输出或分析细节时，应保持NBLOCK=1。"}, "NBLOCK_FOCK": {"name": "NBLOCK_FOCK", "description": "NBLOCK_FOCK= [integer]", "default": "Default:NBLOCK_FOCK", "details": "Description: Sets the number of orbitals that are processed simultaneously when computing the action of the Fock potential.\nInstead of computing the action of the Fock potential on one orbital at a time, up toNBLOCK_FOCKorbitals are gathered and processed at once. This enables the use of matrix-matrix operations rather than matrix-vector operations, which is beneficial for performance on modern hardware.\nTuningNBLOCK_FOCKcan significantly affect both the performance and memory consumption of hybrid functional calculations. Especially on GPUs,NBLOCK_FOCKshould be tuned carefully to achieve optimal performance.", "wiki_url": "https://www.vasp.at/wiki/index.php/NBLOCK_FOCK", "description_cn": "NBLOCK_FOCK 设置为一个整数。", "default_value": "NBLOCK_FOCK", "details_cn": "设置在计算 Fock 势作用时同时处理的轨道数。不是一次计算一个轨道的 Fock 势作用，而是将多达 NBLOCK_FOCK 个轨道收集起来一次性处理。这使得可以使用矩阵-矩阵操作而不是矩阵-向量操作，这对现代硬件的性能有益。调整 NBLOCK_FOCK 可以显著影响杂化泛函的性能和内存消耗。", "recommended": "对于小系统，可使用默认值或较小值如 1；对于大系统或高性能计算，可尝试增大值如 4、8、16 等，以优化性能。使用场景：主要用于杂化泛函计算（如 HSE06），以提高计算效率。", "tips": "增大 NBLOCK_FOCK 会增加内存使用，需根据可用内存调整。建议在调整前进行基准测试，以平衡性能和资源消耗。"}, "NBMOD": {"name": "NBMOD", "description": "NBMOD= -3 | -2 | -1 | 0 | [positive integer]", "default": "Default:NBMOD", "details": "Description:NBMODcontrols how bands are selected when computingpartial charge densities.\nNBMODis used with other tags to define the mode of band selection for partial charge densities inPARCHG,vaspout.h5, orCHGCARfiles. There are several ways to set this tag.\nLPARD,IBAND,EINT,KPUSE,LSEPB,LSEPK,LPARDH5,PARCHG,vaspout.h5,Band-decomposed charge densities", "wiki_url": "https://www.vasp.at/wiki/index.php/NBMOD", "description_cn": "NBMOD可以取值为-3、-2、-1、0或正整数。", "default_value": "0", "details_cn": "NBMOD控制在计算部分电荷密度时如何选择能带。NBMOD与其他标签一起使用，以定义在PARCHG、vaspout.h5或CHGCAR文件中部分电荷密度的能带选择模式。有多种方式设置此标签。相关标签包括LPARD、IBAND、EINT、KPUSE、LSEPB、LSEPK、LPARDH5、PARCHG、vaspout.h5，以及能带分解电荷密度。", "recommended": "0（默认模式，适用于一般计算，自动选择能带）。使用场景：当需要分析特定能带对电荷密度的贡献时，可设置NBMOD为负值（如-1用于基于能量范围选择，-2用于基于能带索引选择，-3用于基于k点选择）并配合IBAND、EINT等标签指定参数；正整数可用于指定能带数量，适用于能带结构分析。", "tips": "NBMOD需与LPARD、IBAND、EINT等标签配合使用，确保参数设置一致；输出文件如PARCHG、vaspout.h5或CHGCAR将包含部分电荷密度信息，注意文件大小可能增加；在计算前建议查阅VASP手册以了解具体模式细节。"}, "NBSEBLOCKO": {"name": "NBSEBLOCKO", "description": "NBSEBLOCKO= [integer]", "default": "Default:NBSEBLOCKO", "details": "Description:NBSEBLOCKOspecifies the blocking factor for the occupied states when setting up the BSE Hamiltonian.\nBy default, the construction of the BSE Hamiltonian in VASP is parallelized overk-points, such that each MPI rank can compute a pair ofk-points. This way the BSE Hamiltonian setup can be parallelized with\nor for spin-polarized case", "wiki_url": "https://www.vasp.at/wiki/index.php/NBSEBLOCKO", "description_cn": "NBSEBLOCKO= [整数]", "default_value": "NBSEBLOCKO", "details_cn": "NBSEBLOCKO指定了在设置BSE哈密顿量时，占据态的阻塞因子。默认情况下，VASP中BSE哈密顿量的构建是并行化在k点上的，这样每个MPI秩可以计算一对k点。这样，BSE哈密顿量设置可以并行化，对于自旋极化情况也是如此。", "recommended": "通常设置为1，但对于大系统或内存受限情况，可增加阻塞因子（如2或更高）以减少内存使用并优化并行效率。使用场景：在进行BSE（Bethe-Salpeter方程）计算时，用于控制占据态的分块，适用于需要并行化或处理大体系的场景。", "tips": "设置NBSEBLOCKO时需考虑系统大小、k点数量和可用内存；值过小可能导致内存不足，值过大可能降低计算效率。建议根据具体计算资源进行测试调整。"}, "NBSEBLOCKV": {"name": "NBSEBLOCKV", "description": "NBSEBLOCKV= [integer]", "default": "Default:NBSEBLOCKV", "details": "Description:NBSEBLOCKVspecifies the blocking factor for the unoccupied states when setting up the BSE Hamiltonian.\nBy default, the construction of the BSE Hamiltonian in VASP is parallelized overk-points, such that each MPI rank can compute a pair ofk-points. This way the BSE Hamiltonian setup can be parallelized with\nor for spin-polarized case", "wiki_url": "https://www.vasp.at/wiki/index.php/NBSEBLOCKV", "description_cn": "NBSEBLOCKV= [整数]", "default_value": "NBSEBLOCKV", "details_cn": "NBSEBLOCKV指定在设置BSE哈密顿量时未占据态的阻塞因子。默认情况下，VASP中BSE哈密顿量的构建在k点上并行化，使得每个MPI rank可以计算一对k点。这样，BSE哈密顿量设置可以并行化，适用于自旋极化情况。", "recommended": "通常设置为1或根据未占据态数量调整（如未占据态较多时可设置为2、4等因子）。使用场景：在BSE（Bethe-Salpeter方程）计算中，用于优化未占据态的处理，提高并行效率或减少内存占用，尤其适用于大型系统或高并行计算环境。", "tips": "阻塞因子的选择应平衡计算效率和内存使用；设置过大可能增加内存需求，过小可能降低并行效率。建议在具体计算中测试不同值，并参考VASP官方文档或社区经验进行调整。"}, "NBSEEIG": {"name": "NBSEEIG", "description": "NBSEEIG= [integer]Default:NBSEEIG= 0", "default": "NBSEEIG= [integer]Default:NBSEEIG= 0", "details": "Description:NBSEEIGsets the number of BSE eigenvectors written to theBSEFATBANDfile. IfBSEHOLEorBSEELECTRONis set,NBSEEIGexciton wavefunctions are written to theCHG.XX files.\nBSE,BSEFATBAND,BSE calculations\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NBSEEIG", "description_cn": "NBSEEIG 设置写入 BSEFATBAND 文件的 BSE 特征向量的数量。", "default_value": "0", "details_cn": "NBSEEIG 设置写入 BSEFATBAND 文件的 BSE 特征向量的数量。如果设置了 BSEHOLE 或 BSEELECTRON，则 NBSEEIG 个激子波函数将写入 CHG.XX 文件。", "recommended": "根据计算需求设置。在 BSE 计算中，如果需要分析特征向量或激子波函数，建议设置为正整数（如 10 或 20），具体取决于系统大小和计算资源。使用场景：用于研究激子性质、光学吸收谱或激子波函数分布时。", "tips": "设置 NBSEEIG 会增加输出文件大小和计算时间，应谨慎设置以避免不必要的开销。确保 BSEHOLE 或 BSEELECTRON 已正确设置以输出激子波函数。默认值为 0 表示不输出任何特征向量或波函数。"}, "NCORE": {"name": "NCORE", "description": "NCORE= [integer]Default:NCORE= 1", "default": "NCORE= [integer]Default:NCORE= 1", "details": "Description:NCOREcontrols how many MPI ranks collaborate on a single band, parallelizing theFFTsfor that band.\nVASP distributes the available MPI ranks into band groups that each work on one band, parallelizing theFFTsfor that band. For the common case thatIMAGES= 1and no other algorithm-dependent parallelization (e.g.,NOMEGAPAR) is active:\nNCOREsets the size of each band group. The number of bands treated in parallel is then:", "wiki_url": "https://www.vasp.at/wiki/index.php/NCORE", "description_cn": "NCORE控制多少个MPI等级协作在一个能带上，为该能带并行化FFT。", "default_value": "1", "details_cn": "NCORE控制多少个MPI等级协作在一个能带上，为该能带并行化FFT。VASP将可用的MPI等级分配到能带组中，每个组处理一个能带，为该能带并行化FFT。在常见情况下，当IMAGES=1且没有其他算法相关的并行化（例如，NOMEGAPAR）激活时：NCORE设置每个能带组的大小。然后并行处理的能带数量为：", "recommended": "推荐值取决于硬件配置，通常设置为每个节点的核心数或其因子，例如对于16核节点，可尝试NCORE=4或8。使用场景：在需要优化并行计算效率时，特别是在大规模计算中，适当设置NCORE可以加速FFT计算。", "tips": "NCORE不能超过总MPI等级数；需要与NPAR等其他并行参数协调；过高NCORE可能导致通信开销增加，降低效率；当IMAGES>1时，NCORE的行为可能不同，需参考VASP文档。"}, "NCORE_IN_IMAGE1": {"name": "NCORE_IN_IMAGE1", "description": "NCORE_IN_IMAGE1= [integer]Default:NCORE_IN_IMAGE1= 0", "default": "NCORE_IN_IMAGE1= [integer]Default:NCORE_IN_IMAGE1= 0", "details": "Description: This tag specifies the number of cores in the first image.\nThis tag works for two images, specifically, ifVCAIMAGESis set (this also setsIMAGES=2).VCAIMAGESsplits the available cores into two groups both working independently in the subdirectories\n01 and 02.\nThe tagNCORE_IN_IMAGE1defines how many of cores are used for the first image (01). The remainder of \nVCAIMAGES,IMAGES,SCALEE", "wiki_url": "https://www.vasp.at/wiki/index.php/NCORE_IN_IMAGE1", "description_cn": "此标签指定第一个图像中使用的核数。", "default_value": "0", "details_cn": "此标签指定第一个图像中使用的核数。此标签适用于两个图像，特别是当VCAIMAGES被设置时（这也会设置IMAGES=2）。VCAIMAGES将可用核分成两组，分别在子目录01和02中独立工作。标签NCORE_IN_IMAGE1定义了用于第一个图像（01）的核数。剩余部分VCAIMAGES, IMAGES, SCALEE", "recommended": "根据总核数设置，例如总核数为N时，可设置NCORE_IN_IMAGE1为N/2以平衡负载；默认值为0可能表示自动分配。使用场景：在VCAIMAGES设置的NEB（Nudged Elastic Band）计算或多图像并行计算中，用于优化核分配以提高效率。", "tips": "确保NCORE_IN_IMAGE1值不超过总核数，并与VCAIMAGES和IMAGES设置协调；默认值为0时，VASP可能自动分配核数，建议根据实际计算资源调整以避免负载不均。"}, "NCRPA_BANDS": {"name": "NCRPA_BANDS", "description": "NCRPA_BANDS= [integer array]", "default": "", "details": "Description: Controls which bands are excluded in the constrained random-phase approximation. Check alsoNTARGET_STATES.\nThis tag is effective forALGO= CRPAand ignored otherwise.\nremoves all screening effects between bands 21, 22 and 23 from the constrained random-phase approximation of the screened Coulomb interaction.", "wiki_url": "https://www.vasp.at/wiki/index.php/NCRPA_BANDS", "description_cn": "NCRPA_BANDS= [整数数组]", "default_value": "无", "details_cn": "控制在约束随机相位近似中哪些能带被排除。另请检查NTARGET_STATES。此标签仅在ALGO=CRPA时有效，否则被忽略。例如，它从屏蔽库仑相互作用的约束随机相位近似中移除带21、22和23之间的所有屏蔽效应。", "recommended": "无固定推荐值，需根据具体计算需求设置。例如，若要排除特定能带之间的屏蔽效应，可设置如NCRPA_BANDS = 21 22 23。使用场景：在ALGO=CRPA的计算中，用于自定义能带排除以研究特定电子关联效应，如强关联体系中的局域电子相互作用。", "tips": "1. 此参数仅在ALGO=CRPA时有效，其他算法下被忽略。2. 需与NTARGET_STATES参数配合使用以确保正确性。3. 设置时需确保能带索引在计算范围内，避免索引错误导致计算失败。"}, "NEDOS": {"name": "NEDOS", "description": "NEDOS= [integer]Default:NEDOS=[math]\\displaystyle{ 301 }[/math]", "default": "NEDOS= [integer]Default:NEDOS=[math]\\displaystyle{ 301 }[/math]", "details": "Description: Number of grid points for the electronicdensity of states(DOS) anddielectric function.\nThe energy range betweenEMINandEMAXis divided intoNEDOSintervals to obtain the grid points. The DOS for the corresponding energy is written in theDOSCARfile.\nThe smallest peak widths from the dispersion of the respective bands can be estimated by having a look at the Kohn-Sham eigenvalues written inOUTCAR.NEDOShas to be chosen sufficiently large to resolve this dispersion. In addition, the\nenergy interval defined byEMINandEMAXcan be modified.", "wiki_url": "https://www.vasp.at/wiki/index.php/NEDOS", "description_cn": "NEDOS参数用于设置电子态密度和介电函数的网格点数。", "default_value": "301", "details_cn": "电子态密度（DOS）和介电函数的网格点数。能量范围在EMIN和EMAX之间被分成NEDOS个间隔以获得网格点。相应能量的DOS写入DOSCAR文件。通过查看OUTCAR中写入的Kohn-Sham本征值，可以估计各能带色散的最小峰宽。NEDOS必须选择足够大以解析这种色散。此外，能量", "recommended": "默认值301适用于大多数常规计算。对于需要高分辨率态密度的场景，如金属体系、窄带隙材料或精细能带结构分析，建议增加到501或更高（如1001）。使用场景：计算电子态密度、光学性质（介电函数）时，确保能带色散被充分解析。", "tips": "1. NEDOS需足够大以解析能带色散，可通过检查OUTCAR中的Kohn-Sham本征值估计峰宽。2. 与EMIN和EMAX参数配合，设置合适的能量范围以覆盖相关能带。3. 过大的NEDOS会增加计算时间和存储开销，需权衡精度与效率。"}, "NELECT": {"name": "NELECT", "description": "NELECT= [real]Default:NELECT= number of valence electrons", "default": "NELECT= [real]Default:NELECT= number of valence electrons", "details": "Description:NELECTsets the number of electrons.\nThe number of electrons is determined automatically from thePOTCAR(ZVAL of the element) andPOSCARfile (number of the atoms of the respective atom type) assuming the cell is charge-neutral.\nIf the number of electrons is not compatible with the number derived from the valence and the number of atoms a\nThe required first-order correction to the energy caused by an excess charge is given by", "wiki_url": "https://www.vasp.at/wiki/index.php/NELECT", "description_cn": "NELECT参数用于设置电子数。默认值为价电子数。", "default_value": "价电子数", "details_cn": "NELECT设置电子数。电子数由POTCAR（元素的ZVAL）和POSCAR文件（相应原子类型的原子数）自动确定，假设晶胞是电荷中性的。如果电子数与从价电子和原子数推导出的数不兼容，则由于多余电荷引起的能量需要一阶修正。", "recommended": "推荐保持默认值，即自动计算的价电子数。使用场景：当需要模拟带电系统、缺陷或调整电荷状态时，手动设置NELECT。", "tips": "设置NELECT时，需确保与POTCAR和POSCAR中的原子信息一致。如果设置非默认值，系统会带电荷，可能需要考虑周期性边界条件下的静电修正，并建议使用VASP的电荷修正功能。"}, "NELM": {"name": "NELM", "description": "NELM= [integer]Default:NELM= 60", "default": "NELM= [integer]Default:NELM= 60", "details": "Description:NELMsets the maximum number of electronic SC (self-consistency) steps.\nNormally, there is no need to change the default value: if the self-consistency loop does not converge within 40 steps, it will probably not converge at all. In this case you should reconsider the tagsIALGOorALGO,LSUBROT, and themixing parameters.\nThe same stands forALGO= TIMEEV, as the value is set to be sufficient to ensure numerical stability when propagating in time. If you wish to set it by yourself, be advised that the input value must be greater than 100, otherwise VASP will ignore it and fall to the default settings.", "wiki_url": "https://www.vasp.at/wiki/index.php/NELM", "description_cn": "NELM设置电子自洽（SC）步数的最大值。", "default_value": "60", "details_cn": "NELM设置电子自洽（SC）步数的最大值。通常情况下，无需更改默认值：如果自洽循环在40步内未收敛，很可能根本不会收敛。在这种情况下，您应重新考虑IALGO或ALGO、LSUBROT以及混合参数。对于ALGO= TIMEEV，同样如此，因为该值设置为足以确保时间传播时的数值稳定性。如果您希望自行设置，请注意...", "recommended": "推荐保持默认值60。使用场景：对于大多数计算，无需更改；如果遇到收敛问题，应优先调整IALGO、ALGO、LSUBROT和混合参数，而不是增加NELM。", "tips": "不要轻易更改NELM默认值，因为如果自洽在40步内未收敛，增加步数可能无效。应检查其他参数设置，如IALGO、ALGO、LSUBROT和混合参数。"}, "NELMDL": {"name": "NELMDL", "description": "Description:NELMDLspecifies the number of non-self-consistent steps at the beginning.", "default": "Default:NELMDL", "details": "Description:NELMDLspecifies the number of non-self-consistent steps at the beginning.\nIf the orbitals are initialized using a random number generator (the default in VASP),  the initial orbitals are usually unreasonable and the iterative matrix diagonalization will require 5-10 steps to obtain reasonable orbitals. The charge density corresponding to the initial orbitals is also, at b\nSuch a 'delay' is absolutely necessary if the SCF-convergence is slow and problematic (e.g. for surfaces or metallic clusters, low dimensional system). Without a delay, VASP will most likely not converge, or at least the convergence speed is slowed significantly.", "wiki_url": "https://www.vasp.at/wiki/index.php/NELMDL", "description_cn": "NELMDL 指定开始时非自洽步骤的数量。", "default_value": "0", "details_cn": "NELMDL 指定开始时非自洽步骤的数量。如果轨道使用随机数生成器初始化（VASP中的默认设置），初始轨道通常不合理，迭代矩阵对角化需要5-10步才能获得合理的轨道。对应的初始轨道的电荷密度也是充其量不准确。这种'延迟'在自洽收敛缓慢和有问题时是绝对必要的（例如对于表面或金属）。", "recommended": "对于一般计算，可以设置为0；对于收敛困难的系统（如表面或金属），建议设置为5-10。使用场景：当自洽收敛缓慢时使用，以改善初始轨道和电荷密度。", "tips": "设置NELMDL会增加初始计算时间，但有助于改善收敛。确保根据系统调整值，避免不必要的计算开销。如果使用其他初始化方法（如从文件读取），可能不需要设置此参数。"}, "NELMGW": {"name": "NELMGW", "description": "NELMGW= [integer]Default:NELMGW= 1", "default": "NELMGW= [integer]Default:NELMGW= 1", "details": "Description:NELMGWsets the number of self-consistent GW steps.\nAvailable as of 6.3.0.\nThis tag is effective forALGO=EVGW[0] | QPGW[0] | GW[0][R][K] and ignored otherwise.\nFor instance\nperforms apartially self-consistent GW calculations, where[math]\\displaystyle{ G }[/math]is updated four times.", "wiki_url": "https://www.vasp.at/wiki/index.php/NELMGW", "description_cn": "NELMGW设置自洽GW步骤的数量。", "default_value": "1", "details_cn": "NELMGW设置自洽GW步骤的数量。自6.3.0版本起可用。此标签仅对ALGO=EVGW[0] | QPGW[0] | GW[0][R][K]有效，否则被忽略。例如，执行部分自洽GW计算，其中G被更新四次。", "recommended": "默认值为1，适用于单次GW计算或初步测试。对于部分自洽GW计算，可根据系统收敛性设置为2-4或更高，以提高精度。使用场景：在ALGO=EVGW[0]、QPGW[0]或GW[0][R][K]下，调整NELMGW以控制自洽迭代次数，平衡计算精度和效率。", "tips": "1. 确保ALGO参数设置正确，否则NELMGW将被忽略。2. 增加NELMGW会提高计算精度但增加计算成本，建议先进行收敛测试以确定最优值。3. 对于大型或复杂系统，谨慎设置以避免过高计算开销。"}, "NELMIN": {"name": "NELMIN", "description": "NELMIN= [integer]Default:NELMIN= 2", "default": "NELMIN= [integer]Default:NELMIN= 2", "details": "Description:NELMINspecifies the minimum number of electronic self-consistency steps.\nIt is rarely necessary to change the value of theNELMINtag. In some cases, e.g., inmolecular-dynamicsruns, orionic-minimizationmethods, we recommend increasing theNELMINtag to a value between 4 and 8.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NELMIN", "description_cn": "NELMIN指定电子自洽步骤的最小数量。", "default_value": "2", "details_cn": "NELMIN指定电子自洽步骤的最小数量。通常不需要更改NELMIN标签的值。在某些情况下，例如在分子动力学模拟或离子最小化方法中，我们建议将NELMIN标签的值增加到4到8之间。", "recommended": "在分子动力学模拟或离子最小化方法中，推荐将NELMIN设置为4到8之间的值。", "tips": "通常不需要更改NELMIN，除非在特定计算场景如分子动力学或离子最小化中，以确保计算稳定性。"}, "NFREE": {"name": "NFREE", "description": "Description: depending onIBRION,NFREEspecifies the number of remembered steps in the history of ionic convergence runs, or the number of ionic displacements in frozen phonon calculations.", "default": "Default:NFREE", "details": "Description: depending onIBRION,NFREEspecifies the number of remembered steps in the history of ionic convergence runs, or the number of ionic displacements in frozen phonon calculations.", "wiki_url": "https://www.vasp.at/wiki/index.php/NFREE", "description_cn": "根据IBRION的值，NFREE指定离子收敛运行历史中记住的步数，或在冻结声子计算中的离子位移数。", "default_value": "取决于IBRION，常见默认值为2", "details_cn": "根据IBRION的值，NFREE指定离子收敛运行历史中记住的步数，或在冻结声子计算中的离子位移数。", "recommended": "对于离子弛豫（IBRION=1或2），推荐NFREE=2或3以平衡收敛速度和精度；对于分子动力学（IBRION=3），推荐NFREE=1以减少内存使用；对于冻结声子计算（IBRION=5或6），根据所需位移数设置，通常为对称性不等价的位移数。", "tips": "NFFREE值过大会显著增加内存消耗和计算时间，过小可能影响收敛稳定性。需根据IBRION、系统大小和计算目标调整，建议在弛豫中从默认值开始测试。"}, "NGX": {"name": "NGX", "description": "NGX= [integer]Default:NGX= set in accordance withPRECandENCUT", "default": "NGX= [integer]Default:NGX= set in accordance withPRECandENCUT", "details": "Description:NGXsets the number of grid points in the FFT grid along the first lattice vector.\nBy defaultNGXis set in accordance with the requested \"precision\" modePRECand the plane wave kinetic energy cutoffENCUT:\nwith[math]\\displaystyle{ E_{\\rm cut} }[/math]=ENCUT.", "wiki_url": "https://www.vasp.at/wiki/index.php/NGX", "description_cn": "NGX是一个整数参数，用于设置FFT网格中沿第一个晶格矢量的网格点数。默认值根据PREC和ENCUT自动设置。", "default_value": "根据PREC和ENCUT自动设置", "details_cn": "NGX设置FFT网格中沿第一个晶格矢量的网格点数。默认情况下，NGX根据请求的'精度'模式PREC和平面波动能截断ENCUT设置，其中[math]\\displaystyle{ E_{\\rm cut} }[/math]=ENCUT。", "recommended": "推荐使用默认值，即根据PREC和ENCUT自动设置。在需要更精细网格或优化计算时，可以手动设置，但应确保网格点数足够以满足精度要求。", "tips": "手动设置NGX可能影响计算精度和性能；应与其他网格参数（如NGY、NGZ）协调；建议网格点数为2的幂次以优化FFT效率。"}, "NGXF": {"name": "NGXF", "description": "NGXF= [integer]Default:NGXF= set in accordance withPREC,NGX,ENCUTandENAUG", "default": "NGXF= [integer]Default:NGXF= set in accordance withPREC,NGX,ENCUTandENAUG", "details": "Description:NGXFsets the number of grid points in the \"fine\" FFT grid along the first lattice vector.\nOn this \"fine\" FFT mesh the localized augmentation charges are represented if ultrasoft pseudopotentials (USPPs) or the PAW method are used. In case USPPs are used, the local potentials (exchange-correlation, Hartree-potential and ionic potentials) are also calculated on this \"fine\" FFT-mesh.\nBy defaultNGXFis set in accordance with the requested \"precision\" modePREC,NGX, and the plane wave kinetic energy cutoffsENCUTandENAUG:", "wiki_url": "https://www.vasp.at/wiki/index.php/NGXF", "description_cn": "NGXF= [整数] 默认值：NGXF= 根据 PREC、NGX、ENCUT 和 ENAUG 设置", "default_value": "根据 PREC、NGX、ENCUT 和 ENAUG 自动设置", "details_cn": "NGXF 设置了沿第一晶格矢量的“精细”FFT网格的网格点数。在这个“精细”FFT网格上，如果使用超软赝势（USPPs）或PAW方法，则表示局部化增强电荷。如果使用USPPs，局部势（交换关联势、Hartree势和离子势）也在此“精细”FFT网格上计算。默认情况下，NGXF根据请求的“精度”模式PREC、NGX和平面波动能截断设置。", "recommended": "通常由VASP自动设置，基于PREC、NGX、ENCUT和ENAUG。使用场景：当使用超软赝势（USPPs）或PAW方法时，确保增强电荷和局部势的准确表示；对于高精度计算，可适当增大NGXF以提高精度，但会增加计算成本和内存使用。", "tips": "手动设置NGXF可能影响计算精度和内存使用，需谨慎调整；确保与NGX参数协调，避免网格不匹配；在使用USPPs时，NGXF直接影响局部势的计算精度；建议在大多数情况下使用默认值，除非有特定精度或优化需求。"}, "NGY": {"name": "NGY", "description": "NGY= [integer]Default:NGY= set in accordance withPRECandENCUT", "default": "NGY= [integer]Default:NGY= set in accordance withPRECandENCUT", "details": "Description:NGYsets the number of grid points in the FFT grid along the second lattice vector.\nBy defaultNGYis set in accordance with the requested \"precision\" modePRECand the plane wave kinetic energy cutoffENCUT:\nwith[math]\\displaystyle{ E_{\\rm cut} }[/math]=ENCUT.", "wiki_url": "https://www.vasp.at/wiki/index.php/NGY", "description_cn": "NGY是一个整数参数，用于设置FFT网格中沿第二个晶格矢量的网格点数。", "default_value": "默认值根据PREC和ENCUT自动设置。", "details_cn": "NGY设置FFT网格中沿第二个晶格矢量的网格点数。默认情况下，NGY根据请求的“精度”模式PREC和平面波动能截断ENCUT设置，其中[math]\\displaystyle{ E_{\\rm cut} }[/math]=ENCUT。", "recommended": "推荐使用默认值，即让VASP根据PREC和ENCUT自动设置。在需要更高精度或特定网格优化时（如测试收敛性或处理特殊晶格），可以手动设置，但需确保与ENCUT和PREC匹配。", "tips": "手动设置NGY可能影响计算精度和效率；建议仅在高级用户明确需求时修改，并参考VASP文档以避免不一致。"}, "NGYF": {"name": "NGYF", "description": "NGYF= [integer]Default:NGYF= set in accordance withPREC,NGY,ENCUTandENAUG", "default": "NGYF= [integer]Default:NGYF= set in accordance withPREC,NGY,ENCUTandENAUG", "details": "Description:NGYFsets the number of grid points in the \"fine\" FFT grid along the second lattice vector.\nOn this \"fine\" FFT mesh the localized augmentation charges are represented if ultrasoft pseudopotentials (USPPs) or the PAW method are used. In case USPPs are used, the local potentials (exchange-correlation, Hartree-potential and ionic potentials) are also calculated on this \"fine\" FFT-mesh.\nBy defaultNGYFis set in accordance with the requested \"precision\" modePREC,NGY, and the plane wave kinetic energy cutoffsENCUTandENAUG:", "wiki_url": "https://www.vasp.at/wiki/index.php/NGYF", "description_cn": "NGYF是一个整数，默认值根据PREC、NGY、ENCUT和ENAUG设置。", "default_value": "默认值根据PREC、NGY、ENCUT和ENAUG设置。", "details_cn": "NGYF设置沿第二晶格矢量的“精细”FFT网格的网格点数。如果使用超软赝势（USPPs）或PAW方法，在这个“精细”FFT网格上表示局部化增强电荷。如果使用USPPs，局部势（交换关联势、Hartree势和离子势）也在此“精细”FFT网格上计算。默认情况下，NGYF根据请求的“精度”模式PREC、NGY和平面波动能截断设置。", "recommended": "推荐使用默认值，即根据PREC、NGY、ENCUT和ENAUG自动设置。使用场景：当使用超软赝势或PAW方法时，如果需要更精确的电荷密度表示（例如在高精度计算或特定材料模拟中），可以手动调整NGYF以增加网格点数，但需谨慎以避免不必要的计算开销。", "tips": "手动设置NGYF可能会影响计算精度和效率，通常建议让VASP自动处理。确保NGYF与NGY（沿第一晶格矢量的网格点数）协调，以避免网格不一致导致的错误。在大多数标准计算中，无需手动指定此参数。"}, "NGYROMAG": {"name": "NGYROMAG", "description": "NGYROMAG= [real array]Default:NGYROMAG= NTYP*1.0", "default": "NGYROMAG= [real array]Default:NGYROMAG= NTYP*1.0", "details": "Description:NGYROMAGspecifies the nuclear gyromagnetic ratios (in MHz, for H0= 1 T) for the atomic types on thePOTCARfile.\nBy means of theNGYROMAG-tag one can specify the nuclear gyromagnetic ratio:\nwhere one should specify one number for each of theNspecies on thePOSCARfile, i.e. if C, H, N, and O are listed as species in thePOSCARfile, then there should be four numbers inNGYROMAG, regardless of how many total atoms there are.", "wiki_url": "https://www.vasp.at/wiki/index.php/NGYROMAG", "description_cn": "NGYROMAG= [实数数组] 默认值：NGYROMAG= NTYP*1.0", "default_value": "NTYP*1.0", "details_cn": "NGYROMAG指定POTCAR文件中原子类型的核磁旋比（单位为MHz，对于H0=1 T）。通过NGYROMAG标签，可以指定核磁旋比：需要为POSCAR文件中的N个物种各指定一个数字，即如果POSCAR文件中列出C、H、N和O作为物种，那么NGYROMAG中应有四个数字，无论总原子数多少。", "recommended": "根据实际原子类型设置正确的核磁旋比，例如氢（H）约为42.577 MHz/T，碳-13（C）约为10.705 MHz/T，氮-14（N）约为3.077 MHz/T，氧-17（O）约为5.772 MHz/T等。使用场景：在进行核磁共振（NMR）相关计算时使用，如计算化学位移或NMR参数。", "tips": "1. 确保为POSCAR文件中的每个物种指定一个数字，顺序与POSCAR中物种顺序一致。2. 单位是MHz/T，对应于磁场强度H0=1 T。3. 如果未设置，使用默认值1.0，但这可能不准确，建议查阅标准核磁旋比值以确保计算准确性。"}, "NGZ": {"name": "NGZ", "description": "NGZ= [integer]Default:NGZ= set in accordance withPRECandENCUT", "default": "NGZ= [integer]Default:NGZ= set in accordance withPRECandENCUT", "details": "Description:NGZsets the number of grid points in the FFT grid along the third lattice vector.\nBy defaultNGZis set in accordance with the requested \"precision\" modePRECand the plane wave kinetic energy cutoffENCUT:\nwith[math]\\displaystyle{ E_{\\rm cut} }[/math]=ENCUT.", "wiki_url": "https://www.vasp.at/wiki/index.php/NGZ", "description_cn": "NGZ是一个整数参数，用于设置FFT网格沿第三个晶格向量的网格点数。", "default_value": "根据PREC和ENCUT自动设置。", "details_cn": "NGZ设置FFT网格沿第三个晶格向量的网格点数。默认情况下，NGZ根据请求的'精度'模式PREC和平面波动能截断ENCUT设置，其中 E_cut = ENCUT。", "recommended": "推荐使用默认值，由PREC和ENCUT自动决定。在需要调整FFT网格精度时（如非标准晶格或高精度计算），可手动设置，但应确保与系统大小和计算需求匹配。", "tips": "手动设置NGZ可能影响计算精度和效率；应与其他网格参数（如NGX, NGY）协调；确保网格点数满足FFT要求（如为偶数），以避免计算错误。"}, "NGZF": {"name": "NGZF", "description": "NGZF= [integer]Default:NGZF= set in accordance withPREC,NGZ,ENCUTandENAUG", "default": "NGZF= [integer]Default:NGZF= set in accordance withPREC,NGZ,ENCUTandENAUG", "details": "Description:NGZFsets the number of grid points in the \"fine\" FFT grid along the first lattice vector.\nOn this \"fine\" FFT mesh the localized augmentation charges are represented if ultrasoft pseudopotentials (USPPs) or the PAW method are used. In case USPPs are used, the local potentials (exchange-correlation, Hartree-potential, and ionic potentials) are also calculated on this \"fine\" FFT-mesh.\nBy defaultNGZFis set in accordance with the requested \"precision\" modePREC,NGZ, and the plane wave kinetic energy cutoffsENCUTandENAUG:", "wiki_url": "https://www.vasp.at/wiki/index.php/NGZF", "description_cn": "NGZF是一个整数参数，默认值根据PREC、NGZ、ENCUT和ENAUG设置。", "default_value": "默认值根据PREC、NGZ、ENCUT和ENAUG自动设置。", "details_cn": "NGZF设置沿第一晶格矢量的“精细”FFT网格的网格点数。如果使用超软赝势（USPPs）或PAW方法，在这个“精细”FFT网格上表示局域化增强电荷。如果使用USPPs，局部势（交换关联势、Hartree势和离子势）也在此“精细”FFT网格上计算。默认情况下，NGZF根据请求的“精度”模式PREC、NGZ和平面波动能截断设置。", "recommended": "推荐让VASP自动设置NGZF，基于PREC、NGZ、ENCUT和ENAUG。手动设置时，应确保网格点数足够以准确表示增强电荷，但避免过高以节省计算资源。使用场景：在使用超软赝势或PAW方法时，精细网格对电荷密度和势的计算至关重要。", "tips": "手动设置NGZF可能影响计算精度和效率；确保与NGZ参数协调；在使用USPPs或PAW时，精细网格必须足够精细以避免误差；通常不建议手动设置，除非有特殊需求。"}, "NHC_NCHAINS": {"name": "NHC_NCHAINS", "description": "NHC_NCHAINS= [integer]Default:NHC_NCHAINS= 0", "default": "NHC_NCHAINS= [integer]Default:NHC_NCHAINS= 0", "details": "Description: Length of the Nosé-Hoover chain.\nNHC_NCHAINSsets the length of the chain for theNosé-Hoover chain thermostat. Typically, this tag is set to a value between 1 and 5. The maximal allowed value is 20.\nIn caseNHC_NCHAINS=0, the thermostat is switched off and the underlying dynamics generate amicrocanonical (NVE) ensemble.NHC_NCHAINS=1 corresponds to thestandard Nosé-Hoover thermostat.", "wiki_url": "https://www.vasp.at/wiki/index.php/NHC_NCHAINS", "description_cn": "NHC_NCHAINS= [整数] 默认值：NHC_NCHAINS= 0", "default_value": "0", "details_cn": "Nosé-Hoover链的长度。NHC_NCHAINS 设置 Nosé-Hoover 链恒温器的链长度。通常，此标签设置为 1 到 5 之间的值。最大允许值为 20。如果 NHC_NCHAINS=0，则恒温器关闭，底层动力学生成微正则（NVE）系综。NHC_NCHAINS=1 对应于标准 Nosé-Hoover 恒温器。", "recommended": "对于一般分子动力学模拟，建议使用 NHC_NCHAINS=1 到 5 之间的值。使用场景：NHC_NCHAINS=0 用于微正则（NVE）系综模拟，如能量守恒测试；NHC_NCHAINS=1 用于标准 Nosé-Hoover 恒温，适用于大多数等温模拟；更高值（如 3 或 5）用于更精确的温度控制，尤其在大系统或复杂势能面中，但会增加计算开销。", "tips": "NHC_NCHAINS 的值必须在 0 到 20 之间。选择值时需权衡温度控制精度和计算成本：值越高，恒温效果越好，但计算时间可能增加。对于简单系统或初步测试，NHC_NCHAINS=1 通常足够；对于需要严格温度稳定的模拟，可尝试更高值。确保与其他 INCAR 参数（如恒温器类型）协调使用。"}, "NHC_NRESPA": {"name": "NHC_NRESPA", "description": "NHC_NRESPA= [integer]Default:NHC_NRESPA= 1", "default": "NHC_NRESPA= [integer]Default:NHC_NRESPA= 1", "details": "Description: The number of subdivisions of the integration step used in propagation of thermostat variables in theNosé-Hoover chain thermostat.\nNHC_NRESPAsets the number of subdivisions of the integration step used in propagation of thermostat variables in the [[Nosé-Hoover chain thermostat. This might be needed in accurate calculations where, due to rapidly varying terms appearing in thermostat variables propagators could cause significant\nNHC_PERIOD,NHC_NS,Nosé-Hoover chain thermostat", "wiki_url": "https://www.vasp.at/wiki/index.php/NHC_NRESPA", "description_cn": "NHC_NRESPA参数用于控制Nosé-Hoover链恒温器中积分步长的细分数量。", "default_value": "1", "details_cn": "NHC_NRESPA参数定义了在Nosé-Hoover链恒温器中传播恒温器变量时，积分步长被细分的次数。这在精确计算中可能需要，因为恒温器变量传播器中快速变化的项可能导致显著误差。", "recommended": "默认值为1，适用于大多数标准分子动力学模拟。在需要更高精度的计算中，如系统存在快速变化的自由度（例如高温或高压条件），可增加到2或3以提高恒温器的稳定性。使用场景：在VASP中使用Nosé-Hoover链恒温器进行分子动力学模拟时，用于优化温度控制。", "tips": "增加NHC_NRESPA会提高计算精度，但也会增加计算成本，因为需要更多细分步长。应与NHC_PERIOD和NHC_NS参数协调设置，以确保恒温器的有效性；建议在调整前进行测试以平衡精度和效率。"}, "NHC_NS": {"name": "NHC_NS", "description": "NHC_NS= [integer] 1 | 3 | 7Default:NHC_NS= 1", "default": "NHC_NS= [integer] 1 | 3 | 7Default:NHC_NS= 1", "details": "Description: The number of subdivisions of each RESPA step used in the integration step used in propagation of thermostat variables in theNosé-Hoover chain thermostat.\nThe RESPA steps used in in propagation of thermostat variables in theNosé-Hoover chain thermostatare treated by Suzuki-Yoshida scheme[1][2], whereby each step is subdivided further intoNHC_NSparts. First, fourth, and sixth order schemes with, 1, 3, and 7 steps, respectively, are supported.\nNHC_PERIOD,NHC_NRESPA,Nosé-Hoover chain thermostat", "wiki_url": "https://www.vasp.at/wiki/index.php/NHC_NS", "description_cn": "NHC_NS参数用于指定Nosé-Hoover链恒温器中每个RESPA步骤的细分数量。", "default_value": "1", "details_cn": "NHC_NS指定了在Nosé-Hoover链恒温器中传播恒温器变量时，每个RESPA步骤的细分数量。用于传播恒温器变量的RESPA步骤通过Suzuki-Yoshida方案[1][2]处理，其中每个步骤进一步细分为NHC_NS部分。支持一阶、四阶和六阶方案，分别对应1、3和7个步骤。相关参数：NHC_PERIOD, NHC_NRESPA, Nosé-Hoover链恒温器。", "recommended": "默认值1适用于一般模拟，计算效率高。对于需要更高精度的模拟，如长时间动力学或精细温度控制，推荐使用NHC_NS=3或7。使用场景：NHC_NS=1用于快速计算；NHC_NS=3用于平衡精度和效率；NHC_NS=7用于高精度要求。", "tips": "1. 确保与NHC_PERIOD和NHC_NRESPA参数协调设置，以优化恒温器性能。2. 高NHC_NS值会增加计算成本，应根据模拟需求权衡。3. 在使用Suzuki-Yoshida方案时，选择合适的阶数以匹配模拟的精度要求。"}, "NICS": {"name": "NICS", "description": "TheNICSfile contains the NMR nucleus-independent chemical shielding (NICS) in ppm. It is written ifNUCIND= .TRUE. is set and noPOSNICSis present. The format is the same asCHGCARwith a header to define the grid and then 9 blocks that correspond to the indices of the chemical shielding tensor[math]\\displaystyle{ \\sigma_{ij} }[/math]:[math]\\displaystyle{ \\sigma_{xx} }[/math],[math]\\displaystyle{ \\sigma_{xy} }[/math],[math]\\displaystyle{ \\sigma_{xz} }[/math],[math]\\displaystyle{ \\sigma_{yx} }[/math],[math]\\displaystyle{ \\sigma_{yy} }[/math],[math]\\displaystyle{ \\sigma_{yz} }[/math],[math]\\displays", "default": "", "details": "LCHIMAG,NUCIND,LNICSALL", "wiki_url": "https://www.vasp.at/wiki/index.php/NICS", "description_cn": "NICS文件包含以ppm为单位的NMR核独立化学屏蔽（NICS）。如果设置了NUCIND= .TRUE.且没有POSNICS存在，则会写入该文件。格式与CHGCAR相同，有一个定义网格的头部，然后是9个对应于化学屏蔽张量σ_ij的块：σ_xx, σ_yy, σ_zz, σ_xy, σ_xz, σ_yx, σ_yz, σ_zx, σ_zy。", "default_value": "无", "details_cn": "详细信息涉及INCAR参数LCHIMAG、NUCIND和LNICSALL。LCHIMAG用于控制是否计算NMR化学位移，NUCIND用于控制是否输出NICS文件，LNICSALL用于控制是否输出所有NICS点。", "recommended": "推荐设置：在需要进行NMR计算并输出NICS时，设置LCHIMAG=.TRUE.，NUCIND=.TRUE.，并根据需求设置LNICSALL（通常为.FALSE.以节省资源）。使用场景：适用于研究分子或晶体的NMR性质，特别是分析核独立化学屏蔽以评估芳香性或磁性。", "tips": "确保在INCAR中正确设置相关参数；NICS计算可能增加计算资源消耗；输出文件格式与CHGCAR类似，但包含化学屏蔽张量数据，需注意数据解读。"}, "NKRED": {"name": "NKRED", "description": "NKRED= [integer]Default:NKRED= 1", "default": "NKRED= [integer]Default:NKRED= 1", "details": "Description:NKREDspecifies an uniform reduction factor for theq-point grid representation of the exact exchange potential and the correlation part in GW calculations.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi. This leads to a reduction in the computational workload by a factor:", "wiki_url": "https://www.vasp.at/wiki/index.php/NKRED", "description_cn": "NKRED是一个整数参数，用于指定在杂化泛函和GW计算中q点网格的统一缩减因子。", "default_value": "1", "details_cn": "NKRED指定了在GW计算中精确交换势和关联部分的q点网格表示的统一缩减因子。可以将Fock交换势（或其短程对应项）中的q求和限制在完整k点集{k}（大小为N1×N2×N3）的一个子集{qk}上，其中满足以下条件：b1,2,3是原胞的倒格矢，Ci是沿倒格矢方向的整数网格缩减因子。", "recommended": "默认值为1，表示不缩减。在计算资源有限或k点网格较大时，可以设置NKRED=2或更高以减少计算量，但需注意精度损失。使用场景：适用于杂化泛函或GW计算中需要加速计算的情况，例如当k点网格密集时，通过缩减q点网格来降低计算成本。", "tips": "NKRED只影响交换势的q点网格，不影响其他部分。设置过大的NKRED可能导致结果不准确，建议在测试后选择合适的值。确保NKRED与k点网格协调，以避免不必要的误差。"}, "NKREDX": {"name": "NKREDX", "description": "NKREDX= [integer]Default:NKREDX= 1", "default": "NKREDX= [integer]Default:NKREDX= 1", "details": "Description:NKREDXspecifies a reduction factor for theq-point grid representation of the exact exchange potential along reciprocal space directionb1.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi. This leads to a reduction in the computational workload by a factor:", "wiki_url": "https://www.vasp.at/wiki/index.php/NKREDX", "description_cn": "NKREDX= [整数] 默认值：NKREDX= 1", "default_value": "1", "details_cn": "NKREDX 指定了精确交换势在倒易空间方向 b1 上的 q 点网格表示的缩减因子。可以将 Fock 交换势（或其短程对应项）中对 q 的求和限制在完整 (N1×N2×N3) k 点集 {k} 的一个子集 {qk} 上，其中满足以下条件：b1,2,3 是原胞的倒易格矢，Ci 是沿倒易格矢方向 bi 的整数网格缩减因子。这导致...", "recommended": "默认值为1，适用于高精度杂化泛函计算，确保交换势的精确表示。在计算资源有限或进行初步测试时，可以设置为2、4等整数以减少q点网格，加速计算，但需注意精度损失。使用场景：杂化泛函计算中，当k点网格较大时，通过增加NKREDX来缩减q点网格，降低计算成本，适用于大规模体系或快速筛选。", "tips": "增加NKREDX会降低计算精度，需权衡计算时间和精度要求。应与NKREDY、NKREDZ参数协调使用，确保各方向缩减因子一致，避免网格不匹配。在对称性高的体系中，需谨慎设置以防止破坏对称性，建议先进行测试计算。"}, "NKREDY": {"name": "NKREDY", "description": "NKREDY= [integer]Default:NKREDY= 1", "default": "NKREDY= [integer]Default:NKREDY= 1", "details": "Description:NKREDYspecifies a reduction factor for theq-point grid representation of the exact exchange potential along reciprocal space directionb2.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi. This leads to a reduction in the computational workload by a factor:", "wiki_url": "https://www.vasp.at/wiki/index.php/NKREDY", "description_cn": "NKREDY是一个整数参数，用于指定沿倒易空间方向b2的精确交换势的q点网格表示的减少因子。", "default_value": "1", "details_cn": "NKREDY指定了沿倒易空间方向b2的精确交换势的q点网格表示的减少因子。可以将Fock交换势（或其短程对应项）中的q求和限制在完整k点集{ k }（大小为N1×N2×N3）的一个子集{ qk }上，其中满足以下条件：b1、b2、b3是原胞的倒易格矢，Ci是沿倒易格矢bi方向的整数网格减少因子。这可以减少计算量，但可能影响精度。", "recommended": "对于高精度杂化泛函计算，推荐使用默认值1。如果计算资源有限，可以尝试增加NKREDY的值（如2或4）以减少计算成本，但需注意可能降低精度。适用于大体系或初步计算。", "tips": "NKREDY仅适用于杂化泛函计算。增加NKREDY值会减少q点网格，从而降低计算成本，但可能影响结果精度。建议在正式计算前进行测试，以确定合适的减少因子。注意与NKREDX和NKREDZ参数的协调使用。"}, "NKREDZ": {"name": "NKREDZ", "description": "NKREDZ= [integer]Default:NKREDZ= 1", "default": "NKREDZ= [integer]Default:NKREDZ= 1", "details": "Description:NKREDZspecifies a reduction factor for theq-point grid representation of the exact exchange potential along reciprocal space directionb3.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi. This leads to a reduction in the computational workload by a factor:", "wiki_url": "https://www.vasp.at/wiki/index.php/NKREDZ", "description_cn": "NKREDZ是一个整数参数，用于指定在杂化泛函计算中精确交换势的q点网格缩减因子。", "default_value": "1", "details_cn": "NKREDZ指定了沿倒易空间方向b3的精确交换势的q点网格表示的缩减因子。可以将Fock交换势（或其短程对应物）中的q求和限制在全(N1×N2×N3)k点集{k}的一个子集{qk}上，其中满足以下条件：b1,2,3是原胞的倒易格矢，Ci是沿倒易格矢方向bi的整数网格缩减因子。这导致", "recommended": "默认值1适用于大多数精确计算场景，能保证较高精度。对于大体系或计算资源有限时，可设置NKREDZ为2或更高以加速计算，但需注意精度可能下降。使用场景：杂化泛函（如HSE06）计算中，当q点网格过大导致计算成本过高时，可适当增加NKREDZ来减少q点数量，提高效率。", "tips": "增加NKREDZ会减少q点数量，从而降低交换势的精度，可能影响最终结果（如带隙、能量）。建议在设置前进行收敛测试，比较不同NKREDZ值下的结果。对于高精度计算（如发表论文），推荐使用默认值1或通过测试确定合适值。"}, "NLSPLINE": {"name": "NLSPLINE", "description": "NLSPLINE= .TRUE. | .FALSE.Default:NLSPLINE=  .FALSE.", "default": "NLSPLINE= .TRUE. | .FALSE.Default:NLSPLINE=  .FALSE.", "details": "Description: construct the PAW projectors in reciprocal space using spline interpolation so that they arek-differentiable.\nForNLSPLINE=.TRUE., the PAW projectors in reciprocal space (LREAL=.FALSE.) are set up using a spline interpolation so that they arekdifferentiable. This improves the susceptibility contribution to the chemical shifts. It only slightly affects the other contributions to the chemical shifts.\nIt is advised to setNLSPLINE=.TRUE. if and only if PAW projectors are applied in reciprocal space and chem
