LKPOINTS_OPT= .FALSE.。", "recommended": "当需要使用 KPOINTS_OPT 文件进行 k 点优化时，设置为 .TRUE.；否则，设置为 .FALSE. 以避免不必要的文件读取。使用场景：在 k 点优化计算中启用，在常规计算中禁用。", "tips": "确保 KPOINTS_OPT 文件存在于工作目录中当设置为 .TRUE. 时；与 KSPACING_OPT 参数相关，可能影响 k 点设置。"}, "LKPOINTS_WAN": {"name": "LKPOINTS_WAN", "description": "LKPOINTS_WAN= .TRUE.| .FALSE.", "default": "Default:LKPOINTS_WAN", "details": "Description:LKPOINTS_WANcontrolls whether VASP reads theKPOINTS_WANfile.\nTo avoid reading theKPOINTS_WANfile without removing it from the working directory, theLKPOINTS_WANtag can be set to.FALSE.in theINCARfile.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LKPOINTS_WAN", "description_cn": "控制VASP是否读取KPOINTS_WAN文件。", "default_value": "Default:LKPOINTS_WAN", "details_cn": "LKPOINTS_WAN控制VASP是否读取KPOINTS_WAN文件。为了避免在不从工作目录中删除KPOINTS_WAN文件的情况下读取它，可以在INCAR文件中将LKPOINTS_WAN标签设置为.FALSE.。使用此标签的示例。", "recommended": "根据计算需求设置。如果不需要读取KPOINTS_WAN文件（例如，在非Wannier函数计算中），建议设置为.FALSE.以避免潜在错误或性能影响；如果需要Wannier函数计算，则保持默认或设置为.TRUE.。", "tips": "确保KPOINTS_WAN文件存在于工作目录中，如果设置为.TRUE.；设置为.FALSE.时，即使文件存在也不会被读取，这有助于避免意外行为。"}, "LKPROJ": {"name": "LKPROJ", "description": "LKPROJ= .TRUE. | .FALSE.Default:LKPROJ=  .FALSE.", "default": "LKPROJ= .TRUE. | .FALSE.Default:LKPROJ=  .FALSE.", "details": "Description: switches on thek-point projection scheme.\nForLKPROJ=.TRUE., VASP will project the orbitals onto the reciprocal space of an alternative unit cell.\nThis unit cell has to be supplied in the filePOSCAR.prim, in the usualPOSCARformat.\nAs a first step, thek-projection scheme determines the set {k′}, ofk-points in the irreducible part of the first Brillouin zone of the structure given inPOSCAR.prim, for which", "wiki_url": "https://www.vasp.at/wiki/index.php/LKPROJ", "description_cn": "LKPROJ参数用于启用k点投影方案。", "default_value": ".FALSE.", "details_cn": "启用k点投影方案。当LKPROJ=.TRUE.时，VASP将轨道投影到替代原胞的倒易空间上。这个原胞必须在文件POSCAR.prim中提供，使用标准的POSCAR格式。作为第一步，k投影方案确定在POSCAR.prim中给出的结构的第一布里渊区不可约部分中的k点集合{k′}，对于这些k点", "recommended": "通常保持默认值.FALSE.，除非需要进行k点投影计算。使用场景：当需要将轨道投影到替代原胞的倒易空间时，例如在计算能带结构、分析轨道特性或研究特定原胞中的电子态时，可设置为.TRUE.。", "tips": "1. 使用LKPROJ=.TRUE.时，必须确保POSCAR.prim文件存在且格式正确，否则VASP会报错。2. k点投影可能增加计算成本，建议在必要时才启用。3. 理解投影方案的原理，确保替代原胞与计算目标匹配。4. 投影结果可用于后处理分析，如能带投影或态密度计算。"}, "LLRAUG": {"name": "LLRAUG", "description": "LLRAUG= .TRUE. | .FALSE.Default:LLRAUG=  .FALSE.", "default": "LLRAUG= .TRUE. | .FALSE.Default:LLRAUG=  .FALSE.", "details": "Description:LLRAUGcalculates the two-center contributions to the chemical shift tensor.\nLLRAUGswitches on two-center contributions to the NMR chemical shift tensor.\nThese are contributions due to the augmentation\ncurrents in other PAW spheres than the sphere with the atom for which the shift tensor is calculated.\nTypically these contributions are safely neglected.\nIt makes sense to inc", "wiki_url": "https://www.vasp.at/wiki/index.php/LLRAUG", "description_cn": "LLRAUG参数用于控制是否计算NMR化学位移张量的双中心贡献。", "default_value": ".FALSE.", "details_cn": "LLRAUG计算化学位移张量的双中心贡献。它启用NMR化学位移张量的双中心贡献。这些贡献是由于在计算化学位移张量的原子所在PAW球之外的其他PAW球中的增强电流。通常这些贡献可以安全地忽略。对于高精度计算，包括它们是有意义的。", "recommended": "默认为FALSE。在需要高精度NMR化学位移计算时，可以设置为TRUE。", "tips": "启用LLRAUG会增加计算成本，通常仅在对NMR化学位移精度要求极高时使用。"}, "LMAXFOCK": {"name": "LMAXFOCK", "description": "LMAXFOCK= [integer]Default:LMAXFOCK= 4", "default": "LMAXFOCK= [integer]Default:LMAXFOCK= 4", "details": "Description:LMAXFOCKsets the maximum angular momentum quantum numberLfor the augmentation of charge densities in Hartree-Fock type routines.\nIn thePAW method, the difference between the charge density of the all-electron partial waves[math]\\displaystyle{ \\phi_\\beta }[/math]and\nthe pseudo partial waves[math]\\displaystyle{ \\tilde \\phi_\\beta }[/math]\n[math]\\displaystyle{ \nQ_{\\alpha\\beta}({\\mathbf r})= \\phi^*_\\alpha({\\mathbf r})\\phi_\\beta({\\mathbf r})  - \\tilde \\phi^*_\\alpha({\\mathbf r})\\tilde \\phi_\\beta({\\mathbf r})\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/LMAXFOCK", "description_cn": "LMAXFOCK设置为一个整数，默认值为4。", "default_value": "4", "details_cn": "LMAXFOCK设置在Hartree-Fock类型例程中用于电荷密度增强的最大角动量量子数L。在PAW方法中，全电子部分波[math]\\displaystyle{ \\phi_\\beta }[/math]和赝部分波[math]\\displaystyle{ \\tilde \\phi_\\beta }[/math]之间的电荷密度差异[math]\\displaystyle{ Q_{\\alpha\\beta}({\\mathbf r})= \\phi^*_\\alpha({\\mathbf r})\\phi_\\beta({\\mathbf r})  - \\tilde \\phi^*_\\alpha({\\mathbf r})\\tilde \\phi_ }[/math]", "recommended": "默认值4适用于大多数计算场景，特别是轻元素或标准杂化泛函（如HSE06）计算。对于重元素（如过渡金属或镧系元素）或需要更高精度的计算，可考虑增加到6或更高，以改善电荷密度增强的准确性。使用场景：在使用杂化泛函（如HSE06、PBE0）进行第一性原理计算时，调整LMAXFOCK可以优化计算精度和效率，建议通过收敛测试确定最佳值。", "tips": "增加LMAXFOCK会显著增加计算成本（时间和内存），因此需权衡精度与资源。确保所使用的PAW赝势与设置的LMAXFOCK值兼容，否则可能导致计算错误。通常从默认值开始，逐步调整并监控能量或力的收敛性。"}, "LMAXMIX": {"name": "LMAXMIX", "description": "LMAXMIX= [integer]Default:LMAXMIX= 2", "default": "LMAXMIX= [integer]Default:LMAXMIX= 2", "details": "Description:LMAXMIXcontrols up to whichl-quantum number the one-center PAW charge densities are passed through the charge density mixer and written to theCHGCARfile.\nHigherl-quantum numbers (l>LMAXMIX) are not handled by thedensity mixer(these components of the one-center charge density are set to the value corresponding to the present orbitals). Usually, it is not necessary to increaseLMAXMIX, but the following cases are exceptions:\nIMIX,INIMIX,MAXMIX,BMIX,AMIX_MAG,BMIX_MAG,AMIN,MIXPRE,WC", "wiki_url": "https://www.vasp.at/wiki/index.php/LMAXMIX", "description_cn": "LMAXMIX参数控制在电荷密度混合器中传递和写入CHGCAR文件的单中心PAW电荷密度所对应的最高l量子数。", "default_value": "2", "details_cn": "LMAXMIX控制在电荷密度混合器中传递和写入CHGCAR文件的单中心PAW电荷密度所对应的最高l量子数。高于LMAXMIX的l量子数（l>LMAXMIX）不会被密度混合器处理（这些单中心电荷密度分量将被设置为对应于当前轨道的值）。通常无需增加LMAXMIX，但以下情况是例外：当使用IMIX、INIMIX、MAXMIX、BMIX、AMIX_MAG、BMIX_MAG、AMIN、MIXPRE、WC等混合参数时。", "recommended": "对于大多数体系，默认值2足够。但对于包含d电子（如过渡金属）或f电子（如镧系、锕系元素）的体系，建议将LMAXMIX设置为4或6，以确保这些轨道对应的电荷密度能被正确混合。具体而言：1）对于含d电子的体系，推荐LMAXMIX=4；2）对于含f电子的体系，推荐LMAXMIX=6。", "tips": "1）提高LMAXMIX会增加计算内存需求，但通常对计算时间影响不大；2）当使用某些高级混合方案（如MIXPRE）时，可能需要相应提高LMAXMIX以确保收敛；3）如果计算中出现电荷密度混合问题（如收敛困难），可尝试调整此参数；4）该参数与MIXPRE参数相关，建议同时参考MIXPRE的设置。"}, "LMAXPAW": {"name": "LMAXPAW", "description": "LMAXPAW= [integer]Default:LMAXPAW= 2lmax, wherelmaxis the maximum angular quantum number of the PAW partial waves in thePOTCARfile.", "default": "LMAXPAW= [integer]Default:LMAXPAW= 2lmax, wherelmaxis the maximum angular quantum number of the PAW partial waves in thePOTCARfile.", "details": "Description: The maximuml-quantum number for the evaluation of the one-center terms on the radial grids in thePAW method.\nUseful settings for LMAXPAW are for instance:\nIn this case, only spherical terms are evaluated on the radial grid. This does not mean that aspherical terms are totally neglected, because the compensation charges are always expanded up to 2lmaxon the plane wave grid.", "wiki_url": "https://www.vasp.at/wiki/index.php/LMAXPAW", "description_cn": "LMAXPAW= [整数] 默认值：LMAXPAW= 2lmax，其中lmax是POTCAR文件中PAW分波的最大角量子数。", "default_value": "默认值为2lmax，其中lmax是POTCAR文件中PAW分波的最大角量子数。", "details_cn": "在PAW方法中，用于在径向网格上评估单中心项的最大l量子数。LMAXPAW的有用设置例如：在这种情况下，仅在径向网格上评估球形项。这并不意味着非球形项被完全忽略，因为补偿电荷总是在平面波网格上扩展到2lmax。", "recommended": "推荐使用默认值2lmax，适用于大多数第一性原理计算。对于涉及高角动量轨道的系统（如过渡金属或稀土元素），可考虑增加LMAXPAW以提高精度，但需权衡计算成本。对于计算效率要求高的场景，可适当减小值，但应进行收敛性测试。", "tips": "确保LMAXPAW设置与POTCAR文件中的最大角量子数lmax匹配。过高的值会增加计算负担，过低的值可能导致精度损失。建议在关键计算中进行LMAXPAW的收敛性测试。"}, "LMAXTAU": {"name": "LMAXTAU", "description": "Description:LMAXTAUis the maximuml-quantum number included in the PAW one-center expansion of the kinetic energy density.", "default": "Default:LMAXTAU", "details": "Description:LMAXTAUis the maximuml-quantum number included in the PAW one-center expansion of the kinetic energy density.\nThe PAW one-center expansion of the density has component up to and includingL=2*lmax, wherelmaxis thel-quantum number of the partial waves on thePOTCARfile, with the highest angular moment.\nIf the PAW one-center expansion of the density has component up toL, then the one-center expansion of the kin\nThis means that as a rule of thumb, fors-elements:LMAXTAU=2, forp:LMAXTAU=4, and ford:LMAXTAU=6.\nIf you are willing to live with the computational costs, the default forLMAXTAUshould be safe in all cases, except those involvingf-elements.", "wiki_url": "https://www.vasp.at/wiki/index.php/LMAXTAU", "description_cn": "LMAXTAU是PAW单中心展开中动能密度所包含的最大l量子数。", "default_value": "自动确定（依赖于POTCAR文件）", "details_cn": "LMAXTAU是PAW单中心展开中动能密度所包含的最大l量子数。密度的PAW单中心展开包含的分量最高到L=2*lmax，其中lmax是POTCAR文件中具有最高角动量的分波的l量子数。如果密度的PAW单中心展开包含的分量最高到L，那么动能密度的单中心展开包含的分量最高到L+2。这意味着，根据经验法则，对于s元素：LMAXTAU=2，对于p元素：LMAXTAU=4，", "recommended": "对于s元素设为2，p元素设为4，d元素可能需要更高值（如6）。使用场景：在杂化泛函或meta-GGA计算中，当需要精确处理动能密度时，建议根据POTCAR文件中的最大角动量lmax设置。", "tips": "设置过高会增加计算成本，设置过低可能影响计算精度。确保与POTCAR文件中的角动量一致，通常LMAXTAU = 2*lmax + 2 或类似规则。"}, "LMIXTAU": {"name": "LMIXTAU", "description": "LMIXTAU= .TRUE. | .FALSE.Default:LMIXTAU= .FALSE.", "default": "LMIXTAU= .TRUE. | .FALSE.Default:LMIXTAU= .FALSE.", "details": "Description: send the kinetic-energy density through thedensity mixeras well.\nIn many cases, thedensity-mixing schemeworks well enough without passing the kinetic-energy density through the mixer. Therefore VASP usesLMIXTAU=.FALSE. per default. However, when the self-consistency cycle fails to converge for one of the algorithms exploitingdensity mixing, e.g,IALGO=38 or 48, we\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LMIXTAU", "description_cn": "LMIXTAU参数用于控制是否将动能密度通过密度混合器。可选值为.TRUE.或.FALSE.，默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "将动能密度也通过密度混合器传递。在许多情况下，密度混合方案在不传递动能密度的情况下也能很好地工作。因此，VASP默认使用LMIXTAU=.FALSE.。然而，当自洽循环在利用密度混合的算法（例如IALGO=38或48）中无法收敛时，我们", "recommended": "通常使用默认值.FALSE.。当使用密度混合算法（如IALGO=38或48）且自洽循环不收敛时，建议设置为.TRUE.，以帮助改善收敛性。", "tips": "设置LMIXTAU=.TRUE.可能会增加计算开销，因为它需要额外处理动能密度。仅在必要时使用，例如对于meta-GGA泛函或收敛困难的情况。确保在修改前备份INCAR文件，并测试对计算结果的影响。"}, "LMODELHF": {"name": "LMODELHF", "description": "LMODELHF= .TRUE. | .FALSE.Default:LMODELHF= .FALSE.", "default": "LMODELHF= .TRUE. | .FALSE.Default:LMODELHF= .FALSE.", "details": "Description:LMODELHFselects dielectric-dependent range-separated hybrid functionals withAEXXandBEXXfor the exact Hartree-Fock exchange at long- and short-range, respectively.\nBy settingLMODELHF=.TRUE. various types of range-separated hybrid functionals using the error function for the screening can be specified. The general form of hybrid functionals that can be constructed withLMODELHFis given by\nExamples of such functionals are those proposed in Refs.[1][2][3]. These hybrid functionals are based on a common model for the dielectric function, but differ in the way how the range-separation parameters are obtained from first-principles calculations. Their connection and performance have been d", "wiki_url": "https://www.vasp.at/wiki/index.php/LMODELHF", "description_cn": "LMODELHF参数用于选择是否启用介电依赖的范围分离杂化泛函。", "default_value": ".FALSE.", "details_cn": "LMODELHF选择介电依赖的范围分离杂化泛函，其中AEXX和BEXX分别用于长程和短程的精确Hartree-Fock交换。通过设置LMODELHF=.TRUE.，可以指定使用误差函数进行屏蔽的各种类型的范围分离杂化泛函。使用LMODELHF可以构建的杂化泛函的一般形式由...给出。此类泛函的例子包括参考文献[1][2][3]中提出的那些。这些杂化泛函基于...", "recommended": "默认为.FALSE.，适用于标准DFT计算。若需使用范围分离杂化泛函（如HSE06等），设置为.TRUE.，并配合AEXX和BEXX参数调整长程和短程交换比例。使用场景：适用于半导体、绝缘体等带隙计算，或需要精确交换的体系。", "tips": "1. 设置LMODELHF=.TRUE.时，必须同时设置AEXX和BEXX参数，否则可能使用默认值。2. 范围分离杂化泛函计算成本较高，需权衡精度与效率。3. 参考文献[1][2][3]中的泛函可能需要额外参数，建议查阅VASP手册或相关文献。"}, "LMONO": {"name": "LMONO", "description": "LMONO= .TRUE. | .FALSE.Default:LMONO= .FALSE.", "default": "LMONO= .TRUE. | .FALSE.Default:LMONO= .FALSE.", "details": "Description:LMONOswitches on monopole-monopole corrections for the total energy.\nThe flag switches on monopole corrections for charged systems. The correction is calculated only a posteriori for the total energy.  No correction to the potential is calculated.\nThe primary use of this flag is for defect calculations in charged supercells, as well\nas charged 0D systems (molecules and atoms). VASP also automatically calculates\ncorrections to the total energy related to repeated dipoles (IDIPOL=4). \nThe user then needs to decide whether\nthose are sensible or ", "wiki_url": "https://www.vasp.at/wiki/index.php/LMONO", "description_cn": "LMONO是一个开关，用于启用单极-单极校正，默认值为FALSE。", "default_value": "FALSE", "details_cn": "LMONO启用总能量的单极-单极校正。该标志为带电系统启用单极校正。校正仅在后验计算总能量时进行，不计算对势的校正。该标志的主要用途是在带电超胞的缺陷计算中，以及带电的0D系统（如分子和原子）。VASP还自动计算与重复偶极子相关的总能量校正（IDIPOL=4）。", "recommended": "推荐在带电系统缺陷计算或带电分子/原子计算时设置为TRUE，否则保持默认FALSE。", "tips": "校正仅应用于总能量，不修改势。VASP会自动处理偶极子校正（IDIPOL=4）。"}, "LMP2LT": {"name": "LMP2LT", "description": "LMP2LT= .FALSE. | .TRUE.", "default": "Default:LMP2LT", "details": "Description:LMP2LTselects a Laplace transformed MP2 algorithm.\nIfLMP2LT=.TRUE. andALGO=ACFTDRK is set, a quartic scaling Laplace transformed MP2 algorithm is selected.[1]\nThis tag should be used in combination withKPARto tweak parallelization as described in thistutorial.", "wiki_url": "https://www.vasp.at/wiki/index.php/LMP2LT", "description_cn": "LMP2LT参数可设置为.FALSE.或.TRUE.", "default_value": "Default:LMP2LT", "details_cn": "LMP2LT选择Laplace变换MP2算法。如果LMP2LT=.TRUE.且设置了ALGO=ACFTDRK，则选择四次标度Laplace变换MP2算法。[1] 此标签应与KPAR结合使用，以调整并行化，如本教程所述。", "recommended": "默认为.FALSE.，当需要使用Laplace变换MP2算法时设置为.TRUE.，并配合ALGO=ACFTDRK使用。使用场景：适用于大规模系统的MP2计算，以降低计算复杂度。", "tips": "使用LMP2LT=.TRUE.时，需确保ALGO=ACFTDRK已设置；建议与KPAR参数结合使用以优化并行效率；注意计算资源消耗可能增加。"}, "LNABLA": {"name": "LNABLA", "description": "LNABLA= .TRUE. | .FALSE.Default:LNABLA= .FALSE.", "default": "LNABLA= .TRUE. | .FALSE.Default:LNABLA= .FALSE.", "details": "Description:LNABLA=.TRUE. evaluates the transversal expression for the frequency dependent dielectric matrix.\nUsually VASP uses thelongitudinal expression for the frequency dependent dielectric matrix.\nIt is however possible to switch to the computationally somewhat simpler transversal expressions by selectingLNABLA=.TRUE. (Eqs. 17 and 20 in Ref.[1]).\nIn this simplification the imaginary part of the macrosc\nExcept for the purpose of testing, there is however hardly ever a reason\nto use the transversal expression, since it is less accurate.", "wiki_url": "https://www.vasp.at/wiki/index.php/LNABLA", "description_cn": "LNABLA参数控制是否使用横向表达式来计算频率依赖的介电矩阵。", "default_value": "FALSE", "details_cn": "当LNABLA=.TRUE.时，使用横向表达式来计算频率依赖的介电矩阵。通常VASP使用纵向表达式来计算频率依赖的介电矩阵。然而，通过设置LNABLA=.TRUE.，可以切换到计算上更简单的横向表达式（参考文献[1]中的方程17和20）。在这种简化中，宏观介电函数的虚部... 除了测试目的外，几乎没有理由使用横向表达式。", "recommended": "推荐值为FALSE。使用场景：一般计算中推荐使用默认值FALSE，以确保准确性。仅当进行测试或需要简化计算时，可考虑设置为TRUE。", "tips": "横向表达式计算更简单，但可能影响结果准确性。仅建议在测试或特定研究中使用。请参考文献[1]了解详细方程。"}, "LNICSALL": {"name": "LNICSALL", "description": "LNICSALL= .TRUE. | .FALSE.Default:LNICSALL= .FALSE.", "default": "LNICSALL= .TRUE. | .FALSE.Default:LNICSALL= .FALSE.", "details": "Description:LNICSALL=.TRUE. calculates the NICS at the positions on the fine FFT gridNGXFxNGYFxNGZF.\nLNICSALL=.TRUE. ensures that the FFT gridNGXFxNGYFxNGZFis used to calculate the NICS (nucleus-independent chemical shift) points. These chemical shieldings will be printed toNICS.\nLCHIMAG,NUCIND,NICS,tutorial", "wiki_url": "https://www.vasp.at/wiki/index.php/LNICSALL", "description_cn": "LNICSALL参数控制是否在精细FFT网格上计算核独立化学位移（NICS）。", "default_value": ".FALSE.", "details_cn": "LNICSALL=.TRUE. 在精细FFT网格NGXFxNGYFxNGZF的位置上计算NICS。LNICSALL=.TRUE. 确保使用FFT网格NGXFxNGYFxNGZF来计算NICS（核独立化学位移）点。这些化学位移将被打印到NICS文件中。相关参数：LCHIMAG, NUCIND, NICS, 教程。", "recommended": "推荐值为.FALSE.（默认）。当需要计算NICS时，可设置为.TRUE.，但需注意计算成本。通常与LCHIMAG=.TRUE.配合使用，用于化学位移计算，适用于需要高精度NICS分析的场景，如研究分子芳香性或磁屏蔽效应。", "tips": "设置LNICSALL=.TRUE.会显著增加计算时间和内存消耗，建议仅在必要时使用。确保与LCHIMAG、NUCIND等参数正确配合，并参考VASP教程以优化设置。"}, "LNMRCAR": {"name": "LNMRCAR", "description": "LNMRCAR= .TRUE. | .FALSE.Default:LNMRCAR= .TRUE.", "default": "LNMRCAR= .TRUE. | .FALSE.Default:LNMRCAR= .TRUE.", "details": "Description: Write theNMRCAR.magresfile forEFG calculationsandchemical shielding calculations.\nWhencalculating the chemical shieldingsorcalculating the electric field gradient,LNMRCAR= Twrites theNMRCAR.magresinMagres format. Mind that, while the Magres format does not clearly state if themacroscopic susceptibilityshould be included, here it is included in the chemical shielding.\nCalculating the chemical shieldings", "wiki_url": "https://www.vasp.at/wiki/index.php/LNMRCAR", "description_cn": "LNMRCAR参数，用于控制是否写入NMRCAR.magres文件，可设置为TRUE或FALSE，默认值为TRUE。", "default_value": ".TRUE.", "details_cn": "为EFG计算和化学位移计算写入NMRCAR.magres文件。当计算化学位移或电场梯度时，LNMRCAR= .TRUE. 以Magres格式写入NMRCAR.magres文件。注意，虽然Magres格式没有明确说明是否应包含宏观磁化率，但在此处它被包含在化学位移中。计算化学位移", "recommended": ".TRUE.。使用场景：当需要进行NMR计算，如电场梯度（EFG）或化学位移计算时，应设置LNMRCAR= .TRUE.以生成必要的输出文件；否则，可设置为FALSE以节省计算资源。", "tips": "Magres格式中宏观磁化率的处理可能不明确，但在VASP中，化学位移计算已包含宏观磁化率，用户需注意这一点以确保计算结果的准确性。"}, "LNMRLEG": {"name": "LNMRLEG", "description": "LNMRLEG= .TRUE.| .FALSE.", "default": "Default:LNMRLEG", "details": "Description:LNMRLEGcontrols whether VASP prints NMR properties toOUTCARaccording to the old format (pre-version 6.6.0).\nIn version 6.6.0, the output format for NMR properties was updated. The legacy format is as presented below (seeLCHIMAGfor the current version). The chemical shielding tensors,UNSYMMETRIZED TENSORSandSYMMETRIZED TENSORSare printed. From the three diagonal values of the symmetrized tensor, the isotro\nThe isotropic chemical shielding for each atom, excluding and including G=0 contributions, as well as the span and skew (descriptions of asymmetry), follow. Finally, core contributions are taken into account for theISO_SHIFT,SPAN, andSKEW.", "wiki_url": "https://www.vasp.at/wiki/index.php/LNMRLEG", "description_cn": "LNMRLEG参数控制是否使用旧格式打印NMR属性。", "default_value": ".FALSE.", "details_cn": "LNMRLEG控制VASP是否按照旧格式（6.6.0版本之前）将NMR属性打印到OUTCAR文件中。在6.6.0版本中，NMR属性的输出格式已更新。旧格式如下所示（有关当前版本，请参见LCHIMAG）。打印化学屏蔽张量、非对称化张量和对称化张量。从对称化张量的三个对角值，计算各向同性化学屏蔽。", "recommended": ".FALSE.（使用新格式）。使用场景：对于新计算，建议使用新格式以获得更清晰的输出；如果需要与旧版本兼容或使用旧脚本，可设置为.TRUE.。", "tips": "在VASP 6.6.0及以上版本中，LNMRLEG默认为.FALSE.。设置LNMRLEG=.TRUE.将使用旧格式输出NMR数据。请确保与LCHIMAG等参数协调使用。"}, "LNMRSHIELD": {"name": "LNMRSHIELD", "description": "LNMRSHIELD= .TRUE.| .FALSE.", "default": "Default:LNMRSHIELD", "details": "Description:LNMRSHIELDcontrols whether the shielding or shift is printed.\nThe chemical shielding[math]\\displaystyle{ \\sigma_{ij} }[/math]is printed by default (i.e.LNMRSHIELD= .TRUE.) in theOUTCARfile. WhenLNMRSHIELD= .FALSE. is set, the chemical shift[math]\\displaystyle{ \\delta_{ij} }[/math]is printed instead ([math]\\displaystyle{ \\delta_{i,j} = -\\sigma_{ij} }[/math]), a", "wiki_url": "https://www.vasp.at/wiki/index.php/LNMRSHIELD", "description_cn": "LNMRSHIELD= .TRUE.| .FALSE.", "default_value": ".TRUE.", "details_cn": "LNMRSHIELD控制是否打印屏蔽或化学位移。默认情况下（即LNMRSHIELD= .TRUE.），在OUTCAR文件中打印化学位移张量σ_{ij}。当设置LNMRSHIELD= .FALSE.时，则打印化学位移δ_{ij}（δ_{i,j} = -σ_{ij}）。", "recommended": "根据计算需求选择。如果需要输出化学位移以与实验NMR谱比较，设置LNMRSHIELD= .FALSE.；如果需要屏蔽张量用于理论分析，设置LNMRSHIELD= .TRUE.。使用场景：NMR性质计算时，用于控制输出类型。", "tips": "确保NMR计算正确设置其他相关参数（如LCHIMAG等）。输出在OUTCAR文件中，检查时注意区分屏蔽和化学位移的物理意义。"}, "LNMR_SYM_RED": {"name": "LNMR_SYM_RED", "description": "LNMR_SYM_RED=  .TRUE. | .FALSE.Default:LNMR_SYM_RED=  .FALSE.", "default": "LNMR_SYM_RED=  .TRUE. | .FALSE.Default:LNMR_SYM_RED=  .FALSE.", "details": "Description: discard symmetry operations that are not consistent with the wayk-space derivatives are calculated in the linear-response calculations of chemical shifts.\nThe star on which thek-space derivative is calculated is oriented along the cartesian directions inkspace. If the symmetry operations inkspace do not map this star onto itself, erroneous results can be obtained. To check for such operations, setLNMR_SYM_RED=.TRUE.. VASP then disregards such operatio\nIt determines the orientation of thek-space star and, hence, can affect the efficiency via the number ofk-points in the IBZ.", "wiki_url": "https://www.vasp.at/wiki/index.php/LNMR_SYM_RED", "description_cn": "LNMR_SYM_RED参数用于控制是否丢弃与线性响应计算中k空间导数计算方式不一致的对称操作。", "default_value": "FALSE", "details_cn": "丢弃那些与线性响应计算中k空间导数计算方式不一致的对称操作。k空间导数计算所基于的星形在k空间中沿笛卡尔方向定向。如果k空间中的对称操作不能将这个星形映射到自身，可能会得到错误的结果。要检查此类操作，设置LNMR_SYM_RED=.TRUE.。VASP将忽略这些操作。它决定了k空间导数的方向。", "recommended": "TRUE，用于需要精确计算化学屏蔽张量的场景，特别是当系统对称性高或k空间导数计算敏感时。使用场景：在进行核磁共振（NMR）化学屏蔽计算时，如果怀疑对称操作导致错误，可以设置为TRUE以避免错误结果。", "tips": "设置为TRUE可能会增加计算时间，因为需要检查对称操作。另外，确保k空间导数计算正确，避免不必要的对称性降低。"}, "LNOAUGXC": {"name": "LNOAUGXC", "description": "LNOAUGXC= .TRUE. | .FALSE.Default:LNOAUGXC= .FALSE.", "default": "LNOAUGXC= .TRUE. | .FALSE.Default:LNOAUGXC= .FALSE.", "details": "Description:LNOAUGXCspecifies if aMETAGGAfunctional is evaluated with a density that is augmented or not.\nThe Kohn-Sham kinetic-energy density\nshould, in principle, be larger than the von Weizsäcker kinetic-energy density[1]", "wiki_url": "https://www.vasp.at/wiki/index.php/LNOAUGXC", "description_cn": "参数LNOAUGXC用于控制是否使用增强密度来评估METAGGA泛函。", "default_value": "FALSE", "details_cn": "LNOAUGXC指定是否使用增强密度来评估METAGGA泛函。Kohn-Sham动能密度原则上应大于von Weizsäcker动能密度[1]。", "recommended": "默认值FALSE适用于大多数标准计算。使用场景：当使用METAGGA泛函且需要更精确的动能密度评估时，可设置为TRUE，但需谨慎测试以避免计算误差。", "tips": "设置LNOAUGXC=TRUE可能增加计算成本，并需确保密度增强正确；建议参考VASP官方文档或相关文献进行验证。"}, "LNONCOLLINEAR": {"name": "LNONCOLLINEAR", "description": "LNONCOLLINEAR= .True. | .False.", "default": "Default:LNONCOLLINEAR", "details": "Description: Switch on noncollinear magnetic calculations.\nFor noncollinear magnetic calculations, setLNONCOLLINEAR= True in theINCARfile and use thevasp_nclexecutable. The electronic minimization treats the full 2x2 spin density[1]\nwhich is written to theCHGCARfile. In spinor space, the part of the spin density proportional to the 2x2 unit matrix corresponds to the charge density, and the part proportional to the vector of Pauli matrices is the magnetization density.\nThis enables the consideration of noncollinear magnetic stru", "wiki_url": "https://www.vasp.at/wiki/index.php/LNONCOLLINEAR", "description_cn": "控制是否开启非共线磁性计算的开关。", "default_value": "False", "details_cn": "开启非共线磁性计算。对于非共线磁性计算，在INCAR文件中设置LNONCOLLINEAR= True，并使用vasp_ncl可执行文件。电子最小化处理完整的2x2自旋密度[1]，该密度被写入CHGCAR文件。在旋量空间中，自旋密度中与2x2单位矩阵成比例的部分对应于电荷密度，而与泡利矩阵矢量成比例的部分是磁化密度。", "recommended": "当需要进行非共线磁性计算时设置为True，否则保持默认False。使用场景：研究非共线磁性材料、自旋轨道耦合效应、磁性拓扑绝缘体等复杂磁性系统。", "tips": "使用LNONCOLLINEAR=True时，必须使用vasp_ncl可执行文件；计算成本较高，需更多计算资源；需确保其他参数如MAGMOM正确设置以描述非共线磁矩；输出CHGCAR文件包含完整自旋密度信息。"}, "LOCPROJ": {"name": "LOCPROJ", "description": "LOCPROJ=<sites>:<functions-Ylm-specs>:<functions-radial-specs>Default:LOCPROJ=  None", "default": "LOCPROJ=<sites>:<functions-Ylm-specs>:<functions-radial-specs>Default:LOCPROJ=  None", "details": "Description: TheLOCPROJtag specifies local functions on which the orbitals are projected. These projections are written to thePROJCARfile,LOCPROJ file, andvasprun.xmlfile.\nWhen theLOCPROJtag is set, VASP performs the projection of the Kohn-Sham orbitals[math]\\displaystyle{ |\\psi_{n\\mathbf{k}}\\rangle }[/math]onto a localized orbitals basis[math]\\displaystyle{ |\\beta^\\alpha_{lm}\\rangle }[/math]which can be written as\n[math]\\displaystyle{ \nP^\\alpha_{lmn\\mathbf{k}} \n\\equiv \\langle \\beta_{lm}^{\\alpha}|S|\\psi_{n\\mathbf{k}}\\rangle\n= \\underbrace{\\langle \\beta_{lm}^{\\alpha}|\\psi_{n\\mathbf{k}}\\rangle}_{P^{\\text{SOFT},\\alpha}_{lmn\\mathbf{k}}} + \n\\underbrace{\\sum_{ij} \\langle \\beta^\\alpha_{lm}|\\tilde{p}_i\\rangle Q_{ij} \\l", "wiki_url": "https://www.vasp.at/wiki/index.php/LOCPROJ", "description_cn": "LOCPROJ=<sites>:<functions-Ylm-specs>:<functions-radial-specs> 默认值：LOCPROJ=None", "default_value": "None", "details_cn": "LOCPROJ标签指定轨道投影的局部函数。这些投影被写入PROJCAR文件、LOCPROJ文件和vasprun.xml文件。当设置LOCPROJ标签时，VASP执行Kohn-Sham轨道[math]\\displaystyle{ |\\psi_{n\\mathbf{k}}\\rangle }[/math]到局部轨道基[math]\\displaystyle{ |\\beta^\\alpha_{lm}\\rangle }[/math]的投影，可以写为[math]\\displaystyle{ P^\\alpha_{lmn\\mathbf{k}} \\equiv \\langle \\beta_{lm}^\\alpha", "recommended": "根据计算需求设置，例如LOCPROJ=1:sp:PAW_PBE表示对第一个原子的s和p轨道进行投影。使用场景：当需要分析电子结构的轨道投影，如计算投影态密度（PDOS）、分析特定原子的轨道贡献或研究化学键时，设置此参数；否则保持默认None以节省计算资源。", "tips": "1. 参数格式必须严格遵循<sites>:<functions-Ylm-specs>:<functions-radial-specs>，例如指定原子索引、角动量函数和径向函数。2. 设置后VASP会生成额外文件（如PROJCAR、LOCPROJ），注意磁盘空间和I/O开销。3. 对于PAW方法，推荐使用PAW_PBE等标准径向函数规格。4. 确保与INCAR中其他参数（如LORBIT）协调，避免冲突。"}, "LOPTICS": {"name": "LOPTICS", "description": "LOPTICS= .TRUE. | .FALSE.Default:LOPTICS= .FALSE.", "default": "LOPTICS= .TRUE. | .FALSE.Default:LOPTICS= .FALSE.", "details": "Description:LOPTICS=.TRUE. calculates the frequency dependent dielectric matrix after the electronic ground state has been determined.\nThe imaginary part is determined by a summation over empty states using the equation:", "wiki_url": "https://www.vasp.at/wiki/index.php/LOPTICS", "description_cn": "LOPTICS 参数用于控制是否计算频率相关的介电矩阵。", "default_value": ".FALSE.", "details_cn": "当 LOPTICS 设置为 .TRUE. 时，在电子基态确定后，计算频率相关的介电矩阵。虚部通过使用方程对空态求和来确定。", "recommended": "推荐在需要计算光学性质（如介电函数、吸收光谱）时设置为 .TRUE.，否则保持默认 .FALSE. 以节省计算资源。", "tips": "设置 LOPTICS=.TRUE. 可能需要增加 NBANDS 参数以确保足够的空态；计算可能耗时较长；建议结合 CSHIFT 参数调整展宽。"}, "LORBIT": {"name": "LORBIT", "description": "LORBIT= 0 | 1 | 2 | 5 | 10 | 11 | 12Default:LORBIT=  0", "default": "LORBIT= 0 | 1 | 2 | 5 | 10 | 11 | 12Default:LORBIT=  0", "details": "Description: Selects a projection method onto local quantum numbers ([math]\\displaystyle{ lm }[/math]) and writesPROCAR/PROOUTfile.\nWhenLORBITis set, VASP performs a post-processing step of the Kohn-Sham (KS) orbitals to decompose the KS orbitals into local quantum numbers ([math]\\displaystyle{ lm }[/math]) and obtain local properties, e.g., the on-site charge density or on-site magnetic moments due to the spin degrees of freedo\nFor VASP version < 6 withLORBIT>= 11 andISYM= 2, seeknown issues.", "wiki_url": "https://www.vasp.at/wiki/index.php/LORBIT", "description_cn": "LORBIT参数选择投影方法到局部量子数（lm）并写入PROCAR或PROOUT文件。", "default_value": "0", "details_cn": "选择投影方法到局部量子数（lm）并写入PROCAR或PROOUT文件。当设置LORBIT时，VASP执行Kohn-Sham（KS）轨道的后处理步骤，将KS轨道分解为局部量子数（lm），并获取局部性质，例如由于自旋自由度导致的在位电荷密度或在位磁矩。对于VASP版本<6，当LORBIT>=11和ISYM=2时，存在已知问题。", "recommended": "LORBIT=11用于详细的态密度和能带分析，投影到原子轨道；LORBIT=10用于简单的态密度计算，投影到球谐函数。使用场景：计算态密度、能带结构、磁矩等局部性质。", "tips": "对于VASP版本低于6，当LORBIT>=11且ISYM=2时，存在已知问题，建议升级VASP或调整参数以避免错误。"}, "LORBMOM": {"name": "LORBMOM", "description": "LORBMOM= .TRUE. | .FALSE.Default:LORBMOM= .FALSE.", "default": "LORBMOM= .TRUE. | .FALSE.Default:LORBMOM= .FALSE.", "details": "Description: Specifies whether the orbital moments are written out. Only applicable in a calculation usingLSORBIT= True .\nIfLORBMOM=.TRUE. is set, VASP will use the projectors of the PAW potentials to calculate the\norbital angular moment within the PAW spheres, and write them to theOUTCARfile. Look for\nto find the orbital- and site-resolved table.", "wiki_url": "https://www.vasp.at/wiki/index.php/LORBMOM", "description_cn": "指定是否输出轨道磁矩。仅在使用LSORBIT= True的计算中适用。", "default_value": "FALSE", "details_cn": "如果设置LORBMOM=.TRUE.，VASP将使用PAW势的投影算子计算PAW球内的轨道角动量，并将其写入OUTCAR文件。查找以找到轨道和位点分辨的表格。", "recommended": "FALSE（默认）。使用场景：当进行自旋轨道耦合计算（LSORBIT=TRUE）并需要分析轨道磁矩时，设置为TRUE。", "tips": "1. 仅当LSORBIT=TRUE时有效；2. 设置为TRUE会增加计算量和输出文件大小；3. 确保使用的PAW势支持投影算子。"}, "LPARD": {"name": "LPARD", "description": "LPARD= [logical]Default:LPARD= .FALSE.", "default": "LPARD= [logical]Default:LPARD= .FALSE.", "details": "Description: Determines whether partial (band and/ork-point-decomposed) charge densities are evaluated.\nAnLPARDrun is a postprocessing step that requires a pre-converged calculation. It writes the partial density, or multiple partial charge densities, to onePARCHGfile or several PARCHG.*.* files, depending on the setting ofLSEPBandLSEPK.\nIfLPARDH5= .TRUE., the output is redirected fromPARCHGtovaspout.\nThere are various ways to divide the partial charge density. You can pick the contributing bands either by index (refer toNBMODandIBAND) or by energy range (refer toEINT), and select contributingkpoints throughKPUSE.", "wiki_url": "https://www.vasp.at/wiki/index.php/LPARD", "description_cn": "决定是否计算部分（能带和/或k点分解的）电荷密度。", "default_value": ".FALSE.", "details_cn": "决定是否计算部分（能带和/或k点分解的）电荷密度。LPARD运行是一个后处理步骤，需要预先收敛的计算。它将部分密度或多个部分电荷密度写入一个PARCHG文件或多个PARCHG.*.*文件，具体取决于LSEPBand LSEPK的设置。如果LPARDH5= .TRUE.，输出将从PARCHG重定向到vaspout。有多种方式划分部分电荷密度。你可以选择贡献的能带", "recommended": "根据计算需求设置。如果需要分析特定能带或k点对电荷密度的贡献，例如在态密度或能带结构研究中，设置为.TRUE.；否则保持默认.FALSE.以节省计算资源。使用场景：在后处理步骤中，用于研究部分电荷密度分布，如可视化特定能带的电荷贡献。", "tips": "LPARD运行必须基于预先收敛的计算；输出文件格式和数量受LSEPBand LSEPK参数影响；若启用LPARDH5= .TRUE.，输出将重定向到vaspout文件而非PARCHG；确保在设置LPARD前完成收敛计算以避免错误。"}, "LPARDH5": {"name": "LPARDH5", "description": "LPARDH5= [logical]Default:LPARDH5= .FALSE.", "default": "LPARDH5= [logical]Default:LPARDH5= .FALSE.", "details": "Description:LPARDH5determines whether the partial charges are written toPARCHGorvaspout.h5.\nPartial chargescan be calculated as a postprocessing step whenLPARD= .TRUE.. The output is written to one or severalPARCHGfiles ifLPARDH5=.FALSE., and tovaspout.h5ifLPARDH5=.TRUE.. IfNBMOD= -1, the setting ofLPARDis irrelevant. Instead of aPARCHGfile, or a partial_charges group in thevaspout.h5hdf5 \nIf the output is redirected tovaspout.h5,py4vaspcan be used to analyze the partial charge density and to simulate STM pictures.", "wiki_url": "https://www.vasp.at/wiki/index.php/LPARDH5", "description_cn": "LPARDH5参数控制部分电荷的输出格式，决定写入PARCHG文件还是vaspout.h5文件。", "default_value": ".FALSE.", "details_cn": "LPARDH5决定部分电荷是写入PARCHG文件还是vaspout.h5文件。当LPARD= .TRUE.时，部分电荷可以作为后处理步骤计算。如果LPARDH5=.FALSE.，输出写入一个或多个PARCHG文件；如果LPARDH5=.TRUE.，输出写入vaspout.h5。如果NBMOD= -1，LPARD的设置无关紧要。输出将重定向到vaspout.h5中的partial_charges组，而不是PARCHG文件。如果输出重定向到vaspout.h5，可以使用py4vasp来分析部分电荷密度并进行模拟。", "recommended": "默认值为.FALSE.，适用于传统PARCHG文件输出，兼容性好。如果需要使用HDF5格式（vaspout.h5）进行高效存储和分析，推荐设置为.TRUE.，尤其适合结合py4vasp工具进行后处理。", "tips": "1. 确保LPARD参数设置为.TRUE.以计算部分电荷，除非NBMOD=-1；2. 使用HDF5输出时需安装py4vasp进行分析；3. 注意vaspout.h5文件可能较大，确保存储空间充足；4. 在并行计算中，HDF5输出可能影响性能，建议测试后使用。"}, "LPEAD": {"name": "LPEAD", "description": "LPEAD= .TRUE. | .FALSEDefault:LPEAD= .FALSE.", "default": "LPEAD= .TRUE. | .FALSEDefault:LPEAD= .FALSE.", "details": "Description: forLPEAD=.TRUE., the derivative of the cell-periodic part of the orbitals w.r.t.k, |∇kunk⟩, is calculated using finite differences (\"perturbation expansion after discretization\" (PEAD)[1][2]).\nThe derivative of the cell-periodic part of the orbitals w.r.t.k,k, |∇kunk⟩, may be written as:\nwhere H(k) and S(k) are the Hamiltonian and overlap operator for the cell-periodic part of the orbitals, and the sum overn´ must include a sufficiently large number of unoccupied states.", "wiki_url": "https://www.vasp.at/wiki/index.php/LPEAD", "description_cn": "LPEAD参数控制是否使用有限差分法计算轨道的单元周期部分对k的导数。", "default_value": "FALSE", "details_cn": "当LPEAD=.TRUE.时，轨道的单元周期部分对k的导数，|∇kunk⟩，使用有限差分法计算（“离散化后的微扰展开”（PEAD）[1][2]）。该导数可以表示为：其中H(k)和S(k)是轨道的单元周期部分的哈密顿量和重叠算子，并且对n'的求和必须包括足够多的未占据态。", "recommended": "推荐在需要精确计算轨道对k的导数时设置为TRUE，例如计算光学性质、贝里相位或拓扑性质。默认为FALSE，适用于一般计算。", "tips": "设置LPEAD=TRUE会增加计算成本，因为需要计算未占据态。确保在求和中包含足够多的未占据态以获得准确结果。"}, "LPHON_DISPERSION": {"name": "LPHON_DISPERSION", "description": "LPHON_DISPERSION= .TRUE. | .FALSE.", "default": "Default:LPHON_DISPERSION", "details": "Description:LPHON_DISPERSIONrequests the calculation of the phonon dispersion along the q-point path supplied in fileQPOINTS(same format asKPOINTS).\nAfter the computation of the force constants using finite differences (IBRION=5,6) or density-functional perturbation theory (IBRION=7,8) on a supercell it is possible to compute the phonon dispersion for the equivalent primitive cell determined by VASP by settingLPHON_DISPERSION=.TRUE.\nQPOINTS,PHON_NWRITE,LPHON_POLAR,PHON_DIELECTRIC,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/LPHON_DISPERSION", "description_cn": "LPHON_DISPERSION参数用于控制是否计算声子色散，可设置为 .TRUE. 或 .FALSE.。", "default_value": ".FALSE.", "details_cn": "LPHON_DISPERSION请求计算沿QPOINTS文件中提供的q点路径的声子色散（格式与KPOINTS相同）。在使用有限差分（IBRION=5,6）或密度泛函微扰理论（IBRION=7,8）在超胞上计算力常数后，可以通过设置LPHON_DISPERSION=.TRUE.来计算VASP确定的等效原胞的声子色散。相关参数：QPOINTS, PHON_NWRITE, LPHON_POLAR, PHON_DIELECTRIC, PHON_BORN_CHARG。", "recommended": "当需要计算声子色散时设置为 .TRUE.，否则保持默认 .FALSE.。使用场景：在研究声子色散关系、晶格动力学或热力学性质时使用，例如分析声子谱、计算热容或声子寿命。", "tips": "1. 需要先通过IBRION=5,6或7,8计算力常数，确保力常数计算完成。2. 必须提供QPOINTS文件，其格式与KPOINTS文件相同，指定q点路径。3. 可能需要设置相关参数如PHON_NWRITE控制输出详细程度、LPHON_POLAR处理极性材料、PHON_DIELECTRIC和PHON_BORN_CHARG提供介电常数和Born电荷。"}, "LPHON_POLAR": {"name": "LPHON_POLAR", "description": "LPHON_POLAR= .TRUE. | .FALSE.Default:LPHON_POLAR= .FALSE.", "default": "LPHON_POLAR= .TRUE. | .FALSE.Default:LPHON_POLAR= .FALSE.", "details": "Description:LPHON_POLARincludes dipole-dipole corrections in the computation of the phonon dispersion. For this mode,PHON_DIELECTRICandPHON_BORN_CHARGESmust also be set.\nIf the material is non-metallic and polar (i.e. two or more atoms in the unit cell carry nonzero Born effective charge tensors), a special treatment of the long-range dipole-dipole interaction is required to obtain a smooth phonon dispersion.\nThis is activated by settingLPHON_POLAR=.TRUE. and supply\nIn the case of metals, the dielectric function is infinite, for nonpolar semiconductors the Born effective charges are zero which in both cases means that thelong-range interatomic force-constantsare zero and this dipole-dipole correction does not need to be applied.", "wiki_url": "https://www.vasp.at/wiki/index.php/LPHON_POLAR", "description_cn": "LPHON_POLAR参数用于控制是否在声子色散计算中包含偶极-偶极修正。可设置为TRUE或FALSE，默认值为FALSE。", "default_value": "默认值为FALSE", "details_cn": "LPHON_POLAR在声子色散计算中包含偶极-偶极修正。对于此模式，还必须设置PHON_DIELECTRIC和PHON_BORN_CHARGES。如果材料是非金属且极性的（即单胞中有两个或更多原子携带非零Born有效电荷张量），则需要特殊处理长程偶极-偶极相互作用以获得平滑的声子色散。通过设置LPHON_POLAR=.TRUE.并提供相关参数来激活此功能。对于金属，偶极-偶极修正通常不需要，因为自由电子会屏蔽长程相互作用。", "recommended": "对于非金属极性材料，设置LPHON_POLAR=.TRUE.；对于金属或非极性材料，设置为FALSE。使用场景：计算极性绝缘体或半导体的声子色散时启用，以确保长程相互作用被正确处理。", "tips": "1. 启用LPHON_POLAR时，必须同时设置PHON_DIELECTRIC和PHON_BORN_CHARGES参数。2. 对于金属材料，通常不需要启用此参数，因为自由电子会屏蔽偶极相互作用。3. 确保材料具有非零Born有效电荷，否则修正可能不必要或无效。"}, "LPHON_READ_FORCE_CONSTANTS": {"name": "LPHON_READ_FORCE_CONSTANTS", "description": "LPHON_READ_FORCE_CONSTANTS= .TRUE. | .FALSE.", "default": "Default:LPHON_READ_FORCE_CONSTANTS", "details": "Description:LPHON_READ_FORCE_CONSTANTSread the force constants from a vaspin.h5 file containing the force constants computed with a previous VASP run.\nAfter the computation of the force constants using finite-differences (IBRION=5,6) or density-functional perturbation theory (IBRION=7,8) on a supercell the force constants are written to the vaspout.h5 file.\nTo plot the phonon dispersion on a different path the user can modify theQPOINTSfile and re\nQPOINTS,LPHON_DISPERSION,PHON_NWRITE,LPHON_POLAR,PHON_DIELECTRIC,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/LPHON_READ_FORCE_CONSTANTS", "description_cn": "LPHON_READ_FORCE_CONSTANTS 可以设置为 .TRUE. 或 .FALSE.", "default_value": "Default:LPHON_READ_FORCE_CONSTANTS", "details_cn": "LPHON_READ_FORCE_CONSTANTS 从 vaspin.h5 文件中读取力常数，该文件包含先前 VASP 运行计算的力常数。在使用有限差分（IBRION=5,6）或密度泛函微扰理论（IBRION=7,8）在超胞上计算力常数后，力常数被写入 vaspout.h5 文件。为了在不同路径上绘制声子色散，用户可以修改 QPOINTS 文件并重新运行 QPOINTS、LPHON_DISPERSION、PHON_NWRITE、LPHON_POLAR 相关计算。", "recommended": "当需要从先前计算的力常数文件读取数据时设置为 .TRUE.，否则使用默认值 .FALSE.。使用场景：在已经计算了力常数（例如通过 IBRION=5,6,7,8）后，想在不同路径或参数下重新计算声子色散时，设置为 .TRUE. 可以避免重复计算，节省时间。", "tips": "确保 vaspin.h5 文件存在且包含正确的力常数数据。同时，需要正确设置 QPOINTS、LPHON_DISPERSION、PHON_NWRITE、LPHON_POLAR 等相关参数以进行声子色散计算。"}, "LPLANE": {"name": "LPLANE", "description": "LPLANE= [logical]Default:LPLANE= .TRUE.", "default": "LPLANE= [logical]Default:LPLANE= .TRUE.", "details": "Description:LPLANEswitches on the plane-wise data distribution in real space.\nForLPLANE=.TRUE., the data distribution in real space is done plane wise.\nAny combination ofNPARandLPLANEcan be used.\nGenerally,LPLANE=.TRUE. reduces the communication band width during the FFT's, but at the same time it unfortunately worsens the load balancing on massively parallel machines.LPLANE=.TRUE. should only be used ifNGZis at least 3×(number of nodes)/NPAR, and optimal load balancing is achieved ifNGZ=n×N", "wiki_url": "https://www.vasp.at/wiki/index.php/LPLANE", "description_cn": "LPLANE 启用实空间中的平面数据分布。", "default_value": ".TRUE.", "details_cn": "LPLANE 启用实空间中的平面数据分布。当 LPLANE=.TRUE. 时，实空间中的数据分布按平面进行。NPAR 和 LPLANE 的任何组合都可以使用。通常，LPLANE=.TRUE. 会减少 FFT 过程中的通信带宽，但不幸的是，它同时会恶化大规模并行机器上的负载平衡。LPLANE=.TRUE. 应仅在 NGZ 至少为 3×(节点数)/NPAR 时使用，并且当 NGZ=n×N 时实现最优负载平衡。", "recommended": "推荐值为 .TRUE.，但需确保 NGZ 至少为 3×(节点数)/NPAR 以优化负载平衡。在不满足条件时，建议使用 .FALSE.。", "tips": "使用 LPLANE=.TRUE. 时，需注意负载平衡问题；在大规模并行计算中，确保 NGZ 足够大以避免性能下降。"}, "LPOSNICS": {"name": "LPOSNICS", "description": "LPOSNICS= .TRUE.| .FALSE.", "default": "Default:LPOSNICS", "details": "Description:LPOSNICScontrols if VASP reads thePOSNICSfile.\nTo avoid reading thePOSNICSfile without removing it from the working directory, theLPOSNICStag can be set to.FALSE.in theINCARfile.\nLCHIMAG,NUCIND,POSNICS,tutorial", "wiki_url": "https://www.vasp.at/wiki/index.php/LPOSNICS", "description_cn": "LPOSNICS参数，可设置为 .TRUE. 或 .FALSE.", "default_value": "LPOSNICS", "details_cn": "LPOSNICS控制VASP是否读取POSNICS文件。为避免在不从工作目录中删除POSNICS文件的情况下读取它，可以在INCAR文件中将LPOSNICS标签设置为.FALSE.。相关参数：LCHIMAG, NUCIND, POSNICS, 教程", "recommended": "通常设置为.FALSE.，除非需要读取POSNICS文件进行核独立化学位移（NICS）计算。使用场景：在进行NICS计算时，设置为.TRUE.以启用文件读取。", "tips": "如果不希望VASP读取POSNICS文件但不想删除它，可设置LPOSNICS=.FALSE.。确保参考相关参数LCHIMAG、NUCIND和POSNICS，以及VASP教程以获取更多指导。"}, "LREAL": {"name": "LREAL", "description": "LREAL= .FALSE. | Auto (or A) | On (or O) | .TRUE.Default:LREAL= .FALSE.", "default": "LREAL= .FALSE. | Auto (or A) | On (or O) | .TRUE.Default:LREAL= .FALSE.", "details": "Description:LREALdetermines whether the projection operators are evaluated in real-space or in reciprocal space.\nThe nonlocal part of thepseudopotentialrequires the evaluation of an expression:\nwhere the \"projected wavefunction character\" is defined as:", "wiki_url": "https://www.vasp.at/wiki/index.php/LREAL", "description_cn": "LREAL决定投影算子是在实空间还是倒空间中计算。", "default_value": "默认值为.FALSE.", "details_cn": "LREAL决定投影算子是在实空间还是倒空间中计算。赝势的非局域部分需要计算一个表达式，其中“投影波函数特征”定义为：", "recommended": "对于小系统（如原子数少于100），使用.FALSE.以获得高精度；对于大系统，使用Auto或On以提高计算效率。使用场景：根据系统大小和计算资源选择，Auto可自动平衡精度与效率。", "tips": "使用实空间计算时，需确保足够的网格点以避免精度损失；倒空间计算更精确但计算成本高，建议在精度要求高时使用.FALSE.。"}, "LRHFCALC": {"name": "LRHFCALC", "description": "LRHFCALC= .TRUE. | .FALSE.Default:LRHFCALC= .FALSE.", "default": "LRHFCALC= .TRUE. | .FALSE.Default:LRHFCALC= .FALSE.", "details": "Description: Switch on the decomposition of the exchange for the hybrid functionals using full Hartree-Fock exchange at long range.\nIfLRHFCALC=.TRUE. the exchange functional is decomposed into short-range LDA, PBE or PBEsol (GGA=CA, PE, PS, respectively) and long-range Hartree-Fock:\nThe mixing[math]\\displaystyle{ a_{\\mathrm{LR}} }[/math]and screening[math]\\displaystyle{ \\mu }[/math]are controlled by theAEXXandHFSCREENtags, respectively. The RSHXLDA or RSHXPBE functionals[1][2][3]are examples of such functionals and\ntheir settings are shown on thepage listing the hybrid function", "wiki_url": "https://www.vasp.at/wiki/index.php/LRHFCALC", "description_cn": "开启交换泛函的分解，使用全Hartree-Fock交换在长程范围。", "default_value": ".FALSE.", "details_cn": "如果LRHFCALC=.TRUE.，交换泛函被分解为短程LDA、PBE或PBEsol（分别对应GGA=CA、PE、PS）和长程Hartree-Fock：混合参数a_LR和屏蔽参数μ分别由AEXX和HFSCREEN标签控制。RSHXLDA或RSHXPBE泛函是例子。", "recommended": "默认为.FALSE.，适用于大多数标准杂化泛函计算。当需要使用范围分离杂化泛函（如RSHXLDA或RSHXPBE）时，设置为.TRUE.。使用场景：适用于研究长程交换效应重要的系统，例如半导体带隙计算、分子激发态或涉及弱相互作用的体系。", "tips": "设置LRHFCALC=.TRUE.时，必须配合AEXX和HFSCREEN参数调整混合比例和屏蔽长度，以确保计算准确性。同时，GGA参数需与短程泛函匹配（如CA对应LDA，PE对应PBE，PS对应PBEsol）。注意计算成本可能显著增加，因为涉及全Hartree-Fock交换，建议在资源充足时使用。"}, "LRPA": {"name": "LRPA", "description": "LRPA= .TRUE. | .FALSE.Default:LRPA= .FALSE.", "default": "LRPA= .TRUE. | .FALSE.Default:LRPA= .FALSE.", "details": "Description:LRPA=.TRUE. includes local field effect on the Hartree level only.\nForLRPA=.TRUE. local field effects are included on the Hartree level only. This means that cell periodic microscopic changes of the local potential related to the change of the Hartree potential are included.\nForLRPA=.FALSE. changes of the Hartreeand the exchange-correlation potentialare included. This usually increases the dielectric constants. The final values for the dielectric tensor can be found in theOUTCARfile after the lines.", "wiki_url": "https://www.vasp.at/wiki/index.php/LRPA", "description_cn": "LRPA参数控制介电函数计算中是否包含局域场效应。", "default_value": ".FALSE.", "details_cn": "LRPA=.TRUE. 仅在哈特里（Hartree）级别包含局域场效应。这意味着仅包含与哈特里势变化相关的、具有晶胞周期性的局域势微观变化。当LRPA=.FALSE.时，则同时包含哈特里势和交换关联势的变化。这通常会增大介电常数。最终的介电张量值可在OUTCAR文件中找到。", "recommended": "LRPA= .FALSE.。使用场景：在计算材料的光学性质（如介电函数、吸收光谱）时，为了获得更准确的结果，通常推荐使用LRPA= .FALSE.，因为它包含了更完整的局域场效应。如果计算资源有限或仅需定性结果，可使用默认值。", "tips": "1. 此参数主要影响线性响应计算（如LEPSILON=.TRUE.）和GW计算中的介电函数部分。2. 设置为TRUE会略微降低计算成本，但可能低估介电常数。3. 最终结果应检查OUTCAR文件中的介电张量。"}, "LRPAFORCE": {"name": "LRPAFORCE", "description": "LRPAFORCE= .TRUE. | .FALSE.Default:LRPAFORCE= .FALSE.", "default": "LRPAFORCE= .TRUE. | .FALSE.Default:LRPAFORCE= .FALSE.", "details": "Description:LRPAFORCE=.TRUE. calculates forces in the random-phase approximation (RPA).\nAvailable as of VASP.6.1.\nThis tag can be optionally set in low-scalingRPA calculationsorGW calculations. It allows computing theRPA forces[1]on each ion. \nSetting", "wiki_url": "https://www.vasp.at/wiki/index.php/LRPAFORCE", "description_cn": "LRPAFORCE=.TRUE. 时，在随机相位近似（RPA）下计算力。", "default_value": ".FALSE.", "details_cn": "LRPAFORCE=.TRUE. 时，在随机相位近似（RPA）下计算力。自 VASP.6.1 版本起可用。此标签可选地设置在低标度 RPA 计算或 GW 计算中。它允许计算每个离子的 RPA 力[1]。设置 LRPAFORCE=.TRUE.。", "recommended": "通常为 .FALSE.，但在需要计算 RPA 力的低标度 RPA 或 GW 计算中设置为 .TRUE.。使用场景：当进行精确的力计算，如结构优化或分子动力学模拟时，结合 RPA 或 GW 方法。", "tips": "1. 确保 VASP 版本至少为 6.1。2. 仅在低标度 RPA 或 GW 计算中使用。3. 启用此选项可能增加计算成本。4. 参考文献 [1] 提供了更多细节，建议查阅。"}, "LSCAAWARE": {"name": "LSCAAWARE", "description": "Description:LSCAAWAREcontrols the distribution of the Hamilton matrix.", "default": "Default:LSCAAWARE", "details": "Description:LSCAAWAREcontrols the distribution of the Hamilton matrix.\nForLSCAAWARE=.TRUE., VASP distributes the Hamilton matrix among the MPI ranks.  \nForLSCAAWARE=.FALSE., each MPI ranks allocates the complete Hamiltonain. In both casesLSCALAPACKdecides if ScaLAPACK routines are used for diagonalization.\nNPAR,NCORE,LPLANE,NSIM,KPAR,LSCALU,LSCALAPACK", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCAAWARE", "description_cn": "LSCAAWARE 控制 Hamilton 矩阵的分布。", "default_value": ".TRUE.", "details_cn": "LSCAAWARE 控制 Hamilton 矩阵的分布。当 LSCAAWARE=.TRUE. 时，VASP 在 MPI 进程间分布 Hamilton 矩阵。当 LSCAAWARE=.FALSE. 时，每个 MPI 进程分配完整的 Hamilton 矩阵。在这两种情况下，LSCALAPACK 决定是否使用 ScaLAPACK 例程进行对角化。相关参数：NPAR, NCORE, LPLANE, NSIM, KPAR, LSCALU, LSCALAPACK", "recommended": "对于大型系统或内存受限的情况，建议设置为 .TRUE. 以减少每个 MPI 进程的内存使用，提高并行效率。对于小型系统或调试，可以设置为 .FALSE. 以简化内存分配。使用场景：当使用多个 MPI 进程且系统较大时，启用分布式存储；当系统较小或需要快速测试时，禁用分布式存储。", "tips": "1. 确保与 LSCALAPACK 参数协调设置，以决定是否使用 ScaLAPACK 进行对角化。2. 调整 NPAR、NCORE 等参数以优化并行性能，避免通信瓶颈。3. 在设置 LSCAAWARE=.TRUE. 时，注意 MPI 进程间的通信开销可能影响计算速度。4. 默认值基于 VASP 常见设置，实际使用中应根据系统规模和硬件资源调整。"}, "LSCALAPACK": {"name": "LSCALAPACK", "description": "LSCALAPACK= [logical]", "default": "Default:LSCALAPACK", "details": "Description:LSCALAPACKcontrols the use of scaLAPACK.\nForLSCALAPACK=.TRUE., VASP uses scaLAPACK routines for the orthonormalization of the wave functions and subspace diagonalizations.\nThe use of scaLAPACK for the LU decomposition in the orthonormalization of the wave functions may be independently switched off (LSCALU=.FALSE.).", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCALAPACK", "description_cn": "LSCALAPACK= [逻辑值]", "default_value": "FALSE", "details_cn": "LSCALAPACK控制scaLAPACK的使用。当LSCALAPACK=.TRUE.时，VASP使用scaLAPACK例程进行波函数的正交化和子空间对角化。scaLAPACK在波函数正交化中用于LU分解的部分可以独立关闭（LSCALU=.FALSE.）。", "recommended": "对于大规模并行计算（如使用多个计算节点），建议设置为.TRUE.以提高性能；对于小规模或单节点计算，保持默认.FALSE.。使用场景：当处理大体系或需要高效正交化和对角化时。", "tips": "启用LSCALAPACK需要VASP在编译时支持scaLAPACK库。可能会增加内存使用。LSCALU参数可以独立控制LU分解部分的scaLAPACK使用，建议根据具体需求调整。"}, "LSCALER0": {"name": "LSCALER0", "description": "LSCALER0= .TRUE. | .FALSE.Default:LSCALER0= .TRUE.", "default": "LSCALER0= .TRUE. | .FALSE.Default:LSCALER0= .TRUE.", "details": "Description:LSCALER0decides whether to re-scale the van der Waals radii[math]\\displaystyle{ R_{0} }[/math](LSCALER0=.TRUE.) or not.\nIVDW,Self-consistent screening in Tkatchenko-Scheffler method,LVDWEXPANSION\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCALER0", "description_cn": "LSCALER0参数用于控制是否重新缩放范德华半径。", "default_value": ".TRUE.", "details_cn": "LSCALER0决定是否重新缩放范德华半径R0（当LSCALER0=.TRUE.时）。相关参数：IVDW，Tkatchenko-Scheffler方法中的自洽屏蔽，LVDWEXPANSION。", "recommended": "通常使用默认值.TRUE.，适用于使用Tkatchenko-Scheffler方法进行范德华校正的计算，如分子吸附、层状材料或弱相互作用体系。使用场景：当需要精确描述范德华相互作用时，保持默认值可自动优化半径；若需自定义半径，可设置为.FALSE.。", "tips": "LSCALER0仅在使用IVDW参数指定范德华方法（如IVDW=10或11）时有效。设置为.FALSE.时，需手动提供范德华半径，否则可能导致计算错误。确保与IVDW和LVDWEXPANSION参数一致，以避免不兼容问题。"}, "LSCALU": {"name": "LSCALU", "description": "LSCALU= [logical]Default:LSCALU= .FALSE.", "default": "LSCALU= [logical]Default:LSCALU= .FALSE.", "details": "Description:LSCALUswitches on the parallel LU decomposition (using scaLAPACK) in the orthonormalization of the wave functions.\nForLSCALU=.TRUE. the LU decomposition in the orthormalization of the wave functions is done in parallel, using scaLAPACK routines.\nProvided, of course,LSCALAPACK=.TRUE. and VASP was compiled with scaLAPACK support (precompiler flag: -DscaLAPACK).\nIn many cases, the scaLAPACK LU decomposition based isslowerthan the serial LU decomposition (compare the timingORTHCHin the respectiveOUTCARfiles). Hence the default isLSCALU=.FALSE.\n(subspace rotations, however, are still done using scaLAPACK).", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCALU", "description_cn": "LSCALU是一个逻辑参数，用于控制波函数正交化中是否使用并行LU分解。", "default_value": ".FALSE.（逻辑假）", "details_cn": "LSCALU开关在波函数正交化中启用并行LU分解（使用scaLAPACK）。当LSCALU=.TRUE.时，波函数正交化中的LU分解将使用scaLAPACK例程并行执行。当然，前提是LSCALAPACK=.TRUE.且VASP编译时支持scaLAPACK（预编译标志：-DscaLAPACK）。在许多情况下，基于scaLAPACK的LU分解比串行LU分解更慢（比较时间ORTHCH在r", "recommended": "推荐值为.FALSE.（默认值）。使用场景：一般情况下不推荐启用，因为可能降低计算性能。仅在特定并行化需求（如大规模计算且资源充足）且经过性能测试后，可考虑设为.TRUE.。", "tips": "1. 启用LSCALU前，必须确保LSCALAPACK=.TRUE.且VASP编译时包含scaLAPACK支持（预编译标志：-DscaLAPACK）。2. 并行LU分解可能比串行版本更慢，建议在实际计算中比较时间（如检查ORTHCH时间）以评估性能。3. 在中小型计算或资源有限时，保持默认值.FALSE.通常更高效。"}, "LSCDM": {"name": "LSCDM", "description": "LSCDM= .TRUE. | .FALSE.", "default": "Default:LSCDM", "details": "Description:LSCDMswitches on the selected columns of the density matrix (SCDM) method.\nThe selected columns of the density matrix (SCDM) method works by fitting a unitary matrix[math]\\displaystyle{ U_{mn\\mathbf{k}} }[/math]that transforms \nthe basis from Bloch states[math]\\displaystyle{ |\\psi_{n\\mathbf{k}}\\rangle }[/math]obtained by VASP to aWannier basis[math]\\displaystyle{ |w_{m\\mat\nThis is done using aone-shot methodthrough a singular-value decomposition as proposed by A. Damle and L. Lin[1].", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCDM", "description_cn": "LSCDM参数用于启用或禁用密度矩阵的选定列（SCDM）方法。", "default_value": "默认值为.FALSE.", "details_cn": "LSCDM参数启用密度矩阵的选定列（SCDM）方法。SCDM方法通过拟合一个酉矩阵[math]\\displaystyle{ U_{mn\\mathbf{k}} }[/math]来工作，该矩阵将VASP获得的布洛赫态[math]\\displaystyle{ |\\psi_{n\\mathbf{k}}\\rangle }[/math]基变换到瓦尼尔基[math]\\displaystyle{ |w_{m\\mathbf{k}}\\rangle }[/math]。这是通过A. Damle和L. Lin[1]提出的一次性方法，通过奇异值分解来实现的。", "recommended": "推荐在需要构建Wannier函数或进行Wannier插值时设置为.TRUE.，例如计算能带结构、输运性质或光学性质等需要Wannier基的情况；否则保持默认.FALSE.以节省计算资源。", "tips": "使用LSCDM时，需确保正确设置Wannier90相关参数（如WANNIER90_WIN）；SCDM方法可能增加计算成本和内存需求；建议参考A. Damle和L. Lin的原始文献[1]以获取更多实现细节和验证。"}, "LSCK": {"name": "LSCK", "description": "LSCK= [logical]Default:LSCK=  .FALSE.", "default": "LSCK= [logical]Default:LSCK=  .FALSE.", "details": "Description:LSCK=.True. switches on the squeezed Coulomb kernel.\nIfLSCKis set to .TRUE., the squeezed Coulomb kernel is used instead of thecosine window[1]:\n[math]\\displaystyle{ v_{G} = 4 \\pi e^2 \\frac{\n(G_{max}-G_{min})(G_{max}-G)\n}{\n(G_{min}^2 - G(2G_{min}-G_{max}))^2\n}  \n\\qquad \\mbox{for} \\quad  \\mathrm{ENCUTGWSOFT}=\\frac{\\hbar^2G_{min}^2}{2m_e}<\\frac{\\hbar^2 G^2}{2m_e}<\\frac{\\hbar^2G_{max}^2}{2m_e}=\\mathrm{ENCUTGW} }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCK", "description_cn": "LSCK是一个逻辑参数，用于控制是否启用压缩库仑核。默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "LSCK=.True. 启用压缩库仑核。如果LSCK设置为.TRUE.，则使用压缩库仑核代替余弦窗口[1]：v_G = 4πe² * (G_max - G_min)(G_max - G) / (G_min² - G(2G_min - G_max))²，适用于ENCUTGWSOFT = ℏ²G_min²/(2m_e) < ℏ²G²/(2m_e) < ℏ²G_max²/(2m_e) = ENCUTGW。", "recommended": "默认值.FALSE.适用于大多数GW计算，保持标准余弦窗口方法。如果计算收敛困难或需要更高精度，可尝试设置为.TRUE.。使用场景：在GW近似下的第一性原理计算中，当标准方法收敛较慢或需要改进库仑核处理时使用。", "tips": "启用LSCK可能增加计算成本；需确保相关参数如ENCUTGW和ENCUTGWSOFT正确设置；建议参考VASP手册或文献[1]以了解详细适用条件。"}, "LSCRPA": {"name": "LSCRPA", "description": "LSCRPA= [logical]Default:LSCRPA= .FALSE.", "default": "LSCRPA= [logical]Default:LSCRPA= .FALSE.", "details": "Description:LSCRPAselects thespectral-cRPA method.\nIn constrained random-phase approximation (cRPA) calculations, the target polarizability[math]\\displaystyle{ \\tilde\\chi }[/math]is computed from the eigenspectrum of the target-space projectors as follows\nHere[math]\\displaystyle{ \\theta_{n{\\bf k}}^\\sigma }[/math]are the eigenvalues of thecorrelated projectors", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCRPA", "description_cn": "LSCRPA是一个逻辑参数，用于控制是否启用光谱-cRPA方法。", "default_value": ".FALSE.", "details_cn": "LSCRPA选择光谱-cRPA方法。在约束随机相位近似（cRPA）计算中，目标极化率[math]\\displaystyle{ \\tilde\\chi }[/math]从目标空间投影算子的本征谱计算如下。这里[math]\\displaystyle{ \\theta_{n{\\bf k}}^\\sigma }[/math]是相关投影算子的本征值。", "recommended": "对于进行cRPA计算时设置为.TRUE.，否则使用默认.FALSE.。使用场景：适用于需要计算电子关联参数的强关联材料研究，如计算Hubbard U值或分析材料极化率。", "tips": "启用LSCRPA时，需确保正确设置投影算子参数（如通过WANNIER90或其他方法）；cRPA计算可能计算量较大，建议先进行小规模测试；检查VASP版本是否支持此功能，并参考官方文档以获取详细设置指南。"}, "LSCSGRAD": {"name": "LSCSGRAD", "description": "LSCSGRAD= .TRUE. | .FALSE.Default:LSCSGRAD= .TRUE.", "default": "LSCSGRAD= .TRUE. | .FALSE.Default:LSCSGRAD= .TRUE.", "details": "Description:LSCSGRADdecides whether to compute gradients in the calculation of the MBD dispersion energy or the SCS contribution.\nIVDW,Many-body dispersion energy,Self-consistent screening in Tkatchenko-Scheffler method,LVDWEXPANSION\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LSCSGRAD", "description_cn": "LSCSGRAD决定是否在计算MBD色散能或SCS贡献时计算梯度。", "default_value": "TRUE", "details_cn": "LSCSGRAD决定是否在计算MBD色散能或SCS贡献时计算梯度。相关参数包括IVDW（色散校正方法）、多体色散能、Tkatchenko-Scheffler方法中的自洽屏蔽以及LVDWEXPANSION。", "recommended": "通常使用默认值TRUE。使用场景：当使用IVDW方法进行多体色散能计算或Tkatchenko-Scheffler方法的自洽屏蔽时，如果需要计算梯度（如结构优化或分子动力学），则设为TRUE；如果不需要梯度，可以设为FALSE以节省计算资源。", "tips": "确保IVDW参数正确设置，因为LSCSGRAD依赖于色散校正方法。计算梯度可能会增加计算成本，根据计算需求调整。"}, "LSELFENERGY": {"name": "LSELFENERGY", "description": "LSELFENERGY= [logical]Default:LSELFENERGY= .FALSE.", "default": "LSELFENERGY= [logical]Default:LSELFENERGY= .FALSE.", "details": "Description: Controls whether the frequency-dependent self-energy is calculated or not.\nIfquartic-scaling GW algorithmsare selected, e.g.ALGO=EVGW0, the first column corresponds to points on the real-frequency axis (in eV). The second and third columns are the real and imaginary parts of the self-energy (in eV) at a given band index andkpoint. To identify the band index andkpoint, the \nHere, the first and second band at the Gamma point are printed. \nThe line withselfenergy along real axiscontains band No., the KS energy, and the occupation of this state. \nThe output invasprun.xmlhas the same ordering of bands andkpoints, i.e., the band index is always the fastest. The frequency gr", "wiki_url": "https://www.vasp.at/wiki/index.php/LSELFENERGY", "description_cn": "控制是否计算频率相关的自能。", "default_value": ".FALSE.", "details_cn": "控制是否计算频率相关的自能。如果选择了四次方标度的GW算法，例如ALGO=EVGW0，第一列对应于实频率轴上的点（单位：eV）。第二列和第三列是在给定能带索引和k点处的自能的实部和虚部（单位：eV）。为了识别能带索引和k点，这里打印了Gamma点的第一和第二能带。包含沿实轴的自能的行。", "recommended": "在需要计算频率相关自能的GW计算中设置为.TRUE.，例如使用ALGO=EVGW0时。否则，保持默认值.FALSE.以节省计算资源。", "tips": "设置LSELFENERGY=.TRUE.会增加计算时间和输出文件大小。确保在GW计算中使用此参数，并注意输出数据的解读。"}, "LSEPB": {"name": "LSEPB", "description": "LSEPB= [logical]Default:LSEPB= .FALSE.", "default": "LSEPB= [logical]Default:LSEPB= .FALSE.", "details": "Description: Specifies whether thepartial charge densityis summed up for all selected bands or separated and printed out in different files.\nIfLPARD= .TRUE. the partial charge density is calculated for a subset of bands selected via theIBAND,NBMOD, andEINTtags. IfLSEPBis set to .TRUE., separate PARCHG.nb.ALLK or PARCHG.nb.nk files are created, dependent on theLSEPKtag. IfLSEPB= .FALSE., the output is written toPARCHGor PARCHG.ALLB.nk, ag\nHere are four examples to illustrate the interplay ofLSEPBandLSEPK. in all cases, the following settings apply, selecting three specific bands and twokpointsIBAND=  9 10 11,NBMOD= 3, andKPUSE=  1 34:", "wiki_url": "https://www.vasp.at/wiki/index.php/LSEPB", "description_cn": "LSEPB指定部分电荷密度是求和所有选中的能带还是分开打印到不同文件。", "default_value": ".FALSE.", "details_cn": "指定部分电荷密度是求和所有选中的能带还是分开打印到不同文件。如果LPARD=.TRUE.，则通过IBAND、NBMOD和EINT标签选择的能带子集计算部分电荷密度。如果LSEPB设置为.TRUE.，则根据LSEPK标签创建分开的PARCHG.nb.ALLK或PARCHG.nb.nk文件。如果LSEPB=.FALSE.，则输出写入PARCHG或PARCHG.ALLB.nk文件。", "recommended": "默认值为.FALSE.，适用于一般情况，将所有选中能带的电荷密度求和输出到一个文件。如果需要分析特定能带的电荷密度贡献，例如研究能带结构或态密度细节，可设置为.TRUE.，以生成分开的文件便于单独查看。", "tips": "使用LSEPB前需确保LPARD=.TRUE.，因为部分电荷密度计算依赖于LPARD标签。同时，LSEPB与LSEPK标签相关，影响输出文件名格式；建议根据分析需求合理设置，避免生成过多文件。"}, "LSEPK": {"name": "LSEPK", "description": "LSEPK= [logical]Default:LSEPK= .FALSE.", "default": "LSEPK= [logical]Default:LSEPK= .FALSE.", "details": "Description: Specifies whether thepartial charge densityis summed up for all selectedkpoints or separated and printed out in different files.\nIfLPARD= .TRUE. the partial charge density is calculated for a subset of bands andkpoints depending on the setting of the tagsIBAND,KPUSE,NBMOD, andEINT. IfLSEPKis set to .TRUE., separate PARCHG.ALLB.nk or PARCHG.nb.nk files are created, dependent on theLSEPBtag. IfLSEPK= .FALSE., the output is writ\nHere are four examples to illustrate the interplay ofLSEPBandLSEPK. in all cases, the following settings apply, selecting three specific bands and twokpointsIBAND=  9 10 11,NBMOD= 3, andKPUSE=  1 34:", "wiki_url": "https://www.vasp.at/wiki/index.php/LSEPK", "description_cn": "LSEPK参数控制部分电荷密度的输出方式。", "default_value": ".FALSE.", "details_cn": "指定部分电荷密度是针对所有选定k点求和后输出，还是分开输出到不同文件中。当LPARD=.TRUE.时，部分电荷密度会根据IBAND、KPUSE、NBMOD和EINT标签的设置，针对特定能带和k点子集进行计算。若LSEPK设为.TRUE.，则会根据LSEPB标签的设置生成单独的PARCHG.ALLB.nk或PARCHG.nb.nk文件；若LSEPK=.FALSE.，则所有k点的电荷密度将合并写入一个文件。", "recommended": "通常使用默认值.FALSE.，适用于大多数需要整体分析部分电荷密度的场景。若需单独分析特定k点的电荷密度分布（如研究不同k点对态密度的贡献），可设为.TRUE.。", "tips": "1. 启用LSEPK=.TRUE.会生成大量文件，可能占用较多存储空间；2. 需配合LPARD=.TRUE.使用才有效；3. 文件命名规则受LSEPB标签影响，需注意文件管理。"}, "LSFBXC": {"name": "LSFBXC", "description": "LSFBXC= .TRUE. | .FALSE.Default:LSFBXC= .FALSE.", "default": "LSFBXC= .TRUE. | .FALSE.Default:LSFBXC= .FALSE.", "details": "Description: Removes sources and drains from the exchange-correlation B field.\nWithLSFBXC=T, the sources and drains are removed from the exchange-correlation (XC) B field[1]at each step of the electronic minimization. Thus, anyXC potentialcan be constrained to correspond to a Maxwellian magnetic field at the cost of becoming a potential-onlyXC functional, since there is no cor\nMoore et al. implemented the same feature in a parallel work[2][3]and performed more extensive applications. Whether the two implementations are identical has not been tested, and no publication is associated with the present implementation (by Marie-Therese Huebsch) usingLSFBXC.", "wiki_url": "https://www.vasp.at/wiki/index.php/LSFBXC", "description_cn": "LSFBXC= .TRUE. | .FALSE. 默认值：LSFBXC= .FALSE.", "default_value": ".FALSE.", "details_cn": "从交换关联B场中移除源和漏。当LSFBXC=T时，在电子最小化的每一步中，从交换关联（XC）B场中移除源和漏[1]。因此，任何XC势可以被约束为对应于麦克斯韦磁场，代价是成为仅势的XC泛函，因为没有相关。Moore等人在并行工作中实现了相同的功能[2][3]并进行了更广泛的应用。是否", "recommended": "默认值为.FALSE.，一般情况下使用默认值。使用场景：当需要将XC势约束为麦克斯韦磁场时，例如在磁性材料计算或涉及磁场的模拟中，可以设置为.TRUE.。但需注意，这会使XC泛函成为仅势的泛函，可能影响计算结果的准确性。", "tips": "1. 使用LSFBXC=.TRUE.会改变XC泛函的性质，成为仅势的泛函，可能影响计算精度和效率。2. 参考相关文献[1][2][3]以了解更多细节和应用场景。3. 在需要精确磁场处理时谨慎使用，建议先进行测试计算。"}, "LSINGLES": {"name": "LSINGLES", "description": "LSINGLES= .TRUE. | .FALSE.Default:LSINGLES= .FALSE.", "default": "LSINGLES= .TRUE. | .FALSE.Default:LSINGLES= .FALSE.", "details": "Description: Switch on singles contribution to correlation energy forGW algorithms.[1]\nLSINGLESenables the calculation of the singles contributions to the correlation energy that can be represented by the following Feynman (time-ordered) diagrams:[2][1]\nLSINGLESis used in combination with thelow-scaling ACFDT/RPAandGWalgorithms.", "wiki_url": "https://www.vasp.at/wiki/index.php/LSINGLES", "description_cn": "为GW算法开启单粒子贡献到关联能。", "default_value": ".FALSE.", "details_cn": "LSINGLES为GW算法开启单粒子贡献到关联能。它允许计算单粒子贡献到关联能，这些贡献可以用以下费曼（时间有序）图表示：[2][1]。LSINGLES与低标度ACFDT/RPA和GW算法结合使用。", "recommended": "通常保持默认值.FALSE.。使用场景：在进行GW计算时，如果需要考虑单粒子贡献到关联能，可以设置为.TRUE.，以提高计算精度。", "tips": "LSINGLES仅适用于GW算法，需与低标度ACFDT/RPA和GW算法配合使用。开启可能会增加计算成本，建议在需要精确关联能计算时谨慎使用，并确保其他相关参数设置正确。"}, "LSMP2LT": {"name": "LSMP2LT", "description": "LSMP2LT= .FALSE. | .TRUE.", "default": "Default:LSMP2LT", "details": "Description:LSMP2LTselects a stochastic Laplace transformed MP2 algorithm.\nIfLSMP2LT=.TRUE. andALGO=ACFTDRK is set, a quartic scaling stochastic Laplace transformed MP2 algorithm is selected.[1]\nThis tag should be used in combination withKPARto tweak parallelization as described in thistutorial.", "wiki_url": "https://www.vasp.at/wiki/index.php/LSMP2LT", "description_cn": "LSMP2LT参数可设置为.FALSE.或.TRUE.", "default_value": "LSMP2LT", "details_cn": "LSMP2LT选择一个随机拉普拉斯变换MP2算法。如果LSMP2LT=.TRUE.且ALGO=ACFTDRK被设置，则选择一个四次标度随机拉普拉斯变换MP2算法。[1] 此标签应与KPAR结合使用，以调整并行化，如本教程所述。", "recommended": "推荐在需要使用随机拉普拉斯变换MP2算法时设置为.TRUE.，并确保ALGO=ACFTDRK。适用于大体系的第一性原理计算，以降低计算成本。配合KPAR调整并行化以提高效率。", "tips": "使用LSMP2LT时，需与KPAR结合使用以优化并行化。确保ALGO参数设置为ACFTDRK。参考VASP官方教程了解详细配置和最佳实践。"}, "LSORBIT": {"name": "LSORBIT", "description": "LSORBIT= .TRUE. | .FALSE.Default:LSORBIT= .FALSE.", "default": "LSORBIT= .TRUE. | .FALSE.Default:LSORBIT= .FALSE.", "details": "Description: Switch on spin-orbit coupling.\nLSORBIT= True switches on spin-orbit coupling (SOC)[1]and automatically setsLNONCOLLINEAR= True.  It requires usingvasp_ncl. SOC couples the spin degrees of freedom with the lattice degrees of freedom. We recommend carefully checking the symmetry and convergence of your results when using SOC; see b\nLSORBITonly works for PAW potentials and is not supported by ultrasoft pseudopotentials. It is supported as of VASP.4.5.", "wiki_url": "https://www.vasp.at/wiki/index.php/LSORBIT", "description_cn": "开启自旋轨道耦合。", "default_value": ".FALSE.", "details_cn": "开启自旋轨道耦合。LSORBIT= True 开启自旋轨道耦合（SOC）[1]，并自动设置 LNONCOLLINEAR= True。它需要使用 vasp_ncl 可执行文件。SOC 将自旋自由度与晶格自由度耦合。我们建议在使用 SOC 时仔细检查结果的对称性和收敛性；参见相关文档。LSORBIT 仅适用于 PAW 势，不支持超软赝势。从 VASP.4.5 版本开始支持。", "recommended": "当需要考虑自旋轨道耦合时，设置为 .TRUE.，例如在研究重元素化合物、磁性材料、拓扑材料或自旋电子学等场景中。否则，保持默认值 .FALSE. 以节省计算资源。", "tips": "1. LSORBIT 仅适用于 PAW 势，不支持超软赝势。2. 设置 LSORBIT= .TRUE. 会自动启用非共线磁性计算（LNONCOLLINEAR= .TRUE.），并需要使用 vasp_ncl 可执行文件。3. 使用 SOC 时，应仔细检查计算的对称性和收敛性，以确保结果的准确性。"}, "LSOSHIFT": {"name": "LSOSHIFT", "description": "LSOSHIFT= [logical]Default:LSOSHIFT= LSORBIT", "default": "LSOSHIFT= [logical]Default:LSOSHIFT= LSORBIT", "details": "Description:LSOSHIFT= .True.activates spin–orbit coupling (SOC) contributions to the calculated chemical shielding tensor inNMR.\nLSOSHIFT= .True.allows accounting for spin-orbit coupling (SOC) for the computation ofnuclear magnetic resonance(NMR) chemical shielding tensors within linear response theory (LCHIMAG). SOC contributions are essential for accurate shielding predictions for heavy elements where spin–orbit effects inf\nThe relativistic effects are included on the level of the spin-orbit zeroth-order regular approximation (ZORA)[1]employing the gauge-including projector augmented waves (GIPAW) approach. The implementation and benchmarks are presented by Speelman et al.[2]. These calculations require the executablev", "wiki_url": "https://www.vasp.at/wiki/index.php/LSOSHIFT", "description_cn": "LSOSHIFT是一个逻辑参数，用于控制NMR计算中自旋轨道耦合的贡献，默认值为LSORBIT。", "default_value": "LSORBIT", "details_cn": "LSOSHIFT= .True. 激活自旋轨道耦合（SOC）对NMR中计算的化学位移张量的贡献。LSOSHIFT= .True. 允许在线性响应理论（LCHIMAG）中计算核磁共振（NMR）化学位移张量时考虑自旋轨道耦合（SOC）。SOC贡献对于重元素的准确屏蔽预测至关重要，因为自旋轨道效应显著。相对论效应在自旋轨道水平上被包括。", "recommended": "对于涉及重元素（如铅、铋等）的NMR计算，建议设置LSOSHIFT=.True.以包含自旋轨道耦合效应；对于轻元素，可使用默认值。使用场景：在VASP的NMR计算中，当使用LCHIMAG方法并需要高精度化学位移时启用。", "tips": "LSOSHIFT仅在LSORBIT设置为真时有效；启用会增加计算成本；确保在INCAR中正确设置LSORBIT和相关NMR参数；仅适用于NMR计算，不影响其他性质。"}, "LSPECTRAL": {"name": "LSPECTRAL", "description": "LSPECTRAL= .FALSE. | .TRUE.", "default": "Default:LSPECTRAL", "details": "Description:LSPECTRALspecifies to use the spectral method.\nIfLSPECTRAL= .TRUE. is set, the imaginary part of the independent particle polarizability[math]\\displaystyle{ \\chi_{\\mathbf{q}}^0 (\\mathbf{G}, \\mathbf{G}', \\omega) }[/math]is calculated first, and afterwards the full independent particle polarizability is determined using a Kramers-Kronig (or Hilber\nA similar trick is used when the QP-shifts are calculated. In general it is strongly recommended to setLSPECTRAL= .TRUE., except if memory requirements are too excessive.", "wiki_url": "https://www.vasp.at/wiki/index.php/LSPECTRAL", "description_cn": "LSPECTRAL参数用于控制是否使用谱方法，可设置为.FALSE.或.TRUE.。", "default_value": ".FALSE.", "details_cn": "LSPECTRAL指定使用谱方法。如果设置LSPECTRAL= .TRUE.，首先计算独立粒子极化率的虚部χ_q^0(G, G', ω)，然后使用Kramers-Kronig（或Hilbert）变换确定完整的独立粒子极化率。在计算QP-shifts时使用类似技巧。通常强烈推荐设置LSPECTRAL= .TRUE.，除非内存要求过高。", "recommended": ".TRUE.。使用场景：在大多数第一性原理计算中，特别是需要精确计算极化率或准粒子能移时，建议设置为.TRUE.以提高计算效率和准确性。", "tips": "如果计算系统内存不足，设置LSPECTRAL= .TRUE.可能导致内存溢出，此时可考虑设置为.FALSE.。"}, "LSPECTRALGW": {"name": "LSPECTRALGW", "description": "LSPECTRALGW= .FALSE. | .TRUE.Default:LSPECTRALGW= .FALSE.", "default": "LSPECTRALGW= .FALSE. | .TRUE.Default:LSPECTRALGW= .FALSE.", "details": "Description:LSPECTRALGWspecifies to use the spectral method for calculating the self-energy.\nIfLSPECTRALGW= .TRUE. is set, the imaginary part of the self-energy[math]\\displaystyle{ \\Sigma(\\omega)= G W }[/math]is calculated from the imaginary part of screened potential[math]\\displaystyle{ W(\\omega) }[/math]by shifting the poles of[math]\\displaystyle{ W  }[/math]by[math]\\displaystyle{  \\pm \\e", "wiki_url": "https://www.vasp.at/wiki/index.php/LSPECTRALGW", "description_cn": "LSPECTRALGW参数指定是否使用谱方法计算自能。", "default_value": ".FALSE.", "details_cn": "LSPECTRALGW指定使用谱方法计算自能。如果设置LSPECTRALGW= .TRUE.，则自能的虚部[math]\\displaystyle{ \\Sigma(\\omega)= G W }[/math]通过将屏蔽势[math]\\displaystyle{ W(\\omega) }[/math]的极点偏移[math]\\displaystyle{ \\pm \\e”来计算（注：原始信息截断，此处基于提供部分翻译）。", "recommended": "默认值为.FALSE.，适用于标准GW计算，计算效率较高。如果需要更高精度或特定研究场景（如处理强关联体系），可设置为.TRUE.，但会增加计算时间和内存需求。", "tips": "使用谱方法（LSPECTRALGW=.TRUE.）时，需确保计算资源充足；可能影响计算稳定性和收敛性，建议在测试后使用；适用于GW近似中的高级计算，但非必需选项。"}, "LSPIN_VDW": {"name": "LSPIN_VDW", "description": "LSPIN_VDW= [logical]Default:LSPIN_VDW= .FALSE.", "default": "LSPIN_VDW= [logical]Default:LSPIN_VDW= .FALSE.", "details": "Description:LSPIN_VDW=.TRUE. switches on the use of the spin-polarized formulation[1]for the nonlocal part of a van der Waals functional (available as of VASP.6.4.0).\nLUSE_VDW,IVDW_NL,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/LSPIN_VDW", "description_cn": "LSPIN_VDW是一个逻辑参数，默认值为.FALSE.", "default_value": ".FALSE.", "details_cn": "LSPIN_VDW=.TRUE. 启用范德华泛函非局域部分的自旋极化公式[1]（自VASP.6.4.0版本起可用）。", "recommended": "默认值为.FALSE.，适用于大多数情况。当需要考虑自旋极化对范德华相互作用的影响时，例如在磁性材料或自旋极化系统中，可设置为.TRUE.。", "tips": "此参数仅在VASP.6.4.0及以上版本中可用。需与LUSE_VDW和IVDW_NL等参数配合使用。启用自旋极化可能增加计算成本。"}, "LSPIRAL": {"name": "LSPIRAL", "description": "LSPIRAL= .TRUE. | .FALSE.Default:LSPIRAL= .FALSE.", "default": "LSPIRAL= .TRUE. | .FALSE.Default:LSPIRAL= .FALSE.", "details": "Description: setLSPIRAL=.TRUE. to represent spin spirals by means of a generalized Bloch condition.\nSee thedescription of spin spiral calculationsfor more details.\nSpin spirals,QSPIRAL,LZEROZ", "wiki_url": "https://www.vasp.at/wiki/index.php/LSPIRAL", "description_cn": "LSPIRAL= .TRUE. | .FALSE. 默认值：LSPIRAL= .FALSE.", "default_value": ".FALSE.", "details_cn": "设置LSPIRAL=.TRUE.以通过广义布洛赫条件表示自旋螺旋。有关更多详细信息，请参阅自旋螺旋计算的描述。自旋螺旋，QSPIRAL，LZEROZ", "recommended": "默认为.FALSE.，除非进行自旋螺旋计算。使用场景：在研究磁性材料中的自旋螺旋结构时，设置为.TRUE.以启用自旋螺旋计算。", "tips": "使用LSPIRAL时，需配合QSPIRAL和LZEROZ等参数；确保计算设置正确；参考VASP官方文档以获取完整指导。"}, "LSUBROT": {"name": "LSUBROT", "description": "LSUBROT= .FALSE. | .TRUE.", "default": "Default:SUBROT", "details": "Description: This flag can be set forhybrid functionals(HF-type calculations).LSUBROTdetermines whether an optimal rotation matrix between the occupied and unoccupied block is sought, when a direct optimization of the energy functional is performed (i.e.ALGO=All | Damped). The corresponding algorith\nAlthough the flag can be set for standard functionals, it is only efficient for hybrid functionals (HF-type calculations).", "wiki_url": "https://www.vasp.at/wiki/index.php/LSUBROT", "description_cn": "LSUBROT= .FALSE. | .TRUE.", "default_value": "SUBROT", "details_cn": "此标志可为杂化泛函（HF型计算）设置。LSUBROT决定在直接优化能量泛函时（即ALGO=All | Damped），是否寻求占据和非占据块之间的最优旋转矩阵。相应的算法... 虽然该标志可以为标准泛函设置，但仅对杂化泛函（HF型计算）有效。", "recommended": "对于杂化泛函（如HSE06）计算，当使用ALGO=All或Damped进行直接优化时，建议设置LSUBROT=.TRUE.以提高优化效率；否则，使用默认值.FALSE.。使用场景：杂化泛函的直接优化计算，特别是当需要快速收敛时。", "tips": "该标志仅对杂化泛函有效，对标准泛函设置可能无效或效率低下；设置LSUBROT=.TRUE.时需配合ALGO=All或Damped使用；默认值SUBROT可能指算法相关设置，但实际布尔值默认通常为.FALSE.，建议根据计算需求调整。"}, "LSYNCH5": {"name": "LSYNCH5", "description": "LSYNCH5= [logical]Default:LSYNCH5= .FALSE.", "default": "LSYNCH5= [logical]Default:LSYNCH5= .FALSE.", "details": "Description:LSYNCH5determines whether the output invaspout.h5is always synchronized with VASP while the calculation is running.\nIf you set this flag, VASP will enable single-writer-multiple-reader mode for the HDF5 file.\nThis allows you to monitor the output usingpy4vaspwhile the calculation is still running.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LSYNCH5", "description_cn": "LSYNCH5是一个逻辑参数，用于控制输出文件的同步行为。", "default_value": ".FALSE.", "details_cn": "LSYNCH5决定在计算运行时，vaspout.h5中的输出是否始终与VASP同步。如果设置此标志，VASP将为HDF5文件启用单写多读模式。这允许您在计算仍在运行时使用py4vasp监控输出。使用此标签的示例", "recommended": "默认为.FALSE.。如果需要实时监控计算输出（例如使用py4vasp），建议设置为.TRUE.。使用场景：在长时间运行的计算中，当需要实时查看vaspout.h5文件内容时。", "tips": "设置LSYNCH5=.TRUE.可能会略微影响计算性能，因为需要同步写入HDF5文件。确保您的HDF5库支持单写多读模式。使用py4vasp时，请参考其文档进行正确配置。"}, "LTAU": {"name": "LTAU", "description": "LTAU= .True. | .False.", "default": "Default:LTAU", "details": "Description: Request evaluation of the kinetic energy density.\nBy default onlymetaGGAsthat depend on the kinetic energy density compute it. However, settingLTAU= Tin theINCARfile alows to write the kinetic energy density to file even in case theXC functionalis independent of the kinetic energy density.LCHARGcontrols whether the charge density and the kinetic en\nLCHARG,LH5,LCHARGH5,TAUCAR,vaspwave.h5", "wiki_url": "https://www.vasp.at/wiki/index.php/LTAU", "description_cn": "LTAU参数，可设置为True或False。", "default_value": "False", "details_cn": "请求评估动能密度。默认情况下，只有依赖动能密度的meta-GGA泛函才会计算它。然而，在INCAR文件中设置LTAU=.True.允许将动能密度写入文件，即使交换关联泛函不依赖于动能密度。LCHARG参数控制是否将电荷密度和动能密度写入文件。", "recommended": "通常设置为False，除非需要输出动能密度。使用场景：当使用meta-GGA泛函且需要分析动能密度时，或当泛函不依赖动能密度但仍想输出时，设置LTAU=.True.。", "tips": "LTAU与LCHARG参数相关，LCHARG控制电荷密度的输出。确保在需要时设置LCHARG=.True.以输出动能密度。输出文件可能包括TAUCAR或vaspwave.h5。"}, "LTBOUNDLIBXC": {"name": "LTBOUNDLIBXC", "description": "LTBOUNDLIBXC= .TRUE. | .FALSE.Default:LTBOUNDLIBXC= .FALSE.", "default": "LTBOUNDLIBXC= .TRUE. | .FALSE.Default:LTBOUNDLIBXC= .FALSE.", "details": "Description:LTBOUNDLIBXCspecifies whether or not the lower bound for the Kohn-Sham kinetic-energy density[math]\\displaystyle{ \\tau_{\\sigma} }[/math]([math]\\displaystyle{ \\tau_{\\sigma}^{\\textrm{W}}<\\tau_{\\sigma} }[/math]) is enforced before[math]\\displaystyle{ \\tau_{\\sigma} }[/math]is used in aMETAGG\nThe Kohn-Sham kinetic-energy density\nshould, in principle, be larger than the von Weizsäcker kinetic-energy density[1]", "wiki_url": "https://www.vasp.at/wiki/index.php/LTBOUNDLIBXC", "description_cn": "LTBOUNDLIBXC 可以设置为 .TRUE. 或 .FALSE.", "default_value": ".FALSE.", "details_cn": "LTBOUNDLIBXC 指定在METAGG泛函中使用τ_σ之前，是否强制执行Kohn-Sham动能密度τ_σ的下界（τ_σ^W < τ_σ）。原则上，Kohn-Sham动能密度应大于von Weizsäcker动能密度[1]。", "recommended": "默认为 .FALSE.。在使用meta-GGA泛函（如METAGG）时，如果遇到收敛问题或非物理结果，可以尝试设置为 .TRUE. 以强制执行物理约束。否则，建议使用默认值。", "tips": "此参数仅适用于meta-GGA泛函计算。设置为 .TRUE. 可能增加计算成本并影响收敛性。在使用前，建议参考VASP手册或相关文献。"}, "LTEMPER": {"name": "LTEMPER", "description": "LTEMPER= [logical]Default:LTEMPER= .FALSE.", "default": "LTEMPER= [logical]Default:LTEMPER= .FALSE.", "details": "Description:LTEMPERspecified whether parallel tempering is used. The flag must be used in combination withIMAGES.\nVASP supports various modes where simultaneous calculations for different INCAR, KPOINTS, POTCAR, or POSCAR files are performed. \nThe parallel tempering mode is explained in this section, however, please read the sectionIMAGESfirst. Parallel tempering is also known as replica-exchange molecular dyna\nIf the tagsIMAGES=nn andLTEMPER=.TRUE. are set in theINCARfile, VASP performs parallel tempering calculations. In this case, it is expedient to supply differentINCARandPOSCARfiles in each subdirectory 01, 02, 03, ..., nn. For each subdiretory a different simulation temperature should be supplied usi", "wiki_url": "https://www.vasp.at/wiki/index.php/LTEMPER", "description_cn": "LTEMPER指定是否使用并行回火。", "default_value": ".FALSE.", "details_cn": "LTEMPER指定是否使用并行回火。该标志必须与IMAGES标签结合使用。VASP支持多种模式，可以同时对不同的INCAR、KPOINTS、POTCAR或POSCAR文件进行计算。并行回火模式在本节中解释，但请先阅读IMAGES部分。并行回火也称为副本交换分子动力学。如果在INCAR文件中设置IMAGES=nn和LTEMPER=.TRUE.，VASP将执行并行回火计算。", "recommended": "推荐在需要进行副本交换分子动力学模拟时设置LTEMPER=.TRUE.，例如在研究蛋白质折叠、相变或复杂能量景观时。默认值.FALSE.适用于常规分子动力学模拟。", "tips": "使用LTEMPER时，必须同时设置IMAGES标签以指定副本数量。确保计算资源充足，因为并行回火需要多个副本同时运行。此外，用户应理解副本交换的原理，并正确配置其他相关参数。"}, "LTHOMAS": {"name": "LTHOMAS", "description": "LTHOMAS= .TRUE. | .FALSE.Default:LTHOMAS= .FALSE.", "default": "LTHOMAS= .TRUE. | .FALSE.Default:LTHOMAS= .FALSE.", "details": "Description:LTHOMASselects a decomposition of the exchange functional based on Thomas-Fermi exponential screening.\nIfLTHOMAS=.TRUE. the decomposition of the exchange operator (in arange-separated hybrid functional) into a short range (SR) and a long range (LR) part will be based on Thomas-Fermi exponential screening:\nThe mixing[math]\\displaystyle{ a_{\\mathrm{SR}} }[/math]and screening[math]\\displaystyle{ \\mu=k_{\\rm TF} }[/math]are controlled by theAEXXandHFSCREENtags, respectively.", "wiki_url": "https://www.vasp.at/wiki/index.php/LTHOMAS", "description_cn": "LTHOMAS选择基于Thomas-Fermi指数屏蔽的交换泛函分解。", "default_value": ".FALSE.", "details_cn": "LTHOMAS选择基于Thomas-Fermi指数屏蔽的交换泛函分解。如果LTHOMAS=.TRUE.，交换算子（在范围分离杂化泛函中）分解为短程（SR）和长程（LR）部分将基于Thomas-Fermi指数屏蔽：混合参数a_SR和屏蔽参数μ=k_TF分别由AEXX和HFSCREEN标签控制。", "recommended": "通常设置为.FALSE.，除非在使用范围分离杂化泛函时需要Thomas-Fermi屏蔽。使用场景：在计算带隙、激发态或需要精确交换泛函分解的研究中，设置LTHOMAS=.TRUE.以启用基于Thomas-Fermi指数屏蔽的分解。", "tips": "LTHOMAS仅在范围分离杂化泛函中有效；需与AEXX和HFSCREEN参数配合使用；默认值FALSE表示不使用此屏蔽方法。"}, "LTRIPLET": {"name": "LTRIPLET", "description": "LTRIPLET= .TRUE. | .FALSE.", "default": "Default:LTRIPLET", "details": "Description:LTRIPLETselects a triplet ansatz forBethe-Salpeter-equations(BSE) calculations. This is synonymous toLHARTREE= .FALSE.\nFor a usual BSE calculation (LHARTREE=.TRUE.;LTRIPLET= .FALSE.), the excited state corresponds to a singlet if the ground state is not spin-polarized (ISPIN=1) or anti-ferromagnetic (ISPIN=2, total magnetic moment 0). This is so because the ansatz for the BSE calculation involves a hole and an elect\nIfLTRIPLET=.TRUE., VASP assumes that anupelectron is removed from the ground-state determinant and placed as adownelectron into a previously unoccupied orbital (spin flip). This ansatz corresponds to a triplet state as it has a net spin of one. Without spin-orbit coupling (LSORBIT= .FALSE.), the tra", "wiki_url": "https://www.vasp.at/wiki/index.php/LTRIPLET", "description_cn": "LTRIPLET参数用于选择Bethe-Salpeter方程（BSE）计算中的三重态假设。", "default_value": ".FALSE.", "details_cn": "LTRIPLET选择Bethe-Salpeter方程（BSE）计算的三重态假设。这等同于LHARTREE= .FALSE.。对于常规BSE计算（LHARTREE=.TRUE.; LTRIPLET= .FALSE.），如果基态不是自旋极化（ISPIN=1）或反铁磁（ISPIN=2，总磁矩为0），则激发态对应于单重态。这是因为BSE计算的假设涉及一个空穴和一个电子。如果LTRIPLET=.TRUE.，VASP假设一个上自旋电子被移除...", "recommended": "推荐值为.FALSE.，用于常规单重态BSE计算。如果需要计算三重态激发态，例如在研究自旋三重态激子、磁性材料或自旋相关激发时，应设置为.TRUE.。", "tips": "LTRIPLET=.TRUE.等同于设置LHARTREE=.FALSE.，因此两者不能同时为.TRUE.，需确保参数协调。基态的自旋设置（如ISPIN）会影响激发态性质，建议在BSE计算前进行适当的基态和GW计算。"}, "LTSSURF": {"name": "LTSSURF", "description": "LTSSURF= .TRUE. | .FALSE.Default:LTSSURF= .FALSE.", "default": "LTSSURF= .TRUE. | .FALSE.Default:LTSSURF= .FALSE.", "details": "Description: ifLTSSURFset to .TRUE., the standard parametrization of the Tkatchenko-Scheffler method is replaced by the one designed to enable reliable modeling of structure and stability for a broad class of organic molecules adsorbed on metal surfaces is activated[1].\nIVDW,Tkatchenko-Scheffler method,\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LTSSURF", "description_cn": "LTSSURF参数用于控制是否激活针对金属表面吸附有机分子的Tkatchenko-Scheffler方法参数化。", "default_value": "FALSE", "details_cn": "如果LTSSURF设置为TRUE，则Tkatchenko-Scheffler方法的标准参数化被替换为一种设计用于可靠建模吸附在金属表面上的广泛类有机分子的结构和稳定性的参数化[1]。", "recommended": "推荐在模拟有机分子吸附在金属表面的体系时设置为TRUE，以提高结构和稳定性的计算准确性；否则使用默认值FALSE。", "tips": "注意此参数与IVDW参数相关，使用时需确保正确设置相关参数。建议参考文献[1]以获取更多细节和示例。"}, "LTWO_CENTER": {"name": "LTWO_CENTER", "description": "LTWO_CENTER= [logical]Default:LTWO_CENTER= .FALSE.", "default": "LTWO_CENTER= [logical]Default:LTWO_CENTER= .FALSE.", "details": "Description:LTWO_CENTERcalculates off-centerCoulomb integrals.\nWhen chosen, the system calculates two types of integrals:\nWhen chosen, cRPA matrix elements invaspout.h5can be used withpy4vaspto analyze the spatial decay of the Coulomb interaction using the Ohno potential[1]", "wiki_url": "https://www.vasp.at/wiki/index.php/LTWO_CENTER", "description_cn": "LTWO_CENTER计算非中心库仑积分。", "default_value": ".FALSE.", "details_cn": "LTWO_CENTER计算非中心库仑积分。当选择时，系统计算两种类型的积分：当选择时，cRPA矩阵元素在vaspout.h5中可以与py4vasp一起使用，以分析库仑相互作用的空间衰减，使用Ohno势[1]。", "recommended": "默认为.FALSE.，仅在需要进行cRPA计算以分析库仑相互作用的空间衰减时设置为.TRUE.。使用场景：适用于强关联材料或cRPA分析，例如研究库仑相互作用的空间衰减特性。", "tips": "设置LTWO_CENTER=.TRUE.会增加计算成本，因为它计算额外的积分。确保在必要时使用，并参考相关文献[1]以获取更多细节。"}, "LUSENCCL": {"name": "LUSENCCL", "description": "LUSENCCL= [logical]Default:LUSENCCL= .TRUE.", "default": "LUSENCCL= [logical]Default:LUSENCCL= .TRUE.", "details": "Description:LUSENCCLallows deactivating the NVIDIA Collective Communications Library (NCCL) during runtime when the code was compiled with the-DUSENCCLoption.", "wiki_url": "https://www.vasp.at/wiki/index.php/LUSENCCL", "description_cn": "LUSENCCL是一个逻辑参数，默认值为.TRUE.。", "default_value": ".TRUE.", "details_cn": "LUSENCCL允许在运行时停用NVIDIA集体通信库（NCCL），当代码使用-DUSENCCL选项编译时。", "recommended": "默认值.TRUE.适用于大多数情况；如果不需要NCCL，可设置为.FALSE.。使用场景：在GPU计算中，当需要控制NCCL行为时使用。", "tips": "确保VASP编译时启用了-DUSENCCL选项；停用NCCL可能影响并行计算性能。"}, "LUSE_VDW": {"name": "LUSE_VDW", "description": "LUSE_VDW= [logical]Default:LUSE_VDW= .FALSE.", "default": "LUSE_VDW= [logical]Default:LUSE_VDW= .FALSE.", "details": "Description:LUSE_VDW=.TRUE. switches on the use of a nonlocal vdW-DF functional. These functionals depend on the electron density at two points in space and model long-range van der Waals (dispersion) correlation effects.\nGGA,METAGGA,IVDW_NL,LSPIN_VDW,Nonlocal vdW-DF functionals\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LUSE_VDW", "description_cn": "LUSE_VDW是一个逻辑参数，用于控制非局域vdW-DF泛函的启用。", "default_value": ".FALSE.", "details_cn": "LUSE_VDW=.TRUE. 启用非局域vdW-DF泛函的使用。这些泛函依赖于空间中两点的电子密度，并模拟长程范德华（色散）相关效应。", "recommended": "根据计算需求设置。如果需要考虑范德华色散效应，如分子吸附或层状材料计算，设置为.TRUE.；否则使用默认值.FALSE.。使用场景：适用于涉及弱相互作用的系统，如分子晶体、表面吸附、生物分子等。", "tips": "启用LUSE_VDW时，需确保相关参数如GGA、METAGGA、IVDW_NL、LSPIN_VDW正确设置。计算成本可能增加，建议在测试后使用。"}, "LVACPOTAV": {"name": "LVACPOTAV", "description": "LVACPOTAV= .True. | .False.Default:LVACPOTAV= .False.", "default": "LVACPOTAV= .True. | .False.Default:LVACPOTAV= .False.", "details": "Description: Switch on determining the vacuum potential by averaging the local potential over a field-free region.\nLVACPOTAVswitches on the computation of the vacuum potential, i.e., the average of the local potential in the vacuum region. \nIt computes the average potential by searching regions that are field-free (VACPOTFLAT), and the 2D-averaged charge density is nearly zero. The averaging is done in the direc\nThe vacuum potential is one of the quantities needed tocompute the work function. It can be extracted from theOUTCARby the following bash command", "wiki_url": "https://www.vasp.at/wiki/index.php/LVACPOTAV", "description_cn": "LVACPOTAV参数设置为 .True. 或 .False.，默认值为 .False.", "default_value": ".False.", "details_cn": "通过在无场区域平均局部势能来确定真空势能。LVACPOTAV开启真空势能的计算，即真空区域中局部势能的平均值。它通过搜索无场区域（VACPOTFLAT）和2D平均电荷密度接近零的区域来计算平均势能。平均是在某个方向进行的。真空势能是计算功函数所需的量之一。", "recommended": "推荐在需要计算功函数时设置为 .True.，例如在表面科学或电子发射研究中；否则，保持默认值 .False. 以节省计算资源。", "tips": "计算真空势能时，需确保真空区域足够大且无场，可能需要配合调整VACPOTFLAT等参数；此外，该参数主要用于后处理分析，不影响主要计算流程。"}, "LVDWEXPANSION": {"name": "LVDWEXPANSION", "description": "LVDWEXPANSION= .TRUE. | .FALSE.Default:LVDWEXPANSION= .FALSE.", "default": "LVDWEXPANSION= .TRUE. | .FALSE.Default:LVDWEXPANSION= .FALSE.", "details": "Description:LVDWEXPANSIONdecides whether to write the two- to six- body contributions to MBD dispersion energy in theOUTCARfile.\nIVDW,Many-body dispersion energy,LSCSGRAD\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LVDWEXPANSION", "description_cn": "LVDWEXPANSION参数用于控制是否在OUTCAR文件中输出MBD色散能的二体到六体贡献。", "default_value": ".FALSE.", "details_cn": "LVDWEXPANSION决定是否在OUTCAR文件中写入MBD色散能的二体到六体贡献。相关参数：IVDW，多体色散能，LSCSGRAD。使用此标签的示例。", "recommended": "通常使用默认值.FALSE.。使用场景：当需要详细分析MBD色散能的多体贡献时，例如在研究分子间相互作用或材料色散校正时，可以设置为.TRUE.以获取输出信息。", "tips": "设置为.TRUE.会增加OUTCAR文件的大小；需确保IVDW参数已正确设置（如IVDW=11或12）以启用MBD色散计算；此参数仅影响输出，不影响计算结果。"}, "LVDWSCS": {"name": "LVDWSCS", "description": "LVDWSCS= .TRUE. | .FALSE.Default:LVDWSCS= .FALSE.", "default": "LVDWSCS= .TRUE. | .FALSE.Default:LVDWSCS= .FALSE.", "details": "Description:LVDWSCSactivates theself-consistent screening in Tkatchenko-Scheffler method.\nIVDW,Tkatchenko-Scheffler method,Self-consistent screening in Tkatchenko-Scheffler method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/LVDWSCS", "description_cn": "LVDWSCS参数用于控制是否在Tkatchenko-Scheffler范德华校正方法中启用自洽屏蔽。", "default_value": "FALSE", "details_cn": "详细说明：LVDWSCS激活Tkatchenko-Scheffler方法中的自洽屏蔽。该参数与IVDW、Tkatchenko-Scheffler方法相关，用于范德华相互作用的校正。示例中会使用此标签。", "recommended": "通常设置为FALSE。使用场景：当需要高精度的范德华校正时，例如在计算分子间相互作用、吸附体系或层状材料时，可以设置为TRUE以启用自洽屏蔽，但会增加计算成本。", "tips": "启用自洽屏蔽会显著增加计算时间；确保IVDW参数已正确设置以使用Tkatchenko-Scheffler方法；在某些简单或对精度要求不高的体系中，可能不需要自洽屏蔽。"}, "LVDW_EWALD": {"name": "LVDW_EWALD", "description": "LVDW_EWALD= logicalDefault:LVDW_EWALD= .FALSE.", "default": "LVDW_EWALD= logicalDefault:LVDW_EWALD= .FALSE.", "details": "Description:LVDW_EWALDdecides whether the lattice summation in[math]\\displaystyle{ E_{disp} }[/math]expression by means of Ewald's summation is computed.\nLVDW_EWALDdecides whether the lattice summation in[math]\\displaystyle{ E_{disp} }[/math]expression by means of Ewald's summation is computed in the pairwise van der Waals corrections schemesDFT-D2,DFT-ulgandTkatchenko-Scheffler method.\nDFT-D2,DFT-ulg,Tkatchenko-Scheffler method", "wiki_url": "https://www.vasp.at/wiki/index.php/LVDW_EWALD", "description_cn": "控制是否在色散能表达式中使用Ewald求和方法进行晶格求和计算。", "default_value": "逻辑型，默认值为.FALSE.", "details_cn": "LVDW_EWALD参数决定是否在色散能（E_disp）表达式中，通过Ewald求和方法进行晶格求和计算。该参数适用于成对范德华修正方案中的DFT-D2、DFT-ulg以及Tkatchenko-Scheffler方法。", "recommended": "通常保持默认值.FALSE.。使用场景：当计算体系为表面、薄膜或分子等非严格三维周期性体系时，保持默认值即可；当计算体相材料且需要高精度处理长程色散相
