p.at/wiki/index.php/ROPT", "description_cn": "ROPT= [实数数组]，每个元素对应POTCAR文件中的一个物种。", "default_value": "Default: ROPT", "details_cn": "ROPT 决定了投影仪在实空间中表示的精度。当 LREAL=On 时，实空间投影仪使用 King-Smith 等人提出的算法进行优化。LREAL=Auto [2] 是推荐的方案，因为它相当准确，导致更局部化。根据其值，VASP 以两种方式之一解释 ROPT 条目：“精度”和“常规”模式可以混合使用，即可以指定。", "recommended": "推荐使用 LREAL=Auto 以获得更高精度和更局部化的投影仪。ROPT 的值应根据具体体系和精度要求调整，通常可以使用默认值或通过测试确定；对于高精度计算，建议结合 LREAL=Auto 设置适当的 ROPT 值。", "tips": "ROPT 的设置与 LREAL 参数密切相关，需确保一致性。当 LREAL=On 时，使用 King-Smith 算法优化；当 LREAL=Auto 时，精度更高但计算成本可能增加。混合使用“精度”和“常规”模式时，应验证值的合理性以避免计算错误。"}, "RSMBJ": {"name": "RSMBJ", "description": "RSMBJ= [real]Default:RSMBJ= 7", "default": "RSMBJ= [real]Default:RSMBJ= 7", "details": "Description: sets the[math]\\displaystyle{ r_{s}^{\\mathrm{th}} }[/math]parameter (in bohr) in the LMBJ potential.\nSee the description of theMETAGGAtag.\nMETAGGA,CMBJ,CMBJA,CMBJB,CMBJE,SMBJ,LASPH,LMAXTAU,LMIXTAU", "wiki_url": "https://www.vasp.at/wiki/index.php/RSMBJ", "description_cn": "RSMBJ参数用于设置LMBJ势中的r_s^{th}参数（单位为玻尔）。", "default_value": "7", "details_cn": "设置LMBJ势中的r_s^{th}参数（单位为玻尔）。参见METAGGA标签的描述。相关标签：METAGGA, CMBJ, CMBJA, CMBJB, CMBJE, SMBJ, LASPH, LMAXTAU, LMIXTAU。", "recommended": "默认值7适用于大多数meta-GGA计算。使用场景：在使用METAGGA标签进行LMBJ势计算时，用于控制交换关联势的阈值半径。对于强关联体系或需要高精度的情况，可以适当调整，但建议参考文献或进行测试。", "tips": "RSMBJ仅在METAGGA设置为LMBJ相关值（如METAGGA=MBJ）时生效。单位是玻尔，调整时需谨慎，避免影响计算稳定性。应与其他标签如CMBJ等配合使用，确保参数一致性。"}, "RWIGS": {"name": "RWIGS", "description": "RWIGS= [real array]Default:RWIGS= -1", "default": "RWIGS= [real array]Default:RWIGS= -1", "details": "Description:RWIGSspecifies the Wigner-Seitz radius (in[math]\\displaystyle{ \\AA }[/math]) for each atom type.\nFormono-atomic systemsRWIGScan be defined\nunambiguously. The sum of the volume of the spheres around each atom should be\nthe same as the total volume of the cell (assuming that you do not have a\nvacuum region within your cell).  This is in the spirit of atomic sphere calculations.\nVASP writes a line\nto theOUTCARfile. You should use aRWIGSvalue which yields a\nvolume of approximately 100%.", "wiki_url": "https://www.vasp.at/wiki/index.php/RWIGS", "description_cn": "RWIGS指定每个原子类型的Wigner-Seitz半径（单位：Å）。", "default_value": "-1", "details_cn": "RWIGS指定每个原子类型的Wigner-Seitz半径（单位：Å）。对于单原子系统，RWIGS可以明确定义。每个原子周围球体的体积之和应等于晶胞的总体积（假设晶胞内没有真空区域）。这符合原子球计算的精神。VASP会将一行写入OUTCAR文件。您应该使用一个RWIGS值，使得体积大约为100%。", "recommended": "推荐使用使得原子球体积之和约为晶胞体积100%的RWIGS值。适用于态密度和能带结构计算，尤其是在单原子系统中。", "tips": "RWIGS值应使得原子球体积之和接近晶胞体积的100%。如果晶胞中有真空区域，可能需要调整。VASP会在OUTCAR中输出相关信息，建议检查以确保设置正确。"}, "SAXIS": {"name": "SAXIS", "description": "SAXIS= [real array]Default:SAXIS=  (0, 0, 1)", "default": "SAXIS= [real array]Default:SAXIS=  (0, 0, 1)", "details": "Description: Set the global spin-quantization axis w.r.t. Cartesian coordinates.\nSAXISspecifies the relative orientation of spinor space spanned by the Pauli matrices[math]\\displaystyle{ \\{\\sigma_1 }[/math],[math]\\displaystyle{ \\sigma_2 }[/math],[math]\\displaystyle{ \\mathbf{\\sigma}_3\\} }[/math]with respect to Cartesian coordinates[math]\\displaystyle{ \\{\\hat x, \\hat y, \\hat z\\}  \nsuch that[math]\\displaystyle{ \\sigma_3=\\mathbf{s}/|\\mathbf{s}| }[/math], i.e.,[math]\\displaystyle{ \\sigma_3 }[/math]points along[math]\\displaystyle{ \\mathbf{s}=(s_x,s_y,s_z)^T }[/math]. The directions of[math]\\displaystyle{ \\sigma_1 }[/math]and[math]\\displaystyle{ \\sigma_2 }[/math]are a consequence ", "wiki_url": "https://www.vasp.at/wiki/index.php/SAXIS", "description_cn": "SAXIS参数用于设置全局自旋量子化轴的方向。", "default_value": "(0, 0, 1)", "details_cn": "设置全局自旋量子化轴相对于笛卡尔坐标。SAXIS指定由泡利矩阵{σ1, σ2, σ3}张成的自旋空间相对于笛卡尔坐标{x̂, ŷ, ẑ}的相对取向，使得σ3 = s/|s|，即σ3指向自旋量子化轴。", "recommended": "默认值(0,0,1)适用于自旋沿z轴的常规计算。对于非共线磁性或自旋轨道耦合计算，应根据体系磁矩方向设置SAXIS，例如磁矩沿x轴时设为(1,0,0)，或沿任意方向时指定归一化向量。", "tips": "1. 仅在ISPIN=2（自旋极化）或LSORBIT=.TRUE.（自旋轨道耦合）时有效。2. SAXIS向量应为单位向量，VASP会自动归一化，但建议提供归一化值以避免误差。3. 与MAGMOM参数配合使用，以确保初始磁矩方向与SAXIS一致。4. 在表面或界面计算中，调整SAXIS可优化磁性各向异性计算。"}, "SCALEE": {"name": "SCALEE", "description": "SCALEE= [real]Default:SCALEE= 1", "default": "SCALEE= [real]Default:SCALEE= 1", "details": "Description: This tag specifies the coupling parameter of the energies and forces between a fully interacting system and a reference system.\nThe tagSCALEEsets the coupling parameter[math]\\displaystyle{ \\lambda }[/math]and hence controls the Hamiltonian of the calculation. \nBy defaultSCALEE=1 and the scaling of the energies and forces via the coupling constant is internally skipped in the code. To enable the scalingSCALEE[math]\\displaysty\nMore information using this tag is givenhere.", "wiki_url": "https://www.vasp.at/wiki/index.php/SCALEE", "description_cn": "此标签指定完全相互作用系统和参考系统之间的能量和力的耦合参数。", "default_value": "1", "details_cn": "此标签指定完全相互作用系统和参考系统之间的能量和力的耦合参数。标签 SCALEE 设置耦合参数 λ，从而控制计算的哈密顿量。默认情况下，SCALEE=1，并且通过耦合常数对能量和力的缩放在代码内部被跳过。要启用缩放，SCALEE 必须设置为不同于1的值。", "recommended": "默认值1适用于标准计算，无需缩放。在需要进行能量和力缩放的计算中，如热力学积分或自由能计算，可设置SCALEE为0到1之间的值（例如，在热力学积分中，λ从0到1变化）。具体值取决于计算阶段和物理模型。", "tips": "设置SCALEE时，需确保理解其对哈密顿量的影响，避免错误缩放。在非默认值下，计算可能涉及额外的内部处理，建议参考VASP手册或相关文献以正确使用，并与其他参数（如LAMBDA）协调。"}, "SCISSOR": {"name": "SCISSOR", "description": "Description:SCISSORspecifies the shift for the scissor operator in eV.", "default": "Default:SCISSOR", "details": "Description:SCISSORspecifies the shift for the scissor operator in eV.\nThe scissor operator inBSEandGWcalculations shifts the unoccupied states relative to the valence states[1]. For example, the scissor operator can be used in the BSE calculations to match the band gap to the known experimental value, thus achieving the right offset in the calculated spectrum. Notably\nBSE calculations", "wiki_url": "https://www.vasp.at/wiki/index.php/SCISSOR", "description_cn": "SCISSOR 指定剪刀算符的偏移量，单位为电子伏特（eV）。", "default_value": "SCISSOR", "details_cn": "在BSE和GW计算中，剪刀算符将未占据态相对于价态进行偏移[1]。例如，在BSE计算中，可以使用剪刀算符将带隙与已知实验值匹配，从而在计算光谱中获得正确的偏移。值得注意的是，BSE计算。", "recommended": "根据具体计算需求设置，通常为实验带隙与计算带隙的差值（单位：eV）。使用场景：主要用于BSE（Bethe-Salpeter方程）和GW计算，以校正带隙，使计算吸收光谱与实验数据匹配。", "tips": "SCISSOR参数仅用于调整未占据态的能量，不影响价态。在GW计算中，由于GW方法本身能修正带隙，通常不需要手动设置scissor operator。使用时应参考相关文献[1]，确保偏移量合理，避免过度校正导致误差。"}, "SCSRAD": {"name": "SCSRAD", "description": "SCSRAD= [real]Default:SCSRAD= 120", "default": "SCSRAD= [real]Default:SCSRAD= 120", "details": "Description:SCSRADdefines the cutoff radius (in[math]\\displaystyle{ \\AA }[/math]) used in the calculation of[math]\\displaystyle{ \\tau_{ij} }[/math]within the Tkatchenko-Scheffler methodSelf-consistent screening in Tkatchenko-Scheffler method.\nSelf-consistent screening in Tkatchenko-Scheffler method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/SCSRAD", "description_cn": "SCSRAD参数用于定义在Tkatchenko-Scheffler方法中计算τ_ij时的截断半径。", "default_value": "120", "details_cn": "SCSRAD定义了在Tkatchenko-Scheffler方法中计算τ_ij时使用的截断半径（单位：埃）。Tkatchenko-Scheffler方法中的自洽屏蔽。", "recommended": "推荐使用默认值120 Å，适用于大多数体系。对于大体系或需要高精度计算，可适当增大截断半径；对于小体系或计算资源有限，可减小以节省时间。", "tips": "截断半径过小可能导致范德华相互作用计算不准确，过大则增加计算成本。确保在INCAR文件中正确设置，单位为埃（Å）。"}, "SDFTD3_DAMPING": {"name": "SDFTD3_DAMPING", "description": "SDFTD3_DAMPING= zero | rational | mzero | mrational | optimizedpower", "default": "", "details": "Description:SDFTD3_DAMPINGsets the type of damping function in the DFT-D3 method implemented in thesimple-DFT-D3package.\nSDFTD3_DAMPINGallows to set the type of damping function to be used in the DFT-D3 method implemented in thesimple-DFT-D3package (IVDW=15). The available damping functions areSDFTD3_DAMPING=zero,[1]rational,[2]mzero,[3]mrational,[3]and optimizedpower.[4]\nIVDW,simple-DFT-D3", "wiki_url": "https://www.vasp.at/wiki/index.php/SDFTD3_DAMPING", "description_cn": "SDFTD3_DAMPING参数用于设置DFT-D3方法中的阻尼函数类型，可选值包括zero、rational、mzero、mrational和optimizedpower。", "default_value": "未指定", "details_cn": "SDFTD3_DAMPING设置在simple-DFT-D3包中实现的DFT-D3方法中的阻尼函数类型。SDFTD3_DAMPING允许设置在simple-DFT-D3包（IVDW=15）中实现的DFT-D3方法中使用的阻尼函数类型。可用的阻尼函数有：SDFTD3_DAMPING=zero,[1] rational,[2] mzero,[3] mrational,[3] 和 optimizedpower.[4] IVDW, simple-DFT-D3", "recommended": "推荐使用rational阻尼函数作为默认选择，适用于大多数分子和固体体系的DFT-D3色散校正，提供良好的精度和稳定性。对于需要更高精度或特定体系（如弱相互作用主导的体系），可以考虑使用optimizedpower或其他选项。使用场景：当设置IVDW=15以启用simple-DFT-D3包时，根据计算需求选择合适的阻尼函数。", "tips": "1. 确保在INCAR中设置IVDW=15，否则SDFTD3_DAMPING参数无效。2. 不同阻尼函数可能影响色散校正的精度和计算效率，建议参考相关文献或进行测试以确定最佳选择。3. 引用标记如[1]、[2]等对应原始文献，使用时请查阅以了解详细信息。"}, "SDFTD3_XC": {"name": "SDFTD3_XC", "description": "SDFTD3_XC= [string]Default:SDFTD3_XC= The functional set by theGGA,METAGGAorXCtag.", "default": "SDFTD3_XC= [string]Default:SDFTD3_XC= The functional set by theGGA,METAGGAorXCtag.", "details": "Description:SDFTD3_XCsets the exchange-correlation functional which determines the van der Waals parameters used in the DFT-D3 method implemented in thesimple-DFT-D3package.\nSDFTD3_XCallows to choose the exchange-correlation functional that determines which set of van der Waals parameters is used in the DFT-D3 method implemented in thesimple-DFT-D3package (IVDW=15).\nThe possible choices (e.g.,SDFTD3_XC=pbe, hse06, ...) depend on the damping function selected with theSDFTD3_DAMPINGtag and are listed in the file param.f90 of thesimple-DFT-D3source code.", "wiki_url": "https://www.vasp.at/wiki/index.php/SDFTD3_XC", "description_cn": "SDFTD3_XC= [字符串] 默认值：SDFTD3_XC= 由GGA、METAGGA或XC标签设置的泛函。", "default_value": "由GGA、METAGGA或XC标签设置的泛函", "details_cn": "SDFTD3_XC 设置交换关联泛函，该泛函决定了在 simple-DFT-D3 包中实现的 DFT-D3 方法中使用的范德华参数。SDFTD3_XC 允许选择交换关联泛函，该泛函决定了在 simple-DFT-D3 包中实现的 DFT-D3 方法（IVDW=15）中使用的范德华参数集。可能的选择（例如，SDFTD3_XC=pbe, hse06, ...）取决于通过 SDFTD3_DAMPING 标签选择的阻尼函数，并且是列表...", "recommended": "通常设置为与主计算中使用的交换关联泛函一致，例如，如果使用PBE泛函，则设置SDFTD3_XC=pbe；对于杂化泛函如HSE06，可设置SDFTD3_XC=hse06。使用场景：当启用DFT-D3色散校正（IVDW=15）时，需指定此参数以确保范德华参数与泛函匹配，适用于需要精确描述范德华相互作用的体系，如分子吸附或层状材料。", "tips": "1. 确保SDFTD3_XC与主泛函（通过GGA、METAGGA或XC标签设置）一致，以避免计算不一致。2. 可能的选择取决于SDFTD3_DAMPING标签的阻尼函数设置，建议参考VASP文档或simple-DFT-D3包的说明以获取完整选项列表。3. 如果未显式设置，将默认使用主泛函，但显式设置可提高可读性和控制性。"}, "SHAKEMAXITER": {"name": "SHAKEMAXITER", "description": "SHAKEMAXITER= [Integer]Default:SHAKEMAXITER= 1000", "default": "SHAKEMAXITER= [Integer]Default:SHAKEMAXITER= 1000", "details": "Description:SHAKEMAXITERspecifies the maximum number of iterations in the SHAKE algorithm (in case VASP was compiled with-Dtbdyn).\nConstrained molecular dynamics (MDALGO=1 | 2) are performed using aSHAKE algorithm.[1]\nIf the error for all geometric constraints does not decrease below a predefined tolerance (SHAKETOL) within the allowed number of iterations, VASP terminates with an error message. \nThe aforementioned maximum number of iterations is set by means of theSHAKEMAXITERtag.", "wiki_url": "https://www.vasp.at/wiki/index.php/SHAKEMAXITER", "description_cn": "SHAKEMAXITER 是一个整数参数，默认值为 1000。", "default_value": "1000", "details_cn": "SHAKEMAXITER 指定了 SHAKE 算法中的最大迭代次数（如果 VASP 编译时使用了 -Dtbdyn 选项）。约束分子动力学（MDALGO=1 或 2）使用 SHAKE 算法进行。[1] 如果所有几何约束的误差在允许的迭代次数内未能降低到预定义的容差（SHAKETOL）以下，VASP 将终止并显示错误消息。上述最大迭代次数通过 SHAKEMAXITER 标签设置。", "recommended": "默认值 1000 通常足够，但对于复杂约束系统或收敛困难的情况，可以适当增加。使用场景：在进行约束分子动力学模拟时，特别是当使用 MDALGO=1 或 2 时，设置此参数以控制 SHAKE 算法的迭代次数。", "tips": "确保 VASP 编译时支持 -Dtbdyn 选项；如果模拟中遇到 SHAKE 算法收敛问题，可以尝试调整 SHAKETOL 和 SHAKEMAXITER；注意监控错误消息以判断是否需要增加迭代次数。"}, "SHAKETOL": {"name": "SHAKETOL", "description": "SHAKETOL= [Real]Default:SHAKETOL=[math]\\displaystyle{ 10^{-5} }[/math]", "default": "SHAKETOL= [Real]Default:SHAKETOL=[math]\\displaystyle{ 10^{-5} }[/math]", "details": "Description:SHAKETOLspecifies the tolerance for the SHAKE algorithm (in case VASP was compiled with-Dtbdyn).\nConstrained molecular dynamics (MDALGO=1 | 2  | 3  | 4  | 5) are performed using aSHAKE algorithm.[1]\nSHAKETOLspecifies the tolerance for the SHAKE algorithm.\nIf the error for all geometric constraints does not decrease below this predefined tolerance within the allowed number of iterations (SHAKEMAXITER), VASP terminates with an error message. This behavior can be changed by defining the soft conve", "wiki_url": "https://www.vasp.at/wiki/index.php/SHAKETOL", "description_cn": "SHAKETOL是一个实数参数，用于指定SHAKE算法的容差，默认值为10^{-5}。", "default_value": "10^{-5}", "details_cn": "SHAKETOL指定SHAKE算法的容差（如果VASP编译时启用了-Dtbdyn）。约束分子动力学（MDALGO=1 | 2 | 3 | 4 | 5）使用SHAKE算法执行。[1] SHAKETOL指定SHAKE算法的容差。如果所有几何约束的误差在允许的迭代次数（SHAKEMAXITER）内没有降低到预定义的容差以下，VASP将以错误消息终止。这种行为可以通过定义来改变。", "recommended": "通常使用默认值10^{-5}，适用于大多数约束分子动力学模拟，如固定键长或角度。使用场景：当进行约束分子动力学（MDALGO=1至5）时，此参数控制SHAKE算法的收敛精度。如果模拟中约束误差较大或需要更高精度，可适当减小容差（如10^{-6}），但需注意收敛性。", "tips": "1. 确保VASP编译时启用了-Dtbdyn选项，否则SHAKETOL参数无效。2. 此参数需与SHAKEMAXITER配合使用，避免因容差设置过小导致迭代次数不足而模拟失败。3. 在调整容差时，建议先测试小规模模拟以验证收敛性。"}, "SHAKETOLSOFT": {"name": "SHAKETOLSOFT", "description": "SHAKETOLSOFT= [Real]Default:SHAKETOLSOFT=SHAKETOL", "default": "SHAKETOLSOFT= [Real]Default:SHAKETOLSOFT=SHAKETOL", "details": "Description:SHAKETOLSOFTspecifies the soft tolerance for the SHAKE algorithm (in case VASP was compiled with-Dtbdyn).\nConstrained molecular dynamics (MDALGO=1 | 2  | 3  | 4  | 5) are performed using aSHAKE algorithm.[1]\nSHAKETOLspecifies the tolerance for the SHAKE algorithm.\nIf the error for all geometric constraints does not decrease below this predefined tolerance within the allowed number of iterations (SHAKEMAXITER), VASP terminates with an error message. This behavior can be changed by defining the soft conve", "wiki_url": "https://www.vasp.at/wiki/index.php/SHAKETOLSOFT", "description_cn": "SHAKETOLSOFT 是一个实数参数，用于指定 SHAKE 算法的软容差，默认值为 SHAKETOL。", "default_value": "默认值为 SHAKETOL。", "details_cn": "SHAKETOLSOFT 指定了 SHAKE 算法的软容差（如果 VASP 编译时使用了 -Dtbdyn）。约束分子动力学（MDALGO=1 | 2 | 3 | 4 | 5）使用 SHAKE 算法进行。[1] SHAKETOL 指定了 SHAKE 算法的容差。如果所有几何约束的误差在允许的迭代次数（SHAKEMAXITER）内没有降低到预定义的容差以下，VASP 会终止并显示错误消息。这种行为可以通过定义 SHAKETOLSOFT 来改变。", "recommended": "通常设置为比 SHAKETOL 大一个数量级，例如 SHAKETOL=1e-5 时，SHAKETOLSOFT=1e-4。使用场景：在约束分子动力学中，当 SHAKE 算法收敛困难时，可适当增大 SHAKETOLSOFT 以放宽约束，避免计算错误终止。", "tips": "1. 确保 VASP 编译时使用了 -Dtbdyn 选项；2. SHAKETOLSOFT 仅影响软容差，硬容差仍由 SHAKETOL 控制；3. 设置时应根据具体体系测试，参考相关文献。"}, "SIGMA": {"name": "SIGMA", "description": "SIGMA= [real]Default:SIGMA= 0.2", "default": "SIGMA= [real]Default:SIGMA= 0.2", "details": "Description:SIGMAspecifies the width of the smearing in eV.\nISMEAR,EFERMI,K-point integration\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/SIGMA", "description_cn": "SIGMA是一个实数参数，指定展宽的宽度，单位为电子伏特（eV）。默认值为0.2。", "default_value": "0.2", "details_cn": "SIGMA指定展宽的宽度，单位为电子伏特（eV）。与ISMEAR、EFERMI和K点积分相关。使用此标签的示例。", "recommended": "对于金属体系，建议SIGMA=0.05-0.2 eV；对于半导体或绝缘体，建议SIGMA=0.1-0.2 eV。使用场景：与ISMEAR参数配合使用，控制电子态展宽以确保计算收敛，特别是在态密度和能带结构计算中。", "tips": "SIGMA值过小可能导致数值不稳定或收敛困难，过大可能模糊能带结构细节。应根据体系性质（如金属性、绝缘性）和计算目标调整，并与ISMEAR参数协调使用，以优化计算精度和效率。"}, "SMASS": {"name": "SMASS", "description": "SMASS= -3 | -2 | -1 | [real] ≥ 0Default:SMASS= -3", "default": "SMASS= -3 | -2 | -1 | [real] ≥ 0Default:SMASS= -3", "details": "Description:SMASScontrols the velocities during an ab-initio molecular-dynamics run.\nstructure optimization,IBRION,POTIM,NBLOCK,TEBEG,TEEND\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/SMASS", "description_cn": "SMASS控制在从头算分子动力学运行中的速度。", "default_value": "-3", "details_cn": "SMASS控制在从头算分子动力学运行中的速度。结构优化，IBRION，POTIM，NBLOCK，TEBEG，TEEND 使用此标签的示例。", "recommended": "对于NVT系综分子动力学，推荐使用SMASS=-2（Nosé-Hoover thermostat）或SMASS=-1（Langevin thermostat）；对于NVE系综，使用SMASS≥0进行质量缩放。使用场景：适用于离子弛豫、分子动力学模拟和结构优化。", "tips": "SMASS仅在IBRION=0时有效；负值表示使用恒温器控制温度，正值表示质量缩放；需与TEBEG和TEEND参数配合使用以设定温度范围。"}, "SMBJ": {"name": "SMBJ", "description": "SMBJ= [real]Default:SMBJ= 2", "default": "SMBJ= [real]Default:SMBJ= 2", "details": "Description: sets the[math]\\displaystyle{ \\sigma }[/math]parameter (in[math]\\displaystyle{ \\AA }[/math]) in the LMBJ potential.\nSee the description of theMETAGGAtag.\nMETAGGA,CMBJ,CMBJA,CMBJB,CMBJE,RSMBJ,LASPH,LMAXTAU,LMIXTAU", "wiki_url": "https://www.vasp.at/wiki/index.php/SMBJ", "description_cn": "SMBJ参数用于设置LMBJ势中的σ参数，单位为埃（Å）。默认值为2。", "default_value": "2", "details_cn": "设置LMBJ势中的σ参数（单位为Å）。参见METAGGA标签的描述。相关参数：METAGGA, CMBJ, CMBJA, CMBJB, CMBJE, RSMBJ, LASPH, LMAXTAU, LMIXTAU。", "recommended": "默认值2适用于大多数常规计算。对于特定体系（如强关联材料或需要精确带隙预测），建议通过测试计算调整σ值以优化结果。使用场景：当使用METAGGA泛函（如LMBJ）进行高精度电子结构计算时设置。", "tips": "σ参数影响LMBJ势的精度和计算收敛性；必须与METAGGA标签配合使用；调整时应参考相关文献或进行收敛测试，避免值过大或过小导致计算不稳定或错误。"}, "SMEARINGS": {"name": "SMEARINGS", "description": "SMEARINGS= [real array of length (2 *NSW)]Default:SMEARINGS= not set", "default": "SMEARINGS= [real array of length (2 *NSW)]Default:SMEARINGS= not set", "details": "Description:SMEARINGSdefines the smearing parameters forISMEAR= -3in the calculation of the partial occupancies.\nISMEAR= -3performs a loop over smearing-parameters supplied in theINCARfile. With the tagSMEARINGS, you select which smearings are used\nVASP will then read the provided smearings and conduct (NSW+ 1) calculations with the different smearings.\nFor the first calculation, VASP uses tetrahedron smearingISMEAR= -5to ensure that the tetrahedron information is present in case any of the selected smearings uses a tetrahedron method.\nSince V", "wiki_url": "https://www.vasp.at/wiki/index.php/SMEARINGS", "description_cn": "SMEARINGS= [长度为(2*NSW)的实数数组] 默认：SMEARINGS= 未设置", "default_value": "未设置", "details_cn": "SMEARINGS定义了在计算部分占据时用于ISMEAR=-3的展宽参数。ISMEAR=-3会循环INCAR文件中提供的展宽参数。通过标签SMEARINGS，你可以选择使用哪些展宽。VASP将读取提供的展宽并进行(NSW+1)次计算，使用不同的展宽。对于第一次计算，VASP使用四面体展宽ISMEAR=-5，以确保四面体信息存在，以防任何选定的展宽需要。", "recommended": "无固定推荐值，需根据具体计算设置。例如，在金属体系或需要精确费米能级的计算中，可设置一组展宽值（如0.05、0.1、0.2 eV）进行收敛性测试。使用场景：当使用ISMEAR=-3时，通过SMEARINGS指定多个展宽参数，VASP自动执行多次计算，帮助确定最佳展宽值，适用于能带计算或优化电子结构。", "tips": "1. 确保SMEARINGS数组长度正确，为2*NSW，与NSW参数协调；2. 展宽参数单位通常为eV；3. 第一次计算使用ISMEAR=-5，因此系统需支持四面体方法；4. 在INCAR中正确设置ISMEAR=-3以启用此功能。"}, "SPRING": {"name": "SPRING", "description": "SPRING= [integer]Default:SPRING= -5", "default": "SPRING= [integer]Default:SPRING= -5", "details": "Description:SPRINGgives thespring constantbetween the images as used in the elastic band method.\nSPRINGhas to be set together withIMAGESif the elastic band method is used to calculate energy barriers between two ionic configurations of a system.\nForSPRING= 0, each image is only allowed\nto move into the direction perpendicular to the current\nhyper-tangent, which is calculated as the normal vector\nbetween two neighboring images.\nThis algorithm keeps the distance between the images\nconstant tofirst order. It is therefore possible to start\nwith", "wiki_url": "https://www.vasp.at/wiki/index.php/SPRING", "description_cn": "SPRING参数用于设置弹性带方法中图像之间的弹簧常数。", "default_value": "-5", "details_cn": "SPRING给出了在弹性带方法中使用的图像之间的弹簧常数。如果使用弹性带方法计算系统两个离子构型之间的能垒，必须与IMAGES一起设置SPRING。对于SPRING= 0，每个图像只允许移动到垂直于当前超切线的方向，该方向计算为两个相邻图像之间的法向量。该算法保持图像之间的距离在一阶上恒定。", "recommended": "默认值-5通常适用于大多数情况，因为它提供了稳定的弹簧作用。使用场景：当使用弹性带方法（如NEB）计算两个离子构型之间的能垒或反应路径时，需要设置此参数以控制图像间的相互作用。", "tips": "1. 必须与IMAGES参数一起设置，否则弹性带方法无法启用；2. SPRING=0时，图像移动受限于垂直方向，可能导致收敛问题，需谨慎使用；3. 负值可能表示不同的弹簧行为，但默认-5是标准设置，建议根据具体计算体系进行测试调整。"}, "SPRING_K": {"name": "SPRING_K", "description": "SPRING_K= [real (array)]", "default": "", "details": "Description: Force constant for harmonic bias potential.\nThe parameterSPRING_Kdefines force constants ([math]\\displaystyle{ \\kappa_{\\mu} }[/math]) for the harmonic bias of the following form:\nwhere the sum runs over all ([math]\\displaystyle{ M_8 }[/math]) coordinates the potential acts upon ([math]\\displaystyle{ \\xi_{\\mu}(q) }[/math]), which are defined in theICONSTfile by setting thestatusto 8.\nThe units of[math]\\displaystyle{ \\kappa_{\\mu} }[/math]are[math]\\displaystyle{ eV/uc }[/math]w", "wiki_url": "https://www.vasp.at/wiki/index.php/SPRING_K", "description_cn": "谐波偏置势的力常数。", "default_value": "无默认值", "details_cn": "谐波偏置势的力常数。参数 SPRING_K 定义了以下形式的谐波偏置的力常数 (κ_μ)：其中求和遍历所有势作用的坐标 (M_8) (ξ_μ(q))，这些坐标在 ICONST 文件中通过设置状态为 8 来定义。κ_μ 的单位是 eV/uc。", "recommended": "推荐值取决于具体应用，通常在增强采样方法如元动力学或约束分子动力学中使用。力常数应设置得足够大以有效约束系统，但又不能太大以免影响采样效率或导致数值不稳定。建议根据系统大小、目标自由能面和坐标类型调整，典型值范围在1-10 eV/Å²，但注意SPRING_K的单位是eV/uc（可能指每个晶胞），需参考VASP文档或相关文献进行校准。", "tips": "确保在ICONST文件中正确设置状态为8以定义相关坐标。单位需与VASP输入一致，避免单位混淆。力常数过大可能导致模拟不稳定，过小则约束不足，建议通过测试优化参数。在复杂系统中，可考虑使用多个力常数对应不同坐标。"}, "SPRING_R0": {"name": "SPRING_R0", "description": "SPRING_R0= [real (array)]", "default": "", "details": "Description: Position of the minimum for a harmonic bias potential.\nThe parameterSPRING_R0defines the position of the minimum ([math]\\displaystyle{ \\xi_{0\\mu} }[/math]) for the harmonic bias potential of the following form:\nwhere the sum runs over all ([math]\\displaystyle{ M_8 }[/math]) coordinates  the potential acts upon ([math]\\displaystyle{ \\xi_{\\mu}(q) }[/math]), which are defined in theICONSTfile by setting thestatus=8.\nThe units of[math]\\displaystyle{ \\xi_{0\\mu} }[/math]correspond to units of the coordinate the ", "wiki_url": "https://www.vasp.at/wiki/index.php/SPRING_R0", "description_cn": "SPRING_R0= [实数（数组）]", "default_value": "无默认值，需用户指定", "details_cn": "谐波偏置势的最小位置。参数SPRING_R0定义了谐波偏置势的最小位置（ξ_{0μ}），其中求和遍历所有M个坐标，势作用于ξ_μ(q)，这些坐标在ICONST文件中通过设置status=8来定义。ξ_{0μ}的单位与坐标单位一致。", "recommended": "根据具体模拟系统设置，通常为期望的坐标平衡值（如键长、键角或二面角的平衡值）。使用场景：用于增强采样技术如元动力学或伞形采样，以定义谐波偏置势的中心，从而约束或引导系统采样特定构型。", "tips": "确保SPRING_R0的单位与ICONST文件中定义的坐标单位一致；设置值应基于物理合理性，避免极端值导致模拟不稳定；在使用前，建议先通过测试模拟验证偏置势的效果。"}, "SPRING_V0": {"name": "SPRING_V0", "description": "SPRING_V0= [real (array)]", "default": "Default:SPRING_V0", "details": "Description: Rate at which the bias potential is shifted in[math]\\displaystyle{ uc/fs }[/math].\nConsider the bias potential for amolecular-dynamics(MD) run of the form:\nwhere the sum runs over all ([math]\\displaystyle{ M_8 }[/math]) coordinates the potential acts upon ([math]\\displaystyle{ \\xi_{\\mu}(q) }[/math]). The coordinates are defined in theICONSTfile by setting thestatus=8.\nOptionally, the position of minimum ([math]\\displaystyle{ \\xi_{0\\mu} }[/math]) can be", "wiki_url": "https://www.vasp.at/wiki/index.php/SPRING_V0", "description_cn": "SPRING_V0= [实数（数组）]", "default_value": "SPRING_V0", "details_cn": "偏置势的移动速率，单位为 uc/fs。考虑分子动力学（MD）运行的偏置势形式：其中求和遍历所有（M_8）坐标，势作用于（ξ_μ(q)）。这些坐标在ICONST文件中通过设置status=8来定义。可选地，最小值位置（ξ_{0μ}）可以是", "recommended": "通常设置为0.1到1.0之间的实数，单位uc/fs。使用场景：在元动力学或伞形采样模拟中，用于控制偏置势的移动速率，以增强采样效率，例如计算自由能面。", "tips": "确保在ICONST文件中正确定义坐标并设置status=8。SPRING_V0的值需根据具体体系调整，过大可能导致模拟不稳定，过小可能导致收敛缓慢。注意单位一致性，uc/fs表示原子单位每飞秒。"}, "STEP_MAX": {"name": "STEP_MAX", "description": "STEP_MAX= [real]Default:STEP_MAX= 0.1", "default": "STEP_MAX= [real]Default:STEP_MAX= 0.1", "details": "Description: The flagSTEP_MAXdefines the trust radius (upper limit) for the optimization step (in[math]\\displaystyle{ \\AA }[/math]) in theImproved Dimer Method.\nImproved Dimer Method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/STEP_MAX", "description_cn": "STEP_MAX是一个实数参数，默认值为0.1。", "default_value": "0.1", "details_cn": "标志STEP_MAX定义了在改进的二聚体方法中优化步长的信任半径（上限），单位是Å。改进的二聚体方法使用此标签的示例。", "recommended": "通常使用默认值0.1。使用场景：在改进的二聚体方法中优化过渡态或鞍点时，用于控制优化步长，适用于表面或分子体系。", "tips": "STEP_MAX的值应根据系统特性和收敛性调整；过大的值可能导致优化不稳定，过小的值可能减慢收敛。单位是Å，确保与坐标单位一致。"}, "STEP_SIZE": {"name": "STEP_SIZE", "description": "STEP_SIZE= [real]Default:STEP_SIZE= 0.01", "default": "STEP_SIZE= [real]Default:STEP_SIZE= 0.01", "details": "Description: The flagSTEP_SIZEdefines the trial step size for the optimization step (in[math]\\displaystyle{ \\AA }[/math]) in theImproved Dimer Method.\nImproved Dimer Method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/STEP_SIZE", "description_cn": "STEP_SIZE定义了优化步骤的试验步长，单位为Å，用于改进的二聚体方法。", "default_value": "0.01", "details_cn": "标志STEP_SIZE定义了优化步骤的试验步长（单位为Å），用于改进的二聚体方法。", "recommended": "默认值0.01适用于大多数情况。使用场景：在改进的二聚体方法中寻找过渡态或鞍点时使用，例如化学反应路径计算。对于较大系统或复杂势能面，可适当减小步长（如0.005）以提高收敛稳定性。", "tips": "步长过大可能导致优化不稳定或发散；若优化不收敛，建议尝试减小STEP_SIZE；需与其他INCAR参数（如IBRION、POTIM）协调设置，以确保计算效率和准确性。"}, "STOP_ON": {"name": "STOP_ON", "description": "STOP_ON= Error|AlertDefault:STOP_ON= Error", "default": "STOP_ON= Error|AlertDefault:STOP_ON= Error", "details": "Description:STOP_ONdefines if the code should stop on errors only or also on alerts.\nThere are two instances, why one might want a more conservative choice when running calculations.\nFirst, VASP will overwrite user provided input, if the input does not make sense. You may want to\nmake sure that VASP does not continue in this case by setting the stricterSTOP_ON= Alert", "wiki_url": "https://www.vasp.at/wiki/index.php/STOP_ON", "description_cn": "STOP_ON参数定义代码是否仅在错误时停止，还是在警报时也停止。", "default_value": "Error", "details_cn": "STOP_ON参数定义代码是否仅在错误时停止，还是在警报时也停止。在运行计算时，有两种情况可能需要更保守的选择。首先，如果用户提供的输入不合理，VASP会覆盖该输入。在这种情况下，您可能希望通过设置更严格的STOP_ON= Alert来确保VASP不会继续。", "recommended": "STOP_ON= Alert。使用场景：当需要更保守的选择，例如确保VASP不会覆盖不合理的输入时，或在调试和高精度计算中，以避免潜在错误。", "tips": "设置此参数时，应理解错误和警报的区别；在默认设置下，VASP可能继续运行即使有警报，但使用Alert可以更早停止以避免潜在问题，建议在关键计算中启用。"}, "SYMPREC": {"name": "SYMPREC", "description": "SYMPREC= [real]Default:SYMPREC=[math]\\displaystyle{ 10^{-5} }[/math]", "default": "SYMPREC= [real]Default:SYMPREC=[math]\\displaystyle{ 10^{-5} }[/math]", "details": "Description:SYMPRECdetermines to which accuracy the positions in thePOSCARfile must be specified (as of VASP.4.4.4).\nSYMPRECdetermines how accurately the positions in thePOSCARfile must be specified.\nThe default,SYMPREC=10-5, is usually large enough, even if thePOSCARfile has been generated with single precision accuracy.\nIncreasingSYMPRECmeans that the positions in thePOSCARfile can be specified with less accurac\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/SYMPREC", "description_cn": "SYMPREC是一个实数参数，默认值为10^{-5}。", "default_value": "10^{-5}", "details_cn": "SYMPREC决定了POSCAR文件中位置需要指定的精度（自VASP.4.4.4起）。默认值10^{-5}通常足够大，即使POSCAR文件是用单精度生成的。增加SYMPREC意味着POSCAR文件中的位置可以指定得更不精确。", "recommended": "推荐使用默认值10^{-5}，适用于大多数离子弛豫和分子动力学计算。如果结构对称性检测出现问题，可以适当增加SYMPREC值，例如设为10^{-4}或10^{-3}，但需注意这可能降低对称性精度；在高精度计算中，可考虑减少SYMPREC以提高要求。", "tips": "调整SYMPREC会影响VASP对称性操作的精度；确保POSCAR文件的坐标精度与SYMPREC设置相匹配，避免因精度不匹配导致计算误差；在修改SYMPREC时，建议先进行测试以验证对称性检测效果。"}, "SYSTEM": {"name": "SYSTEM", "description": "SYSTEM= [string]Default:SYSTEM= unknown system", "default": "SYSTEM= [string]Default:SYSTEM= unknown system", "details": "Description: The \"title string\" defined bySYSTEMis for the user only and should help the user to identify what he/she wants to do with this specific input file.\nTheSYSTEMtag is followed by a string that possibly contains blanks. The string is read in and written to the main output fileOUTCAR.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/SYSTEM", "description_cn": "SYSTEM参数用于设置一个字符串，帮助用户标识计算任务，默认值为'unknown system'。", "default_value": "unknown system", "details_cn": "SYSTEM定义的“标题字符串”仅用于用户自身，应帮助用户识别他/她希望用这个特定输入文件做什么。SYSTEM标签后跟一个可能包含空格的字符串。该字符串被读入并写入主输出文件OUTCAR。使用此标签的示例。", "recommended": "推荐使用描述性字符串，例如材料名称和计算类型（如'Si_bulk_relaxation'或'CO_adsorption_on_Pt'）。使用场景：在所有VASP计算的INCAR文件中设置，以便在输出文件OUTCAR中轻松识别和区分不同任务。", "tips": "字符串可以包含空格，但建议避免特殊字符以确保兼容性；保持字符串简洁明了；该字符串会写入OUTCAR文件，便于后续分析和追踪计算历史。"}, "TEBEG": {"name": "TEBEG", "description": "TEBEG= [real]Default:TEBEG= 0", "default": "TEBEG= [real]Default:TEBEG= 0", "details": "Description:TEBEGsets the starting temperature (in K) for an ab-initio molecular dynamics run (IBRION=0) and other routines (e.g.Electron-phonon interactions from Monte-Carlo sampling).\nIf no initial velocities are supplied on thePOSCARfile, the velocities are set randomly according to a Maxwell-Boltzmann distribution at the initial temperatureTEBEG. Velocities are only used for molecular dynamics (IBRION=0).\nMind: IfMDALGO>0 is used VASP defines the temperature as", "wiki_url": "https://www.vasp.at/wiki/index.php/TEBEG", "description_cn": "TEBEG= [实数] 默认值：TEBEG= 0", "default_value": "0", "details_cn": "TEBEG设置从头算分子动力学运行（IBRION=0）和其他例程（例如，通过蒙特卡洛采样的电子-声子相互作用）的起始温度（单位：K）。如果POSCAR文件中未提供初始速度，则根据初始温度TEBEG的麦克斯韦-玻尔兹曼分布随机设置速度。速度仅用于分子动力学（IBRION=0）。注意：如果使用MDALGO>0，VASP将温度定义为", "recommended": "根据模拟需求设置，例如室温模拟推荐300 K，高温模拟根据实验或理论需求设置。默认值为0 K，但实际分子动力学模拟通常需要非零温度。使用场景：用于从头算分子动力学（IBRION=0）或其他需要初始温度的例程，如电子-声子相互作用计算。", "tips": "1. 如果使用MDALGO>0，VASP对温度的定义可能不同，需参考相关文档。2. 初始速度可以在POSCAR文件中提供，否则根据TEBEG随机生成。3. 速度参数仅在IBRION=0（分子动力学）时有效。"}, "TEEND": {"name": "TEEND", "description": "Description:TEENDsets the final temperature (in K) for an ab-initio molecular-dynamics run.", "default": "TEEND= [real]Default:TEEND=TEBEG", "details": "TEEND= [real]Default:TEEND=TEBEG", "wiki_url": "https://www.vasp.at/wiki/index.php/TEEND", "description_cn": "TEEND参数用于设定从头算分子动力学模拟的终止温度（单位：开尔文）。", "default_value": "TEEND = TEBEG（默认值等于起始温度TEBEG）", "details_cn": "TEEND = [实数] 默认值：TEEND = TEBEG。该参数定义了分子动力学模拟结束时的目标温度。在模拟过程中，系统温度会从起始温度TEBEG逐渐变化至终止温度TEEND。", "recommended": "推荐值和使用场景：\n1. 恒温模拟：若需进行恒温分子动力学，应设置TEEND = TEBEG。\n2. 退火或升温模拟：若需模拟温度变化过程（如退火、升温），可设置TEEND为不同于TEBEG的值。例如，从低温升至高温研究相变时，可设TEBEG=300，TEEND=1000。\n3. 降温模拟：若需模拟冷却过程，可设TEEND < TEBEG。", "tips": "注意事项：\n1. 温度变化率由参数TEBEG、TEEND及总模拟步数共同决定，需确保变化过程物理合理。\n2. 若未设置TEEND，系统将保持恒温（TEEND=TEBEG）。\n3. 单位必须为开尔文（K），不可使用摄氏度等其他单位。\n4. 在NVT系综中，温度控制算法会尝试将系统温度从TEBEG平滑过渡至TEEND。"}, "TILAMBDA": {"name": "TILAMBDA", "description": "TILAMBDA= realDefault:TILAMBDA=  0.0", "default": "TILAMBDA= realDefault:TILAMBDA=  0.0", "details": "Description:TILAMBDAdefines the coupling parameter[math]\\displaystyle{ \\lambda }[/math]used inThermodynamic integration using a Hessian reference. The value of[math]\\displaystyle{ \\lambda }[/math]must be from the inverval[math]\\displaystyle{ \\langle 0, 1 \\rangle }[/math].\nHow to run thermodynamic integration calculations is givenhere.\nHESSEMAT,ICONST,REPORT", "wiki_url": "https://www.vasp.at/wiki/index.php/TILAMBDA", "description_cn": "TILAMBDA定义了在热力学积分中使用的耦合参数λ，该积分使用Hessian参考。", "default_value": "0.0", "details_cn": "TILAMBDA定义了在热力学积分中使用的耦合参数λ，该积分使用Hessian参考。λ的值必须在区间⟨0, 1⟩内。如何运行热力学积分计算在此处给出。相关参数：HESSEMAT, ICONST, REPORT。", "recommended": "根据具体计算需求，λ通常在0到1之间变化，例如在自由能计算中，可以设置λ为0.5或根据积分路径调整。使用场景：用于热力学积分方法计算自由能差，特别是在使用Hessian参考时。", "tips": "确保λ值在0到1之间；需要结合HESSEMAT、ICONST和REPORT等参数使用；建议参考VASP官方文档了解热力学积分计算的详细步骤。"}, "TIME": {"name": "TIME", "description": "TIME= [real]Default:TIME= 0.4", "default": "TIME= [real]Default:TIME= 0.4", "details": "Description:TIMEcontrols the time step forIALGO=5X and for the initial (steepest descent) phase ofIALGO=4X.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/TIME", "description_cn": "TIME参数接受实数值，默认值为0.4。", "default_value": "0.4", "details_cn": "TIME控制IALGO=5X的时间步长，以及IALGO=4X的初始（最速下降）阶段的时间步长。", "recommended": "推荐使用默认值0.4。对于收敛困难的体系，可尝试减小时间步长至0.2或更小。适用于杂化泛函计算中使用IALGO=5X或IALGO=4X的情况。", "tips": "注意时间步长的选择会影响计算收敛性和效率。过大的时间步长可能导致不收敛，过小则增加计算成本。建议根据具体体系进行测试调整。"}, "TRANSPORT_NEDOS": {"name": "TRANSPORT_NEDOS", "description": "TRANSPORT_NEDOS= [integer]Default:TRANSPORT_NEDOS= 501", "default": "TRANSPORT_NEDOS= [integer]Default:TRANSPORT_NEDOS= 501", "details": "Description: Choose the number of points in the Gauss-Legendre integration grid for the computation of the Onsager coefficients, which in turn are used to compute the transport coefficients.\nBy a variable change in the integral of the transport function, it is possible to use Gauss-Legendre quadrature to evaluate the Onsager coefficients.\nBy increasing the number of points, one defines the energy window inside which we need to compute the electron group velocities and the electronic lif\nA convergence study is recommended since having a very large number of integration points can greatly increase the number of states for which the electronic lifetimes need to be computed, sometimes without a significant change in the final transport coefficients. Lower values of the number of integr", "wiki_url": "https://www.vasp.at/wiki/index.php/TRANSPORT_NEDOS", "description_cn": "TRANSPORT_NEDOS= [整数] 默认值：TRANSPORT_NEDOS= 501", "default_value": "501", "details_cn": "选择Gauss-Legendre积分网格中的点数，用于计算Onsager系数，这些系数进而用于计算输运系数。通过对输运函数积分进行变量变换，可以使用Gauss-Legendre求积法来评估Onsager系数。通过增加点数，可以定义我们需要计算电子群速度和电子寿命的能量窗口。收敛性取决于点数，需要足够点以确保积分精度。", "recommended": "默认值501适用于大多数标准输运计算。对于高精度需求，如窄带隙半导体、金属或复杂能带结构，建议增加到1000或更高，并通过收敛测试确定最佳值。使用场景包括热电材料、电子输运性质研究等。", "tips": "增加TRANSPORT_NEDOS会显著提高计算时间和内存消耗，需权衡精度与资源。确保与NEDOS参数（能量网格点数）协调，避免冲突。在进行输运计算前，必须完成电子结构的自洽计算，并检查收敛性。对于大规模体系，建议先进行小规模测试。"}, "TRANSPORT_RELAXATION_TIME": {"name": "TRANSPORT_RELAXATION_TIME", "description": "TRANSPORT_RELAXATION_TIME= [real]Default:TRANSPORT_RELAXATION_TIME=  1E-14", "default": "TRANSPORT_RELAXATION_TIME= [real]Default:TRANSPORT_RELAXATION_TIME=  1E-14", "details": "Description: Value of the constant relaxation time in unit of seconds.\nThis value is only used whenELPH_SCATTERING_APPROX= CRTA, so for the constant relaxation-time approximation.", "wiki_url": "https://www.vasp.at/wiki/index.php/TRANSPORT_RELAXATION_TIME", "description_cn": "常数弛豫时间的值，单位为秒。", "default_value": "1E-14", "details_cn": "常数弛豫时间的值，单位为秒。此值仅在ELPH_SCATTERING_APPROX= CRTA时使用，即用于常数弛豫时间近似。", "recommended": "默认值1E-14秒是一个合理起点，但应根据具体材料和计算需求调整。使用场景：当使用ELPH_SCATTERING_APPROX= CRTA进行电子输运计算时，例如计算电导率等性质。", "tips": "确保ELPH_SCATTERING_APPROX参数设置为CRTA；弛豫时间单位是秒；值的选择会影响输运性质的计算精度，建议参考实验数据或理论计算进行校准，避免使用不合理的默认值。"}, "TSUBSYS": {"name": "TSUBSYS", "description": "TSUBSYS= [real array]", "default": "", "details": "Description:TSUBSYSsets the temperatures for the atomic subsystems in calculations with multiple Anderson thermostats (in case VASP was compiled with-Dtbdyn).\nUp to three user-defined atomic subsystems may be coupled with independent Andersen thermostats[1](MDALGO=13).\nThe simulation temperature for the atomic subsystems is set by means of theTSUBSYStag (one has to specify one number for each subsystem).", "wiki_url": "https://www.vasp.at/wiki/index.php/TSUBSYS", "description_cn": "TSUBSYS= [实数数组]", "default_value": "无默认值", "details_cn": "TSUBSYS 设置在多个 Anderson 热浴计算中的原子子系统的温度（如果 VASP 编译时使用了 -Dtbdyn）。最多三个用户定义的原子子系统可以与独立的 Andersen 热浴耦合[1](MDALGO=13)。原子子系统的模拟温度通过 TSUBSYS 标签设置（必须为每个子系统指定一个数字）。", "recommended": "根据模拟需求设置，例如，对于不同子系统设置不同温度以研究热传导或非平衡过程。使用场景：当使用 MDALGO=13 进行多个 Anderson 热浴计算时，需要控制不同原子组的温度。", "tips": "1. 确保 VASP 编译时启用了 -Dtbdyn 选项，否则 TSUBSYS 参数无效。2. 子系统数量最多为三个，需要与 MDALGO=13 配合使用。3. 每个子系统必须指定一个温度值。"}, "VACPOTFLAT": {"name": "VACPOTFLAT", "description": "VACPOTFLAT= [real]Default:VACPOTFLAT= 0.1", "default": "VACPOTFLAT= [real]Default:VACPOTFLAT= 0.1", "details": "Description: Maximum permissible 2D-averaged electric field for a region considered to be field-free in eV/Å.\nA region of space is considered to be field-free if the 2D-averaged electric field (LVACPOTAV=True) is smaller thanVACPOTFLAT.\nLVACPOTAV,LVTOT,LVHAR,WRT_POTENTIAL,DIPOL,LDIPOL,IDIPOL", "wiki_url": "https://www.vasp.at/wiki/index.php/VACPOTFLAT", "description_cn": "VACPOTFLAT 是一个实数参数，默认值为0.1，用于设置在被认为是无场区域中允许的最大二维平均电场强度，单位为 eV/Å。", "default_value": "0.1", "details_cn": "VACPOTFLAT 设置了在被认为是无场区域中允许的最大二维平均电场强度，单位为 eV/Å。如果二维平均电场（当 LVACPOTAV=True 时）小于 VACPOTFLAT，则该空间区域被认为是无场的。相关参数：LVACPOTAV, LVTOT, LVHAR, WRT_POTENTIAL, DIPOL, LDIPOL, IDIPOL。", "recommended": "默认值0.1 eV/Å适用于大多数情况。使用场景：在计算功函数、表面电势或涉及电场的模拟中，用于定义无场区域，确保电场计算的准确性。", "tips": "1. 确保 LVACPOTAV 设置为 True 以启用二维平均电场计算。2. 调整 VACPOTFLAT 时需谨慎，过小可能导致计算不稳定，过大可能忽略电场变化。3. 与 DIPOL、LDIPOL 等参数配合使用以优化电场处理。"}, "VALUE_MAX": {"name": "VALUE_MAX", "description": "VALUE_MAX= [real array]", "default": "", "details": "Description:VALUE_MAXsets the upper limits for the monitoring of geometric parameters (in case VASP was compiled with-Dtbdyn).\nForMDALGO=1 | 2, the geometric parameters defined in theICONSTfile may be monitored without being subjected to a constraint or bias potential (STATUS=7in theICONST-file).\nIf all values of monitored parameters defined in theICONSTfile (STATUS=7) are smaller thanVALUE_MINor larger thanVALUE_MAX, the simulation terminates.", "wiki_url": "https://www.vasp.at/wiki/index.php/VALUE_MAX", "description_cn": "VALUE_MAX= [实数数组]", "default_value": "未指定", "details_cn": "VALUE_MAX 设置了几何参数监控的上限（当 VASP 编译时使用了 -Dtbdyn 选项）。对于 MDALGO=1 或 2，可以在 ICONST 文件中定义几何参数进行监控，而不受约束或偏置势的影响（在 ICONST 文件中 STATUS=7）。如果所有在 ICONST 文件中定义的监控参数（STATUS=7）的值小于 VALUE_MIN 或大于 VALUE_MAX，模拟将终止。", "recommended": "推荐根据模拟的几何参数范围设置合适的实数数组值。使用场景：在分子动力学模拟中，当需要监控几何参数（如键长、键角）并确保它们在预设范围内时使用，以避免模拟意外终止。", "tips": "确保 VASP 编译时使用了 -Dtbdyn 选项；正确设置 VALUE_MIN 和 VALUE_MAX 以避免模拟意外终止；在 ICONST 文件中将需要监控的参数 STATUS 设置为 7，并确保参数值在合理范围内。"}, "VALUE_MIN": {"name": "VALUE_MIN", "description": "VALUE_MIN= [real array]", "default": "", "details": "Description:VALUE_MINsets the lower limits for the monitoring of geometric parameters (in case VASP was compiled with-Dtbdyn).\nForMDALGO=1 | 2, the geometric parameters defined in theICONSTfile may be monitored without being subjected to a constraint or bias potential (STATUS=7in theICONSTfile).\nIf all values of monitored parameters defined in theICONSTfile (STATUS=7) are smaller thanVALUE_MINor larger thanVALUE_MAX, the simulation terminates.", "wiki_url": "https://www.vasp.at/wiki/index.php/VALUE_MIN", "description_cn": "VALUE_MIN= [实数数组]", "default_value": "未指定", "details_cn": "VALUE_MIN 设置了几何参数监控的下限（如果 VASP 编译时使用了 -Dtbdyn）。对于 MDALGO=1 或 2，在 ICONST 文件中定义的几何参数可以被监控，而不受约束或偏置势的影响（ICONST 文件中的 STATUS=7）。如果所有监控参数的值（STATUS=7）都小于 VALUE_MIN 或大于 VALUE_MAX，模拟将终止。", "recommended": "根据具体模拟体系设置，例如监控键长时，设置为键长的合理下限（如 0.5 Å）。使用场景：在分子动力学模拟中，当使用 MDALGO=1 或 2 并监控几何参数时，用于防止参数超出物理范围，确保模拟稳定性。", "tips": "1. 确保 VASP 编译时启用了 -Dtbdyn 选项，否则此参数无效。2. 在 ICONST 文件中正确设置监控参数的 STATUS=7，以启用监控。3. 合理设置 VALUE_MIN 和 VALUE_MAX，避免模拟意外终止；建议基于体系物理特性设置。4. VALUE_MIN 是一个数组，需对应多个监控参数，确保数组长度匹配。"}, "VCA": {"name": "VCA", "description": "VCA= [real array]Default:VCA= read from thePOTCARfile", "default": "VCA= [real array]Default:VCA= read from thePOTCARfile", "details": "Description:VCAis short for the virtual crystal approximation; the tag allows to \"weight\" each species found in the POTCAR file.\nThe tagVCAmust be supplied for each atom type or species found in thePOTCARandPOSCARfile, respectively. \nIt weights the correspondingPOTCARfiles according to the values given in theINCARfile, with the default\nbeing 1. For instance, the formal valency found in thePOTCARfiles is multiplied by the supp\nIt is possible to use this flag to perform calculations in the framework of the virtual crystal approximation.\nSay you want to simulate Sn doping in a Ge lattice. This can be achieved using aPOTCARfile with a Ge and Sn data set and the followingPOSCARfile:", "wiki_url": "https://www.vasp.at/wiki/index.php/VCA", "description_cn": "VCA是一个实数数组，默认值是从POTCAR文件中读取。", "default_value": "从POTCAR文件读取", "details_cn": "VCA是虚拟晶体近似的缩写；该标签允许对POTCAR文件中找到的每种元素进行“加权”。标签VCA必须为POTCAR和POSCAR文件中分别找到的每种原子类型或元素提供。它根据INCAR文件中给定的值对相应的POTCAR文件进行加权，默认值为1。例如，POTCAR文件中的形式价态被乘以支持的值。可以使用此标志在框架中执行计算。", "recommended": "推荐值为默认值1，适用于标准计算。使用场景：在虚拟晶体近似（VCA）计算中，用于模拟无序合金、掺杂系统或混合元素体系，通过加权不同元素的贡献来近似处理无序性。", "tips": "1. 确保VCA数组的长度与POTCAR和POSCAR文件中的元素数量匹配；2. 加权值应基于物理考虑（如元素比例或价态）设置，避免随意调整；3. 默认值从POTCAR文件读取，但可在INCAR中覆盖以自定义加权；4. 使用VCA时，需理解其近似性质，可能不适用于高度无序或需要精确处理局部结构的系统。"}, "VCAIMAGES": {"name": "VCAIMAGES", "description": "VCAIMAGES= [real]Default:VCAIMAGES= -1", "default": "VCAIMAGES= [real]Default:VCAIMAGES= -1", "details": "Description: The tagVCAIMAGESallows to perform thermodynamic integrations (TI); it defines the coupling parameter λ.\nVCAIMAGESallows two molecular dynamics (MD) simulations to be performed with e.g. differentPOTCARorKPOINTSfiles or different exchange-correlation functionals, and averages the energies and forces between the two calculations. This is known as thermodynamic integration (TI)[1].\nThe tagVCAIMAGESinternally splits the available nodes into two groups, and each group then performs an independent VASP calculation (this impliesVCAIMAGESonly works in the MPI version). This behavior is implemented in the same way as thenudged elastic band method(NEB) described under the tagIMAGES. ", "wiki_url": "https://www.vasp.at/wiki/index.php/VCAIMAGES", "description_cn": "VCAIMAGES是一个实数参数，默认值为-1。", "default_value": "-1", "details_cn": "VCAIMAGES标签允许执行热力学积分（TI）；它定义了耦合参数λ。VCAIMAGES允许执行两个分子动力学（MD）模拟，例如使用不同的POTCAR或KPOINTS文件或不同的交换关联泛函，并对两个计算之间的能量和力进行平均。这被称为热力学积分（TI）[1]。VCAIMAGES标签内部将可用节点分成两组，每组然后执行一个...", "recommended": "根据热力学积分需求设置λ值，通常在0到1之间（例如0.5）。使用场景：用于计算两个状态之间的自由能差，如相变、化学反应或溶剂化自由能计算。", "tips": "使用VCAIMAGES时需确保正确配置POTCAR和KPOINTS文件，并合理分配计算资源以避免节点浪费。默认值-1表示不执行热力学积分，仅在需要时启用。"}, "VCUTOFF": {"name": "VCUTOFF", "description": "VCUTOFF= [real]Default:VCUTOFF=  1.1ENCUTGW", "default": "VCUTOFF= [real]Default:VCUTOFF=  1.1ENCUTGW", "details": "Description: The parameterVCUTOFFsets the energy cutoff for bare Coulomb matrix elements and controls the basis set for the bare Coulomb interaction.\nENCUTGW,Constrained–random-phase–approximation_formalism\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/VCUTOFF", "description_cn": "VCUTOFF参数设置裸库仑矩阵元素的能量截断，并控制裸库仑相互作用的基组。", "default_value": "1.1 * ENCUTGW", "details_cn": "VCUTOFF参数设置裸库仑矩阵元素的能量截断，并控制裸库仑相互作用的基组。它与ENCUTGW相关，用于约束随机相位近似（cRPA）形式。使用此标签的示例。", "recommended": "推荐值通常为1.1到1.2倍的ENCUTGW，具体取决于计算精度需求。使用场景包括GW计算和约束随机相位近似（cRPA）计算，以优化库仑相互作用的基组，提高计算效率或精度。", "tips": "VCUTOFF的值应与ENCUTGW协调设置；过高的值会显著增加计算成本；建议通过收敛测试确定最佳值，以平衡精度和效率。"}, "VDW_A1": {"name": "VDW_A1", "description": "Description:VDW_A1sets the scaling[math]\\displaystyle{ a_{1} }[/math]of the critical radii in the rational Becke-Johnson damping function of the DFT-D3 andDFT-D4methods.", "default": "", "details": "Description:VDW_A1sets the scaling[math]\\displaystyle{ a_{1} }[/math]of the critical radii in the rational Becke-Johnson damping function of the DFT-D3 andDFT-D4methods.\nVDW_A1allows to set the scaling[math]\\displaystyle{ a_{1} }[/math]of the critical radii in the rational Becke-Johnson damping function:\nIVDW,VDW_A2,DFT-D3,simple-DFT-D3,DFT-D4", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_A1", "description_cn": "VDW_A1 设置了 DFT-D3 和 DFT-D4 方法中合理 Becke-Johnson 阻尼函数的关键半径的缩放因子 a1。", "default_value": "0.52", "details_cn": "VDW_A1 设置了 DFT-D3 和 DFT-D4 方法中合理 Becke-Johnson 阻尼函数的关键半径的缩放因子 a1。VDW_A1 允许设置合理 Becke-Johnson 阻尼函数中关键半径的缩放因子 a1：IVDW、VDW_A2、DFT-D3、simple-DFT-D3、DFT-D4。", "recommended": "对于 DFT-D3 方法，默认值为 0.52；对于 DFT-D4，建议参考相关文献或使用默认值。使用场景：适用于需要精确描述范德华相互作用的体系，如层状材料、分子晶体、吸附系统等。", "tips": "VDW_A1 应与 VDW_A2 参数配合调整；确保 IVDW 参数正确设置以启用相应的范德华修正（如 IVDW=11 用于 DFT-D3）；修改 a1 可能影响计算精度，建议先进行收敛性测试或参考标准值。"}, "VDW_A2": {"name": "VDW_A2", "description": "Description:VDW_A2sets the offset[math]\\displaystyle{ a_{2} }[/math]of the critical radii in the rational Becke-Johnson damping function of the DFT-D3 andDFT-D4methods.", "default": "", "details": "Description:VDW_A2sets the offset[math]\\displaystyle{ a_{2} }[/math]of the critical radii in the rational Becke-Johnson damping function of the DFT-D3 andDFT-D4methods.\nVDW_A2allows to set the offset[math]\\displaystyle{ a_{2} }[/math]of the critical radii in the rational Becke-Johnson damping function:\nIVDW,VDW_A1,DFT-D3,simple-DFT-D3,DFT-D4", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_A2", "description_cn": "VDW_A2 设置了 DFT-D3 和 DFT-D4 方法中理性 Becke-Johnson 阻尼函数的临界半径的偏移量 a2。", "default_value": "默认值未在提供信息中指定，通常为0.0，但取决于所使用的DFT-D3或DFT-D4方法。", "details_cn": "VDW_A2 允许设置理性 Becke-Johnson 阻尼函数中临界半径的偏移量 a2。相关参数包括 IVDW、VDW_A1、DFT-D3、simple-DFT-D3、DFT-D4。", "recommended": "推荐使用默认值0.0，适用于大多数情况。在需要调整范德华相互作用短程行为时，可参考文献设置特定值，例如对于层状材料或分子体系。", "tips": "修改VDW_A2可能影响计算精度，建议与VDW_A1等参数协调使用，并进行收敛测试。确保IVDW参数正确设置以启用DFT-D3或DFT-D4方法。"}, "VDW_ALPHA": {"name": "VDW_ALPHA", "description": "VDW_ALPHA= [real (array)]", "default": "", "details": "Description:VDW_ALPHAdefines the polarizability[math]\\displaystyle{ \\alpha_{0} }[/math](bohr[math]\\displaystyle{ ^{3} }[/math]) for each species defined in thePOSCARfile.\nVDW_ALPHAsets the polarizability[math]\\displaystyle{ \\alpha_{0} }[/math](bohr[math]\\displaystyle{ ^{3} }[/math]) for each species defined in thePOSCARfile for theTkatchenko-SchefflerandMany-body dispersion energymethods.\nTkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_ALPHA", "description_cn": "VDW_ALPHA是一个实数数组参数，用于定义每种物种的极化率。", "default_value": "无默认值", "details_cn": "VDW_ALPHA定义了POSCAR文件中每种物种的极化率α0（单位：bohr^3）。VDW_ALPHA为Tkatchenko-Scheffler方法和多体色散能方法设置POSCAR文件中每种物种的极化率α0（单位：bohr^3）。Tkatchenko-Scheffler方法，多体色散能。", "recommended": "根据POSCAR中定义的物种，从可靠来源（如VASP手册或文献）获取对应的极化率α0值（单位：bohr^3）。使用场景：在进行范德华校正计算时，特别是使用Tkatchenko-Scheffler方法或多体色散能方法时，需要设置此参数以准确描述色散相互作用。", "tips": "1. 确保VDW_ALPHA数组的顺序与POSCAR文件中物种的顺序一致。2. 极化率单位必须为bohr^3。3. 对于未知元素，需通过计算或参考标准数据获取极化率。4. 在使用多体色散能方法时，可能需要结合其他参数如VDW_C6等。"}, "VDW_BETA": {"name": "VDW_BETA", "description": "Description:VDW_BETAsets the offset for the damping radius or the power for the zero-damping component in the DFT-D3 methods implemented in thesimple-DFT-D3package.", "default": "", "details": "Description:VDW_BETAsets the offset for the damping radius or the power for the zero-damping component in the DFT-D3 methods implemented in thesimple-DFT-D3package.\nVDW_BETAallows to set the value of a parameter in the following versions of DFT-D3 (only available in thesimple-DFT-D3package):\nIVDW,SDFTD3_DAMPING,simple-DFT-D3", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_BETA", "description_cn": "VDW_BETA 设置了在 simple-DFT-D3 包中实现的 DFT-D3 方法中阻尼半径的偏移量或零阻尼分量的幂次。", "default_value": "未提供", "details_cn": "VDW_BETA 设置了在 simple-DFT-D3 包中实现的 DFT-D3 方法中阻尼半径的偏移量或零阻尼分量的幂次。VDW_BETA 允许在以下版本的 DFT-D3 中设置参数值（仅在 simple-DFT-D3 包中可用）：IVDW、SDFTD3_DAMPING、simple-DFT-D3。", "recommended": "推荐值取决于具体计算体系。对于标准 DFT-D3 计算，通常使用默认参数，无需显式设置 VDW_BETA。如果需要调整，建议参考 simple-DFT-D3 包的文档或相关文献，例如在 BJ 阻尼方法中，VDW_BETA 可设置为 1.0 以优化阻尼半径。", "tips": "此参数仅在使用 simple-DFT-D3 包时有效，需确保 IVDW 参数正确设置以启用 DFT-D3 方法。VDW_BETA 的值会影响范德华相互作用的阻尼行为，不当设置可能导致计算误差。建议在修改前进行测试或参考官方文档，以避免对计算精度产生负面影响。"}, "VDW_C6": {"name": "VDW_C6", "description": "VDW_C6= [real (array)]", "default": "", "details": "Description:VDW_C6defines the[math]\\displaystyle{ C_6 }[/math]parameters ([math]\\displaystyle{ \\mathrm{Jnm}^{6}\\mathrm{mol}^{-1} }[/math]) for each species defined in thePOSCARfile.\nVDW_C6sets the[math]\\displaystyle{ C_6 }[/math]parameters ([math]\\displaystyle{ \\mathrm{Jnm}^{6}\\mathrm{mol}^{-1} }[/math]) for each species defined in thePOSCARfile for theDFT-D2,DFT-ulg,Tkatchenko-Scheffler, andMany-body dispersion energymethods.\nVDW_C6AU,DFT-D2,DFT-ulg,Tkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_C6", "description_cn": "VDW_C6= [实数数组]", "default_value": "无默认值", "details_cn": "VDW_C6定义了POSCAR文件中每个物种的C_6参数（单位：Jnm^6 mol^-1）。VDW_C6为DFT-D2、DFT-ulg、Tkatchenko-Scheffler和多体色散能量方法设置POSCAR文件中每个物种的C_6参数。", "recommended": "根据元素类型从VASP手册、Grimme的DFT-D2参数表或其他可靠文献中获取标准C6值。使用场景：当使用DFT-D2、DFT-ulg、Tkatchenko-Scheffler或多体色散能量方法进行范德华相互作用校正时，需设置此参数以确保计算准确性。", "tips": "1. 确保C6参数的单位为Jnm^6 mol^-1；2. 参数顺序必须与POSCAR文件中的元素顺序严格一致；3. 如果未设置，VASP可能使用内部默认值或报错，建议显式设置以避免错误；4. 对于多体色散能量方法，C6参数可能需要更精确的校准。"}, "VDW_C6AU": {"name": "VDW_C6AU", "description": "VDW_C6AU= [real (array)]", "default": "", "details": "Description:VDW_C6AUdefines the[math]\\displaystyle{ C_6 }[/math]parameters ([math]\\displaystyle{ \\mathrm{Hartree} }[/math][math]\\displaystyle{ \\mathrm{bohr}^{6} }[/math]) for each species defined in thePOSCARfile.\nVDW_C6AUsets the[math]\\displaystyle{ C_6 }[/math]parameters ([math]\\displaystyle{ \\mathrm{Hartree} }[/math][math]\\displaystyle{ \\mathrm{bohr}^{6} }[/math]) for each species defined in thePOSCARfile for theTkatchenko-SchefflerandMany-body dispersion energymethods.\nVDW_C6,Tkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_C6AU", "description_cn": "VDW_C6AU是一个实数数组，用于定义C6参数。", "default_value": "无默认值，需用户指定", "details_cn": "VDW_C6AU定义了POSCAR文件中每个物种的C6参数，单位为Hartree bohr^6。它为Tkatchenko-Scheffler和多体色散能方法设置这些参数。", "recommended": "推荐值取决于元素类型，通常从文献或VASP数据库获取。使用场景：在进行范德华校正计算时，如使用Tkatchenko-Scheffler方法，需提供准确的C6参数以确保计算精度。", "tips": "确保数组长度与POSCAR中的物种数一致；单位必须为Hartree bohr^6；如果未设置，VASP可能使用默认值或报错，建议查阅VASP手册或相关文献。"}, "VDW_CNRADIUS": {"name": "VDW_CNRADIUS", "description": "Description:VDW_CNRADIUS(in Å) sets the coordination number cutoff of the DFT-D3 andDFT-D4methods.", "default": "Default:VDW_CNRADIUS", "details": "Description:VDW_CNRADIUS(in Å) sets the coordination number cutoff of the DFT-D3 andDFT-D4methods.\nVDW_CNRADIUS(in Å) allows to set the coordination number cutoff for the DFT-D3 (DFT-D3andsimple-DFT-D3implementations) andDFT-D4methods.\nIVDW,VDW_RADIUS,DFT-D3,simple-DFT-D3,DFT-D4", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_CNRADIUS", "description_cn": "VDW_CNRADIUS（单位：Å）设置DFT-D3和DFT-D4方法的配位数截断。", "default_value": "未指定", "details_cn": "VDW_CNRADIUS（单位：Å）允许设置DFT-D3（包括DFT-D3和simple-DFT-D3实现）和DFT-D4方法的配位数截断。", "recommended": "5.0 Å；使用场景：适用于使用DFT-D3或DFT-D4范德华修正的计算，以平衡精度和效率，尤其对于分子或固体体系中需要准确描述范德华相互作用的情况。", "tips": "VDW_CNRADIUS应与VDW_RADIUS等参数协调设置；设置过小可能忽略重要相互作用导致精度不足，过大则增加计算成本。建议根据体系大小和精度要求进行测试调整。"}, "VDW_D": {"name": "VDW_D", "description": "Description:VDW_Ddefines the damping parameter[math]\\displaystyle{ d }[/math].", "default": "Default:VDW_D", "details": "Description:VDW_Ddefines the damping parameter[math]\\displaystyle{ d }[/math].\nVDW_Dsets the damping parameter[math]\\displaystyle{ d }[/math]for theDFT-D2,DFT-ulg,Tkatchenko-Scheffler, andMany-body dispersion energymethods.\nDFT-D2,DFT-ulg,Tkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_D", "description_cn": "VDW_D 定义了阻尼参数 d。", "default_value": "VDW_D", "details_cn": "VDW_D 定义了阻尼参数 d。VDW_D 为 DFT-D2、DFT-ulg、Tkatchenko-Scheffler 和多体色散能方法设置阻尼参数 d。DFT-D2、DFT-ulg、Tkatchenko-Scheffler 方法、多体色散能", "recommended": "对于DFT-D2方法，通常使用20.0；对于Tkatchenko-Scheffler方法，默认值可能不同，请查阅VASP手册。使用场景：适用于需要考虑范德华力的体系，如有机分子、二维材料或层状结构。", "tips": "VDW_D的值会影响色散校正的强度，需根据体系和方法优化。过大的值可能导致过度校正，过小则可能忽略色散作用。建议参考相关文献或进行收敛测试以确定最佳值。"}, "VDW_R0": {"name": "VDW_R0", "description": "VDW_R0= [real (array)]", "default": "", "details": "Description:VDW_R0defines the[math]\\displaystyle{ R_0 }[/math]parameters ([math]\\displaystyle{ \\AA }[/math]) for each species defined in thePOSCARfile.\nVDW_R0sets the[math]\\displaystyle{ R_0 }[/math]parameters ([math]\\displaystyle{ \\AA }[/math]) for each species defined in thePOSCARfile for theDFT-D2,DFT-ulg,Tkatchenko-Scheffler, andMany-body dispersion energymethods.\nVDW_R0AU,DFT-D2,DFT-ulg,Tkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_R0", "description_cn": "VDW_R0= [实数数组]", "default_value": "无默认值，需用户指定", "details_cn": "VDW_R0定义了POSCAR文件中每种元素的R0参数（单位：Å）。VDW_R0为POSCAR文件中每种元素设置R0参数（单位：Å），用于DFT-D2、DFT-ulg、Tkatchenko-Scheffler和多体色散能方法。相关参数包括VDW_R0AU。", "recommended": "推荐值取决于元素和所选范德华方法。通常，对于常见元素，使用VASP内置值或文献值。使用场景：在使用DFT-D2、DFT-ulg、Tkatchenko-Scheffler或MBD方法时，如需自定义范德华半径，可设置此参数。", "tips": "1. 确保数组长度与POSCAR中的元素种类数一致；2. 单位是Å；3. 与VDW_R0AU参数相关，后者以原子单位表示；4. 仅在使用指定范德华方法时才需要设置。"}, "VDW_R0AU": {"name": "VDW_R0AU", "description": "VDW_R0AU= [real (array)]", "default": "", "details": "Description:VDW_R0AUdefines the[math]\\displaystyle{ R_0 }[/math]parameters (bohr) for each species defined in thePOSCARfile.\nVDW_R0AUsets the[math]\\displaystyle{ R_0 }[/math]parameters (bohr) for each species defined in thePOSCARfile for theTkatchenko-SchefflerandMany-body dispersion energymethods.\nVDW_R0,Tkatchenko-Scheffler method,Many-body dispersion energy", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_R0AU", "description_cn": "VDW_R0AU 是一个实数数组参数，用于定义范德华校正中的 R_0 参数。", "default_value": "无默认值，需要用户根据元素指定。", "details_cn": "VDW_R0AU 定义了在POSCAR文件中为每个物种指定的 R_0 参数（单位：bohr）。VDW_R0AU 为Tkatchenko-Scheffler方法和多体色散能方法设置在POSCAR文件中为每个物种定义的 R_0 参数（单位：bohr）。涉及VDW_R0、Tkatchenko-Scheffler方法、多体色散能。", "recommended": "对于常见元素，可参考VASP手册或相关文献中的标准值（如碳、氢、氧等元素有已知R_0值）。使用场景：当使用Tkatchenko-Scheffler (TS, IVDW=11) 或多体色散能 (MBD, IVDW=12) 方法进行范德华校正时，需要设置此参数以确保准确的色散相互作用计算，尤其适用于分子晶体、表面吸附或弱相互作用体系。", "tips": "1. VDW_R0AU 必须是一个数组，长度与POSCAR中的物种数一致，否则计算会出错。2. 单位是bohr（玻尔），注意与其他参数单位协调。3. 只有在使用特定范德华方法（如IVDW=11或IVDW=12）时才需要设置；若未设置，VASP可能使用内部默认值，但建议显式指定以提高精度。4. 可从VASP数据库或文献获取元素标准值，避免随意设置导致计算不准确。"}, "VDW_RADIUS": {"name": "VDW_RADIUS", "description": "Description:VDW_RADIUS(in Å) sets the two-body interaction cutoff in van der Waals methods.", "default": "Default:VDW_RADIUS", "details": "Description:VDW_RADIUS(in Å) sets the two-body interaction cutoff in van der Waals methods.\nVDW_RADIUS(in Å) allows to set the two-body interaction cutoff for theDFT-D2, DFT-D3 (DFT-D3andsimple-DFT-D3implementations),DFT-D4,DFT-ulg,DDsC, and Tkatchenko-Scheffler methods.\nIVDW,VDW_CNRADIUS,DFT-D2,DFT-D3,simple-DFT-D3,DFT-D4,DFT-ulg,DDsC,Tkatchenko-Scheffler method,Tkatchenko-Scheffler method with iterative Hirshfeld partitioning", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_RADIUS", "description_cn": "VDW_RADIUS（单位：Å）设置范德华方法中的两体相互作用截断。", "default_value": "VDW_RADIUS", "details_cn": "VDW_RADIUS（单位：Å）设置范德华方法中的两体相互作用截断。VDW_RADIUS（单位：Å）允许为DFT-D2、DFT-D3（包括DFT-D3和simple-DFT-D3实现）、DFT-D4、DFT-ulg、DDsC和Tkatchenko-Scheffler方法设置两体相互作用截断。相关参数：IVDW、VDW_CNRADIUS、DFT-D2、DFT-D3、simple-DFT-D3、DFT-D4、DFT-ulg、DDsC、Tkatchenko-Scheffler方法、Tkatchenko-Scheffler方法与迭代Hirshfeld分区。", "recommended": "通常使用默认值（在VASP中默认值为0.0，表示自动设置截断半径）即可，适用于大多数范德华修正方法（如DFT-D2、DFT-D3、DFT-D4等）。如果系统较大或需要更高精度，可适当增大VDW_RADIUS（例如5-10 Å），但会增加计算成本。使用场景：在使用范德华修正进行第一性原理计算时，设置此参数以优化两体相互作用的截断距离，平衡精度与效率。", "tips": "1. VDW_RADIUS的单位是埃（Å），输入时需确保单位正确。2. 设置过小可能导致范德华相互作用被截断，影响计算精度；设置过大会显著增加计算时间和内存消耗。3. VDW_RADIUS与IVDW参数紧密相关，需根据所选范德华方法（如DFT-D3、Tkatchenko-Scheffler等）调整。4. 不同范德华方法的默认截断可能不同，建议参考VASP官方文档或进行测试以确定最佳值。"}, "VDW_S6": {"name": "VDW_S6", "description": "Description:VDW_S6sets a parameter in the damping function of van der Waals methods.", "default": "", "details": "Description:VDW_S6sets a parameter in the damping function of van der Waals methods.\nVDW_S6allows to set the value of a parameter in the following methods:\nIVDW,VDW_S8,DFT-D2,DFT-D3,simple-DFT-D3,DFT-D4,DFT-ulg,Tkatchenko-Scheffler method,Tkatchenko-Scheffler method with iterative Hirshfeld partitioning,DDsC", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_S6", "description_cn": "VDW_S6 设置范德华方法阻尼函数中的一个参数。", "default_value": "未指定（取决于所使用的 vdW 方法，例如 DFT-D2 默认 0.75，DFT-D3 默认 1.0）", "details_cn": "VDW_S6 设置范德华方法阻尼函数中的一个参数。VDW_S6 允许在以下方法中设置参数值：IVDW、VDW_S8、DFT-D2、DFT-D3、simple-DFT-D3、DFT-D4、DFT-ulg、Tkatchenko-Scheffler 方法、带迭代 Hirshfeld 分区的 Tkatchenko-Scheffler 方法、DDsC。", "recommended": "推荐值取决于所使用的 vdW 方法：对于 DFT-D2，通常设为 0.75；对于 DFT-D3，通常设为 1.0。使用场景：在需要范德华校正的计算中，如分子晶体、吸附体系或层状材料，调整此参数以优化结合能、结构或动力学性质。", "tips": "VDW_S6 的值应与所使用的 vdW 方法（通过 IVDW 参数指定）一致，不当设置可能导致能量或力计算误差。建议参考 VASP 官方文档或相关文献，以获取特定方法的推荐值，并通过测试验证参数对结果的影响。"}, "VDW_S8": {"name": "VDW_S8", "description": "Description:VDW_S8sets the scaling[math]\\displaystyle{ s_{8} }[/math]of the dipole-quadrupole dispersion of the DFT-D3 andDFT-D4methods.", "default": "", "details": "Description:VDW_S8sets the scaling[math]\\displaystyle{ s_{8} }[/math]of the dipole-quadrupole dispersion of the DFT-D3 andDFT-D4methods.\nVDW_S8allows to set the scaling[math]\\displaystyle{ s_{8} }[/math]of the dipole-quadrupole dispersion of the DFT-D3 andDFT-D4(IVDW=13) methods.VDW_S8can be used for both implementations of DFT-D3:DFT-D3(IVDW=11 or 12) andsimple-DFT-D3(IVDW=15).\nIVDW,VDW_S6,DFT-D3,simple-DFT-D3,DFT-D4", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_S8", "description_cn": "VDW_S8 设置 DFT-D3 和 DFT-D4 方法中偶极-四极色散的缩放因子 s8。", "default_value": "1.0", "details_cn": "VDW_S8 允许设置 DFT-D3 和 DFT-D4 (IVDW=13) 方法中偶极-四极色散的缩放因子 s8。VDW_S8 可用于 DFT-D3 的两种实现：DFT-D3 (IVDW=11 或 12) 和 simple-DFT-D3 (IVDW=15)。", "recommended": "对于大多数应用，使用默认值 1.0 即可。使用场景：当使用 DFT-D3 或 DFT-D4 方法进行范德华修正时，用于控制偶极-四极色散项的强度，适用于分子间相互作用或层状材料等体系。", "tips": "需与 IVDW 参数配合使用，确保选择了正确的范德华修正方法；VDW_S8 与 VDW_S6 共同影响色散校正，调整时需谨慎，建议参考文献或进行收敛测试以优化参数。"}, "VDW_S9": {"name": "VDW_S9", "description": "Description:VDW_S9sets the contribution of the three-body term to the dispersion energy.", "default": "Default:VDW_S9", "details": "Description:VDW_S9sets the contribution of the three-body term to the dispersion energy.\nVDW_S9allows to set the coefficient[math]\\displaystyle{ s_{9} }[/math]that multiplies the three-body (Axilrod–Teller–Muto) term in the DFT-D3 and DFT-D4 methods implemented in thesimple-DFT-D3(IVDW=15) andDFT-D4(IVDW=13) external packages, respectively.\nIVDW,VDW_S6,VDW_S8,simple-DFT-D3,DFT-D4", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_S9", "description_cn": "VDW_S9 设置三体项对色散能的贡献。", "default_value": "VDW_S9", "details_cn": "VDW_S9 设置三体项对色散能的贡献。VDW_S9 允许设置系数 $s_{9}$，该系数乘以在 simple-DFT-D3 (IVDW=15) 和 DFT-D4 (IVDW=13) 外部包中实现的 DFT-D3 和 DFT-D4 方法中的三体（Axilrod–Teller–Muto）项。相关参数：IVDW, VDW_S6, VDW_S8, simple-DFT-D3, DFT-D4。", "recommended": "推荐值通常为1.0，但需根据具体泛函和参考文献调整；使用场景：当使用IVDW=13（DFT-D4）或IVDW=15（simple-DFT-D3）时，用于控制三体色散项的贡献，适用于分子晶体、层状材料等需要精确范德华相互作用的体系。", "tips": "确保VDW_S9与IVDW参数匹配，仅在使用相应方法时设置；与其他VDW参数（如VDW_S6, VDW_S8）协调设置；建议参考VASP官方文档或相关文献以获取最佳值。"}, "VDW_SR": {"name": "VDW_SR", "description": "Description:VDW_SRsets a parameter in the damping function of van der Waals methods.", "default": "", "details": "Description:VDW_SRsets a parameter in the damping function of van der Waals methods.\nVDW_SRallows to set the value of a parameter in the following methods:\nIVDW,VDW_SR,DFT-D3,simple-DFT-D3,Tkatchenko-Scheffler method,Tkatchenko-Scheffler method with iterative Hirshfeld partitioning,Many-body dispersion energy,Many-body dispersion energy with fractionally ionic model for polarizability,DDsC", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_SR", "description_cn": "VDW_SR 设置范德华方法中阻尼函数的一个参数。", "default_value": "", "details_cn": "VDW_SR 允许在以下方法中设置参数值：IVDW, VDW_SR, DFT-D3, simple-DFT-D3, Tkatchenko-Scheffler 方法, Tkatchenko-Scheffler 方法与迭代 Hirshfeld 分区, 多体色散能, 多体色散能与分数离子极化率模型, DDsC。", "recommended": "推荐值取决于所使用的范德华校正方法。例如，在DFT-D3方法中，VDW_SR通常设置为0.5左右，以控制阻尼函数的形状。使用场景：当计算涉及范德华相互作用时，如层状材料、分子晶体或表面吸附体系，调整VDW_SR可以优化计算精度和收敛性。", "tips": "VDW_SR的值应根据具体计算体系和方法进行测试和优化，不当的值可能导致计算不收敛或结果不准确。建议参考VASP官方文档或相关文献，并与其他参数（如IVDW）配合使用。"}, "VDW_SR8": {"name": "VDW_SR8", "description": "Description:VDW_SR8sets the radii scaling[math]\\displaystyle{ s_{r,8} }[/math]in the dipole-quadrupole zero-damping function of the DFT-D3 method.", "default": "", "details": "Description:VDW_SR8sets the radii scaling[math]\\displaystyle{ s_{r,8} }[/math]in the dipole-quadrupole zero-damping function of the DFT-D3 method.\nVDW_SR8allows to set the radii scaling[math]\\displaystyle{ s_{r,8} }[/math]in the dipole-quadrupole zero-damping function of the DFT-D3 method.VDW_SR8can be used for both implementations of DFT-D3:DFT-D3(IVDW=11) andsimple-DFT-D3(IVDW=15 withSDFTD3_DAMPING=zero or mzero).\nIVDW,VDW_SR,DFT-D3,simple-DFT-D3", "wiki_url": "https://www.vasp.at/wiki/index.php/VDW_SR8", "description_cn": "VDW_SR8 设置 DFT-D3 方法中偶极-四极零阻尼函数的半径缩放因子 s_{r,8}。", "default_value": "未指定", "details_cn": "VDW_SR8 设置 DFT-D3 方法中偶极-四极零阻尼函数的半径缩放因子 s_{r,8}。VDW_SR8 允许设置 DFT-D3 方法中偶极-四极零阻尼函数的半径缩放因子 s_{r,8}。VDW_SR8 可用于 DFT-D3 的两种实现：DFT-D3（IVDW=11）和简单 DFT-D3（IVDW=15，且 SDFTD3_DAMPING=zero 或 mzero）。相关参数：IVDW、VDW_SR、DFT-D3、简单 DFT-D3。", "recommended": "通常使用默认值1.0（基于DFT-D3标准设置）。使用场景：在使用DFT-D3方法（IVDW=11或IVDW=15）计算范德华相互作用时，如果需要精细调整半径缩放因子以优化计算精度（例如针对特定分子或材料体系），可以修改此参数。建议在基准测试后使用，以确保结果可靠性。", "tips": "修改VDW_SR8可能显著影响范德华相互作用的计算精度，建议在修改前进行系统测试并参考相关文献。确保与IVDW、VDW_SR等其他范德华参数协调设置，以避免不一致性。"}, "VELOCITY": {"name": "VELOCITY", "description": "VELOCITY= [logical]Default:VELOCITY= .false.", "default": "VELOCITY= [logical]Default:VELOCITY= .false.", "details": "Description: Determines whether the ionic velocities are written to thevaspout.h5file during anMD run.\nYou can usepy4vaspto read the velocities into a Python dictionary\nor to visualize the velocity in the crystal structure", "wiki_url": "https://www.vasp.at/wiki/index.php/VELOCITY", "description_cn": "控制是否在分子动力学运行期间将离子速度写入vaspout.h5文件。", "default_value": ".false.", "details_cn": "决定在分子动力学运行期间是否将离子速度写入vaspout.h5文件。您可以使用py4vasp将速度读入Python字典或可视化晶体结构中的速度。", "recommended": "推荐在需要分析离子速度（如计算速度自相关函数或可视化）的分子动力学模拟中设置为.true.，否则使用默认值.false.以节省存储空间和计算资源。", "tips": "启用此参数会增加vaspout.h5文件的大小；需要安装py4vasp工具来读取和可视化速度数据；此参数仅在MD运行中有效。"}, "VOSKOWN": {"name": "VOSKOWN", "description": "VOSKOWN= 0 | 1Default:VOSKOWN= 0", "default": "VOSKOWN= 0 | 1Default:VOSKOWN= 0", "details": "Description: Determines whether Vosko-Wilk-Nusair interpolation is used or not.\nThis flag is not relevant for most \"modern\" gradient corrected functionals, such as PBE or PBEsol.\nFor the LDA and some \"older\" gradient corrected functionals such as PW91, VASP interpolates the correlation energy from the non-spinpolarized to the fully spinpolarized case in the same way as the exchange energy (Barth-Hedin spin interpolation[1]. IfVOSKOWNis set to 1, the interpolation formula acc", "wiki_url": "https://www.vasp.at/wiki/index.php/VOSKOWN", "description_cn": "VOSKOWN 参数用于控制是否使用 Vosko-Wilk-Nusair 插值，可设置为 0 或 1，默认值为 0。", "default_value": "0", "details_cn": "决定是否使用 Vosko-Wilk-Nusair 插值。此标志对于大多数“现代”梯度修正泛函（如 PBE 或 PBEsol）不相关。对于 LDA 和一些“较旧”的梯度修正泛函（如 PW91），VASP 以与交换能相同的方式（Barth-Hedin 自旋插值[1]）将关联能从非自旋极化情况插值到完全自旋极化情况。如果 VOSKOWN 设置为 1，插值公式将根据 Vosko-Wilk-Nusair 方法。", "recommended": "推荐值为 0（默认）。当使用 LDA 或如 PW91 的旧梯度修正泛函，并且需要应用 Vosko-Wilk-Nusair 插值公式时，可设置为 1。对于现代泛函如 PBE 或 PBEsol，此参数不相关，无需设置。", "tips": "此参数仅对 LDA 和某些旧梯度修正泛函有效；对于 PBE、PBEsol 等现代泛函，无需设置；使用前请确认泛函类型，并参考相关文献以确保正确应用。"}, "WANNIER90_WIN": {"name": "WANNIER90_WIN", "description": "WANNIER90_WIN= [string]", "default": "Default:WANNIER90_WIN", "details": "Description:WANNIER90_WINsets the content of thewannier90.winfile.\nTheWANNIER90_WINtag is a multiline string, where the content of thewannier90.winfile can be specified. For instance,\nAdditionally, the value of someWannier90 tagsis set automatically based on the VASP calculation, e.g.,kpoints,atoms,unit_cell,mp_grid,spinors,num_bands,num_wann.", "wiki_url": "https://www.vasp.at/wiki/index.php/WANNIER90_WIN", "description_cn": "WANNIER90_WIN= [字符串]", "default_value": "WANNIER90_WIN", "details_cn": "WANNIER90_WIN 设置 wannier90.win 文件的内容。WANNIER90_WIN 标签是一个多行字符串，可以指定 wannier90.win 文件的内容。例如，此外，一些 Wannier90 标签的值会根据 VASP 计算自动设置，例如 kpoints、atoms、unit_cell、mp_grid、spinors、num_bands、num_wann。", "recommended": "无固定推荐值，需根据具体计算需求自定义设置。使用场景：用于进行 Wannier 函数计算时，指定 Wannier90 的输入文件内容，例如在需要构建 Wannier 函数或计算能带插值时。", "tips": "确保 wannier90.win 文件内容格式正确，避免语法错误；注意一些标签如 kpoints、atoms 等会由 VASP 自动设置，无需在 WANNIER90_WIN 中重复指定，以免冲突。"}, "WC": {"name": "WC", "description": "WC= [real]Default:WC= 1000.", "default": "WC= [real]Default:WC= 1000.", "details": "Description:WCspecifies the weight factor for each step in Broyden mixing scheme (IMIX=4).\nIMIX,INIMIX,MAXMIX,AMIX,BMIX,AMIX_MAG,BMIX_MAG,AMIN,MIXPRE\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/WC", "description_cn": "WC 指定在 Broyden 混合方案（IMIX=4）中每一步的权重因子。", "default_value": "1000", "details_cn": "WC 指定在 Broyden 混合方案（IMIX=4）中每一步的权重因子。相关参数：IMIX, INIMIX, MAXMIX, AMIX, BMIX, AMIX_MAG, BMIX_MAG, AMIN, MIXPRE。使用此标签的示例。", "recommended": "默认值 1000 通常适用，但可根据计算需求调整，例如对于收敛困难的系统可适当增加。使用场景：在使用 Broyden 混合方案（IMIX=4）时，用于优化电荷密度混合的权重，以改善收敛性。", "tips": "WC 参数仅在 IMIX=4 时有效；需与其他混合参数（如 AMIX、BMIX 等）配合使用；调整 WC 可能影响计算收敛速度和稳定性，建议通过测试确定最佳值。"}, "WEIMIN": {"name": "WEIMIN", "description": "Description:WEIMINspecifies the maximum weight for a band to be considered empty.", "default": "Default:WEIMIN", "details": "Description:WEIMINspecifies the maximum weight for a band to be considered empty.\nThe tagsWEIMIN,EBREAK, andDEPERallow fine-tuning of the iterative matrix diagonalization and are best not changed. They are optimized for a large variety of systems, and changing one of the parameters usually decreases performance or can even screw up the iterative matrix diagonalization totally.\nIn\nWithin all implemented iterative schemes a distinction between empty and occupied bands is made to speed up calculations. Unoccupied bands are optimized only twice, whereas occupied bands are optimized up to four times till another break criterion is met. Eigenvalue/eigenvector pairs for which the p", "wiki_url": "https://www.vasp.at/wiki/index.php/WEIMIN", "description_cn": "WEIMIN 指定一个能带被视为未占据的最大权重。", "default_value": "WEIMIN", "details_cn": "WEIMIN 指定一个能带被视为未占据的最大权重。标签 WEIMIN、EBREAK 和 DEPER 允许对迭代矩阵对角化进行微调，最好不更改它们。它们针对多种系统进行了优化，更改其中一个参数通常会降低性能，甚至可能完全破坏迭代矩阵对角化。在所有实现的迭代方案中，为了加速计算，会对未占据和占据能带进行区分。", "recommended": "推荐保持默认值（通常为0.0001）。使用场景：在标准第一性原理计算中，无需更改；仅在需要精细调整迭代对角化时考虑，但需谨慎。", "tips": "不要轻易更改WEIMIN参数，因为它与EBREAK和DEPER一起经过优化，更改可能降低计算性能或导致迭代对角化失败。"}, "WRT_DENSITY": {"name": "WRT_DENSITY", "description": "WRT_DENSITY= stringDefault:WRT_DENSITY= None \nDescription: Select which densities associated to the local potential are written as a post-processing step.", "default": "WRT_DENSITY= stringDefault:WRT_DENSITY= None \nDescription: Select which densities associated to the local potential are written as a post-processing step.", "details": "WRT_DENSITYcan select one or multiple densities on the real-space grid in the unit cell to be written, e.g.,\nIt writes the augmented total (core + valence) pseudo densities (charge and magnetization, their gradient, and their laplacian) that enter theXC functionalon the plane-wave grid tovaspout.h5in VASP units. That is[math]\\displaystyle{ \\AA^{-3} }[/math]for charge and[math]\\displaystyle{ \\mu_B }[/math]f\nWithLWRT_AUGMENTED_DENSITY= Fthe densities can be written without augmentation (compensation charge=0). Mind that the augmented densities are still used duringelectronic minimizationto evaluate theXC functional(unlike for theMGGAspecific tagLNOAUGXC).", "wiki_url": "https://www.vasp.at/wiki/index.php/WRT_DENSITY", "description_cn": "选择与局部势相关的哪些密度作为后处理步骤写入。", "default_value": "None", "details_cn": "WRT_DENSITY可以选择在单位晶胞的实空间网格上写入一个或多个密度。例如，它将增强的总（核心+价电子）赝密度（电荷和磁化强度，它们的梯度和拉普拉斯算子）写入到vaspout.h5文件中，这些密度进入交换关联泛函，在平面波网格上，使用VASP单位。电荷的单位是Å^{-3}，磁化强度的单位是μ_B。当LWRT_AUGMENTED_DENSITY设置为False时，可以在不增强（补偿）的情况下写入密度。", "recommended": "默认值为None，表示不写入任何密度。推荐根据计算需求设置，如需要分析电荷密度时设置为'CHARGE'，分析磁化密度时设置为'MAGNETIZATION'。使用场景包括后处理分析电子结构、磁性、交换关联泛函验证等。", "tips": "注意写入密度的单位（电荷为Å^{-3}，磁化强度为μ_B）；与LWRT_AUGMENTED_DENSITY参数配合使用以控制是否增强；写入大量密度可能增加计算时间和存储空间，建议仅在需要时启用。"}, "WRT_NMRCUR": {"name": "WRT_NMRCUR", "description": "WRT_NMRCUR= 0 | 1 | 2 | 3 | 4Default:WRT_NMRCUR=  0", "default": "WRT_NMRCUR= 0 | 1 | 2 | 3 | 4Default:WRT_NMRCUR=  0", "details": "Description: Allows to write theNMRcurrent response in atomic units to file.\nIn conjunction withLCHIMAG= True,WRT_NMRCURallows to write the current response on the fine gridNGXFxNGYFxNGZFin atomic units (hartree bohr[math]\\displaystyle{ ^{-2} }[/math]) to an external magnetic field withinlinear response NMR.\nThe output is written toNMRCURBX,NMRCURBY, and/orNMRCURBZdepending on the selected direction of the perturbing[math]\\displaystyle{ \\mathbf{B} }[/math]field:", "wiki_url": "https://www.vasp.at/wiki/index.php/WRT_NMRCUR", "description_cn": "WRT_NMRCUR 可以设置为 0、1、2、3 或 4，默认值为 0。", "default_value": "0", "details_cn": "允许将NMR电流响应以原子单位写入文件。当与LCHIMAG= True结合使用时，WRT_NMRCUR允许将电流响应在精细网格NGXF x NGYF x NGZF上以原子单位（hartree bohr^{-2}）写入外部磁场，用于线性响应NMR。输出写入文件NMRCURBX、NMRCURBY和/或NMRCURBZ，取决于所选扰动磁场B的方向。", "recommended": "默认值为0（不输出电流响应）。如果需要进行NMR计算并分析电流响应，建议设置为1、2、3或4，具体值取决于扰动磁场B的方向（例如，1可能对应x方向，2对应y方向，3对应z方向，4可能对应所有方向或更详细输出）。使用场景：在线性响应NMR计算中，当需要检查或可视化电流响应时使用，例如研究材料的磁性质或NMR化学位移。", "tips": "1. 必须与LCHIMAG= True一起使用，否则WRT_NMRCUR设置无效。2. 输出文件（如NMRCURBX等）会生成在计算目录中，可能占用较大磁盘空间，请确保有足够存储。3. 精细网格NGXF、NGYF、NGZF需正确设置，以确保输出精度。4. 值的具体含义可能因VASP版本而异，建议参考官方文档确认。"}, "WRT_POTENTIAL": {"name": "WRT_POTENTIAL", "description": "WRT_POTENTIAL= stringDefault:WRT_POTENTIAL= None", "default": "WRT_POTENTIAL= stringDefault:WRT_POTENTIAL= None", "details": "Description: Select which component of the local potential to be written as a post-processing step.\nWRT_POTENTIALcan select one or multiple local potentials on the real-space grid in the unit cell to be written, e.g.,\nThe output is written tovaspout.h5and can be accessed either bypy4vaspor HDF5 command-line tools (h5ls, h5dump).", "wiki_url": "https://www.vasp.at/wiki/index.php/WRT_POTENTIAL", "description_cn": "WRT_POTENTIAL 是一个字符串参数，用于选择要写入的局部势组件。", "default_value": "None", "details_cn": "选择要写入的局部势的组件作为后处理步骤。WRT_POTENTIAL 可以选择在单位晶胞的实空间网格上写入一个或多个局部势，例如，输出写入 vaspout.h5 文件，可以通过 py4vasp 或 HDF5 命令行工具（如 h5ls、h5dump）访问。", "recommended": "根据具体需求设置，如 'TOTAL' 用于总势、'HARTREE' 用于哈特里势或 'XC' 用于交换关联势。使用场景：在需要分析局部势的后处理步骤中使用，例如研究电荷密度分布、电势变化或进行可视化分析。", "tips": "设置此参数会增加输出文件大小，需确保磁盘空间充足。输出为 HDF5 格式，需使用 py4vasp 或 HDF5 工具（如 h5ls、h5dump）读取。建议仅在需要后处理时启用，以避免不必要的计算开销。"}, "XC": {"name": "XC", "description": "XC= Combination of functionals", "default": "Default:XC", "details": "Description: Specifies a combination of exchange-correlation functionals.\nA combination of semilocal (LDA, GGA, and METAGGA) functionals can be set with theXCtag, which provides much more flexibility in the choice of the functional compared to theGGAandMETAGGAtags. The functionals that can be combined are the functionals implemented in VASP (listed atGGAandMETAGGA) and th\nXC_C,XCm_Pn,GGA,METAGGALIBXC1,LIBXC2,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC", "wiki_url": "https://www.vasp.at/wiki/index.php/XC", "description_cn": "XC= 泛函组合", "default_value": "XC", "details_cn": "指定交换关联泛函的组合。可以使用XC标签设置半局域（LDA、GGA和METAGGA）泛函的组合，这比GGA和METAGGA标签在泛函选择上提供了更大的灵活性。可以组合的泛函是VASP中实现的泛函（在GGA和METAGGA中列出）以及XC_C、XCm_Pn、GGA、METAGGA、LIBXC1、LIBXC2、ALDAX、ALDAC、AGGAX、AGGAC、AMGGAX、AMGGAC。", "recommended": "根据计算需求选择。对于标准计算，使用默认值XC；对于杂化泛函计算，推荐使用如HSE06（设置XC=HSE06）；对于自定义组合，如结合PBE和vdW校正（XC=PBE+vdW）。使用场景：适用于需要精确描述电子关联或特定物理性质的计算，如带隙预测、表面吸附、催化反应或材料设计。", "tips": "1. 确保指定的泛函在VASP中已实现，避免无效设置；2. 组合泛函可能增加计算时间和资源消耗，建议评估计算成本；3. 注意泛函之间的兼容性，避免不合理的组合导致计算错误；4. 对于LIBXC泛函，需正确指定LIBXC1和LIBXC2参数；5. 建议先在小体系上测试泛函组合的正确性和收敛性。"}, "XC_C": {"name": "XC_C", "description": "XC_C= [real array]Default:XC_C=  1.0*NXC", "default": "XC_C= [real array]Default:XC_C=  1.0*NXC", "details": "Description: Multiplication factors for the components of the functional given by theXCtag.\nXC_Csets the factors that multiply each component of the functional specified with theXCtag. The number of values specified withXC_Chas to be equal to the number of functional components set withXC(NXC). Examples of how to useXC_Care provided atXC.\nXC,XCm_Pn,GGA,METAGGA,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC", "wiki_url": "https://www.vasp.at/wiki/index.php/XC_C", "description_cn": "XC_C是一个实数数组。", "default_value": "默认值为XC_C = 1.0 * NXC", "details_cn": "XC标签指定的泛函分量的乘法因子。XC_C 设置乘以 XC 标签指定的泛函每个分量的因子。XC_C 指定的值的数量必须等于 XC 设置的泛函分量数量（NXC）。如何使用 XC_C 的示例在 XC 部分提供。相关参数：XC, XCm_Pn, GGA, METAGGA, ALDAX, ALDAC, AGGAX, AGGAC, AMGGAX, AMGGAC。", "recommended": "推荐使用默认值1.0 * NXC，除非需要自定义泛函分量。使用场景包括调整杂化泛函中精确交换的比例或优化泛函参数，例如在杂化泛函计算中微调交换关联贡献。", "tips": "确保XC_C指定的值数量与XC标签设置的泛函分量数量（NXC）一致。调整因子时需基于物理理解，避免随意修改，以免影响计算准确性。建议参考VASP官方文档或相关示例进行验证。"}, "XCm_Pn": {"name": "XCm_Pn", "description": "Description:XCm_Pn, where[math]\\displaystyle{ m=1, 2, \\ldots }[/math]and[math]\\displaystyle{ n=1, 2, \\ldots }[/math]allows to modify the parameters in a semilocal functional.", "default": "", "details": "Description:XCm_Pn, where[math]\\displaystyle{ m=1, 2, \\ldots }[/math]and[math]\\displaystyle{ n=1, 2, \\ldots }[/math]allows to modify the parameters in a semilocal functional.\nTheXCm_Pntag allows to modify the parameters in the semilocal functional set with theXCtag. InXCm_Pn,[math]\\displaystyle{ m=1, 2, \\ldots }[/math]refers to the[math]\\displaystyle{ m }[/math]th component of the functional and[math]\\displaystyle{ n=1, 2, \\ldots }[/math]to the[math]\\displaystyle{ n }[/m\nTheXCm_Pntag can be used for functionals that are implemented in VASP or in Libxc.", "wiki_url": "https://www.vasp.at/wiki/index.php/XCm_Pn", "description_cn": "XCm_Pn，其中m=1, 2, ... 和 n=1, 2, ... 允许修改半局域泛函中的参数。", "default_value": "使用泛函默认参数", "details_cn": "XCm_Pn标签允许修改由XC标签设置的半局域泛函中的参数。在XCm_Pn中，m=1, 2, ... 指的是泛函的第m个组件（例如交换或关联部分），n=1, 2, ... 指的是该组件的第n个参数。例如，对于PBE泛函，m=1可能对应交换部分，n=1对应第一个参数（如μ值）。", "recommended": "无固定推荐值，需根据具体泛函和计算目标自定义。使用场景：当需要精细调整交换关联泛函参数以优化计算结果时，例如改善带隙预测、晶格常数或结合能精度，常用于材料性质研究或泛函验证。", "tips": "使用前必须熟悉所选泛函的参数含义，避免盲目修改；修改参数可能引入误差，建议进行基准测试；确保m和n值正确对应泛函组件，否则可能导致计算错误；在VASP中，此标签通常与XC标签配合使用。"}, "ZAB_VDW": {"name": "ZAB_VDW", "description": "ZAB_VDW= [real]Default:ZAB_VDW= -0.8491", "default": "ZAB_VDW= [real]Default:ZAB_VDW= -0.8491", "details": "Description: The tagZAB_VDWspecifies the value of the parameter[math]\\displaystyle{ Z_{ab} }[/math]in the kernel of thenonlocal vdW-DF functional of Dionet al.[1]\nIn a revised version of the vdW correlation functional from Leeet al.[2],[math]\\displaystyle{ Z_{ab}=-1.8867 }[/math].\nNonlocal vdW-DF functionals,PARAM1,PARAM2", "wiki_url": "https://www.vasp.at/wiki/index.php/ZAB_VDW", "description_cn": "ZAB_VDW 参数用于指定非局域 vdW-DF 泛函中的 Z_{ab} 参数值。", "default_value": "-0.8491", "details_cn": "标签 ZAB_VDW 指定了非局域 vdW-DF 泛函（Dion 等人 [1]）核中的参数 Z_{ab} 的值。在 Lee 等人 [2] 的 vdW 关联泛函修订版本中，Z_{ab} = -1.8867。非局域 vdW-DF 泛函，PARAM1，PARAM2。", "recommended": "默认值 -0.8491 适用于标准 vdW-DF 泛函。如果使用 Lee 等人修订的 vdW 关联泛函，推荐使用 -1.8867。使用场景：当计算涉及范德华相互作用的体系时，如层状材料、分子吸附或弱键合系统。", "tips": "此参数仅在使用非局域 vdW 泛函时相关。确保参数值与所选的 vdW 泛函版本匹配，通常需要设置 LUSE_VDW = .TRUE. 并可能配合 PARAM1 和 PARAM2 使用。修改前建议参考 VASP 官方文档或相关文献以确认适用性。"}};
