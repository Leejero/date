<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VASP INCAR 参数中文参考手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a12;--surface:#0c1220;--surface2:#111928;--surface3:#182030;
  --border:#1c2840;--accent:#c9a84c;--accent-dim:rgba(201,168,76,.12);
  --accent-glow:rgba(201,168,76,.25);--text:#ddd9d0;--text-muted:#6a7890;
  --text-code:#92b8d8;--success:#4ade80;--tag-bg:rgba(100,160,255,.08);
  --radius:10px;--sidebar-w:280px;
}
html{scroll-behavior:smooth;font-size:15px}
body{
  font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.7;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 20%,rgba(201,168,76,.04) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 80%,rgba(70,130,220,.03) 0%,transparent 50%);
}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ---- Sidebar ---- */
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;transition:transform .3s ease;
}
.sidebar-header{
  padding:28px 24px 20px;border-bottom:1px solid var(--border);
}
.sidebar-header h1{
  font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;
  color:var(--accent);letter-spacing:.02em;line-height:1.3;
}
.sidebar-header p{
  font-size:.75rem;color:var(--text-muted);margin-top:6px;
}
.sidebar-nav{
  flex:1;overflow-y:auto;padding:12px 0;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 24px;
  cursor:pointer;font-size:.85rem;color:var(--text-muted);
  transition:all .2s ease;border-left:3px solid transparent;
}
.nav-item:hover{color:var(--text);background:var(--accent-dim)}
.nav-item.active{
  color:var(--accent);border-left-color:var(--accent);
  background:var(--accent-dim);font-weight:500;
}
.nav-item .icon{font-size:1rem;width:22px;text-align:center}
.nav-item .count{
  margin-left:auto;font-size:.7rem;background:var(--surface3);
  padding:2px 8px;border-radius:10px;color:var(--text-muted);
}
.sidebar-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  font-size:.7rem;color:var(--text-muted);
}

/* ---- Main ---- */
.main{
  margin-left:var(--sidebar-w);padding:0 40px 80px;position:relative;z-index:1;
}
.top-bar{
  position:sticky;top:0;z-index:50;padding:20px 0;
  background:linear-gradient(var(--bg) 60%,transparent);
  backdrop-filter:blur(12px);
}
.search-wrap{
  display:flex;align-items:center;gap:12px;
}
.search-box{
  flex:1;max-width:560px;position:relative;
}
.search-box input{
  width:100%;padding:12px 18px 12px 44px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:.9rem;
  font-family:inherit;outline:none;transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box::before{
  content:'⌕';position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:1.1rem;color:var(--text-muted);
}
.result-count{
  font-size:.8rem;color:var(--text-muted);white-space:nowrap;
}

/* ---- Templates ---- */
.templates-section{
  margin:20px 0 32px;
}
.templates-section h2{
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:600;
  color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.template-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;
}
.tpl-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;cursor:pointer;
  transition:all .25s ease;position:relative;overflow:hidden;
}
.tpl-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:0;transition:opacity .25s;
}
.tpl-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.tpl-card:hover::before{opacity:1}
.tpl-card h3{font-size:.85rem;font-weight:600;margin-bottom:4px}
.tpl-card p{font-size:.75rem;color:var(--text-muted);line-height:1.4}
.tpl-card .tag{
  display:inline-block;margin-top:8px;font-size:.65rem;
  background:var(--accent-dim);color:var(--accent);
  padding:2px 8px;border-radius:4px;
}

/* ---- Param Cards ---- */
.section-title{
  font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;
  color:var(--text);margin:36px 0 8px;padding-bottom:10px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;
}
.section-desc{
  font-size:.8rem;color:var(--text-muted);margin-bottom:16px;
}
.param-grid{
  display:flex;flex-direction:column;gap:10px;
}
.param-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:all .25s ease;
}
.param-card:hover{border-color:rgba(201,168,76,.3)}
.param-head{
  display:flex;align-items:center;padding:14px 18px;cursor:pointer;
  gap:14px;transition:background .15s;
}
.param-head:hover{background:var(--surface2)}
.param-name{
  font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:500;
  color:var(--accent);min-width:130px;
}
.param-brief{
  flex:1;font-size:.82rem;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.param-default{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  color:var(--text-code);background:var(--tag-bg);
  padding:3px 10px;border-radius:4px;white-space:nowrap;
}
.param-arrow{
  font-size:.7rem;color:var(--text-muted);transition:transform .25s;
  width:20px;text-align:center;
}
.param-card.open .param-arrow{transform:rotate(90deg)}
.param-body{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
}
.param-card.open .param-body{max-height:600px}
.param-detail{
  padding:0 18px 18px;border-top:1px solid var(--border);
}
.detail-row{
  display:grid;grid-template-columns:90px 1fr;gap:8px;
  padding:10px 0;font-size:.82rem;
  border-bottom:1px solid rgba(28,40,64,.5);
}
.detail-row:last-child{border-bottom:none}
.detail-label{
  color:var(--accent);font-weight:500;font-size:.75rem;
  padding-top:2px;
}
.detail-value{color:var(--text);line-height:1.6}
.detail-value code{
  font-family:'JetBrains Mono',monospace;font-size:.78rem;
  background:var(--tag-bg);padding:1px 6px;border-radius:3px;
  color:var(--text-code);
}
.wiki-link{
  display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  font-size:.75rem;color:var(--accent);text-decoration:none;
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;
  transition:all .2s;
}
.wiki-link:hover{border-color:var(--accent);background:var(--accent-dim)}
.wiki-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.7rem;font-weight:600;color:#4fc3f7;text-decoration:none;
  padding:2px 10px;border:1px solid rgba(79,195,247,.3);border-radius:12px;
  background:rgba(79,195,247,.08);transition:all .2s;white-space:nowrap;
}
.wiki-tag:hover{border-color:#4fc3f7;background:rgba(79,195,247,.15);color:#81d4fa}

/* ---- Template Modal ---- */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;max-width:520px;width:90%;max-height:80vh;
  overflow-y:auto;padding:28px;
}
.modal h2{
  font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;
  color:var(--accent);margin-bottom:6px;
}
.modal p{font-size:.82rem;color:var(--text-muted);margin-bottom:16px}
.modal pre{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:16px;font-size:.8rem;
  font-family:'JetBrains Mono',monospace;color:var(--text-code);
  line-height:1.8;overflow-x:auto;white-space:pre;
}
.modal-actions{
  display:flex;gap:10px;margin-top:16px;justify-content:flex-end;
}
.btn{
  padding:8px 18px;border-radius:6px;font-size:.8rem;
  font-family:inherit;cursor:pointer;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);transition:all .2s;
}
.btn:hover{border-color:var(--accent)}
.btn-primary{
  background:var(--accent);color:var(--bg);border-color:var(--accent);
  font-weight:600;
}
.btn-primary:hover{opacity:.85}

/* ---- Back to Home Button ---- */
.back-home{
  position:fixed;bottom:30px;right:30px;z-index:200;
  display:none;align-items:center;gap:8px;
  padding:12px 20px;border-radius:24px;
  background:var(--accent);color:var(--bg);
  font-size:.85rem;font-weight:600;font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;border:none;box-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:all .25s ease;
}
.back-home:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.back-home.show{display:flex}

/* ---- Mobile ---- */
.menu-toggle{
  display:none;position:fixed;top:16px;left:16px;z-index:150;
  width:40px;height:40px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:1.2rem;cursor:pointer;
}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .main{margin-left:0;padding:20px 16px 60px}
  .top-bar{padding-top:56px}
  .template-grid{grid-template-columns:1fr}
}

/* ---- Animations ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.param-card{animation:fadeUp .4s ease both}
.param-card:nth-child(2){animation-delay:.04s}
.param-card:nth-child(3){animation-delay:.08s}
.param-card:nth-child(4){animation-delay:.12s}
.param-card:nth-child(5){animation-delay:.16s}
</style>
</head>
<body>

<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>VASP INCAR<br>参数参考手册</h1>

  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">

    编写: <span style="color:var(--accent)">@Leejero</span>

      <div class="search-box">

      </div>
      <span class="result-count" id="resultCount"></span>

    <strong style="color:var(--accent);font-size:1.5rem">📌 声明</strong><br><br>

    各参数的详细说明请以 <a href="https://www.vasp.at/wiki/" target="_blank" style="color:var(--accent);text-decoration:underline;font-weight:600">VASP Wiki 官网</a> 为准。<br>

  </div>

  <section class="templates-section" id="tplSection">
    <h2>⚡ 常用计算模板</h2>
    <div class="template-grid" id="tplGrid"></div>
  </section>

  <div id="paramContent"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <pre id="modalCode"></pre>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">关闭</button>
      <button class="btn btn-primary" onclick="copyIncar()">复制 INCAR</button>
    </div>
  </div>
</div>

<button class="back-home" id="backHome" onclick="goHome()">← 回到主页</button>

const PARAMS = {"ADDGRID": {"name": "ADDGRID", "description": "ADDGRID= .TRUE. | .FALSE.Default:ADDGRID= .FALSE.", "default": "ADDGRID= .TRUE. | .FALSE.Default:ADDGRID= .FALSE.", "details": "Description:ADDGRIDdetermines whether an additional support grid is used for the evaluation of the augmentation charges.\nWhenADDGRID=.TRUE. VASP uses an additional support grid for the evaluation of the augmentation charges. This grid contains 8 times more points than the standard \"fine\" grid (NGXF×NGYF×NGZF). Whenever terms involving augmentation charges are evaluated, this additional grid is used. For instance: The \nCaveat:\nIf there is any contribution in the density or potential at the highest Fourier component[math]\\displaystyle{ G }[/math]of\nthe conventional fine grid (given byNGXF×NGYF×NGZF), then Fourier interpolation to twice the grid density leads to\noscillations in real space. These oscillations corresp", "wiki_url": "https://www.vasp.at/wiki/index.php/ADDGRID", "description_cn": "ADDGRID参数控制是否使用额外的支持网格来评估增强电荷。", "default_value": ".FALSE.", "details_cn": "ADDGRID决定是否使用额外的支持网格来评估增强电荷。当ADDGRID=.TRUE.时，VASP使用一个额外的支持网格来评估增强电荷。该网格包含比标准“精细”网格（NGXF×NGYF×NGZF）多8倍的点。每当评估涉及增强电荷的项时，都使用这个额外网格。例如，在计算密度或势时。注意：如果在密度或势的最高频率分量中有贡献，使用此参数可以提高精度，但会增加计算成本。", "recommended": "默认为.FALSE.，适用于大多数计算。当需要高精度评估增强电荷时，如计算密度、势或光学性质，建议设置为.TRUE.，但需注意计算成本增加。", "tips": "设置ADDGRID=.TRUE.会大幅增加计算成本和内存使用，因为网格点数增加8倍。仅在需要高精度时使用，并确保计算资源充足。"}, "AEXX": {"name": "AEXX", "description": "Description:AEXXspecifies the fraction of exact exchange in a Hartree-Fock-type/hybrid-functional calculation.", "default": "Default:AEXX", "details": "Description:AEXXspecifies the fraction of exact exchange in a Hartree-Fock-type/hybrid-functional calculation.\nBEXX,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC,LHFCALC,HFSCREEN,LMODELHF,LTHOMAS,LRHFCALC,List of hybrid functionals,Hybrid functionals: formalism\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/AEXX", "description_cn": "AEXX 指定了在 Hartree-Fock 型/杂化泛函计算中精确交换的比例。", "default_value": "0.25", "details_cn": "AEXX 指定了在 Hartree-Fock 型/杂化泛函计算中精确交换的比例。相关参数包括 BEXX, ALDAX, ALDAC, AGGAX, AGGAC, AMGGAX, AMGGAC, LHFCALC, HFSCREEN, LMODELHF, LTHOMAS, LRHFCALC。杂化泛函列表，杂化泛函：形式主义。使用此标签的示例。", "recommended": "对于常见杂化泛函如 HSE06 或 PBE0，推荐 AEXX=0.25。使用场景：在需要精确交换的杂化泛函计算中，如带隙计算、表面吸附或电子结构研究，设置 AEXX 以控制精确交换比例，平衡精度和计算成本。", "tips": "确保设置 LHFCALC=.TRUE. 以启用杂化泛函计算。AEXX 的值会影响计算精度和计算成本，需根据具体杂化泛函（如 HSE06、PBE0）和体系特性调整。与其他参数如 BEXX、HFSCREEN 等配合使用，以定义完整的杂化泛函。"}, "AGGAC": {"name": "AGGAC", "description": "Description:AGGACis a parameter that multiplies the gradient correction in the GGA correlation functional.", "default": "Default:AGGAC", "details": "Description:AGGACis a parameter that multiplies the gradient correction in the GGA correlation functional.\nAGGACcan be used as the fraction of gradient correction in the GGA correlation in a Hartree-Fock/DFT hybrid functional.\nAEXX,ALDAX,ALDAC,AGGAX,AMGGAX,AMGGAC,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/AGGAC", "description_cn": "AGGAC 是一个乘以 GGA 关联泛函中梯度修正的参数。", "default_value": "AGGAC", "details_cn": "AGGAC 是一个乘以 GGA 关联泛函中梯度修正的参数。AGGAC 可以用作 Hartree-Fock/DFT 杂化泛函中 GGA 关联梯度修正的分数。AEXX、ALDAX、ALDAC、AGGAX、AMGGAX、AMGGAC、LHFCALC、杂化泛函列表、杂化泛函：形式主义", "recommended": "推荐值通常为1.0，适用于标准杂化泛函（如HSE06）。使用场景：在杂化泛函计算中，若需微调关联泛函的梯度修正部分，可调整AGGAC值，但需基于文献或测试验证。", "tips": "AGGAC仅在设置LHFCALC=.TRUE.（启用杂化泛函）时有效；调整AGGAC可能影响计算结果，建议谨慎操作并参考相关研究。"}, "AGGAX": {"name": "AGGAX", "description": "Description:AGGAXis a parameter that multiplies the gradient correction in the GGA exchange functional.", "default": "Default:AGGAX", "details": "Description:AGGAXis a parameter that multiplies the gradient correction in the GGA exchange functional.\nAGGAXcan be used as the fraction of gradient correction in the GGA exchange in a Hartree-Fock/GGA hybrid functional.\nAEXX,ALDAX,ALDAC,AGGAC,AMGGAX,AMGGAC,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/AGGAX", "description_cn": "AGGAX 是一个乘以 GGA 交换泛函中梯度修正的参数。", "default_value": "AGGAX", "details_cn": "AGGAX 是一个乘以 GGA 交换泛函中梯度修正的参数。AGGAX 可以用作 Hartree-Fock/GGA 杂化泛函中 GGA 交换的梯度修正分数。相关参数：AEXX, ALDAX, ALDAC, AGGAC, AMGGAX, AMGGAC, LHFCALC，杂化泛函列表，杂化泛函：形式主义。", "recommended": "通常为 1.0，适用于标准杂化泛函如 HSE06 或 PBE0。使用场景：在杂化泛函计算中，用于控制 GGA 交换部分的梯度修正强度，例如需要微调交换能时。", "tips": "AGGAX 仅在使用杂化泛函时有效（即设置 LHFCALC = .TRUE.）。调整此参数可能影响计算精度，建议参考相关文献或进行收敛测试，并与其他参数如 AEXX 协调使用。"}, "ALDAC": {"name": "ALDAC", "description": "Description:ALDACis a parameter that multiplies the LDA correlation functional or the LDA part of the GGA correlation functional.", "default": "Default:ALDAC", "details": "Description:ALDACis a parameter that multiplies the LDA correlation functional or the LDA part of the GGA correlation functional.\nALDACcan be used as the fraction of LDA correlation in a Hartree-Fock/DFT hybrid functional.\nAEXX,ALDAX,AGGAX,AGGAC,AMGGAX,AMGGAC,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/ALDAC", "description_cn": "ALDAC是一个乘以LDA关联泛函或GGA关联泛函的LDA部分的参数。", "default_value": "ALDAC", "details_cn": "ALDAC是一个乘以LDA关联泛函或GGA关联泛函的LDA部分的参数。ALDAC可以用作Hartree-Fock/DFT混合泛函中LDA关联的分数。相关参数包括：AEXX, ALDAX, AGGAX, AGGAC, AMGGAX, AMGGAC, LHFCALC，以及混合泛函列表和混合泛函的形式主义。", "recommended": "通常为1.0，适用于标准杂化泛函（如HSE06）。使用场景：在自定义杂化泛函时，用于调整LDA关联的比例，例如降低ALDAC值以减少LDA关联贡献，从而微调电子结构计算精度。", "tips": "确保ALDAC与AEXX等其他杂化参数（如ALDAX、AGGAX）协调，以保持总交换关联比例合理；在使用杂化泛函时，需设置LHFCALC=.TRUE.；注意不同泛函对ALDAC的默认设置可能不同，建议参考VASP文档或测试计算以确定最佳值。"}, "ALDAX": {"name": "ALDAX", "description": "Description:ALDAXis a parameter that multiplies the LDA exchange functional or the LDA part of the GGA exchange functional.", "default": "Default:ALDAX", "details": "Description:ALDAXis a parameter that multiplies the LDA exchange functional or the LDA part of the GGA exchange functional.\nALDAXcan be used as the fraction of LDA exchange in a Hartree-Fock/DFT hybrid functional.\nAEXX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/ALDAX", "description_cn": "ALDAX是一个参数，用于乘以LDA交换泛函或GGA交换泛函的LDA部分。", "default_value": "ALDAX", "details_cn": "ALDAX是一个参数，用于乘以LDA交换泛函或GGA交换泛函的LDA部分。ALDAX可以用作Hartree-Fock/DFT混合泛函中LDA交换的分数。相关参数包括AEXX、ALDAC、AGGAX、AGGAC、AMGGAX、AMGGAC、LHFCALC，以及混合泛函列表和混合泛函形式主义。", "recommended": "对于标准LDA或GGA计算，ALDAX通常设为1.0（默认值），表示使用完整的LDA交换。在混合泛函中（如PBE0或HSE06），ALDAX用于定义LDA交换的分数，具体值需根据泛函设置调整，例如在PBE0中可能与AEXX结合使用。使用场景：适用于需要自定义交换泛函的计算，如带隙工程、电子结构优化或研究交换泛函对材料性质的影响。", "tips": "确保ALDAX与其他交换相关参数（如AEXX、AGGAX）一致，以避免不一致的泛函设置。在混合泛函计算中，错误设置ALDAX可能导致不准确的电子结构或能量结果。建议参考VASP官方文档或相关文献，以了解具体泛函的推荐设置。"}, "ALGO": {"name": "ALGO", "description": "ALGO= Normal | VeryFast | Fast | Conjugate | All | Damped | Subrot | Eigenval | Exact | None | Nothing | CHI | G0W0 | GW0 | GW | scGW0 | scGW | G0W0R | GW0R | GWR | scGW0R | scGWR | ACFDT | RPA | ACFDTR | RPAR | BSE | TDHFDefault:ALGO=  Normal", "default": "ALGO= Normal | VeryFast | Fast | Conjugate | All | Damped | Subrot | Eigenval | Exact | None | Nothing | CHI | G0W0 | GW0 | GW | scGW0 | scGW | G0W0R | GW0R | GWR | scGW0R | scGWR | ACFDT | RPA | ACFD", "details": "Description: theALGOtag is a convenient option to specify the electronic minimization algorithm (as of VASP.4.5) and/or to select the type ofGW calculations.\nMore details can be found under the documentation for the tagIALGO.\nConjugate, Subrot, Eigenval, None and Nothing are only supported by vasp.5.2.9 and newer versions.", "wiki_url": "https://www.vasp.at/wiki/index.php/ALGO", "description_cn": "ALGO参数用于指定电子最小化算法或选择GW计算类型。", "default_value": "Normal", "details_cn": "ALGO标签是一个方便的选项，用于指定电子最小化算法（从VASP.4.5开始）和/或选择GW计算的类型。更多细节可以在IALGO标签的文档中找到。Conjugate、Subrot、Eigenval、None和Nothing仅受vasp.5.2.9及更新版本支持。", "recommended": "对于常规DFT基态计算，使用ALGO=Normal；对于需要快速收敛的计算，可尝试ALGO=Fast或VeryFast；对于GW计算，根据需求选择ALGO=G0W0（单次GW计算）、GW0或GW（迭代GW计算）；对于BSE或TDHF计算，使用ALGO=BSE或ALGO=TDHF。使用场景：ALGO=Normal适用于大多数标准计算；ALGO=G0W0适用于带隙计算；ALGO=Fast适用于大体系或快速测试。", "tips": "1. 确保VASP版本支持所选ALGO值，如Conjugate、Subrot等需要vasp.5.2.9或更高版本。2. 进行GW计算前，需先完成基态计算并设置相关参数（如NBANDS、PRECFOCK等）。3. 选择ALGO时需权衡计算精度和资源消耗，例如VeryFast可能牺牲精度以换取速度。"}, "ALPHA_VDW": {"name": "ALPHA_VDW", "description": "Description: Specify[math]\\displaystyle{ \\alpha }[/math]in vdW-DF3-opt1/vdW-DF3-opt2.", "default": "Default:ALPHA_VDW", "details": "Description: Specify[math]\\displaystyle{ \\alpha }[/math]in vdW-DF3-opt1/vdW-DF3-opt2.\nTheALPHA_VDWtag allows to specify the value of the parameter[math]\\displaystyle{ \\alpha }[/math]in the kernel of the vdW-DF3-opt1/vdW-DF3-opt2 nonlocal van der Waals functionals.[1]\nGAMMA_VDW,PARAM1,PARAM2,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/ALPHA_VDW", "description_cn": "指定vdW-DF3-opt1/vdW-DF3-opt2中的α参数。", "default_value": "ALPHA_VDW", "details_cn": "指定vdW-DF3-opt1/vdW-DF3-opt2中的α。ALPHA_VDW标签允许在vdW-DF3-opt1/vdW-DF3-opt2非局部范德华函数的核中指定参数α的值。[1] GAMMA_VDW, PARAM1, PARAM2, 非局部vdW-DF函数", "recommended": "取决于具体计算体系，通常vdW-DF3-opt1和vdW-DF3-opt2泛函有推荐的α值（如基于文献的优化值），建议参考VASP手册或相关论文。使用场景：在使用vdW-DF3-opt1或vdW-DF3-opt2非局部范德华泛函进行第一性原理计算时，需要设置此参数以控制范德华相互作用的强度和精度。", "tips": "确保与GAMMA_VDW、PARAM1、PARAM2等参数协调设置，以保持泛函一致性；错误设置可能导致计算误差或收敛问题；建议在设置前查阅VASP官方文档或相关研究文献，以获取针对特定体系的推荐值。"}, "AMGGAC": {"name": "AMGGAC", "description": "Description:AMGGACis a parameter that multiplies the meta-GGA correlation functional (available as of VASP.6.4.0).", "default": "Default:AMGGAC", "details": "Description:AMGGACis a parameter that multiplies the meta-GGA correlation functional (available as of VASP.6.4.0).\nAMGGACcan be used as the fraction of  meta-GGA correlation in a Hartree-Fock/DFT hybrid functional.\nAEXX,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/AMGGAC", "description_cn": "AMGGAC 是一个乘以 meta-GGA 相关函数的参数（从 VASP.6.4.0 开始可用）。", "default_value": "AMGGAC", "details_cn": "AMGGAC 是一个乘以 meta-GGA 相关函数的参数（从 VASP.6.4.0 开始可用）。AMGGAC 可以用作 Hartree-Fock/DFT 混合函数中 meta-GGA 相关的分数。相关参数包括 AEXX、ALDAX、ALDAC、AGGAX、AGGAC、AMGGAX、LHFCALC，以及混合函数列表和混合函数形式。", "recommended": "通常设置为 1.0 以完全使用 meta-GGA 相关，或根据混合函数需求调整（例如，在自定义混合函数中设置为 0.5 以混合相关部分）。使用场景：适用于需要精确控制混合函数中 meta-GGA 相关比例的计算，如研究材料电子结构或反应能垒时。", "tips": "确保 VASP 版本至少为 6.4.0；此参数需与其他混合函数参数（如 AEXX、AGGAC）配合使用；建议通过测试不同值来优化计算结果，避免默认值可能不适用于所有情况。"}, "AMGGAX": {"name": "AMGGAX", "description": "Description:AMGGAXis a parameter that multiplies the meta-GGA exchange functional (available as of VASP.6.4.0).", "default": "Default:AMGGAX", "details": "Description:AMGGAXis a parameter that multiplies the meta-GGA exchange functional (available as of VASP.6.4.0).\nAMGGAXcan be used as the fraction of meta-GGA exchange in a Hartree-Fock/DFT hybrid functional (possible since VASP.6.4.0).\nAEXX,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAC,LHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/AMGGAX", "description_cn": "AMGGAX 是一个乘以 meta-GGA 交换泛函的参数（从 VASP.6.4.0 版本开始可用）。", "default_value": "AMGGAX", "details_cn": "AMGGAX 是一个乘以 meta-GGA 交换泛函的参数（从 VASP.6.4.0 版本开始可用）。AMGGAX 可以用作 Hartree-Fock/DFT 混合泛函中 meta-GGA 交换的分数（从 VASP.6.4.0 版本开始可能）。AEXX, ALDAX, ALDAC, AGGAX, AGGAC, AMGGAC, LHFCALC, 混合泛函列表, 混合泛函：形式主义", "recommended": "默认值通常为1.0，表示使用完整的meta-GGA交换泛函。在混合泛函中，可根据需要设置分数，如0.25用于Hartree-Fock交换。使用场景：当自定义混合泛函中meta-GGA交换比例时，或在使用meta-GGA泛函（如SCAN）进行精确计算时调整交换分数。", "tips": "1. 确保VASP版本≥6.4.0；2. 与AEXX、AGGAX等参数协调使用，以定义完整的混合泛函；3. 设置AMGGAX时，注意总交换分数应合理，避免过度校正；4. 参考VASP手册或混合泛函列表以获取更多细节。"}, "AMIN": {"name": "AMIN", "description": "AMIN= [real]Default:AMIN= min(0.1,AMIX,AMIX_MAG)", "default": "AMIN= [real]Default:AMIN= min(0.1,AMIX,AMIX_MAG)", "details": "Description:AMINspecifies the minimal mixing parameter in Kerker's initial approximation[1]to the charge-dielectric function used in the Broyden[2][3]/Pulay[4]mixing scheme (IMIX=4,INIMIX=1).\nKerker's initial approximation[1]for the charge-dielectric function is given by\nwhere[math]\\displaystyle{ A }[/math]=AMIX,[math]\\displaystyle{ B }[/math]=BMIX, and[math]\\displaystyle{ A_{\\rm min} }[/math]=AMIN.", "wiki_url": "https://www.vasp.at/wiki/index.php/AMIN", "description_cn": "AMIN是一个实数参数，默认值为min(0.1, AMIX, AMIX_MAG)。", "default_value": "min(0.1, AMIX, AMIX_MAG)", "details_cn": "AMIN指定了在Kerker初始近似中用于Broyden/Pulay混合方案（IMIX=4, INIMIX=1）的电荷介电函数的最小混合参数。Kerker初始近似中的电荷介电函数由以下公式给出，其中A = AMIX，B = BMIX，A_min = AMIN。", "recommended": "推荐使用默认值min(0.1, AMIX, AMIX_MAG)。在计算不收敛时，可以尝试调整AMIN，但需结合AMIX和AMIX_MAG一起考虑。适用于需要精细控制电荷密度混合的场景，如磁性系统或强关联体系。", "tips": "AMIN的值不宜过高或过低。过高可能导致混合不稳定，过低可能影响收敛速度。建议在调整前备份INCAR文件，并逐步测试。"}, "AMIX": {"name": "AMIX", "description": "Description:AMIXspecifies the linear mixing parameter.", "default": "Default:AMIX", "details": "Description:AMIXspecifies the linear mixing parameter.\nIn VASP the eigenvalue spectrum of the charge dielectric matrix is calculated and written to theOUTCARfile at each electronic step. This allows a rather easy optimization of the mixing parameters, if required. Search in theOUTCARfile for\nThe parameters for the mixing are optimal if the mean eigenvalue Γmean=1, and if the width of the eigenvalue spectrum is minimal. For an initial linear mixing (BMIX≈0) an optimal setting forAMIXcan be found easily by settingAMIXoptimal=AMIXcurrent*Γmean. For the Kerker scheme (IMIX=1) eitherAMIXorBM", "wiki_url": "https://www.vasp.at/wiki/index.php/AMIX", "description_cn": "AMIX 指定线性混合参数。", "default_value": "0.4（标准默认值）", "details_cn": "AMIX 指定线性混合参数。在 VASP 中，电荷介电矩阵的特征值谱在每个电子步骤中计算并写入 OUTCAR 文件。这允许在需要时相当容易地优化混合参数。在 OUTCAR 文件中搜索，如果平均特征值 Γmean=1，且特征值谱的宽度最小，则混合参数是最优的。对于初始线性混合（BMIX≈0），可以找到 AMIX 的最优设置。", "recommended": "默认值0.4适用于大多数体系，如绝缘体或半导体。对于金属体系或收敛困难的情况，建议减小AMIX值至0.2或0.1，以避免电荷密度振荡。使用场景：在自洽场计算中控制电荷密度混合，优化电子步收敛性，特别是在处理复杂体系或初始计算时。", "tips": "1. 监控OUTCAR文件中的特征值谱，确保平均特征值接近1且谱宽最小，以优化混合参数；2. AMIX通常与BMIX等其他混合参数配合使用，调整时需综合考虑；3. 对于强关联体系、磁性体系或表面计算，可能需要进一步调整AMIX值；4. 初始计算建议使用默认值，根据收敛行为逐步调整，避免过度修改导致计算不稳定。"}, "AMIX_MAG": {"name": "AMIX_MAG", "description": "AMIX_MAG= [real]Default:AMIX_MAG= 1.6", "default": "AMIX_MAG= [real]Default:AMIX_MAG= 1.6", "details": "Description: Linear mixing parameter for the magnetization density.\nThe default mixing parameters for spinpolarized calculations are:\nThese settings are consistent with an (initial) spin enhancement factor of 4, which is usually a reasonable approximation.", "wiki_url": "https://www.vasp.at/wiki/index.php/AMIX_MAG", "description_cn": "磁化密度的线性混合参数", "default_value": "1.6", "details_cn": "AMIX_MAG是磁化密度的线性混合参数。自旋极化计算的默认混合参数设置为与初始自旋增强因子4一致，这通常是一个合理的近似。", "recommended": "默认值1.6。使用场景：适用于大多数自旋极化计算，特别是磁性材料的第一性原理计算。如果计算收敛困难，可以适当调整，例如在强磁性系统中可能需要降低该值以改善收敛。", "tips": "AMIX_MAG的值影响磁化密度的混合，设置过高可能导致计算振荡或发散，过低可能导致收敛缓慢。建议在默认值基础上根据具体系统微调，并参考VASP官方文档或相关文献以确保准确性。"}, "ANDERSEN_PROB": {"name": "ANDERSEN_PROB", "description": "ANDERSEN_PROB= 0≤[real]≤1Default:ANDERSEN_PROB= 0", "default": "ANDERSEN_PROB= 0≤[real]≤1Default:ANDERSEN_PROB= 0", "details": "Description:ANDERSEN_PROBsets the collision probability for the Anderson thermostat (in case VASP was compiled with-Dtbdyn).\nIn the approach proposed by Andersen[1]the system is thermally coupled to a fictitious heat bath with the desired temperature. The coupling is represented by stochastic impulsive forces that act occasionally on randomly selected particles. The collision probability is defined as an average number of\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/ANDERSEN_PROB", "description_cn": "ANDERSEN_PROB 参数用于设置 Anderson 恒温器的碰撞概率（需在编译 VASP 时启用 -Dtbdyn 选项）。", "default_value": "0", "details_cn": "在 Andersen 提出的方法中，系统与一个具有目标温度的虚拟热浴进行热耦合。这种耦合通过随机作用于随机选定粒子上的随机脉冲力来实现。碰撞概率定义为每个粒子在每个时间步长内与热浴发生碰撞的平均次数。", "recommended": "1. 常规结构弛豫或NVE系综计算：保持默认值0（不使用热浴）。\n2. NVT系综分子动力学：若需使用 Andersen 恒温器，可设置为0.01至0.1之间的值。较小值（如0.01）对应较弱的耦合，温度涨落较大但动力学更接近真实；较大值（如0.1）对应较强的耦合，能更快达到目标温度但可能影响动力学行为。建议通过测试确定适合体系的值。\n3. 注意：此参数仅在使用 Andersen 恒温器时有效，若使用 Nosé-Hoover 等其他恒温器则无需设置。", "tips": "1. 碰撞概率与时间步长相关，改变时间步长时可能需要重新调整此参数。\n2. 过高的碰撞概率可能导致系统动力学失真，过低则可能导致温度控制不理想。\n3. 使用此参数前需确认 VASP 编译时已启用 -Dtbdyn 选项，否则设置无效。\n4. 对于需要精确温度控制的长时间模拟，建议与其他温度控制方法（如 Nosé-Hoover）进行对比测试。"}, "ANTIRES": {"name": "ANTIRES", "description": "ANTIRES= 0 | 1 | 2Default:ANTIRES= 0", "default": "ANTIRES= 0 | 1 | 2Default:ANTIRES= 0", "details": "Description:ANTIRESdetermines whether the Tamm-Dancoff approximation is used or not.\nVASP uses the procedures outlined in reference[1]to include contributions beyond TDA. Beyond-TDA calculations increase the computational time and memory requirements by typically a factor of 2.\nBSE calculations", "wiki_url": "https://www.vasp.at/wiki/index.php/ANTIRES", "description_cn": "ANTIRES决定是否使用Tamm-Dancoff近似。", "default_value": "0", "details_cn": "VASP使用参考文献[1]中概述的程序来包含超越TDA的贡献。超越TDA的计算通常将计算时间和内存需求增加约2倍。BSE计算。", "recommended": "默认值0适用于使用Tamm-Dancoff近似的BSE计算，计算效率高。若需要更精确的结果，可设置为1或2以包含超越TDA的贡献，但会显著增加计算时间和内存需求（约2倍）。建议根据计算资源和精度需求选择。", "tips": "使用非零值（1或2）时，确保有足够的计算资源和内存。参考文献[1]提供了更多技术细节，建议查阅以理解具体实现。"}, "APACO": {"name": "APACO", "description": "APACO= [real]Default:APACO= 10", "default": "APACO= [real]Default:APACO= 10", "details": "Description:APACOsets the maximum distance in the evaluation of the pair-correlation function (in Å).\nVASP evaluates the pair-correlation function eachNBLOCKsteps and writes it afterNBLOCK×KBLOCKsteps to thePCDATfile.\nNPACO,NBLOCK,KBLOCK,PCDAT", "wiki_url": "https://www.vasp.at/wiki/index.php/APACO", "description_cn": "APACO参数用于设置对关联函数评估中的最大距离（单位：Å）。", "default_value": "10 Å", "details_cn": "APACO设置对关联函数评估中的最大距离（单位：Å）。VASP每NBLOCK步评估一次对关联函数，并在NBLOCK×KBLOCK步后将其写入PCDAT文件。相关参数：NPACO, NBLOCK, KBLOCK, PCDAT", "recommended": "默认值10 Å适用于大多数常规计算，如小到中等尺寸的晶体或分子系统。对于大型系统（如超胞或表面模型）或需要分析更远距离相关性（如长程有序或缺陷相互作用）的情况，可适当增大至15-20 Å。使用场景：在计算径向分布函数、对关联函数或分析原子间相互作用时设置，以确保覆盖所有相关原子对。", "tips": "APACO值应大于系统中最大可能的原子间距，以避免截断相关性导致结果不准确。过大的值会增加计算时间和内存消耗，建议根据系统尺寸和所需精度平衡设置。同时，需与NPACO（对关联函数的点数）配合使用，以确保足够的分辨率。"}, "BANDGAP": {"name": "BANDGAP", "description": "BANDGAP= COMPACT | WEIGHT | KPOINTDefault:BANDGAP= COMPACT", "default": "BANDGAP= COMPACT | WEIGHT | KPOINTDefault:BANDGAP= COMPACT", "details": "Description:BANDGAPdetermines the verbosity for reporting the bandgap to the OUTCAR file.\nOnly the first character is significant.\nThe bandgap of the system separates the occupied valence bands from the unoccupied conduction bands.\nOf particular interest are the fundamental bandgap between valence band maximum (VBM) and conduction band minimum (CBM) and the direct bandgap at a singlekpoint.\nBANDGAPcontrols how VASP reports the bandgap information.\nThe following options exist:", "wiki_url": "https://www.vasp.at/wiki/index.php/BANDGAP", "description_cn": "BANDGAP参数控制VASP在OUTCAR文件中报告带隙信息的详细程度。", "default_value": "COMPACT", "details_cn": "BANDGAP决定向OUTCAR文件报告带隙的详细程度。只有第一个字符是有效的。系统的带隙将占据的价带与未占据的导带分开。特别感兴趣的是价带最大值（VBM）和导带最小值（CBM）之间的基本带隙，以及在单个k点处的直接带隙。BANDGAP控制VASP如何报告带隙信息。选项包括：COMPACT（紧凑报告）、WEIGHT（包括权重信息）、KPOINT（报告k点相关带隙）。", "recommended": "推荐使用默认值COMPACT，适用于大多数计算，提供简洁的带隙信息。如果需要详细分析带隙结构，如研究直接带隙或k点依赖性，可以设置为WEIGHT或KPOINT。", "tips": "只有输入的第一个字符有效，例如输入'C'等同于'COMPACT'。确保根据计算需求选择合适的选项，以避免输出信息过多或不足。"}, "BEXT": {"name": "BEXT", "description": "BEXT= [real] ( [real] [real] )", "default": "Default:BEXT", "details": "Description: Specifies an external magnetic field in eV.\nBEXTtag sets an external magnetic field that acts on the electrons in a Zeeman-like manner.\nAn additional potential of the following form carries this interaction:\nThe effect of the above is most easily understood for the collinear case (ISPIN=2):\nThe eigenenergies of spin-up states are raised by[math]\\displaystyle{ B_{\\rm ext} }[/math]eV, whereas the eigenenergies of spin-down states are lowered by the same amount. The total energy changes by:", "wiki_url": "https://www.vasp.at/wiki/index.php/BEXT", "description_cn": "指定一个外部磁场，单位为电子伏特（eV）。", "default_value": "默认值为0或未设置", "details_cn": "BEXT标签设置一个外部磁场，以类似塞曼效应的方式作用于电子。以下形式的附加势能承载这种相互作用：上述效应在共线情况（ISPIN=2）下最容易理解：自旋向上态的本征能量升高 B_ext eV，而自旋向下态的本征能量降低相同的量。总能量变化", "recommended": "推荐值取决于具体研究需求，例如在模拟外部磁场对磁性材料的影响时设置。使用场景包括磁性材料计算、自旋电子学等。建议根据实验条件或理论模型设置合适的值，单位为eV。", "tips": "BEXT参数仅在ISPIN=2（共线自旋极化计算）时有效；确保单位正确（eV）；可能影响计算收敛性，需谨慎设置。"}, "BEXX": {"name": "BEXX", "description": "Description:BEXXspecifies the fraction of short-range exact exchange in range-separated hybrid-functionals constructed withLMODELHF=.TRUE.", "default": "Default:BEXX", "details": "Description:BEXXspecifies the fraction of short-range exact exchange in range-separated hybrid-functionals constructed withLMODELHF=.TRUE.\nTheBEXXtag specifies the fraction of short-range exact exchange in range-separated hybrid-functionals. This tag can be used only whenLMODELHF=.TRUE. More details can be found in the description of this class ofhybrid functionals.\nAEXX,LMODELHF,ALDAX,ALDAC,AGGAX,AGGAC,AMGGAX,AMGGAC,LHFCALC,HFSCREEN,LRHFCALC,List of hybrid functionals,Hybrid functionals: formalism", "wiki_url": "https://www.vasp.at/wiki/index.php/BEXX", "description_cn": "BEXX 指定在范围分离杂化泛函中短程精确交换的比例，当 LMODELHF=.TRUE. 时构建。", "default_value": "BEXX", "details_cn": "BEXX 指定在范围分离杂化泛函中短程精确交换的比例。此标签只能在 LMODELHF=.TRUE. 时使用。更多细节可以在该类杂化泛函的描述中找到。相关参数：AEXX, LMODELHF, ALDAX, ALDAC, AGGAX, AGGAC, AMGGAX, AMGGAC, LHFCALC, HFSCREEN, LRHFCALC，杂化泛函列表，杂化泛函：形式。", "recommended": "通常为0.25，但需根据具体杂化泛函调整（如HSE06）。使用场景：在范围分离杂化泛函计算中，用于优化短程交换贡献，以提高计算精度或针对特定材料性质。", "tips": "只能在LMODELHF=.TRUE.时使用；需与其他杂化泛函参数（如AEXX、HFSCREEN等）配合；调整BEXX可能影响计算精度、收敛性和计算成本，建议先进行测试计算。"}, "BMIX": {"name": "BMIX", "description": "BMIX= [real]Default:BMIX= 1.0", "default": "BMIX= [real]Default:BMIX= 1.0", "details": "Description:BMIXsets the cutoff wave vector for Kerker mixing scheme  (IMIX=1 and/orINIMIX=1).\nThe mixed density is given by\nwith[math]\\displaystyle{ A }[/math]=AMIXand[math]\\displaystyle{ B }[/math]=BMIX", "wiki_url": "https://www.vasp.at/wiki/index.php/BMIX", "description_cn": "BMIX= [实数] 默认值：BMIX= 1.0", "default_value": "1.0", "details_cn": "BMIX 设置 Kerker 混合方案的截断波矢（当 IMIX=1 和/或 INIMIX=1 时）。混合密度由 A=AMIX 和 B=BMIX 给出。", "recommended": "通常保持默认值1.0，适用于大多数系统。对于金属系统或收敛困难的情况，可以尝试调整BMIX值（如0.5到2.0之间），以优化收敛速度。使用场景：在电子优化中，当使用Kerker混合方案（IMIX=1）时，用于控制密度混合的波矢截断，影响电荷密度更新的稳定性。", "tips": "调整BMIX可能影响计算收敛性和效率。过大的值可能导致振荡或发散，过小的值可能减慢收敛。建议在调整前进行小规模测试，并参考VASP官方文档或相关文献以获取系统特定建议。"}, "BMIX_MAG": {"name": "BMIX_MAG", "description": "BMIX_MAG= [real]Default:BMIX_MAG= 1.0", "default": "BMIX_MAG= [real]Default:BMIX_MAG= 1.0", "details": "Description: Sets the cutoff wave vector for Kerker mixing scheme (IMIX=1 and/orINIMIX=1) for the magnetization density[1].\nThe default mixing parameters for spinpolarized calculations are:\nThese settings are consistent with an (initial) spin enhancement factor of 4, which is usually a reasonable approximation.", "wiki_url": "https://www.vasp.at/wiki/index.php/BMIX_MAG", "description_cn": "设置用于磁化密度的Kerker混合方案（IMIX=1和/或INIMIX=1）的截止波矢。", "default_value": "1.0", "details_cn": "设置用于磁化密度的Kerker混合方案（IMIX=1和/或INIMIX=1）的截止波矢[1]。自旋极化计算的默认混合参数为：这些设置与（初始）自旋增强因子4一致，这通常是一个合理的近似。", "recommended": "默认值1.0通常适用于大多数自旋极化计算。使用场景：当使用Kerker混合方案（IMIX=1或INIMIX=1）时，用于控制磁化密度的混合，以优化收敛，特别是在磁性材料或自旋极化体系中。", "tips": "BMIX_MAG仅在使用Kerker混合方案时有效；调整此参数可能影响收敛速度和稳定性，建议在测试后谨慎修改。默认值基于自旋增强因子4，对于强磁系统或特殊体系，可能需要根据具体计算调整。"}, "BPARAM": {"name": "BPARAM", "description": "BPARAM= [real]Default:BPARAM= 6.3", "default": "BPARAM= [real]Default:BPARAM= 6.3", "details": "Description: The tagBPARAMspecifies the value of the parameter[math]\\displaystyle{ b }[/math]in the kernel of the nonlocal rVV10 correlation functional.\nBPARAMshould be set to 6.3, 15.7, 10, or 11.95 for the rVV10,[1]SCAN+rVV10,[2]PBE+rVV10L,[3]and r[math]\\displaystyle{ ^2 }[/math]SCAN+rVV10[4]functionals, respectively.\nCPARAM,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/BPARAM", "description_cn": "BPARAM指定非局部rVV10相关泛函核中参数b的值。", "default_value": "6.3", "details_cn": "标签BPARAM指定非局部rVV10相关泛函核中参数b的值。对于rVV10、SCAN+rVV10、PBE+rVV10L和r2SCAN+rVV10泛函，BPARAM应分别设置为6.3、15.7、10或11.95。", "recommended": "对于rVV10泛函，使用6.3；对于SCAN+rVV10泛函，使用15.7；对于PBE+rVV10L泛函，使用10；对于r2SCAN+rVV10泛函，使用11.95。使用场景：在计算中需要考虑范德华相互作用时，根据所选的非局部相关泛函设置此参数。", "tips": "BPARAM的值必须与所选的非局部相关泛函严格对应。请确保与CPARAM参数正确设置，并参考VASP手册或相关论文以获取更多信息。"}, "BSEELECTRON": {"name": "BSEELECTRON", "description": "BSEELECTRON= [real array]", "default": "", "details": "Description:BSEELECTRONsets the coordinates of the fixed electron of the exciton wavefunction\nIfBSEELECTRONis set in a BSE calculation, VASP computes exciton wavefunction for the firstNBSEEIGstates.\nThe coordinates are provided in direct (fractional) coordinates.\nWhen fixing the position of the particle, ensure that it is not fixed exactly at the center of an atom or coincides with a node of the wavefunction. To avoid that, shift the fixed coordinate slightly away from the center of the atom. Furthermore, the wavefunction of the fixed particle is taken at th", "wiki_url": "https://www.vasp.at/wiki/index.php/BSEELECTRON", "description_cn": "BSEELECTRON= [实数数组]", "default_value": "未指定", "details_cn": "BSEELECTRON 设置激子波函数中固定电子的坐标。如果在BSE计算中设置了BSEELECTRON，VASP将计算前NBSEEIG个态的激子波函数。坐标以直接（分数）坐标提供。当固定粒子的位置时，确保它不正好固定在原子的中心或与波函数的节点重合。为避免这种情况，请将固定坐标稍微偏离原子中心。", "recommended": "根据具体计算体系设置，通常为激子中电子的分数坐标。使用场景：在BSE计算中，当需要固定电子位置以计算激子波函数时使用。", "tips": "固定电子坐标时，避免将其设置在原子中心或波函数节点处，建议稍微偏移以避免数值问题。"}, "BSEHOLE": {"name": "BSEHOLE", "description": "BSEHOLE= [real array]", "default": "", "details": "Description:BSEHOLEsets the coordinates of the fixed hole of the exciton wavefunction\nIfBSEHOLEis set in a BSE calculation, VASP computes exciton wavefunction for the firstNBSEEIGstates.\nThe coordinates are provided in direct (fractional) coordinates.\nWhen fixing the position of the particle, ensure that it is not fixed exactly at the center of an atom or coincides with a node of the wavefunction. To avoid that, shift the fixed coordinate slightly away from the center of the atom. Furthermore, the wavefunction of the fixed particle is taken at th", "wiki_url": "https://www.vasp.at/wiki/index.php/BSEHOLE", "description_cn": "BSEHOLE= [实数数组]", "default_value": "未指定", "details_cn": "BSEHOLE 设置激子波函数的固定空穴坐标。如果在BSE计算中设置了BSEHOLE，VASP将计算前NBSEEIG个态的激子波函数。坐标以直接（分数）坐标提供。当固定粒子的位置时，确保它不正好固定在原子的中心或与波函数的节点重合。为避免这种情况，将固定坐标稍微偏离原子中心。此外，t", "recommended": "BSEHOLE 需要根据具体计算体系设置，没有固定推荐值。使用场景：在BSE（Bethe-Salpeter方程）计算中，当需要固定激子波函数的空穴位置以研究特定激子行为时使用，例如分析局域激子或缺陷相关激子。", "tips": "设置BSEHOLE时，确保坐标不正好位于原子中心或波函数节点上，应稍微偏移以避免数值不稳定或计算错误。"}, "BSEPREC": {"name": "BSEPREC", "description": "BSEPREC= Low | Medium | High |  AccurateDefault:BSEPREC=  Medium", "default": "BSEPREC= Low | Medium | High |  AccurateDefault:BSEPREC=  Medium", "details": "Description: Determines the precision of thetime-evolution algorithm, where it controls the timestep and the number of steps, and the precision of theLanczos algorithms, where it sets the convergence threshold for the dielectric function.\nThe timestep in the time-evolution calculation is inversely proportional to the maximum transition energyOMEGAMAXand the number of steps is inversely proportional to the broadeningCSHIFT. Depending on theBSEPRECstable these parameters are scaled depending on the precision tagBSEPREC.\nFor example, the number of steps[math]\\displaystyle{ N_{\\rm steps} }[/math]forBSEPREC= Low can be found via[math]\\displaystyle{ N_{\\rm steps}=\\frac{{\\rm OMEGAMAX}\\times 2}{{\\rm CSHIFT}/5} }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/BSEPREC", "description_cn": "BSEPREC参数用于控制BSE（Bethe-Salpeter方程）计算的精度。", "default_value": "Medium", "details_cn": "决定时间演化算法的精度，其中它控制时间步长和步数，以及Lanczos算法的精度，其中它设置介电函数的收敛阈值。时间演化计算中的时间步长与最大跃迁能量OMEGAMAX成反比，步数与展宽CSHIFT成反比。根据BSEPREC的设置，这些参数会相应缩放。可选值包括Low、Medium、High和Accurate。", "recommended": "Medium（默认），适用于大多数BSE计算。使用场景：Low用于快速测试或资源受限；Medium用于平衡精度和效率；High用于需要更高精度的计算；Accurate用于最高精度要求的研究，但计算成本最高。", "tips": "更高的精度设置会增加计算时间和内存需求。确保OMEGAMAX和CSHIFT参数合理设置，因为BSEPREC会缩放它们。建议在正式计算前进行收敛性测试。"}, "CHECKPOINT_FD": {"name": "CHECKPOINT_FD", "description": "CHECKPOINT_FD=  CONTINUE | RESET | NONE | SINGLEDefault:CHECKPOINT_FD=  RESET", "default": "CHECKPOINT_FD=  CONTINUE | RESET | NONE | SINGLEDefault:CHECKPOINT_FD=  RESET", "details": "Description: Enables a finite differences calculation to be restarted or split up into displacements.\nPhononscan be calculated usingfinite differences. A series of displacements is made, DFT calculations are performed on each of these, and then the second-order force constants are computed and the dynamical matrix constructed, from which the phonon modes and frequencies are calculated. UsingCHECKPOI\nPhonons from finite differences,Restarting finite differences calculations,IBRION,vaspcheckfd.h5,CONTCAR_disp-N", "wiki_url": "https://www.vasp.at/wiki/index.php/CHECKPOINT_FD", "description_cn": "CHECKPOINT_FD参数用于控制有限差分计算的重启或分割。", "default_value": "RESET", "details_cn": "CHECKPOINT_FD参数允许有限差分计算被重启或分割成多个位移步骤。声子可以通过有限差分法计算：首先进行一系列位移，对每个位移执行DFT计算，然后计算二阶力常数并构建动力学矩阵，从而得到声子模式和频率。相关关键词包括CHECKPOINT_FD、有限差分声子计算、重启有限差分计算、IBRION和vaspcheckfd.h5。", "recommended": "默认RESET适用于从头开始的声子计算，确保计算干净启动。如果计算中断需要继续，使用CONTINUE以利用之前的检查点。对于小系统或测试计算，可使用NONE以减少文件开销。SINGLE选项较少使用，可能用于特定优化场景。使用场景：声子计算、有限差分法、重启计算。", "tips": "使用CHECKPOINT_FD时，需确保IBRION参数设置为适当的值（如IBRION=5或6）以启用有限差分计算。检查点文件vaspcheckfd.h5可能被生成或读取，注意文件路径和权限管理。在重启计算时，确保之前的检查点文件存在且完整，避免数据丢失。"}, "CH_AMPLIFICATION": {"name": "CH_AMPLIFICATION", "description": "CH_AMPLIFICATION= [real]Default:CH_AMPLIFICATION= 1.0", "default": "CH_AMPLIFICATION= [real]Default:CH_AMPLIFICATION= 1.0", "details": "Description: This tag is used to scale (amplify) the calculated dielectric function within the supercell core-hole method and the BSE+GW method for core electrons.\nCH_LSPEC,CH_NEDOS,ICORELEVEL,CLNT,CLN,CLL,CLZ,CH_SIGMA\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/CH_AMPLIFICATION", "description_cn": "CH_AMPLIFICATION 是一个实数参数，默认值为 1.0。", "default_value": "1.0", "details_cn": "此标签用于在超胞核心空穴方法和BSE+GW方法中缩放（放大）计算的介电函数，针对核心电子。", "recommended": "推荐值为默认值 1.0。使用场景：在计算核心电子的介电函数时，如X射线吸收谱模拟，如果需要调整介电函数的幅度以匹配实验数据或优化计算精度，可以修改此参数。例如，在BSE+GW计算中，适当放大介电函数可能改善谱线形状与实验吻合度。", "tips": "1. 确保参数值为正实数，避免负值或零；2. 调整时需与相关参数（如CH_LSPEC、CH_NEDOS、ICORELEVEL等）协调，以保持计算一致性；3. 过度缩放可能导致计算不稳定或非物理结果，建议先进行小规模测试；4. 理解物理背景，仅在必要时调整，避免盲目修改。"}, "CH_LSPEC": {"name": "CH_LSPEC", "description": "CH_LSPEC= [logical]Default:CH_LSPEC= .FALSE.", "default": "CH_LSPEC= [logical]Default:CH_LSPEC= .FALSE.", "details": "Description: This flag controls whether the dielecectric function using the supercell core-hole method is calculated or not.\nHow to calculate X-ray absorption spectra from the supercell core-hole method are is explainedhere.\nThis tag should be used in combination with the following important tags for the core-hole approximation:", "wiki_url": "https://www.vasp.at/wiki/index.php/CH_LSPEC", "description_cn": "CH_LSPEC是一个逻辑参数，用于控制是否使用超胞核心空穴方法计算介电函数。", "default_value": ".FALSE.", "details_cn": "此标志控制是否使用超胞核心空穴方法计算介电函数。如何从超胞核心空穴方法计算X射线吸收光谱在此处解释。此标签应与以下核心空穴近似的重要标签结合使用：", "recommended": "默认为.FALSE.。如果需要计算X射线吸收光谱，设置为.TRUE.。使用场景：在使用超胞核心空穴方法进行X射线吸收光谱计算时启用。", "tips": "确保与其他核心空穴相关标签（如CORE_WC、CORE_W）正确组合使用。计算介电函数可能增加计算成本，需合理分配资源。"}, "CH_NEDOS": {"name": "CH_NEDOS", "description": "CH_NEDOS= [integer]Default:CH_NEDOS= 1000", "default": "CH_NEDOS= [integer]Default:CH_NEDOS= 1000", "details": "Description: This tag specifies the number of frequency (energy) grid points on the x-axis in the calculation of the dielectric function in the supercell core-hole method.\nCH_LSPEC,CH_SIGMA,CH_AMPLIFICATION,ICORELEVEL,CLNT,CLN,CLL,CLZ\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/CH_NEDOS", "description_cn": "CH_NEDOS 参数指定介电函数计算中的频率网格点数。", "default_value": "1000", "details_cn": "此标签指定在超胞核心空穴方法中计算介电函数时，x 轴上的频率（能量）网格点数。", "recommended": "默认值为 1000，适用于大多数计算场景。对于需要高分辨率或宽带隙材料的计算，可增加至 2000 或更高；对于快速测试或资源有限的情况，可减少至 500。使用场景：在使用超胞核心空穴方法（如计算光学性质或核心能级谱）时设置。", "tips": "CH_NEDOS 与 CH_LSPEC、CH_SIGMA、CH_AMPLIFICATION、ICORELEVEL、CLNT、CLN、CLL、CLZ 等参数相关，需协调设置以确保计算精度。网格点数过少可能导致分辨率不足，过多则增加计算成本；建议根据能量范围和所需精度调整，并参考 VASP 官方文档或相关文献。"}, "CH_SIGMA": {"name": "CH_SIGMA", "description": "CH_SIGMA= [real]Default:CH_SIGMA= 0.3", "default": "CH_SIGMA= [real]Default:CH_SIGMA= 0.3", "details": "Description: This tag specifies the width of the Gaussian broadening in eV of the imaginary dielectric function within the supercell core-hole method.\nAt the moment only Gaussian broadening of the dielectric function is implemented within the supercell core-hole method.\nCH_LSPEC,CH_NEDOS,CH_AMPLIFICATION,ICORELEVEL,CLNT,CLN,CLL,CLZ", "wiki_url": "https://www.vasp.at/wiki/index.php/CH_SIGMA", "description_cn": "CH_SIGMA参数指定超胞核心空穴方法中虚介电函数的高斯展宽宽度，单位为eV。", "default_value": "0.3", "details_cn": "此标签指定超胞核心空穴方法中虚介电函数的高斯展宽宽度，单位为eV。目前，在超胞核心空穴方法中仅实现了介电函数的高斯展宽。相关参数：CH_LSPEC, CH_NEDOS, CH_AMPLIFICATION, ICORELEVEL, CLNT, CLN, CLL, CLZ", "recommended": "推荐使用默认值0.3 eV，适用于一般计算场景，如初步光学性质计算。对于需要高分辨率谱线的精细计算（如吸收谱），可减小至0.1 eV或更小，但需确保计算收敛并权衡计算成本。", "tips": "展宽宽度影响谱线的平滑度和分辨率；过小的值可能引入计算噪声，过大的值可能平滑掉谱线细节。建议根据具体计算目标调整，并与CH_NEDOS等参数配合使用以优化结果。"}, "CLL": {"name": "CLL", "description": "Description:CLLselects the angular quantum number[math]\\displaystyle{ l }[/math]of the excited core electron when usingICORELEVEL>0.", "default": "Default:CLL", "details": "Description:CLLselects the angular quantum number[math]\\displaystyle{ l }[/math]of the excited core electron when usingICORELEVEL>0.\nICORELEVEL,CLZCLNT,CLN,CLLLADDER,LHARTREE,NBANDSV,NBANDSO,OMEGAMAX,ANTIRES\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/CLL", "description_cn": "CLL 选择当使用 ICORELEVEL>0 时激发的核心电子的角量子数 l。", "default_value": "CLL", "details_cn": "CLL 选择当使用 ICORELEVEL>0 时激发的核心电子的角量子数 l。", "recommended": "根据计算的核心电子壳层设置角量子数 l，例如 K 壳层（l=0）、L 壳层（l=1）、M 壳层（l=2）等。使用场景：在 VASP 中进行核心能级激发计算时，需设置 ICORELEVEL>0 并指定 CLL 以定义激发电子的角动量，常用于 X 射线吸收谱或核心能级位移模拟。", "tips": "1. 仅当 ICORELEVEL>0 时 CLL 参数才生效；2. 角量子数 l 必须与所选核心电子壳层匹配，否则计算可能出错；3. 建议与其他核心能级参数（如 CLZCLNT、CLN、CLLLADDER 等）协调设置以确保计算准确性；4. 确保计算体系包含对应的核心电子，否则参数无效。"}, "CLN": {"name": "CLN", "description": "Description:CLNselects the main quantum number[math]\\displaystyle{ n }[/math]of the excited core electron when usingICORELEVEL>0.", "default": "Default:CLN", "details": "Description:CLNselects the main quantum number[math]\\displaystyle{ n }[/math]of the excited core electron when usingICORELEVEL>0.\nICORELEVEL,CLNT,CLN,CLLLADDER,LHARTREE,NBANDSV,NBANDSO,OMEGAMAX,ANTIRES\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/CLN", "description_cn": "CLN 选择当使用 ICORELEVEL>0 时激发的核心电子的主量子数 n。", "default_value": "CLN", "details_cn": "CLN 选择当使用 ICORELEVEL>0 时激发的核心电子的主量子数 n。", "recommended": "推荐值取决于要激发的核心电子的主量子数，例如对于K壳层设置为1，L壳层设置为2。使用场景是在进行核心能级计算时，当ICORELEVEL>0时设置此参数。", "tips": "确保CLN与ICORELEVEL参数配合使用，并根据计算的元素和核心壳层正确设置主量子数。"}, "CLNT": {"name": "CLNT", "description": "Description:CLNTselects the type of the excited atoms in XAS calculations withICORELEVEL>0.", "default": "Default:CLNT", "details": "Description:CLNTselects the type of the excited atoms in XAS calculations withICORELEVEL>0.\nAll atoms of the selected type are excited in the XAS calculation withICORELEVEL=2. Hence, it is recommended that the  excited atom is separated into a dedicated type with a single atom. Exciting multiple atoms in the supercell core-hole approach causes the interaction between core holes in neighbor\nSee a detailed description on how to set this tag in theSCHandBSEcalculations.", "wiki_url": "https://www.vasp.at/wiki/index.php/CLNT", "description_cn": "CLNT 在 ICORELEVEL>0 的 XAS 计算中选择激发原子的类型。", "default_value": "未指定", "details_cn": "CLNT 在 ICORELEVEL>0 的 XAS 计算中选择激发原子的类型。在 ICORELEVEL=2 的 XAS 计算中，所选类型的所有原子都会被激发。因此，建议将激发原子分离到一个专用类型中，只包含一个原子。在超胞核心空穴方法中激发多个原子会导致相邻核心空穴之间的相互作用。有关如何在 SC 和 BSE 计算中设置此标签的详细说明，请参阅相关文档。", "recommended": "推荐将激发原子分离到一个专用类型中，并设置 CLNT 为该类型的索引（例如，如果激发原子是类型 1，则设置 CLNT=1）。使用场景：在 XAS（X射线吸收光谱）计算中，当 ICORELEVEL>0 时，用于指定激发原子的类型。", "tips": "避免在超胞中激发多个原子，以防止核心空穴之间的相互作用。请确保激发原子类型只包含一个原子，并参考 SC 和 BSE 计算的设置说明进行正确配置。"}, "CLZ": {"name": "CLZ", "description": "Description:CLZselects a fractional or the full electron charge for the core hole in the core-excitation calculations withICORELEVEL=2.", "default": "Default:CLZ", "details": "Description:CLZselects a fractional or the full electron charge for the core hole in the core-excitation calculations withICORELEVEL=2.\nInSCHCLZcan be used to introduce a fraction of the core hole. For example, a half-core hole can be created to simulate a transition state in the X-ray excitation process.\nICORELEVEL,CLNT,CLN,CLLLADDER,LHARTREE,NBANDSV,NBANDSO,OMEGAMAX,ANTIRES", "wiki_url": "https://www.vasp.at/wiki/index.php/CLZ", "description_cn": "CLZ 用于在核心激发计算中（ICORELEVEL=2）选择核心空穴的分数或全电子电荷。", "default_value": "无", "details_cn": "CLZ 用于在核心激发计算中（ICORELEVEL=2）选择核心空穴的分数或全电子电荷。在 VASP 中，CLZ 可用于引入分数核心空穴。例如，可以创建半核心空穴来模拟 X 射线激发过程中的过渡态。相关参数：ICORELEVEL, CLNT, CLN, CLLLADDER, LHARTREE, NBANDSV, NBANDSO, OMEGAMAX, ANTIRES", "recommended": "根据核心激发计算的具体需求设置。例如，对于全电子核心空穴，设置 CLZ=1.0；对于分数核心空穴，如半核心空穴，设置 CLZ=0.5。使用场景：当使用 ICORELEVEL=2 进行 X 射线吸收谱等核心激发计算时。", "tips": "1. 确保 ICORELEVEL 设置为 2 以启用 CLZ 参数。2. 分数核心空穴的设置需要谨慎，可能影响计算结果的准确性。3. 与其他相关参数如 CLNT、CLN 等配合使用，以确保计算正确。"}, "CMBJ": {"name": "CMBJ", "description": "CMBJ= [real (array)]Default:CMBJ= calculated self-consistently", "default": "CMBJ= [real (array)]Default:CMBJ= calculated self-consistently", "details": "Description: defines the[math]\\displaystyle{ c }[/math]parameter in the MBJ potential.\nTheCMBJtag can be set in the following ways:\nIfCMBJis not set,[math]\\displaystyle{ c }[/math]is calculated at each electronic step as the average of[math]\\displaystyle{ \\left\\vert\\nabla n\\right\\vert/n }[/math]in the unit cell, as explained in the description of theMETAGGAtag.", "wiki_url": "https://www.vasp.at/wiki/index.php/CMBJ", "description_cn": "CMBJ= [实数（数组）] 默认值：CMBJ= 自洽计算", "default_value": "自洽计算", "details_cn": "定义MBJ势中的c参数。CMBJ标签可以通过以下方式设置：如果未设置CMBJ，则c在每个电子步中计算为单胞中|∇n|/n的平均值，如METAGGA标签的描述中所述。", "recommended": "推荐使用默认自洽计算，适用于大多数半导体和绝缘体体系的带隙计算。如果需要精确调控，可手动设置实数值，但需基于体系电子密度特性进行测试。", "tips": "CMBJ参数通常与METAGGA标签（如MBJ）配合使用，以改进带隙预测。手动设置时，值应基于体系验证，避免过大或过小导致计算不稳定。自洽计算可能增加计算耗时。"}, "CMBJA": {"name": "CMBJA", "description": "Description: sets the[math]\\displaystyle{ \\alpha }[/math]parameter in the MBJ and LMBJ potentials.", "default": "Default:CMBJA", "details": "Description: sets the[math]\\displaystyle{ \\alpha }[/math]parameter in the MBJ and LMBJ potentials.\nSee the description of theMETAGGAtag.\nMETAGGA,CMBJ,CMBJB,CMBJE,SMBJ,RSMBJ,LASPH,LMAXTAU,LMIXTAU", "wiki_url": "https://www.vasp.at/wiki/index.php/CMBJA", "description_cn": "设置 MBJ 和 LMBJ 势中的 α 参数。", "default_value": "CMBJA", "details_cn": "设置 MBJ 和 LMBJ 势中的 α 参数。参见 METAGGA 标签的描述。相关参数：METAGGA, CMBJ, CMBJB, CMBJE, SMBJ, RSMBJ, LASPH, LMAXTAU, LMIXTAU。", "recommended": "推荐值取决于具体材料体系，通常对于标准带隙计算，α 参数默认值可能为 0.5 或类似值，但建议通过测试优化。使用场景：当使用 METAGGA = MBJ 或 LMBJ 进行半导体或绝缘体的带隙计算时，调整 CMBJA 可以改善计算精度。", "tips": "1. 确保 METAGGA 标签设置为 MBJ 或 LMBJ，否则 CMBJA 参数无效。2. 参数值需在合理范围内（如 0.1 到 1.0），建议参考 VASP 手册或进行收敛测试。3. 与其他相关参数（如 CMBJ、CMBJB）协调使用，以避免冲突。"}, "CMBJB": {"name": "CMBJB", "description": "Description: sets the[math]\\displaystyle{ \\beta }[/math]parameter in the MBJ and LMBJ potentials.", "default": "Default:CMBJB", "details": "Description: sets the[math]\\displaystyle{ \\beta }[/math]parameter in the MBJ and LMBJ potentials.\nSee the description of theMETAGGAtag.\nMETAGGA,CMBJ,CMBJA,CMBJE,SMBJ,RSMBJ,LASPH,LMAXTAU,LMIXTAU", "wiki_url": "https://www.vasp.at/wiki/index.php/CMBJB", "description_cn": "设置MBJ和LMBJ势中的β参数。", "default_value": "无默认值，需用户指定", "details_cn": "设置MBJ和LMBJ势中的β参数。参见METAGGA标签的描述。相关标签：METAGGA, CMBJ, CMBJA, CMBJE, SMBJ, RSMBJ, LASPH, MAXTAU, LMIXTAU", "recommended": "β参数通常在0.5到1.0之间，具体值需根据材料类型和计算目标调整。例如，对于半导体或绝缘体，β=0.5可能合适；对于金属或复杂体系，可能需要优化。使用场景：当使用METAGGA标签设置为MBJ或LMBJ势时，用于精确计算带隙，特别是在需要改进交换关联势准确性的第一性原理计算中。", "tips": "β参数对带隙计算结果敏感，建议通过收敛测试或参考文献确定最佳值。确保与其他相关标签如LASPH、MAXTAU等正确配合使用，以避免计算误差。"}, "CMBJE": {"name": "CMBJE", "description": "CMBJE= [real]Default:CMBJE= 0.5", "default": "CMBJE= [real]Default:CMBJE= 0.5", "details": "Description: sets the[math]\\displaystyle{ e }[/math]parameter in the MBJ and local MBJ potentials.\nSee the description of theMETAGGAtag.\nMETAGGA,CMBJ,CMBJA,CMBJB,SMBJ,RSMBJ,LASPH,LMAXTAU,LMIXTAU", "wiki_url": "https://www.vasp.at/wiki/index.php/CMBJE", "description_cn": "CMBJE是一个实数参数，用于设置MBJ和局部MBJ势中的e参数。", "default_value": "0.5", "details_cn": "设置MBJ和局部MBJ势中的e参数。参见METAGGA标签的描述。相关参数：METAGGA, CMBJ, CMBJA, CMBJB, SMBJ, RSMBJ, LASPH, LMAXTAU, LMIXTAU。", "recommended": "默认值0.5适用于一般情况，但对于特定体系（如半导体或绝缘体），建议在0.5到1.0范围内调整以优化带隙计算。使用场景：当使用METAGGA标签设置为MBJ或相关势时，用于精确计算带隙，特别是强关联体系。", "tips": "CMBJE参数仅在METAGGA设置为MBJ或类似势时生效。调整时需基于测试计算，避免过度拟合。建议与其他相关参数（如CMBJ）配合使用，并参考VASP文档以确保准确性。"}, "CPARAM": {"name": "CPARAM", "description": "CPARAM= [real]Default:CPARAM= 0.0093", "default": "CPARAM= [real]Default:CPARAM= 0.0093", "details": "Description: The tagCPARAMallows to specify the value of the parameter[math]\\displaystyle{ C }[/math]in the kernel of the nonlocal rVV10 correlation functional.[1]\nBPARAM,Nonlocal vdW-DF functionals", "wiki_url": "https://www.vasp.at/wiki/index.php/CPARAM", "description_cn": "CPARAM参数用于指定非局部rVV10关联泛函中参数C的值。", "default_value": "0.0093", "details_cn": "标签CPARAM允许指定非局部rVV10关联泛函核中参数C的值。[1] BPARAM，非局部vdW-DF泛函", "recommended": "默认值0.0093适用于大多数情况。在使用rVV10泛函进行范德华校正计算时，如果需要微调关联泛函，可以调整此参数。", "tips": "调整CPARAM可能会影响计算精度，建议参考文献或进行收敛性测试。确保在使用非局部vdW-DF泛函时正确设置。"}, "CSHIFT": {"name": "CSHIFT", "description": "Description:CSHIFTsets a Lorentzian broadening in eV of the dielectric tensor via the complex shift η in theKramers-Kronig transformationof the response function.", "default": "Default:CSHIFT", "details": "Description:CSHIFTsets a Lorentzian broadening in eV of the dielectric tensor via the complex shift η in theKramers-Kronig transformationof the response function.\nThe defaultCSHIFT=0.1 is perfectly acceptable for most calculations and causes a slight smoothing of the real part of the dielectric function. If the gap is very small (i.e. approaching two timesCSHIFT), slight inaccuracies in the static dielectric constant are possible, which can be remedied by dec\nOMEGAMIN,OMEGAMAX,LOPTICS,Examples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/CSHIFT", "description_cn": "CSHIFT 设置介电张量的洛伦兹展宽（以eV为单位），通过响应函数的Kramers-Kronig变换中的复数位移η来实现。", "default_value": "0.1", "details_cn": "CSHIFT 设置介电张量的洛伦兹展宽（以eV为单位），通过响应函数的Kramers-Kronig变换中的复数位移η来实现。默认值CSHIFT=0.1对于大多数计算是完全可以接受的，并且会导致介电函数实部的轻微平滑。如果带隙非常小（即接近两倍CSHIFT），静态介电常数可能会有轻微不准确，这可以通过减小OMEGAMIN、增大OMEGAMAX、使用LOPTICS等方法来补救。", "recommended": "对于大多数计算，使用默认值0.1。对于带隙很小的系统（例如接近0.2 eV），可以考虑减小CSHIFT值（如0.05或更小）以避免不准确。使用场景：在VASP中计算光学性质时，特别是使用LOPTICS标签计算介电函数时，CSHIFT用于控制展宽，以平滑结果并提高数值稳定性。", "tips": "1. 默认值0.1通常足够，但需根据体系带隙调整；如果带隙小于两倍CSHIFT，静态介电常数可能不准确。2. 对于小带隙系统，建议结合调整OMEGAMIN和OMEGAMAX参数，或使用LOPTICS来优化计算。3. 确保计算中其他相关参数（如OMEGAMIN、OMEGAMAX）设置合理，以避免数值问题。"}, "CUTOFF_MU": {"name": "CUTOFF_MU", "description": "CUTOFF_MU=  [real] ( [real] )", "default": "Default:CUTOFF_MU", "details": "Description:CUTOFF_MUspecifies the energy cutoff[math]\\displaystyle{ \\mu }[/math]in eV for the function specified byCUTOFF_MU.\nThe value[math]\\displaystyle{ \\mu }[/math]ofCUTOFF_MUcorresponds to the energy cutoff of the cutoff function used to obtain Wannier functions with theone-shot method.\nThe meaning of[math]\\displaystyle{ \\mu }[/math]depends on theCUTOFF_TYPEtag.\nFor spin-polarized calculations (ISPIN= 2), two values can be specified forCUTOFF_MU, one for each spin channel.\nIf only a single value is specified, it will be used for both spin channels.", "wiki_url": "https://www.vasp.at/wiki/index.php/CUTOFF_MU", "description_cn": "CUTOFF_MU= [实数] ( [实数] )", "default_value": "CUTOFF_MU", "details_cn": "CUTOFF_MU 指定了函数 CUTOFF_MU 的能量截断 μ，单位为 eV。CUTOFF_MU 的值 μ 对应于用于通过单步法获得 Wannier 函数的截断函数的能量截断。μ 的含义取决于 CUTOFF_TYPE 标签。对于自旋极化计算（ISPIN=2），可以为 CUTOFF_MU 指定两个值，每个自旋通道一个。如果只指定一个值...", "recommended": "取决于系统类型和 CUTOFF_TYPE 设置。对于绝缘体，通常设置为费米能级以上 1-2 eV；对于金属，需根据能带结构调整。使用场景：在使用单步法计算 Wannier 函数时设置。", "tips": "确保 CUTOFF_MU 与 CUTOFF_TYPE 标签一致；对于自旋极化计算（ISPIN=2），需指定两个值；避免设置过高或过低的值，以免影响计算收敛和精度。"}, "CUTOFF_SIGMA": {"name": "CUTOFF_SIGMA", "description": "CUTOFF_SIGMA=  [real] ( [real] )", "default": "Default:CUTOFF_SIGMA", "details": "Description:CUTOFF_SIGMAspecifies the broadening[math]\\displaystyle{ \\sigma }[/math]in eV for the cutoff function specified byCUTOFF_TYPE.\nCorresponds to a broadening of the cutoff function used in theone-shot methodto obtain Wannier functions.\nThe meaning of[math]\\displaystyle{ \\sigma }[/math]depends on theCUTOFF_TYPEtag.\nFor spin-polarized calculations (ISPIN= 2), two values can be specified forCUTOFF_SIGMA, one for each spin channel.\nIf only a single value is specified, it will be used for both spin channels.", "wiki_url": "https://www.vasp.at/wiki/index.php/CUTOFF_SIGMA", "description_cn": "CUTOFF_SIGMA参数指定一个实数值（或两个实数值），用于定义截断函数的展宽。", "default_value": "无默认值", "details_cn": "CUTOFF_SIGMA 指定了由 CUTOFF_TYPE 指定的截断函数的展宽 σ（以 eV 为单位）。对应于在 one-shot 方法中获取 Wannier 函数时使用的截断函数的展宽。σ 的含义取决于 CUTOFF_TYPE 标签。对于自旋极化计算（ISPIN=2），可以为 CUTOFF_SIGMA 指定两个值，每个自旋通道一个。如果只指定一个值，它将用于两个自旋通道。", "recommended": "通常为 0.1-1.0 eV，具体取决于 CUTOFF_TYPE 和系统。建议从 0.2 eV 开始测试，并根据计算收敛性调整。使用场景：在 one-shot 方法中计算 Wannier 函数时使用。", "tips": "1. 确保 CUTOFF_TYPE 参数已正确设置，因为 σ 的含义取决于它。2. 对于自旋极化计算（ISPIN=2），可以指定两个值分别用于每个自旋通道；如果只指定一个值，它将同时用于两个通道。3. 展宽值的选择会影响 Wannier 函数的局域性和计算精度，需要根据具体系统进行优化。4. 建议查阅 VASP 官方文档或相关文献以获取更详细的指导。"}, "CUTOFF_TYPE": {"name": "CUTOFF_TYPE", "description": "CUTOFF_TYPE= erfc | gaussian | fermi | num_wann", "default": "Default:CUTOFF_TYPE", "details": "Description:CUTOFF_TYPEchooses the type of cutoff function to be used before performing the singular-value decomposition (SVD) of the initial projections matrix.\nThis tag governs how much weight should be given in the SVD during theone-shot Wannierizationto a certain orbital with energy[math]\\displaystyle{ \\epsilon_{n\\mathbf{k}} }[/math].\nIf the weight is zero the orbital is not included in the fitting while if it is one it is included with the maximum impor\nIn order to obtain a good Wannierization, a certain level of freedom should be given to the localized orbitals to adequately accommodate the Bloch states.\nApplying a smooth cutoff function from the following table can help achieve this goal by including more states beyond the relevant energy range.\n", "wiki_url": "https://www.vasp.at/wiki/index.php/CUTOFF_TYPE", "description_cn": "CUTOFF_TYPE参数用于选择截断函数的类型，可选值为erfc、gaussian、fermi或num_wann。", "default_value": "默认:CUTOFF_TYPE", "details_cn": "CUTOFF_TYPE选择在初始投影矩阵的奇异值分解（SVD）之前使用的截断函数类型。此标签控制在单次Wannier化过程中，对于具有能量ε_{n𝐤}的某个轨道，在SVD中应给予多少权重。如果权重为零，则该轨道不包括在拟合中；如果权重为一，则以最大重要性包括在内。为了获得良好的Wannier化...", "recommended": "erfc。使用场景：作为默认截断函数，适用于大多数Wannier化计算，提供平滑的权重分配。对于特定体系，如金属，可考虑fermi截断；对于需要精确控制Wannier函数数量的情况，可使用num_wann。", "tips": "截断函数的选择会影响Wannier化的收敛性和准确性。建议先使用默认值erfc进行测试，再根据计算结果调整。确保CUTOFF_TYPE与投影矩阵的维度和体系特性匹配。"}, "Construction:DEG_THRESHOLD": {"name": "Construction:DEG_THRESHOLD", "description": "Return toMain page.", "default": "", "details": "", "wiki_url": "https://www.vasp.at/wiki/index.php/Construction:DEG_THRESHOLD", "description_cn": "构造参数：简并度阈值", "default_value": "未指定（通常由程序内部默认值决定）", "details_cn": "该参数用于在能带结构计算或电子态分析中，判断两个或多个能级是否被视为简并态。当两个能级之间的能量差小于或等于此阈值时，程序会将其视为简并态进行处理。这通常影响能带标记、态密度计算或对称性分析等后续步骤。", "recommended": "推荐值：0.001 eV 至 0.01 eV。使用场景：在计算能带结构或进行对称性分析时，如果需要精确区分接近的能级，可适当降低此值（如0.001 eV）；若关注宏观简并特性或计算资源有限，可适当提高（如0.01 eV）。具体值需根据体系能量尺度和计算精度需求调整。", "tips": "注意事项：1. 阈值设置过小可能导致计算量增加，且对数值噪声敏感；设置过大可能错误合并本应分离的能级。2. 建议先以默认值进行测试，再根据能带图或态密度结果微调。3. 该参数可能与其他简并处理参数（如SIGMA）协同作用，需整体考虑。"}, "Construction:MAXDIS": {"name": "Construction:MAXDIS", "description": "", "default": "", "details": "", "wiki_url": "https://www.vasp.at/wiki/index.php/Construction:MAXDIS", "description_cn": "用于控制结构构造过程中离子最大位移的参数。", "default_value": "未指定", "details_cn": "该参数在VASP计算中用于限制结构优化或分子动力学模拟中离子每一步的最大位移距离，以防止过大的位移导致计算不稳定或发散。它通常与结构优化算法（如IBRION）结合使用，确保位移步长在合理范围内。", "recommended": "0.1 Å 至 0.5 Å。使用场景：适用于结构优化、分子动力学模拟，特别是当体系包含轻元素或需要精细调整时。对于高精度计算，可设置较小值如0.05 Å；对于快速收敛，可尝试较大值如0.3 Å。", "tips": "设置值过小可能导致收敛速度缓慢，增加计算时间；设置值过大可能导致计算不稳定或发散。应根据具体体系（如原子类型、键长）和计算类型（如静态计算、动态模拟）进行调整。建议在测试计算中先使用默认或推荐值，再根据收敛情况优化。"}, "DEPER": {"name": "DEPER", "description": "DEPER= [real]Default:DEPER= 0.3", "default": "DEPER= [real]Default:DEPER= 0.3", "details": "Description:DEPERspecifies a relative stopping criterion for the optimization of an eigenvalue.\nThe tagsDEPER,WEIMIN, andEBREAKallow fine tuning of the iterative matrix diagonalization, and are best not changed. They are optimized for a large variety of systems, and changing one of the parameters usually decreases performance or can even screw up the iterative matrix diagonalization totally.\nI\nDEPERspecifies a relative break-criterion: the optimization of a band is stopped after the energy change becomes smaller thanDEPERmultiplied with the energy change in the first iterative optimization step. The maximum number of optimization steps is always 4.", "wiki_url": "https://www.vasp.at/wiki/index.php/DEPER", "description_cn": "DEPER是一个实数参数，用于指定本征值优化的相对停止准则，默认值为0.3。", "default_value": "0.3", "details_cn": "DEPER指定了一个相对停止准则，用于优化本征值。标签DEPER、WEIMIN和EBREAK允许微调迭代矩阵对角化，最好不更改。它们针对多种系统进行了优化，更改其中一个参数通常会降低性能，甚至可能完全破坏迭代矩阵对角化。DEPER指定了一个相对中断准则：当能量变化后，一个能带的优化停止。", "recommended": "推荐使用默认值0.3。适用于大多数第一性原理计算系统，无需更改，以确保计算稳定性和性能。", "tips": "不要随意更改DEPER参数，除非有特定需求。更改可能降低计算性能或导致迭代矩阵对角化失败。"}, "DFTD4_MODEL": {"name": "DFTD4_MODEL", "description": "DFTD4_MODEL= [string]Default:DFTD4_MODEL= D4", "default": "DFTD4_MODEL= [string]Default:DFTD4_MODEL= D4", "details": "Description:DFTD4_MODELdefines the model in theDFT-D4method.\nDFTD4_MODELdefines the model (DFTD4_MODEL=D4 or D4S) in theDFT-D4method.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/DFTD4_MODEL", "description_cn": "DFTD4_MODEL定义DFT-D4方法中的模型。", "default_value": "D4", "details_cn": "DFTD4_MODEL定义DFT-D4方法中的模型。DFTD4_MODEL定义DFT-D4方法中的模型（DFTD4_MODEL=D4 或 D4S）。使用此标签的示例。", "recommended": "推荐使用DFTD4_MODEL=D4，适用于大多数需要色散校正的计算，如分子吸附、层状材料等。D4S可能用于计算资源有限或简化场景。", "tips": "确保VASP版本支持DFT-D4方法（如VASP 6.3.0及以上）；需配合IVDW参数启用色散校正；根据体系精度需求选择模型，D4更精确，D4S更高效。"}, "DFTD4_XC": {"name": "DFTD4_XC", "description": "DFTD4_XC= [string]Default:DFTD4_XC= The functional set by theGGA,METAGGAorXCtag.", "default": "DFTD4_XC= [string]Default:DFTD4_XC= The functional set by theGGA,METAGGAorXCtag.", "details": "Description:DFTD4_XCsets the exchange-correlation functional which determines the van der Waals parameters used in the DFT-D4 method implemented in theDFT-D4package.\nDFTD4_XCallows to choose the exchange-correlation functional that determines which set of van der Waals parameters is used in the DFT-D4 method implemented in theDFT-D4package (IVDW=13).\nThe possible choices (e.g.,DFTD4_XC=pbe, hse06, ...) are listed in the file param.f90 of theDFT-D4source code.", "wiki_url": "https://www.vasp.at/wiki/index.php/DFTD4_XC", "description_cn": "DFTD4_XC= [字符串] 默认值：DFTD4_XC= 由GGA、METAGGA或XC标签设置的泛函。", "default_value": "由GGA、METAGGA或XC标签设置的泛函", "details_cn": "DFTD4_XC设置交换关联泛函，该泛函决定了在DFT-D4包中实现的DFT-D4方法中使用的范德华参数。DFTD4_XC允许选择交换关联泛函，该泛函决定了在DFT-D4包中实现的DFT-D4方法（IVDW=13）中使用的范德华参数集。可能的选择（例如，DFTD4_XC=pbe, hse06, ...）列在DFT-D4源代码的param.f90文件中。", "recommended": "应与INCAR中设置的GGA、METAGGA或XC标签一致。例如，如果使用PBE泛函，设置DFTD4_XC=pbe；如果使用HSE06，设置DFTD4_XC=hse06。使用场景：当启用DFT-D4方法（IVDW=13）进行范德华校正时，需要设置此参数以确保参数匹配。", "tips": "1. 确保DFTD4_XC与INCAR中的泛函设置一致，否则可能导致不准确的范德华参数。2. 参考DFT-D4源代码的param.f90文件以获取支持的泛函列表。3. 如果未显式设置，默认使用INCAR中指定的泛函。"}, "DIMER_DIST": {"name": "DIMER_DIST", "description": "DIMER_DIST= [real]Default:DIMER_DIST= 0.01", "default": "DIMER_DIST= [real]Default:DIMER_DIST= 0.01", "details": "Description: The flagDIMER_DISTdefines the step size for the numerical differentiation (in[math]\\displaystyle{ \\AA }[/math]) for theImproved Dimer Method.\nImproved Dimer Method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/DIMER_DIST", "description_cn": "DIMER_DIST 定义了改进二聚体方法中数值微分的步长（单位为埃）。", "default_value": "0.01", "details_cn": "DIMER_DIST 标志定义了改进二聚体方法中数值微分的步长（单位为埃）。", "recommended": "默认值0.01 Å通常适用。使用场景：在离子弛豫或分子动力学模拟中，当使用改进二聚体方法寻找过渡态时，可调整此参数以控制数值微分的精度。", "tips": "步长过小可能导致数值误差或计算不稳定，过大可能降低精度。建议根据系统大小和精度要求进行测试，通常从默认值开始调整。"}, "DIPOL": {"name": "DIPOL", "description": "Description: specifies the center of the cell in direct lattice coordinates with respect to which the total dipole-moment in the cell is calculated.", "default": "", "details": "Description: specifies the center of the cell in direct lattice coordinates with respect to which the total dipole-moment in the cell is calculated.\nThe center of the cell w.r.t. which the total dipole-moment in the cell is calculated is specified as\nwhereRx,RyandRzare given in direct lattice coordinates.", "wiki_url": "https://www.vasp.at/wiki/index.php/DIPOL", "description_cn": "指定单元格的中心，以直接晶格坐标表示，用于计算单元格内的总偶极矩。", "default_value": "无默认值", "details_cn": "指定单元格的中心，以直接晶格坐标表示，用于计算单元格内的总偶极矩。单元格的中心，相对于其计算总偶极矩，被指定为其中Rx、Ry和Rz以直接晶格坐标给出。", "recommended": "根据具体系统设置，例如对于表面计算，通常设置为表面中心坐标（如0.5,0.5,0.5）；对于分子或非周期性系统，设置为分子或单元格的几何中心。使用场景：主要用于计算表面偶极矩、功函数、电荷分布等，尤其在涉及电场或极化效应的计算中。", "tips": "确保坐标以直接晶格坐标（分数坐标）正确输入；在周期性边界条件下，错误设置可能导致偶极矩计算不准确；建议结合LDIPOL和IDIPOL参数使用以优化计算。"}, "DQ": {"name": "DQ", "description": "DQ= [real]Default:DQ=  0.001", "default": "DQ= [real]Default:DQ=  0.001", "details": "Description: step size for the finite differencek-space derivative in the linear response calculation of chemical shifts.\nTypical values forDQare in the range [0.001 - 0.003]. The default is often sufficient.\nLCHIMAG,ICHIBARE,LNMR_SYM_RED,NLSPLINE", "wiki_url": "https://www.vasp.at/wiki/index.php/DQ", "description_cn": "DQ是一个实数参数，默认值为0.001。", "default_value": "0.001", "details_cn": "在化学位移的线性响应计算中，有限差分k空间导数的步长。DQ的典型值在[0.001 - 0.003]范围内。默认值通常足够。LCHIMAG,ICHIBARE,LNMR_SYM_RED,NLSPLINE", "recommended": "默认值0.001通常足够，适用于一般化学位移计算。如需更高精度，可调整至0.001-0.003范围内，具体取决于计算精度需求。", "tips": "DQ参数与LCHIMAG、ICHIBARE、LNMR_SYM_RED、NLSPLINE等参数相关，使用时需确保这些参数正确设置以进行线性响应计算。调整DQ值可能影响计算精度和效率，建议在测试后确定最佳值。"}, "EBREAK": {"name": "EBREAK", "description": "EBREAK= [real]Default:EBREAK=EDIFF/NBANDS/4", "default": "EBREAK= [real]Default:EBREAK=EDIFF/NBANDS/4", "details": "Description:EBREAKspecifies an absolute stopping criterion for the optimization of an eigenvalue.\nThe tagsEBREAK,DEPER, andWEIMINallow fine tuning of the iterative matrix diagonalization, and are best not changed. They are optimized for a large variety of systems, and changing one of the parameters usually decreases performance or can even screw up the iterative matrix diagonalization totally.\nI\nEBREAKdetermines whether a band is fully converged or not. Optimization of an eigenvalue/eigenvectors pair is stopped if the change in the eigenenergy is smaller thanEBREAK.", "wiki_url": "https://www.vasp.at/wiki/index.php/EBREAK", "description_cn": "EBREAK= [实数] 默认值：EBREAK=EDIFF/NBANDS/4", "default_value": "EDIFF/NBANDS/4", "details_cn": "EBREAK指定了一个绝对停止准则，用于优化一个本征值。标签EBREAK、DEPER和WEIMIN允许对迭代矩阵对角化进行微调，最好不要更改。它们针对多种系统进行了优化，更改其中一个参数通常会降低性能，甚至可能完全搞乱迭代矩阵对角化。EBREAK决定一个能带是否完全收敛。优化一个本征值/本征向量。", "recommended": "推荐使用默认值EBREAK=EDIFF/NBANDS/4，适用于大多数系统。不建议更改，除非有特殊需求，例如在收敛困难或需要精细控制时。", "tips": "更改EBREAK、DEPER或WEIMIN参数可能会降低性能或导致迭代矩阵对角化失败。这些参数已针对多种系统优化，建议保持默认，除非您对VASP有深入了解并明确知道更改的影响。"}, "EDIFF": {"name": "EDIFF", "description": "EDIFF= [real]Default:EDIFF=[math]\\displaystyle{ 10^{-4} }[/math]", "default": "EDIFF= [real]Default:EDIFF=[math]\\displaystyle{ 10^{-4} }[/math]", "details": "Description:EDIFFspecifies the global break condition for the electronic SC-loop.EDIFFis specified in units of eV.\nThe relaxation of the electronic degrees of freedom stops if the total (free) energy change and the band-structure-energy change ('change of eigenvalues') between two steps are both smaller thanEDIFF(in eV). ForEDIFF=0, strictlyNELMelectronic self-consistency steps will be performed.\nIn most cases, the convergence speed is quadratic, so often the cost for the additional iterations is small. Hence, for well converged calculations, we strongly recommend to decreaseEDIFFto 1E-6. For finite difference calculations (e.g. phonons), evenEDIFF= 1E-7 might be required in order to obtain ", "wiki_url": "https://www.vasp.at/wiki/index.php/EDIFF", "description_cn": "EDIFF指定电子自洽循环的全局中断条件。", "default_value": "10^{-4}", "details_cn": "EDIFF指定电子自洽循环的全局中断条件。EDIFF以eV为单位。如果两个步骤之间的总（自由）能量变化和带结构能量变化（'本征值变化'）都小于EDIFF（以eV为单位），则电子自由度的弛豫停止。对于EDIFF=0，将严格执行NELM次电子自洽步骤。在大多数情况下，收敛速度是二次的，因此额外迭代的成本通常...", "recommended": "默认值10^{-4} eV适用于大多数标准计算，如几何优化或能量计算。对于高精度计算，如能带结构、态密度或光学性质，建议使用10^{-6} eV或更小以确保收敛。对于快速预计算或初步结构扫描，可使用10^{-3} eV以加快收敛速度。", "tips": "EDIFF值过小可能导致计算时间显著增加，过大可能导致收敛不精确，影响结果可靠性。设置EDIFF=0时，VASP将执行固定次数的电子步（NELM），而不检查能量收敛，适用于需要控制迭代次数的特殊场景。建议根据计算精度和效率需求调整EDIFF。"}, "EDIFFG": {"name": "EDIFFG", "description": "EDIFFG= [real]Default:EDIFFG=EDIFF×10", "default": "EDIFFG= [real]Default:EDIFFG=EDIFF×10", "details": "Description:EDIFFGdefines the break condition for the ionic relaxation loop.\nWhenEDIFFGis positive, the relaxation is stopped when the change of the total energy is smaller thanEDIFFGbetween two ionic steps.\nWhenEDIFFGis negative, the relaxation is stopped when the norms of all the forces are smaller than |EDIFFG|. This is usually a more convenient setting.", "wiki_url": "https://www.vasp.at/wiki/index.php/EDIFFG", "description_cn": "EDIFFG参数定义了离子弛豫循环的终止条件。", "default_value": "EDIFF×10", "details_cn": "EDIFFG定义了离子弛豫循环的终止条件。当EDIFFG为正时，当两个离子步之间的总能量变化小于EDIFFG时，弛豫停止。当EDIFFG为负时，当所有力的范数小于|EDIFFG|时，弛豫停止。这通常是一个更方便的设置。", "recommended": "推荐使用负值，例如EDIFFG = -0.01 eV/Å，用于基于力的收敛标准，适用于结构优化和分子动力学模拟。对于高精度计算，可以设置更小的值如-0.005 eV/Å。", "tips": "1. 默认值依赖于EDIFF参数，确保EDIFF设置合理。2. 使用负值时，单位是eV/Å，注意与力单位的匹配。3. 对于金属体系或软模体系，可能需要调整收敛标准以避免过早终止。"}, "EFERMI": {"name": "EFERMI", "description": "EFERMI= MIDGAP | LEGACY | [real]Default:EFERMI= LEGACY", "default": "EFERMI= MIDGAP | LEGACY | [real]Default:EFERMI= LEGACY", "details": "Description: Defines how the Fermi energy is calculated in VASP. It is recommended to use EFERMI = MIDGAP.\nFor semiconducting materials, the Fermi energy is not uniquely defined in the bandgap of the material.\nAny value that produces the correct number of electrons (NELECT) is allowed.\nBy default, VASP places the Fermi energy at a somewhat arbitrary value within the bandgap.\nThe precise value depends on \nYou can change this behavior by settingEFERMI= MIDGAP (recommended).\nVASP will then put the Fermi energy in the middle of the gap because this is the most consistent with increasing the smearingSIGMA.\nThis algorithm to determine the Fermi energy was introduced in VASP.6.4.\nThe value of the Fermi ene", "wiki_url": "https://www.vasp.at/wiki/index.php/EFERMI", "description_cn": "参数EFERMI用于定义VASP中费米能级的计算方式。可选值包括MIDGAP、LEGACY或一个实数，默认值为LEGACY。", "default_value": "LEGACY", "details_cn": "定义VASP中费米能级的计算方式。推荐使用EFERMI = MIDGAP。对于半导体材料，费米能级在材料的带隙中不是唯一定义的。任何能产生正确电子数（NELECT）的值都是允许的。默认情况下，VASP将费米能级放在带隙中一个任意值。精确值取决于计算设置。您可以通过设置EFERMI= MIDGAP（推荐）来改变此行为。VASP随后会将费米能级放在带隙中间。", "recommended": "推荐值为MIDGAP，适用于半导体材料的计算，以确保费米能级位于带隙中间，避免任意性，提高计算的物理准确性。", "tips": "1. 对于金属或半金属材料，可能需要使用LEGACY或指定实数；2. 确保电子数NELECT正确设置，以避免费米能级计算错误；3. 对于半导体材料，强烈推荐使用MIDGAP以获得更可靠的结果。"}, "EFERMI_NEDOS": {"name": "EFERMI_NEDOS", "description": "EFERMI_NEDOS= [integer]Default:EFERMI_NEDOS= 21", "default": "EFERMI_NEDOS= [integer]Default:EFERMI_NEDOS= 21", "details": "Description: Number of Gauss–Legendre integration points used to evaluate the Fermi–Dirac distribution and determine the Fermi level at finite temperature using the tetrahedron method only withISMEAR= −14 or -15 .\nEFERMI_NEDOSsets the number of points in the Gauss–Legendre grid used to integrate the Fermi–Dirac distribution for determining the Fermi level within thetetrahedron methodwhenISMEAR= −14 or -15 .  \nLarger values improve accuracy, especially at low temperatures or with sharp features in theelectroni\nAt[math]\\displaystyle{ T=0 }[/math], the integrated and differential densities of states are\n$$\nn(\\epsilon)=\\sum_{n\\mathbf{k}}\\theta(\\epsilon-\\epsilon_{n\\mathbf{k}}), \\qquad\ng(\\epsilon)=\\sum_{n\\mathbf{k}}\\delta(\\epsilon-\\epsilon_{n\\mathbf{k}}).\n$$", "wiki_url": "https://www.vasp.at/wiki/index.php/EFERMI_NEDOS", "description_cn": "EFERMI_NEDOS 参数，整数类型，用于设置高斯-勒让德积分点数，默认值为21。", "default_value": "21", "details_cn": "EFERMI_NEDOS 设置了在四面体方法中，当 ISMEAR= -14 或 -15 时，用于积分费米-狄拉克分布以确定费米能级的高斯-勒让德网格点数。较大的值可以提高精度，尤其是在低温或具有尖锐特征的情况下。", "recommended": "默认值21适用于大多数计算。对于需要高精度的场景，如低温计算或能带结构有尖锐特征，建议增加此值，例如设置为31或更高，但需注意计算成本并进行收敛性测试。", "tips": "此参数仅在 ISMEAR= -14 或 -15 时生效。增加 EFERMI_NEDOS 会提高精度但增加计算时间。建议根据具体体系调整，并通过测试确保结果收敛。"}, "EFIELD": {"name": "EFIELD", "description": "Description:EFIELDcontrols the magnitude of the applied electric force field.", "default": "", "details": "Description:EFIELDcontrols the magnitude of the applied electric force field.\nIt is possible to apply an external electrostatic field in slab, or molecular calculations. Presently only a single value can be supplied and the field is applied in the direction selected byIDIPOL=1-4. The electric force field is supplied in units of eV/Å. Dipole corrections to the potential (LDIPO\nMonopole Dipole and Quadrupole corrections,NELECT,EPSILON,IDIPOL,DIPOL,LMONO,LDIPOL", "wiki_url": "https://www.vasp.at/wiki/index.php/EFIELD", "description_cn": "EFIELD 控制施加的电场力的大小。", "default_value": "无", "details_cn": "EFIELD 控制施加的电场力的大小。可以在平板或分子计算中施加外部静电场。目前只能提供一个单一值，电场方向由 IDIPOL=1-4 选择。电场力以 eV/Å 为单位。对电势的偶极校正（LDIPO 单极、偶极和四极校正，NELECT, EPSILON, IDIPOL, DIPOL, LMONO, LDIPOL）", "recommended": "根据具体计算需求设置，通常从较小值（如 0.01 eV/Å）开始，逐步增加以避免数值不稳定。使用场景：适用于模拟外部电场下的材料性质，如表面吸附、电催化、分子极化或电化学模拟中的slab计算。", "tips": "1. 确保正确设置 IDIPOL 参数以指定电场方向（IDIPOL=1-4 对应不同方向）。2. 电场单位为 eV/Å，注意单位一致性。3. 可能需要结合偶极校正参数（如 LDIPOL）使用以提高精度。4. 默认值未指定，需手动设置 EFIELD 值。"}, "EFIELD_PEAD": {"name": "EFIELD_PEAD", "description": "EFIELD_PEAD= [real array]", "default": "Default:EFIELD_PEAD", "details": "Description:EFIELD_PEADspecifies the homogeneous electric force field in the electric enthalpy functional used to compute theself-consistent response to finite electric fields.EFIELD_PEADis specified in units of eV/Å.\nis set, with |ε|>0, VASP will first determine the zero-field groundstate of the system, and subsequently switch on the electric field and compute the field-polarized groundstate orbitals.\nAdditionally, from the change in the macroscopic electronic polarization due to the applied electric field, VASP calculates (part of) the components on the diagonal of the ion-clamped static dielectric tensor (ε∞), in accordance with:", "wiki_url": "https://www.vasp.at/wiki/index.php/EFIELD_PEAD", "description_cn": "EFIELD_PEAD= [实数数组]", "default_value": "EFIELD_PEAD", "details_cn": "EFIELD_PEAD 指定在电焓泛函中用于计算有限电场自洽响应的均匀电场力。EFIELD_PEAD 以 eV/Å 为单位指定。当设置 |ε|>0 时，VASP 将首先确定系统的零场基态，然后开启电场并计算场极化基态轨道。此外，从施加电场引起的宏观电子极化变化中，可以计算电极化率等性质。", "recommended": "根据计算需求设置，例如对于小扰动电场，可设置为0.001 eV/Å；对于强电场，如0.1 eV/Å。使用场景：用于研究有限电场下的电子结构、电极化、铁电材料、电场诱导相变等。", "tips": "1. 单位必须为 eV/Å；2. 电场方向通过数组指定，如EFIELD_PEAD = 0.0 0.0 0.01 表示z方向电场；3. 设置电场时，需确保自洽计算收敛，可能需调整EDIFF等参数；4. 与LCALCPOL等参数配合使用以计算极化。"}, "EFOR": {"name": "EFOR", "description": "Description:EFORsets external forces in eV/Åon each atom in the cartesian x-, y-, and z-directions. The order of the ions is equivalent to the order in thePOSCARfile, and for each ion, x-, y-, and z-components have to be given.", "default": "Default:EFOR", "details": "Description:EFORsets external forces in eV/Åon each atom in the cartesian x-, y-, and z-directions. The order of the ions is equivalent to the order in thePOSCARfile, and for each ion, x-, y-, and z-components have to be given.\nThe array of external forces will be added to theforcescomputed internally for each ionic step (ionic minimizationormolecular dynamics).\nIf anionic minimizationis performed with non-zero external forces, the converged structures will be only at a minimum accounting for the constraint of the external\nWhile the total sum of all external forces in all directions must be zero, it is possible to achieve this by putting balancing forces on an ion that is fixed by theselective dynamicsfeature in thePOSCARfile.", "wiki_url": "https://www.vasp.at/wiki/index.php/EFOR", "description_cn": "EFOR 设置每个原子在笛卡尔坐标系 x、y 和 z 方向上的外部力，单位为 eV/Å。离子的顺序与 POSCAR 文件中的顺序相同，对于每个离子，必须给出 x、y 和 z 分量。", "default_value": "无默认值", "details_cn": "EFOR 设置每个原子在笛卡尔坐标系 x、y 和 z 方向上的外部力，单位为 eV/Å。离子的顺序与 POSCAR 文件中的顺序相同，对于每个离子，必须给出 x、y 和 z 分量。外部力数组将添加到每个离子步（离子最小化或分子动力学）内部计算的力中。如果进行离子最小化时外部力非零，收敛的结构将仅是在考虑外部力下的最小值。", "recommended": "无固定推荐值，需根据具体计算需求设置。使用场景包括：施加恒定外部力进行结构优化、模拟外力作用下的分子动力学、引导结构弛豫至特定构型等。", "tips": "1. 确保外部力单位正确，为 eV/Å。2. 外部力的顺序必须与 POSCAR 文件中的原子顺序一致，否则会导致错误。3. 在离子弛豫中，非零外部力会使收敛结构为考虑外部力的局部最小值，可能偏离无外力下的平衡结构。4. 谨慎使用，避免引入非物理的力，影响计算准确性。"}, "EINT": {"name": "EINT", "description": "EINT=  [real1] [real2] | [real1]Default:EINT=  not set", "default": "EINT=  [real1] [real2] | [real1]Default:EINT=  not set", "details": "Description:EINTsets the energy interval for bands contributing to the calculation of thepartial charge densityin eV.\nIf [real1] is larger than [real2], the two values will be flipped internally, so a meaningful energy interval is used.\nIfEINTis set, butNBMODis not, it will be internally set toNBMOD= -2, and the input values ofEINTwill be treated as absolute energies.", "wiki_url": "https://www.vasp.at/wiki/index.php/EINT", "description_cn": "EINT设置用于计算部分电荷密度的能带的能量间隔，单位为电子伏特（eV）。", "default_value": "未设置（not set）", "details_cn": "EINT设置用于计算部分电荷密度的能带的能量间隔，单位为eV。如果[real1]大于[real2]，两个值将在内部翻转，以使用有意义的能量间隔。如果设置了EINT但未设置NBMOD，NBMOD将在内部设置为-2，并且EINT的输入值将被视为绝对能量。", "recommended": "推荐在需要计算特定能量范围内（如费米能级附近）的部分电荷密度时使用。例如，设置EINT= -1 1 表示从-1 eV到1 eV的能量间隔。具体值应根据计算体系的能带结构和费米能级位置调整，通常用于分析局域态或缺陷态。", "tips": "1. 输入值顺序错误时，VASP会自动翻转以确保能量间隔有效。2. 如果设置了EINT但未设置NBMOD，NBMOD会内部设为-2，此时EINT值被视为绝对能量；建议明确设置NBMOD以避免意外行为。3. 确保能量间隔覆盖感兴趣的能带区域，避免过宽或过窄影响计算效率。"}, "ELPH_DECOMPOSE": {"name": "ELPH_DECOMPOSE", "description": "ELPH_DECOMPOSE= [string]Default:ELPH_DECOMPOSE= VDPR", "default": "ELPH_DECOMPOSE= [string]Default:ELPH_DECOMPOSE= VDPR", "details": "Description: Chooses which contributions to include in the computation of the electron-phonon matrix elements.\nThe electron-phonon matrix element can be formulated in theprojector-augmented-wave (PAW) methodin terms of individual contributions[1].\nEach contribution can be included by specifying the associated letter inELPH_DECOMPOSE.\nWe suggest two different combinations to define matrix elements:", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_DECOMPOSE", "description_cn": "ELPH_DECOMPOSE 参数用于选择在电子-声子矩阵元素计算中包含哪些贡献。", "default_value": "VDPR", "details_cn": "选择在电子-声子矩阵元素计算中包含哪些贡献。电子-声子矩阵元素可以在投影缀加波（PAW）方法中根据各个贡献来表述[1]。每个贡献可以通过在ELPH_DECOMPOSE中指定相关字母来包含。我们建议两种不同的组合来定义矩阵元素：", "recommended": "推荐使用默认值 'VDPR'，适用于大多数电子-声子耦合计算，如计算超导转变温度或声子谱。如果需要更精细的分解，可参考VASP文档调整字母组合。", "tips": "确保参数设置与INCAR中其他电子-声子相关参数一致；如不确定，优先使用默认值；建议查阅VASP官方手册或相关文献以获取具体组合和应用场景。"}, "ELPH_DRIVER": {"name": "ELPH_DRIVER", "description": "ELPH_DRIVER= el | melsDefault:ELPH_DRIVER= el", "default": "ELPH_DRIVER= el | melsDefault:ELPH_DRIVER= el", "details": "Description: Chooses which driver to use for electron-phonon calculations.\nThis is a high-level tag that chooses what to compute during an electron-phonon calculation.\nCurrently, the following drivers are supported:", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_DRIVER", "description_cn": "ELPH_DRIVER 参数用于选择电子-声子计算的驱动程序，可设置为 el 或 mels，默认值为 el。", "default_value": "el", "details_cn": "选择用于电子-声子计算的驱动程序。这是一个高级标签，用于选择在电子-声子计算期间计算什么。目前支持以下驱动程序：", "recommended": "el。使用场景：对于标准的电子-声子耦合计算，使用默认值 el 即可；如果需要进行更复杂的计算（如涉及磁声子效应），可考虑 mels 选项，但需参考 VASP 官方文档以确认具体用法。", "tips": "使用 ELPH_DRIVER 参数时，应确保与其他 INCAR 参数（如 PHON_LCALC 等）兼容；建议在计算前查阅 VASP 手册或相关教程，以避免设置错误导致计算失败。"}, "ELPH_FERMI_NEDOS": {"name": "ELPH_FERMI_NEDOS", "description": "ELPH_FERMI_NEDOS= [integer]Default:ELPH_FERMI_NEDOS= 501", "default": "E
