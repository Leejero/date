ical shifts are calculated, i.e., if and only ifLREAL=.FALSE. andLCHIMAG=.TRUE. As this option also gives slightly different total energies, it is advised to use the defaultNLSPLINE=.FALSE. in a", "wiki_url": "https://www.vasp.at/wiki/index.php/NLSPLINE", "description_cn": "NLSPLINE参数控制是否在倒易空间中使用样条插值构造PAW投影器，以使其在k空间可微。", "default_value": ".FALSE.", "details_cn": "在倒易空间中使用样条插值构造PAW投影器，以使其在k空间可微。当NLSPLINE=.TRUE.时，倒易空间中的PAW投影器（LREAL=.FALSE.）通过样条插值设置，以使其在k空间可微。这改善了磁化率对化学位移的贡献。它只轻微影响化学位移的其他贡献。建议仅在PAW投影器应用于倒易空间时设置NLSPLINE=.TRUE.。", "recommended": "当使用倒易空间中的PAW投影器（即LREAL=.FALSE.）时，设置NLSPLINE=.TRUE.；否则，默认使用FALSE。使用场景：计算化学位移，特别是需要高精度磁化率贡献时。", "tips": "确保在LREAL=.FALSE.时使用NLSPLINE=.TRUE.，否则可能无效。该参数主要影响化学位移计算，对其他性质影响较小。"}, "NMAXFOCKAE_and_LMAXFOCKAE": {"name": "NMAXFOCKAE_and_LMAXFOCKAE", "description": "LMAXFOCKAE= [integer]", "default": "Default:NMAXFOCKAE", "details": "LMAXFOCKAE= [integer]\nDescription:NMAXFOCKAEandLMAXFOCKAEdetermine whether \nthe overlap densities in the Fock exchange and correlated wave function methods are accurately reconstructed on the plane wave grid (shape restoration). This flag generally only applies to the Fock-exchange part as well as many-body\npost DFT meth\nIn the PAW method, the difference between the charge density of the all-electron partial waves[math]\\displaystyle{ \\phi_\\beta }[/math]and\nthe pseudo partial waves[math]\\displaystyle{ \\tilde \\phi_\\beta }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/NMAXFOCKAE_and_LMAXFOCKAE", "description_cn": "NMAXFOCKAE和LMAXFOCKAE参数用于控制在Fock交换和相关波函数方法中，重叠密度在平面波网格上的准确重建（形状恢复）。", "default_value": "默认值为NMAXFOCKAE", "details_cn": "NMAXFOCKAE和LMAXFOCKAE决定在Fock交换和相关波函数方法中，重叠密度是否在平面波网格上准确重建（形状恢复）。这个标志通常只适用于Fock交换部分以及许多体后DFT方法。在PAW方法中，涉及全电子部分波φ_β和赝部分波的电荷密度差异。", "recommended": "对于大多数计算，使用默认值即可。在需要高精度杂化泛函或GW计算时，可以适当增加LMAXFOCKAE的值。使用场景：杂化泛函计算、GW近似等后DFT方法中，以精确处理交换关联部分。", "tips": "这些参数主要影响Fock交换部分的精度。在PAW方法中，设置不当可能导致形状恢复误差。增加LMAXFOCKAE值会显著提高计算成本，需根据计算资源和精度需求权衡。"}, "NMRCAR.magres": {"name": "NMRCAR.magres", "description": "TheNMRCAR.magresfile is writte whencalculating the chemical shieldingsorcalculating the electric field gradientifLNMRCAR= T(default). The file format followes theMagres formatin order to allow easy analysis using e.g.magresviewor the Python packageSoprano[1]. Mind that, while the Magres format does not clearly state if themacroscopic susceptibilityshould be included, here it is included in the chemical shielding.", "default": "", "details": "LCHIMAG,LEFG,LNMRCAR\nCalculating the chemical shieldings,Calculating the electric field gradient\nWorkflows that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NMRCAR.magres", "description_cn": "当计算化学屏蔽或电场梯度时，如果LNMRCAR = T（默认），则会写入NMRCAR.magres文件。该文件格式遵循Magres格式，以便于使用例如magresview或Python包Soprano[1]进行分析。请注意，虽然Magres格式没有明确说明是否应包含宏观磁化率，但在此处它被包含在化学屏蔽中。", "default_value": "T", "details_cn": "相关参数：LCHIMAG, LEFG, LNMRCAR；计算内容：化学屏蔽、电场梯度；使用此标签的工作流。", "recommended": "T。使用场景：在进行NMR计算，如化学屏蔽或电场梯度计算时，设置LNMRCAR = T以生成NMRCAR.magres文件，便于使用外部工具（如magresview或Soprano）进行分析。", "tips": "确保在INCAR中设置LCHIMAG或LEFG为T以启用相应计算；注意Magres格式中宏观磁化率的包含可能影响结果解释，需根据分析需求确认。"}, "NOMEGA": {"name": "NOMEGA", "description": "Description:NOMEGAspecifies the number of (imaginary) frequency and imaginary time grid points.", "default": "Default:NOMEGA", "details": "Description:NOMEGAspecifies the number of (imaginary) frequency and imaginary time grid points.\nTypicallyNOMEGAshould be chosen around 50-100 (for the parallel version,NOMEGAshould be dividable by the number of compute nodes to obtain maximum efficiency). For quick and memory conserving calculations, it is sufficient to setNOMEGAto values aroundNOMEGA= 20-30, but then you must expect errors of\nNote that the spectral method (seeLSPECTRAL) scales very favorable with respect to the number of frequency points henceNOMEGA=30 is usually only slightly faster thanNOMEGA=100.", "wiki_url": "https://www.vasp.at/wiki/index.php/NOMEGA", "description_cn": "NOMEGA指定（虚）频率和虚时间网格点的数量。", "default_value": "NOMEGA", "details_cn": "NOMEGA指定（虚）频率和虚时间网格点的数量。通常，NOMEGA应选择在50-100左右（对于并行版本，NOMEGA应能被计算节点数整除以获得最大效率）。对于快速且节省内存的计算，将NOMEGA设置在20-30左右就足够了，但这样你必须预期误差。注意，谱方法（参见LSPECTRAL）在频率数量方面扩展非常有利。", "recommended": "对于一般计算，设置NOMEGA在50-100之间；对于并行计算，确保NOMEGA能被计算节点数整除以优化效率。对于快速或内存受限的计算，可以设置NOMEGA在20-30之间，但需注意可能引入的误差。", "tips": "使用谱方法（LSPECTRAL）时，NOMEGA的扩展性较好。在并行计算中，合理设置NOMEGA以匹配节点数可提升效率。设置较低的NOMEGA值（如20-30）可节省计算资源，但可能增加计算误差。"}, "NOMEGAPAR": {"name": "NOMEGAPAR", "description": "Description:NOMEGAPARavailable as of VASP.6, specifies the number of processor groups sharing the same imaginary frequency grid points.", "default": "Default:NOMEGAPAR", "details": "Description:NOMEGAPARavailable as of VASP.6, specifies the number of processor groups sharing the same imaginary frequency grid points.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NOMEGAPAR", "description_cn": "NOMEGAPAR自VASP.6版本起可用，指定共享相同虚频网格点的处理器组数量。", "default_value": "NOMEGAPAR", "details_cn": "NOMEGAPAR自VASP.6版本起可用，指定共享相同虚频网格点的处理器组数量。", "recommended": "根据计算任务和硬件资源灵活设置。在GW（格林函数）计算中，建议设置为可用的处理器组数（如节点数或核心组数），以优化并行效率和负载平衡。例如，对于多节点集群，可设置为节点数或每节点的组数，具体需通过测试确定最佳值。", "tips": "1. 仅适用于VASP 6.0及以上版本；2. 需与并行参数（如NPAR、NCORE）协调设置，避免资源冲突或通信开销；3. 设置过高可能导致内存或通信瓶颈，建议在小规模测试后优化；4. 确保虚频网格点与计算任务匹配，以避免不必要的计算浪费。"}, "NOMEGAR": {"name": "NOMEGAR", "description": "Description:NOMEGARspecifies the number of frequency grid points along the real axis.", "default": "Default:NOMEGAR", "details": "Description:NOMEGARspecifies the number of frequency grid points along the real axis.\nUsuallyNOMEGARequalsNOMEGA. IfNOMEGARis smaller thanNOMEGA(for instance 0), frequencies along the imaginary time axis are included (this feature is currently not fully supported).\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NOMEGAR", "description_cn": "NOMEGAR 指定沿实轴的频率网格点数。", "default_value": "NOMEGAR", "details_cn": "NOMEGAR 指定沿实轴的频率网格点数。通常 NOMEGAR 等于 NOMEGA。如果 NOMEGAR 小于 NOMEGA（例如 0），则会包括沿虚时间轴的频率（此功能目前尚未完全支持）。", "recommended": "通常设置为等于 NOMEGA。使用场景：在需要频率网格的计算中，如 GW 近似或光学性质计算，以确保沿实轴有足够的采样点。", "tips": "如果设置 NOMEGAR 小于 NOMEGA（例如设为 0），将包括虚时间轴频率，但此功能目前不完全支持，可能导致计算不稳定或错误，建议避免使用或仅在测试环境中谨慎尝试。"}, "NOMEGA_DUMP": {"name": "NOMEGA_DUMP", "description": "NOMEGA_DUMP= [integer]", "default": "Default:NOMEGA_DUMP", "details": "Description:NOMEGA_DUMPselects the imaginary frequency point of screened potential inlow-scaling GW calculationsthat is written to file.\nNOMEGA_DUMPselects the imaginary frequency point of the screened Coulomb kernel that is written toWFULLxxxx.tmpinlow-scaling GW calculations. \nIf set to 0,WFULLxxxx.tmpcontains the screened Coulomb interaction W at[math]\\displaystyle{ \\omega=0 }[/math].\nFor positive values, these files contain the s\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NOMEGA_DUMP", "description_cn": "NOMEGA_DUMP = [整数]", "default_value": "0", "details_cn": "NOMEGA_DUMP选择在低标度GW计算中写入文件的屏蔽势的虚频点。具体地，它选择写入WFULLxxxx.tmp的屏蔽库仑核的虚频点。如果设置为0，WFULLxxxx.tmp包含在ω=0时的屏蔽库仑相互作用W。对于正值，这些文件包含在指定虚频点的屏蔽库仑相互作用。", "recommended": "推荐值为0，适用于标准GW计算，输出ω=0的屏蔽势；正整数值用于输出特定虚频点的屏蔽势，适用于频率依赖分析或特定研究需求。", "tips": "在使用低标度GW计算时，确保NOMEGA_DUMP与NOMEGA等参数协调；正值应合理选择，避免过大影响计算效率；默认值0通常足够，除非有特殊频率点需求。"}, "NPACO": {"name": "NPACO", "description": "NPACO= [integer]Default:NPACO= 256", "default": "NPACO= [integer]Default:NPACO= 256", "details": "Description:NPACOsets the number of slots in the pair-correlation function written toPCDAT.\nVASP evaluates the pair-correlation function eachNBLOCKsteps and writes the PC-function afterNBLOCK×KBLOCKsteps to thePCDATfile.\nAPACO,NBLOCK,KBLOCK,PCDAT", "wiki_url": "https://www.vasp.at/wiki/index.php/NPACO", "description_cn": "NPACO设置对关联函数的slot数量。", "default_value": "256", "details_cn": "NPACO设置写入PCDAT文件的对关联函数的slot数量。VASP每NBLOCK步评估对关联函数，并在NBLOCK×KBLOCK步后将对关联函数写入PCDAT文件。相关参数：APACO, NBLOCK, KBLOCK, PCDAT", "recommended": "默认值256适用于大多数情况，平衡精度和计算效率。对于需要高精度对关联函数的计算，如精细结构分析（例如液体或非晶材料），可增加到512或更高；对于资源有限的计算，可适当减少。使用场景：用于研究材料的原子对分布，如在液体、非晶固体、表面结构或相变分析中。", "tips": "NPACO值增大将增加输出文件大小和计算时间，需根据计算资源和精度需求调整。确保与NBLOCK和KBLOCK参数协调设置，以控制评估和写入频率，避免不必要的计算开销。检查PCDAT文件路径是否正确，以确保输出数据被正确保存。"}, "NPAR": {"name": "NPAR", "description": "NPAR= [integer]Default:NPAR= available ranks", "default": "NPAR= [integer]Default:NPAR= available ranks", "details": "Description:NPARdetermines the number of bands that are treated in parallel. This is a legacy tag; useNCOREinstead.\nVASP distributes the available MPI ranks into band groups that each work on one band, parallelizing theFFTsfor that band. For the common case thatIMAGES= 1and no other algorithm-dependent parallelization (e.g.,NOMEGAPAR) is active::\nNPARsets the number of band groups;NCOREsets the size of each band group. They are strict inverses:", "wiki_url": "https://www.vasp.at/wiki/index.php/NPAR", "description_cn": "NPAR= [整数] 默认值：NPAR= 可用ranks数", "default_value": "默认值为可用的MPI进程数（ranks）", "details_cn": "NPAR 决定了并行处理的能带数量。这是一个遗留标签；请改用 NCORE。VASP 将可用的 MPI 进程分配到能带组中，每个组处理一个能带，并对该能带的 FFT 进行并行化。在常见情况下，当 IMAGES=1 且没有其他算法相关的并行化（例如 NOMEGAPAR）激活时：NPAR 设置能带组的数量；NCORE 设置每个能带组的大小。它们是严格互逆的。", "recommended": "推荐使用 NCORE 参数代替 NPAR。NPAR 的值应根据总 MPI 进程数和能带数设置，通常设置为总进程数除以 NCORE。使用场景：在并行计算中优化能带并行化，特别是当 IMAGES=1 时，以提高计算效率。", "tips": "NPAR 是遗留参数，建议优先使用 NCORE。NPAR 和 NCORE 互逆，设置其中一个会自动确定另一个。确保 MPI 进程数能被 NPAR 整除，以避免资源浪费和效率下降。"}, "NPPSTR": {"name": "NPPSTR", "description": "Description:NPPSTRspecifies the number of k-points on the strings in theIGPARdirection.", "default": "", "details": "Description:NPPSTRspecifies the number of k-points on the strings in theIGPARdirection.\nNPPSTRspecifies the number of k-points on the strings[math]\\displaystyle{ \\mathbf{k}_{j} = \\mathbf{k}_{\\perp} + j\\mathbf{G}_{\\parallel}/\\mathrm{NPPSTR}  }[/math](with[math]\\displaystyle{  j=0,..,\\mathrm{NPPSTR}-1 }[/math]). See alsoLBERRY.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NPPSTR", "description_cn": "NPPSTR指定在IGPAR方向上字符串的k点数量。", "default_value": "1", "details_cn": "NPPSTR指定在IGPAR方向上字符串的k点数量。NPPSTR指定字符串上的k点数量，公式为[math]\\displaystyle{ \\mathbf{k}_{j} = \\mathbf{k}_{\\perp} + j\\mathbf{G}_{\\parallel}/\\mathrm{NPPSTR}  }[/math]（其中[math]\\displaystyle{  j=0,..,\\mathrm{NPPSTR}-1 }[/math]）。另请参见LBERRY。", "recommended": "根据计算精度需求，通常设置为5到20之间，需通过收敛测试调整。使用场景：在Berry相计算中，如铁电极化、拓扑绝缘体等计算，需要与IGPAR和LBERRY参数配合使用。", "tips": "NPPSTR必须与IGPAR和LBERRY一起使用；值过大会显著增加计算时间和资源消耗；建议进行收敛测试以确定合适的值，确保结果准确。"}, "NRMM": {"name": "NRMM", "description": "NRMM= [integer]Default:NRMM= 4", "default": "NRMM= [integer]Default:NRMM= 4", "details": "Description: Maximum number of iterative steps for RMM-DIIS (IALGO=4X) or Davidson algorithms (IALGO=3X).\nNote: This tag was formerly known as NDAV which is the name of the variable in the VASP source code.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/NRMM", "description_cn": "NRMM 参数，类型为整数，默认值为 4。", "default_value": "4", "details_cn": "RMM-DIIS（IALGO=4X）或Davidson算法（IALGO=3X）的最大迭代步数。注意：此标签以前称为NDAV，这是VASP源代码中变量的名称。使用此标签的示例。", "recommended": "通常使用默认值4。对于收敛困难的系统（如大体系或复杂电子结构），可适当增加至6或8。使用场景：当使用IALGO=4X（RMM-DIIS）或IALGO=3X（Davidson）算法时，调整NRMM以优化迭代收敛，确保计算稳定性。", "tips": "NRMM以前称为NDAV，在旧版本VASP中可能使用NDAV标签。增加NRMM会增加计算时间，但可能改善收敛性；建议根据具体体系测试调整，避免过度设置导致资源浪费。"}, "NSIM": {"name": "NSIM", "description": "NSIM= [integer]Default:NSIM= 4", "default": "NSIM= [integer]Default:NSIM= 4", "details": "Description:NSIMsets the number of bands that are optimized simultaneously by the RMM-DIIS algorithm. This also controls for the blocked-Davidson at certain places how many orbitals are worked on simultaneously as well as in the calculation of forces. Especially, GPUs benefit from increasingNSIM.\nThe RMM-DIIS algorithm (IALGO=48) works in a blocked mode.NSIMbands are optimized at the same time. This allows to use matrix-matrix operations instead of matrix-vector operation for the evaluations of the non local projection operators in real space, and might speed up calculations on some machines\nIALGO,NCORE,NPAR,LPLANE,LSCALU,KPAR,LSCALAPACK,LSCAAWARE", "wiki_url": "https://www.vasp.at/wiki/index.php/NSIM", "description_cn": "NSIM 参数用于设置 RMM-DIIS 算法中同时优化的能带数量，影响并行计算效率。", "default_value": "4", "details_cn": "NSIM 设置了 RMM-DIIS 算法同时优化的能带数量。这也控制了在 blocked-Davidson 算法中某些地方同时处理的轨道数量，以及在力计算中的情况。特别是，增加 NSIM 对 GPU 有益。RMM-DIIS 算法（IALGO=48）以阻塞模式工作。NSIM 个能带同时优化。这允许使用矩阵-矩阵操作代替矩阵-向量操作来进行评估。", "recommended": "默认值为4，适用于大多数CPU计算。对于GPU计算，建议增加NSIM（如8或16）以提高性能，但需根据GPU内存和计算任务调整。在内存充足的情况下，适当增加NSIM可加速计算。", "tips": "增加NSIM会提高内存使用，需确保系统资源充足。使用RMM-DIIS算法时，需设置IALGO=48。在并行计算中，合理设置NSIM可优化性能，但过高值可能导致内存溢出或效率下降。"}, "NSTORB": {"name": "NSTORB", "description": "Description:NSTORBspecifies the number of stochastic orbitals per cycle in the stochastic MP2 algorithm.", "default": "Default:NSTORB", "details": "Description:NSTORBspecifies the number of stochastic orbitals per cycle in the stochastic MP2 algorithm.\nNSTORBdefines the number of stochastic orbitals per cycle, i.e., the number of stochastic orbitals that define one stochastic sample. If the sample is not large enough, the calculations are repeated until the accuracy, defined by ESTOP, is reached.\nAs a rule of thumb, we recommend setting", "wiki_url": "https://www.vasp.at/wiki/index.php/NSTORB", "description_cn": "NSTORB 指定了随机 MP2 算法中每个周期的随机轨道数。", "default_value": "未指定", "details_cn": "NSTORB 指定了随机 MP2 算法中每个周期的随机轨道数，即定义一个随机样本的随机轨道数。如果样本不够大，计算将重复进行，直到达到由 ESTOP 定义的精度。作为经验法则，我们推荐设置", "recommended": "根据系统大小和精度要求设置，通常从较小值（如10-100）开始测试，并根据收敛性调整。使用场景：在进行随机MP2计算时，用于控制随机采样的轨道数以平衡精度和计算成本。", "tips": "如果样本不够大，计算会自动重复直到达到精度，可能增加计算时间。建议与ESTOP参数配合使用以控制精度，并监控收敛行为。"}, "NSUBSYS": {"name": "NSUBSYS", "description": "NSUBSYS= [integer array]", "default": "", "details": "Description:NSUBSYSdefines the atomic subsystems in calculations with multiple Anderson thermostats (in case VASP was compiled with-Dtbdyn).\nUp to three user-defined atomic subsystems may be coupled with independent Andersen thermostats[1](MDALGO=13).\nThese subsystems are defined by specifying the last atom for each subsystem (two or three values must be supplied). For instance, if total of 20 atoms is defined in thePOSCAR-file, and the initial 10 atoms belong to the subsystem 1, the next 7 atoms to the subsystem 2, and the last 3 atoms to the su", "wiki_url": "https://www.vasp.at/wiki/index.php/NSUBSYS", "description_cn": "NSUBSYS= [整数数组]", "default_value": "无", "details_cn": "NSUBSYS定义了在多个Andersen恒温器计算中的原子子系统（如果VASP编译时使用了-Dtbdyn）。最多三个用户定义的原子子系统可以与独立的Andersen恒温器耦合[1](MDALGO=13)。这些子系统通过指定每个子系统的最后一个原子来定义（必须提供两个或三个值）。例如，如果在POSCAR文件中定义了总共20个原子，前10个原子属于子系统1，接下来的7个原子属于子系统2。", "recommended": "根据模拟体系的原子分组设置，例如对于20个原子，若前10个为子系统1，后10个为子系统2，则设置NSUBSYS=10。使用场景：在分子动力学模拟中，当使用MDALGO=13时，用于独立控制不同原子组的温度，适用于需要多温区模拟的体系。", "tips": "1. 确保VASP编译时使用了-Dtbdyn选项以支持此功能。2. 子系统定义必须与POSCAR文件中的原子顺序一致。3. 最多支持三个子系统，因此NSUBSYS数组最多包含三个整数。4. 使用此参数时，需配合MDALGO=13设置。"}, "NSW": {"name": "NSW", "description": "NSW= [integer]Default:NSW= 0", "default": "NSW= [integer]Default:NSW= 0", "details": "Description:NSWsets the maximum number of ionic steps.\nWithin each ionic step at mostNELMelectronic steps are performed. It is fewer if the convergence criterion set byEDIFFis met before. Forces and stresses are calculated according to the setting ofISIFfor each ionic step.", "wiki_url": "https://www.vasp.at/wiki/index.php/NSW", "description_cn": "NSW设置最大离子步数", "default_value": "0", "details_cn": "NSW设置最大离子步数。在每个离子步中，最多执行NELM次电子步。如果在达到NELM之前满足了EDIFF设定的收敛标准，则电子步会提前结束。每个离子步都会根据ISIF的设置计算力和应力。", "recommended": "结构优化：通常设置为50-200，具体取决于体系复杂度；分子动力学模拟：根据所需模拟时长设置（如数千步）；静态计算（单点能）：保持默认值0。", "tips": "1. NSW=0表示不进行离子弛豫，仅计算电子结构。2. 对于复杂体系或初始结构较差的情况，可能需要增加NSW值。3. 建议结合收敛情况（OSZICAR中的能量和力变化）判断是否需要调整。"}, "NTARGET_STATES": {"name": "NTARGET_STATES", "description": "NTARGET_STATES= [integer array]", "default": "", "details": "Description: Controls which Wannier states are excluded in constrained random-phase approximation. Check alsoNCRPA_BANDS.\nThis tag is effective forALGO= CRPAand ignored otherwise.\nFor instance\nselects the Wannier state 1, 2 and 4, where the ordering of the Wannier states depends on the chosen basis set.", "wiki_url": "https://www.vasp.at/wiki/index.php/NTARGET_STATES", "description_cn": "NTARGET_STATES 是一个整数数组，用于指定在约束随机相位近似中排除的Wannier态。", "default_value": "无", "details_cn": "控制在约束随机相位近似中排除哪些Wannier态。另请检查NCRPA_BANDS。此标签仅在ALGO=CRPA时有效，否则被忽略。例如，选择Wannier态1、2和4，其中Wannier态的顺序取决于所选的基组。", "recommended": "根据具体计算需求设置，例如在CRPA计算中指定要排除的Wannier态（如1,2,4）。使用场景：用于约束随机相位近似（CRPA）计算，以排除特定Wannier态，从而聚焦于感兴趣的电子态，适用于强关联体系或特定能带分析。", "tips": "确保ALGO参数设置为CRPA，否则NTARGET_STATES将被忽略。Wannier态的顺序依赖于基组设置，需参考NCRPA_BANDS参数进行正确配置，避免错误排除态。"}, "NTAUPAR": {"name": "NTAUPAR", "description": "Description:NTAUPARavailable as of VASP.6, specifies the number of MPI groups sharing same imaginary time grid points. The default value of NTAUPAR is set to the largest possible value supported on the compute nodes to speed up the GW or RPA calculation.", "default": "Default:NTAUPAR", "details": "Description:NTAUPARavailable as of VASP.6, specifies the number of MPI groups sharing same imaginary time grid points. The default value of NTAUPAR is set to the largest possible value supported on the compute nodes to speed up the GW or RPA calculation.\nNTAUPAR has the biggest impact on memory usage as well as total runtime for low-scaling GW and RPA calculations. If not found in theINCAR, NTAUPAR is set automatically based on the value ofMAXMEM(the available memory for each rank on each compute node), such that the GW and RPA job fits in the RAM o\nIfMAXMEMis not set, VASP looks in \"/proc/meminfo\" for \"MemAvailable\" to setMAXMEMinternally, otherwise the code uses the value provided in theINCAR.", "wiki_url": "https://www.vasp.at/wiki/index.php/NTAUPAR", "description_cn": "NTAUPAR参数（自VASP.6版本起可用）用于指定共享相同虚时间网格点的MPI组数量。", "default_value": "自动设置为计算节点支持的最大可能值", "details_cn": "NTAUPAR参数（自VASP.6版本起可用）用于指定共享相同虚时间网格点的MPI组数量。其默认值会自动设置为计算节点支持的最大可能值，以加速GW或RPA计算。NTAUPAR对低标度GW和RPA计算的内存使用和总运行时间有最大影响。如果在INCAR文件中未找到该参数，系统将根据MAXMEM参数（每个计算节点上每个进程的可用内存）的值自动设置NTAUPAR。", "recommended": "推荐保持默认值（自动设置），以获得最佳性能。在内存充足且计算规模较大时，可适当增大NTAUPAR以加速计算；在内存受限时，可手动减小NTAUPAR以降低内存占用。", "tips": "1. 该参数主要影响GW和RPA计算，特别是低标度算法。\n2. 手动设置NTAUPAR时需谨慎，需平衡内存使用与计算效率。\n3. 建议先使用默认值运行测试，根据实际内存占用和计算时间再决定是否调整。\n4. 该参数与MAXMEM参数密切相关，调整时需综合考虑节点内存配置。"}, "NTEMPER": {"name": "NTEMPER", "description": "NTEMPER= [integer]Default:NTEMPER=  200", "default": "NTEMPER= [integer]Default:NTEMPER=  200", "details": "Description:NTEMPERspecifies how often temperature swaps are attempted during parallel tempering. The flag must be used in combination withIMAGESandLTEMPER.NTEMPER=0, allows to perform several completely independent calculations.\nNTEMPERmust be a positive integer or zero. Swaps are on average attempted afterNTEMPERmolecular dynamics steps.\nSpecifically, a random number[math]\\displaystyle{  r  }[/math]between [0,1[ is drawn. The next temperature swaps are attempted afterNTEMPER[math]\\displaystyle{  \\times  2~ r -1  }[/math]st\nFurthermore, no temperature swapping is attempted forNTEMPER=0. This allows many independent calculations to be performed in directories 01, 02, 03, ... which can be useful when performing many similar calculations for small systems or using machine-learned force fields on many-core machines (strong", "wiki_url": "https://www.vasp.at/wiki/index.php/NTEMPER", "description_cn": "NTEMPER是一个整数参数，默认值为200。", "default_value": "200", "details_cn": "NTEMPER指定在并行回火中尝试温度交换的频率。此标志必须与IMAGES和LTEMPER一起使用。NTEMPER=0允许执行多个完全独立的计算。NTEMPER必须是正整数或零。平均而言，每NTEMPER个分子动力学步骤后尝试一次温度交换。具体来说，会抽取一个在[0,1)范围内的随机数r。下一次温度交换将在NTEMPER个步骤后尝试。", "recommended": "默认值200适用于一般并行回火模拟，可根据系统大小和温度范围调整。使用场景：用于增强采样的并行回火计算；设置为0时，运行多个完全独立的计算，不进行温度交换。", "tips": "必须与IMAGES和LTEMPER参数配合使用；NTEMPER必须为正整数或零；设置为0时，计算独立，不进行温度交换；调整时需考虑模拟效率和收敛性。"}, "NUCIND": {"name": "NUCIND", "description": "NUCIND= .TRUE. | .FALSE.Default:NUCIND=  .FALSE.", "default": "NUCIND= .TRUE. | .FALSE.Default:NUCIND=  .FALSE.", "details": "Description: Allows the nucleus-independent chemical shielding (NICS) to be calculated.\nIn conjunction withLCHIMAG= True,NUCINDcalculates the chemical shielding tensor[math]\\displaystyle{ \\sigma_{ij}(\\mathbf{R}) }[/math]at positions[math]\\displaystyle{ \\textbf{R} }[/math]off-nucleus, hence nucleus-independent chemical shielding (NICS)[1][2]. VASP calculates only from the plane wave\ngri\nWhenNUCIND= True, by default these are calculated on the fine FFT gridNGXFxNGYFxNGZFin ppm. The output is written toNICS.", "wiki_url": "https://www.vasp.at/wiki/index.php/NUCIND", "description_cn": "NUCIND参数用于控制是否计算非核独立化学位移（NICS）。", "default_value": ".FALSE.", "details_cn": "详细说明：允许计算非核独立化学位移（NICS）。当与LCHIMAG= True结合使用时，NUCIND计算在非核位置R处的化学位移张量σ_{ij}(R)，即非核独立化学位移（NICS）[1][2]。VASP仅从平面波网格计算。当NUCIND= True时，默认在精细FFT网格NGxFxNGYFxNGZF上以ppm为单位计算。输出被写入相关文件。", "recommended": "如果需要计算非核独立化学位移（NICS），则设置NUCIND= .TRUE.，并确保LCHIMAG= .TRUE.。否则，使用默认值FALSE。使用场景：适用于研究分子或固体的磁屏蔽性质，如评估芳香性或反芳香性。", "tips": "NUCIND参数必须与LCHIMAG= .TRUE.一起使用才能生效。计算NICS可能增加计算成本，因为需要在精细网格上计算。确保输出文件正确设置以捕获结果。"}, "NUM_WANN": {"name": "NUM_WANN", "description": "NUM_WANN= [integer]Default:NUM_WANN=NBANDS", "default": "NUM_WANN= [integer]Default:NUM_WANN=NBANDS", "details": "Description: Controls the number of Wannier orbitals to be constructed.\nThis tag is used to determine the number of Wannier orbitals to be constructed in theSCDM method.\nSince VASP 6.2.0,NUM_WANNalso determines the number of Wannier orbitals to be used with wannier90.\nNote that thenum_wannvalue written to thewannier90.winfile is always the value ofNUM_WANNknown by vasp.", "wiki_url": "https://www.vasp.at/wiki/index.php/NUM_WANN", "description_cn": "NUM_WANN= [整数] 默认值：NUM_WANN=NBANDS", "default_value": "NBANDS", "details_cn": "控制要构建的Wannier轨道数量。此标签用于确定在SCDM方法中要构建的Wannier轨道数量。自VASP 6.2.0起，NUM_WANN还决定了与wannier90一起使用的Wannier轨道数量。请注意，写入wannier90.win文件的num_wann值始终是VASP已知的NUM_WANN值。", "recommended": "默认值NBANDS适用于一般计算，但具体值需根据应用调整。在使用SCDM方法时，应设置为所需Wannier轨道数；与wannier90集成时，需与wannier90输入文件中的num_wann参数一致。对于拓扑材料或复杂能带结构，建议手动优化以匹配物理需求。", "tips": "确保NUM_WANN不超过NBANDS，否则可能导致计算错误。写入wannier90.win文件的值始终是VASP的NUM_WANN，因此修改此参数会直接影响wannier90的输入。建议在设置前参考VASP官方文档或相关示例，以避免不一致问题。"}, "NUPDOWN": {"name": "NUPDOWN", "description": "NUPDOWN= [positive real]Default:NUPDOWN= not set", "default": "NUPDOWN= [positive real]Default:NUPDOWN= not set", "details": "Description: Sets the difference between the number of electrons in the up and down spin components.\nAllows calculations for a specific spin multiplet, i.e. the difference of the number of electrons in the up and down spin component will be kept fixed to the specified value.\nIf no value is set (orNUPDOWN=-1) a full relaxation will be performed. This is also the default.", "wiki_url": "https://www.vasp.at/wiki/index.php/NUPDOWN", "description_cn": "NUPDOWN参数用于设置自旋向上和向下电子数之差。", "default_value": "未设置（或NUPDOWN=-1）", "details_cn": "设置自旋向上和向下分量中电子数的差异。允许计算特定的自旋多重态，即自旋向上和向下分量中的电子数差异将保持为指定值。如果未设置值（或NUPDOWN=-1），将执行完全弛豫。这也是默认行为。", "recommended": "对于需要固定自旋态的计算，如磁性材料或过渡金属配合物，设置NUPDOWN为所需电子数差；否则，保持未设置以允许完全弛豫。", "tips": "设置NUPDOWN时，需确保其值合理，不超过总电子数，并与系统物理性质一致。建议在不确定时先进行完全弛豫计算。"}, "NWRITE": {"name": "NWRITE", "description": "NWRITE= 0 | 1 | 2 | 3 | 4Default:NWRITE= 2", "default": "NWRITE= 0 | 1 | 2 | 3 | 4Default:NWRITE= 2", "details": "Description: This tag determines how much will be written to the fileOUTCAR('verbosity tag').\nThe options forNWRITEare given in detail as\nwhere the following abbreviations have been used", "wiki_url": "https://www.vasp.at/wiki/index.php/NWRITE", "description_cn": "此标签决定写入OUTCAR文件的信息量（'详细程度标签'）。", "default_value": "2", "details_cn": "NWRITE控制OUTCAR文件的输出详细程度。选项包括：NWRITE=0（最小输出，仅写入基本计算结果）、NWRITE=1（中等输出，包括部分中间步骤信息）、NWRITE=2（默认值，标准输出，平衡详细程度和文件大小）、NWRITE=3（详细输出，包括更多迭代和收敛信息）、NWRITE=4（最详细输出，可能用于调试，输出所有可能信息）。", "recommended": "推荐使用默认值NWRITE=2，适用于大多数常规计算，提供足够信息用于分析且文件大小适中。如果需要调试或详细分析计算过程，可设置为3或4；如果磁盘空间有限或只关心最终结果，可设置为0或1以节省资源。", "tips": "增加NWRITE值会显著增大OUTCAR文件大小，可能占用更多磁盘空间并减慢文件读取速度，尤其在大型计算中。建议根据计算规模和需求调整：常规计算用默认值，调试时用较高值，资源受限时用较低值。"}, "ODDONLY": {"name": "ODDONLY", "description": "ODDONLY= .TRUE. | .FALSE.Default:ODDONLY= .FALSE.", "default": "ODDONLY= .TRUE. | .FALSE.Default:ODDONLY= .FALSE.", "details": "Description:ODDONLY=.TRUE. selects a subset ofk-points for the representation of the Fock exchange potential, withC1=C2=C3=1, andn1+n2+n3odd.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi.", "wiki_url": "https://www.vasp.at/wiki/index.php/ODDONLY", "description_cn": "ODDONLY参数用于控制是否选择k点子集来表示Fock交换势。", "default_value": "FALSE", "details_cn": "当ODDONLY=.TRUE.时，选择一个k点子集用于表示Fock交换势，其中C1=C2=C3=1，且n1+n2+n3为奇数。可以将Fock交换势（或其短程对应项）中的q求和限制在完整k点集{ k }的一个子集{ qk }上，该子集满足以下条件：其中b1,2,3是原胞的倒格矢，Ci是沿倒格矢方向bi的整数网格缩减因子。", "recommended": "通常保持默认FALSE。使用场景：在杂化泛函计算（如HSE06）中，当体系较大或k点密度较高时，设置为TRUE可以减少计算量，加速计算，但需注意可能略微影响精度；建议在资源受限或测试后使用。", "tips": "设置ODDONLY=TRUE时，需确保C1=C2=C3=1且n1+n2+n3为奇数，否则参数可能无效；此设置会改变Fock交换势的k点采样，可能影响结果精度，建议先进行小规模测试验证。"}, "ODDONLYGW": {"name": "ODDONLYGW", "description": "ODDONLYGW= [logical]Default:ODDONLYGW= .FALSE.", "default": "ODDONLYGW= [logical]Default:ODDONLYGW= .FALSE.", "details": "Description:ODDONLYGWallows to avoid the inclusion of the[math]\\displaystyle{ \\Gamma }[/math]point in the evaluation of response functions (inGW calculations).\nThe independent particle polarizability[math]\\displaystyle{ \\chi_{{\\mathbf{q}}}^0 ({\\mathbf{G}}, {\\mathbf{G}}', \\omega) }[/math]is given by:\n[math]\\displaystyle{ \\chi_{{\\mathbf{q}}}^0 ({\\mathbf{G}}, {\\mathbf{G}}', \\omega) =\n\\frac{1}{\\Omega} \\sum_{n,n',{\\mathbf{k}}}2 w_{{\\mathbf{k}}}  (f_{n'{\\mathbf{k}}+{\\mathbf{q}}} - f_{n{\\mathbf{k}}})  \n\\times  \\frac{\\langle \\psi_{n{\\mathbf{k}}}| e^{-i ({\\mathbf{q}}+{\\mathbf{G}}){\\mathbf{r}}} | \\psi_{n", "wiki_url": "https://www.vasp.at/wiki/index.php/ODDONLYGW", "description_cn": "ODDONLYGW 是一个逻辑参数，用于控制在 GW 计算中评估响应函数时是否包含 Γ 点。", "default_value": ".FALSE.", "details_cn": "ODDONLYGW 允许在评估响应函数（在 GW 计算中）时避免包含 Γ 点。独立粒子极化率 χ_q^0(G, G', ω) 由以下公式给出：χ_q^0(G, G', ω) = (1/Ω) ∑_{n,n',k} 2 w_k (f_{n'k+q} - f_{n k})", "recommended": "默认值 .FALSE.。使用场景：在标准 GW 计算中，保持默认值以确保包含所有 k 点贡献，避免精度损失。当遇到 Γ 点导致的数值不稳定或收敛问题时，可设置为 .TRUE. 以排除 Γ 点，但需谨慎评估对结果的影响。", "tips": "设置 ODDONLYGW=.TRUE. 会忽略 Γ 点的贡献，可能降低极化率计算的准确性，尤其在 Γ 点有显著作用的系统中（如金属或窄带隙半导体）。建议在修改前进行测试，并参考 VASP 官方文档以了解具体适用条件。"}, "OFIELD_A": {"name": "OFIELD_A", "description": "Description: The tagOFIELD_Asets the desired order parameter[math]\\displaystyle{ Q_6 }[/math]in theInterface pinningmethod.", "default": "", "details": "Description: The tagOFIELD_Asets the desired order parameter[math]\\displaystyle{ Q_6 }[/math]in theInterface pinningmethod.\nThe bias potential in theInterface pinningmethod is written as\nThe tagOFIELD_Asets the desired value of the order parameter[math]\\displaystyle{ A }[/math].", "wiki_url": "https://www.vasp.at/wiki/index.php/OFIELD_A", "description_cn": "OFIELD_A 标签设置 Interface pinning 方法中的期望序参数 Q6。", "default_value": "未指定", "details_cn": "OFIELD_A 标签设置 Interface pinning 方法中的期望序参数 Q6。Interface pinning 方法中的偏置势写为 OFIELD_A 设置序参数 A 的期望值。", "recommended": "根据模拟目标设置，通常在 0 到 1 之间，具体值取决于序参数 Q6 的物理意义（如晶体结构有序度）。使用场景：在 Interface pinning 方法中，用于稳定界面或研究相变过程，例如在液态-晶体转变中控制 Q6 值以引导系统向特定状态演化。", "tips": "确保序参数 Q6 正确定义（如通过 VASP 的其他标签计算），并与其他 Interface pinning 参数（如 OFIELD_Q）协调使用。值的选择应基于物理系统测试，避免不合理的设置导致模拟不稳定。"}, "OFIELD_KAPPA": {"name": "OFIELD_KAPPA", "description": "Description: The tagOFIELD_KAPPAsets the strength of the bias potential in theInterface pinningmethod.", "default": "", "details": "Description: The tagOFIELD_KAPPAsets the strength of the bias potential in theInterface pinningmethod.\nThe bias potential in theInterface pinningmethod is written as\nThe tagOFIELD_KAPPAmethod sets the strength of the bias potential[math]\\displaystyle{ \\kappa }[/math]. The unit of[math]\\displaystyle{ \\kappa }[/math]is[math]\\displaystyle{ \\textrm{eV}/(\\textrm{unit} \\,\\, \\textrm{ of }\\,\\, Q)^2 }[/math].", "wiki_url": "https://www.vasp.at/wiki/index.php/OFIELD_KAPPA", "description_cn": "OFIELD_KAPPA参数设置Interface pinning方法中偏置势的强度。", "default_value": "未指定", "details_cn": "OFIELD_KAPPA参数设置Interface pinning方法中偏置势的强度。偏置势在Interface pinning方法中写为...，OFIELD_KAPPA设置偏置势的强度κ。κ的单位是eV/(Q的单位)^2。", "recommended": "推荐值取决于具体模拟系统，通常在0.1到10 eV/(Å^2)范围内，需根据界面类型和序参量Q调整。使用场景：固液界面模拟、相变研究等。", "tips": "值过小可能导致偏置不足，值过大可能导致界面不稳定；建议与OFIELD_Q0等参数配合使用；进行收敛测试以确定合适值。"}, "OFIELD_Q6_FAR": {"name": "OFIELD_Q6_FAR", "description": "OFIELD_Q6_FAR= [real]", "default": "", "details": "Description:OFIELD_Q6_FARsets the far fading distance  for the computation of a continuous[math]\\displaystyle{ Q_6 }[/math]parameter in theinterface-pinningmethod.\nThe unit ofOFIELD_Q6_FARis[math]\\displaystyle{ \\AA }[/math].\nInterface pinning,OFIELD_Q6_NEAR,OFIELD_A,OFIELD_KAPPA", "wiki_url": "https://www.vasp.at/wiki/index.php/OFIELD_Q6_FAR", "description_cn": "OFIELD_Q6_FAR= [实数]", "default_value": "未指定", "details_cn": "OFIELD_Q6_FAR 设置了在界面固定方法中计算连续 Q6 参数时的远衰减距离。OFIELD_Q6_FAR 的单位是埃（Å）。相关参数：界面固定，OFIELD_Q6_NEAR，OFIELD_A，OFIELD_KAPPA", "recommended": "根据具体计算系统调整，通常设置为 5.0 Å 左右。使用场景：在界面固定方法中计算连续 Q6 参数时，用于定义远衰减距离，适用于晶体结构或界面模拟中的键序参数分析。", "tips": "单位是埃（Å），需与 OFIELD_Q6_NEAR 等参数协调设置，以确保计算准确性。避免设置过大或过小的值，以免影响 Q6 参数的连续性计算。"}, "OFIELD_Q6_NEAR": {"name": "OFIELD_Q6_NEAR", "description": "OFIELD_Q6_NEAR= [real]", "default": "", "details": "Description:OFIELD_Q6_NEARsets the near-fading distance (in[math]\\displaystyle{ \\AA }[/math]) for the computation of a continuous[math]\\displaystyle{ Q_6 }[/math]parameter in theinterface-pinningmethod.\nInterface pinning\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/OFIELD_Q6_NEAR", "description_cn": "OFIELD_Q6_NEAR设置近衰减距离（单位：Å），用于在interface-pinning方法中计算连续Q6参数。", "default_value": "未提供", "details_cn": "OFIELD_Q6_NEAR设置近衰减距离（单位：Å），用于在interface-pinning方法中计算连续Q6参数。Interface pinning 使用此标签的示例。", "recommended": "根据具体体系调整，通常设置为1.0 Å左右。使用场景：在interface-pinning方法中计算连续Q6参数时，用于控制近衰减距离，以确保计算的准确性，适用于模拟界面或相变过程。", "tips": "确保单位正确（Å），并与其他相关参数如OFIELD_Q6_FAR协调使用。在模拟中，调整此参数以优化Q6参数的计算范围，避免过度衰减或计算误差。"}, "OMEGAMAX": {"name": "OMEGAMAX", "description": "OMEGAMAX= [real]Default:OMEGAMAX= outermost node in dielectric function[math]\\displaystyle{ \\epsilon(\\omega) }[/math]/1.3", "default": "OMEGAMAX= [real]Default:OMEGAMAX= outermost node in dielectric function[math]\\displaystyle{ \\epsilon(\\omega) }[/math]/1.3", "details": "Description:OMEGAMAXspecifies the maximum frequency for the dense part of the frequency grid for GW calculations (old GW code, does not apply to GWR). \nFor CRPA calculations,OMEGAMAXis the frequency point of the interaction. \nFor BSE calculationsOMEGAMAXdetermines the maximum energy difference for e\nGW type calculations:\nFor the frequency grid along the real and imaginary axis sophisticated schemes are used, which are based on simple model functions for the macroscopic dielectric function. The grid spacing is dense up to roughly 1.3*OMEGAMAXand becomes coarser for larger frequencies. The default value forOMEGAMAXis ", "wiki_url": "https://www.vasp.at/wiki/index.php/OMEGAMAX", "description_cn": "OMEGAMAX是一个实数参数，默认值为介电函数最外层节点除以1.3。", "default_value": "基于介电函数最外层节点除以1.3的计算值（具体值取决于体系）", "details_cn": "OMEGAMAX指定了GW计算（旧GW代码，不适用于GWR）中频率网格密集部分的最大频率。对于CRPA计算，OMEGAMAX是相互作用的频率点。对于BSE计算，OMEGAMAX决定了最大能量差。对于GW类型计算，沿实轴和虚轴的频率网格使用基于宏观介电函数简单模型函数的复杂方案。", "recommended": "对于GW计算，建议设置为体系带隙的1.5-2倍，或通过收敛测试确定；对于CRPA计算，根据相互作用能量设置；对于BSE计算，设置为激子能量范围的上限。默认值可能需根据具体体系调整。", "tips": "1. OMEGAMAX的设置影响计算精度和效率，值太小可能遗漏重要频率，值太大增加计算成本；2. 此参数仅适用于旧GW代码，不适用于GWR（新GW代码）；3. 在CRPA和BSE中含义不同，需根据计算类型理解；4. 建议在实际计算中进行收敛测试以优化值。"}, "OMEGAMIN": {"name": "OMEGAMIN", "description": "Description:OMEGAMINsets the minimum frequency in the frequency grid.", "default": "OMEGAMIN= [real]Default:OMEGAMIN= minimum transition energy (0.05 for metals)", "details": "OMEGAMIN= [real]Default:OMEGAMIN= minimum transition energy (0.05 for metals)", "wiki_url": "https://www.vasp.at/wiki/index.php/OMEGAMIN", "description_cn": "OMEGAMIN参数用于设置频率网格中的最小频率值。", "default_value": "OMEGAMIN = [实数] 默认值：最小跃迁能量（对于金属为0.05）", "details_cn": "OMEGAMIN = [实数] 默认值：最小跃迁能量（对于金属为0.05）。该参数定义了在计算光学性质（如介电函数、能量损失函数等）时，频率网格的起始点。对于金属体系，默认值通常设为0.05 eV，以避免在零频处出现数值奇点；对于绝缘体或半导体，默认值通常取为体系的最小带隙跃迁能量。", "recommended": "推荐值：\n1. 金属体系：保持默认值0.05 eV，或根据实际需要微调（如0.01-0.1 eV）。\n2. 绝缘体/半导体：建议设为略大于体系带隙的值（例如带隙的1.1倍），以避免在带隙内引入不必要的频率点。\n3. 精确计算：若需高精度低频响应，可适当降低该值（如0.01 eV），但需注意计算成本会增加。", "tips": "注意事项：\n1. 若OMEGAMIN设置过小（接近0），可能导致数值不稳定或收敛问题，尤其对金属体系。\n2. 该参数与OMEGAMAX共同决定频率网格的范围，需确保两者匹配以覆盖目标频率区间。\n3. 对于非金属体系，若默认值不合理，建议通过测试计算（如检查介电函数虚部在低频处的行为）来优化设置。"}, "OMEGATL": {"name": "OMEGATL", "description": "OMEGATL= [real]Default:OMEGATL= 10[math]\\displaystyle{ \\times }[/math]outermost node in dielectric function[math]\\displaystyle{ \\epsilon(\\omega) }[/math]", "default": "OMEGATL= [real]Default:OMEGATL= 10[math]\\displaystyle{ \\times }[/math]outermost node in dielectric function[math]\\displaystyle{ \\epsilon(\\omega) }[/math]", "details": "Description:OMEGATLspecifies the maximum frequency for the coarse part of the frequency grid.\nFor the frequency grid along the real and imaginary axis sophisticated schemes are used, which are based on simple model functions for the macroscopic dielectric function. The grid spacing is dense up to roughly 1.3*OMEGAMAXand becomes coarser for larger frequencies. \nThe default has been carefully \nOMEGAMAX,OMEGAMIN,CSHIFT,NOMEGA", "wiki_url": "https://www.vasp.at/wiki/index.php/OMEGATL", "description_cn": "OMEGATL指定频率网格粗略部分的最大频率。", "default_value": "默认值为10乘以外介电函数的最外节点。", "details_cn": "详细说明：OMEGATL指定频率网格粗略部分的最大频率。对于沿实轴和虚轴的频率网格，使用基于宏观介电函数简单模型函数的复杂方案。网格间距在大约1.3倍OMEGAMAX之前是密集的，对于更大的频率变得更粗略。默认值是经过仔细设置的，并与OMEGAMAX、OMEGAMIN、CSHIFT、NOMEGA相关。", "recommended": "通常使用默认值，除非有特定需求。使用场景：在计算光学性质或介电函数时，调整OMEGATL可以优化频率网格的精度和效率，例如在需要更高频率分辨率或节省计算资源时。", "tips": "OMEGATL应与OMEGAMAX协调设置，避免网格过于粗糙或密集导致精度损失或计算效率低下。默认值通常足够，但高精度计算（如宽带光学响应）可能需要适当增大OMEGATL，同时注意与其他频率网格参数（如NOMEGA）的匹配。"}, "PARAM1": {"name": "PARAM1", "description": "PARAM1= [real]Default:PARAM1= 0.1234", "default": "PARAM1= [real]Default:PARAM1= 0.1234", "details": "Description:[math]\\displaystyle{ \\mu }[/math]forGGA=MK,[math]\\displaystyle{ \\beta }[/math]forGGA=BO.\nThePARAM1tag determines the value corresponding to different parameters depending on theGGAfunctional that is chosen:\nThe completeINCARfile for the nonlocal van der Waals functionals mentioned above can be found atNonlocal vdW-DF functionals.", "wiki_url": "https://www.vasp.at/wiki/index.php/PARAM1", "description_cn": "PARAM1是一个实数参数，默认值为0.1234。", "default_value": "0.1234", "details_cn": "对于GGA=MK，对应μ；对于GGA=BO，对应β。PARAM1参数根据所选的GGA泛函决定其对应的不同参数值。上述非局部范德华泛函的完整INCAR文件可在Nonlocal vdW-DF functionals处找到。", "recommended": "推荐值取决于所使用的GGA泛函。对于GGA=MK（如M06-L），建议设置PARAM1为μ值，通常在0.1到0.5之间；对于GGA=BO（如B88），建议设置PARAM1为β值，推荐值约为0.0042。默认值0.1234可能不适用于所有情况，需根据具体体系和泛函调整。使用场景包括非局部范德华泛函计算。", "tips": "确保在INCAR文件中正确设置GGA标签，以匹配PARAM1的含义；参数值应通过基准测试或文献参考确定，避免盲目使用默认值；在使用非局部vdW泛函时，需仔细调整此参数以优化计算精度。"}, "PARAM2": {"name": "PARAM2", "description": "PARAM2= [real]Default:PARAM2= 1.0", "default": "PARAM2= [real]Default:PARAM2= 1.0", "details": "Description:[math]\\displaystyle{ \\kappa }[/math]forGGA=MK, or[math]\\displaystyle{ \\mu }[/math]forGGA=BO.\nThePARAM2tag determines the value corresponding to different parameters depending on theGGAfunctional that is chosen:\nThe completeINCARfile for the nonlocal van der Waals functionals mentioned above can be found atNonlocal vdW-DF functionals.", "wiki_url": "https://www.vasp.at/wiki/index.php/PARAM2", "description_cn": "PARAM2= [实数] 默认值：PARAM2= 1.0", "default_value": "1.0", "details_cn": "当GGA=MK时对应κ，或当GGA=BO时对应μ。PARAM2标签根据所选的GGA泛函确定对应参数的值。上述提到的非局部范德华函数的完整INCAR文件可以在Nonlocal vdW-DF functionals找到。", "recommended": "默认值为1.0，但具体值应根据所选GGA泛函（如MK或BO）和计算体系进行调整。使用场景：当使用GGA=MK或GGA=BO泛函时，设置PARAM2以优化相关参数，例如在非局部范德华函数计算中。建议参考VASP手册或相关文献获取特定泛函的推荐值。", "tips": "确保INCAR中GGA标签正确设置为MK或BO，否则PARAM2可能无效；参数值可能影响计算精度和收敛性，建议进行收敛测试；对于非局部范德华函数，可参考Nonlocal vdW-DF functionals的示例文件。"}, "PFLAT": {"name": "PFLAT", "description": "Description: Control flag for the output of the profiling routines.", "default": "", "details": "Description: Control flag for the output of the profiling routines.\nIf specified asPMASS=.TRUE., only the flat profile is printed out in theOUTCAR.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PFLAT", "description_cn": "控制分析例程输出的标志。", "default_value": ".FALSE.", "details_cn": "控制分析例程输出的标志。如果指定为PMASS=.TRUE.，则只在OUTCAR中打印平坦的profile。", "recommended": "通常设置为.FALSE.以减少输出。使用场景：在进行性能优化或调试VASP计算时，设置为.TRUE.以获取平坦的profile信息，便于分析计算性能。", "tips": "设置PFLAT=.TRUE.可能会增加OUTCAR文件的大小，并可能轻微影响计算效率。建议仅在需要详细性能分析时使用，并确保与PMASS参数正确配合。"}, "PHON_BORN_CHARGES": {"name": "PHON_BORN_CHARGES", "description": "PHON_BORN_CHARGES=  [3x3xNIONS real]", "default": "Default:PHON_BORN_CHARGES", "details": "Description:PHON_BORN_CHARGESsets the Born effective charges to be used for the dipole-dipole corrections in the computation of the phonon dispersion. This is only used whenLPHON_POLAR=.TRUE.\nIf the material is non-metallic and polar (i.e. two or more atoms in the unit cell carry nonzero Born effective charge tensors), a special treatment of the long-range dipole-dipole interaction is required to obtain a smooth phonon dispersion.\nThis is activated by settingLPHON_POLAR=.TRUE. and supply\nQPOINTS,LPHON_DISPERSION,PHON_NWRITE,LPHON_POLAR,PHON_DIELECTRIC,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_BORN_CHARGES", "description_cn": "PHON_BORN_CHARGES 设置用于声子色散计算中偶极-偶极校正的Born有效电荷。它是一个3x3xNIONS的实数数组。", "default_value": "未设置（需用户提供）", "details_cn": "PHON_BORN_CHARGES 设置用于声子色散计算中偶极-偶极校正的Born有效电荷。仅当 LPHON_POLAR=.TRUE. 时使用。如果材料是非金属且极性的（即单胞中有两个或更多原子携带非零Born有效电荷张量），则需要特殊处理长程偶极-偶极相互作用以获得平滑的声子色散。这通过设置 LPHON_POLAR=.TRUE. 并提供 QPOINTS 来激活。", "recommended": "从密度泛函微扰理论（DFPT）计算中获取的Born有效电荷。使用场景：计算极性非金属材料（如离子晶体或极性半导体）的声子色散时，设置 LPHON_POLAR=.TRUE. 并提供此参数以校正长程偶极相互作用，确保色散曲线平滑准确。", "tips": "仅当 LPHON_POLAR=.TRUE. 时生效；Born有效电荷需准确，通常通过DFPT计算获得；对于金属材料，无需设置此参数；确保QPOINTS参数同时提供以激活校正。"}, "PHON_DIELECTRIC": {"name": "PHON_DIELECTRIC", "description": "PHON_DIELECTRIC=  [3x3 real]", "default": "Default:PHON_DIELECTRIC", "details": "Description:PHON_DIELECTRICsets the static dielectric tensor to be used for the dipole-dipole corrections in the computation of the phonon dispersion. This is only used whenLPHON_POLAR=.TRUE.\nIf the material is non-metallic and polar (i.e. two or more atoms in the unit cell carry nonzero Born effective charge tensors), a special treatment of the long-range dipole-dipole interaction is required to obtain a smooth phonon dispersion.\nThis is activated by settingLPHON_POLAR=.TRUE. and supply\nQPOINTS,LPHON_DISPERSION,PHON_NWRITE,LPHON_POLAR,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_DIELECTRIC", "description_cn": "PHON_DIELECTRIC 设置为一个3x3实数矩阵。", "default_value": "无默认值", "details_cn": "PHON_DIELECTRIC 设置用于声子色散计算中偶极-偶极校正的静态介电张量。仅当 LPHON_POLAR=.TRUE. 时使用。如果材料是非金属且极性的（即单胞中有两个或更多原子具有非零的Born有效电荷张量），则需要对长程偶极-偶极相互作用进行特殊处理以获得平滑的声子色散。这通过设置 LPHON_POLAR=.TRUE. 并提供 QPOINTS 来激活。", "recommended": "材料的静态介电张量，通常从密度泛函微扰理论（DFPT）计算或实验数据中获取。使用场景：当计算非金属极性材料（如离子晶体或极性半导体）的声子色散时，需设置LPHON_POLAR=.TRUE.并提供此参数以校正长程相互作用。", "tips": "仅当LPHON_POLAR=.TRUE.时此参数才生效；PHON_DIELECTRIC必须为3x3实数矩阵，表示静态介电张量；对于金属或非极性材料，无需设置；错误设置可能导致声子色散计算不准确或发散。"}, "PHON_DOS": {"name": "PHON_DOS", "description": "Description: Select the approach to use when computing the phonon density-of-states (DOS).", "default": "Default:PHON_DOS", "details": "Description: Select the approach to use when computing the phonon density-of-states (DOS).\nThe possible values are\nTo get a representative density of states theQPOINTSfile should specify a regular mesh.\nWhen line mode in theQPOINTSfile and gaussian smearing (PHON_DOS=1) is used, the phonon density of states will still be computed but the results are not reliable.", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_DOS", "description_cn": "选择计算声子态密度（DOS）时使用的方法。", "default_value": "PHON_DOS", "details_cn": "选择计算声子态密度（DOS）时使用的方法。可能的值包括：为了获得代表性的态密度，QPOINTS文件应指定一个规则网格。当在QPOINTS文件中使用线模式和高斯展宽（PHON_DOS=1）时，声子态密度仍将被计算，但结果不可靠。", "recommended": "推荐使用PHON_DOS=0（默认方法）用于规则网格计算，以获得可靠的声子态密度。避免在线模式下使用PHON_DOS=1，因为结果不可靠。", "tips": "确保QPOINTS文件指定规则网格以获得代表性态密度。当使用线模式时，不要使用高斯展宽（PHON_DOS=1），否则结果不可靠。"}, "PHON_G_CUTOFF": {"name": "PHON_G_CUTOFF", "description": "PHON_G_CUTOFF=  [real]", "default": "Default:PHON_G_CUTOFF", "details": "Description:PHON_G_CUTOFFsets the cutoff radius in reciprocal space used to determine the number of[math]\\displaystyle{ \\mathbf{G} }[/math]vectors involved in the Ewald sum in polar phonon calculations.\nThe Ewald sum that accounts for the long-range electrostatic interactions in phonon calculations runs over all G-vectors inside a cutoff sphere.\nThe radius of this sphere is given byPHON_G_CUTOFFas a multiple of the longest reciprocal lattice vector of the primitive cell (as detected by VASP).\nSpeci\nThe default value ofPHON_G_CUTOFFis a safe choice in most cases.\nLoweringPHON_G_CUTOFFcan result in faster phonon calculations.\nHowever, ensure that the phonon spectrum is properly converged.\nIf you run into convergence problems, try raising the value until the phonon dispersion converges.", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_G_CUTOFF", "description_cn": "PHON_G_CUTOFF= [实数]", "default_value": "PHON_G_CUTOFF", "details_cn": "PHON_G_CUTOFF 设置倒易空间中的截断半径，用于确定在极性声子计算中参与 Ewald 求和的 G 矢量数量。声子计算中考虑长程静电相互作用的 Ewald 求和遍历截断球内的所有 G 矢量。该球的半径由 PHON_G_CUTOFF 给出，作为原胞最长倒易晶格矢量的倍数（由 VASP 检测）。", "recommended": "通常设置为1.0到2.0之间，具体值需根据系统进行收敛测试确定。使用场景：用于极性材料的声子计算，特别是当需要精确处理长程静电相互作用和LO-TO分裂时。", "tips": "设置过小可能导致Ewald求和不收敛，影响计算精度；设置过大则增加计算成本。建议在正式计算前进行测试以优化该参数。"}, "PHON_LBOSE": {"name": "PHON_LBOSE", "description": "PHON_LBOSE= [logical]Default:PHON_LBOSE= .TRUE.", "default": "PHON_LBOSE= [logical]Default:PHON_LBOSE= .TRUE.", "details": "Description: Determines whether structures in the sampling are created according to Bose-Einstein or Maxwell-Boltzmann statistics.\nForPHON_LBOSE=.TRUE.Bose-Einstein statistics is used.\nForPHON_LBOSE=.FALSE.Maxwell-Boltzmann statistics is used.", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_LBOSE", "description_cn": "PHON_LBOSE 是一个逻辑参数，用于控制采样统计类型，默认值为 .TRUE.。", "default_value": ".TRUE.", "details_cn": "决定采样中的结构是根据玻色-爱因斯坦统计还是麦克斯韦-玻尔兹曼统计创建。当 PHON_LBOSE=.TRUE. 时，使用玻色-爱因斯坦统计；当 PHON_LBOSE=.FALSE. 时，使用麦克斯韦-玻尔兹曼统计。", "recommended": ".TRUE.。使用场景：在声子计算中，尤其是低温下，使用玻色-爱因斯坦统计以准确描述量子效应；对于高温或经典近似，可设置为 .FALSE.。", "tips": "确保在需要考虑量子效应的计算中使用此参数；对于高温或经典近似，可以使用麦克斯韦-玻尔兹曼统计，但需注意计算设置与统计方法的一致性。"}, "PHON_LMC": {"name": "PHON_LMC", "description": "PHON_LMC= [logical]Default:PHON_LMC= .FALSE.", "default": "PHON_LMC= [logical]Default:PHON_LMC= .FALSE.", "details": "Description: Controls whether electron-phonon interactions from Monte-Carlo sampling are calculated or not.\nFor further usage of this tag see:Electron-phonon interactions from Monte-Carlo sampling.\nElectron-phonon interactions from Monte-Carlo sampling,PHON_NSTRUCT,PHON_LBOSE,PHON_TLIST", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_LMC", "description_cn": "控制是否计算来自蒙特卡洛采样的电子-声子相互作用。", "default_value": ".FALSE.", "details_cn": "控制是否计算来自蒙特卡洛采样的电子-声子相互作用。有关此标签的进一步用法，请参见：来自蒙特卡洛采样的电子-声子相互作用。相关标签：PHON_NSTRUCT, PHON_LBOSE, PHON_TLIST", "recommended": "默认为.FALSE.，即不计算。当需要研究电子-声子相互作用时，设置为.TRUE.。使用场景：例如在计算超导性、热电性质等涉及电子-声子耦合的模拟中。", "tips": "设置PHON_LMC=.TRUE.时，需配合其他参数如PHON_NSTRUCT、PHON_LBOSE、PHON_TLIST使用。计算可能非常耗时，建议在资源充足的情况下进行。确保正确设置相关参数以获得准确结果。"}, "PHON_NEDOS": {"name": "PHON_NEDOS", "description": "PHON_NEDOS=  [integer]", "default": "Default:PHON_NEDOS", "details": "Description: Sets the number of frequency points to compute the phonon density of states.\nThe density of states is computed between[math]\\displaystyle{ [\\omega_{\\text{min}}-5\\sigma,\\omega_{\\text{max}}+5\\sigma] }[/math]with[math]\\displaystyle{ \\omega_{\\text{min}} }[/math]and[math]\\displaystyle{ \\omega_{\\text{max}} }[/math]the lowest and highest phonon frequency and[math]\\displaystyle{ \\si\nQPOINTS,PHON_NWRITE,LPHON_POLAR,PHON_DIELECTRIC,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_NEDOS", "description_cn": "设置计算声子态密度的频率点数。", "default_value": "PHON_NEDOS", "details_cn": "设置计算声子态密度的频率点数。态密度在 [ω_min - 5σ, ω_max + 5σ] 范围内计算，其中 ω_min 和 ω_max 是最低和最高声子频率，σ 是展宽参数。", "recommended": "通常设置为100-500，具体取决于系统大小和所需精度。使用场景：用于计算声子态密度、热力学性质分析等。", "tips": "PHON_NEDOS值过小会导致态密度不平滑，过大则增加计算时间。建议根据频率范围和展宽参数σ调整，并与QPOINTS等参数协调。"}, "PHON_NSTRUCT": {"name": "PHON_NSTRUCT", "description": "PHON_NSTRUCT= [integer]Default:PHON_NSTRUCT= none", "default": "PHON_NSTRUCT= [integer]Default:PHON_NSTRUCT= none", "details": "Description: Sets the number of structures for electron-phonon interactions from Monte-Carlo (MC) sampling.\nForPHON_NSTRUCT=-1 the eigenvalues and eigenvectors of the dynamic matrix are written to the fileDYNMATFULL.\nForPHON_NSTRUCT=0 the ZG configuration[1](one-shot) method is executed.", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_NSTRUCT", "description_cn": "设置电子-声子相互作用的结构数量，基于蒙特卡洛采样。", "default_value": "无", "details_cn": "设置电子-声子相互作用的结构数量，基于蒙特卡洛（MC）采样。当PHON_NSTRUCT=-1时，动力学矩阵的特征值和特征向量将写入文件DYNMATFULL。当PHON_NSTRUCT=0时，执行ZG配置[1]（一次性）方法。", "recommended": "根据计算需求选择。对于蒙特卡洛采样，设置正整数（如10-100，具体取决于系统大小和精度要求）；对于写入动力学矩阵信息，设置为-1；对于使用ZG配置方法，设置为0。使用场景：电子-声子耦合计算、声子谱分析等。", "tips": "设置正整数时需确保有足够的计算资源，因为蒙特卡洛采样可能计算密集；设置为-1时，确保文件DYNMATFULL有足够存储空间；建议参考VASP手册或相关文献以获取更详细指导。"}, "PHON_NWRITE": {"name": "PHON_NWRITE", "description": "PHON_NWRITE= [integer]", "default": "Default:PHON_NWRITE", "details": "Description:PHON_NWRITEdetermines how much output is written to theOUTCARfile when computing the phonon dispersionLPHON_DISPERSION=.TRUE.\nPositive numbers mean human-readable output, and negative numbers mean one-line format. The available options are:\nQPOINTS,LPHON_DISPERSION,LPHON_POLAR,PHON_DIELECTRIC,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_NWRITE", "description_cn": "PHON_NWRITE= [整数]", "default_value": "PHON_NWRITE", "details_cn": "PHON_NWRITE决定在计算声子色散（LPHON_DISPERSION=.TRUE.）时，写入OUTCAR文件的输出量。正数表示人类可读的输出，负数表示单行格式。可用选项包括：QPOINTS、LPHON_DISPERSION、LPHON_POLAR、PHON_DIELECTRIC、PHON_BORN_CHARGES、PHON_G_CUTOFF。", "recommended": "默认值通常为0，适用于大多数情况。对于调试或需要详细输出，可设置为正整数如1或2；对于减少输出或自动化处理，可设置为负整数如-1。使用场景：当进行声子色散计算时（LPHON_DISPERSION=.TRUE.），根据输出需求调整此参数。", "tips": "1. 确保在INCAR中设置LPHON_DISPERSION=.TRUE.以启用相关计算。2. 正数输出更易读但文件较大，负数输出紧凑便于处理。3. 可用选项如QPOINTS等可能影响输出内容，需根据计算设置选择。"}, "PHON_SIGMA": {"name": "PHON_SIGMA", "description": "Description: Set the width of the Gaussian function in eV to compute the phonon density of states.", "default": "Default:PHON_SIGMA", "details": "Description: Set the width of the Gaussian function in eV to compute the phonon density of states.\nThe density of states is computed between[math]\\displaystyle{ [\\omega_{\\text{min}}-5\\sigma,\\omega_{\\text{max}}+5\\sigma] }[/math]with[math]\\displaystyle{ \\omega_{\\text{min}} }[/math]and[math]\\displaystyle{ \\omega_{\\text{max}} }[/math]the lowest and highest phonon frequency and[math]\\displaystyle{ \\si\nQPOINTS,PHON_NWRITE,LPHON_POLAR,PHON_DIELECTRIC,PHON_BORN_CHARGES,PHON_G_CUTOFF", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_SIGMA", "description_cn": "设置高斯函数的宽度（以eV为单位）来计算声子态密度。", "default_value": "PHON_SIGMA", "details_cn": "设置高斯函数的宽度（以eV为单位）来计算声子态密度。态密度在 [ω_min - 5σ, ω_max + 5σ] 范围内计算，其中 ω_min 和 ω_max 是最低和最高声子频率，σ 是高斯函数的宽度。", "recommended": "推荐值通常为0.01到0.1 eV，具体取决于声子频率范围和系统。对于大多数材料，建议从0.05 eV开始测试，并根据声子谱的分辨率调整。使用场景：在计算声子态密度时，用于控制高斯展宽的宽度，以平滑态密度曲线并减少噪声。", "tips": "σ值过小可能导致计算结果噪声较大，过大则可能过度平滑声子谱细节；应确保σ值与声子频率范围相匹配，避免计算范围过宽或过窄；与其他参数如QPOINTS配合使用，以优化计算效率和精度。"}, "PHON_TLIST": {"name": "PHON_TLIST", "description": "PHON_TLIST= [real array]Default:PHON_TLIST= none", "default": "PHON_TLIST= [real array]Default:PHON_TLIST= none", "details": "Description: Provides the list of temperatures for that the electron-phonon interaction using the ZG configuration[1]is evaluated.\nFor further usage of this tag see:Electron-phonon interactions from Monte-Carlo sampling.\nElectron-phonon interactions from Monte-Carlo sampling,PHON_LMC,PHON_NSTRUCT", "wiki_url": "https://www.vasp.at/wiki/index.php/PHON_TLIST", "description_cn": "PHON_TLIST 是一个实数数组参数，用于指定电子-声子相互作用计算的温度列表。", "default_value": "none", "details_cn": "提供温度列表，用于评估使用 ZG 配置[1]的电子-声子相互作用。有关此标签的进一步用法，请参见基于蒙特卡洛采样的电子-声子相互作用。相关参数：PHON_LMC, PHON_NSTRUCT", "recommended": "根据研究需求设置温度数组，例如 [300, 600, 900]（单位：开尔文）。使用场景：在计算电子-声子耦合强度、热导率或材料在不同温度下的性质时，指定感兴趣的温度点，以进行蒙特卡洛采样分析。", "tips": "1. 温度值应为正实数，且需与计算体系的物理条件匹配；2. 需要与 PHON_LMC 和 PHON_NSTRUCT 等参数配合使用，以确保正确执行蒙特卡洛采样；3. 默认值为 none，表示不启用电子-声子相互作用计算，除非显式设置 PHON_TLIST。"}, "PLEVEL": {"name": "PLEVEL", "description": "Description: Control tag for the output of the profiling routines.", "default": "", "details": "Description: Control tag for the output of the profiling routines.\nIf specified all routines with a level higher thanPLEVEL=levelare not printed out in theOUTCAR.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PLEVEL", "description_cn": "控制分析例程输出的标签。", "default_value": "未指定", "details_cn": "控制分析例程输出的标签。如果指定，所有级别高于PLEVEL=level的例程将不会在OUTCAR文件中打印出来。使用此标签的示例", "recommended": "根据计算需求设置。例如，设置PLEVEL=1可减少输出文件大小，适用于常规计算；设置更高值（如PLEVEL=2或3）以获取更多分析细节。使用场景：调试、性能分析或需要控制OUTCAR文件大小时。", "tips": "设置PLEVEL可能隐藏部分输出信息，建议在需要详细分析时谨慎使用。确保值与计算目标匹配，避免遗漏关键数据；通常在不设置时使用默认行为。"}, "PLUGINS/FORCE_AND_STRESS": {"name": "PLUGINS/FORCE_AND_STRESS", "description": "PLUGINS/FORCE_AND_STRESS=  .True. | .False.Default:PLUGINS/FORCE_AND_STRESS= .False.", "default": "PLUGINS/FORCE_AND_STRESS=  .True. | .False.Default:PLUGINS/FORCE_AND_STRESS= .False.", "details": "Description:PLUGINS/FORCE_AND_STRESScalls the Python plugin for the force and stress interface for each ionic relaxation step\nWhenPLUGINS/FORCE_AND_STRESS=.TRUE., VASP calls theforce_and_stressPython function at the end of each ionic relaxation step. \nYou can use this tag to modify forces and the stress tensor to be consistent with modifications to the potential performed withPLUGINS/LOCAL_POTENTIAL.\nFurthermore, you could\nTheforce_and_stressPython function expects the following inputs,", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/FORCE_AND_STRESS", "description_cn": "PLUGINS/FORCE_AND_STRESS= .True. | .False. 默认值：PLUGINS/FORCE_AND_STRESS= .False.", "default_value": "PLUGINS/FORCE_AND_STRESS= .False.", "details_cn": "PLUGINS/FORCE_AND_STRESS为每个离子弛豫步骤调用力和应力接口的Python插件。当PLUGINS/FORCE_AND_STRESS=.TRUE.时，VASP在每个离子弛豫步骤结束时调用force_and_stress Python函数。您可以使用此标签修改力和应力张量，以与使用PLUGINS/LOCAL_POTENTIAL对势能进行的修改保持一致。此外，您可以... force_and_stress Python函数期望以下输入，", "recommended": "推荐值为.False.，除非需要自定义修改力和应力张量。使用场景：当与PLUGINS/LOCAL_POTENTIAL配合使用，需要确保力和应力与势能修改一致时，设置为.True.。", "tips": "1. 使用此参数前需确保Python插件已正确安装和配置。2. 必须提供force_and_stress Python函数，否则VASP可能报错。3. 启用后可能增加计算开销，因为每个离子步骤都会调用Python函数。"}, "PLUGINS/LOCAL_POTENTIAL": {"name": "PLUGINS/LOCAL_POTENTIAL", "description": "PLUGINS/LOCAL_POTENTIAL=  .True. | .False.Default:PLUGINS/LOCAL_POTENTIAL= .False.", "default": "PLUGINS/LOCAL_POTENTIAL=  .True. | .False.Default:PLUGINS/LOCAL_POTENTIAL= .False.", "details": "Description:PLUGINS/LOCAL_POTENTIALcalls the Python plugin for the local potential interface for each SCF step\nWhenPLUGINS/LOCAL_POTENTIAL=.TRUE., VASP calls thelocal_potentialPython function at the end of each SCF step. \nThe primary use-case of this tag is to add a quantity on the real space grid to the local potential and a scalar quantity to the total energy of a VASP calculation through a Python plugin.\nThelocal_potentialPython function expects the following inputs,", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/LOCAL_POTENTIAL", "description_cn": "参数PLUGINS/LOCAL_POTENTIAL可设置为True或False，默认值为False。", "default_value": "PLUGINS/LOCAL_POTENTIAL= .False.", "details_cn": "PLUGINS/LOCAL_POTENTIAL在每个自洽场（SCF）步骤中调用Python插件用于局部势接口。当PLUGINS/LOCAL_POTENTIAL=.TRUE.时，VASP在每个SCF步骤结束时调用local_potential Python函数。此标签的主要用途是通过Python插件向VASP计算的局部势添加实空间网格上的量，并向总能量添加标量量。local_potential Python函数期望以下输入，", "recommended": "默认False。使用场景：当需要通过Python插件自定义VASP计算的局部势或总能量时，例如添加外部势场、修正项或耦合其他物理模型，可设置为True。对于标准计算，建议保持默认False以避免不必要的复杂性和性能开销。", "tips": "使用此功能前，需确保Python环境已正确配置，且local_potential函数已按照VASP插件接口规范实现（如输入输出格式）。建议先在小规模测试中验证插件功能，并注意插件可能影响计算稳定性和收敛性。"}, "PLUGINS/MACHINE_LEARNING": {"name": "PLUGINS/MACHINE_LEARNING", "description": "PLUGINS/MACHINE_LEARNING=  .True. | .False.Default:PLUGINS/MACHINE_LEARNING= .False.", "default": "PLUGINS/MACHINE_LEARNING=  .True. | .False.Default:PLUGINS/MACHINE_LEARNING= .False.", "details": "Description:PLUGINS/MACHINE_LEARNINGcalls the Python plugin for the machine learning interface for each ionic relaxation step\nWhenPLUGINS/MACHINE_LEARNING=.TRUE., VASP calls themachine_learningPython function at the end of each ionic relaxation step. \nYou can use this tag to replace VASP forces and the stress tensor to represent an external machine-learned interatomic potential.\nThis can be used if you want to combine an m\nThemachine_learningPython function is different from the other plugins because it does not provide any input from VASP.\nInstead the plugin infrastructure handles the communication with VASP.\nThe only requirement of the plugin is that the function returns a class compatible with anASE Calculator.", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/MACHINE_LEARNING", "description_cn": "PLUGINS/MACHINE_LEARNING 参数用于控制是否启用机器学习插件。可以设置为 .True. 或 .False.，默认值为 .False.", "default_value": "PLUGINS/MACHINE_LEARNING= .False.", "details_cn": "PLUGINS/MACHINE_LEARNING 在每个离子弛豫步骤调用Python插件用于机器学习接口。当设置为 .TRUE. 时，VASP在每个离子弛豫步骤结束时调用machine_learning Python函数。你可以使用这个标签来替换VASP的力和应力张量，以表示一个外部机器学习原子间势。这可以用于如果你想结合一个机器学习模型（信息截断）。machine_learning Python函数与其他插件不同（信息截断）。", "recommended": "默认为 .False.，仅在需要使用外部机器学习原子间势时设置为 .True.。使用场景：当结合机器学习势（如神经网络势）进行分子动力学或结构弛豫时启用，以替代传统DFT计算，提高效率或模拟复杂体系。", "tips": "确保Python环境正确设置，并预先定义machine_learning函数；此功能可能用于高级研究，建议参考VASP官方文档以了解完整接口和潜在限制；使用时需验证机器学习势的准确性和兼容性。"}, "PLUGINS/ML_MODE": {"name": "PLUGINS/ML_MODE", "description": "PLUGINS/ML_MODE=  none | runDefault:PLUGINS/ML_MODE=  none", "default": "PLUGINS/ML_MODE=  none | runDefault:PLUGINS/ML_MODE=  none", "details": "Description: String-based tag selecting operation mode for runningPLUGINS/FORCE_AND_STRESSplugins.\nPlugins,PLUGINS/FORCE_AND_STRESS,PLUGINS/ML_OUTBLOCK,PLUGINS/ML_OUTPUT_MODE,PLUGINS/NEIGHBOR_CUTOFF\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/ML_MODE", "description_cn": "用于选择运行PLUGINS/FORCE_AND_STRESS插件的操作模式的字符串标签。", "default_value": "none", "details_cn": "用于选择运行PLUGINS/FORCE_AND_STRESS插件的操作模式的字符串标签。插件：PLUGINS/FORCE_AND_STRESS, PLUGINS/ML_OUTBLOCK, PLUGINS/ML_OUTPUT_MODE, PLUGINS/NEIGHBOR_CUTOFF 使用此标签的示例", "recommended": "none（默认），适用于标准第一性原理计算；run，适用于需要机器学习力场的计算场景，如加速分子动力学模拟或提高计算精度，但需确保相关插件和数据准备就绪。", "tips": "使用run模式时，需正确配置PLUGINS/FORCE_AND_STRESS等插件参数，并准备训练数据或预训练模型；注意机器学习模式可能增加计算资源需求，建议在测试后使用。"}, "PLUGINS/ML_OUTBLOCK": {"name": "PLUGINS/ML_OUTBLOCK", "description": "PLUGINS/ML_OUTBLOCK=  [integer]Default:PLUGINS/ML_OUTBLOCK=  1", "default": "PLUGINS/ML_OUTBLOCK=  [integer]Default:PLUGINS/ML_OUTBLOCK=  1", "details": "Description: Equivalent toML_OUTBLOCKfor calculations run via plugins instead of using VASP internal force fields.\nPlugins,ML_OUTBLOCK,PLUGINS/FORCE_AND_STRESS,PLUGINS/ML_MODE,PLUGINS/ML_OUTPUT_MODE\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/ML_OUTBLOCK", "description_cn": "PLUGINS/ML_OUTBLOCK参数，用于设置整数值，默认值为1。", "default_value": "1", "details_cn": "等价于ML_OUTBLOCK，用于通过插件运行的计算，而不是使用VASP内部力场。相关参数包括Plugins、ML_OUTBLOCK、PLUGINS/FORCE_AND_STRESS、PLUGINS/ML_MODE、PLUGINS/ML_OUTPUT_MODE。使用此标签的示例。", "recommended": "默认值为1，适用于大多数情况。使用场景：在使用VASP插件进行机器学习力场计算时，控制输出数据的块大小。如果需要更详细的输出（如每步输出），可以增加此值；如果希望减少输出以节省磁盘空间或提高计算效率，可以减小此值。", "tips": "确保此参数与ML_OUTBLOCK保持一致，以避免输出冲突。在插件计算中，正确设置此参数以优化输出频率和文件大小。过大的值可能导致输出文件过大，影响磁盘空间和后续分析效率。"}, "PLUGINS/ML_OUTPUT_MODE": {"name": "PLUGINS/ML_OUTPUT_MODE", "description": "PLUGINS/ML_OUTPUT_MODE=  [integer]Default:PLUGINS/ML_OUTPUT_MODE=  1", "default": "PLUGINS/ML_OUTPUT_MODE=  [integer]Default:PLUGINS/ML_OUTPUT_MODE=  1", "details": "Description: Equivalent toML_OUTPUT_MODEfor calculations run via plugins instead of using VASP internal force fields.\nPlugins,ML_OUTPUT_MODE,PLUGINS/FORCE_AND_STRESS,PLUGINS/ML_MODE,PLUGINS/ML_OUTBLOCK\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/ML_OUTPUT_MODE", "description_cn": "用于通过插件运行的计算的输出模式，等价于ML_OUTPUT_MODE。", "default_value": "1", "details_cn": "等价于ML_OUTPUT_MODE，用于通过插件运行的计算，而不是使用VASP内部力场。相关参数：Plugins, ML_OUTPUT_MODE, PLUGINS/FORCE_AND_STRESS, PLUGINS/ML_MODE, PLUGINS/ML_OUTBLOCK。使用此标签的示例。", "recommended": "默认值1适用于大多数情况。如需更详细的输出，可设置为2或更高。使用场景：在通过插件运行机器学习计算时，用于控制输出详细程度。", "tips": "注意与PLUGINS/ML_MODE等参数配合使用；高输出模式可能增加计算开销和存储需求。"}, "PLUGINS/NEIGHBOR_CUTOFF": {"name": "PLUGINS/NEIGHBOR_CUTOFF", "description": "PLUGINS/NEIGHBOR_CUTOFF=  [real]", "default": "", "details": "Description:PLUGINS/NEIGHBOR_CUTOFFdetermines the cutoff up to which the neighbor list is computed that is passed to the Python plugins. If not set, the neighbor list will be empty.\nIf set, VASP will compute pair distances between atoms in the unit cell and include all pairs below the given cutoff in a neighbor list.\nYou can use this neighbor list in your plugin to make decisions based on the interatomic distances.\nIn each plugin theneighbor_listis a list of length number of atoms, where every element of the list is an instance of", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/NEIGHBOR_CUTOFF", "description_cn": "PLUGINS/NEIGHBOR_CUTOFF参数用于设置邻居列表计算的截止距离，接受实数值。", "default_value": "未设置", "details_cn": "PLUGINS/NEIGHBOR_CUTOFF决定了传递给Python插件的邻居列表的计算截止距离。如果未设置，邻居列表将为空。如果设置，VASP将计算晶胞中原子之间的对距离，并将所有低于给定截止距离的对包含在邻居列表中。你可以在插件中使用这个邻居列表基于原子间距离做出决策。在每个插件中，neighbor_list是一个长度为原子数的列表，其中每个元素...", "recommended": "推荐值取决于具体应用。例如，对于基于距离的分析，可设置为原子间典型键长的1.5-2倍。使用场景：当需要在Python插件中基于原子间距离做出决策时，如计算配位数或分析局部结构。", "tips": "设置过大的值会增加计算成本，过小的值可能遗漏重要邻居。应根据体系的晶格常数和原子类型合理设置截止距离。"}, "PLUGINS/OCCUPANCIES": {"name": "PLUGINS/OCCUPANCIES", "description": "PLUGINS/OCCUPANCIES=  .True. | .False.Default:PLUGINS/OCCUPANCIES= .False.", "default": "PLUGINS/OCCUPANCIES=  .True. | .False.Default:PLUGINS/OCCUPANCIES= .False.", "details": "Description:PLUGINS/OCCUPANCIEScalls the Python plugin for the occupancies interface for each ionic relaxation step\nWhenPLUGINS/OCCUPANCIES=.TRUE., VASP calls theoccupanciesPython function at the end of each ionic relaxation step. \nThe primary use-case of this tag to recompute the occupancies after performing modifications through other plugins such asPLUGINS/LOCAL_POTENTIAL. It also allows changingNELECT,EFERMI,\nTheoccupanciesPython function expects the following inputs,", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/OCCUPANCIES", "description_cn": "PLUGINS/OCCUPANCIES= .True. | .False. 默认值：PLUGINS/OCCUPANCIES= .False.", "default_value": ".False.", "details_cn": "PLUGINS/OCCUPANCIES 在每个离子弛豫步骤中调用用于占据数接口的 Python 插件。当 PLUGINS/OCCUPANCIES=.TRUE. 时，VASP 在每个离子弛豫步骤结束时调用 occupancies Python 函数。此标签的主要用例是在通过其他插件（如 PLUGINS/LOCAL_POTENTIAL）执行修改后重新计算占据数。它还允许更改 NELECT、EFERMI。occupancies Python 函数期望以下输入，", "recommended": "默认为 .False.，一般情况下保持默认。使用场景：当使用其他插件（如 PLUGINS/LOCAL_POTENTIAL）修改占据数后，需要重新计算时，设置为 .True.。", "tips": "1. 确保Python环境正确配置，VASP能调用Python函数。2. 开启此选项可能会增加计算时间，因为每个离子步骤都会调用Python函数。3. 注意输入参数的正确性，避免错误。"}, "PLUGINS/STRUCTURE": {"name": "PLUGINS/STRUCTURE", "description": "PLUGINS/STRUCTURE=  .True. | .False.Default:PLUGINS/STRUCTURE= .False.", "default": "PLUGINS/STRUCTURE=  .True. | .False.Default:PLUGINS/STRUCTURE= .False.", "details": "Description:PLUGINS/STRUCTUREcalls the Python plugin for the structure interface for each ionic relaxation step\nWhenPLUGINS/STRUCTURE=.TRUE., VASP calls thestructurePython function at the end of each ionic relaxation step. \nThe primary use-case of this tag is to modify the structure based on the computed energy, force and stress tensor.\nThestructurePython function expects the following inputs,", "wiki_url": "https://www.vasp.at/wiki/index.php/PLUGINS/STRUCTURE", "description_cn": "PLUGINS/STRUCTURE参数用于控制是否启用Python插件来修改结构。", "default_value": ".False.", "details_cn": "详细说明：PLUGINS/STRUCTURE调用Python插件用于结构接口，每个离子弛豫步骤。当PLUGINS/STRUCTURE=.TRUE.时，VASP在每个离子弛豫步骤结束时调用structure Python函数。主要用途是基于计算的能量、力和应力张量修改结构。structure Python函数期望以下输入。", "recommended": "通常使用默认值.False.，除非有特定需求。使用场景：当需要基于计算结果（如能量、力、应力）动态修改结构时，例如在自定义结构优化或模拟中。", "tips": "启用此参数需要用户准备相应的Python脚本，并确保与VASP正确集成。可能会增加计算开销，因为每个离子步骤都会调用外部函数。建议在测试环境中先验证插件功能。"}, "PMASS": {"name": "PMASS", "description": "PMASS= [Real]Default:PMASS= 1000", "default": "PMASS= [Real]Default:PMASS= 1000", "details": "Description:PMASSassigns a fictitious mass (in amu) to the lattice degrees-of-freedom in case of Parrinello-Rahman dynamics (in case VASP was compiled with-Dtbdyn).\nWhen runningNpTsimulations with aLangevin thermostat[1](MDALGO=3), using the method ofParrinello and Rahman,[2][3]a fictitious mass (in amu) for the lattice degrees-of-freedom has to be assigned using thePMASStag.\nThe friction coefficient for lattice degrees-of-freedom have to be specified (in ps-1)\nThe friction coefficients γ for the atomic degrees-of-freedom are specified using theLANGEVIN_GAMMAtag.", "wiki_url": "https://www.vasp.at/wiki/index.php/PMASS", "description_cn": "PMASS参数用于分配晶格自由度的虚构质量。", "default_value": "1000", "details_cn": "PMASS为晶格自由度分配一个虚构质量（单位：原子质量单位，amu），适用于Parrinello-Rahman动力学（如果VASP编译时启用了-Dtbdyn）。当使用Langevin恒温器[1]（MDALGO=3）运行NpT模拟时，采用Parrinello和Rahman的方法[2][3]，必须使用PMASS标签为晶格自由度分配一个虚构质量（单位：amu）。晶格自由度的摩擦系数必须指定（单位：ps⁻¹）。摩擦系数γ为...", "recommended": "默认值为1000 amu，但建议根据系统晶格刚度调整，通常可在500-2000 amu范围内测试。使用场景：在Parrinello-Rahman动力学的NpT模拟（恒定压力和温度）中，用于控制晶格动力学的稳定性。", "tips": "确保VASP编译时启用了-Dtbdyn选项；PMASS值影响模拟稳定性和收敛性，过大可能导致动力学缓慢，过小可能导致数值不稳定；需与摩擦系数配合使用，并参考相关文献优化参数。"}, "POMASS": {"name": "POMASS", "description": "POMASS= [real array]Default:POMASS= values read fromPOTCAR", "default": "POMASS= [real array]Default:POMASS= values read fromPOTCAR", "details": "Description: Array of masses of the atoms in atomic units.\nPOMASSdetermines the atomic mass of each atomic species. For standard calculations this tag should be omitted since the atomic masses for each species are read from thePOTCARfile (they are also calledPOMASSthere). However if one needs to change the atomic mass of some species, e.g., the mass of Hydr\nWARNING: mass on POTCAR and INCAR are incompatible.", "wiki_url": "https://www.vasp.at/wiki/index.php/POMASS", "description_cn": "POMASS= [实数数组] 默认值：POMASS= 从POTCAR文件中读取的值", "default_value": "从POTCAR文件中读取的值", "details_cn": "原子质量的数组，以原子单位表示。POMASS确定每种原子种类的原子质量。对于标准计算，应省略此标签，因为每种原子的质量从POTCAR文件中读取（在POTCAR中也称为POMASS）。然而，如果需要更改某些原子种类的质量，例如氢的质量，警告：POTCAR和INCAR中的质量不兼容。", "recommended": "省略此标签，使用POTCAR中的默认值。使用场景：标准计算中无需设置；当需要自定义原子质量时（如模拟同位素效应或特殊动力学模拟），可设置此参数，但需确保与POTCAR中的质量一致。", "tips": "警告：POTCAR和INCAR中的质量不兼容。修改POMASS时，必须确保与POTCAR文件中的质量匹配，否则可能导致计算错误或不准确的结果。"}, "POSNICS": {"name": "POSNICS", "description": "ThePOSNICSfile is an input file that defines the positions to calculate the NMR nucleus-independent chemical shielding (NICS). If it is present in the directory running the job, it will be used by default, though it can be made explicit usingLPOSNICS= True. The first line defines the number of NICS positions, followed by the positions of the NICS in direct coordinates, i.e., as fractions of the lattice parameters[math]\\displaystyle{ {\\vec a}_1, {\\vec a}_2 }[/math]and[math]\\displaystyle{ {\\vec a}_3 }[/math]:", "default": "", "details": "LCHIMAG,NUCIND,LPOSNICS", "wiki_url": "https://www.vasp.at/wiki/index.php/POSNICS", "description_cn": "POSNICS文件是一个输入文件，用于定义计算NMR核独立化学位移（NICS）的位置。如果它存在于运行作业的目录中，它将默认使用，但可以通过设置LPOSNICS= True来显式指定。第一行定义NICS位置的数量，随后是NICS在直接坐标中的位置，即作为晶格矢量的分数。", "default_value": "无默认值，需手动创建文件", "details_cn": "详细信息：相关参数包括LCHIMAG（控制磁化率张量计算）、NUCIND（指定核索引）、LPOSNICS（控制是否使用POSNICS文件）。这些参数共同用于NMR NICS计算，其中LCHIMAG启用磁化率计算，NUCIND定义核位置，LPOSNICS显式激活POSNICS文件的使用。", "recommended": "推荐在需要计算特定位置（如环中心或分子空腔）的NICS时使用，以分析芳香性、环电流效应或化学屏蔽特性。设置LPOSNICS= True以启用，并确保POSNICS文件存在。使用场景包括NMR谱学研究和材料电子结构分析。", "tips": "POSNICS文件必须放在VASP作业目录中，且格式正确（第一行为位置数量，后续行为直接坐标）。坐标应为晶格矢量的分数，范围通常在0到1之间。建议先进行测试计算以验证位置设置，避免因坐标错误导致计算失败。"}, "POTIM": {"name": "POTIM", "description": "Description:POTIMsets the time step in molecular dynamics or the step width in ionic relaxations.", "default": "Default:POTIM", "details": "Description:POTIMsets the time step in molecular dynamics or the step width in ionic relaxations.\nstructure optimization,IBRION,NFREE\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/POTIM", "description_cn": "POTIM 设置分子动力学中的时间步长或离子弛豫中的步宽。", "default_value": "POTIM", "details_cn": "POTIM 设置分子动力学中的时间步长或离子弛豫中的步宽。结构优化，IBRION，NFREE", "recommended": "对于离子弛豫（如IBRION=1,2,3），推荐值通常为0.1-0.5 Å，具体取决于系统；对于分子动力学（IBRION=0），推荐值为0.5-2.0 fs，取决于原子质量和温度。使用场景：在结构优化中控制离子移动步长，在分子动力学中控制时间积分步长。", "tips": "POTIM值需根据系统收敛性和稳定性调整，过大可能导致发散，过小可能降低计算效率。应结合IBRION和NFREE参数使用，以确保正确模拟。"}, "PREC": {"name": "PREC", "description": "PREC= Normal | Single | SingleN | Accurate | Low | Medium | High", "default": "Default:PREC", "details": "Description:PRECspecifies the \"precision\" mode.\nPRECsets default values for the energy cutoffENCUT, the FFT grids (NGX,NGY,NGZ) and (NGXF,NGYF,NGZF), and the accuracy of the projectors in real spaceROPT(used only whenLREAL=.TRUE.). Details are given below in the table.\nWe recommend usingPREC=Normal orPREC=Accurate.PREC=Normal can be used for most routine calculations.PREC=Accurate leads to a denser grid (NGX,NGY,NGZ). Thus, it reduces egg-box effects and strictly avoids anyaliasing/wrap-around errors.PREC=Normal andPREC=Accurate use an augmentation fine grid (NGXF", "wiki_url": "https://www.vasp.at/wiki/index.php/PREC", "description_cn": "PREC参数指定VASP计算的精度模式。", "default_value": "Normal", "details_cn": "PREC指定“精度”模式。PREC设置能量截断ENCUT、FFT网格（NGX, NGY, NGZ）和（NGXF, NGYF, NGZF）的默认值，以及实空间投影仪的精度ROPT（仅在LREAL=.TRUE.时使用）。详细信息在下面的表格中给出。我们推荐使用PREC=Normal或PREC=Accurate。PREC=Normal可用于大多数常规计算。PREC=Accurate导致更密集的网格（NGX, NGY, NGZ），从而减少蛋盒效应并严格避免任何混叠/环绕误差。", "recommended": "PREC=Normal用于大多数常规计算，如结构优化或能量计算；PREC=Accurate用于需要高精度的情况，如声子计算或避免数值误差的场景。", "tips": "选择PREC会影响计算精度和计算成本；Accurate模式会增加FFT网格密度，从而增加计算时间和内存需求；确保与其他参数如ENCUT协调，因为PREC会设置其默认值；当使用实空间投影仪（LREAL=.TRUE.）时，PREC也影响ROPT的精度。"}, "PRECFOCK": {"name": "PRECFOCK", "description": "PRECFOCK= Normal | Accurate | Fast  | Medium | Single | Low", "default": "Default:PRECFOCK", "details": "Description:PRECFOCKcontrols the FFT grids used in the exact exchange routines (Hartree-Fock and hybrid functionals).\nThe FFT grid used for the exact exchange contributions can be chose to be different from the one used for the Hartree and DFT potentials. Information on the  FFT grid that is used in the exact Fock exchange routines is written to theOUTCARfile after the lines\nWe recommend to setPRECFOCK=Normal for routine calculations.\nIf speed is an issue, you can also usePRECFOCK=Fast (e.g. use this to pre-converge the orbitals). For very high precision, in particular for phonon calculations,PRECFOCK=Accurate is recommended.\nThe two setting,PRECFOCK=Medium andPRECFOCK=", "wiki_url": "https://www.vasp.at/wiki/index.php/PRECFOCK", "description_cn": "PRECFOCK 控制精确交换例程（Hartree-Fock 和杂化泛函）中使用的 FFT 网格。", "default_value": "Normal", "details_cn": "PRECFOCK 控制精确交换例程（Hartree-Fock 和杂化泛函）中使用的 FFT 网格。用于精确交换贡献的 FFT 网格可以选择与用于 Hartree 和 DFT 势的网格不同。精确 Fock 交换例程中使用的 FFT 网格信息会写入 OUTCAR 文件中，在相应行之后。我们建议在常规计算中设置 PRECFOCK=Normal。如果速度是问题，也可以使用 PRECFOCK=Fast（例如，使用）", "recommended": "Normal 用于常规计算，确保精度；Fast 用于需要加速计算的场景，但可能牺牲一些精度。", "tips": "不同设置会影响计算精度和速度；建议检查 OUTCAR 文件中的 FFT 网格信息；在杂化泛函计算中，根据体系大小和计算资源选择合适的设置。"}, "PROUTINE": {"name": "PROUTINE", "description": "Description: Control flag for the output of the profiling routines.", "default": "", "details": "Description: Control flag for the output of the profiling routines.\nIf specified only the routine with the namePROUTINE=routineis taken into account.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PROUTINE", "description_cn": "控制性能分析例程输出的标志。", "default_value": "无", "details_cn": "控制性能分析例程输出的标志。如果指定，只有名为PROUTINE=routine的例程会被考虑。", "recommended": "推荐不设置此参数，除非需要分析特定计算例程的性能。使用场景：在性能调试或优化时，设置PROUTINE为特定例程名（如PROUTINE='routine_name'）以输出该例程的性能数据。", "tips": "确保指定的例程名正确拼写；设置此参数可能增加输出文件大小和计算开销；仅建议在需要详细性能分析时使用，避免不必要的资源消耗。"}, "PSTRESS": {"name": "PSTRESS", "description": "PSTRESS= [real]Default:PSTRESS= 0", "default": "PSTRESS= [real]Default:PSTRESS= 0", "details": "Description: Sets the external pressure in kB or adds corrections to the stress tensor.\nThe unit ofPSTRESSis kB.\nDuringionic minimization, an energy term[math]\\displaystyle{  E= V \\times \\mathrm{PSTRESS}  }[/math]is added to the total energy and the value ofPSTRESSis subtracted from  the diagonals of the stress tensor. This allows to perform structure optimization at a specific external pressure.", "wiki_url": "https://www.vasp.at/wiki/index.php/PSTRESS", "description_cn": "设置外部压力（单位：kB）或修正应力张量。", "default_value": "0", "details_cn": "设置外部压力（单位：kB）或向应力张量添加修正。PSTRESS的单位是kB。在离子弛豫过程中，会向总能量添加一个能量项 E = V × PSTRESS，并从应力张量的对角线元素中减去PSTRESS的值。这允许在特定外部压力下进行结构优化。", "recommended": "默认值为0，适用于无外部压力的常规优化。如需在特定压力下优化，设置PSTRESS为所需压力值（单位：kB）。例如，模拟高压相变时，可设置PSTRESS为相应压力值。", "tips": "注意PSTRESS的单位是kB（千巴）。在离子弛豫中，它会修改总能量和应力张量。设置非零值时，确保压力值符合物理意义。此参数主要用于结构优化，不影响电子自洽计算。"}, "PSUBSYS": {"name": "PSUBSYS", "description": "PSUBSYS= [real array]", "default": "", "details": "Description:PSUBSYSsets the collision probabilities for the atoms in each atomic subsystem in calculations with multiple Anderson thermostats (in case VASP was compiled with-Dtbdyn).\nUp to three user-defined atomic subsystems may be coupled with independent Andersen thermostats[1](MDALGO=13).\nThe collision probabilities for the atoms in each atomic subsystem is set by means of thePSUBSYStag (one has to specify one number for each subsystem).", "wiki_url": "https://www.vasp.at/wiki/index.php/PSUBSYS", "description_cn": "PSUBSYS= [实数数组]", "default_value": "未提供", "details_cn": "PSUBSYS 设置在多个 Andersen 热浴计算中每个原子子系统的原子碰撞概率（如果 VASP 编译时使用了 -Dtbdyn）。最多三个用户定义的原子子系统可以与独立的 Andersen 热浴耦合[1]（MDALGO=13）。每个原子子系统的原子碰撞概率通过 PSUBSYS 标签设置（必须为每个子系统指定一个数字）。", "recommended": "碰撞概率通常设置为0.1到0.5之间的值，具体取决于模拟的温度控制需求；例如，对于快速热化可设置较高值（如0.5），对于缓慢耦合可设置较低值（如0.1）。使用场景：当使用MDALGO=13进行多子系统分子动力学模拟时，用于独立控制每个子系统的温度耦合强度，适用于复杂体系如界面或异质结构模拟。", "tips": "1. 确保VASP编译时启用了-Dtbdyn选项，否则此参数无效；2. 最多支持三个原子子系统，需在INCAR中正确定义子系统；3. 碰撞概率必须为正实数，且通常小于1；4. 需与MDALGO=13配合使用，并参考VASP手册中的示例。"}, "PTHRESHOLD": {"name": "PTHRESHOLD", "description": "Description: Control flag for the output of the profiling routines.", "default": "", "details": "Description: Control flag for the output of the profiling routines.\nIf specified all routines with less execution time thanPTHRESHOLD=timeare not printed out in theOUTCARfile.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/PTHRESHOLD", "description_cn": "控制分析例程输出的标志。", "default_value": "未指定", "details_cn": "如果指定，所有执行时间少于PTHRESHOLD=time的例程不会在OUTCAR文件中打印出来。", "recommended": "根据需求设置，例如0.1秒以过滤短时间例程。使用场景：在性能分析、调试或减少OUTCAR文件大小时使用，以专注于关键计算步骤。", "tips": "设置值时需确保时间单位正确（通常为秒）。过高值可能隐藏重要输出信息，过低值可能无效；建议根据具体计算任务调整。"}, "Profiling": {"name": "Profiling", "description": "In the most recent version of VASP, profiling routines were added to all important routines in VASP. Using profiling will print at the end of the OUTCAR a list of all routines called during the specific run of VASP, its overall execution time, the number of times it was called and the level at which it was called.", "default": "", "details": "To add support for profiling add-DPROFILINGto the already existing preprocessor flags\nThen you have to entirely recompile VASP by executing\nIf you want to include newly developed routines to the profiling, you have to include the profiling module (if it is not already included in the enclosing module your routine is in) by adding", "wiki_url": "https://www.vasp.at/wiki/index.php/Profiling", "description_cn": "在最新版本的VASP中，所有重要例程都添加了profiling例程。使用profiling将在OUTCAR文件末尾打印出在特定VASP运行期间调用的所有例程列表、其总执行时间、被调用的次数以及调用级别。", "default_value": "未指定", "details_cn": "要添加profiling支持，将-DPROFILING添加到现有的预处理器标志中。然后，您必须通过执行来完全重新编译VASP。如果您想将新开发的例程包含到profiling中，您必须通过添加来包含profiling模块（如果它尚未包含在您例程所在的封装模块中）。", "recommended": "推荐在性能分析和调试时启用profiling（例如设置为TRUE或1），常规计算时禁用以减少开销。使用场景包括优化计算效率、识别性能瓶颈或分析代码执行时间。", "tips": "启用profiling需要重新编译VASP，可能增加编译时间和复杂性。profiling输出会增加OUTCAR文件大小，建议仅在需要时使用，并确保编译环境正确配置。"}, "QMAXFOCKAE": {"name": "QMAXFOCKAE", "description": "QMAXFOCKAE= [real array]", "default": "We do not recommend setting these tags manually, except after careful inspection of the VASP code (fast_aug.F). The default values are 6.0 Å-1ifNMAXFOCKAE=1 (corresponding to 140 eV), and 5.0 and 10 Å", "details": "Description: Controls at which wave vectors the local augmentation \ncharges are fitted to obtain an accurate charge augmentation on the plane-wave grid.\nWe do not recommend setting these tags manually, except after careful inspection of the VASP code (fast_aug.F). The default values are 6.0 Å-1ifNMAXFOCKAE=1 (corresponding to 140 eV), and 5.0 and 10 Å-1(corresponding to 95 eV and 380 eV) forNMAXFOCKAE=2.\nNMAXFOCKAE,LMAXFOCKAE,LFOCKAEDFT", "wiki_url": "https://www.vasp.at/wiki/index.php/QMAXFOCKAE", "description_cn": "QMAXFOCKAE= [实数数组]", "default_value": "默认值取决于NMAXFOCKAE：如果NMAXFOCKAE=1，则为6.0 Å-1；如果NMAXFOCKAE=2，则为5.0和10 Å-1。", "details_cn": "控制在哪些波矢量处拟合局部增强电荷，以在平面波网格上获得准确的电荷增强。我们不建议手动设置这些标签，除非仔细检查VASP代码（fast_aug.F）。默认值是：如果NMAXFOCKAE=1，则为6.0 Å-1（对应140 eV）；如果NMAXFOCKAE=2，则为5.0和10 Å-1（分别对应95 eV和380 eV）。相关参数：NMAXFOCKAE、LMAXFOCKAE、LFOCKAEDFT。", "recommended": "推荐使用默认值。除非经过仔细检查VASP代码并理解其影响，否则不建议手动设置。使用场景包括需要高精度电荷增强的计算，如杂化泛函或精确电子结构计算。", "tips": "1. 不建议手动设置，除非仔细检查VASP代码（fast_aug.F）。2. 默认值取决于NMAXFOCKAE参数。3. 相关参数有NMAXFOCKAE、LMAXFOCKAE、LFOCKAEDFT，设置时需综合考虑。"}, "QSPIRAL": {"name": "QSPIRAL", "description": "QSPIRAL= [real array]Default:QSPIRAL= 3*0.0", "default": "QSPIRAL= [real array]Default:QSPIRAL= 3*0.0", "details": "Description: theQSPIRAL-tag specifies the spin spiral propagation vector.\nQSPIRALspecifies the spin spiral propagation vector in direct coordinates of the reciprocal lattice.\nSee thedescription of spin spiral calculationsfor more details.", "wiki_url": "https://www.vasp.at/wiki/index.php/QSPIRAL", "description_cn": "QSPIRAL是一个实数数组，用于指定自旋螺旋传播向量，默认值为3*0.0。", "default_value": "3*0.0", "details_cn": "QSPIRAL标签指定自旋螺旋传播向量。QSPIRAL在倒易晶格的直接坐标中指定自旋螺旋传播向量。有关更多详细信息，请参阅自旋螺旋计算的描述。", "recommended": "对于自旋螺旋计算，根据材料的磁结构设置适当的传播向量；否则，使用默认值0.0。使用场景：在进行自旋螺旋计算时，需要设置此参数以定义螺旋的传播方向。", "tips": "确保传播向量在倒易晶格的直接坐标中正确设置；自旋螺旋计算可能需要配合其他参数如LSPIRAL；默认值0.0表示无螺旋，适用于常规计算。"}, "QUAD_EFG": {"name": "QUAD_EFG", "description": "QUAD_EFG= [real array]Default:QUAD_EFG= NTYP*1.0", "default": "QUAD_EFG= [real array]Default:QUAD_EFG= NTYP*1.0", "details": "Description: nuclear quadrupole moment (in millbarn) for the atomic types on thePOTCARfile.\nSetting theQUAD_EFGtag allows the conversion of theVzz(seeLEFG) values into the quadrupole coupling constantsCqoften encountered in NMR literature.\nThe conversion formula is as follows (Qis the element and isotope specific quadrupole moment):\nTheQUAD_EFGtag specifies the nuclear quadrupole moment in millibarns for each atomic species, in the same\norder as in thePOTCARfile. The outputCqis in MHz. An online compilation of nuclear quadrupole moments can be found online in a database[1]or in Ref.[2](updated numbers in Ref.[3]).", "wiki_url": "https://www.vasp.at/wiki/index.php/QUAD_EFG", "description_cn": "用于POTCAR文件中原子类型的核四极矩（以毫靶恩为单位）。", "default_value": "默认值为实数数组，每个元素为1.0，长度为原子类型数（NTYP）。", "details_cn": "用于POTCAR文件中原子类型的核四极矩（以毫靶恩为单位）。设置QUAD_EFG标签允许将Vzz值（参见LEFG）转换为核磁共振（NMR）文献中常见的四极耦合常数Cq。转换公式如下（Q是元素和同位素特定的四极矩）：QUAD_EFG标签为每个原子物种指定核四极矩（以毫靶恩为单位），顺序与POTCAR文件中相同。输出的Cq单位为MHz。一个在线", "recommended": "根据具体元素和同位素的核四极矩设置，例如对于^14N，四极矩约为20.44毫靶恩；对于^17O，约为-2.56毫靶恩。使用场景：在进行NMR计算，特别是需要从VASP输出中获得四极耦合常数Cq时，必须正确设置此参数，以确保计算结果的准确性。", "tips": "1. 确保QUAD_EFG数组的顺序与POTCAR文件中的原子类型顺序一致，否则会导致计算错误。2. 核四极矩值必须准确，建议从核物理数据库或文献中获取元素和同位素特定的值。3. 结合LEFG标签使用，以获取Vzz值并进行转换。4. 输出Cq单位为MHz，注意与其他NMR参数的单位协调。"}, "RANDOM_GENERATOR": {"name": "RANDOM_GENERATOR", "description": "RANDOM_GENERATOR= default | pcg_32", "default": "RANDOM_GENERATOR= default | pcg_32", "details": "Description: Specifies the random-number generator used to initialize the wavefunction (seeINIWAV) forelectronic minimization, initialize atomic velocities formolecular dynamics, etc.\nThe random-number generator (RNG) generates a sequence of random numbers, which is initialized by the tagRANDOM_SEED. By default the random number generator uses a very stable, compiler and platform independent algorithm. It is based on the work: \"Toward a Universal Random Number Generator\" by Georg\nFor such systems it can be advantageous to switchRANDOM_GENERATOR= pcg_32, which is threaded (need to enableOpenMP threadingat compile time) over the number of OpenMP threads. The algorithm is also guaranteed to produce the same random numbers in each call, but might depend on the compiler and libra", "wiki_url": "https://www.vasp.at/wiki/index.php/RANDOM_GENERATOR", "description_cn": "指定用于初始化波函数（见INIWAV）进行电子最小化、初始化原子速度进行分子动力学等的随机数生成器。", "default_value": "default | pcg_32", "details_cn": "指定用于初始化波函数（见INIWAV）进行电子最小化、初始化原子速度进行分子动力学等的随机数生成器。随机数生成器（RNG）生成一个随机数序列，由标签RANDOM_SEED初始化。默认情况下，随机数生成器使用一个非常稳定、编译器和平台无关的算法。它基于Georg的工作：\"Toward a Universal Random Number Generator\"。对于这样的系统。", "recommended": "推荐使用默认值default，因为它稳定且适用于大多数计算，如电子最小化。对于需要更高质量随机数的分子动力学模拟，可以考虑使用pcg_32以提高随机性。", "tips": "确保正确设置RANDOM_SEED以初始化随机数序列，避免重复；在并行计算中，注意随机数生成器的一致性；建议测试不同生成器对计算结果的影响，特别是在敏感模拟中。"}, "RANDOM_SEED": {"name": "RANDOM_SEED", "description": "RANDOM_SEED= [integer][integer][integer]Default:RANDOM_SEED= based on the system clock", "default": "RANDOM_SEED= [integer][integer][integer]Default:RANDOM_SEED= based on the system clock", "details": "Description:RANDOM_SEEDspecifies the seed of the random-number generator (compile VASP with-Dtbdyn).\nThe random-number generator (RNG) generates a sequence of random numbers, which is initialized by the tagRANDOM_SEED.\nFor example, in molecular dynamics simulations, the RNG can be used to initialize atomic velocities. Hence, the seed for the RNG influences the trajectory of a molecular dynamics sim\nA typical input for theRANDOM_SEEDlooks like this:", "wiki_url": "https://www.vasp.at/wiki/index.php/RANDOM_SEED", "description_cn": "RANDOM_SEED参数用于指定随机数生成器的种子，格式为三个整数。", "default_value": "基于系统时钟自动生成。", "details_cn": "RANDOM_SEED指定随机数生成器的种子（需要在编译VASP时使用-Dtbdyn选项）。随机数生成器（RNG）生成一系列随机数，这些随机数由RANDOM_SEED标签初始化。例如，在分子动力学模拟中，RNG可用于初始化原子速度。因此，RNG的种子会影响分子动力学模拟的轨迹。RANDOM_SEED的典型输入如下：", "recommended": "对于需要可重复性的模拟，推荐设置一个固定的整数种子，例如12345；对于一般用途，使用默认值（基于系统时钟）。使用场景：分子动力学模拟中初始化原子速度，或其他需要随机数生成的计算，如随机初始化或蒙特卡洛模拟。", "tips": "1. 编译VASP时必须启用-Dtbdyn选项，否则RANDOM_SEED参数可能无效。2. 种子值决定了随机数序列，因此会影响模拟结果的可重复性；固定种子可确保结果一致。3. 在并行计算中，不同进程的种子设置需协调，以避免随机性不一致导致模拟偏差。"}, "ROPT": {"name": "ROPT", "description": "ROPT= [real array], one entry for each species on thePOTCARfile", "default": "Default:ROPT", "details": "Description:ROPTdetermines how accurately the projectors are represented in real space. WithLREAL=On, the real space projectors are optimized using an algorithm proposed by King-Smith et al.[1]LREAL=Auto[2]is the recommended scheme since it is considerably more accurate, resulting in more localized \nDepending on their value, VASP interpretsROPTentries in one of two ways:\nThe \"precision\" and \"conventional\" modes may be intermixed, i.e., it is possible to specify", "wiki_url": "https://www.vas
