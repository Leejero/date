互作用时，可考虑设置为.TRUE.以启用Ewald求和，但需注意这会增加计算成本。", "tips": "1. 该参数仅在使用DFT-D2、DFT-ulg或Tkatchenko-Scheffler等特定范德华修正方法时有效。2. 启用Ewald求和（.TRUE.）会显著增加计算量，尤其对于大体系。3. 对于非周期性或低维体系，通常不建议启用。"}, "LVDW_ONECELL": {"name": "LVDW_ONECELL", "description": "LVDW_ONECELL= [logical][logical][logical]Default:LVDW_ONECELL=  .FALSE. .FALSE. .FALSE.", "default": "LVDW_ONECELL= [logical][logical][logical]Default:LVDW_ONECELL=  .FALSE. .FALSE. .FALSE.", "details": "Description:LVDW_ONECELLcan be used to disable vdW interaction with mirror image in X Y Z direction. This is advisable for molecular calculations in the gas phase. In all other cases, use the default.\nNote: There is some confusing documentation on the ASE pages, which states that \".TRUE. .TRUE. .TRUE.\" enables the interaction with neighboring cells. However, the opposite is the case and.TRUE.disables the interaction (\".FALSE. .FALSE. .FALSE.\" = interactions switched on, \".TRUE. .TRUE. .TRUE.\" = i\nIVDW,Many-body dispersion energy,", "wiki_url": "https://www.vasp.at/wiki/index.php/LVDW_ONECELL", "description_cn": "LVDW_ONECELL参数用于控制范德华相互作用与镜像的交互，接受三个逻辑值。", "default_value": ".FALSE. .FALSE. .FALSE.", "details_cn": "LVDW_ONECELL可用于禁用在X、Y、Z方向上与镜像的范德华相互作用。这对于气相分子计算是建议的。在所有其他情况下，使用默认值。注意：ASE页面上有一些令人困惑的文档，指出“.TRUE. .TRUE. .TRUE.”启用与相邻单元的相互作用。然而，情况相反，.TRUE.禁用相互作用（“.FALSE. .FALSE. .FALSE.” = 相互作用开启，“.TRUE. .TRUE. .TRUE.” = 相互作用关闭）。", "recommended": "对于气相分子计算，推荐设置为.TRUE. .TRUE. .TRUE.以禁用相互作用；其他情况下使用默认值.FALSE. .FALSE. .FALSE.。", "tips": "注意ASE文档可能误导，.TRUE.表示禁用相互作用，.FALSE.表示启用相互作用。"}, "LVGVAPPL": {"name": "LVGVAPPL", "description": "LVGVAPPL= .TRUE. | .FALSE.Default:LVGVAPPL=  .FALSE.", "default": "LVGVAPPL= .TRUE. | .FALSE.Default:LVGVAPPL=  .FALSE.", "details": "Description:LVGVAPPLdetermines whether thevGvorbital magnetic susceptibility is applied in the calculation of the CSA tensor.\nLVGVAPPLis available as of VASP.6.4.0.\nWhen performing a chemical shift calculation the standardpGvsusceptibility is used to calculate the[math]\\displaystyle{ \\mathbf{G=0} }[/math]contribution to the CSA tensor by default.\nThis can be overruled withLVGVAPPL.\nIn caseLVGVAPPLis true, thevGvsusceptibility is applied for the calculation of t", "wiki_url": "https://www.vasp.at/wiki/index.php/LVGVAPPL", "description_cn": "LVGVAPPL参数用于控制是否在CSA张量计算中应用vGv轨道磁化率。", "default_value": ".FALSE.", "details_cn": "LVGVAPPL决定是否在CSA张量计算中应用vGv轨道磁化率。LVGVAPPL从VASP 6.4.0版本开始可用。在进行化学移位计算时，默认使用标准pGv磁化率来计算G=0对CSA张量的贡献。这可以通过LVGVAPPL覆盖。如果LVGVAPPL为true，则使用vGv磁化率进行CSA张量的计算。", "recommended": "默认为.FALSE.，适用于标准化学移位计算。如果需要更精确的轨道磁化率贡献，尤其是在涉及轨道效应的体系中，可以设置为.TRUE.。使用场景：在计算核磁共振（NMR）化学位移时，当需要考虑vGv轨道磁化率的影响时使用。", "tips": "此参数仅在VASP 6.4.0及以上版本中可用。设置为.TRUE.可能会增加计算成本，因为vGv磁化率的计算更复杂。确保在需要时使用，避免不必要的计算开销。"}, "LVGVCALC": {"name": "LVGVCALC", "description": "LVGVCALC= .TRUE. | .FALSE.Default:LVGVCALC=  .TRUE.", "default": "LVGVCALC= .TRUE. | .FALSE.Default:LVGVCALC=  .TRUE.", "details": "Description:LVGVCALCswitches on calculation of thevGvexpression for the orbital magnetic susceptibility.\nLVGVCALCis available as of VASP.6.4.0.\nWhen performing a chemical shift calculation the standardpGvsusceptibility is calculated and used in the calculation of the CSA tensor[1]. WhenLVGVCALCis true, the magnetic susceptibility is also calculated with thevGvapproximation.LVGVAPPLdetermines whether thevGvorpGvresult is applied in the calcu", "wiki_url": "https://www.vasp.at/wiki/index.php/LVGVCALC", "description_cn": "LVGVCALC参数用于控制是否计算vGv表达式的轨道磁化率。", "default_value": "TRUE", "details_cn": "LVGVCALC切换是否计算vGv表达式的轨道磁化率。LVGVCALC从VASP 6.4.0版本开始可用。当进行化学位移计算时，标准pGv磁化率被计算并用于CSA张量的计算[1]。当LVGVCALC为真时，磁化率也使用vGv近似计算。LVGVAPPL决定在计算中应用vGv还是pGv结果。", "recommended": "默认为TRUE，适用于需要计算vGv近似磁化率的场景，如化学位移或轨道磁化率计算；若仅需标准pGv计算或节省资源，可设为FALSE。", "tips": "1. 该参数仅VASP 6.4.0及以上版本支持；2. 需与LVGVAPPL参数配合使用以确定应用结果；3. 设为TRUE可能增加计算开销，建议根据具体需求调整。"}, "LVHAR": {"name": "LVHAR", "description": "LVHAR= [logical]Default:LVHAR= .FALSE.", "default": "LVHAR= [logical]Default:LVHAR= .FALSE.", "details": "Description: Determines whether the local potential[math]\\displaystyle{ V_{\\text{ionic}}(\\mathbf{r}) +V_{\\text{hartree}}(\\mathbf{r})  }[/math](in eV) is written to theLOCPOTfile.\n[math]\\displaystyle{ \nV_{\\text{ionic}}(\\mathbf{r})+V_{\\text{hartree}}(\\mathbf{r}) =\nV_{\\text{ionic}}(\\mathbf{r}) + \n\\int \\frac{n(\\mathbf{r'})}{|\\mathbf{r}-\\mathbf{r'}|}d\\mathbf{r'}\n }[/math]\nwhere[math]\\displaystyle{ V_{\\text{ionic}}(\\mathbf{r}) }[/math]is the ionic potential as mimicked by the pseudopotentials and[math]\\displaystyle{ V_{\\text{hartree}}(\\mathbf{r}) }[/math]is the Hartree potential.", "wiki_url": "https://www.vasp.at/wiki/index.php/LVHAR", "description_cn": "决定是否将局部势写入LOCPOT文件。", "default_value": ".FALSE.", "details_cn": "决定是否将局部势 V_ionic(r) + V_hartree(r)（单位：eV）写入LOCPOT文件。其中V_ionic(r)是赝势模拟的离子势，V_hartree(r)是哈特里势，由电子密度n(r')的积分给出。", "recommended": "默认值为.FALSE.。推荐在需要分析局部势时设置为.TRUE.，例如计算功函数、表面势垒或电荷转移时。", "tips": "设置LVHAR=.TRUE.会增加计算时间和输出文件大小。仅在需要时使用，并确保后处理工具支持LOCPOT文件。"}, "LVTOT": {"name": "LVTOT", "description": "LVTOT= [logical]Default:LVTOT= .FALSE.", "default": "LVTOT= [logical]Default:LVTOT= .FALSE.", "details": "Description: Determines whether the total local potential[math]\\displaystyle{ V_{\\text{LOCPOT}}(\\mathbf{r}) }[/math](in eV) is written to theLOCPOTfile.\n[math]\\displaystyle{ \nV_{\\text{LOCPOT}}(\\mathbf{r}) = \nV_{\\text{ionic}}(\\mathbf{r}) + \n\\int \\frac{n(\\mathbf{r'})}{|\\mathbf{r}-\\mathbf{r'}|}d\\mathbf{r'}+\nV_{\\text{xc}}(\\mathbf{r})\n }[/math]\nwhere[math]\\displaystyle{ V_{\\text{ionic}}(\\mathbf{r}) }[/math]is the ionic potential,\nthe second term is the Hartree potential, and[math]\\displaystyle{ V_{\\text{xc}}(\\mathbf{r}) }[/math]is the (semi-)local exchange-correlation potential.", "wiki_url": "https://www.vasp.at/wiki/index.php/LVTOT", "description_cn": "决定是否将总局部势写入LOCPOT文件。", "default_value": ".FALSE.", "details_cn": "决定是否将总局部势 V_LOCPOT(r)（单位：eV）写入LOCPOT文件。V_LOCPOT(r) = V_ionic(r) + ∫ n(r')/|r-r'| dr' + V_xc(r)，其中 V_ionic(r) 是离子势，第二项是Hartree势，V_xc(r) 是交换关联势。", "recommended": "默认为.FALSE.。如果需要分析总局部势，例如在计算功函数、表面电势或电荷转移时，设置为.TRUE.。使用场景：表面科学、界面研究、电化学计算等需要电势分析的场合。", "tips": "设置LVTOT=.TRUE.会生成LOCPOT文件，增加存储需求和计算时间。在大型计算中应谨慎使用，避免资源浪费。确保理解LOCPOT文件的内容和格式，以便后续分析。"}, "LWANNIER90": {"name": "LWANNIER90", "description": "LWANNIER90= .TRUE. | .FALSE.Default:LWANNIER90= .FALSE.", "default": "LWANNIER90= .TRUE. | .FALSE.Default:LWANNIER90= .FALSE.", "details": "Description:LWANNIER90=.TRUE. switches on the interface between VASP andWANNIER90.\nN.B.: This feature is only present if VASP is compiled with-DVASP2WANNIER90 or -DVASP2WANNIER90v2.\nForLWANNIER90=.TRUE., VASP will write the input files for a WANNIER90 run:wannier90.win,wannier90.mmn,wannier90.eig,wannier90.amn, and ifLWRITE_UNK=.TRUE.wannier90.UNKp.s. This is done by runningwannier_setupin library mode as described in Chapter 6 of theWANNIER90 manual. For documentation of these", "wiki_url": "https://www.vasp.at/wiki/index.php/LWANNIER90", "description_cn": "LWANNIER90参数用于控制是否启用VASP与Wannier90的接口。默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "LWANNIER90=.TRUE. 启用VASP与Wannier90之间的接口。注意：此功能仅在VASP编译时使用了-DVASP2WANNIER90或-DVASP2WANNIER90v2选项时才可用。当LWANNIER90=.TRUE.时，VASP将为Wannier90运行写入输入文件：wannier90.win、wannier90.mmn、wannier90.eig、wannier90.amn，以及如果LWRITE_UNK=.TRUE.，还会写入wannier90.UNKp.s。这是通过以库模式运行wannier_setup来实现的，如Wannier90手册第6章所述。有关这些文件的文档，请参考Wannier90手册。", "recommended": "推荐值为.FALSE.。当需要使用Wannier90进行Wannier函数构建、能带插值或拓扑性质计算时，设置为.TRUE.。", "tips": "1. 确保VASP编译时使用了-DVASP2WANNIER90或-DVASP2WANNIER90v2选项。2. 使用LWANNIER90=.TRUE.时，可能需要设置LWRITE_UNK=.TRUE.以生成UNK文件。3. 参考Wannier90手册以获取详细使用说明。"}, "LWANNIER90_RUN": {"name": "LWANNIER90_RUN", "description": "LWANNIER90_RUN= .TRUE. | .FALSE.Default:LWANNIER90_RUN= .FALSE.", "default": "LWANNIER90_RUN= .TRUE. | .FALSE.Default:LWANNIER90_RUN= .FALSE.", "details": "Description:LWANNIER90_RUNexecuteswannier_setup(seeLWANNIER90=.TRUE.) and subsequently runsWANNIER90in library mode (wannier_run).\nFor details on the execution ofwannier_setupin VASP, see the description of theLWANNIER90-tag.\nFor information on the many tags one may set in thewannier90.winfile to control the execution of WANNIER90 (be it standalone or in library mode) we refer to theWANNIER90 manual.\nMind: when running WANNIER90 in library mode, thewannier90.mmnandwannier90.amnfiles are not written. The information these files normally contain is passed on towannier_runinternally. If you want these files to be written anyway, for instance to be able to run WANNIER90 standalone later on, one shou", "wiki_url": "https://www.vasp.at/wiki/index.php/LWANNIER90_RUN", "description_cn": "LWANNIER90_RUN 参数用于控制是否运行 Wannier90 的库模式。", "default_value": ".FALSE.", "details_cn": "LWANNIER90_RUN 执行 wannier_setup（参见 LWANNIER90=.TRUE.）并随后以库模式运行 WANNIER90（wannier_run）。有关在 VASP 中执行 wannier_setup 的详细信息，请参阅 LWANNIER90 标签的描述。有关可以在 wannier90.win 文件中设置的许多标签以控制 WANNIER90 的执行（无论是独立模式还是库模式），请参考 WANNIER90 手册。注意：当以库模式运行 WANNIER90 时，wannier90.mmn 和 wannier90.amn 文件不会被写入。", "recommended": "默认为 .FALSE.，除非需要运行 Wannier90 库模式，否则保持默认。使用场景：当需要使用 Wannier90 进行 Wannier 函数计算时，设置为 .TRUE.。", "tips": "当以库模式运行 WANNIER90 时，wannier90.mmn 和 wannier90.amn 文件不会被写入。"}, "LWAVE": {"name": "LWAVE", "description": "LWAVE= [logical]Default:LWAVE= .TRUE.", "default": "LWAVE= [logical]Default:LWAVE= .TRUE.", "details": "Description: Determines whether the wavefunctions are written at the end of a run.\nThe wavefunctions are written to theWAVECARfile by default. IfLH5= T, the wavefunctions are written to thevaspwave.h5instead.\nWAVECAR,LH5,vaspwave.h5,LCHARG", "wiki_url": "https://www.vasp.at/wiki/index.php/LWAVE", "description_cn": "决定是否在运行结束时写入波函数。", "default_value": ".TRUE.", "details_cn": "决定是否在运行结束时写入波函数。默认情况下，波函数写入WAVECAR文件。如果LH5= T，则波函数改为写入vaspwave.h5文件。相关参数：WAVECAR, LH5, vaspwave.h5, LCHARG。", "recommended": "默认为.TRUE.，适用于需要保存波函数以进行后续计算的场景，如能带结构、态密度计算或几何优化。如果磁盘空间有限或仅进行单次计算，可设置为.FALSE.以节省存储资源。", "tips": "保存波函数会占用磁盘空间，尤其对于大体系或长时计算需谨慎评估。若设置LH5= T，波函数以HDF5格式存储，可能提升I/O效率，但需确保VASP编译支持HDF5。建议与LCHARG等参数协调，避免冗余输出。"}, "LWAVEH5": {"name": "LWAVEH5", "description": "LWAVEH5= [logical]Default:LWAVEH5=LH5", "default": "LWAVEH5= [logical]Default:LWAVEH5=LH5", "details": "Description: Determines whether the wavefunctions are written tovaspwave.h5file at the end of a run.\nIfLWAVEH5= True, the Kohn-Sham orbitals, i.e., wavefunctions, are written to thevaspwave.h5file at the end of the calculation. This can be used to restart VASP.\nLCHARG,LCHARGH5,LWAVE,LH5", "wiki_url": "https://www.vasp.at/wiki/index.php/LWAVEH5", "description_cn": "决定在运行结束时是否将波函数写入vaspwave.h5文件。", "default_value": "LH5", "details_cn": "决定在运行结束时是否将波函数写入vaspwave.h5文件。如果LWAVEH5=True，则在计算结束时将Kohn-Sham轨道，即波函数，写入vaspwave.h5文件。这可用于重新启动VASP。相关参数：LCHARG, LCHARGH5, LWAVE, LH5。", "recommended": "根据计算需求设置。如果需要保存波函数用于重启或后处理，建议设置为True；否则，可保持默认值。使用场景：适用于需要高效存储波函数的计算，如大规模模拟或后续分析，HDF5格式更高效且支持并行读写。", "tips": "HDF5文件可能占用较大存储空间，请确保磁盘空间充足。与LWAVE参数协调使用，避免重复写入；默认值依赖于LH5参数，修改LH5会影响LWAVEH5。"}, "LWEIGHTED": {"name": "LWEIGHTED", "description": "LWEIGHTED= [logical]Default:LWEIGHTED= .FALSE.", "default": "LWEIGHTED= [logical]Default:LWEIGHTED= .FALSE.", "details": "Description:LWEIGHTEDselects theweighted-cRPA method.\nSelects the cRPA method of Sasioglu, Friedrich and Blügel[1]where the following screening contribution is subtracted from the full RPA polarizability:\nLDISENTANGLED,LSCRPA,ALGO", "wiki_url": "https://www.vasp.at/wiki/index.php/LWEIGHTED", "description_cn": "LWEIGHTED是一个逻辑参数，默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "LWEIGHTED选择加权cRPA方法。它选择Sasioglu、Friedrich和Blügel[1]的cRPA方法，其中从全RPA极化率中减去以下屏蔽贡献：LDISENTANGLED、LSCRPA、ALGO。", "recommended": "默认值为.FALSE.。在需要进行加权cRPA计算以研究电子屏蔽效应（如计算Hubbard U参数）时，设置为.TRUE.。", "tips": "使用LWEIGHTED时，需确保LDISENTANGLED、LSCRPA和ALGO参数正确设置；加权cRPA计算可能增加计算成本，建议参考VASP文档和原始文献[1]以优化设置。"}, "LWRITE_MMN_AMN": {"name": "LWRITE_MMN_AMN", "description": "LWRITE_MMN_AMN= .TRUE. | .FALSE.", "default": "Default:LWRITE_MMN_AMN", "details": "Description:LWRITE_MMN_AMN=.TRUE. tells the VASP2WANNIER90 interface to write thewannier90.mmnandwannier90.amnfiles.\nWhen running WANNIER90 in library mode (LWANNIER90_RUN=.TRUE.), thewannier90.mmnandwannier90.amnfiles are not written. The information these files normally contain is passed on towannier_runinternally. If you want these files to be written anyway, for instance, to be able to run WANNIER90 standalone\nLWANNIER90,LWANNIER90_RUN", "wiki_url": "https://www.vasp.at/wiki/index.php/LWRITE_MMN_AMN", "description_cn": "LWRITE_MMN_AMN 参数用于控制是否写入 wannier90.mmn 和 wannier90.amn 文件。", "default_value": ".FALSE.", "details_cn": "LWRITE_MMN_AMN=.TRUE. 指示 VASP2WANNIER90 接口写入 wannier90.mmn 和 wannier90.amn 文件。当以库模式运行 WANNIER90（即 LWANNIER90_RUN=.TRUE.）时，wannier90.mmn 和 wannier90.amn 文件不会被写入。这些文件通常包含的信息会内部传递给 wannier_run。如果您仍然希望写入这些文件，例如，为了能够独立运行 WANNIER90，请设置 LWRITE_MMN_AMN=.TRUE.。相关参数：LWANNIER90, LWANNIER90_RUN。", "recommended": ".FALSE.（默认）。使用场景：当需要生成 wannier90.mmn 和 wannier90.amn 文件以供 WANNIER90 独立使用时，设置为 .TRUE.。在库模式下运行时，通常保持默认值。", "tips": "当 LWANNIER90_RUN=.TRUE. 时，设置 LWRITE_MMN_AMN=.TRUE. 可以强制写入文件，但信息可能已内部传递。确保与 LWANNIER90 和 LWANNIER90_RUN 参数协调使用。"}, "LWRITE_SPN": {"name": "LWRITE_SPN", "description": "LWRITE_SPN= .TRUE. | .FALSE.Default:LWRITE_SPN= .FALSE.", "default": "LWRITE_SPN= .TRUE. | .FALSE.Default:LWRITE_SPN= .FALSE.", "details": "Description: Writewannier90.spnfile for noncollinear calculations.\nFor noncollinear calculations (LNONCOLLINEAR=T using vasp_ncl) thewannier90.spnfile is written when\nThe file is formatted, and the appropriate line (spn_formatted = .true.) is automatically added to thewannier90.winfile.", "wiki_url": "https://www.vasp.at/wiki/index.php/LWRITE_SPN", "description_cn": "LWRITE_SPN参数用于控制是否写入wannier90.spn文件，可设置为.TRUE.或.FALSE.，默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "为非共线计算写入wannier90.spn文件。对于非共线计算（使用vasp_ncl时设置LNONCOLLINEAR=T），当文件被格式化时，会写入wannier90.spn文件，并且相应的行（spn_formatted = .true.）会自动添加到wannier90.win文件中。", "recommended": "在需要生成wannier90.spn文件时设置为.TRUE.，例如进行非共线计算并使用Wannier90进行后处理时。否则，保持默认值.FALSE.。", "tips": "1. 确保LNONCOLLINEAR=T已设置，否则此参数无效。2. 仅适用于vasp_ncl版本。3. 文件格式化会自动处理，但建议检查wannier90.win文件中的spn_formatted设置。"}, "LWRITE_UNK": {"name": "LWRITE_UNK", "description": "LWRITE_UNK= .TRUE. | .FALSE.Default:LWRITE_UNK= .FALSE.", "default": "LWRITE_UNK= .TRUE. | .FALSE.Default:LWRITE_UNK= .FALSE.", "details": "Description:LWRITE_UNKdecides whether the cell-periodic part of the relevant Bloch functions is written.\nForLWRITE_UNK=True, VASP writes the cell-periodic part of the Kohn–Sham orbitals in spin channel s at k point p to the filewannier90.UNKp.s. This file can be used to plot Wannier orbitals with WANNIER90.\nFor details on the execution ofwannier_setupin VASP, see the description of theLWANNIER90tag.\nFor information on thewannier90.winfile and the execution of WANNIER90, we refer to theWANNIER90 manual.", "wiki_url": "https://www.vasp.at/wiki/index.php/LWRITE_UNK", "description_cn": "LWRITE_UNK 可以设置为 .TRUE. 或 .FALSE.，默认值为 .FALSE.", "default_value": ".FALSE.", "details_cn": "LWRITE_UNK 决定是否写入相关布洛赫函数的晶胞周期部分。当 LWRITE_UNK=True 时，VASP 会将自旋通道 s 在 k 点 p 的 Kohn-Sham 轨道的晶胞周期部分写入文件 wannier90.UNKp.s。该文件可用于使用 WANNIER90 绘制 Wannier 轨道。有关 VASP 中 wannier_setup 执行的详细信息，请参阅 LWANNIER90 标签的描述。有关 wannier90.win 文件和 WANNIER90 执行的信息，请参考 WANNIER90 文档。", "recommended": "默认为 .FALSE.。使用场景：当需要使用 WANNIER90 进行 Wannier 函数分析或绘制轨道时，设置为 .TRUE.。", "tips": "设置 LWRITE_UNK=True 会生成额外的文件，可能增加磁盘空间使用。确保与 LWANNIER90 标签配合使用，以正确执行 Wannier 函数计算。参考 WANNIER90 文档以获取更多信息。"}, "LWRITE_WANPROJ": {"name": "LWRITE_WANPROJ", "description": "LWRITE_WANPROJ= [logical]Default:LWRITE_WANPROJ= .FALSE.", "default": "LWRITE_WANPROJ= [logical]Default:LWRITE_WANPROJ= .FALSE.", "details": "Description:LWRITE_WANPROJdetermines whether the Wannier projection fileWANPROJis written.\nIfWANPROJis present, VASP skips the Wannier projection and reads the effective projectors Unkfrom theWANPROJfile for each k point.\nLWANNIER90,LWANNIER90_RUN,LDOWNSAMPLE", "wiki_url": "https://www.vasp.at/wiki/index.php/LWRITE_WANPROJ", "description_cn": "LWRITE_WANPROJ= [逻辑值] 默认值：LWRITE_WANPROJ= .FALSE.", "default_value": ".FALSE.", "details_cn": "LWRITE_WANPROJ 决定是否写入 Wannier 投影文件 WANPROJ。如果 WANPROJ 文件存在，VASP 将跳过 Wannier 投影，并从 WANPROJ 文件中读取每个 k 点的有效投影器 Unk。相关参数：LWANNIER90, LWANNIER90_RUN, LDOWNSAMPLE", "recommended": "默认为 .FALSE.。使用场景：当需要保存 Wannier 投影信息以供后续分析或避免重复计算时，可设置为 .TRUE.。例如，在使用 Wannier90 进行能带插值或计算输运性质时，启用此参数可以保存投影数据，便于后续步骤复用。", "tips": "1. 确保在使用 LWRITE_WANPROJ=.TRUE. 时，相关参数如 LWANNIER90 和 LWANNIER90_RUN 已正确设置，以启用 Wannier90 功能。2. WANPROJ 文件可能较大，需注意存储空间。3. 如果 WANPROJ 文件已存在，VASP 会跳过投影计算，这可能影响计算流程或结果一致性，建议在需要时手动管理文件。"}, "LWRT_AUGMENTED_DENSITY": {"name": "LWRT_AUGMENTED_DENSITY", "description": "LWRT_AUGMENTED_DENSITY= .TRUE. | .FALSE.Default:LWRT_AUGMENTED_DENSITY= .TRUE.", "default": "LWRT_AUGMENTED_DENSITY= .TRUE. | .FALSE.Default:LWRT_AUGMENTED_DENSITY= .TRUE.", "details": "Description: Switch forWRT_DENSITYto write without augmentation (compensation charge=0).\nWithLWRT_AUGMENTED_DENSITY= Fthe densities can be written without augmentation (compensation charge=0). Mind that the augmented densities are still used duringelectronic minimizationto evaluate theXC functional(unlike for theMGGAspecific tagLNOAUGXC).\nWRT_DENSITY,ENCUT,NGXF,NGYF,NGZF", "wiki_url": "https://www.vasp.at/wiki/index.php/LWRT_AUGMENTED_DENSITY", "description_cn": "LWRT_AUGMENTED_DENSITY是用于控制WRT_DENSITY写入密度时是否包含增强（补偿电荷）的开关。", "default_value": ".TRUE.", "details_cn": "当LWRT_AUGMENTED_DENSITY设置为.FALSE.时，密度可以写入无增强（补偿电荷=0）的形式。注意，在电子最小化过程中，增强密度仍用于评估交换关联泛函（与MGGA特定标签LNOAUGXC不同）。相关参数包括WRT_DENSITY、ENCUT、NGXF、NGYF、NGZF。", "recommended": "推荐值为.TRUE.，适用于大多数计算场景，以确保密度包含增强电荷，保持计算一致性。如果需要分析无增强的原始密度（例如用于后处理或可视化），可设置为.FALSE.，但需注意这不会影响电子最小化中的XC泛函评估。", "tips": "设置LWRT_AUGMENTED_DENSITY=.FALSE.仅影响密度写入，不影响计算过程中的密度使用。对于MGGA泛函，可使用LNOAUGXC标签来避免增强。确保相关参数如WRT_DENSITY已正确设置以触发密度输出。"}, "LZEROZ": {"name": "LZEROZ", "description": "LZEROZ= .TRUE. | .FALSE.Default:LZEROZ= .FALSE.", "default": "LZEROZ= .TRUE. | .FALSE.Default:LZEROZ= .FALSE.", "details": "Description: forLZEROZ=.TRUE. thez-component of the spin-spiral magnetisation density will be forced to be and to remain zero.\nSee thedescription of spin spiral calculationsfor more details.\nSpin spirals,LSPIRAL,QSPIRAL", "wiki_url": "https://www.vasp.at/wiki/index.php/LZEROZ", "description_cn": "LZEROZ参数用于控制在自旋螺旋计算中是否强制磁化密度的z分量为零。", "default_value": "FALSE", "details_cn": "当LZEROZ=.TRUE.时，自旋螺旋磁化密度的z分量将被强制为零并保持为零。有关更多详细信息，请参见自旋螺旋计算的描述。自旋螺旋，LSPIRAL，QSPIRAL。", "recommended": "通常使用默认值FALSE。使用场景：在自旋螺旋计算中，当需要忽略或固定z分量以简化计算或满足特定物理模型时，设置为TRUE。", "tips": "此参数仅在自旋螺旋计算中有效，需与LSPIRAL和QSPIRAL参数配合使用。设置TRUE前应确保理解自旋螺旋计算的背景，避免不必要的约束。"}, "LZORA": {"name": "LZORA", "description": "LZORA= [logical]Default:LZORA= .False.", "default": "LZORA= [logical]Default:LZORA= .False.", "details": "Description:LZORA= .True.yields ZORA scalar-relativistic chemical shieldings inNMR.\nThe zeroth-order regular approximation (ZORA)[1]is a way to approximate the fully relativistic Dirac equation while keeping a two-component formalism. It captures relativistic effects without solving the full four-component Dirac equation. ZORA can be used in two flavors: scalar-relativistic ZORA (n\nLZORA= .True.allows accounting for the ZORA K factor in the computation ofnuclear magnetic resonance(NMR) chemical shielding tensors within linear response theory (LCHIMAG) on the level of the scalar-relativistic ZORA. Scalar ZORA calculations can be executed usingvasp_std.", "wiki_url": "https://www.vasp.at/wiki/index.php/LZORA", "description_cn": "LZORA是一个逻辑参数，用于控制是否启用ZORA标量相对论近似。", "default_value": "False", "details_cn": "LZORA=.True.时，在NMR中产生ZORA标量相对论化学屏蔽。零阶正则近似（ZORA）[1]是一种近似完全相对论狄拉克方程的方法，同时保持两分量形式。它捕捉相对论效应而无需求解完整的四分量狄拉克方程。ZORA有两种形式：标量相对论ZORA（n LZORA=.True.允许在核磁共振（NMR）化学计算中考虑ZORA K因子。", "recommended": "推荐在计算NMR化学屏蔽时，特别是对于重元素（如过渡金属），设置LZORA=.True.。默认值False适用于非相对论计算或轻元素体系。", "tips": "启用LZORA会增加计算成本，因为需要处理相对论效应。确保在NMR计算中正确配置其他相关参数（如NMR计算标志）。ZORA近似适用于中等相对论效应，对于极重元素可能需要更精确的相对论方法。"}, "MAGMOM": {"name": "MAGMOM", "description": "Description: Initial magnetic moment for each atom if no magnetization density is present. Considered when symmetry is determined.", "default": "Default:MAGMOM", "details": "Description: Initial magnetic moment for each atom if no magnetization density is present. Considered when symmetry is determined.\nTheI_CONSTRAINED_Mtag can constrain the on-site magnetic moments.\nISPIN,LNONCOLLINEAR,LSORBIT,SAXIS,LORBIT,I_CONSTRAINED_M,NUPDOWN", "wiki_url": "https://www.vasp.at/wiki/index.php/MAGMOM", "description_cn": "初始磁矩，用于每个原子，如果没有磁化密度存在。在确定对称性时考虑。", "default_value": "无默认值", "details_cn": "如果没有磁化密度存在，为每个原子设置初始磁矩。在确定对称性时考虑。I_CONSTRAINED_M 标签可以约束局域磁矩。相关参数：ISPIN、LNONCOLLINEAR、LSORBIT、SAXIS、LORBIT、I_CONSTRAINED_M、NUPDOWN。", "recommended": "根据具体系统设置，例如铁磁系统设置正磁矩（如每个原子3.0 μB），反铁磁系统设置交替符号（如+3.0和-3.0）。使用场景：在磁性计算中初始化磁矩，或当需要控制磁性时，如研究磁性材料的基态或自旋极化效应。", "tips": "确保与ISPIN、LSORBIT等参数一致，例如ISPIN=2用于自旋极化计算；使用I_CONSTRAINED_M约束磁矩时需谨慎，以避免非物理结果；初始磁矩可能影响收敛和最终磁性状态，建议通过测试确定合适值。"}, "MAXMEM": {"name": "MAXMEM", "description": "MAXMEM= [integer]Default:MAXMEM= 2800 (VASP.5.4.4. and older), automatically set as of VASP.6", "default": "MAXMEM= [integer]Default:MAXMEM= 2800 (VASP.5.4.4. and older), automatically set as of VASP.6", "details": "Description:MAXMEMspecifies the maximum memory one MPI rank will attempt to allocate (in MByte).\nSince, the default varies somewhat between VASP versions, it is safer to set this\nflag manually. Currently the flag is only inspected in few selected routines, such as\nthe GW or RPA routines that can use\nAs of VASP.6 the default value of MAXMEM is set to 90 percent of the available memory per MPI rank. If more than one compute node is used, the minimum of all nodes is used. The available memory in RAM is estimated by searching the file \"/proc/meminfo\" for the entry \"MemAvailable:\". Note that \"/proc/\nGW calculations,ACFDT calculations,NTAUPAR", "wiki_url": "https://www.vasp.at/wiki/index.php/MAXMEM", "description_cn": "MAXMEM参数指定一个MPI进程将尝试分配的最大内存（以兆字节为单位）。", "default_value": "对于VASP.5.4.4及更早版本，默认值为2800；从VASP.6开始自动设置。", "details_cn": "MAXMEM指定一个MPI进程将尝试分配的最大内存（以兆字节为单位）。由于默认值在不同VASP版本间有所变化，手动设置此标志更安全。目前，此标志仅在少数选定例程中检查，例如GW或RPA例程，这些例程可以使用。从VASP.6开始，MAXMEM的默认值设置为每个MPI进程可用内存的90%。如果使用多个计算节点，则使用所有节点中的最小值。可用内存", "recommended": "根据系统可用内存设置，通常为可用内存的80-90%。使用场景：在进行GW或RPA等内存密集型计算时，手动设置以确保足够内存，避免计算失败。", "tips": "不要设置超过实际可用内存的值，否则可能导致程序崩溃；在多节点计算环境中，需考虑所有节点的最小内存；对于VASP.6及更高版本，默认自动设置通常足够，但特殊需求时可手动调整。"}, "MAXMIX": {"name": "MAXMIX", "description": "MAXMIX= [integer]Default:MAXMIX= -45", "default": "MAXMIX= [integer]Default:MAXMIX= -45", "details": "Description:MAXMIXspecifies the maximum number of steps stored in the Broyden mixer (IMIX=4).\nMAXMIXspecifies the maximum number of vectors stored in the Broyden/Pulay mixer, in other words, it corresponds to the maximal rank of the approximation of the charge-dielectric function build up by the mixer.MAXMIXcan be either negative or positive:\nIMIX,INIMIX,AMIX,BMIX,AMIX_MAG,BMIX_MAG,AMIN,MIXPRE,WC", "wiki_url": "https://www.vasp.at/wiki/index.php/MAXMIX", "description_cn": "MAXMIX指定在Broyden mixer中存储的最大步数（IMIX=4）。", "default_value": "-45", "details_cn": "MAXMIX指定在Broyden mixer中存储的最大步数（IMIX=4）。MAXMIX指定在Broyden/Pulay mixer中存储的最大向量数，换句话说，它对应于mixer构建的电荷-介电函数近似的最大秩。MAXMIX可以是负数或正数：IMIX, INIMIX, AMIX, BMIX, AMIX_MAG, BMIX_MAG, AMIN, MIXPRE, WC。", "recommended": "对于大多数常规计算，使用默认值-45即可，它基于内部优化设置。对于大体系（如数百原子以上）或电荷密度收敛困难的情况，可以尝试设置为正数，如40-60，以增加混合存储向量数，改善收敛性。使用场景：在电子结构计算中，当使用Broyden或Pulay混合算法（IMIX=4或相关设置）且收敛缓慢时，调整MAXMIX可能有助于加速收敛。", "tips": "MAXMIX为负数时，VASP使用内部默认行为（通常基于体系大小自动调整）；为正数时，直接指定存储向量数。设置过大的值会显著增加内存消耗，需根据计算资源权衡。应与IMIX、AMIX等混合参数协调使用，以确保混合算法有效；建议在调整前进行小规模测试。"}, "MDALGO": {"name": "MDALGO", "description": "MDALGO= 0 | 1 | 2 | 3 | 4 | 5 | 11 | 21 | 13Default:MDALGO= 0", "default": "MDALGO= 0 | 1 | 2 | 3 | 4 | 5 | 11 | 21 | 13Default:MDALGO= 0", "details": "Description: Specifies thethermostatand lattice dynamics formolecular-dynamics calculations(in caseIBRION= 0).\nThe algorithm for thethermostatand lattice dynamics is a crucial choise for anymolecular-dynamics (MD) calculations(IBRION= 0). In combination with the selected lattice degrees of freedom (ISIF),MDALGOdetermines theensemblethat is sampled during theMD run. The main output file is theREPORTfile.\nMDALGOcan be applied in the context of standardmolecular-dynamics calculations,constrained molecular dynamics,metadynamics calculations, theslow-growth approach, monitoring geometric parameters using theICONSTfile,biased molecular dynamics, and more.", "wiki_url": "https://www.vasp.at/wiki/index.php/MDALGO", "description_cn": "指定分子动力学计算中的恒温器和晶格动力学（当IBRION=0时）。", "default_value": "0", "details_cn": "指定分子动力学计算中的恒温器和晶格动力学（当IBRION=0时）。恒温器和晶格动力学的算法对于任何分子动力学（MD）计算（IBRION=0）都是关键选择。结合选定的晶格自由度（ISIF），MDALGO决定了MD运行期间采样的系综。主要输出文件是REPORT文件。MDALGO可以应用于标准分子动力学计算、约束分子动力学（注：用户提供的详细信息不完整，此处基于已有部分翻译）。", "recommended": "MDALGO=0用于无恒温器的NVE系综（微正则系综），适用于能量守恒的短时模拟；MDALGO=1（Nosé-Hoover恒温器）用于NVT系综（正则系综），推荐用于常规温度控制的分子动力学；MDALGO=2（Andersen恒温器）适用于快速热化；MDALGO=3（Langevin动力学）用于模拟溶剂效应或耗散系统；其他值如MDALGO=4、5、11、21、13用于高级应用，如约束MD或特定系综（如NPT需结合ISIF设置）。根据计算目标选择：温度控制选1或3，能量守恒选0，约束模拟选高级值。", "tips": "MDALGO仅在IBRION=0（分子动力学模式）时有效；选择合适的恒温器以避免非物理行为，如Nosé-Hoover可能引起共振问题；结合ISIF参数控制晶格自由度以实现NPT等系综；定期检查REPORT文件监控温度、能量等输出；对于长时间模拟，测试不同MDALGO值以确保稳定性。"}, "METAGGA": {"name": "METAGGA", "description": "METAGGA= [string]Default:METAGGA= The functional specified byLEXCHin thePOTCARifGGAandXCare also not specified.", "default": "METAGGA= [string]Default:METAGGA= The functional specified byLEXCHin thePOTCARifGGAandXCare also not specified.", "details": "Description: Selects a meta-GGA exchange-correlation functional.\nThis table lists the meta-GGA functionals available in VASP. There are essentially two types of meta-GGAs, that differ in the variable on which they depend (in addition to[math]\\displaystyle{ n }[/math]and[math]\\displaystyle{ \\nabla n }[/math]): the kinetic-energy density[math]\\displaystyle{ \\tau }[\nAny MGGA from the external library Libxc.[2][3][4][5]It is necessary to haveLibxc >= 5.2.0 installedand VASP.6.3.0 or higher compiled withprecompiler options. TheLIBXC1andLIBXC2tags (where examples are shown) are also required.", "wiki_url": "https://www.vasp.at/wiki/index.php/METAGGA", "description_cn": "METAGGA= [字符串] 默认值：如果未指定GGA和XC，则使用POTCAR中LEXCH指定的泛函。", "default_value": "如果未指定GGA和XC，则使用POTCAR中LEXCH指定的泛函。", "details_cn": "选择meta-GGA交换关联泛函。此表列出了VASP中可用的meta-GGA泛函。本质上，meta-GGA有两种类型，它们依赖的变量不同（除了n和∇n）：动能密度τ。可以使用外部库Libxc中的任何MGGA。需要安装Libxc >= 5.2.0并编译VASP.6.3.0或更高版本。", "recommended": "根据计算体系选择，如SCAN泛函适用于强关联体系和带隙计算，TPSS泛函适用于一般分子和固体。使用场景：当需要比GGA更高精度时，如计算反应能垒、电子结构等。", "tips": "确保Libxc版本至少为5.2.0，VASP版本为6.3.0或更高。meta-GGA计算通常比GGA更耗时，且可能需要更多内存。在使用前，建议测试泛函对特定体系的适用性。"}, "MINROT": {"name": "MINROT", "description": "MINROT= [real]Default:MINROT= 0.01", "default": "MINROT= [real]Default:MINROT= 0.01", "details": "Description: The flagMINROTdefines the value for which the dimer is rotated only if the predicted rotation angle is greater thanMINROT(rad.) in theImproved Dimer Method.\nImproved Dimer Method\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/MINROT", "description_cn": "MINROT是一个实数参数，默认值为0.01。", "default_value": "0.01", "details_cn": "MINROT标志定义了一个值，只有在改进的二聚体方法中，预测的旋转角度大于MINROT（弧度）时，才会旋转二聚体。改进的二聚体方法使用此标签的示例。", "recommended": "推荐值为默认值0.01，适用于大多数过渡态搜索计算。在使用改进的二聚体方法时，如果计算收敛困难，可尝试调整此值，例如减小到0.001或增大到0.1，具体取决于体系。", "tips": "MINROT的单位是弧度。值过小可能导致频繁旋转，增加计算成本；值过大可能使旋转不充分，影响收敛。建议在使用改进的二聚体方法时，根据具体体系进行测试和微调。"}, "MIXPRE": {"name": "MIXPRE", "description": "MIXPRE= 0 | 1 | 2 | 3Default:MIXPRE= 1", "default": "MIXPRE= 0 | 1 | 2 | 3Default:MIXPRE= 1", "details": "Description:MIXPREspecifies the metric in the Broyden mixing scheme(IMIX=4).\nThe preconditioning is done only on the total charge density (i.e. up+down component) and not on the magnetization charge density (i.e. up-down component). In our experience, the introduction of a metric always improves the convergence speed. The best choice isMIXPRE=1 (i.e. the default).\nIMIX,INIMIX,MAXMIX,AMIX,BMIX,AMIX_MAG,BMIX_MAG,AMIN,WC", "wiki_url": "https://www.vasp.at/wiki/index.php/MIXPRE", "description_cn": "MIXPRE参数指定Broyden混合方案中的度量，可选值为0、1、2、3，默认值为1。", "default_value": "1", "details_cn": "MIXPRE指定Broyden混合方案（IMIX=4）中的度量。预处理仅针对总电荷密度（即上旋+下旋分量），而不针对磁化电荷密度（即上旋-下旋分量）。根据我们的经验，引入度量总是能提高收敛速度。最佳选择是MIXPRE=1（即默认值）。相关参数：IMIX, INIMIX, MAXMIX, AMIX, BMIX, AMIX_MAG, BMIX_MAG, AMIN, WC", "recommended": "1。使用场景：在Broyden混合方案中，为了提高收敛速度，推荐使用MIXPRE=1，适用于大多数电子优化计算，特别是需要快速收敛的体系。", "tips": "预处理仅应用于总电荷密度，不应用于磁化电荷密度。使用MIXPRE时，需确保IMIX=4以启用Broyden混合方案。对于磁性体系，可能需要调整其他相关参数如AMIX_MAG和BMIX_MAG。"}, "ML_AFILT2": {"name": "ML_AFILT2", "description": "ML_AFILT2= [real]Default:ML_AFILT2= 0.002", "default": "ML_AFILT2= [real]Default:ML_AFILT2= 0.002", "details": "Description: This tag sets the filtering parameter for the angular filtering forML_IAFILT2in the machine learning force field method.\nThis tag is only used ifML_LAFILT2=.TRUE.andML_IAFILT2=2 are used.\nThe angular filtering function[1]forML_IAFILT2=2 is described as[math]\\displaystyle{ \\eta_{l,a_{\\mathrm{FILT}}}=\\frac{1}{1+a_{\\mathrm{FILT}} [l (l+1)]^{2}}  }[/math]. The tagML_AFILT2sets the parameter[math]\\displaystyle{ a_{\\mathrm{FILT}} }[/math].", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_AFILT2", "description_cn": "ML_AFILT2参数用于设置机器学习力场方法中角度过滤的过滤参数。", "default_value": "0.002", "details_cn": "此标签设置机器学习力场方法中ML_IAFILT2的角度过滤的过滤参数。此标签仅在ML_LAFILT2=.TRUE.且ML_IAFILT2=2时使用。对于ML_IAFILT2=2，角度过滤函数描述为 η_{l,a_{FILT}} = 1 / (1 + a_{FILT} [l(l+1)]^2)。标签ML_AFILT2设置参数 a_{FILT}。", "recommended": "推荐使用默认值0.002，除非有特定需求需要调整角度过滤强度。使用场景：在机器学习力场计算中，当启用角度过滤（ML_LAFILT2=.TRUE.）且ML_IAFILT2=2时，用于控制过滤参数。", "tips": "1. 确保ML_LAFILT2和ML_IAFILT2参数正确设置；2. 调整ML_AFILT2值可能影响过滤效果，建议参考VASP文档或相关文献；3. 参数值需根据具体系统进行测试优化。"}, "ML_CALGO": {"name": "ML_CALGO", "description": "ML_CALGO= [integer]Default:ML_CALGO= 0", "default": "ML_CALGO= [integer]Default:ML_CALGO= 0", "details": "Description: Chooses error estimation type for on-the-fly training or reselection of local referenc configurations.\nThis tag chooes which algorithm is employed for the error estimation inML_MODE=TRAINorSELECT. The following two choices are available:\nIn both modes an ab-initio calculation is carried out if the value of the error estimate is above a threshold specified byML_CTIFOR. In both algorithms the estimators have different units, values and hence defaults for this threshold. \nIn contrast to the Bayesian error estimation which can be run in", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CALGO", "description_cn": "ML_CALGO 选择错误估计类型，用于在线训练或重新选择局部参考配置。", "default_value": "0", "details_cn": "选择错误估计类型，用于在线训练或重新选择局部参考配置。此标签选择在 ML_MODE=TRAIN 或 SELECT 中用于错误估计的算法。以下两种选择可用：在这两种模式下，如果错误估计值高于由 ML_CTIFOR 指定的阈值，则进行从头算计算。在这两种算法中，估计器具有不同的单位、值，因此该阈值的默认值也不同。相比之下 t", "recommended": "推荐值为0，适用于大多数情况。当使用ML_MODE=TRAIN或SELECT进行机器学习力场训练时，使用默认错误估计算法，以平衡计算效率和精度。", "tips": "ML_CALGO的选择会影响ML_CTIFOR的默认值，因为不同算法的错误估计单位不同。确保根据所选算法调整ML_CTIFOR阈值，以避免不必要的从头算计算或训练失败。"}, "ML_CDOUB": {"name": "ML_CDOUB", "description": "Description: This tag controls the criterion for \"enforced\" DFT calculations within the machine learning force field method.", "default": "Default:ML_CDOUB", "details": "Description: This tag controls the criterion for \"enforced\" DFT calculations within the machine learning force field method.\nThe usage of this tag in combination with the learning algorithms is described here:here.\nIf at any time, the estimated force errors areML_CDOUBtimes larger than the Bayesian threshold (i.e. \"critically\" high), a first principles calculation is performed and a new force field is immediately generated (even if the counter for sampling is below the minimum amount of sampled structuresML_NM", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CDOUB", "description_cn": "此标签控制机器学习力场方法中“强制”DFT计算的标准。", "default_value": "1.0", "details_cn": "此标签控制机器学习力场方法中“强制”DFT计算的标准。此标签与学习算法结合使用的描述见此处：here。如果在任何时候，估计的力误差是ML_CDOUB倍于贝叶斯阈值（即“临界”高），则执行第一性原理计算并立即生成新的力场（即使采样计数器低于最小采样数量）。", "recommended": "默认值为1.0，适用于大多数机器学习力场训练场景。如果需要更严格的力场更新以提高精度，可以设置为0.5-1.0；如果希望减少DFT计算以加速训练，可以设置为1.5-2.0。使用场景：在VASP的MLFF方法中，用于控制何时强制执行DFT计算以更新力场，特别适用于动态训练或高精度要求的体系。", "tips": "设置ML_CDOUB过低会导致频繁的DFT计算，增加计算成本；设置过高可能导致力场精度下降或训练不稳定。建议与ML_LMLFF、ML_ISTART等参数配合使用，并根据具体体系的力误差和计算资源进行调整。"}, "ML_CSIG": {"name": "ML_CSIG", "description": "ML_CSIG= [real]Default:ML_CSIG=[math]\\displaystyle{ 0.4 }[/math]", "default": "ML_CSIG= [real]Default:ML_CSIG=[math]\\displaystyle{ 0.4 }[/math]", "details": "Description: Parameter used in the automatic determination of thresholdML_CTIFORfor error estimation in the machine learning force field method.\nThe usage of this tag in combination with the learning algorithms is described here:here.\nThe standard error of the history of maximum estimated errors of the forces (ML_MHIS) and it's slope must be belowML_CSIGandML_CSLOPEso that an update of the threshold for the maximum estimated error of forcesML_CTIFORcan take place.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CSIG", "description_cn": "机器学习力场方法中用于自动确定误差估计阈值ML_CTIFOR的参数。", "default_value": "0.4", "details_cn": "该参数用于机器学习力场方法中自动确定误差估计阈值ML_CTIFOR。此标签与学习算法的配合使用详见相关文档。力的最大估计误差历史（ML_MHIS）的标准差及其斜率必须分别低于ML_CSIG和ML_CSLOPE，才能触发对力最大估计误差阈值ML_CTIFOR的更新。", "recommended": "默认值0.4通常适用于大多数机器学习力场训练场景。若训练过程中发现力场误差收敛较慢或阈值更新过于频繁，可适当调低该值（如0.2-0.3）；若希望加快阈值更新速度，可略微调高（如0.5-0.6），但需注意可能引入不稳定性。", "tips": "1. 该参数需与ML_CSLOPE配合使用，共同控制阈值更新条件。\n2. 修改此参数后建议监控ML_MHIS文件，观察误差统计量的变化趋势。\n3. 在训练初期或数据波动较大时，可暂时调高该值以避免阈值更新过于敏感。\n4. 最终取值应结合具体体系和训练数据量进行测试优化。"}, "ML_CSLOPE": {"name": "ML_CSLOPE", "description": "ML_CSLOPE= [real]Default:ML_CSLOPE=[math]\\displaystyle{ 0.2 }[/math]", "default": "ML_CSLOPE= [real]Default:ML_CSLOPE=[math]\\displaystyle{ 0.2 }[/math]", "details": "Description: Parameter used in the automatic determination of threshold for error estimation in the machine learning force field method.\nThe usage of this tag in combination with the learning algorithms is described here:here.\nThe standard error of the history of maximum estimated errors of the forces (ML_MHIS) and it's slope must be belowML_CSIGandML_CSLOPEso that an update of the threshold for the maximum estimated error of forcesML_CTIFORcan take place.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CSLOPE", "description_cn": "ML_CSLOPE是一个实数参数，用于机器学习力场方法中误差估计阈值的自动确定，默认值为0.2。", "default_value": "0.2", "details_cn": "用于机器学习力场方法中误差估计阈值自动确定的参数。此标签与学习算法结合的用法在此处描述。力的最大估计误差历史（ML_MHIS）的标准误差及其斜率必须低于ML_CSIG和ML_CSLOPE，以便可以更新力的最大估计误差阈值ML_CTIFOR。", "recommended": "默认值0.2通常适用，但可根据具体系统和计算需求调整。使用场景：在机器学习力场训练过程中，用于控制误差估计阈值的更新条件，确保力场精度和稳定性。", "tips": "1. 确保ML_CSIG和ML_CSLOPE的值合理，以避免阈值更新过于频繁或不足。2. 与ML_MHIS和ML_CTIFOR参数协调设置，以优化机器学习力场的性能。3. 在调整参数时，建议进行测试计算以确定最佳值，并参考VASP官方文档获取更多细节。"}, "ML_CTIFOR": {"name": "ML_CTIFOR", "description": "Description: This flag sets the threshold for the error estimation in the machine learning force field method.", "default": "Default:ML_CTIFOR", "details": "The use of this tag in combination with the learning algorithms is described here:here. Generally, first principles calculations are only performed if the error estimate of one force exceeds the threshold.\nThe initial threshold is set to the value provided by the tagML_CTIFOR(units of eV/Angstrom forML_CALGO=0 and unitless forML_CALGO=1).\nForML_CALGO=0, the threshold can be updated dynamically during ML. The details of the update are controlled byML_ICRITERIA. Typically, after extensive training, attainable values for ML_CTIFOR are 0.02 around 300-500 K, and 0.06 around 1000-2000 K, so temperature but also system dependent. The initi", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CTIFOR", "description_cn": "此标志设置机器学习力场方法中误差估计的阈值。", "default_value": "ML_CTIFOR", "details_cn": "此标签与学习算法的结合使用在此处描述：此处。通常，只有当一个力的误差估计超过阈值时，才执行第一性原理计算。初始阈值由标签ML_CTIFOR提供的值设置（对于ML_CALGO=0，单位为eV/Å；对于ML_CALGO=1，无单位）。对于ML_CALGO=0，阈值可以在机器学习过程中动态更新。更新的细节由ML_ICRITERIA控制。通常，在大量训练之后", "recommended": "对于ML_CALGO=0，初始阈值可设为0.1 eV/Å；对于ML_CALGO=1，无单位，建议参考具体算法文档。使用场景：在机器学习力场训练中，当力误差估计超过此阈值时，触发第一性原理计算以更新训练数据，适用于平衡计算成本和精度的场景。", "tips": "阈值设置过低会导致频繁的第一性原理计算，增加计算成本；设置过高可能影响力场精度。动态更新阈值时，需配合ML_ICRITERIA参数进行监控和调整。"}, "ML_CX": {"name": "ML_CX", "description": "ML_CX= [real]Default:ML_CX= 0.0", "default": "ML_CX= [real]Default:ML_CX= 0.0", "details": "Description: The parameter determines to which value the threshold  (ML_CTIFOR) is updated within the machine learning force field methods.\nThe use of this tag in combination with the learning algorithms is described here:here.\nIfML_ICRITERIA>0,ML_CTIFORis set to the average of the errors of the forces stored in a history. Note thatML_ICRITERIA=1 andML_ICRITERIA=2, average over different data. In the first case the average is performed over errors after updates of the force fields, and in the second case over all recent er", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_CX", "description_cn": "该参数决定在机器学习力场方法中阈值（ML_CTIFOR）更新到的值。", "default_value": "0.0", "details_cn": "该参数决定在机器学习力场方法中阈值（ML_CTIFOR）更新到的值。此标签与学习算法的结合使用在此处描述：此处。如果 ML_ICRITERIA>0，ML_CTIFOR 被设置为存储在历史记录中的力误差的平均值。注意 ML_ICRITERIA=1 和 ML_ICRITERIA=2 对不同的数据进行平均。在第一种情况下，平均是在力场更新后的误差上进行的，而在第二种情况下（信息不完整）。", "recommended": "通常保持默认值0.0，适用于大多数机器学习力场训练场景。使用场景：当需要自定义阈值更新策略以优化学习效率或精度时，可调整此参数。", "tips": "ML_CX 的设置需与 ML_ICRITERIA 参数配合使用，不同 ML_ICRITERIA 值会影响 ML_CTIFOR 的更新方式，建议参考VASP官方文档以获取完整指导。"}, "ML_DESC_TYPE": {"name": "ML_DESC_TYPE", "description": "ML_DESC_TYPE= [integer]Default:ML_DESC_TYPE= 0", "default": "ML_DESC_TYPE= [integer]Default:ML_DESC_TYPE= 0", "details": "Description: Selects the descriptor type of the three-body descriptor used in machine learning force fields.\nML_DESC_TYPEselects how the three-body descriptor is calculated, and the following options are available:\nThe standard three-body descriptor (ML_DESC_TYPE=0) without self-interaction corrections for the[math]\\displaystyle{ i }[/math]th atom looks like the following", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_DESC_TYPE", "description_cn": "选择机器学习力场中使用的三体描述符的类型。", "default_value": "0", "details_cn": "选择机器学习力场中使用的三体描述符的类型。ML_DESC_TYPE 选择三体描述符的计算方式，以下选项可用：标准三体描述符（ML_DESC_TYPE=0）对于第 i 个原子没有自相互作用校正，看起来如下。", "recommended": "0。使用场景：在标准机器学习力场计算中，当不需要自相互作用校正时使用。", "tips": "此参数仅在使用机器学习力场时相关。确保参考VASP官方文档以获取更多选项和详细信息。"}, "ML_EATOM_REF": {"name": "ML_EATOM_REF", "description": "ML_EATOM_REF= [real array]Default:ML_EATOM_REF= 0.0", "default": "ML_EATOM_REF= [real array]Default:ML_EATOM_REF= 0.0", "details": "Description: Reference total energies of isolated atoms used in the machine learning force field method.\nThis tag is only used ifML_ISCALE_TOTEN= 1.\nIfML_EATOM_REFis not provided in theINCARfile then 0.0 is assumed for all species in the system.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_EATOM_REF", "description_cn": "ML_EATOM_REF 是机器学习力场方法中使用的孤立原子的参考总能量。", "default_value": "0.0", "details_cn": "机器学习力场方法中使用的孤立原子的参考总能量。此标签仅在ML_ISCALE_TOTEN= 1时使用。如果INCAR文件中未提供ML_EATOM_REF，则假定系统中所有物种的参考能量为0.0。", "recommended": "为每个物种提供通过孤立原子计算获得的总能量。使用场景：当使用机器学习力场（MLFF）方法并设置ML_ISCALE_TOTEN=1时，为了提高能量计算的准确性，应设置此参数。", "tips": "此参数仅在ML_ISCALE_TOTEN=1时生效；如果未设置，默认值为0.0，可能影响模拟精度；需要为系统中所有原子物种提供参考能量。"}, "ML_EMPPOT_RCUT": {"name": "ML_EMPPOT_RCUT", "description": "ML_EMPPOT_RCUT= [real]Default:ML_EMPPOT_RCUT= 0.0", "default": "ML_EMPPOT_RCUT= [real]Default:ML_EMPPOT_RCUT= 0.0", "details": "Description: Sets the cutoff radius for the empirical potentials.\nThe empirical potentials have a separate neighbor list.ML_EMPPOT_RCUTnot only determines the cutoffs of the empirical potential functions but also the cutoff of the neighbor list.\nML_LMLFF,ML_LCOUPLE,ML_ICOUPLE,ML_RCOUPLE,ML_NATOM_COUPLED,ML_LEMPPOT,ML_SRPOT_B0,ML_SRPOT_N0,ML_SRPOT_S0,ML_MOPOT_NM,ML_MOPOT_DM,ML_MOPOT_RM,ML_MOPOT_RKM,ML_MOPOT_IJM", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_EMPPOT_RCUT", "description_cn": "设置经验势的截断半径。", "default_value": "0.0", "details_cn": "设置经验势的截断半径。经验势有一个独立的邻居列表。ML_EMPPOT_RCUT不仅决定了经验势函数的截断，还决定了邻居列表的截断。相关参数：ML_LMLFF, ML_LCOUPLE, ML_ICOUPLE, ML_RCOUPLE, ML_NATOM_COUPLED, ML_LEMPPOT, ML_SRPOT_B0, ML_SRPOT_N0, ML_SRPOT_S0, ML_MOPOT_NM, ML_MOPOT_DM, ML_MOPOT_RM, ML_MOPOT_RKM, ML_MOPOT_IJM", "recommended": "根据经验势的类型和系统大小设置一个正实数，通常在几埃到十几埃之间（例如5.0-10.0 Å）。使用场景：当使用机器学习力场（MLFF）中的经验势修正时，需要设置此参数来定义邻居列表的截断半径，以确保势函数正确作用于原子间相互作用。", "tips": "确保截断半径与经验势的参数匹配；如果设置为0.0，可能表示禁用经验势或使用默认行为；与其他ML相关参数（如ML_LEMPPOT）配合使用，以启用经验势功能；建议在设置前参考VASP手册或相关文献，根据具体计算体系调整。"}, "ML_EPS_LOW": {"name": "ML_EPS_LOW", "description": "Description: Threshold for the CUR algorithm used in the sparsification of local reference configurations within the machine learning force fields.", "default": "Default:ML_EPS_LOW", "details": "Description: Threshold for the CUR algorithm used in the sparsification of local reference configurations within the machine learning force fields.\nThis value sets the threshold for the eigenvalues that contribute to the leverage scoring used in the CUR algorithm for the rank compression (\"sparsification\") of the local configurations (for details see appendix E of reference[1]). Small eigenvalues and those columns (local configurations) that ar\nThe description how to chooseML_EPS_LOWfor accurate force fields is givenhere.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_EPS_LOW", "description_cn": "机器学习力场中用于局部参考配置稀疏化的CUR算法的阈值。", "default_value": "ML_EPS_LOW", "details_cn": "该参数设置了CUR算法中用于局部配置秩压缩（“稀疏化”）的杠杆评分的特征值阈值（详见参考文献[1]的附录E）。小特征值和那些列（局部配置）将被忽略，以实现稀疏化。", "recommended": "默认值ML_EPS_LOW通常为1E-4，适用于大多数机器学习力场计算。对于高精度模拟，可减小至1E-5或更小；对于快速筛选或初步测试，可增大至1E-3或0.1。使用场景：在训练机器学习力场时，调整此参数以平衡计算精度和效率，尤其适用于大规模体系或需要优化计算资源的情况。", "tips": "值过小会增加计算成本和内存使用，可能导致计算时间显著延长；值过大可能降低力场的精度，影响模拟结果的可靠性。建议在小规模测试中根据具体体系和精度要求进行参数优化，并参考相关文献或VASP官方文档以获取更详细的指导。"}, "ML_EPS_REG": {"name": "ML_EPS_REG", "description": "ML_EPS_REG= [real]Default:ML_EPS_REG= 1E-15", "default": "ML_EPS_REG= [real]Default:ML_EPS_REG= 1E-15", "details": "Description: Initial value for the threshold of the eigenvalues of the covariance matrix in the evidence approximation.\nThis threshold is used to determine which eigenvalues[math]\\displaystyle{ \\lambda_{k} }[/math]of the covariance matrix[math]\\displaystyle{ \\mathbf{\\Phi}^{\\mathrm{T}}\\mathbf{\\Phi}/\\sigma^{2}_{\\mathrm{v}} }[/math]are used in the optimization of the regularization parameters[math]\\displaystyle{ \\sigma^\n[math]\\displaystyle{ \n\\sigma^{2}_{\\mathrm{w}}=\\frac{|\\mathbf{\\bar{w}}|^{2}}{\\gamma},\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_EPS_REG", "description_cn": "ML_EPS_REG是一个实数参数，用于设置证据近似中协方差矩阵特征值的阈值初始值，默认值为1E-15。", "default_value": "1E-15", "details_cn": "在证据近似中，协方差矩阵特征值的阈值初始值。该阈值用于确定协方差矩阵Φ^T Φ / σ_v^2的哪些特征值λ_k被用于优化正则化参数σ_w^2 = |w̄|^2 / γ ...", "recommended": "通常使用默认值1E-15。使用场景：在VASP机器学习力场计算中，当需要微调正则化参数以改善模型泛化能力或数值稳定性时，可以调整此参数，例如在训练数据噪声较大或模型过拟合时。", "tips": "更改此参数可能影响机器学习模型的训练精度和计算稳定性。建议在理解其作用后谨慎调整，并参考VASP官方文档或相关文献。避免设置过小值导致数值问题，或过大值降低模型性能。"}, "ML_ESTBLOCK": {"name": "ML_ESTBLOCK", "description": "ML_ESTBLOCK= [integer]Default:ML_ESTBLOCK=ML_OUTBLOCK", "default": "ML_ESTBLOCK= [integer]Default:ML_ESTBLOCK=ML_OUTBLOCK", "details": "Description: Calculation and output frequency of error estimates forML_MODE=RUNcomputations.\nThis tag sets the interval in units of molecular-dynamics steps at which the error estimates are written to theML_LOGFILE. The error estimate is computed by utilizing thespilling factorif a refit withML_MODE=REFITwas done. Thespilling factoris calculated for each atom in the current structure and th\nThespilling factormeasures the similarity of the local environment of each atom in the current structure to that of the local reference configurations of the force field. The values of the spilling factor are in the range[math]\\displaystyle{ [0,1] }[/math]. If the atomic environment is \"properly\" re", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_ESTBLOCK", "description_cn": "ML_ESTBLOCK= [整数] 默认值：ML_ESTBLOCK=ML_OUTBLOCK", "default_value": "ML_OUTBLOCK", "details_cn": "用于ML_MODE=RUN计算的误差估计的计算和输出频率。此标签设置以分子动力学步长为单位的间隔，误差估计将写入ML_LOGFILE。如果使用ML_MODE=REFIT进行了重新拟合，则通过利用spilling factor来计算误差估计。spilling factor是针对当前结构中的每个原子计算的，并且衡量当前结构中每个原子的局部环境与参考结构的相似性。", "recommended": "通常使用默认值ML_OUTBLOCK，以保持与输出频率一致，避免不必要的I/O开销。如果需要更频繁地监控机器学习势函数的误差（例如在调试或高精度计算中），可以设置较小的整数值（如1或5），但会增加计算和存储负担。使用场景：在机器学习势函数的运行模式（ML_MODE=RUN）下，用于定期评估模型精度和稳定性，特别是在长时间分子动力学模拟中。", "tips": "1. 此参数仅在ML_MODE=RUN或ML_MODE=REFIT时有效，否则设置可能被忽略。2. 设置过小的值会导致频繁写入ML_LOGFILE，可能显著降低计算性能。3. 确保ML_LOGFILE参数已正确配置，以便输出误差估计。4. 误差估计依赖于spilling factor，因此需要事先通过ML_MODE=REFIT进行模型拟合，否则误差估计可能不准确。5. 默认值ML_OUTBLOCK通常足够，建议根据计算资源和监控需求调整。"}, "ML_GRACE_MODEL": {"name": "ML_GRACE_MODEL", "description": "ML_GRACE_MODEL= [string]Default:ML_GRACE_MODEL= ./SavedModel", "default": "ML_GRACE_MODEL= [string]Default:ML_GRACE_MODEL= ./SavedModel", "details": "Description: String-based tag specifying the GRACE force field name or path.\nIfGRACE force fieldsare requested viaML_TYPE= gracethis tag allows to select the actual model to use in two ways:\nML_LMLFF,ML_MODE,ML_TYPE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_GRACE_MODEL", "description_cn": "ML_GRACE_MODEL 是一个字符串参数，用于指定 GRACE 力场的名称或路径。", "default_value": "./SavedModel", "details_cn": "基于字符串的标签，用于指定 GRACE 力场的名称或路径。如果通过 ML_TYPE= grace 请求 GRACE 力场，此标签允许以两种方式选择要使用的实际模型：ML_LMLFF、ML_MODE、ML_TYPE", "recommended": "根据计算需求指定模型路径，例如使用预训练模型或自定义模型。默认值为 ./SavedModel，适用于标准场景。使用场景：当使用GRACE力场进行机器学习势计算时，用于选择具体的力场模型。", "tips": "确保模型文件存在且路径正确；与ML_TYPE= grace参数配合使用；检查模型与当前VASP版本的兼容性；避免路径错误导致计算失败。"}, "ML_IAFILT2": {"name": "ML_IAFILT2", "description": "ML_IAFILT2= [integer]Default:ML_IAFILT2= 2", "default": "ML_IAFILT2= [integer]Default:ML_IAFILT2= 2", "details": "Description: This tag specifies the type of angular filtering used in the machine learning force field method.\nThis tag is only used ifML_LAFILT2=.TRUE.is set.\nFollowing cases are possible for the angular filtering function[math]\\displaystyle{ \\eta }[/math](see alsohere):", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_IAFILT2", "description_cn": "ML_IAFILT2 指定机器学习力场方法中使用的角度过滤类型。", "default_value": "2", "details_cn": "此标签指定机器学习力场方法中使用的角度过滤类型。仅当设置 ML_LAFILT2=.TRUE. 时才使用此标签。角度过滤函数 η 的可能情况如下（另见此处）：", "recommended": "推荐使用默认值2，适用于大多数机器学习力场计算，如常规分子动力学模拟或材料性质预测。如果需要优化角度过滤以提高精度或效率，可根据具体体系选择其他整数值，但建议参考VASP文档或相关研究。", "tips": "此参数仅在 ML_LAFILT2=.TRUE. 时生效，使用前需确保启用该标签。修改此参数可能影响计算精度和性能，建议在测试后应用。"}, "ML_IALGO_LINREG": {"name": "ML_IALGO_LINREG", "description": "ML_IALGO_LINREG= [integer]", "default": "Default:ML_IALGO_LINREG", "details": "Description: This tag determines the algorithm that is employed to solve the system of linear equations in the ridge regression method for machine learning.\nIn the ridge regression method for machine learning one needs to solve for the unknown weights[math]\\displaystyle{ \\mathbf{w} }[/math]minimizing\n[math]\\displaystyle{ \n || \\mathbf{Y} - \\mathbf{\\Phi} \\mathbf{w} || \\rightarrow \\mbox{min}.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_IALGO_LINREG", "description_cn": "ML_IALGO_LINREG= [整数]", "default_value": "ML_IALGO_LINREG", "details_cn": "此标签决定了在机器学习的岭回归方法中用于求解线性方程组的算法。在机器学习的岭回归方法中，需要求解未知权重 w 以最小化 || Y - Φ w ||。", "recommended": "1（假设为默认值）。使用场景：适用于大多数机器学习力场训练，当矩阵条件良好时；对于大型系统或数值稳定性要求高的情况，可尝试其他整数值（如2）以优化求解过程。", "tips": "确保ML_IALGO_LINREG的值为正整数；在修改此参数前，建议查阅VASP官方文档以确认有效算法选项；与其他机器学习参数（如ML_IALGO）协调使用，以避免冲突或效率下降。"}, "ML_ICOUPLE": {"name": "ML_ICOUPLE", "description": "ML_ICOUPLE= [integer array]", "default": "", "details": "Description: This tag specifies the atoms where the coupling parameter is introduced to calculate the chemical potential within the machine learning force field method.\nAtom are ordered according to thePOSCARfile and indices start with index 1. For thermodynamic integration calculations please have a look at the tagML_LCOUPLE.\nML_LMLFF,ML_LCOUPLE,ML_NATOM_COUPLED,ML_RCOUPLE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_ICOUPLE", "description_cn": "指定在机器学习力场中引入耦合参数的原子索引。", "default_value": "无", "details_cn": "此标签指定在机器学习力场方法中引入耦合参数以计算化学势的原子。原子按照POSCAR文件排序，索引从1开始。对于热力学积分计算，请查看标签ML_LCOUPLE。相关标签包括ML_LMLFF、ML_LCOUPLE、ML_NATOM_COUPLED、ML_RCOUPLE。", "recommended": "根据具体计算需求设置原子索引数组，例如指定需要计算化学势的原子。使用场景：在机器学习力场方法中进行化学势计算或热力学积分时。", "tips": "原子索引从1开始，必须与POSCAR文件中的原子顺序一致。进行热力学积分时，需结合ML_LCOUPLE标签使用。确保正确设置相关标签如ML_LMLFF、ML_NATOM_COUPLED、ML_RCOUPLE。"}, "ML_ICRITERIA": {"name": "ML_ICRITERIA", "description": "ML_ICRITERIA= [integer]", "default": "Default:ML_ICRITERIA", "details": "Description: Decides how the error threshold (ML_CTIFOR) is updated within the machine learning force field method.ML_CTIFORdetermines whether a first-principles calculation is performed.\nThe use of this tag in combination with the learning algorithms is described here:here.\nThe following options are possible forML_ICRITERIA:", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_ICRITERIA", "description_cn": "ML_ICRITERIA 是一个整数参数。", "default_value": "ML_ICRITERIA", "details_cn": "决定在机器学习力场方法中误差阈值（ML_CTIFOR）如何更新。ML_CTIFOR 决定是否执行第一性原理计算。此标签与学习算法结合使用的描述见此处：here。ML_ICRITERIA 的可能选项如下：", "recommended": "对于大多数应用，推荐使用ML_ICRITERIA=1，它使用固定误差阈值，简单且稳定，适用于初始学习或标准计算。对于需要自适应学习的复杂系统或高精度要求，推荐ML_ICRITERIA=2，它允许阈值动态调整。使用场景：ML_ICRITERIA=1适用于简单系统或快速原型；ML_ICRITERIA=2适用于复杂材料或长时间模拟。", "tips": "确保ML_CTIFOR参数设置合理，以配合ML_ICRITERIA的使用。与其他机器学习参数（如ML_LMLFF）协调设置。注意计算成本，自适应阈值（如ML_ICRITERIA=2）可能增加第一性原理计算的频率，从而增加计算资源消耗。建议在测试阶段先使用默认或简单设置，再根据系统需求调整。"}, "ML_IREG": {"name": "ML_IREG", "description": "ML_IREG= [integer]Default:ML_IREG= 2", "default": "ML_IREG= [integer]Default:ML_IREG= 2", "details": "Description: This tag specifies whether the regularization parameters are kept constant or not in the machine learning force field method.\nThe following cases are possible for this tag:\nFor the optimization of the noise parameter[math]\\displaystyle{ \\sigma_{\\mathrm{v}}^{2} }[/math]seethis section.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_IREG", "description_cn": "ML_IREG= [整数] 默认值：ML_IREG= 2", "default_value": "2", "details_cn": "此标签指定在机器学习力场方法中，正则化参数是否保持不变。以下情况适用于此标签：对于噪声参数σ_v²的优化，请参见此部分。", "recommended": "通常使用默认值2。使用场景：在机器学习力场计算中，当需要控制正则化参数的更新时，例如优化模型以避免过拟合或欠拟合。", "tips": "根据具体计算需求调整ML_IREG值，并参考VASP官方文档以获取详细指导，确保参数设置合理以提升计算精度和效率。"}, "ML_ISCALE_TOTEN": {"name": "ML_ISCALE_TOTEN", "description": "ML_ISCALE_TOTEN= [integer]Default:ML_ISCALE_TOTEN= 2", "default": "ML_ISCALE_TOTEN= [integer]Default:ML_ISCALE_TOTEN= 2", "details": "Description: This tag specifies how to scale the energy data in the machine learning force field method.\nThe following cases are possible:\nML_LMLFF,ML_EATOM_REF", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_ISCALE_TOTEN", "description_cn": "ML_ISCALE_TOTEN是一个整数参数，用于指定机器学习力场方法中能量数据的缩放方式。", "default_value": "2", "details_cn": "详细说明：这个标签指定在机器学习力场方法中如何缩放能量数据。可能的情况有：ML_LMLFF, ML_EATOM_REF。", "recommended": "默认值2通常适用于一般情况。使用场景：当使用机器学习力场（ML_LMLFF）时，根据具体需求调整；如果涉及原子参考能量（ML_EATOM_REF），可能需要不同的缩放设置。建议在标准机器学习力场训练中保持默认值，除非有特定缩放需求。", "tips": "在修改此参数前，建议查阅VASP官方文档或相关文献，确保与计算设置兼容。错误的缩放可能影响能量精度和力场训练效果。注意与其他机器学习参数（如ML_LMLFF）的协调使用。"}, "ML_ISTART": {"name": "ML_ISTART", "description": "ML_ISTART= [integer]Default:ML_ISTART= 0", "default": "ML_ISTART= [integer]Default:ML_ISTART= 0", "details": "Description: This tag selects the mode of operation (e.g. start from scratch, prediction-only,...) of the machine learning force fields method.\nIf the machine learning force fields method is enabled viaML_LMLFF= .TRUE., this tag further specifies the mode of operation when VASP is run. The following cases can be selected:\nML_LMLFF,ML_IALGO_LINREG,ML_IWEIGHT,ML_ICRITERIA,ML_IREG,ML_LSPARSDES,ML_ISCALE_TOTEN,ML_LCOUPLE,ML_LHEAT,ML_LEATOM,ML_MB,ML_MCONF", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_ISTART", "description_cn": "ML_ISTART是一个整数参数，用于选择机器学习力场方法的操作模式。", "default_value": "0", "details_cn": "此标签选择机器学习力场方法的操作模式（例如，从头开始、仅预测等）。如果通过ML_LMLFF= .TRUE.启用了机器学习力场方法，则此标签进一步指定VASP运行时的操作模式。可以选择以下情况：ML_LMLFF, ML_IALGO_LINREG, ML_IWEIGHT, ML_ICRITERIA, ML_IREG, ML_LSPARSDES, ML_ISCALE_TOTEN, ML_LCOUPLE, ML_LHEAT, ML_LEATOM, ML_MB, ML_MCONF", "recommended": "0用于从头开始训练机器学习力场（新计算），1用于从现有模型继续训练，2用于仅预测模式。使用场景：初始训练时使用0，模型优化或继续训练时使用1，应用模型进行力场预测时使用2。", "tips": "使用ML_ISTART前需确保ML_LMLFF设置为.TRUE.以启用机器学习力场方法。ML_ISTART的值应与计算目标匹配，例如训练新模型时使用0，预测时使用2，避免设置错误导致计算失败或结果不准确。"}, "ML_IWEIGHT": {"name": "ML_IWEIGHT", "description": "ML_IWEIGHT= [integer]Default:ML_IWEIGHT= 3", "default": "ML_IWEIGHT= [integer]Default:ML_IWEIGHT= 3", "details": "Description: This tag controls which procedure is used for normalizing and weighting the energies, forces, and stresses in the machine learning force field method.\nTo achieve optimal training it is important to normalize the available data. Furthermore, sometimes it may be desired to emphasize some training quantities over others, e.g. one might want excellent force predictions, even at the cost of sacrificing some energy and stress accuracy. How normalizing a\nForML_IWEIGHT= 2, 3 the weights are unitless quantities used to multiply the data, whereas forML_IWEIGHT= 1 they have a unit. All three methods provide unitless energies, forces, and stress tensors, which are then passed to the learning algorithm. Although the defaults are usually rather sensible, i", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_IWEIGHT", "description_cn": "ML_IWEIGHT= [整数] 默认值：ML_IWEIGHT= 3", "default_value": "3", "details_cn": "该标签控制机器学习力场方法中能量、力和应力的归一化和加权过程。为了实现最佳训练，归一化可用数据很重要。此外，有时可能需要强调某些训练量而非其他，例如，即使牺牲一些能量和应力的准确性，也想要出色的力预测。对于ML_IWEIGHT= 2, 3，权重是", "recommended": "推荐使用默认值3，适用于大多数机器学习力场训练场景，能平衡能量、力和应力的权重。如果特别关注力预测的准确性，可以考虑使用ML_IWEIGHT=2，以强调力的权重，但可能牺牲部分能量和应力精度。", "tips": "调整ML_IWEIGHT可能影响训练收敛性和结果，建议根据具体训练目标进行测试。确保训练数据已正确归一化，以获得最佳效果。"}, "ML_LAFILT2": {"name": "ML_LAFILT2", "description": "ML_LAFILT2= [logical]Default:ML_LAFILT2= .TRUE.", "default": "ML_LAFILT2= [logical]Default:ML_LAFILT2= .TRUE.", "details": "Description: This tag specifies whether angular filtering is applied or not within the machine learning force field method.\nFor the desciption of the filters please see:ML_IAFILT2andML_AFILT2.\nThe applied angular filter is also briefly describedhere.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LAFILT2", "description_cn": "此参数指定在机器学习力场方法中是否应用角度过滤。", "default_value": ".TRUE.", "details_cn": "此标签指定在机器学习力场方法中是否应用角度过滤。有关过滤器的描述，请参见：ML_IAFILT2和ML_AFILT2。应用的角度过滤器也在此处简要描述。", "recommended": ".TRUE.。使用场景：在机器学习力场计算中，默认应用角度过滤以提高精度；如果计算资源有限或对精度要求不高，可考虑设置为.FALSE.以加速计算。", "tips": "确保相关参数ML_IAFILT2和ML_AFILT2已正确配置；角度过滤可能影响计算结果的准确性，建议根据具体体系测试后决定。"}, "ML_LBASIS_DISCARD": {"name": "ML_LBASIS_DISCARD", "description": "ML_LBASIS_DISCARD= [logical]Default:ML_LBASIS_DISCARD= .TRUE.", "default": "ML_LBASIS_DISCARD= [logical]Default:ML_LBASIS_DISCARD= .TRUE.", "details": "Description: Controls whether calculation is continued or stopped after the maximum number of local reference configurationsML_MBfor a given species is reached.\nForML_LBASIS_DISCARD=.FALSE., whenever the number of local reference configurations for a given species would exceed the maximum number of allowed configurationsML_MB, the code will terminate (soft exit) and request the user to continue with and increased number forML_MB.\nForML_LBASIS_DISCARD=.TRUE. (default) the code will not stop, when the number of local reference configurations for a given species would exceed the maximum, but old configurations may be replaced by new ones.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LBASIS_DISCARD", "description_cn": "控制是否在达到给定物种的最大局部参考配置数ML_MB后继续或停止计算。", "default_value": "默认值为.TRUE.", "details_cn": "控制在达到给定物种的最大局部参考配置数ML_MB后，计算是继续还是停止。当ML_LBASIS_DISCARD=.FALSE.时，每当给定物种的局部参考配置数超过允许的最大配置数ML_MB时，代码将终止（软退出）并请求用户增加ML_MB的值后继续计算。当ML_LBASIS_DISCARD=.TRUE.（默认）时，代码不会停止，当", "recommended": "推荐值为.TRUE.（默认），适用于大多数计算场景，允许自动继续，避免中断。如果需要手动监控配置数增长（如训练初期或ML_MB设置较小时），可设置为.FALSE.，以便在超过ML_MB时及时调整参数。", "tips": "确保ML_MB参数设置合理，以避免频繁软退出或内存不足。软退出时，计算会暂停并提示用户增加ML_MB，需手动干预后继续。理解此参数与ML_MB的关联，有助于优化机器学习力场训练的效率和稳定性。"}, "ML_LCOUPLE": {"name": "ML_LCOUPLE", "description": "ML_LCOUPLE= [logical]", "default": "Default:ML_LCOUPLE", "details": "Description: This tag specifies whether thermodynamic integration is activated in order to calculate the chemical potentials within the machine learning force field method.\nIn thermodynamic integration a coupling parameter[math]\\displaystyle{ \\lambda }[/math]is introduced to the Hamiltonian to smoothly switch between a \"non-interacting\" reference state and a \"fully-interacting\" state. The change of the free energy along this path is written as\n[math]\\displaystyle{ \n\\Delta \\mu = \\int\\limits_{0}^{1} \\langle \\frac{dH(\\lambda)}{d\\lambda} \\rangle_{\\lambda} d\\lambda.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LCOUPLE", "description_cn": "ML_LCOUPLE= [逻辑值]", "default_value": "FALSE", "details_cn": "此标签指定是否激活热力学积分，以在机器学习力场方法中计算化学势。在热力学积分中，引入一个耦合参数λ到哈密顿量中，以平滑地在'非相互作用'参考态和'完全相互作用'态之间切换。沿此路径的自由能变化写作Δμ = ∫从0到1的...", "recommended": "当需要计算化学势时设置为TRUE，否则使用默认值FALSE。使用场景：适用于机器学习力场下的自由能计算，例如相变研究、反应路径分析或材料稳定性评估。", "tips": "1. 确保其他相关参数如ML_ISTART已正确设置以加载机器学习模型；2. 热力学积分可能增加计算成本，需合理规划资源；3. 耦合参数λ的积分路径应根据体系调整，避免数值不稳定；4. 建议结合VASP文档验证参数兼容性。"}, "ML_LEATOM": {"name": "ML_LEATOM", "description": "ML_LEATOM= [logical]Default:ML_LEATOM= .FALSE.", "default": "ML_LEATOM= [logical]Default:ML_LEATOM= .FALSE.", "details": "Description: This term specifies whether the total atomic energy is written out or not.\nThis tag specifies whether the total atomic energy (potential energy plus kinetic energy) for each MD step is written out to theML_EATOMfile. It also writes the atomic positions and lattice parameters at every MD step to this file.\nML_LMLFF,ML_WTOTEN", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LEATOM", "description_cn": "ML_LEATOM= [逻辑值] 默认值：ML_LEATOM= .FALSE.", "default_value": ".FALSE.", "details_cn": "这个术语指定是否输出总原子能量。这个标签指定是否将每个MD步骤的总原子能量（势能加动能）输出到ML_EATOM文件。它还将每个MD步骤的原子位置和晶格参数写入此文件。相关参数：ML_LMLFF, ML_WTOTEN。", "recommended": ".FALSE.（默认）。使用场景：在需要分析每个原子的能量贡献或获取详细原子级数据时，可设置为 .TRUE.，例如在分子动力学模拟中研究原子能量分布。", "tips": "设置为 .TRUE. 会生成额外的输出文件 ML_EATOM，可能增加存储需求和计算开销。确保相关参数如 ML_LMLFF 和 ML_WTOTEN 正确配置以配合使用。仅在必要时启用，避免不必要的资源消耗。"}, "ML_LEMPPOT": {"name": "ML_LEMPPOT", "description": "ML_LEMPPOT= [logical]Default:ML_LEMPPOT= .FALSE.", "default": "ML_LEMPPOT= [logical]Default:ML_LEMPPOT= .FALSE.", "details": "Description: Enables the use of auxiliary empirical potentials for thermodynamic integration usingVCAIMAGES.\nML_LEMPPOT=.TRUE. sets the following defaults:\nML_LEMPPOT=.TRUE. requiresML_LCOUPLE=.TRUE., so no other values forML_LCOUPLEare permitted.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LEMPPOT", "description_cn": "ML_LEMPPOT是一个逻辑参数，用于控制是否启用辅助经验势。", "default_value": ".FALSE.", "details_cn": "详细说明：启用辅助经验势用于使用VCAIMAGES的热力学积分。当ML_LEMPPOT设置为.TRUE.时，会设置以下默认值：ML_LEMPPOT=.TRUE.要求ML_LCOUPLE=.TRUE.，因此不允许ML_LCOUPLE的其他值。", "recommended": "默认值.FALSE.。使用场景：仅在需要进行热力学积分并使用辅助经验势时，设置为.TRUE.，并确保ML_LCOUPLE也为.TRUE.。", "tips": "设置ML_LEMPPOT=.TRUE.时，必须同时设置ML_LCOUPLE=.TRUE.，否则计算会失败。请确保熟悉VCAIMAGES和热力学积分的相关知识。"}, "ML_LERR": {"name": "ML_LERR", "description": "Description: Decides whether the Bayesian error estimates are calculated and written out or not.", "default": "ML_LERR= [logical]Default:ML_LERR= .TRUE.", "details": "ML_LERR= [logical]Default:ML_LERR= .TRUE.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LERR", "description_cn": "决定是否计算并输出贝叶斯误差估计。", "default_value": "ML_LERR = .TRUE.", "details_cn": "ML_LERR = [逻辑值] 默认值：ML_LERR = .TRUE.。该参数控制是否在机器学习力场计算中计算并输出贝叶斯误差估计。贝叶斯误差估计用于评估模型预测的不确定性，有助于判断计算结果的可靠性。", "recommended": "推荐值：.TRUE.（默认值）。\n使用场景：\n1. 进行高精度计算或需要评估模型预测可靠性时，应保持默认值 .TRUE.。\n2. 在大规模计算或对计算效率要求较高时，可考虑设为 .FALSE. 以节省计算资源，但会失去不确定性评估能力。", "tips": "注意事项：\n1. 关闭贝叶斯误差估计（设为 .FALSE.）将无法获得模型预测的不确定性信息，可能影响对计算结果可信度的判断。\n2. 该参数通常与机器学习力场（MLFF）相关功能配合使用，确保在需要时启用误差评估。\n3. 若计算资源充足且对结果可靠性要求高，建议保持默认设置。"}, "ML_LFAST": {"name": "ML_LFAST", "description": "Description: This tag switches on the descriptors for refitting in the fast execution mode within machine learning force fields. This tag is usually switched on byML_MODE= refitand doesn't need to be set explicitely.", "default": "Default:ML_LFAST", "details": "Description: This tag switches on the descriptors for refitting in the fast execution mode within machine learning force fields. This tag is usually switched on byML_MODE= refitand doesn't need to be set explicitely.\nThis tag switches on the descriptors for the fast execution mode. To use the fast execution mode the force field first has to be refit with the fast descriptors. This is done by settingML_MODE= refit, which will automatically setML_LFAST= .TRUE.. As usual, the resultingML_FFNhas to be copied toML_FF\nThe speedup of the fast method compared to the regular method is increasing with increasing number of local reference configurations.", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LFAST", "description_cn": "这个标签在机器学习力场中启用快速执行模式下的描述符进行重新拟合。", "default_value": "FALSE", "details_cn": "这个标签在机器学习力场中启用快速执行模式下的描述符进行重新拟合。这个标签通常由ML_MODE=refit自动开启，不需要显式设置。这个标签启用快速执行模式的描述符。要使用快速执行模式，力场必须首先用快速描述符重新拟合。这通过设置ML_MODE=refit来完成，它会自动设置ML_LFAST=.TRUE.。通常，生成的ML_FFN必须...", "recommended": "当需要使用快速执行模式时，设置ML_LFAST=.TRUE.，但前提是已经通过ML_MODE=refit重新拟合了力场。使用场景：在机器学习力场模拟中，为了加速计算，可以使用快速模式，但需确保力场已正确重新拟合。", "tips": "1. 不需要显式设置ML_LFAST，因为它通常由ML_MODE=refit自动控制。2. 在使用快速执行模式前，必须确保力场已经用快速描述符重新拟合。3. 注意检查生成的ML_FFN文件是否正确。"}, "ML_LHEAT": {"name": "ML_LHEAT", "description": "ML_LHEAT= [logical]Default:ML_LHEAT= .FALSE.", "default": "ML_LHEAT= [logical]Default:ML_LHEAT= .FALSE.", "details": "Description: This tag specifies whether the heat flux is calculated or not in the machine learning force field method.\nThe heat flux within machine learning force fields is decomposed into atomic contributions written as\n[math]\\displaystyle{ \n\\mathbf{q}(t) = \\sum\\limits_{i=1}^{N_{a}} \\frac{d}{dt} \\left( \\mathbf{r}_{i} E_{i} \\right),\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LHEAT", "description_cn": "此标签指定是否在机器学习力场方法中计算热流。", "default_value": ".FALSE.", "details_cn": "此标签指定是否在机器学习力场方法中计算热流。机器学习力场中的热流被分解为原子贡献，表示为 [math]\\displaystyle{ \\mathbf{q}(t) = \\sum\\limits_{i=1}^{N_{a}} \\frac{d}{dt} \\left( \\mathbf{r}_{i} E_{i} \\right), }[/math]", "recommended": ".TRUE. 用于需要计算热流的场景，如热传导模拟；.FALSE. 用于不需要热流的常规计算。", "tips": "启用ML_LHEAT可能会增加计算成本，因为它需要额外计算原子贡献的热流。确保在机器学习力场方法中使用，并可能需要其他相关参数配合。"}, "ML_LIB": {"name": "ML_LIB", "description": "Description:ML_LIBenables/disables the use of theVASPml C++ libraryfor machine-learning features.", "default": "Default:ML_LIB", "details": "Description:ML_LIBenables/disables the use of theVASPml C++ libraryfor machine-learning features.\nSome machine learning modes of operation (ML_MODE) are implemented twice in VASP, once in the original Fortran code and again in a C++ rewrite as part of the VASPml library. However, the supported features andINCARtags may bedifferent. For example, the C++ library does not yet implement the thermody\nML_LMLFF,ML_MODE", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LIB", "description_cn": "ML_LIB 启用或禁用 VASPml C++ 库用于机器学习功能。", "default_value": "ML_LIB", "details_cn": "ML_LIB 启用或禁用 VASPml C++ 库用于机器学习功能。一些机器学习操作模式（ML_MODE）在 VASP 中实现了两次，一次在原始的 Fortran 代码中，另一次作为 VASPml 库的一部分在 C++ 重写中。然而，支持的功能和 INCAR 标签可能不同。例如，C++ 库尚未实现热力学相关的 ML_LMLFF 和 ML_MODE 功能。", "recommended": "TRUE（如果使用 VASPml C++ 库支持的机器学习功能，如机器学习力场计算，以利用性能优化）或 FALSE（如果需要使用 Fortran 代码的特定功能，如某些热力学计算）。使用场景：在机器学习分子动力学或力场训练中，根据所需功能选择启用或禁用。", "tips": "C++ 库可能不支持所有机器学习模式，启用 ML_LIB 前请确认所需功能是否支持。与 ML_MODE 参数结合使用时，注意不同库的差异。默认值可能因 VASP 版本而异，建议查阅官方文档以获取最新信息。"}, "ML_LMAX2": {"name": "ML_LMAX2", "description": "Description: This tag specifies the maximum angular momentum quantum number[math]\\displaystyle{ L_\\max }[/math]of spherical harmonics used to expand atomic distributions within the machine learning force field method.", "default": "Default:ML_LMAX2", "details": "Description: This tag specifies the maximum angular momentum quantum number[math]\\displaystyle{ L_\\max }[/math]of spherical harmonics used to expand atomic distributions within the machine learning force field method.\nTo construct an atomic environment descriptor the atomic probability density\n[math]\\displaystyle{ \n\\rho_{i}\\left(\\mathbf{r}\\right) = \\sum\\limits_{j=1}^{N_{\\mathrm{a}}} f_{\\mathrm{cut}}\\left(r_{ij}\\right) g\\left(\\mathbf{r}-\\mathbf{r}_{ij}\\right),\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LMAX2", "description_cn": "此标签指定在机器学习力场方法中用于展开原子分布的球谐函数的最大角动量量子数 L_max。", "default_value": "4", "details_cn": "此标签指定在机器学习力场方法中用于展开原子分布的球谐函数的最大角动量量子数 L_max。为了构建原子环境描述符，原子概率密度 ρ_i(r) = Σ_{j=1}^{N_a} f_cut(r_ij) g(r - r_ij)，", "recommended": "推荐值为4到8，具体取决于系统复杂性。对于简单系统，默认值4通常足够；对于复杂系统如过渡金属或表面，建议使用更高值如6或8以提高精度。使用场景：在VASP的机器学习力场（MLFF）计算中，用于优化原子环境描述符。", "tips": "设置过高会增加计算时间和内存消耗，过低可能导致描述符不准确。建议在训练机器学习力场时进行收敛测试，以确定合适的L_max值。"}, "ML_LMLFF": {"name": "ML_LMLFF", "description": "ML_LMLFF= [logical]Default:ML_LMLFF= .FALSE.", "default": "ML_LMLFF= [logical]Default:ML_LMLFF= .FALSE.", "details": "Description: Main control tag which enables/disables the use of machine learning force fields.\nIfML_LMLFF= .FALSE. machine learning force fields are disabled and all relatedINCARtags, i.e. all tags starting with \"ML_\", are ignored. If machine learning force fields are used by settingML_LMLFF= .TRUE., the VASP mode of operation depends on the choice ofML_MODE. IfML_MODEis not supplied in theIN\nML_MODE,ML_IALGO_LINREG,ML_IWEIGHT,ML_ICRITERIA,ML_IREG,ML_LSPARSDES,ML_ISCALE_TOTEN,ML_LCOUPLE,ML_LHEAT,ML_LEATOM,ML_MB,ML_MCONF", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LMLFF", "description_cn": "ML_LMLFF= [逻辑值] 默认值：ML_LMLFF= .FALSE.", "default_value": ".FALSE.", "details_cn": "主要控制标签，用于启用或禁用机器学习力场的使用。如果ML_LMLFF= .FALSE.，则机器学习力场被禁用，所有相关的INCAR标签，即所有以\"ML_\"开头的标签，都将被忽略。如果通过设置ML_LMLFF= .TRUE.来使用机器学习力场，VASP的操作模式取决于ML_MODE的选择。如果ML_MODE未在INCAR中提供，则可能需要其他设置或使用默认行为。", "recommended": "默认为.FALSE.，表示禁用机器学习力场。如果需要使用机器学习力场进行计算，例如在分子动力学模拟中提高效率或精度，可设置为.TRUE.。使用场景：适用于需要机器学习力场辅助的计算任务，如加速力场计算或优化材料性质预测。", "tips": "启用ML_LMLFF=.TRUE.时，必须确保ML_MODE及其他以ML_开头的参数正确设置，否则可能导致计算错误或性能下降。机器学习力场可能需要额外的训练数据或计算资源，建议在使用前参考VASP官方文档并进行测试。"}, "ML_LSPARSDES": {"name": "ML_LSPARSDES", "description": "ML_LSPARSDES= [logical]Default:ML_LSPARSDES= .FALSE.", "default": "ML_LSPARSDES= [logical]Default:ML_LSPARSDES= .FALSE.", "details": "Description: Specifies whether angular-descriptor sparsification is enabled within the machine learning force field method.\nTo use thesparsification of angular descriptors setthe following tags:\nWe advise the user to adjust this parameter carefully and test it individually for each system. This means e.g. plotting the accuracy of the calculation against the computational speed (Pareto curves) for different values ofML_RDES_SPARSDES. The user can then choose a tradeoff between efficiency and", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LSPARSDES", "description_cn": "ML_LSPARSDES 是一个逻辑参数，用于控制机器学习力场方法中是否启用角度描述符稀疏化。默认值为 .FALSE.。", "default_value": "默认值为 .FALSE.", "details_cn": "指定在机器学习力场方法中是否启用角度描述符稀疏化。要使用角度描述符的稀疏化，请设置以下标签：我们建议用户仔细调整此参数，并针对每个系统单独测试。例如，绘制不同 ML_RDES_SPARSDES 值下计算精度与计算速度的帕累托曲线。然后，用户可以在效率和精度之间做出权衡。", "recommended": "默认值 .FALSE. 适用于一般情况；若需提高计算效率，可尝试设置为 .TRUE.，但需通过测试验证精度。使用场景：在机器学习力场计算中，当系统较大或计算资源有限时，启用稀疏化可以加速计算，但可能牺牲精度。", "tips": "使用此参数时，建议针对具体系统进行测试，绘制精度与速度的帕累托曲线，以找到最佳权衡点。"}, "ML_LUSE_NAMES": {"name": "ML_LUSE_NAMES", "description": "ML_LUSE_NAMES= [logical]Default:ML_LUSE_NAMES= .FALSE.", "default": "ML_LUSE_NAMES= [logical]Default:ML_LUSE_NAMES= .FALSE.", "details": "Description: Decides whether training structures are additionally subdivided into groups internally due to their structure name.\nThis tag is important if the normalization via averages over subset standard deviations (ML_IWEIGHT=3) is employed.\nBy default (ML_LUSE_NAMES=.FALSE.) the division into subsets is based on the atom types and number of atoms per type. If two systems contain the same atom types and the same number of \nML_LMLFF,ML_WTOTEN,ML_WTIFOR,ML_WTSIF,ML_IWEIGHT", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_LUSE_NAMES", "description_cn": "决定是否根据结构名称将训练结构内部细分。", "default_value": ".FALSE.", "details_cn": "决定是否根据结构名称将训练结构内部细分。如果使用基于子集标准偏差平均的归一化（ML_IWEIGHT=3），此标签很重要。默认情况下（ML_LUSE_NAMES=.FALSE.），子集的划分基于原子类型和每种类型的原子数量。如果两个系统包含相同的原子类型和相同的数量", "recommended": "默认为.FALSE.。如果使用ML_IWEIGHT=3进行归一化，建议设置为.TRUE.，以便根据结构名称细分训练结构，提高归一化的准确性；否则，使用默认值.FALSE.即可。", "tips": "当设置为.TRUE.时，确保训练数据中的结构名称一致且有意义，以避免错误细分；同时，需与ML_IWEIGHT=3配合使用以发挥最佳效果。"}, "ML_MB": {"name": "ML_MB", "description": "ML_MB= [integer]Default:ML_MB= see below", "default": "ML_MB= [integer]Default:ML_MB= see below", "details": "Description: This tag sets the maximum number of local reference configurations (i.e. basis functions in the kernel) in the machine learning force field method.\nThe defaults forML_MBare different for each differentML_MODEsetting. Here are the defaults for each mode:\nusing the following definitions:", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MB", "description_cn": "ML_MB= [整数] 默认值：ML_MB= 见下文", "default_value": "[整数] 默认值：ML_MB= 见下文", "details_cn": "这个标签设置机器学习力场方法中局部参考配置的最大数量（即核中的基函数）。ML_MB的默认值因不同的ML_MODE设置而异。以下是每个模式的默认值：使用以下定义：", "recommended": "通常使用默认值，或根据ML_MODE和系统需求调整。例如，在ML_MODE=1（训练模式）中，可适当增加ML_MB以提高精度；在ML_MODE=2（预测模式）中，使用训练时确定的值。使用场景：适用于机器学习力场计算，用于平衡计算精度和效率，特别是在处理复杂或大型系统时。", "tips": "ML_MB的设置需与ML_MODE匹配；设置过高可能导致内存不足或计算时间过长；设置过低可能降低力场精度。建议参考VASP官方文档或进行收敛测试以确定最佳值。"}, "ML_MB_MIN": {"name": "ML_MB_MIN", "description": "ML_MB_MIN= [integer]Default:ML_MB_MIN= 3", "default": "ML_MB_MIN= [integer]Default:ML_MB_MIN= 3", "details": "Description:ML_MB_MINsets the minimum number of local reference configurations required for generation of a machine-learned force field.\nMachine-learned force fields based on the kernel method require a reasonable amount of reference atomic environments in order to provide meaningful predictions. Typically, the on-the-fly algorithm in VASP collects these local reference configurations (also called kernel basis functions) during an MD\nIf a training is scheduled in the current step, i.e., theSTATUSline in theML_LOGFILEshowslearningorcritical, but not enough atomic environments were collected, a text message will be emitted in theMSGline. Here is an example:", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MB_MIN", "description_cn": "ML_MB_MIN设置生成机器学习力场所需的最小局部参考配置数。", "default_value": "3", "details_cn": "ML_MB_MIN设置生成机器学习力场所需的最小局部参考配置数。基于核方法的机器学习力场需要合理的参考原子环境数量以提供有意义的预测。通常，VASP中的在线算法在分子动力学过程中收集这些局部参考配置（也称为核基函数）。如果在当前步骤中安排了训练，即状态...", "recommended": "默认值为3，适用于简单系统或初步测试。对于复杂或大型系统（如含有多种元素或非平衡态），建议增加至5-10或更高，以确保力场预测的准确性和稳定性。使用场景：在机器学习力场驱动的分子动力学模拟中，用于控制训练数据的最小数量，特别是在需要高精度力场时。", "tips": "设置值过低可能导致力场训练不足，预测不准确；设置过高会增加计算成本和内存消耗。建议根据系统大小、元素种类和模拟目标进行调整，并监控训练过程中的收敛性和力场误差。"}, "ML_MCONF": {"name": "ML_MCONF", "description": "ML_MCONF= [integer]Default:ML_MCONF= see below", "default": "ML_MCONF= [integer]Default:ML_MCONF= see below", "details": "Description: This tag sets the maximum number of structures stored in memory that are used for training in the machine learning force field method.\nThe defaults forML_MCONFare different for each differentML_MODEsetting. Here are the defaults for each mode:\nusing the following definition:", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MCONF", "description_cn": "ML_MCONF= [整数] 默认值：ML_MCONF= 见下文", "default_value": "见下文", "details_cn": "此标签设置机器学习力场方法中用于训练的内存中存储的最大结构数。ML_MCONF的默认值因不同的ML_MODE设置而异。以下是每种模式的默认值：使用以下定义：", "recommended": "通常建议设置为1000，可根据系统大小和训练需求调整；对于大型系统或高精度训练，可增加至5000。使用场景：在机器学习力场计算中，用于控制训练结构的数量，以平衡内存使用和训练效果。", "tips": "设置过高可能导致内存溢出，影响计算稳定性；设置过低可能降低训练精度。建议根据实际内存容量和训练数据量进行调整，并参考ML_MODE的具体设置。"}, "ML_MCONF_NEW": {"name": "ML_MCONF_NEW", "description": "ML_MCONF_NEW= [integer]Default:ML_MCONF_NEW= 5", "default": "ML_MCONF_NEW= [integer]Default:ML_MCONF_NEW= 5", "details": "Description: This tag sets the number of configurations that are stored temporarily as candidates for the training data in the machine learning force field method.\nThe use of this tag in combination with the learning algorithms is described here:here.\nIf force fields are reparameterized (ML_MODE= select), calculations are usually more efficient if this parameter is increased to values around 10-16 and settingML_CDOUB= 4. This is particularly relevant if the ML\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MCONF_NEW", "description_cn": "ML_MCONF_NEW 设置在机器学习力场方法中临时存储作为训练数据候选的配置数量。", "default_value": "5", "details_cn": "此标签设置在机器学习力场方法中临时存储作为训练数据候选的配置数量。此标签与学习算法的结合使用在此处描述：此处。如果力场被重新参数化（ML_MODE= select），通常增加此参数到10-16左右并设置 ML_CDOUB= 4 会使计算更高效。这在ML使用此标签的示例中尤为重要。", "recommended": "10-16。使用场景：当力场重新参数化（ML_MODE= select）时，增加此参数到10-16并设置 ML_CDOUB= 4 可以提高计算效率。", "tips": "此参数主要用于机器学习力场方法，建议在重新参数化力场时调整。确保与 ML_CDOUB 参数配合使用以获得最佳效果。"}, "ML_MHIS": {"name": "ML_MHIS", "description": "ML_MHIS= [integer]Default:ML_MHIS= 10", "default": "ML_MHIS= [integer]Default:ML_MHIS= 10", "details": "Description: This tag sets the number of estimated errors stored in memory to determine the threshold for error estimation in the machine learning force field method forML_ICRITERIA=1. ForML_ICRITERIA=2, the history length is 50 xML_MHIS(or hard coded to 400).\nThe use of this tag in combination with the learning algorithms is described here:here.\nML_ICRITERIA=1: The ML code storesML_MHISerrors from previous training steps: immediately after a re-training of the ML-FF, the estimated errors of the forces are reevaluated for the current structure (that was also just added as training structure). The average  and the maximum error of the forces ", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MHIS", "description_cn": "ML_MHIS参数用于设置机器学习力场方法中存储在内存中的估计误差数量，以确定误差估计阈值。", "default_value": "10", "details_cn": "此标签设置存储在内存中的估计误差数量，用于确定机器学习力场方法中ML_ICRITERIA=1的误差估计阈值。对于ML_ICRITERIA=2，历史长度为50乘以ML_MHIS（或硬编码为400）。此标签与学习算法的组合使用在此处描述：此处。ML_ICRITERIA=1：ML代码存储ML_MHIS个先前训练步骤的误差：在ML-FF重新训练后立即，估计误差的", "recommended": "推荐值为10（默认值），适用于大多数标准计算。对于复杂系统（如大分子或表面体系）或需要更高精度的机器学习力场训练，可适当增加ML_MHIS值（例如20-30），以改善误差估计稳定性。使用场景：当使用ML_ICRITERIA=1时，ML_MHIS直接影响误差历史长度；当使用ML_ICRITERIA=2时，它通过50*ML_MHIS（上限400）影响历史长度，建议根据系统规模和计算资源调整。", "tips": "1. 确保ML_MHIS与ML_ICRITERIA参数匹配，避免设置冲突。2. 增加ML_MHIS会提升内存消耗，需在计算资源允许范围内调整。3. 对于ML_ICRITERIA=2，历史长度为min(50*ML_MHIS, 400)，因此ML_MHIS不宜过大（如超过8）。4. 建议参考VASP官方文档或相关文献，以获取针对具体体系的优化建议。"}, "ML_MODE": {"name": "ML_MODE", "description": "ML_MODE= train | select | refit | refitbayesian | run | delta | noneDefault:ML_MODE=  none", "default": "ML_MODE= train | select | refit | refitbayesian | run | delta | noneDefault:ML_MODE=  none", "details": "Description: String-based tag selecting operation mode for machine learning force fields.\nThis tag acts as a \"super tag\" and selects the operation mode by selecting the defaults for all other tags. Every tag that is affected by this \"super tag\" can be overwritten by the user by simply specifying the value for that tag.\nThe following options are available for this tag:\nForce predictions from the machine learning force field are used to drive the molecular dynamics (MD) simulation. However, if the error estimation performed in each time step indicates a high force error an ab initio calculation is performed instead and the collected energy, forces, and stress are u", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MODE", "description_cn": "ML_MODE参数用于选择机器学习力场的操作模式，可选值包括train、select、refit、refitbayesian、run、delta和none，默认值为none。", "default_value": "none", "details_cn": "基于字符串的标签，用于选择机器学习力场的操作模式。此标签作为一个“超级标签”，通过选择所有其他标签的默认值来选择操作模式。每个受此“超级标签”影响的标签都可以由用户通过简单地指定该标签的值来覆盖。以下选项可用于此标签：机器学习力场的力预测用于驱动分子动力学（MD）模拟。然而，如果", "recommended": "推荐值取决于计算需求：train用于从头开始训练机器学习力场，select用于选择和筛选训练数据，refit用于重新拟合力场以提高精度，refitbayesian用于贝叶斯方法重新拟合力场，run用于使用训练好的力场运行分子动力学模拟，delta用于计算能量差或相关属性，none为默认值表示不使用机器学习功能。使用场景包括力场开发、数据优化、模拟运行和能量分析。", "tips": "ML_MODE作为超级标签会覆盖其他相关标签的默认值，但用户可以通过手动设置这些标签来覆盖。在使用机器学习功能时，确保正确配置相关参数如ML_LMLFF等。对于初学者，建议从默认值none开始，仅在明确需要时启用机器学习模式，并参考VASP文档以了解各选项的详细用法。"}, "ML_MOPOT_DM": {"name": "ML_MOPOT_DM", "description": "ML_MOPOT_DM= [real]Default:ML_MOPOT_DM= 1.0", "default": "ML_MOPOT_DM= [real]Default:ML_MOPOT_DM= 1.0", "details": "Description: Specifies the well depth of the Morse potentials used as auxiliary potentials in thermodynamic integration (VCAIMAGES).\nThis parameter sets the well depth[math]\\displaystyle{ D_e }[/math]of the following Morse potential\n[math]\\displaystyle{ \nV(r) = D_e [(1-e^{-\\beta(r-r_{e})})^2 - 1].\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MOPOT_DM", "description_cn": "指定用于热力学积分（VCAIMAGES）中辅助势的Morse势的井深。", "default_value": "1.0", "details_cn": "指定用于热力学积分（VCAIMAGES）中辅助势的Morse势的井深。此参数设置以下Morse势的井深[math]\\displaystyle{ D_e }[/math]：[math]\\displaystyle{ V(r) = D_e [(1-e^{-\\beta(r-r_{e})})^2 - 1]. }[/math]", "recommended": "默认值1.0适用于一般情况；在热力学积分中，如果势能曲线需要调整，可根据系统特性修改此值。", "tips": "修改此参数前，建议进行测试以确保计算稳定性；与其他Morse势参数（如ML_MOPOT_RE）配合使用；注意井深D_e对势能曲线的影响。"}, "ML_MOPOT_IJM": {"name": "ML_MOPOT_IJM", "description": "ML_MOPOT_IJM= [integer array]Default:ML_MOPOT_IJM= none", "default": "ML_MOPOT_IJM= [integer array]Default:ML_MOPOT_IJM= none", "details": "Description: Specifies the list of Morse potential pairs used as auxiliary potentials in thermodynamic integration (VCAIMAGES).\nThis parameter specifies the pairs for which the following Morse potential will be used\n[math]\\displaystyle{ \nV(r) = D_e (1-e^{-\\beta(r-r_{e})})^2 - 1.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MOPOT_IJM", "description_cn": "ML_MOPOT_IJM 是一个整数数组参数，用于指定在热力学积分（VCAIMAGES）中作为辅助势的Morse势对列表。", "default_value": "none", "details_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的Morse势对列表。此参数指定将使用以下Morse势的对：V(r) = D_e (1-e^{-\beta(r-r_{e})})^2 - 1。", "recommended": "默认情况下不设置（无）。使用场景：当进行热力学积分计算（如使用VCAIMAGES）时，如果需要自定义Morse势来辅助计算，可以设置此参数指定原子对。", "tips": "参数值应为整数数组，表示原子对索引。确保Morse势的参数（如D_e, β, r_e）在其他INCAR参数中正确指定。参数格式需正确，否则可能导致计算错误。"}, "ML_MOPOT_NM": {"name": "ML_MOPOT_NM", "description": "ML_MOPOT_NM= [integer]Default:ML_MOPOT_NM= 0", "default": "ML_MOPOT_NM= [integer]Default:ML_MOPOT_NM= 0", "details": "Description: Specifies the number of Morse-potential pairs used as auxiliary potentials in thermodynamic integration (VCAIMAGES).\nThis parameter sets the number of pairs for which the following Morse potential is used\n[math]\\displaystyle{ \nV(r) = D_e (1-e^{-\\beta(r-r_{e})})^2 - 1.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MOPOT_NM", "description_cn": "指定在热力学积分（VCAIMAGES）中作为辅助势使用的Morse势对数量。", "default_value": "0", "details_cn": "指定在热力学积分（VCAIMAGES）中作为辅助势使用的Morse势对数量。此参数设置使用以下Morse势的对数：\nV(r) = D_e (1-e^{-β(r-r_e)})^2 - 1。", "recommended": "通常保持默认值0，除非您正在使用VCAIMAGES方法进行自由能计算，并且需要引入Morse势作为辅助势来改善采样或收敛。具体数值需根据您的体系和计算目标通过测试确定。", "tips": "1. 此参数仅在使用VCAIMAGES方法时相关。2. 使用非零值需要同时设置其他相关参数（如ML_MOPOT_D、ML_MOPOT_BETA、ML_MOPOT_RE）来定义Morse势的具体形式。3. 错误设置可能导致计算不收敛或结果不准确，建议在充分理解其物理意义和计算流程后再使用。"}, "ML_MOPOT_RKM": {"name": "ML_MOPOT_RKM", "description": "ML_MOPOT_RKM= [real]Default:ML_MOPOT_RKM= 1.0", "default": "ML_MOPOT_RKM= [real]Default:ML_MOPOT_RKM= 1.0", "details": "Description: Specifies the width parameter of the Morse potentials used as auxiliary potentials in thermodynamic integration (VCAIMAGES).\nThis parameter sets the width parameter[math]\\displaystyle{ \\beta }[/math]of the following Morse potential\n[math]\\displaystyle{ \nV(r) = D_e (1-e^{-\\beta(r-r_{e})})^2 - 1.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ML_MOPOT_RKM", "description_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的Morse势的宽度参数。", "default_value": "1.0", "details_cn": "指定在热力学积分（VCAIMAGES）中用作辅助势的Morse势的宽度参数。此参数设置以下Morse势的宽度参数β：V(r) = D_e (1-e^{-β(r-r_e)})^2 - 1。", "recommended": "默认值1.0适用于大多数热力学积分计算。使用场景：在使用VCAIMAGES方法进行热力学积分时，用于定义Morse辅助势的宽度。建议根据具体系统调整，以确保势能面平滑和积分收敛。", "tips": "调整ML_MOPOT_RKM时需谨慎，因为它直接影响辅助势的形状和热力学积分的准确性。建议先使用默认值进行测试，再根据需要微调。确保与其他INCAR参数协调使用。"}, "ML_MOPOT_RM": {"name": "ML_MOPOT_RM", "description": "ML_MOPOT_RM= [re
