LPH_FERMI_NEDOS= [integer]Default:ELPH_FERMI_NEDOS= 501", "details": "Description: Number of Gauss–Legendre integration points used to evaluate the Fermi–Dirac distribution and determine the electronic Fermi level at finite temperature in the context of electron–phonon (el–ph) coupling calculations.\nELPH_FERMI_NEDOSplays the same role asEFERMI_NEDOS, but specifically in the context of electron-phonon coupling calculations.  \nIt defines the number of points in the Gauss–Legendre grid used when integrating the Fermi–Dirac distribution to determine the Fermi level within the el–ph workflow.\nLarger values yield more accurate Fermi–Dirac occupations and energy derivatives, particularly at low temperatures or when evaluating sharp features in the electronic density of states near the Fermi energy.  \nA short convergence test is recommended for systems with narrow bands or strong temperatur", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_FERMI_NEDOS", "description_cn": "ELPH_FERMI_NEDOS 是一个整数参数，用于电子-声子耦合计算中确定费米能级的积分点数，默认值为 501。", "default_value": "501", "details_cn": "在电子-声子耦合计算中，用于评估费米-狄拉克分布和确定有限温度下电子费米能级的高斯-勒让德积分点数。ELPH_FERMI_NEDOS 的作用类似于 EFERMI_NEDOS，但专门用于电子-声子耦合计算。它定义了在积分费米-狄拉克分布以确定费米能级时使用的高斯-勒让德网格点数，以提高计算精度。", "recommended": "默认值 501 适用于大多数电子-声子耦合计算，如计算电声耦合常数或超导转变温度。如果需要更高精度（例如在精细费米面附近），可增加到 1001 或更多；如果计算资源有限，可减少到 201 或 301，但可能降低精度。使用场景：仅在使用 VASP 的电子-声子耦合功能（如设置 ELPH 标签）时相关。", "tips": "1. 此参数仅在电子-声子耦合计算中生效，普通计算无需设置。2. 增加点数会提高精度但显著增加计算时间和内存消耗，需权衡资源。3. 避免与 EFERMI_NEDOS 混淆，后者用于一般费米能级计算。4. 确保计算网格与积分点数匹配，以避免数值误差。"}, "ELPH_IGNORE_IMAG_PHONONS": {"name": "ELPH_IGNORE_IMAG_PHONONS", "description": "ELPH_IGNORE_IMAG_PHONONS= [logical]Default:ELPH_IGNORE_IMAG_PHONONS= .FALSE.", "default": "ELPH_IGNORE_IMAG_PHONONS= [logical]Default:ELPH_IGNORE_IMAG_PHONONS= .FALSE.", "details": "Description: If enabled, VASP ignores imaginary phonon frequencies during electron-phonon calculations.\nImaginary phonon frequencies are often a sign that the system in question is not well-converged or not well-described by the simulation.\nIn this case, the system should first be properly converged until stable (real) phonons are obtained.\nIf imaginary phonon frequencies are encountered during an electron-phonon calculation, VASP simply stops.\nIfELPH_IGNORE_IMAG_PHONONS= True, VASP instead skips the q-points at which the phonon frequencies are imaginary.\nThis can be useful since even a stable system can sometimes exhibit small imagina", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_IGNORE_IMAG_PHONONS", "description_cn": "参数ELPH_IGNORE_IMAG_PHONONS用于控制在电子-声子计算中是否忽略虚声子频率。", "default_value": ".FALSE.", "details_cn": "如果启用，VASP在电子-声子计算中忽略虚声子频率。虚声子频率通常表示系统未收敛或模拟描述不当。在这种情况下，应先使系统收敛直到获得稳定的实声子。如果在电子-声子计算中遇到虚声子频率，VASP会停止。如果ELPH_IGNORE_IMAG_PHONONS= True，VASP会跳过这些虚声子频率继续计算。", "recommended": "推荐值为.FALSE.（默认值），除非系统已充分收敛但仍有少量虚声子频率时，可设置为.True.以继续计算。使用场景：在电子-声子耦合计算中，当遇到虚声子频率但系统整体稳定时，用于避免计算中断。", "tips": "虚声子频率可能指示系统未收敛或模拟设置不当，应先优化结构和计算参数以获得实声子。设置为True可能忽略潜在问题，导致计算结果不准确，建议谨慎使用。"}, "ELPH_ISMEAR": {"name": "ELPH_ISMEAR", "description": "ELPH_ISMEAR= -15 | -14 | -5 | -4 | -1 | 0 | [integer]>0Default:ELPH_ISMEAR= 0", "default": "ELPH_ISMEAR= -15 | -14 | -5 | -4 | -1 | 0 | [integer]>0Default:ELPH_ISMEAR= 0", "details": "Description: Chooses the smearing method to determine the fermi level and chemical potential before an electron-phonon calculation.\nELPH_ISMEARis very similar toISMEAR.\nThe difference is thatELPH_ISMEARis used to determine the chemical potential in the context of electron-phonon calculation.\nThe Kohn-Sham states for which to calculate the chemical potential correspond to thek-point grid specified via theKPOINTS_ELPHfile.\nThe chemical potential is determined for the list of temperaturesELPH_SELFEN_TEMPSand carrier concentrations specified byELPH_SELFEN_CARRIER_DENorELPH_SELFEN_CARRIER_PER_CELL. Alternatively, one can specify the chemical potential and determine the carrier concentration usingELPH_SELFEN_MU.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_ISMEAR", "description_cn": "ELPH_ISMEAR 参数用于选择展宽方法，以确定电子-声子计算前的费米能级和化学势。可选值包括 -15、-14、-5、-4、-1、0 或大于0的整数，默认值为 0。", "default_value": "0", "details_cn": "选择展宽方法，以确定电子-声子计算前的费米能级和化学势。ELPH_ISMEAR 与 ISMEAR 非常相似。区别在于 ELPH_ISMEAR 用于在电子-声子计算的背景下确定化学势。计算化学势所对应的 Kohn-Sham 态对应于通过 KPOINTS_ELPH 文件指定的 k 点网格。化学势是根据温度列表 ELPH_SELFE 确定的。", "recommended": "对于金属系统，推荐使用 -14（四面体方法），以提高准确性；对于绝缘体或半导体，推荐使用 -15（四面体方法）。默认值 0（高斯展宽）适用于一般情况或初步计算。使用场景：在电子-声子耦合计算前，用于准确确定费米能级和化学势，确保计算结果的可靠性。", "tips": "确保 KPOINTS_ELPH 文件正确设置，因为化学势计算基于该 k 点网格。温度列表 ELPH_SELFE 需要合理定义，以覆盖感兴趣的温度范围。与 ISMEAR 参数协调使用，避免参数冲突。对于复杂系统，建议测试不同展宽方法以验证收敛性。"}, "ELPH_KSPACING": {"name": "ELPH_KSPACING", "description": "ELPH_KSPACING= [real]Default:ELPH_KSPACING= 0.5", "default": "ELPH_KSPACING= [real]Default:ELPH_KSPACING= 0.5", "details": "Description: The tagELPH_KSPACINGdetermines thekpoint mesh if theKPOINTS_ELPHfile\nis not present.\nFor additional details of how thekpoint mesh is generated, see the documentation of theKSPACINGtag.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_KSPACING", "description_cn": "ELPH_KSPACING 参数用于指定电子-声子耦合计算中 k 点网格的间距，默认值为 0.5。", "default_value": "0.5", "details_cn": "标签 ELPH_KSPACING 在 KPOINTS_ELPH 文件不存在时确定 k 点网格。有关 k 点网格生成的更多细节，请参阅 KSPACING 标签的文档。", "recommended": "默认值 0.5 适用于一般计算；对于高精度计算，建议使用较小值如 0.2-0.3；对于快速估算，可使用较大值如 0.5-1.0。使用场景：在电子-声子耦合计算中，当未提供 KPOINTS_ELPH 文件时，通过此参数控制 k 点网格密度。", "tips": "1. 仅当 KPOINTS_ELPH 文件不存在时生效；2. 值越小，k 点网格越密，计算成本越高；3. 与 KSPACING 参数类似，但专门用于电子-声子耦合部分；4. 建议根据系统大小和计算资源调整值。"}, "ELPH_LR": {"name": "ELPH_LR", "description": "ELPH_LR= [integer]Default:ELPH_LR= 1", "default": "ELPH_LR= [integer]Default:ELPH_LR= 1", "details": "Description: Controls the treatment of the long-range part of the electron-phonon potential.\nThis tag controls the treatment of the long-range electrostatic contributions to the electron-phonon coupling arising in polar dielectric materials.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_LR", "description_cn": "控制电子-声子势的长程部分的处理。", "default_value": "1", "details_cn": "控制电子-声子势的长程部分的处理。此标签控制在极性介电材料中产生的电子-声子耦合的长程静电贡献的处理。", "recommended": "推荐值为1（默认），适用于极性介电材料（如离子晶体或极性半导体）中的电子-声子耦合计算，以确保长程静电贡献被正确处理。对于非极性材料或不需要长程校正的情况，可考虑设置为0以简化计算。", "tips": "此参数主要影响极性材料的计算精度。使用时，建议结合其他电子-声子相关参数（如ELPH_TR）进行测试，并参考VASP官方文档以优化设置。"}, "ELPH_MODE": {"name": "ELPH_MODE", "description": "Description: Meta tag that selects reasonable defaults for electron-phonon calculations", "default": "Description: Meta tag that selects reasonable defaults for electron-phonon calculations", "details": "Description: Meta tag that selects reasonable defaults for electron-phonon calculations\nThe requiredINCARsettings for electron-phonon calculations depend on the type of calculation.\nFor example, computing therenormalization of the electronic band structurerequires a different set of options than computingtransport properties.\nTheELPH_MODEtag can help you get started with electron-phono\nThe individual tags that are set byELPH_MODEcan still be overwritten by specifying them explicitly in theINCARfile.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_MODE", "description_cn": "一个元标签，用于为电子-声子计算选择合理的默认设置。", "default_value": "无固定默认值", "details_cn": "电子-声子计算所需的INCAR设置取决于计算类型。例如，计算电子能带结构的重整化需要与计算输运性质不同的选项集。ELPH_MODE标签可以帮助您开始电子-声子计算。由ELPH_MODE设置的各个标签仍然可以通过在INCAR文件中显式指定来覆盖。", "recommended": "推荐值取决于具体计算类型：例如，计算电子能带结构重整化时，建议使用ELPH_MODE=1；计算输运性质时，建议使用ELPH_MODE=2。具体值请参考VASP官方文档或相关教程，以确保设置正确。", "tips": "ELPH_MODE设置的默认标签可以在INCAR文件中被显式指定的参数覆盖，因此用户可以根据需要自定义设置，但需确保参数一致性以避免错误。"}, "ELPH_NBANDS": {"name": "ELPH_NBANDS", "description": "ELPH_NBANDS= [integer]Default:ELPH_NBANDS=NBANDS", "default": "ELPH_NBANDS= [integer]Default:ELPH_NBANDS=NBANDS", "details": "Description: Number of bands to compute on the densekpoint grid for the electron-phonon driver\nFortransport calculations, this value should be as little as possible while including all the states potentially participating in the transport calculation.\nIfELPH_NBANDS=-2 then the number of bands is set to the maximum number of plane waves. This setting is particularly useful for calculating thebandgap renormalization.\nIn this case, the final result converges slowly with the number of bands in the calculation, similar toRPA, andBSEcalculations.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_NBANDS", "description_cn": "ELPH_NBANDS是一个整数参数，用于指定电子-声子计算中在密集k点网格上计算的能带数。默认值为NBANDS。", "default_value": "NBANDS", "details_cn": "用于电子-声子驱动器在密集k点网格上计算的能带数。对于输运计算，这个值应尽可能小，同时包括所有可能参与输运计算的状态。如果ELPH_NBANDS=-2，则能带数设置为最大平面波数。此设置特别适用于计算带隙重归一化。在这种情况下，最终结果随能带数收敛缓慢。", "recommended": "对于输运计算，推荐设置尽可能小的值以包括所有相关状态；对于带隙重归一化计算，推荐设置ELPH_NBANDS=-2。一般计算可使用默认值NBANDS。", "tips": "当设置ELPH_NBANDS=-2时，计算结果可能收敛较慢，需确保能带数足够以覆盖所有相关状态。"}, "ELPH_NBANDS_SUM": {"name": "ELPH_NBANDS_SUM", "description": "Description: Number of intermediate states to include in the computation of the phonon-induced electron self-energy.", "default": "ELPH_NBANDS_SUM= [integer array]Default:ELPH_NBANDS_SUM=ELPH_NBANDS", "details": "ELPH_NBANDS_SUM= [integer array]Default:ELPH_NBANDS_SUM=ELPH_NBANDS\nThe computation of the self-energy is achieved via a sum over intermediate states[math]\\displaystyle{ |\\Psi_{m \\mathbf{k} + \\mathbf{q}}\\rangle }[/math].ELPH_NBANDS_SUMspecifies the maximum number of bands,[math]\\displaystyle{ N_{\\text{b}} }[/math], such that[math]\\displaystyle{ m }[/math]runs from[math]\\displaystyle{ 1 \\ldots N_{\\text{b}} }[/math].\nMultiple values can be specified forELPH_NBANDS_SUM, in which case the self-energy is computed once for each value.\nThe results are reported in separate groups inside thevaspout.h5file:\nThis tag is useful for studying the convergence of the self-energy with respect to the number of intermediate states.\nAt a certain point, including more bands in the summation over states should no longer change the result.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_NBANDS_SUM", "description_cn": "INCAR 参数 ELPH_NBANDS_SUM", "default_value": "请查阅 Wiki", "recommended": "请参考 VASP Wiki", "tips": "建议做收敛性测试"}, "ELPH_POT_FFT_MESH": {"name": "ELPH_POT_FFT_MESH", "description": "ELPH_POT_FFT_MESH= [real real real]", "default": "", "details": "Description: Specifies the FFT mesh for mapping the electron-phonon potential to the primitive cell.\nOnce the electron-phonon potentialhas been computed in the supercell, it needs to be mapped to the primitive cell.\nBy default, VASP chooses the primitive-cell FFT mesh to be consistent with the currentENCUT.\nHowever, sometimes it might be necessary to specify the FFT grid dimensions manually viaELPH\nThe chosen values must be the same as the desiredNGX,NGYandNGZof the electron-phonon calculation in the primitive cell.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_POT_FFT_MESH", "description_cn": "指定电子-声子势映射到原胞的FFT网格", "default_value": "自动选择，基于当前ENCUT", "details_cn": "指定用于将电子-声子势映射到原胞的FFT网格。一旦在超胞中计算了电子-声子势，就需要将其映射到原胞。默认情况下，VASP选择与当前ENCUT一致的原胞FFT网格。然而，有时可能需要通过ELPH手动指定FFT网格维度。选择的值必须与电子-声子计算中期望的NGX、NGY和NGZ相同。", "recommended": "通常设置为与电子-声子计算中使用的网格一致，例如基于k点网格或ENCUT自动选择，但若需更高精度，可手动调整为与NGX、NGY、NGZ匹配的值。使用场景：当默认网格不满足精度要求、或进行特定电子-声子计算（如超胞映射）时使用。", "tips": "确保设置的值与电子-声子计算中的NGX、NGY、NGZ完全匹配，以避免映射错误或计算失败。建议在手动设置前，先检查默认网格是否足够，并参考相关计算文档。"}, "ELPH_POT_GENERATE": {"name": "ELPH_POT_GENERATE", "description": "ELPH_POT_GENERATE= [logical]Default:ELPH_POT_GENERATE= False", "default": "ELPH_POT_GENERATE= [logical]Default:ELPH_POT_GENERATE= False", "details": "Description: Calculates the electron-phonon potential from finite atomic displacements.\nPerforming electron-phonon calculations usingmany-body perturbation theoryrequires as input aphelel_params.hdf5file.\nSettingELPH_POT_GENERATE= Trueprovides a way to generate thephelel_params.hdf5file directly in VASP bycomputing the electron-phonon potential.\nThis is accomplished by using finite ato\nWhenELPH_POT_GENERATE= True, VASP will additionally produce theCONTCAR_ELPHfile.\nThis file contains the primitive-cell crystal structure in thePOSCARformat and can directly be used as input for the subsequent electron-phonon calculation.\nThe primitive cell is automatically determined by VASP during ", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_POT_GENERATE", "description_cn": "ELPH_POT_GENERATE= [逻辑值] 默认值：ELPH_POT_GENERATE= False", "default_value": "False", "details_cn": "基于有限原子位移计算电子-声子势。使用多体微扰理论进行电子-声子计算需要输入一个phelel_params.hdf5文件。设置ELPH_POT_GENERATE= True提供了一种在VASP中直接生成phelel_params.hdf5文件的方法，通过计算电子-声子势。这是通过使用有限原子位移实现的。当ELPH_POT_GENERATE= True时，VASP还会生成CONTCAR_ELPH文件。该文件包含原始晶格信息或其他相关数据（基于上下文补充）。", "recommended": "False（默认）。使用场景：当需要进行电子-声子计算并生成phelel_params.hdf5文件时，例如在使用多体微扰理论研究电子-声子耦合时，设置为True。", "tips": "启用此参数会显著增加计算成本，因为需要计算电子-声子势；确保有足够的磁盘空间存储生成的phelel_params.hdf5和CONTCAR_ELPH文件；建议与其他电子-声子计算参数（如ELPH_MODE）配合使用，并参考VASP官方文档以获取完整指导。"}, "ELPH_POT_LATTICE": {"name": "ELPH_POT_LATTICE", "description": "ELPH_POT_LATTICE= [3x3 real]", "default": "", "details": "Description: Allows specifying an alternative primitive cell for the mapping of the electron-phonon potential.\nOnce the electron-phonon potentialhas been computed in the supercell, it needs to be mapped to the primitive cell.\nThis is done viaELPH_POT_GENERATE= True.\nBy default, VASP performs the mapping for the primitive cell that is found by the symmetry routines and that is reported in theOUTCARfile.\nIn ca\nELPH_POT_LATTICE= a1x a1y a1z a2x a2y a2z a3x a3y a3zspecifies the three primitive lattice vectors[math]\\displaystyle{ \\mathbf{a}_1 }[/math],[math]\\displaystyle{ \\mathbf{a}_2 }[/math]and[math]\\displaystyle{ \\mathbf{a}_3 }[/math]in Cartesian coordinates.\nThese lattice vectors are then used to constru", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_POT_LATTICE", "description_cn": "指定电子-声子势映射的替代原胞晶格矢量。", "default_value": "未指定（默认使用对称性例程找到的原胞）", "details_cn": "ELPH_POT_LATTICE= [3x3 实数] 允许指定一个替代原胞来映射电子-声子势。一旦电子-声子势在超胞中计算完成，它需要映射到原胞。这通过设置 ELPH_POT_GENERATE= True 来完成。默认情况下，VASP 执行映射到对称性例程找到的原胞，如 OUTCAR 文件中报告。在 ELPH_POT_LATTICE= a1x a1y a1z a2x a2y a2z a3x a3y a3z 中，指定了三个原胞晶格矢量。", "recommended": "推荐在需要自定义原胞映射时使用，例如当对称性例程找到的原胞不符合计算需求（如非标准原胞或特殊对称性）时。设置时，需提供正确的3x3晶格矢量矩阵，确保与超胞结构兼容。", "tips": "1. 确保指定的晶格矢量与超胞的晶格矢量线性相关，以避免映射错误。2. 必须同时设置 ELPH_POT_GENERATE= True 以启用映射过程。3. 建议先检查 OUTCAR 文件中的默认原胞信息，再决定是否自定义。"}, "ELPH_PREPARE": {"name": "ELPH_PREPARE", "description": "ELPH_PREPARE= [logical]Default:ELPH_PREPARE= .FALSE.", "default": "ELPH_PREPARE= [logical]Default:ELPH_PREPARE= .FALSE.", "details": "Description: Writes the potential, the force-constants and other information related to electron-phonon interactions to thevaspout.h5file.\nIn order to calculate electron-phonon interactions, one must firstperform finite-difference calculations in the supercelland generate thephelel_params.hdf5file.\nTo do this usingphelel, it is necessary to provide additional supercell information to phelel.\nThis is accomplished by settingELPH_PREPARE=", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_PREPARE", "description_cn": "ELPH_PREPARE是一个逻辑参数，用于控制是否准备电子-声子相互作用计算所需的数据。", "default_value": ".FALSE.", "details_cn": "将势、力常数和其他与电子-声子相互作用相关的信息写入vaspout.h5文件。为了计算电子-声子相互作用，必须先在超胞中进行有限差分计算并生成phelel_params.hdf5文件。使用phelel时，需要向phelel提供额外的超胞信息。这可以通过设置ELPH_PREPARE来完成。", "recommended": "当需要计算电子-声子相互作用时，设置为.TRUE.。使用场景：在进行电子-声子耦合计算前，使用此参数准备相关数据，例如研究材料中的声子散射或超导性质。", "tips": "在使用ELPH_PREPARE=.TRUE.之前，确保已通过有限差分计算生成phelel_params.hdf5文件。此外，可能需要与其他INCAR参数（如ELPH_MODE）配合使用，并检查VASP版本是否支持此功能。"}, "ELPH_RUN": {"name": "ELPH_RUN", "description": "ELPH_RUN= [logical]Default:ELPH_RUN= .false.", "default": "ELPH_RUN= [logical]Default:ELPH_RUN= .false.", "details": "Description: Select whether to run and electron-phonon calculation.\nThis flag determined whether an electron-phonon calculation should be performed.\nThe most fundamental quantity we compute are the electron-phonon matrix elements.\nThese can simply be written to file whenELPH_DRIVER= MELSfor further post-processing.\nAdditionally, one can directly use these matrix elements to compute the electron self-energy due to electron-phonon couplingELPH_DRIVER= EL.\nThe self-energy can in turn be used to compute therenormalization of the ", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_RUN", "description_cn": "选择是否运行电子-声子计算。", "default_value": ".false.", "details_cn": "选择是否运行电子-声子计算。此标志决定是否应执行电子-声子计算。我们计算的最基本量是电子-声子矩阵元。当 ELPH_DRIVER= MELS 时，这些矩阵元可以简单地写入文件以供进一步后处理。此外，可以直接使用这些矩阵元来计算由于电子-声子耦合引起的电子自能，当 ELPH_DRIVER= EL。自能反过来可以用于计算...", "recommended": "默认值为 .false.，适用于不需要电子-声子计算的常规计算。当需要研究电子-声子耦合、超导性、热电性质或相关物理现象时，设置为 .true.。", "tips": "1. 确保与 ELPH_DRIVER 参数正确配合使用，以指定计算类型（如 MELS 或 EL）。2. 电子-声子计算可能需要大量计算资源和时间，建议在高性能计算环境中运行。3. 生成的矩阵元文件可能占用较大存储空间，注意磁盘管理。"}, "ELPH_SCATTERING_APPROX": {"name": "ELPH_SCATTERING_APPROX", "description": "ELPH_SCATTERING_APPROX= [string]Default:ELPH_SCATTERING_APPROX=  SERTA MRTA_LAMBDA", "default": "ELPH_SCATTERING_APPROX= [string]Default:ELPH_SCATTERING_APPROX=  SERTA MRTA_LAMBDA", "details": "Description: Select which type of approximation is used to compute the electron scattering lifetimes due to electron-phonon coupling\nThere are different approximations to compute the electronic lifetimes due to electron-phonon scattering.\nEach of these can lead to significantly different transport coefficients.\nIt is possible to select more than one approximation inELPH_SCATTERING_APPROX.\nIn this case, additionalelectron-phonon a", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SCATTERING_APPROX", "description_cn": "选择用于计算由于电子-声子耦合导致的电子散射寿命的近似类型。", "default_value": "SERTA MRTA_LAMBDA", "details_cn": "选择用于计算由于电子-声子耦合导致的电子散射寿命的近似类型。有多种近似方法可以计算由于电子-声子散射导致的电子寿命。每种近似可能导致显著不同的输运系数。可以在ELPH_SCATTERING_APPROX中选择多个近似。在这种情况下，额外的电子-声子 a", "recommended": "默认值'SERTA MRTA_LAMBDA'适用于一般计算，同时使用SERTA和MRTA_LAMBDA近似。使用场景：对于电子-声子耦合输运性质计算，如电导率或热导率，建议根据体系特性和精度要求选择近似。SERTA近似计算成本较低，适合初步筛选；MRTA_LAMBDA可能更精确但计算量大，适合高精度研究。可以同时选择多个近似进行比较验证。", "tips": "选择多个近似会显著增加计算时间和资源消耗；不同近似可能给出不同的输运系数结果，需结合实验或理论基准进行验证；确保VASP版本支持该参数，并参考官方文档获取最新用法；在复杂体系中，建议先进行小规模测试以确定最佳近似。"}, "ELPH_SELFEN_BAND_START": {"name": "ELPH_SELFEN_BAND_START", "description": "ELPH_SELFEN_BAND_START= [real]Default:ELPH_SELFEN_BAND_START= 1", "default": "ELPH_SELFEN_BAND_START= [real]Default:ELPH_SELFEN_BAND_START= 1", "details": "Description: Compute the electron self-energy due to electron-phonon coupling only for bands with indices starting fromELPH_SELFEN_BAND_START.\nThis tag can be used in combination withELPH_SELFEN_KPTS,ELPH_SELFEN_IKPTorELPH_SELFEN_BAND_STOPto limit the calculation of the electron-phonon self-energy to a particular set ofk-points and bands.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_BAND_START", "description_cn": "设置电子-声子自能计算的起始能带索引。", "default_value": "1", "details_cn": "计算由于电子-声子耦合引起的电子自能，仅适用于能带索引从ELPH_SELFEN_BAND_START开始的能带。此标签可以与ELPH_SELFEN_KPTS、ELPH_SELFEN_IKPT或ELPH_SELFEN_BAND_STOP结合使用，以将电子-声子自能的计算限制在特定的k点和能带集合。", "recommended": "默认值为1，适用于从第一个能带开始计算。如果需要计算特定能带范围，可设置相应值以提高计算效率。例如，在分析高能带电子-声子耦合时，可设置起始索引为感兴趣的能带。", "tips": "参数值应为正整数，且不超过系统总能带数。建议与ELPH_SELFEN_BAND_STOP配合使用以定义完整的能带范围。在设置前，应了解计算系统的能带结构。"}, "ELPH_SELFEN_BAND_STOP": {"name": "ELPH_SELFEN_BAND_STOP", "description": "ELPH_SELFEN_BAND_STOP= [real]Default:ELPH_SELFEN_BAND_STOP=ELPH_NBANDS", "default": "ELPH_SELFEN_BAND_STOP= [real]Default:ELPH_SELFEN_BAND_STOP=ELPH_NBANDS", "details": "Description: Compute the electron self-energy due to electron-phonon coupling only for bands with indices untilELPH_SELFEN_BAND_STOP.\nThis tag can be used in combination withELPH_SELFEN_KPTS,ELPH_SELFEN_IKPTorELPH_SELFEN_BAND_STARTto limit the calculation of the electron-phonon self-energy to a particular set ofk-points and bands.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_BAND_STOP", "description_cn": "设置计算电子-声子自能时能带的上限索引。", "default_value": "ELPH_NBANDS", "details_cn": "计算由于电子-声子耦合引起的电子自能，仅适用于索引直到ELPH_SELFEN_BAND_STOP的能带。此标签可以与ELPH_SELFEN_KPTS、ELPH_SELFEN_IKPT或ELPH_SELFEN_BAND_START结合使用，以将电子-声子自能的计算限制在特定的k点和能带集合中。", "recommended": "默认值ELPH_NBANDS适用于计算所有能带的自能。若需限制计算范围以节省计算资源，可根据体系设置为特定能带索引上限，例如对于半导体，可设置为价带顶和导带底附近的能带索引。使用场景：在电子-声子耦合计算中，当只需关注特定能带时使用。", "tips": "设置的值应小于或等于总能带数ELPH_NBANDS；建议与ELPH_SELFEN_BAND_START结合使用以定义完整的能带范围；过小的值可能遗漏重要能带，影响计算结果。"}, "ELPH_SELFEN_BROAD_TOL": {"name": "ELPH_SELFEN_BROAD_TOL", "description": "ELPH_SELFEN_BROAD_TOL= [real]Default:ELPH_SELFEN_BROAD_TOL= 1e-6", "default": "ELPH_SELFEN_BROAD_TOL= [real]Default:ELPH_SELFEN_BROAD_TOL= 1e-6", "details": "Description: defines the fraction of the total weight of the broadening function (derived from the imaginary part of the electron self-energy) that is excluded when setting the energy window beyond which the delta function is considered zero.  \nMust be between 0 and 1. This tag is only used whenELPH\nWhen evaluating delta-like quantities from the imaginary part of the electron self-energy, a finite broadening function[math]\\displaystyle{ f(\\epsilon) }[/math]is used.ELPH_SELFEN_BROAD_TOLdetermines what fraction of the integral of this function is retained inside the energy window[math]\\displaysty\nFor a Lorentzian broadening of the form", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_BROAD_TOL", "description_cn": "电子自能展宽容差参数", "default_value": "1e-6", "details_cn": "定义当设置能量窗口时，从展宽函数（源自电子自能的虚部）的总权重中排除的分数，超过该窗口的δ函数被视为零。必须介于0和1之间。此标签仅在ELPH（电子-声子耦合）计算中使用。当从电子自能的虚部评估δ-like量时，使用有限展宽函数f(ε)。ELPH_SELFEN_BROAD_TOL决定展宽函数的截断阈值。", "recommended": "推荐使用默认值1e-6以获得高精度计算。对于大型体系或计算资源有限时，可适当增大至1e-5以加速计算。使用场景：在VASP的电子-声子耦合计算中，用于优化自能计算的精度和效率。", "tips": "1. 参数值必须严格介于0和1之间。2. 仅在ELPH计算中使用，否则设置无效。3. 值过小会增加计算时间，值过大可能降低计算精度。建议根据具体计算需求和体系大小进行调整。"}, "ELPH_SELFEN_CARRIER_DEN": {"name": "ELPH_SELFEN_CARRIER_DEN", "description": "ELPH_SELFEN_CARRIER_DEN= [real array]Default:ELPH_SELFEN_CARRIER_DEN= 0.0", "default": "ELPH_SELFEN_CARRIER_DEN= [real array]Default:ELPH_SELFEN_CARRIER_DEN= 0.0", "details": "Description: List of additional carrier densities in units of[math]\\displaystyle{ cm^{-3} }[/math]at which to compute the phonon-mediated electron self-energy and transport coefficients.\nFrom each carrier density specified in the array, a positive (electron doping) or negative (hole doping) number of electrons is added to the value ofNELECTand the chemical potential computed for the list of temperatures specified byELPH_SELFEN_TEMPS.\nFor example, ifELPH_SELFEN_CARRIER_DEN= 1e+16 1e+17 1e+18theChemical potentialsection in theOUTCARfile might show something like", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_CARRIER_DEN", "description_cn": "ELPH_SELFEN_CARRIER_DEN 是一个实数数组，用于指定额外载流子密度，默认值为0.0。", "default_value": "0.0", "details_cn": "ELPH_SELFEN_CARRIER_DEN 是一个以 cm^{-3} 为单位的额外载流子密度列表，用于计算声子介导的电子自能和输运系数。从数组中指定的每个载流子密度，一个正数（电子掺杂）或负数（空穴掺杂）的电子数被添加到 NELECT 的值中，并计算由 ELPH_SELFEN_TEMPS 指定的温度列表下的化学势。例如，如果 ELPH_SELFEN_CARRIER_DEN= 1e+16 1e+17 1e+18，则...", "recommended": "根据研究需求设置，例如在掺杂半导体或金属材料中，可设置为 1e+16 到 1e+20 cm^{-3} 之间的值。使用场景：用于计算声子介导的电子自能和输运系数，特别是在研究掺杂效应对电子结构和输运性质的影响时。", "tips": "确保载流子密度单位正确为 cm^{-3}；需与 ELPH_SELFEN_TEMPS 参数配合使用以指定温度列表；正数表示电子掺杂，负数表示空穴掺杂；默认值0.0表示不添加额外载流子，仅计算本征情况。"}, "ELPH_SELFEN_CARRIER_DEN_RANGE": {"name": "ELPH_SELFEN_CARRIER_DEN_RANGE", "description": "ELPH_SELFEN_CARRIER_DEN_RANGE= [real array]", "default": "", "details": "Description: List of carrier density ranges in logarithmic scale (in[math]\\displaystyle{ cm^{-3} }[/math]) at which to compute the phonon-mediated electron self-energy and transport coefficients.\nFrom each carrier density specified in the array, a positive (electron doping) or negative (hole doping) number of electrons is added to the value ofNELECTand the chemical potential computed. A range of carrier densities can be defined usingELPH_SELFEN_CARRIER_DEN_RANGE= l u n, where:\nThe range of carrier densities is used to generate a log-scale mesh of carrier densities.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_CARRIER_DEN_RANGE", "description_cn": "ELPH_SELFEN_CARRIER_DEN_RANGE 是一个实数数组，用于指定在对数尺度（单位：cm^{-3}）下载流子密度的范围，以计算声子介导的电子自能和输运系数。", "default_value": "无", "details_cn": "以对数尺度（单位：cm^{-3}）列出载流子密度范围，用于计算声子介导的电子自能和输运系数。从数组中指定的每个载流子密度，会向NELECT的值添加正数（电子掺杂）或负数（空穴掺杂）的电子数，并计算化学势。可以使用ELPH_SELFEN_CARRIER_DEN_RANGE= l u n来定义载流子密度范围，其中：l是下限，u是上限，n是点数。", "recommended": "推荐值取决于具体计算体系。例如，对于半导体材料，载流子密度范围可设为1e15到1e20 cm^{-3}。使用场景：当研究掺杂对电子-声子相互作用和输运性质的影响时，需设置此参数。", "tips": "1. 确保载流子密度范围合理，避免数值不稳定；2. 使用对数尺度时，单位必须为cm^{-3}；3. 此参数与NELECT相关，需正确设置初始电子数；4. 对于金属体系，可能不需要此参数。"}, "ELPH_SELFEN_CARRIER_PER_CELL": {"name": "ELPH_SELFEN_CARRIER_PER_CELL", "description": "ELPH_SELFEN_CARRIER_PER_CELL= [real array]Default:ELPH_SELFEN_CARRIER_PER_CELL= 0.0", "default": "ELPH_SELFEN_CARRIER_PER_CELL= [real array]Default:ELPH_SELFEN_CARRIER_PER_CELL= 0.0", "details": "Description: List of additional number of carriers for which to compute the phonon-mediated electron self-energy and transport coefficients.\nEach number of carriers specified in the array is added to the value ofNELECTand the chemical potential computed for the list of temperatures specified byELPH_SELFEN_TEMPS.\nA positive number adds electrons (electron doping), while a negative one removes (hole doping).\nFor example,ELPH_SELFEN_CARRIER_PER_CELL= 0.001 0.01 0.1means that the number of electrons per cellNELECT= 18will be increased by the specified values which will produce the following table in theChemical potential calculationsection in theOUTCARfile", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_CARRIER_PER_CELL", "description_cn": "ELPH_SELFEN_CARRIER_PER_CELL 是一个实数数组，默认值为0.0。", "default_value": "0.0", "details_cn": "用于计算声子介导的电子自能和输运系数的额外载流子数量列表。数组中指定的每个载流子数量都会添加到NELECT的值中，并根据ELPH_SELFEN_TEMPS指定的温度列表计算化学势。正数表示添加电子（电子掺杂），负数表示移除电子（空穴掺杂）。例如，ELPH_SELFEN_CARRIER_PER_CELL= 0.001 0.01 0.1 表示将额外添加0.001、0.01和0.1个电子（每原胞）到NELECT中。", "recommended": "默认值0.0适用于无额外掺杂的情况。如果需要研究掺杂效应，可以设置如0.001、0.01等值，具体取决于材料和掺杂水平。使用场景：用于计算掺杂材料的电子自能和输运系数，特别是在研究载流子浓度对电子性质的影响时。", "tips": "1. 确保与ELPH_SELFEN_TEMPS参数配合使用，以指定温度列表。2. 正数表示电子掺杂，负数表示空穴掺杂。3. 参数为实数数组，可以指定多个值进行批量计算。4. 默认值0.0表示不进行额外掺杂计算。"}, "ELPH_SELFEN_DELTA": {"name": "ELPH_SELFEN_DELTA", "description": "ELPH_SELFEN_DELTA= [real array]Default:ELPH_SELFEN_DELTA=  0.01", "default": "ELPH_SELFEN_DELTA= [real array]Default:ELPH_SELFEN_DELTA=  0.01", "details": "Description: Complex imaginary shift to use when computing the self-energy due to electron-phonon coupling.\nIf the value is set to 0.0 then the tetrahedron method is used to perform the Brillouin zone integrals and evaluate only the imaginary part of the electron self-energy. This is the recommended option fortransport calculations.\nForbandgap renormalizationsince one is mainly interested in the real part of the self-energy due to electron-phonon coupling, a small finite value should be used and a densekpoint mesh used.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_DELTA", "description_cn": "ELPH_SELFEN_DELTA 参数，类型为实数数组，默认值为 0.01。", "default_value": "0.01", "details_cn": "在计算由于电子-声子耦合引起的自能时使用的复数虚部偏移。如果值设置为0.0，则使用四面体方法执行布里渊区积分，并仅评估电子自能的虚部。这是输运计算的推荐选项。对于带隙重整化，由于主要关注电子-声子耦合引起的自能的实部，应使用一个小的有限值，并", "recommended": "对于输运计算，推荐设置为0.0；对于带隙重整化，推荐使用小的有限值，如默认值0.01。", "tips": "当设置为0.0时，使用四面体方法，仅计算自能的虚部；对于带隙重整化，需要实部，因此使用非零值。参数为实数数组，需根据计算需求设置。"}, "ELPH_SELFEN_DW": {"name": "ELPH_SELFEN_DW", "description": "ELPH_SELFEN_DW= [logical]Default:ELPH_SELFEN_DW= .FALSE.", "default": "ELPH_SELFEN_DW= [logical]Default:ELPH_SELFEN_DW= .FALSE.", "details": "Description: Controls whether the Debye-Waller contribution is included in the calculation of the phonon-induced electron self-energy.\nThe phonon-induced electron self-energy has two contributions at second order in perturbation theory, the Fan-Migdal self-energy and the real-valued Debye-Waller self-energy.ELPH_SELFEN_DWcontrols the computation of the latter, while the former can be computed viaELPH_SELFEN_FAN.\nThe result is reported individually for each self-energy accumulator in thevaspout.h5file as", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_DW", "description_cn": "控制是否在声子诱导电子自能计算中包含Debye-Waller贡献的逻辑参数。", "default_value": ".FALSE.", "details_cn": "控制是否在声子诱导电子自能计算中包含Debye-Waller贡献。声子诱导电子自能在二阶微扰理论中有两个贡献：Fan-Migdal自能和实值Debye-Waller自能。ELPH_SELFEN_DW控制后者的计算，而前者可以通过ELPH_SELFEN_FAN计算。结果在vaspout.h中为每个自能累加器单独报告。", "recommended": "默认值为.FALSE.，通常不启用。当需要考虑Debye-Waller效应对电子自能的影响时，建议设置为.TRUE.，例如在精确计算电子-声子耦合、能带重整化或相关输运性质时。使用时需确保与ELPH_SELFEN_FAN参数配合，以计算完整的自能贡献。", "tips": "启用此参数会增加计算成本，因为需要额外计算Debye-Waller项。建议在需要高精度结果时使用，并检查vaspout.h中的输出以验证结果。确保其他相关参数（如ELPH_SELFEN_FAN）正确设置，以避免遗漏贡献。"}, "ELPH_SELFEN_ENERGY_WINDOW": {"name": "ELPH_SELFEN_ENERGY_WINDOW", "description": "ELPH_SELFEN_ENERGY_WINDOW= [real, real]Default:ELPH_SELFEN_ENERGY_WINDOW=  0.0 0.0", "default": "ELPH_SELFEN_ENERGY_WINDOW= [real, real]Default:ELPH_SELFEN_ENERGY_WINDOW=  0.0 0.0", "details": "Description:  \nSpecifies the energy window (in eV) around the band edges within which the electron-phonon self-energy is computed.\nThe self-energy is evaluated for electronic states with energies in the intervals around the valence band minimum (VBM) and the conduction band minimum (CDM), with an energy window defined withELPH_SELFEN_ENERGY_WINDOW=ab:", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_ENERGY_WINDOW", "description_cn": "指定围绕带边的能量窗口（以eV为单位），在此范围内计算电子-声子自能。", "default_value": "0.0 0.0", "details_cn": "指定围绕带边的能量窗口（以eV为单位），在此范围内计算电子-声子自能。自能是针对能量在价带最小值（VBM）和导带最小值（CDM）附近的电子态评估的，能量窗口由ELPH_SELFEN_ENERGY_WINDOW= a b定义。", "recommended": "推荐根据计算体系调整，例如对于半导体或绝缘体，可设置为[-0.5, 0.5] eV，以覆盖带边附近的态。使用场景：在计算电子-声子自能时，用于研究带边附近的电子-声子耦合效应，如极化子或载流子迁移率计算。", "tips": "确保能量窗口覆盖感兴趣的电子态，避免过大窗口增加计算成本；单位是eV；默认值0.0 0.0可能表示不计算，需手动设置；建议结合体系能带结构进行测试。"}, "ELPH_SELFEN_FAN": {"name": "ELPH_SELFEN_FAN", "description": "ELPH_SELFEN_FAN= [logical]Default:ELPH_SELFEN_FAN= .FALSE.", "default": "ELPH_SELFEN_FAN= [logical]Default:ELPH_SELFEN_FAN= .FALSE.", "details": "Description: Controls whether the Fan-Migdal contribution is included in the calculation of the phonon-induced electron self-energy.\nThe phonon-induced electron self-energy has two contributions at second order in perturbation theory, the Fan-Migdal self-energy and the real-valued Debye-Waller self-energy.ELPH_SELFEN_FANcontrols the computation of the former, while the latter can be computed viaELPH_SELFEN_DW.\nThe result is reported individually for each self-energy accumulator in thevaspout.h5file as", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_FAN", "description_cn": "控制是否在计算声子诱导电子自能时包含Fan-Migdal贡献。", "default_value": ".FALSE.", "details_cn": "控制是否在计算声子诱导电子自能时包含Fan-Migdal贡献。声子诱导电子自能在微扰理论的二阶有两个贡献：Fan-Migdal自能和实值的Debye-Waller自能。ELPH_SELFEN_FAN控制前者的计算，而后者可以通过ELPH_SELFEN_DW计算。结果在vaspout.h5f文件中为每个自能累加器单独报告。", "recommended": "默认为.FALSE.，如果需要计算Fan-Migdal自能，设置为.TRUE.。使用场景：在研究声子-电子相互作用、电子自能计算时启用，以包含完整的声子诱导效应。", "tips": "确保ELPH_SELFEN_DW参数正确设置以计算Debye-Waller自能；结果在vaspout.h5f文件中报告，需检查输出文件；启用此参数可能增加计算时间和资源消耗。"}, "ELPH_SELFEN_GAPS": {"name": "ELPH_SELFEN_GAPS", "description": "ELPH_SELFEN_GAPS= [logical]Default:ELPH_SELFEN_GAPS= .FALSE.", "default": "ELPH_SELFEN_GAPS= [logical]Default:ELPH_SELFEN_GAPS= .FALSE.", "details": "Description: Find the direct and indirect gaps and the valence and conduction Kohn-Sham states that form it and select to compute their self-energy due to electron-phonon coupling.\nThis tag additionally activates the reporting of the value of the band-gap renormalization to the standard output, theOUTCARfile\nand thevaspout.h5file under", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_GAPS", "description_cn": "ELPH_SELFEN_GAPS参数用于控制是否计算电子-声子耦合的自能。", "default_value": ".FALSE.", "details_cn": "找到直接和间接带隙以及形成它的价带和导带Kohn-Sham态，并选择计算由于电子-声子耦合的自能。此标签还激活将带隙重整化值报告到标准输出、OUTCAR文件和vaspout.h5文件中。", "recommended": "在需要研究电子-声子耦合对带隙影响时设置为.TRUE.。使用场景：用于计算带隙重整化、电子-声子自能等高级性质，例如在半导体或绝缘体材料中分析温度依赖的带隙变化。", "tips": "启用此参数会显著增加计算成本，建议在收敛测试后使用。确保相关ELPH参数（如ELPH_MODE）已正确设置，并检查输出文件（如OUTCAR和vaspout.h5）以获取带隙重整化值。默认值为.FALSE.，通常仅在高精度研究中启用。"}, "ELPH_SELFEN_G_SKIP": {"name": "ELPH_SELFEN_G_SKIP", "description": "ELPH_SELFEN_G_SKIP= [logical]Default:ELPH_SELFEN_G_SKIP=  .FALSE.", "default": "ELPH_SELFEN_G_SKIP= [logical]Default:ELPH_SELFEN_G_SKIP=  .FALSE.", "details": "Description:  \nSkip the computation of the electron-phonon matrix elements and instead assume their numerical value is 1.\nThis option is intended for debugging purposes, as it allows testing the self-energy and transport routines without performing the full evaluation of the coupling matrix elements.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_G_SKIP", "description_cn": "ELPH_SELFEN_G_SKIP 是一个逻辑参数，默认值为 .FALSE.。", "default_value": ".FALSE.", "details_cn": "跳过电子-声子矩阵元的计算，而是假设其数值为 1。此选项用于调试目的，因为它允许在不完整评估耦合矩阵元的情况下测试自能和传输例程。", "recommended": "默认值 .FALSE.。使用场景：在调试电子-声子耦合计算时，可设置为 .TRUE. 以跳过矩阵元计算，快速测试自能和传输功能，但仅限于调试阶段。", "tips": "此参数仅用于调试，不应用于生产计算。设置为 .TRUE. 会假设矩阵元为 1，可能导致结果不准确。使用前请确保理解其对计算的影响，并在调试完成后恢复为默认值。"}, "ELPH_SELFEN_IKPT": {"name": "ELPH_SELFEN_IKPT", "description": "ELPH_SELFEN_IKPT= [real array]Default:ELPH_SELFEN_IKPT= All k-points", "default": "ELPH_SELFEN_IKPT= [real array]Default:ELPH_SELFEN_IKPT= All k-points", "details": "Description: Compute the electron self-energy due to electron-phonon for a list of k-points specified by their index in the irreducible Brillouin zone generated fromKPOINTS_ELPH.\nFor example, to select to compute for 4 differentkpoints we specify their index in theINCARfile\nThis tag can be used in combination withELPH_SELFEN_BAND_STARTandELPH_SELFEN_BAND_STOPto select the calculation of the electron-phonon self-energy for a particular set ofkpoints and bands.\nInstead of specifying the indexes of thekpoints in the irreducible Brillouin zone, one can specify their reduce", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_IKPT", "description_cn": "ELPH_SELFEN_IKPT参数用于指定在不可约布里渊区中k点的索引，以计算电子-声子自能。", "default_value": "所有k点", "details_cn": "计算由于电子-声子相互作用导致的电子自能，针对由KPOINTS_ELPH生成的不可约布里渊区中指定索引的k点列表。例如，要选择计算4个不同的k点，我们在INCAR文件中指定它们的索引。此标签可以与ELPH_SELFEN_BAND_START和ELPH_SELFEN_BAND_STOP结合使用，以选择特定k点和能带的电子-声子自能计算。而不是指定索引的", "recommended": "根据计算需求指定k点索引数组，例如[1, 2, 3, 4]。使用场景：当需要计算特定k点（如高对称点或费米面附近的k点）的电子-声子自能时，以提高计算效率或聚焦于特定物理效应。默认值计算所有k点，适用于全面分析。", "tips": "确保KPOINTS_ELPH文件已正确生成并包含所需k点。索引应基于不可约布里渊区中的顺序。建议与ELPH_SELFEN_BAND_START和ELPH_SELFEN_BAND_STOP参数配合使用，以指定能带范围，避免不必要的计算。"}, "ELPH_SELFEN_IMAG_SKIP": {"name": "ELPH_SELFEN_IMAG_SKIP", "description": "ELPH_SELFEN_IMAG_SKIP= [logical]Default:ELPH_SELFEN_IMAG_SKIP=  .FALSE.", "default": "ELPH_SELFEN_IMAG_SKIP= [logical]Default:ELPH_SELFEN_IMAG_SKIP=  .FALSE.", "details": "Description:  \nUse the tetrahedron method to skip the computation of electron-phonon matrix elements for which the energy-conserving delta functions are zero.\nIt is strongly recommended to enable this option when only the imaginary part of the electron self-energy (linewidths) are required, for instance in transport or scattering rate calculations.  \nUsing this tag can reduce the computational cost by orders of magnitude, depending on the electronic band \nWhen using this option, it is also recommended to setELPH_WF_REDISTRIBUTE= .TRUE.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_IMAG_SKIP", "description_cn": "ELPH_SELFEN_IMAG_SKIP 是一个逻辑参数，用于控制是否跳过某些电子-声子矩阵元素的计算。", "default_value": ".FALSE.", "details_cn": "使用四面体方法跳过计算那些能量守恒δ函数为零的电子-声子矩阵元素。当只需要电子自能的虚部（线宽）时，强烈推荐启用此选项，例如在输运或散射率计算中。使用此标签可以将计算成本降低数个数量级，具体取决于电子能带。", "recommended": "推荐值为 .TRUE.，使用场景：当计算仅需要电子自能的虚部时，如输运性质或散射率计算。", "tips": "确保在需要电子自能实部时不要启用此选项；使用时可能需要调整其他相关参数以确保计算准确性。"}, "ELPH_SELFEN_KPTS": {"name": "ELPH_SELFEN_KPTS", "description": "ELPH_SELFEN_KPTS= [real array]Default:ELPH_SELFEN_KPTS= All k-points", "default": "ELPH_SELFEN_KPTS= [real array]Default:ELPH_SELFEN_KPTS= All k-points", "details": "Description: Computes the electron self-energy due to electron-phonon for a list of k-points specified by their fractional coordinates.\nFor example, to select 4 differentk-points we specify their coordinates in theINCARfile\nThe matching of the user input coordinates with the ones generated from theKPOINTS_ELPHfile in VASP is done by looking at the closest point in the full Brillouin zone, which is then mapped to the point in the irreducible Brillouin zone.\nThe user should always check whether the matching found and rep", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_KPTS", "description_cn": "计算由电子-声子相互作用引起的电子自能，针对由分数坐标指定的k点列表。", "default_value": "所有k点", "details_cn": "计算由电子-声子相互作用引起的电子自能，针对由分数坐标指定的k点列表。例如，要选择4个不同的k点，我们在INCAR文件中指定它们的坐标。用户输入的坐标与VASP中从KPOINTS_ELPH文件生成的坐标的匹配是通过在完整布里渊区中查找最近点来完成的，然后映射到不可约布里渊区中的点。用户应始终检查指定的k点是否正确匹配。", "recommended": "默认值为所有k点，适用于全面计算电子-声子自能，无需额外设置。如果只关注特定k点（如高对称点或费米面附近的点），可以指定这些k点的分数坐标以节省计算资源，适用于研究电子-声子耦合对特定能带或k点的影响。", "tips": "确保指定的k点坐标使用分数坐标格式，并与KPOINTS_ELPH文件中的k点网格匹配；检查VASP输出以确认k点匹配正确，避免计算错误或遗漏关键点。"}, "ELPH_SELFEN_MU": {"name": "ELPH_SELFEN_MU", "description": "ELPH_SELFEN_MU= [real array]Default:ELPH_SELFEN_MU= 0.0", "default": "ELPH_SELFEN_MU= [real array]Default:ELPH_SELFEN_MU= 0.0", "details": "Description: List of chemical potentials at which to compute the phonon-mediated electron self-energy and transport coefficients.\nEach chemical potential specified in the list will be added to the Fermi energy determined for thekpoint gridKPOINTS_ELPH.\nThis Fermi energy might be different from the one determined in the self-consistent calculation if thekpoint meshes orELPH_ISMEARis different fromISMEAR.\nThe Fermi energy from t\nIn this example,ELPH_SELFEN_MU= 0.1means that the chemical potential will be set to (3.5314189274 + 0.1) eV.\nThis can be verifiedChemical potential calculationsection of theOUTCARfile.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_MU", "description_cn": "ELPH_SELFEN_MU= [实数数组] 默认值：ELPH_SELFEN_MU= 0.0", "default_value": "0.0", "details_cn": "计算声子介导的电子自能和传输系数的化学势列表。列表中指定的每个化学势将被添加到为k点网格KPOINTS_ELPH确定的费米能。如果k点网格或ELPH_ISMEAR与ISMEAR不同，这个费米能可能与自洽计算中确定的费米能不同。费米能从t 在这个例子中，ELPH_SELFEN_MU= 0.1 意味着化学势", "recommended": "默认值0.0适用于未掺杂体系；对于掺杂研究，建议根据物理模型设置一系列值，例如ELPH_SELFEN_MU= -0.1 0.0 0.1（单位：eV），以覆盖感兴趣的费米能级范围。使用场景：用于计算电子-声子相互作用导致的自能修正和传输系数，适用于研究载流子迁移率、超导转变温度等电子-声子耦合相关性质。", "tips": "1. 确保KPOINTS_ELPH和ELPH_ISMEAR参数与自洽计算一致，以避免费米能不匹配；2. 化学势值以eV为单位，是相对于KPOINTS_ELPH确定的费米能添加的，需基于实际掺杂浓度或费米能级移动合理设置；3. 如果k点网格或展宽参数不同，费米能可能偏移，需检查计算一致性。"}, "ELPH_SELFEN_MU_RANGE": {"name": "ELPH_SELFEN_MU_RANGE", "description": "ELPH_SELFEN_MU_RANGE= [real array]", "default": "", "details": "Description: List of the range of chemical potentials (in eV) at which to compute the phonon-mediated electron self-energy and transport coefficients.\nA set of different chemical potentials can be set usingELPH_SELFEN_MU_RANGEas a shift with respect to the Fermi level[math]\\displaystyle{ E_F }[/math]as an alternative toELPH_SELFEN_MU. \nA range of chemical potentials can be defined usingELPH_SELFEN_MU_RANGE= l u n, where:\nFor example,ELPH_SELFEN_MU_RANGE= -1.0 1.0 101would create a list of101points around the Fermi level between[math]\\displaystyle{ E_F - 1.0 }[/math]and[math]\\displaystyle{ E_F + 1.0 }[/math].", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_MU_RANGE", "description_cn": "用于计算声子介导的电子自能和输运系数的化学势范围列表（单位：eV）。", "default_value": "未指定", "details_cn": "用于计算声子介导的电子自能和输运系数的化学势范围列表（单位：eV）。可以使用 ELPH_SELFEN_MU_RANGE 作为相对于费米能级 E_F 的偏移来设置一组不同的化学势，作为 ELPH_SELFEN_MU 的替代方案。可以使用 ELPH_SELFEN_MU_RANGE= l u n 定义化学势范围，其中：例如，ELPH_SELFEN_MU_RANGE= -1.0 1.0 101 将创建一个包含 101 个点的列表。", "recommended": "根据研究材料的费米能级位置，设置化学势范围如 -1.0 到 1.0 eV，点数设为 101 以获得平滑曲线。使用场景：当需要计算不同化学势下的声子介导电子自能和输运系数时使用，例如研究电子-声子耦合对电导率的影响。", "tips": "1. 化学势单位是 eV；2. 范围应覆盖感兴趣的费米能级区域；3. 点数 n 越大，计算越精确但耗时越长；4. 此参数与 ELPH_SELFEN_MU 互斥，选择其一使用；5. 确保 VASP 版本支持此参数。"}, "ELPH_SELFEN_NW": {"name": "ELPH_SELFEN_NW", "description": "ELPH_SELFEN_NW= [integer]Default:ELPH_SELFEN_NW= 1", "default": "ELPH_SELFEN_NW= [integer]Default:ELPH_SELFEN_NW= 1", "details": "Description: Number of energies to use when computing the phonon-induced electron self-energy.\nThe electron self-energy,[math]\\displaystyle{ \\Sigma_{n \\mathbf{k}}(\\omega) }[/math], depends on the frequency[math]\\displaystyle{ \\omega }[/math](or energy[math]\\displaystyle{ \\hbar \\omega }[/math]).ELPH_SELFEN_NWcontrols the number and location of frequencies when computing the self-energy in the ", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_NW", "description_cn": "计算声子诱导电子自能时使用的能量数量。", "default_value": "1", "details_cn": "计算声子诱导电子自能时使用的能量数量。电子自能 Σ_{n k}(ω) 依赖于频率 ω（或能量 ℏω）。ELPH_SELFEN_NW 控制计算自能时频率的数量和位置。", "recommended": "根据计算精度需求，通常建议设置大于1的值，例如5或10，以获得更平滑的自能曲线。使用场景：在研究电子-声子耦合、超导性或热电性质时，需要精确计算电子自能。", "tips": "增加ELPH_SELFEN_NW会增加计算时间和内存消耗，需根据系统大小和计算资源调整。确保与ELPH_SELFEN等其他参数协调使用。"}, "ELPH_SELFEN_STATIC": {"name": "ELPH_SELFEN_STATIC", "description": "ELPH_SELFEN_STATIC= [logical]Default:ELPH_SELFEN_STATIC= .FALSE.", "default": "ELPH_SELFEN_STATIC= [logical]Default:ELPH_SELFEN_STATIC= .FALSE.", "details": "Description: Activates the adiabatic approximation for the phonon-induced electron self-energy.\nThe adiabatic approximation assumes that the electron dynamics are much faster than the phonon dynamics.\nIn other words, there is no energy exchange between the electronic and the phononic subsystems.\nMathematically, this is equivalent to setting the phonon frequencies in the denominator of the Fan-", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_STATIC", "description_cn": "ELPH_SELFEN_STATIC是一个逻辑参数，用于控制声子诱导电子自能的绝热近似。", "default_value": ".FALSE.", "details_cn": "激活声子诱导电子自能的绝热近似。绝热近似假设电子动力学比声子动力学快得多。换句话说，电子子系统和声子子系统之间没有能量交换。在数学上，这相当于在Fan-的分母中设置声子频率。", "recommended": "默认值为.FALSE.，即不激活绝热近似。推荐在需要精确计算电子-声子耦合效应时保持默认值；如果计算资源有限或假设电子动力学远快于声子动力学，可设置为.TRUE.以启用绝热近似，适用于电子能隙远大于声子能量的系统。", "tips": "绝热近似忽略电子-声子耦合的动态效应，可能影响计算精度。使用时应确保系统满足电子动力学远快于声子动力学的条件，否则可能导致不准确结果。"}, "ELPH_SELFEN_TEMPS": {"name": "ELPH_SELFEN_TEMPS", "description": "ELPH_SELFEN_TEMPS= [real array]Default:ELPH_SELFEN_TEMPS= 0 100 200 300 400 500", "default": "ELPH_SELFEN_TEMPS= [real array]Default:ELPH_SELFEN_TEMPS= 0 100 200 300 400 500", "details": "Description: List of temperatures for which to compute the electron self-energy due to electron-phonon coupling.\nThis list of temperatures is used to determine the chemical potential, the occupation factors entering the electron self-energy due to electron-phonon coupling as well as the transport coefficients in the context of atransport calculation.\nThe chemical potential is determined for the list of temperaturesELPH_SELFEN_TEMPSand carrier concentrations specified byELPH_SELFEN_CARRIER_DENorELPH_SELFEN_CARRIER_PER_CELL. You can also express a range of temperatures usingELPH_SELFEN_TEMPS_RANGE. Alternatively, one can specify the chemical poten", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_TEMPS", "description_cn": "ELPH_SELFEN_TEMPS 是一个实数数组，用于指定计算电子-声子耦合引起的电子自能时的温度列表。", "default_value": "0 100 200 300 400 500", "details_cn": "用于计算电子-声子耦合引起的电子自能的温度列表。此温度列表用于确定化学势、进入电子自能的占据因子，以及在输运计算中的输运系数。化学势是根据温度列表 ELPH_SELFEN_TEMPS 和由 ELPH_SELFEN_CARRIER_DEN 或 E 指定的载流子浓度来确定的。", "recommended": "推荐值根据研究温度范围设置，默认值0 100 200 300 400 500 K适用于从低温到中高温的广泛计算。使用场景：在进行电子-声子耦合自能计算或输运性质（如电导率）计算时，设置此参数以指定感兴趣的温度点，例如研究材料在不同温度下的电子行为。", "tips": "温度单位应为开尔文（K），确保温度列表覆盖实验或理论感兴趣的温度范围。此参数通常与ELPH_SELFEN_CARRIER_DEN参数配合使用，以指定载流子浓度；如果未设置载流子浓度，化学势可能基于默认或费米能级确定。避免温度列表过密或过疏，以平衡计算精度和效率。"}, "ELPH_SELFEN_TEMPS_RANGE": {"name": "ELPH_SELFEN_TEMPS_RANGE", "description": "ELPH_SELFEN_TEMPS_RANGE= [real array]", "default": "", "details": "Description: The range of temperatures (in K) at which to compute the phonon-mediated electron self-energy and transport coefficients.\nThis list of temperatures is used to determine the chemical potential, the occupation factors entering the electron self-energy due to electron-phonon coupling as well as the transport coefficients in the context of atransport calculation.\nA range of temperatures can be defined usingELPH_SELFEN_TEMPS_RANGE= l u n, where:", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_TEMPS_RANGE", "description_cn": "计算声子介导的电子自能和输运系数的温度范围（单位：K）", "default_value": "未设置", "details_cn": "计算声子介导的电子自能和输运系数的温度范围（单位：K）。此温度列表用于确定化学势、进入电子自能的占据因子（由于电子-声子耦合）以及在输运计算中的输运系数。可以使用 ELPH_SELFEN_TEMPS_RANGE= l u n 定义温度范围，其中：", "recommended": "根据研究需求设置一系列温度点，例如从低温到高温的序列（如 100 200 300 400 500 K）。使用场景：适用于电子-声子耦合计算，如研究热电材料或温度依赖的输运性质时，需要指定温度范围以计算自能和输运系数。", "tips": "确保温度单位为开尔文（K）；温度点应覆盖感兴趣的物理温度区间，避免设置过多点以节省计算资源；在输运计算中，温度列表会影响化学势和占据因子的计算，需根据材料特性合理选择。"}, "ELPH_SELFEN_WRANGE": {"name": "ELPH_SELFEN_WRANGE", "description": "ELPH_SELFEN_WRANGE= [real]Default:ELPH_SELFEN_WRANGE= 0", "default": "ELPH_SELFEN_WRANGE= [real]Default:ELPH_SELFEN_WRANGE= 0", "details": "Description: Together withELPH_SELFEN_NWspecifies the energy window in which to evaluate the phonon-induced electron self-energy.\nThe electron self-energy,[math]\\displaystyle{ \\Sigma_{n \\mathbf{k}}(\\omega) }[/math], depends on the frequency[math]\\displaystyle{ \\omega }[/math](or energy[math]\\displaystyle{ \\hbar \\omega }[/math]).\nThe tagELPH_SELFEN_WRANGEdetermines the width of the energy window in which to evaluate the self-en", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_SELFEN_WRANGE", "description_cn": "ELPH_SELFEN_WRANGE= [实数] 默认值：ELPH_SELFEN_WRANGE= 0", "default_value": "0", "details_cn": "与ELPH_SELFEN_NW一起指定评估声子诱导电子自能的能量窗口。电子自能，Σ_{n k}(ω)，依赖于频率ω（或能量ℏω）。标签ELPH_SELFEN_WRANGE决定了评估自能的能量窗口的宽度。", "recommended": "根据系统声子频率和电子能带结构设置，通常为1-2 eV。使用场景：在计算电子-声子耦合效应，如超导性或载流子迁移率时使用。", "tips": "需与ELPH_SELFEN_NW参数协调设置，确保能量窗口覆盖相关频率范围；过大的窗口会增加计算成本，过小可能遗漏重要贡献。"}, "ELPH_TRANSPORT": {"name": "ELPH_TRANSPORT", "description": "ELPH_TRANSPORT= [logical]Default:ELPH_TRANSPORT= .FALSE.", "default": "ELPH_TRANSPORT= [logical]Default:ELPH_TRANSPORT= .FALSE.", "details": "Description: Activates transport calculation involving electron-phonon coupling\nWhenELPH_TRANSPORT= True, VASP calculates the transport coefficients from the linearized Boltzmann transport equation.\nIn this framework, the transport coefficients are calculated from various relaxation-time approximations selectable viaELPH_SCATTERING_APPROX.\nA convenient way to start transport ca\nFor more information, visit the how-to page ontransport calculations.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT", "description_cn": "ELPH_TRANSPORT是一个逻辑参数，默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "激活涉及电子-声子耦合的输运计算。当ELPH_TRANSPORT= True时，VASP从线性化玻尔兹曼输运方程计算输运系数。在此框架下，输运系数通过可选择的ELPH_SCATTERING_APPROX参数从各种弛豫时间近似计算。开始输运计算的便捷方式... 更多信息，请访问输运计算的how-to页面。", "recommended": "推荐值为.TRUE.当需要计算电子-声子耦合对输运系数的影响时，例如研究半导体或金属的电导率、热导率等输运性质；否则保持默认.FALSE.以节省计算资源。", "tips": "1. 使用前需确保ELPH_SCATTERING_APPROX参数正确设置以选择合适的散射近似；2. 计算可能需要大量计算资源和时间，建议在高性能计算环境中运行；3. 详细用法请参考VASP官方文档或输运计算的how-to页面。"}, "ELPH_TRANSPORT_DFERMI_TOL": {"name": "ELPH_TRANSPORT_DFERMI_TOL", "description": "ELPH_TRANSPORT_DFERMI_TOL= [real]Default:ELPH_TRANSPORT_DFERMI_TOL= 1e-6", "default": "ELPH_TRANSPORT_DFERMI_TOL= [real]Default:ELPH_TRANSPORT_DFERMI_TOL= 1e-6", "details": "Description: choose the fraction of the integral weight of the derivative of the Fermi–Dirac distribution that is excluded when defining the energy window for the Onsager coefficients. Must be between 0 and 1, and is only used whenELPH_TRANSPORT_DRIVER=1.\nUsing this parameter,ELPH_TRANSPORT_EMINandELPH_TRANSPORT_EMAXare automatically computed from the chemical potentials and the distribution[math]\\displaystyle{ -\\partial f^0/\\partial \\epsilon }[/math].  \nFormally, the integration window[math]\\displaystyle{ [\\mu-e,\\mu+e] }[/math]is chosen such that\nwhere[math]\\displaystyle{ \\alpha \\equiv }[/math]ELPH_TRANSPORT_DFERMI_TOL.  \nThis gives", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_DFERMI_TOL", "description_cn": "ELPH_TRANSPORT_DFERMI_TOL 是一个实数参数，用于控制在定义Onsager系数能量窗口时排除的费米-狄拉克分布导数积分权重比例。", "default_value": "1e-6", "details_cn": "选择在定义Onsager系数的能量窗口时，排除的费米-狄拉克分布导数的积分权重比例。必须介于0和1之间，且仅在ELPH_TRANSPORT_DRIVER=1时使用。使用此参数时，ELPH_TRANSPORT_EMIN和ELPH_TRANSPORT_EMAX会根据化学势和分布[math]\\displaystyle{ -\\partial f^0/\\partial \\epsilon }[/math]自动计算。形式上，积分窗口[math]\\di", "recommended": "默认值1e-6适用于大多数情况，可确保计算精度和效率的平衡。使用场景：当设置ELPH_TRANSPORT_DRIVER=1进行电子-声子耦合输运性质计算时，用于自动确定能量窗口。如需更高精度，可适当减小值（如1e-7），但需注意计算成本增加。", "tips": "1. 参数值必须严格在0和1之间，否则可能导致计算错误。2. 仅在ELPH_TRANSPORT_DRIVER=1时生效，其他设置下忽略。3. 此参数直接影响ELPH_TRANSPORT_EMIN和ELPH_TRANSPORT_EMAX的自动计算，设置不当可能使能量窗口过窄或过宽，影响输运系数准确性。4. 建议根据体系特性和计算需求微调，但默认值通常可靠。"}, "ELPH_TRANSPORT_DRIVER": {"name": "ELPH_TRANSPORT_DRIVER", "description": "ELPH_TRANSPORT_DRIVER= [integer]Default:ELPH_TRANSPORT_DRIVER= 2", "default": "ELPH_TRANSPORT_DRIVER= [integer]Default:ELPH_TRANSPORT_DRIVER= 2", "details": "Description: choose method to compute the Onsager coefficients, which are then used to compute the transport coefficients.\nThe Onsager coefficients can be computed using either of the options below, each with its own advantages and disadvantages.\nThey are defined as\nwhere[math]\\displaystyle{ \\mathcal{T}(\\epsilon) }[/math]is thetransport distribution function,[math]\\displaystyle{ \\mu }[/math]thechemical potential, and[math]\\displaystyle{ f^0 }[/math]the Fermi–Dirac distribution.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_DRIVER", "description_cn": "ELPH_TRANSPORT_DRIVER= [整数] 默认值：ELPH_TRANSPORT_DRIVER= 2", "default_value": "2", "details_cn": "选择计算Onsager系数的方法，这些系数随后用于计算输运系数。Onsager系数可以使用以下任一选项计算，每个选项都有其自身的优缺点。它们定义为其中[math]\\displaystyle{ \\mathcal{T}(\\epsilon) }[/math]是输运分布函数，[math]\\displaystyle{ \\mu }[/math]是化学势，[math]\\displaystyle{ f^0 }[/math]是费米-狄拉克分布。", "recommended": "推荐使用默认值2，适用于大多数输运性质计算，如电导率或热导率。如果需要更精确或特定方法（如不同数值积分方案），可根据具体研究需求调整此参数。", "tips": "此参数通常与ELPH_TRANSPORT等其他INCAR参数配合使用，确保计算设置一致。调整此参数可能影响计算精度和资源消耗，建议在修改前参考VASP官方文档或进行测试计算。"}, "ELPH_TRANSPORT_EMAX": {"name": "ELPH_TRANSPORT_EMAX", "description": "ELPH_TRANSPORT_EMAX= [real]", "default": "", "details": "Description: Upper bound of the energy window in which states are considered for transport calculations.\nIn transport calculations, only a small amount of electronic states around the chemical potential have a sizeable contribution.\nTherefore, in order to improve performance, only states inside an energy window centered around the chemical potential are considered during the calculation.\nBy default, th", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_EMAX", "description_cn": "ELPH_TRANSPORT_EMAX 参数，用于设置输运计算中能量窗口的上界。", "default_value": "未指定", "details_cn": "在输运计算中考虑电子态的能量窗口的上界。在输运计算中，只有化学势附近的一小部分电子态有显著贡献。因此，为了提高性能，在计算过程中只考虑以化学势为中心的能量窗口内的态。默认情况下，该参数未指定时可能自动设置。", "recommended": "根据体系费米能级附近的态密度设置，通常为0.1-2 eV。使用场景：用于电子-声子输运计算，如计算电导率或迁移率。", "tips": "设置过大会增加计算成本，设置过小可能忽略重要电子态，影响精度。建议根据具体体系进行测试以平衡效率和准确性。"}, "ELPH_TRANSPORT_EMAX_PLOT": {"name": "ELPH_TRANSPORT_EMAX_PLOT", "description": "ELPH_TRANSPORT_EMAX_PLOT= [real]Default:ELPH_TRANSPORT_EMAX_PLOT=[math]\\displaystyle{ \\max(\\varepsilon_{n\\mathbf{k}}) }[/math]+5", "default": "ELPH_TRANSPORT_EMAX_PLOT= [real]Default:ELPH_TRANSPORT_EMAX_PLOT=[math]\\displaystyle{ \\max(\\varepsilon_{n\\mathbf{k}}) }[/math]+5", "details": "Description:  \nSpecifies the maximum energy (in eV) to be considered when computing thetransport distribution functionfor plotting.\nBy default, the upper energy limit is set to[math]\\displaystyle{ \\max(\\varepsilon_{n\\mathbf{k}}) }[/math]+ 5 eV, where[math]\\displaystyle{ \\varepsilon_{n\\mathbf{k}} }[/math]are the electronic eigenvalues computed in the k-point mesh defined by theKPOINTS_ELPHfile.\nThe transport function for plotting\nThe transport function and corresponding energy grids are written tovaspout.h5", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_EMAX_PLOT", "description_cn": "指定计算输运分布函数用于绘图时考虑的最大能量（单位：eV）。", "default_value": "max(ε_nk) + 5 eV，其中 ε_nk 是在 KPOINTS_ELPH 文件定义的 k 点网格中计算的电子本征值。", "details_cn": "指定在计算输运分布函数用于绘图时所考虑的最大能量（单位：eV）。\n默认情况下，能量上限设置为 max(ε_nk) + 5 eV，其中 ε_nk 是在 KPOINTS_ELPH 文件定义的 k 点网格中计算的电子本征值。\n用于绘图的输运函数\n输运函数及相应的能量网格将被写入文件。", "recommended": "通常保持默认值即可，它能覆盖主要的输运贡献区域。如果需要更精细地分析费米面附近特定能量范围内的输运特性，或计算的体系带隙非常窄，可以适当减小该值以聚焦于相关能量窗口；反之，若需要观察更高能量态的贡献（如重掺杂半导体），可适当增大。", "tips": "1. 此参数仅影响绘图输出的能量范围，不影响实际输运计算的精度或收敛性。\n2. 确保设置的值大于费米能级（或感兴趣的化学势）以包含所有相关电子态。\n3. 建议与 `ELPH_TRANSPORT_EMIN_PLOT` 等参数配合使用，以精确定义绘图的能量窗口。"}, "ELPH_TRANSPORT_EMIN": {"name": "ELPH_TRANSPORT_EMIN", "description": "ELPH_TRANSPORT_EMIN= [real]", "default": "", "details": "Description: Lower bound of the energy window in which states are considered for transport calculations.\nIn transport calculations, only a small amount of electronic states around the chemical potential have a sizeable contribution.\nTherefore, in order to improve performance, only states inside an energy window centered around the chemical potential are considered during the calculation.\nBy default, th", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_EMIN", "description_cn": "ELPH_TRANSPORT_EMIN 是一个实数参数，表示在传输计算中考虑电子态的能量窗口的下限。", "default_value": "未指定", "details_cn": "在传输计算中考虑电子态的能量窗口的下限。在传输计算中，只有化学势附近的一小部分电子态有显著贡献。因此，为了提高性能，在计算中只考虑以化学势为中心的能量窗口内的态。默认情况下，该参数未指定，需要用户根据系统设置。", "recommended": "根据具体系统设置，通常设置为化学势减去0.5 eV到1 eV。使用场景：在进行电子传输计算时，如使用Boltzmann传输理论计算电导率、Seebeck系数等。", "tips": "设置过小可能忽略对传输有贡献的态，设置过大可能增加不必要的计算成本。建议根据能带结构和化学势位置调整。"}, "ELPH_TRANSPORT_EMIN_PLOT": {"name": "ELPH_TRANSPORT_EMIN_PLOT", "description": "ELPH_TRANSPORT_EMIN_PLOT= [real]Default:ELPH_TRANSPORT_EMIN_PLOT=[math]\\displaystyle{ \\min(\\varepsilon_{n\\mathbf{k}}) }[/math]-5", "default": "ELPH_TRANSPORT_EMIN_PLOT= [real]Default:ELPH_TRANSPORT_EMIN_PLOT=[math]\\displaystyle{ \\min(\\varepsilon_{n\\mathbf{k}}) }[/math]-5", "details": "Description:  \nSpecifies the minimum energy (in eV) to be considered when computing thetransport distribution functionfor plotting.\nBy default, the lower energy limit is set to[math]\\displaystyle{ \\min(\\varepsilon_{n\\mathbf{k}}) }[/math]− 5 eV, where[math]\\displaystyle{ \\varepsilon_{n\\mathbf{k}} }[/math]are the electronic eigenvalues computed in the k-point mesh defined by theKPOINTS_ELPHfile.\nThe transport function for plotting\nThe transport function and corresponding energy grids are written tovaspout.h5.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_EMIN_PLOT", "description_cn": "指定在计算用于绘图的传输分布函数时考虑的最小能量（单位：eV）。", "default_value": "min(ε_nk) - 5 eV", "details_cn": "指定在计算用于绘图的传输分布函数时考虑的最小能量（单位：eV）。默认情况下，下限能量设置为 min(ε_nk) - 5 eV，其中 ε_nk 是在由 KPOINTS_ELPH 文件定义的 k 点网格中计算的电子本征值。用于绘图的传输函数和相应的能量网格被写入...", "recommended": "推荐使用默认值，除非需要调整能量范围以覆盖特定能带或费米能级附近。使用场景：在计算电子传输性质（如电导率）时，用于绘制传输分布函数，以可视化能量依赖的传输特性。", "tips": "确保能量范围足够宽以包含相关能带，但不要过宽以免增加计算负担。检查输出文件以确认能量网格是否合适，并参考 KPOINTS_ELPH 文件以确保 k 点网格正确。"}, "ELPH_TRANSPORT_NEDOS_PLOT": {"name": "ELPH_TRANSPORT_NEDOS_PLOT", "description": "ELPH_TRANSPORT_NEDOS_PLOT= [integer]Default:ELPH_TRANSPORT_NEDOS_PLOT=  -1", "default": "ELPH_TRANSPORT_NEDOS_PLOT= [integer]Default:ELPH_TRANSPORT_NEDOS_PLOT=  -1", "details": "Description:  \nSpecifies the number of energy points used to sample thetransport distribution functionfor plotting.\nThis parameter defines the resolution of the energy grid used to compute and store the transport distribution function invaspout.h5.  \nThe transport function for plotting is evaluated on a linear energy grid of energies betweenELPH_TRANSPORT_EMIN_PLOTandELPH_TRANSPORT_EMAX_PLOTand withELPH_TRANSPORT\nThe default value of -1 means that the transport function for plotting is not computed by default. If the number if positive (for example 501) then it corresponds to the number of points in the dataset:", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_TRANSPORT_NEDOS_PLOT", "description_cn": "指定用于绘制传输分布函数的能量点数。", "default_value": "-1", "details_cn": "指定用于绘制传输分布函数采样的能量点数。此参数定义了用于计算和存储vasprun.h5中传输分布函数的能量网格的分辨率。用于绘制的传输函数在ELPH_TRANSPORT_EMIN_PLOT和ELPH_TRANSPORT_EMAX_PLOT之间的线性能量网格上评估，并使用ELPH_TRANSPORT_NEDOS_PLOT。-1的默认值表示不计算用于绘制的传输函数。", "recommended": "根据需要设置正整数，例如100或更高，以获得足够的分辨率。使用场景：当需要绘制传输分布函数时，设置此参数以定义能量网格点数。", "tips": "默认值-1表示不计算传输函数。如果设置此参数，请确保同时设置ELPH_TRANSPORT_EMIN_PLOT和ELPH_TRANSPORT_EMAX_PLOT以定义能量范围。"}, "ELPH_USEBLAS": {"name": "ELPH_USEBLAS", "description": "ELPH_USEBLAS= [logical]Default:ELPH_USEBLAS= .TRUE.", "default": "ELPH_USEBLAS= [logical]Default:ELPH_USEBLAS= .TRUE.", "details": "Description: Toggles the use of BLAS routines for computing electron-phonon matrix elements.\nThis is a performance setting that can offer a significant performance boost.\nIfELPH_USEBLAS= True, then VASP usesBLASroutines when computing the electron-phonon matrix elements.\nOtherwise, VASP-internal routines are used.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_USEBLAS", "description_cn": "ELPH_USEBLAS= [逻辑值] 默认值：ELPH_USEBLAS= .TRUE.", "default_value": ".TRUE.", "details_cn": "切换是否使用BLAS例程来计算电子-声子矩阵元素。这是一个性能设置，可以提供显著的性能提升。如果ELPH_USEBLAS= True，则VASP在计算电子-声子矩阵元素时使用BLAS例程。否则，使用VASP内部例程。", "recommended": ".TRUE.。使用场景：在计算电子-声子耦合时，为了获得更好的性能，建议启用BLAS例程。BLAS例程通常比VASP内部例程更高效，可以显著加速计算，尤其适用于大规模计算或需要高性能优化的场景。", "tips": "确保系统已正确安装BLAS库（如OpenBLAS或Intel MKL），并且VASP编译时链接了BLAS。如果遇到计算错误、性能下降或兼容性问题，可以尝试将ELPH_USEBLAS设置为.FALSE.以使用VASP内部例程作为备选方案。"}, "ELPH_WF_CACHE_PREFILL": {"name": "ELPH_WF_CACHE_PREFILL", "description": "ELPH_WF_CACHE_PREFILL= [logical]Default:ELPH_WF_CACHE_PREFILL=  .TRUE.", "default": "ELPH_WF_CACHE_PREFILL= [logical]Default:ELPH_WF_CACHE_PREFILL=  .TRUE.", "details": "Description:  \nDetermines whether to pre-fill the wavefunction (WF) cache before starting the calculation.\nWhen enabled, the cache is populated in advance, avoiding one-sided MPI communication during the main computation loop.  \nThis can significantly improve performance and scalability, especially for large parallel runs.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_WF_CACHE_PREFILL", "description_cn": "决定是否在计算开始前预填充波函数缓存的逻辑参数。", "default_value": "默认值为 .TRUE.（真）。", "details_cn": "决定是否在开始计算前预填充波函数（WF）缓存。启用后，缓存会提前填充，避免在主计算循环中出现单向MPI通信。这可以显著提高性能和可扩展性，尤其是在大规模并行运行中。", "recommended": "推荐设置为 .TRUE.，特别是在大规模并行计算中，以提高性能和可扩展性。", "tips": "确保在并行计算环境中使用，以充分利用其优势。注意，启用此参数可能会增加初始内存使用。"}, "ELPH_WF_COMM_OPT": {"name": "ELPH_WF_COMM_OPT", "description": "ELPH_WF_COMM_OPT= [integer]Default:ELPH_WF_COMM_OPT=  0", "default": "ELPH_WF_COMM_OPT= [integer]Default:ELPH_WF_COMM_OPT=  0", "details": "Description:  \nSelects the MPI communication pattern used to exchange orbitals between different MPI ranks.\nThe available options are:\nSome MPI libraries have shown instability or performance issues when using one-sided communication.  \nIf unexpected behavior occurs, it is recommended to keep the default settingELPH_WF_COMM_OPT= 0.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_WF_COMM_OPT", "description_cn": "ELPH_WF_COMM_OPT 是一个整数参数，用于选择在不同MPI ranks之间交换轨道的MPI通信模式。", "default_value": "0", "details_cn": "选择用于在不同MPI ranks之间交换轨道的MPI通信模式。可用选项包括：一些MPI库在使用单向通信时显示不稳定或性能问题。如果出现意外行为，建议保持默认设置ELPH_WF_COMM_OPT= 0。", "recommended": "推荐值为0，使用场景是当MPI通信出现不稳定或性能问题时，应保持默认设置以避免问题。", "tips": "如果使用单向通信时遇到意外行为或性能下降，建议切换回默认值0。"}, "ELPH_WF_REDISTRIBUTE": {"name": "ELPH_WF_REDISTRIBUTE", "description": "ELPH_WF_REDISTRIBUTE= [logical]Default:ELPH_WF_REDISTRIBUTE=  .FALSE.", "default": "ELPH_WF_REDISTRIBUTE= [logical]Default:ELPH_WF_REDISTRIBUTE=  .FALSE.", "details": "Description:  \nAfter computing the electronic states, they are redistributed among the CPUs such that the workload to compute the electron self-energy is similar among the different CPUs.\nThe computational effort for each Kohn–Sham state is first estimated, and then the states are distributed among MPI ranks to balance the workload as evenly as possible.  This redistribution is most relevant when used in combination withELPH_SELFEN_IMAG_SKIP= .TRUE..\nWhenELPH_MODE= TRANDPORT, the def\nELPH_MODE,ELPH_SELFEN_IMAG_SKIP,ELPH_RUN,ELPH_WF_COMM_OPT,ELPH_WF_CACHE_PREFILL", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_WF_REDISTRIBUTE", "description_cn": "ELPH_WF_REDISTRIBUTE 是一个逻辑型参数，用于控制在计算电子态后是否重新分配这些态到各个CPU，以平衡计算电子自能的工作负载。", "default_value": ".FALSE.", "details_cn": "在计算电子态之后，这些态会在CPU之间重新分配，使得计算电子自能的工作负载在不同CPU之间尽可能均衡。首先会估算每个科恩-沈态的计算量，然后将这些态分配给不同的MPI进程，以尽可能平衡工作负载。当与 ELPH_SELFEN_IMAG_SKIP = .TRUE. 结合使用时，这种重新分配最为相关。当 ELPH_MODE = TRANSPORT 时，该参数的定义...", "recommended": ".TRUE.。使用场景：当进行大规模电子-声子耦合计算，特别是计算电子自能时，开启此选项可以显著改善计算资源的负载均衡，从而提高计算效率。建议与 ELPH_SELFEN_IMAG_SKIP = .TRUE. 配合使用。", "tips": "1. 此参数仅在 VASP 的特定版本（如包含电子-声子耦合模块的版本）中有效。2. 开启此选项会引入额外的通信开销，对于小体系或计算节点较少的情况，可能不会带来明显的性能提升，甚至可能降低效率。3. 使用前请确保您的 VASP 编译版本支持此功能。4. 请结合 ELPH_MODE 参数的具体设置来使用。"}, "ELPH_WRITE_HDF5VEL": {"name": "ELPH_WRITE_HDF5VEL", "description": "ELPH_WRITE_HDF5VEL= [logical]Default:ELPH_WRITE_HDF5VEL= .FALSE.", "default": "ELPH_WRITE_HDF5VEL= [logical]Default:ELPH_WRITE_HDF5VEL= .FALSE.", "details": "Description: If set, writes the electron group velocities to thevaspout.h5file.\nThe dataset is stored in thevaspout.h5file\nThe group velocities are written in ev Å units in cartesian coordinates.\nThis tag can be used independently ofELPH_WRITE_TEXTVEL.\nThe number of bands is the one set byELPH_NBANDSwhich can in some cases be different fromNBANDS.\nIf both are set, both outputs are written.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_WRITE_HDF5VEL", "description_cn": "ELPH_WRITE_HDF5VEL 是一个逻辑参数，用于控制是否将电子群速度写入 HDF5 格式的输出文件。", "default_value": ".FALSE.", "details_cn": "如果设置，将电子群速度写入 vaspout.h5 文件。数据集存储在 vaspout.h5 文件中。群速度以 ev Å 为单位，在笛卡尔坐标系中写入。此标签可以独立于 ELPH_WRITE_TEXTVEL 使用。能带数量由 ELPH_NBANDS 设置，在某些情况下可能与 NBANDS 不同。如果两者都设置，则两者输出都会被写入。", "recommended": "通常保持默认 .FALSE.，除非需要输出电子群速度数据。设置为 .TRUE. 用于生成 HDF5 格式的群速度数据，便于后续分析，如电子-声子耦合计算或电子输运性质研究。", "tips": "此参数可以独立于 ELPH_WRITE_TEXTVEL 使用；能带数量由 ELPH_NBANDS 参数控制，可能与 NBANDS 不同；如果同时设置 ELPH_WRITE_HDF5VEL 和 ELPH_WRITE_TEXTVEL，两者输出都会写入。"}, "ELPH_WRITE_TEXTVEL": {"name": "ELPH_WRITE_TEXTVEL", "description": "ELPH_WRITE_TEXTVEL= [logical]Default:ELPH_WRITE_TEXTVEL= .FALSE.", "default": "ELPH_WRITE_TEXTVEL= [logical]Default:ELPH_WRITE_TEXTVEL= .FALSE.", "details": "Description: If set, writes the electron group velocities to avelocityhuman-readable text file.\nThevelocityfile contains the following information:\nThe group velocities are written in ev Å units in cartesian coordinates.\nThis tag can be used independently ofELPH_WRITE_HDF5VEL.\nThe number of bands is the one set byELPH_NBANDSwhich can in some cases be different fromNBANDS.\nIf both are set, both outputs are written.", "wiki_url": "https://www.vasp.at/wiki/index.php/ELPH_WRITE_TEXTVEL", "description_cn": "ELPH_WRITE_TEXTVEL是一个逻辑参数，用于控制是否将电子群速度写入人类可读的文本文件。默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "详细信息：如果设置，将电子群速度写入一个人类可读的文本文件。速度文件包含以下信息：群速度以ev Å单位在笛卡尔坐标系中写入。此标签可以独立于ELPH_WRITE_HDF5VEL使用。带数由ELPH_NBANDS设置，在某些情况下可能与NBANDS不同。如果两者都设置，两者都会输出。", "recommended": "如果需要输出电子群速度数据，设置为.TRUE.。使用场景：在计算电子输运性质、声子-电子耦合或进行后处理分析时使用。", "tips": "此参数独立于ELPH_WRITE_HDF5VEL，可以单独启用。带数由ELPH_NBANDS参数控制，可能与NBANDS不同，需确保ELPH_NBANDS设置正确。如果同时设置ELPH_WRITE_TEXTVEL和ELPH_WRITE_HDF5VEL，两者都会生成输出文件。"}, "EMAX": {"name": "EMAX", "description": "Description:EMAXspecifies the  upper boundary of the energy range for the evaluation of the electronicdensity of states(DOS).", "default": "Default:EMAX", "details": "Description:EMAXspecifies the  upper boundary of the energy range for the evaluation of the electronicdensity of states(DOS).\nThe DOS is evaluated eachNBLOCKsteps,DOSCARis updated eachNBLOCK*KBLOCKsteps.\nEMIN,NEDOS,DOSCAR", "wiki_url": "https://www.vasp.at/wiki/index.php/EMAX", "description_cn": "EMAX 指定了用于评估电子态密度（DOS）的能量范围的上边界。", "default_value": "EMAX", "details_cn": "EMAX 指定了用于评估电子态密度（DOS）的能量范围的上边界。DOS 每 NBLOCK 步评估一次，DOSCAR 每 NBLOCK*KBLOCK 步更新一次。相关参数：EMIN, NEDOS, DOSCAR", "recommended": "通常设置为费米能级（EFERMI）以上10-20 eV，具体取决于系统能带结构（如金属体系可能需要更大范围）。使用场景：在计算电子态密度（DOS）时，与EMIN和NEDOS参数配合使用，以覆盖感兴趣的能带范围。", "tips": "1. 确保EMAX大于EMIN，且能量范围足够覆盖价带和导带，避免遗漏关键态。2. DOSCAR文件的更新频率由NBLOCK和KBLOCK参数控制，需根据计算需求合理设置以平衡精度和效率。3. 对于金属或窄带隙体系，建议适当增大EMAX以包含费米面附近的态。"}, "EMIN": {"name": "EMIN", "description": "Description:EMINspecifies the  lower boundary of the energy range for the evaluation of the electronicdensity of states(DOS).", "default": "Default:EMIN", "details": "Description:EMINspecifies the  lower boundary of the energy range for the evaluation of the electronicdensity of states(DOS).\nThe DOS is evaluated eachNBLOCKsteps,DOSCARis updated eachNBLOCK*KBLOCKsteps.\nEMAX,NEDOS,DOSCAR", "wiki_url": "https://www.vasp.at/wiki/index.php/EMIN", "description_cn": "EMIN指定用于计算电子态密度（DOS）的能量范围的下边界。", "default_value": "无固定默认值，需手动设置", "details_cn": "EMIN指定用于计算电子态密度（DOS）的能量范围的下边界。DOS每NBLOCK步评估一次，DOSCAR文件每NBLOCK*KBLOCK步更新一次。相关参数：EMAX, NEDOS, DOSCAR。", "recommended": "根据体系费米能级和能带结构设置，一般建议设置为费米能级以下5-10 eV。使用场景：在计算电子态密度时，用于定义能量窗口的下限，确保覆盖感兴趣的能带范围。", "tips": "确保EMIN和EMAX覆盖感兴趣的能带范围，避免设置不当导致DOS计算不准确；与NEDOS参数配合控制能量点数；注意NBLOCK和KBLOCK参数影响DOS计算频率和DOSCAR文件更新间隔。"}, "ENAUG": {"name": "ENAUG", "description": "ENAUG= [real]Default:ENAUG= largestEAUGread from thePOTCARfile", "default": "ENAUG= [real]Default:ENAUG= largestEAUGread from thePOTCARfile", "details": "Description: Specifies the cutoff energy of the plane-wave representation of the augmentation charges in eV.\nENAUGdeterminesNGXF,NGYF, andNGZFin accordance with thePRECtag.\nNGXF,NGYF,NGZF,ENCUT,PREC,PRECFOCK", "wiki_url": "https://www.vasp.at/wiki/index.php/ENAUG", "description_cn": "指定增强电荷的平面波表示的截断能量，单位为电子伏特（eV）。", "default_value": "从POTCAR文件中读取的最大EAUG值。", "details_cn": "指定增强电荷的平面波表示的截断能量，单位为电子伏特（eV）。ENAUG根据PREC标签确定NGXF、NGYF和NGZF。相关参数：NGXF、NGYF、NGZF、ENCUT、PREC、PRECFOCK。", "recommended": "推荐使用默认值，即从POTCAR文件中读取的最大EAUG值。在需要高精度计算时，可以手动设置ENAUG，通常与ENCUT协调，例如设置为ENCUT的1.5倍或更高，但需注意计算成本。使用场景：在计算电荷密度、电势或进行精细网格计算时。", "tips": "ENAUG值影响FFT网格大小（NGXF、NGYF、NGZF），设置过高会增加内存和计算时间。确保与PREC标签一致，以避免网格不匹配。在某些计算中，如杂化泛函计算，可能需要调整ENAUG以匹配PRECFOCK。"}, "ENCUT": {"name": "ENCUT", "description": "Description:ENCUTspecifies the energy cutoff for the plane-wave basis set in eV.", "default": "Default:ENCUT", "details": "Description:ENCUTspecifies the energy cutoff for the plane-wave basis set in eV.\nAll plane waves with a kinetic energy smaller than[math]\\displaystyle{ E_{\\mathrm{cut}} }[/math]are included in the basis set, i.e.,\nWith this energy cutoff, the number of plane waves included in the basis set depends on thek-point, leading to a superior behavior. For instance, for energy-volume calculations the total number of plane waves changes fairly smoothly according to the volume, while the criterion[math]\\displaystyle{ | ", "wiki_url": "https://www.vasp.at/wiki/index.php/ENCUT", "description_cn": "ENCUT 指定平面波基组的能量截断，单位为电子伏特（eV）。", "default_value": "从POTCAR文件中的ENMAX读取", "details_cn": "ENCUT 指定平面波基组的能量截断，单位为电子伏特（eV）。所有动能小于 E_cut 的平面波都包含在基组中，即，使用这个能量截断，基组中包含的平面波数量取决于 k 点，这导致了优越的行为。例如，对于能量-体积计算，平面波的总数根据体积相当平滑地变化，而标准", "recommended": "通常设置为POTCAR中ENMAX的1.3倍或更高，以确保计算收敛。使用场景：适用于所有电子结构计算，特别是需要高精度的能量、力或应力计算。", "tips": "设置过高会增加计算时间和内存需求，设置过低可能导致结果不准确。建议进行收敛测试以确定合适的ENCUT值。"}, "ENCUTFOCK": {"name": "ENCUTFOCK", "description": "Description: TheENCUTFOCKtag sets the energy cutoff that determines the FFT grids used by the Hartree-Fock routines.", "default": "Default: none", "details": "Description: TheENCUTFOCKtag sets the energy cutoff that determines the FFT grids used by the Hartree-Fock routines.\nThe flagENCUTFOCKis no longer supported in VASP.5.2.4 and newer versions.\nPlease usePRECFOCKinstead.\nThe only sensible value forENCUTFOCKisENCUTFOCK=0.\nThis implies that the smallest possible FFT grid, which just encloses the cutoff sphere\ncorresponding to the plane wave cutoff, is used. \nThis accelerates the calculations by roughly a factor two to three,\nbut causes slight changes in the total ener", "wiki_url": "https://www.vasp.at/wiki/index.php/ENCUTFOCK", "description_cn": "ENCUTFOCK 标签设置能量截断，用于确定 Hartree-Fock 例程使用的 FFT 网格。", "default_value": "无", "details_cn": "ENCUTFOCK 标签设置能量截断，用于确定 Hartree-Fock 例程使用的 FFT 网格。ENCUTFOCK 标志在 VASP 5.2.4 及更新版本中不再支持。请改用 PRECFOCK。ENCUTFOCK 唯一合理的值是 ENCUTFOCK=0。这意味着使用最小的可能 FFT 网格，该网格刚好包围对应于平面波截断的截断球。这将计算加速大约两到三倍，但会导致轻微变化。", "recommended": "推荐在旧版 VASP（5.2.4 之前）中使用 ENCUTFOCK=0 以加速计算；在新版 VASP（5.2.4 及以上）中，应使用 PRECFOCK 代替。", "tips": "ENCUTFOCK 在 VASP 5.2.4 及更新版本中已弃用，请使用 PRECFOCK。使用 ENCUTFOCK=0 可能会略微改变计算结果，但能显著加速计算，适用于对精度要求不高的场景。"}, "ENCUTGW": {"name": "ENCUTGW", "description": "ENCUTGW= [real]Default:ENCUTGW=  2/3ENCUT", "default": "ENCUTGW= [real]Default:ENCUTGW=  2/3ENCUT", "details": "Description: The tagENCUTGWsets the energy cutoff for the response function. It controls the basis set for the response functions\nin exactly the same manner asENCUTdoes for the orbitals.\nIn GW and random-phase-approximation (RPA) calculations,  storing and manipulating the response function dominates the computational work load:\n[math]\\displaystyle{ \\chi_{{\\mathbf{q}}}^0 ({\\mathbf{G}}, {\\mathbf{G}}', \\omega)=\\frac{1}{\\Omega} \\sum_{n,n',{\\mathbf{k}}}2 w_{{\\mathbf{k}}}\n (f_{n'{\\mathbf{k}}+{\\mathbf{q}}} - f_{n{\\mathbf{k}}})  \n\\times  \\frac{\\langle \\psi_{n{\\mathbf{k}}}| e^{-i ({\\mathbf{q}}+{\\mathbf{G}}){\\mathbf{r}}} | \\psi_{n'{", "wiki_url": "https://www.vasp.at/wiki/index.php/ENCUTGW", "description_cn": "ENCUTGW 参数用于设置响应函数的能量截断，默认值为 ENCUT 的 2/3。", "default_value": "2/3 ENCUT", "details_cn": "ENCUTGW 标签设置响应函数的能量截断。它以与 ENCUT 控制轨道相同的方式控制响应函数的基组。在 GW 和随机相位近似（RPA）计算中，存储和操作响应函数主导计算负载。数学公式表示响应函数 χ_q^0(G, G', ω) 的计算，但此处被截断。", "recommended": "推荐使用默认值 2/3 ENCUT，适用于大多数 GW 和 RPA 计算，如能带结构、光学性质等。对于高精度计算（如收敛测试或复杂体系），可适当增加 ENCUTGW 至接近 ENCUT 的值，但需注意计算成本会显著增加。", "tips": "ENCUTGW 的设置直接影响计算精度和资源消耗。设置过高会导致内存和计算时间大幅增加，过低可能使结果不准确。建议在正式计算前进行收敛测试，以确定适合具体体系的最优值。"}, "ENCUTGWSOFT": {"name": "ENCUTGWSOFT", "description": "Descprition: The flagENCUTGWSOFTsets the energy cutoff for the response function, such that it allows to truncate the Coulomb kernel slowly between the energy\nspecified byENCUTGWSOFTandENCUTGWusing a cosine window function.", "default": "Default:ENCUTGWSOFT", "details": "Descprition: The flagENCUTGWSOFTsets the energy cutoff for the response function, such that it allows to truncate the Coulomb kernel slowly between the energy\nspecified byENCUTGWSOFTandENCUTGWusing a cosine window function.\nRPA/ACFDT correlation energies converge very slowly with respect to[math]\\displaystyle{ \\mathbf{G}_{\\rm max } }[/math]. \nThus VASP automatically extrapolates to the infinite basis set limit using a linear regression to the equation:[1][2][3]\n[math]\\displaystyle{ E_{\\mathrm{c}}({\\mathbf{G}})=E_{\\mathrm{c}}(\\infty)+\\frac{A}{{\\mathbf{G}}^3} }[/math].", "wiki_url": "https://www.vasp.at/wiki/index.php/ENCUTGWSOFT", "description_cn": "ENCUTGWSOFT标志设置响应函数的能量截断，使得它允许在ENCUTGWSOFT和ENCUTGW指定的能量之间使用余弦窗口函数缓慢截断库仑核。", "default_value": "ENCUTGWSOFT", "details_cn": "ENCUTGWSOFT标志设置响应函数的能量截断，使得它允许在ENCUTGWSOFT和ENCUTGW指定的能量之间使用余弦窗口函数缓慢截断库仑核。RPA/ACFDT相关能量相对于G_max收敛非常缓慢。因此，VASP自动外推到无限基组极限，使用线性回归到方程：[1][2][3] E_c", "recommended": "推荐值通常为ENCUTGW的50%至80%，用于RPA/ACFDT计算中以平滑截断库仑核，帮助外推到无限基组极限。具体值需根据体系和精度要求通过收敛测试确定。", "tips": "确保ENCUTGWSOFT小于ENCUTGW；在收敛测试中调整此参数以平衡精度和计算成本；过高值会增加计算负担，过低值可能导致精度损失。"}, "ENCUTLR": {"name": "ENCUTLR", "description": "ENCUTLR= [real]Default:ENCUTLR=  50 eV", "default": "ENCUTLR= [real]Default:ENCUTLR=  50 eV", "details": "Description: Reciprocal space cutoff for the treatment of the long-range contribution.\nSimilar to thetreatment of the long-range part of the force-constants, the potential and the PAW strengths also require a special treatment[1]in polar materials.\nThe correction scheme involves an Ewald summation over reciprocal lattice vectors that converges rapidly in reciprocal space.ENCUTLRcontro", "wiki_url": "https://www.vasp.at/wiki/index.php/ENCUTLR", "description_cn": "ENCUTLR是一个实数参数，默认值为50 eV。", "default_value": "50 eV", "details_cn": "用于处理长程贡献的倒易空间截断。类似于力常数的长程部分的处理，势能和PAW强度在极性材料中也需要特殊处理[1]。校正方案涉及在倒易空间中快速收敛的倒易晶格矢量的Ewald求和。ENCUTLR控制截断能量。", "recommended": "对于大多数极性材料，默认值50 eV可能足够，但对于高精度计算或强极性体系（如离子晶体、铁电体），建议增加到100 eV或更高以确保收敛。使用场景：主要用于极性材料，以准确处理长程静电相互作用。", "tips": "确保ENCUTLR与主截断能量ENCUT协调；在非极性材料中可能不需要设置此参数；过高的值会增加计算成本，建议通过测试确定最佳值。"}, "ENINI": {"name": "ENINI", "description": "ENINI= [real]Default:ENINI=ENCUT", "default": "ENINI= [real]Default:ENINI=ENCUT", "details": "Description:ENINIcontrols the cutoff during the initial (steepest descent) phase forIALGO=48.\nExamples that use this tag", "wiki_url": "https://www.vasp.at/wiki/index.php/ENINI", "description_cn": "ENINI是一个实数参数，默认值为ENCUT。", "default_value": "ENCUT", "details_cn": "ENINI控制在IALGO=48的初始（最速下降）阶段的截断能。", "recommended": "通常设置为ENCUT或略低于ENCUT的值（如ENCUT的80%-90%）。使用场景：在使用IALGO=48进行几何优化或分子动力学模拟时，初始阶段使用较低的截断能可以加速计算收敛，同时保持足够的精度，适用于大型体系或需要快速初步优化的情况。", "tips": "1. 仅当IALGO=48时有效；2. 设置过低可能导致精度不足，影响最终结果；设置过高则增加计算成本，失去加速效果；3. 建议根据具体体系进行测试，以平衡计算效率和精度。"}, "EPSILON": {"name": "EPSILON", "description": "EPSILON= [real]Default:EPSILON= 1", "default": "EPSILON= [real]Default:EPSILON= 1", "details": "Description:EPSILONsets the dielectric constant of the medium.\nVASP uses this flag only to scale the calculatedmonopole and dipole corrections.EPSILONdefaults to 1, which is the proper value for isolated atoms and molecules. For solids, the screening properties can and should be determined using the linear response routines of VASP (seeLEPSILONand/orLCALCEPS). \nMonopole Dipole and Quadrupole corrections,NELECT,DIPOL,IDIPOL,LDIPOL,LMONO,EFIELD", "wiki_url": "https://www.vasp.at/wiki/index.php/EPSILON", "description_cn": "EPSILON设置介质的介电常数。", "default_value": "1", "details_cn": "EPSILON设置介质的介电常数。VASP仅使用此标志来缩放计算的单极和偶极校正。EPSILON默认为1，这是孤立原子和分子的适当值。对于固体，屏蔽性质可以并且应该使用VASP的线性响应例程来确定（参见LEPSILON和/或LCALCEPS）。相关参数：单极、偶极和四极校正，NELECT，DIPOL，IDIPOL，LDIPOL，LMONO，EFIELD", "recommended": "对于孤立原子和分子，推荐使用默认值1。对于固体材料，建议使用VASP的线性响应功能（如设置LEPSILON=.TRUE.或LCALCEPS=.TRUE.）来计算介电常数，而不是手动设置EPSILON。", "tips": "EPSILON参数仅用于缩放单极和偶极校正，不影响其他计算。对于固体体系，手动设置EPSILON可能不准确，推荐使用VASP的线性响应例程来确定屏蔽性质。同时，确保正确设置相关参数如DIPOL、IDIPOL等以进行校正。"}, "ESTOP": {"name": "ESTOP", "description": "Description:ESTOPspecifies the stop condition for stochastic MP2.", "default": "Default:ESTOP", "details": "Description:ESTOPspecifies the stop condition for stochastic MP2.\nESTOPdefines the energy accuracy in units of eV for each individual tau-point of the two individual MP2 energy contributions (direct MP2 term + exchange MP2 term). Since the statistical errors of each contribution is independent, the standard deviation of the MP2 energy can be estimated as\n[math]\\displaystyle{ \n\\sigma = \\texttt{ESTOP} * \\sqrt{2 \\cdot \\texttt{NOMEGA}} \\;.\n }[/math]", "wiki_url": "https://www.vasp.at/wiki/index.php/ESTOP", "description_cn": "ESTOP 指定了随机MP2的停止条件。", "default_value": "未指定", "details_cn": "ESTOP 指定了随机MP2的停止条件。ESTOP 定义了能量精度，单位为 eV，用于每个单独的 tau 点，针对两个单独的 MP2 能量贡献（直接 MP2 项 + 交换 MP2 项）。由于每个贡献的统计误差是独立的，MP2 能量的标准差可以估计为 σ = ESTOP * sqrt(2 * NOMEGA)。", "recommended": "通常设置为 0.01 到 0.1 eV，具体取决于所需的计算精度。较小的值（如 0.01 eV）可提高精度但增加计算成本，适用于高精度需求；较大的值（如 0.1 eV）可加快计算，适用于初步测试或资源有限的情况。使用场景：在随机MP2计算中，用于控制能量收敛和停止条件，确保计算在达到指定精度时终止。", "tips": "ESTOP 的值直接影响统计误差的估计，请根据系统大小和精度需求谨慎设置。注意与 NOMEGA 参数的配合使用，因为标准差公式中涉及 NOMEGA；确保理解公式以优化计算效率。在实际计算中，建议先进行小规模测试以确定合适的 ESTOP 值。"}, "EVENONLY": {"name": "EVENONLY", "description": "EVENONLY= .TRUE. | .FALSE.Default:EVENONLY= .FALSE.", "default": "EVENONLY= .TRUE. | .FALSE.Default:EVENONLY= .FALSE.", "details": "Description:EVENONLY=.TRUE. selects a subset ofk-points for the representation of the Fock exchange potential, withC1=C2=C3=1, andn1+n2+n3even.\nOne may restrict the sum overqin theFock exchange potential(or one of its short range counterparts) to a subset, {qk}, of the full (N1×N2×N3)k-point set, {k}, for which the following holds\nwhereb1,2,3are the reciprocal lattice vectors of the primitive cell,\nandCiis the integer grid reduction factor along reciprocal lattice directionbi.", "wiki_url": "https://www.vasp.at/wiki/index.php/EVENONLY", "description_cn": "EVENONLY参数控制是否仅选择偶数k点子集用于Fock交换势计算，默认值为.FALSE.。", "default_value": ".FALSE.", "details_cn": "当EVENONLY=.TRUE.时，选择一个k点子集来表示Fock交换势，其中C1=C2=C3=1，且n1+n2+n3为偶数。可以将Fock交换势（或其短程对应部分）中的q求和限制在完整k点集{ k }的一个子集{ qk }上，该子集满足以下条件：其中b1,2,3是原胞的倒格矢，Ci是沿倒格矢方向bi的整数网格缩减因子。", "recommended": "推荐值为.FALSE.，适用于需要高精度的杂化泛函计算（如HSE06）。当计算资源有限或k点网格较大时，可考虑设置为.TRUE.以加速计算，但需测试精度影响。", "tips": "使用EVENONLY=.TRUE.时，确保k点网格满足条件（C1=C2=C3=1且n1+n2+n3为偶数）；建议与默认设置比较结果以验证精度；注意与其他INCAR参数（如KPOINTS文件）的配合。"}, "EVENONLYGW": {"name": "EVENONLYGW", "description": "EVENONLYGW= [logical]Default:EVENONLYGW= .FALSE.", "default": "EVENONLYGW= [logical]Default:EVENONLYGW= .FALSE.", "details": "Description:EVENONLYGWallows to restrict the k-points in the evaluation of response functions (inGW calculations) to even values.\nEVENONLYGW=.TRUE.is only of limited use and restricts the summation to k-points with[math]\\displaystyle{ n_{1}+n_{2}+n_{3} }[/math]being even ([math]\\displaystyle{ \\Gamma }[/math]point and from there on every second k-point included).\nODDONLYGW,GW calculations", "wiki_url": "https://www.vasp.at/wiki/index.php/EVENONLYGW", "description_cn": "EVENONLYGW 是一个逻辑参数，默认值为 .FALSE.。", "default_value": ".FALSE.", "details_cn": "EVENONLYGW 允许在评估响应函数（在GW计算中）时将k点限制为偶数值。EVENONLYGW=.TRUE. 的用途有限，它将求和限制在 n1+n2+n3 为偶数的k点（包括Γ点和从那里开始每隔一个k点）。ODDONLYGW, GW计算。", "recommended": "通常保持默认值 .FALSE.，以确保计算精度。使用场景：仅在GW计算中需要显著减少k点数量以节省计算资源时考虑使用，但需谨慎评估对结果的影响。", "tips": "启用EVENONLYGW=.TRUE. 可能会降低计算精度，因为它只考虑部分k点；建议在初步测试或已知系统具有特定对称性时使用，并与其他参数（如ODDONLYGW）结合验证。"}, "EWALD_CUTOFF": {"name": "EWALD_CUTOFF", "description": "EWALD_CUTOFF=  [real]", "default": "Default:EWALD_CUTOFF", "details": "Description:EWALD_CUTOFFsets the unified cutoff radius for the Ewald summation of the electrostatic interaction. It controls both the number of cells that contribute (in real space) as well as the number of G-vectors that are considered (in reciprocal space).\nThe default value ofEWALD_CUTOFFis a safe choice in nearly all cases.\nFor bulk systems, increasing it will not change the total energy by more than a few $\\mu$eV.\nFor surface calculations with large cells and thick vacuum regions, however, some necessary G-vectors may be cut off for the default value ofEWALD_CUTOFF, and variations in total energy might increase to the order of 10 meV.\nThis can spoil convergence with respect to the number of layers or the size", "wiki_url": "https://www.vasp.at/wiki/index.php/EWALD_CUTOFF", "description_cn": "EWALD_CUTOFF 参数用于设置 Ewald 求和中的统一截断半径。", "default_value": "默认值由VASP自动设置，通常为安全选择。", "details_cn": "EWALD_CUTOFF 设置静电相互作用 Ewald 求和的统一截断半径。它控制了在实空间中贡献的晶胞数量以及在倒易空间中考虑的 G 矢量数量。EWALD_CUTOFF 的默认值在几乎所有情况下都是安全的选择。对于体相系统，增加它不会使总能量变化超过几微电子伏特。然而，对于具有大晶胞和厚真空层的表面计算，", "recommended": "对于大多数体相计算，使用默认值即可。对于表面计算或大真空层系统，可能需要增加截断半径以确保精度，但需注意计算成本。", "tips": "增加 EWALD_CUTOFF 会提高计算精度但增加计算成本。对于表面计算，建议测试不同值以平衡精度和效率。"}, "FBIAS_A": {"name": "FBIAS_A", "description": "FBIAS_A= [real (array)]", "default": "", "details": "Description: Defines the step height for the bias potential in[math]\\displaystyle{ eV }[/math].\nFBIAS_Adefines the height of the step ([math]\\displaystyle{ A_{\\mu} }[/math]) in the Fermi-like step-shaped bias potential of the following form:\nwhere the sum runs over all ([math]\\displaystyle{ M_4 }[/math]) coordinates the potential acts upon, which are defined in theICONSTfile by setting thestatusto 4.\nThe units of[math]\\displaystyle{ A_{\\mu} }[/math]are[math]\\displaystyle{ eV }[/math].\nThe number of items defined viaFBIAS_Amust be equal ", "wiki_url": "https://www.vasp.at/wiki/index.php/FBIAS_A", "description_cn": "FBIAS_A= [实数（数组）]", "default_value": "无", "details_cn": "定义偏置势的阶跃高度，单位为eV。FBIAS_A定义了费米型阶跃偏置势中阶跃的高度（A_μ），形式如下：其中求和遍历所有（M_4）坐标，这些坐标在ICONST文件中通过设置状态为4来定义。A_μ的单位是eV。", "recommended": "根据具体模拟系统和能量尺度设置，通常建议在0.1-1.0 eV范围内调整。使用场景：用于在VASP第一性原理计算中实现自定义偏置势，特别是在分子动力学模拟中增强采样、控制反应坐标或研究相变过程时。", "tips": "1. 确保在ICONST文件中将需要施加偏置势的坐标状态设置为4；2. 参数为数组形式，数组长度必须与状态为4的坐标数匹配；3. 单位是eV，注意与系统能量单位一致；4. 使用前建议在小系统上测试以确定合适的阶跃高度，避免过度扰动系统。"}, "FBIAS_D": {"name": "FBIAS_D", "description": "FBIAS_D= [real (array)]", "default": "", "details": "Description: Sets the slope of the bias potential.\nFBIAS_Ddefines the parameter[math]\\displaystyle{ D_{\\mu} }[/math], which controls the slope of the central part of the Fermi-like step-sh
