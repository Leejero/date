name: Sync to Gitee

on:
  push:
    branches: [main]
  # 也支持手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 SSH 密钥
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_RSA_PRIVATE_KEY }}" > ~/.ssh/gitee_sync_key
          chmod 600 ~/.ssh/gitee_sync_key
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts 2>/dev/null

      # 3. 推送到 Gitee
      - name: Push to Gitee
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/gitee_sync_key"
        run: |
          git remote add gitee git@gitee.com:Leejero/date.git || true
          git push gitee main --force
