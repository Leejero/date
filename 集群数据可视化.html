<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPC 集群监控面板 - 物理与光电工程学院</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --primary: #4f6ef7;
    --primary-light: #e8edff;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #06b6d4;
    --text: #1e293b;
    --text2: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --radius: 12px;
    --sidebar-w: 220px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }

  /* ===== Sidebar ===== */
  .sidebar {
    position: fixed; left:0; top:0; bottom:0; width:var(--sidebar-w);
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color:#fff; padding:0; z-index:200;
    display:flex; flex-direction:column; overflow-y:auto;
    transition: transform .3s ease;
  }
  .sidebar-brand {
    padding:20px 16px; border-bottom:1px solid rgba(255,255,255,.1);
    display:flex; flex-direction:column; position:relative;
  }
  .sidebar-brand h2 { font-size:1.05rem; font-weight:700; letter-spacing:.5px; }
  .sidebar-brand p { font-size:.72rem; opacity:.6; margin-top:4px; }
  .sidebar-close {
    position:absolute; top:8px; right:8px;
    background:none; border:none; color:rgba(255,255,255,.5);
    font-size:1.2rem; cursor:pointer; padding:4px; line-height:1;
  }
  .sidebar-close:hover { color:#fff; }
  .sidebar-nav { flex:1; padding:12px 0; display:flex; flex-direction:column; }
  .sidebar-nav a {
    display:flex; align-items:center; gap:10px;
    padding:10px 20px; color:rgba(255,255,255,.7); text-decoration:none;
    font-size:.85rem; transition: all .3s ease; border-left:3px solid transparent;
  }
  .sidebar-nav a:hover,
  .sidebar-nav a.active {
    color:#fff; background:rgba(255,255,255,.08); border-left-color:var(--primary);
  }
  .sidebar-nav a .nav-icon { font-size:1.1rem; width:22px; text-align:center; }
  .sidebar-footer {
    padding:16px; border-top:1px solid rgba(255,255,255,.1);
    font-size:.72rem; opacity:.5;
    display:flex; align-items:center;
  }

  /* Sidebar overlay for mobile */
  .sidebar-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,.4); z-index:190;
  }

  /* Sidebar toggle button */
  .sidebar-toggle {
    position: fixed; left:12px; top:12px; z-index:180;
    background: var(--primary); color:#fff; border:none;
    width:40px; height:40px; border-radius:10px; cursor:pointer;
    font-size:1.2rem; display:none; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px rgba(79,110,247,.3);
    transition: transform .3s ease;
  }
  .sidebar-toggle:hover { transform: scale(1.05); }

  /* ===== Main wrapper ===== */
  .main-wrap {
    margin-left: var(--sidebar-w);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transition: margin-left .3s ease;
    padding-bottom: 52px;
  }
  .main-wrap.full { margin-left: 0; }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, #4f6ef7 0%, #7c3aed 100%);
    color:#fff; padding:28px 0 20px; text-align:center; position:relative;
  }
  .header h1 { font-size:1.8rem; font-weight:700; letter-spacing:.5px; }
  .header p { opacity:.85; margin-top:6px; font-size:.95rem; }
  .header .badge { display:inline-block; background:rgba(255,255,255,.2); padding:3px 12px; border-radius:20px; font-size:.8rem; margin-top:8px; }

  /* ===== Layout ===== */
  .container { max-width:1100px; margin:0 auto; padding:20px 16px 80px; width:100%; }
  .grid { display:grid; gap:16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }

  /* ===== Card ===== */
  .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; border:1px solid var(--border); }
  .card-title { font-size:.85rem; color:var(--text2); font-weight:600; letter-spacing:.5px; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .card-title .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

  /* ===== Stat card ===== */
  .stat { text-align:center; padding:22px 16px; }
  .stat .num { font-size:2rem; font-weight:700; color:var(--primary); }
  .stat .label { font-size:.82rem; color:var(--text2); margin-top:2px; }
  .stat.green .num { color:var(--success); }
  .stat.orange .num { color:var(--warning); }
  .stat.red .num { color:var(--danger); }
  .stat.cyan .num { color:var(--info); }

  /* ===== Progress bar ===== */
  .progress-wrap { margin:8px 0; }
  .progress-label { display:flex; justify-content:space-between; font-size:.82rem; color:var(--text2); margin-bottom:4px; }
  .progress { height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
  .progress-bar { height:100%; border-radius:4px; transition: width .6s ease; }
  .bar-blue { background: linear-gradient(90deg, #4f6ef7, #7c3aed); }
  .bar-green { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .bar-orange { background: linear-gradient(90deg, #f59e0b, #d97706); }
  .bar-red { background: linear-gradient(90deg, #ef4444, #dc2626); }
  .bar-cyan { background: linear-gradient(90deg, #06b6d4, #0891b2); }

  /* ===== Table ===== */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th { text-align:center; padding:10px 12px; background:#f8fafc; color:var(--text2); font-weight:600; border-bottom:2px solid var(--border); white-space:nowrap; }
  td { text-align:center; padding:9px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:#f8fafc; }

  /* ===== Tag ===== */
  .tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
  .tag-run { background:#dcfce7; color:#166534; }
  .tag-pend { background:#fef9c3; color:#854d0e; }
  .tag-down { background:#fee2e2; color:#991b1b; }
  .tag-idle { background:#e0f2fe; color:#075985; }
  .tag-mixed { background:#fef3c7; color:#92400e; }
  .tag-alloc { background:#dbeafe; color:#1e40af; }
  .tag-online { background:#dcfce7; color:#166534; }
  .tag-qos { background:var(--primary-light); color:var(--primary); }

  /* ===== Alert ===== */
  .alert-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-radius:8px; margin-bottom:8px; font-size:.85rem; }
  .alert-critical { background:#fef2f2; border-left:3px solid var(--danger); }
  .alert-warning { background:#fffbeb; border-left:3px solid var(--warning); }
  .alert-icon { font-size:1.1rem; }

  /* ===== Section title ===== */
  .section-title { font-size:1.15rem; font-weight:700; margin:28px 0 14px; padding-left:12px; border-left:3px solid var(--primary); scroll-margin-top:20px; }

  /* ===== Footer ===== */
  .footer {
    text-align:center; padding:14px 20px; color:var(--text2); font-size:.82rem;
    border-top:1px solid var(--border); background:var(--bg);
    position:fixed; bottom:0; left:var(--sidebar-w); right:0; z-index:50;
    transition: left .3s ease;
  }
  .footer .dev { font-weight:600; color:var(--primary); }

  /* ===== Back to top ===== */
  .back-top {
    position:fixed; right:24px; bottom:60px; z-index:80;
    width:44px; height:44px; border-radius:50%;
    background:var(--primary); color:#fff; border:none;
    font-size:1.2rem; cursor:pointer;
    box-shadow:0 2px 12px rgba(79,110,247,.35);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity .3s ease, transform .3s ease;
  }
  .back-top.show { opacity:1; pointer-events:auto; }
  .back-top:hover { transform: translateY(-3px); }

  /* ===== Loading ===== */
  .loading { text-align:center; padding:60px; color:var(--text2); }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ===== Node grid ===== */
  .node-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px; }
  .node-chip { padding:8px 10px; border-radius:8px; font-size:.78rem; text-align:center; border:1px solid var(--border); }
  .node-chip .n-name { font-weight:700; }
  .node-chip .n-state { margin-top:2px; }

  /* ===== Desktop sidebar hidden state ===== */
  .sidebar.hidden { transform: translateX(-100%); }
  .sidebar.hidden ~ .sidebar-toggle { display:flex; }

  /* ===== Responsive: Tablet & Mobile ===== */
  @media(max-width:1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar.hidden { transform: translateX(-100%); }
    .sidebar.open ~ .sidebar-overlay { display:block; }
    .sidebar.open ~ .sidebar-toggle { display:none; }
    .sidebar:not(.open) ~ .sidebar-toggle { display:flex; }
    .main-wrap { margin-left: 0; }
    .main-wrap.full { margin-left: 0; }
    .footer { left: 0; }
    .footer.full { left: 0; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .stat .num { font-size:1.5rem; }
    .stat { padding:16px 10px; }
    .card { padding:14px; }
    .header { padding:20px 0 16px; }
    .header h1 { font-size:1.5rem; }
    .container { padding:14px 12px 70px; }
  }

  @media(max-width:640px) {
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    .header h1 { font-size:1.2rem; }
    .header p { font-size:.82rem; }
    .header .badge { font-size:.7rem; }
    .stat .num { font-size:1.4rem; }
    .section-title { font-size:1rem; margin:20px 0 10px; }
    .footer { font-size:.72rem; padding:10px 12px; }
    .sidebar { width: 260px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h2>⚡ HPC 监控</h2>
    <p>物理与光电工程学院集群</p>
    <button class="sidebar-close" onclick="toggleSidebar()" title="隐藏侧边栏">☰</button>
  </div>
  <nav class="sidebar-nav">
    <a href="#overview" class="active" data-section="overview"><span class="nav-icon">📊</span><span>集群概览</span></a>
    <a href="#partitions" data-section="partitions"><span class="nav-icon">📦</span><span>分区资源</span></a>
    <a href="#alerts" data-section="alerts"><span class="nav-icon">🚨</span><span>告警信息</span></a>
    <a href="#disks" data-section="disks"><span class="nav-icon">💾</span><span>磁盘空间</span></a>
    <a href="#qos" data-section="qos"><span class="nav-icon">⚙️</span><span>QOS 约束</span></a>
    <a href="#nodes" data-section="nodes"><span class="nav-icon">🖥️</span><span>节点状态</span></a>
    <a href="#jobs" data-section="jobs"><span class="nav-icon">📋</span><span>任务列表</span></a>
    <a href="#users" data-section="users"><span class="nav-icon">👥</span><span>用户资源</span></a>
    <a href="#online" data-section="online"><span class="nav-icon">🌐</span><span>在线终端</span></a>
  </nav>
  <div class="sidebar-footer">@Leejero · HPC 监控系统</div>
</div>

<!-- Overlay (click to close sidebar on mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar toggle button -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="显示侧边栏">☰</button>

<!-- Main content -->
<div class="main-wrap" id="mainWrap">
  <div class="header">
    <h1 id="clusterName">HPC 集群监控面板</h1>
    <p id="clusterSub">加载中...</p>
    <div class="badge" id="updateTime">--</div>
  </div>
  <div class="container" id="app">
    <div class="loading" id="loader"><div class="spinner"></div>正在获取集群数据...</div>
  </div>
</div>

<!-- Fixed footer -->
<div class="footer" id="footer">开发者：<span class="dev">@Leejero</span> &nbsp;|&nbsp; 物理与光电工程学院高性能计算集群监控系统</div>

<!-- Back to top -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶端">↑</button>

<script>
// 注意：Gitee raw 文件服务器不返回 Access-Control-Allow-Origin 头，
// 浏览器 CORS 策略会阻止跨域 fetch 请求，因此需要通过 CORS 代理访问。
// GitHub 原生支持 CORS，可直接访问，作为主数据源。
var API_SOURCES = [
  'https://raw.githubusercontent.com/Leejero/date/main/data/slurm.json',
  'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent('https://gitee.com/Leejero/date/raw/main/data/slurm.json')
];
var REFRESH_INTERVAL = 300000;
var refreshTimer = null;
var lastData = null;
var currentSource = 0;

function getApiUrl(idx){
  return API_SOURCES[idx] + '?t=' + Date.now();
}
function $(id){ return document.getElementById(id); }
function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function pct(a,b){ return b>0 ? Math.round(a/b*100) : 0; }
function barClass(p){ return p<50?'bar-green':p<80?'bar-orange':'bar-red'; }
function tagState(s){
  s=(s||'').toLowerCase();
  if(s==='running') return '<span class="tag tag-run">运行中</span>';
  if(s==='pending') return '<span class="tag tag-pend">等待中</span>';
  if(s.includes('down')||s.includes('drain')) return '<span class="tag tag-down">异常</span>';
  if(s==='idle') return '<span class="tag tag-idle">空闲</span>';
  if(s==='mixed') return '<span class="tag tag-mixed">混合</span>';
  if(s==='alloc') return '<span class="tag tag-alloc">已分配</span>';
  return '<span class="tag">'+esc(s)+'</span>';
}

// Sidebar toggle
function toggleSidebar(){
  var sb = $('sidebar');
  var isMobile = window.innerWidth <= 1024;
  if(isMobile){
    sb.classList.toggle('open');
  } else {
    var wrap = $('mainWrap');
    var ft = $('footer');
    sb.classList.toggle('hidden');
    wrap.classList.toggle('full');
    ft.classList.toggle('full');
  }
}

// Auto-close mobile sidebar on nav click (only init once)
var _navCloseInited = false;
function initSidebarNavClose(){
  if(_navCloseInited) return;
  _navCloseInited = true;
  document.querySelectorAll('.sidebar-nav a').forEach(function(a){
    a.addEventListener('click', function(){
      if(window.innerWidth <= 1024){
        setTimeout(function(){ $('sidebar').classList.remove('open'); }, 300);
      }
    });
  });
}

// Back to top
window.addEventListener('scroll', function(){
  var btn = $('backTop');
  if(window.scrollY > 300) btn.classList.add('show');
  else btn.classList.remove('show');
}, {passive:true});

// Sidebar scroll highlight + smooth scroll (only init once)
var _sidebarInited = false;
function initSidebarScroll(){
  if(_sidebarInited) return;
  _sidebarInited = true;
  var links = document.querySelectorAll('.sidebar-nav a');
  var sections = [];
  links.forEach(function(a){
    var id = a.getAttribute('data-section');
    var el = document.getElementById(id);
    if(el) sections.push({id:id, el:el, link:a});
  });
  var scrollTimer = null;
  window.addEventListener('scroll', function(){
    if(scrollTimer) return;
    scrollTimer = requestAnimationFrame(function(){
      var cur = sections[0];
      for(var i=0;i<sections.length;i++){
        if(sections[i].el.getBoundingClientRect().top <= 80) cur = sections[i];
      }
      links.forEach(function(a){ a.classList.remove('active'); });
      if(cur) cur.link.classList.add('active');
      scrollTimer = null;
    });
  },{passive:true});
  links.forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var el = document.getElementById(a.getAttribute('data-section'));
      if(el) window.scrollTo({top: el.offsetTop - 10, behavior:'smooth'});
    });
  });
}

function render(d){
  $('loader').style.display='none';
  var ov=d.overview||{}, cs=ov.current_status||{}, ci=d.cluster_info||{};
  var jobs=ov.jobs||{}, us=ov.users||{}, mh=ov.monthly_corehours||{};
  var disks=d.disks||[], parts=d.partitions||[], nodes=d.nodes||[];
  var jlist=d.jobs||[], ulist=d.users||[], online=d.online_users||[];
  var con=d.constraints||{};

  var clusterName = ci.name||'HPC 集群监控面板';
  clusterName = clusterName.replace(/物电学院/g, '物理与光电工程学院');
  $('clusterName').textContent = clusterName;
  $('clusterSub').textContent = 'Slurm '+(ov.slurm_version||'N/A')+' · 运行时间 '+(ov.server_uptime||'N/A');
  $('updateTime').textContent = '最后更新: '+(ov.last_updated||'--');

  var h='';
  // 概览
  h+='<div class="section-title" id="overview">📊 集群概览</div>';
  h+='<div class="grid grid-4">';
  h+='<div class="card stat"><div class="num">'+(cs.total_cores||0)+'</div><div class="label">总核心数</div></div>';
  h+='<div class="card stat green"><div class="num">'+(cs.allocated_cores||0)+'</div><div class="label">已使用核心</div></div>';
  h+='<div class="card stat cyan"><div class="num">'+(cs.free_cores||0)+'</div><div class="label">空闲核心</div></div>';
  h+='<div class="card stat '+(jobs.running>0?'green':'')+'"><div class="num">'+(jobs.running||0)+'</div><div class="label">运行任务</div></div>';
  h+='</div>';
  h+='<div class="grid grid-4" style="margin-top:12px">';
  h+='<div class="card stat"><div class="num">'+(cs.active_nodes||0)+'/'+(cs.total_nodes||0)+'</div><div class="label">活跃节点</div></div>';
  h+='<div class="card stat orange"><div class="num">'+(jobs.pending||0)+'</div><div class="label">等待任务</div></div>';
  h+='<div class="card stat"><div class="num">'+(us.online_terminal||0)+'</div><div class="label">当前在线人数</div></div>';
  h+='<div class="card stat '+(cs.cpu_utilization_percent>80?'orange':'')+'"><div class="num">'+(cs.cpu_utilization_percent||0)+'%</div><div class="label">CPU 利用率</div></div>';
  h+='</div>';

  // 分区
  h+='<div class="section-title" id="partitions">📦 分区资源</div>';
  h+='<div class="grid grid-'+Math.min(parts.length,3)+'">';
  parts.forEach(function(p){
    var ac=p.allowed_cores||960, uc=p.allocated_cores||0, fc=p.free_cores||ac, pp=pct(uc,ac);
    var pname=p.name.charAt(0).toUpperCase()+p.name.slice(1);
    h+='<div class="card"><div class="card-title"><span class="dot" style="background:var(--primary)"></span>'+esc(pname)+' 分区 <span class="tag tag-qos">QOS: '+esc(p.qos)+'</span></div>';
    h+='<div class="progress-wrap"><div class="progress-label"><span>已使用 '+uc+' 核</span><span>'+pp+'%</span></div><div class="progress"><div class="progress-bar '+barClass(pp)+'" style="width:'+pp+'%"></div></div></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2);margin-top:6px"><span>允许核心: '+ac+'</span><span>空闲: '+fc+'</span></div>';
    h+='<div style="margin-top:8px;font-size:.8rem;color:var(--text2)">节点数: '+(p.nodes||[]).length+'</div></div>';
  });
  h+='</div>';

  // 告警
  var alerts=d.alerts||{}, alertList=alerts.alerts||[];
  if(alertList.length>0){
    h+='<div class="section-title" id="alerts">🚨 告警信息</div><div class="card">';
    alertList.forEach(function(a){
      h+='<div class="alert-item '+(a.level==='critical'?'alert-critical':'alert-warning')+'"><span class="alert-icon">'+(a.level==='critical'?'🔴':'🟡')+'</span><div><strong>'+esc(a.type)+'</strong> - '+esc(a.message)+'<br><small style="color:var(--text2)">'+esc(a.timestamp)+'</small></div></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="section-title" id="alerts">🚨 告警信息</div><div class="card" style="text-align:center;color:var(--success);padding:20px">✅ 暂无告警</div>';
  }

  // 磁盘
  h+='<div class="section-title" id="disks">💾 磁盘空间</div>';
  h+='<div class="grid grid-'+Math.max(disks.length,1)+'">';
  disks.forEach(function(dk){
    var p=dk.usage_percent||0;
    h+='<div class="card"><div class="card-title"><span class="dot" style="background:'+(dk.is_alert?'var(--danger)':'var(--success)')+'"></span>'+esc(dk.mount)+'</div>';
    h+='<div class="progress-wrap"><div class="progress-label"><span>'+(dk.used_gb||0)+'GB / '+(dk.total_gb||0)+'GB</span><span>'+p+'%</span></div><div class="progress"><div class="progress-bar '+barClass(p)+'" style="width:'+p+'%"></div></div></div>';
    h+='<div style="font-size:.82rem;color:var(--text2)">可用: '+(dk.avail_gb||0)+'GB</div></div>';
  });
  h+='</div>';

  // QOS
  var cp=con.partition_constraints||[];
  if(cp.length>0){
    h+='<div class="section-title" id="qos">⚙️ QOS 约束条件</div>';
    h+='<div class="card"><div class="table-wrap"><table><tr><th>分区</th><th>QOS</th><th>GrpTRES<br><small style="font-weight:400;color:var(--text2)">分区最大总资源</small></th><th>MaxTRES<br><small style="font-weight:400;color:var(--text2)">单任务最大资源</small></th><th>MaxTRESPerUser<br><small style="font-weight:400;color:var(--text2)">用户最大资源</small></th></tr>';
    cp.forEach(function(c){
      h+='<tr><td><strong>'+esc(c.partition)+'</strong></td><td><span class="tag tag-qos">'+esc(c.qos_name)+'</span></td><td>'+esc(c.GrpTRES)+'</td><td>'+esc(c.MaxTRES)+'</td><td>'+esc(c.MaxTRESPerUser)+'</td></tr>';
    });
    h+='</table></div>';
    var sr=con.cluster_shared_resources||{};
    h+='</div>';
  }

  // 节点
  h+='<div class="section-title" id="nodes">🖥️ 节点状态</div><div class="card"><div class="node-grid">';
  nodes.forEach(function(n){
    var s=(n.state||'').toLowerCase(), bg='#e2e8f0';
    if(s==='idle') bg='#dbeafe'; else if(s==='mixed') bg='#fef3c7'; else if(s==='alloc') bg='#dcfce7'; else if(s.includes('down')||s.includes('drain')) bg='#fee2e2';
    var u=n.users||[];
    h+='<div class="node-chip" style="background:'+bg+'"><div class="n-name">'+esc(n.name)+'</div><div class="n-state">'+tagState(n.state)+'</div><div style="font-size:.72rem;color:var(--text2);margin-top:2px">'+(n.allocated_cores||0)+'/'+(n.total_cores||0)+'核 · '+(n.jobs_running||0)+'任务</div>'+(u.length?'<div style="font-size:.7rem;color:var(--text2)">'+u.map(esc).join(', ')+'</div>':'')+'</div>';
  });
  h+='</div></div>';

  // 任务
  var runJobs=jlist.filter(function(j){return j.status==='RUNNING';});
  var pendJobs=jlist.filter(function(j){return j.status==='PENDING';});
  if(jlist.length>0){
    h+='<div class="section-title" id="jobs">📋 任务列表 <small style="color:var(--text2);font-weight:400">('+runJobs.length+' 运行, '+pendJobs.length+' 等待)</small></div>';
    h+='<div class="card"><div class="table-wrap"><table><tr><th>Job ID</th><th>名称</th><th>状态</th><th>分区</th><th>用户</th><th>CPU</th><th>运行时间</th><th>时限</th><th>原因</th></tr>';
    jlist.slice(0,50).forEach(function(j){
      h+='<tr><td>'+esc(j.job_id)+'</td><td>'+esc(j.name)+'</td><td>'+tagState(j.status)+'</td><td>'+esc(j.partition)+'</td><td>'+esc(j.user)+'</td><td>'+(j.cpus||0)+'</td><td>'+esc(j.runtime)+'</td><td>'+esc(j.time_limit)+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(j.reason)+'">'+esc(j.reason)+'</td></tr>';
    });
    if(jlist.length>50) h+='<tr><td colspan="9" style="text-align:center;color:var(--text2)">... 仅显示前 50 条，共 '+jlist.length+' 条</td></tr>';
    h+='</table></div></div>';
  }

  // 用户
  if(ulist.length>0){
    h+='<div class="section-title" id="users">👥 用户资源</div>';
    h+='<div class="card"><div class="table-wrap"><table><tr><th>用户</th><th>运行</th><th>等待</th><th>核心</th><th>节点</th><th>分区</th><th>在线</th></tr>';
    ulist.forEach(function(u){
      h+='<tr><td><strong>'+esc(u.username)+'</strong></td><td>'+(u.running_jobs||0)+'</td><td>'+(u.pending_jobs||0)+'</td><td>'+(u.total_cores||0)+'</td><td>'+(u.total_nodes||0)+'</td><td>'+(u.partitions||[]).map(esc).join(', ')+'</td><td>'+(u.is_online?'<span class="tag tag-online">在线</span>':'<span style="color:var(--text2)">-</span>')+'</td></tr>';
    });
    h+='</table></div></div>';
  }

  // 在线
  if(online.length>0){
    h+='<div class="section-title" id="online">🌐 在线终端</div>';
    h+='<div class="card"><div class="table-wrap"><table><tr><th>用户</th><th>终端</th><th>来源</th><th>登录时间</th><th>空闲</th><th>会话数</th></tr>';
    online.forEach(function(u){
      h+='<tr><td><strong>'+esc(u.username)+'</strong></td><td>'+esc(u.tty)+'</td><td>'+esc(u.from)+'</td><td>'+esc(u.login_time)+'</td><td>'+esc(u.idle)+'</td><td>'+(u.sessions||1)+'</td></tr>';
    });
    h+='</table></div></div>';
  }

  h+='<div style="height:60vh"></div>';
  $('app').innerHTML=h;
  initSidebarScroll();
  initSidebarNavClose();
}

function fetchData(){
  var tried=[];
  function tryFetch(idx){
    if(idx>=API_SOURCES.length){
      if(!lastData) $('loader').innerHTML='<div style="color:var(--danger)">❌ 所有数据源加载失败<br><small>GitHub: '+esc(tried[0]||'未尝试')+'<br>Gitee: '+esc(tried[1]||'未尝试')+'</small></div>';
      return;
    }
    var ctrl=null, tid=null;
    if(typeof AbortController!=='undefined'){
      ctrl=new AbortController();
      tid=setTimeout(function(){ctrl.abort();},5000);
    }
    fetch(getApiUrl(idx),ctrl?{signal:ctrl.signal}:{}).then(function(r){
      if(tid) clearTimeout(tid);
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(d){
      currentSource=idx; lastData=d; render(d);
      var now=new Date(), ts=now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      $('updateTime').textContent='最后更新: '+(d.overview&&d.overview.last_updated||'--')+' · 本地时间：'+ts+' · 数据来源：'+(idx===0?'GitHub':'Gitee')+' · 每5min刷新一次';
    }).catch(function(e){
      tried[idx]=e.message;
      console.warn('数据源'+(idx===0?'GitHub':'Gitee')+'失败:'+e.message);
      tryFetch(idx+1);
    });
  }
  tryFetch(0);
}

fetchData();
refreshTimer=setInterval(fetchData,REFRESH_INTERVAL);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}}
  else{fetchData();refreshTimer=setInterval(fetchData,REFRESH_INTERVAL);}
});
</script>
